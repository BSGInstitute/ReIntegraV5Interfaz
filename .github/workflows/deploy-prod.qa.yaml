name: Deploy QA - IntegraV5Interfaz

on:
  push:
    branches: [qa]

concurrency:
  group: deploy-qa-v5interfaz
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          HASH_FILE=".node-modules-hash"
          if [ -d node_modules ] && [ -f "$HASH_FILE" ] && [ "$(cat $HASH_FILE)" = "$HASH" ]; then
            echo "node_modules up to date — skipping install"
          else
            nice -n 10 npm ci --ignore-scripts
            echo "$HASH" > "$HASH_FILE"
          fi

      - name: Run tests
        run: nice -n 10 npm test -- --ci --no-coverage
        env:
          NODE_OPTIONS: --max_old_space_size=512

      - name: Build Angular
        run: nice -n 10 npm run build -- --configuration qa
        env:
          NODE_OPTIONS: --max_old_space_size=1536

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-qa
          path: dist/integra-v5-interfaz
          retention-days: 1

  # ── 2. Docker Build & Push ─────────────────────────────────────────────────
  build-push:
    needs: test
    runs-on: self-hosted
    timeout-minutes: 10
    outputs:
      image-tag: ${{ steps.sha-tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-qa
          path: dist/integra-v5-interfaz

      - name: Lowercase image name
        run: echo "IMAGE_LOWER=${{ env.REGISTRY }}/$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --oci-worker-max-parallelism 2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_LOWER }}
          tags: |
            type=raw,value=qa
            type=sha,prefix=qa-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_LOWER }}:buildcache-qa
          cache-to: type=registry,ref=${{ env.IMAGE_LOWER }}:buildcache-qa,mode=max

      - name: Compute SHA image tag
        id: sha-tag
        run: echo "value=${{ env.IMAGE_LOWER }}:qa-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

  # ── 3. Deploy (self-hosted runner en el servidor QA) ─────────────────────
  deploy:
    needs: build-push
    runs-on: self-hosted
    timeout-minutes: 10
    environment: qa

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull image
        run: docker pull ${{ needs.build-push.outputs.image-tag }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image-tag }}
        run: docker compose -f docker-compose.qa.yml up -d

      - name: Prune old images
        run: docker image prune -f

  # ── 4. Post-Deploy Healthcheck ────────────────────────────────────────────
  healthcheck:
    needs: [build-push, deploy]
    uses: ./.github/workflows/post-deploy-healthcheck.yaml
    with:
      environment: qa
      compose-file: docker-compose.qa.yml
      healthcheck-url: http://localhost:8443
      image-tag: ${{ needs.build-push.outputs.image-tag }}

  # ── 5. Notificación (siempre) ─────────────────────────────────────────────
  notify:
    needs: [test, build-push, deploy, healthcheck]
    if: always()
    uses: ./.github/workflows/notify-teams.yaml
    with:
      environment: qa
      test-status: ${{ needs.test.result }}
      build-status: ${{ needs.build-push.result }}
      deploy-status: ${{ needs.deploy.result }}
      healthcheck-status: ${{ needs.healthcheck.result }}
      commit-message: ${{ github.event.head_commit.message }}
      run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      branch: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      actor: ${{ github.actor }}
      actor-email: ${{ github.event.pusher.email }}
    secrets: inherit