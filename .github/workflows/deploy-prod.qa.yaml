name: Deploy QA - IntegraV5Interfaz

on:
  push:
    branches: [qa]

concurrency:
  group: deploy-qa-v5interfaz
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Tests ───────────────────────────────────────────────────────────────
  test:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Cache Angular build
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: angular-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test -- --ci --no-coverage

  # ── 2. Docker Build & Push ─────────────────────────────────────────────────
  build-push:
    needs: test
    runs-on: self-hosted
    timeout-minutes: 40
    outputs:
      image-tag: ${{ steps.sha-tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_LOWER=${{ env.REGISTRY }}/$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_LOWER }}
          tags: |
            type=raw,value=qa
            type=sha,prefix=qa-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: BUILD_CONFIG=qa
          cache-from: type=registry,ref=${{ env.IMAGE_LOWER }}:buildcache-qa
          cache-to: type=registry,ref=${{ env.IMAGE_LOWER }}:buildcache-qa,mode=max

      - name: Compute SHA image tag
        id: sha-tag
        run: echo "value=${{ env.IMAGE_LOWER }}:qa-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

  # ── 3. Deploy (self-hosted runner en el servidor QA) ─────────────────────
  deploy:
    needs: build-push
    runs-on: self-hosted
    timeout-minutes: 10
    environment: qa

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull image
        run: docker pull ${{ needs.build-push.outputs.image-tag }}

      - name: Deploy
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.image-tag }}
        run: docker compose -f docker-compose.qa.yml up -d

      - name: Prune old images
        run: docker image prune -f

  # ── 4. Notificación de fallo ──────────────────────────────────────────────
  notify-failure:
    needs: [test, build-push, deploy]
    runs-on: self-hosted
    if: failure()
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build-push.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          if [ "$TEST_RESULT" = "failure" ]; then
            FAILED_JOB="Tests (Jest)"
          elif [ "$BUILD_RESULT" = "failure" ]; then
            FAILED_JOB="Build & Push Docker"
          elif [ "$DEPLOY_RESULT" = "failure" ]; then
            FAILED_JOB="Deploy"
          else
            FAILED_JOB="Desconocido"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg job  "$FAILED_JOB" \
              --arg sha  "${COMMIT_SHA:0:7}" \
              --arg msg  "${COMMIT_MSG%%$'\n'*}" \
              --arg who  "$ACTOR" \
              --arg url  "$RUN_URL" \
              '{
                embeds: [{
                  title: "❌ Deploy QA fallido",
                  color: 15158332,
                  fields: [
                    {name: "Job fallido", value: $job,  inline: true},
                    {name: "Autor",       value: $who,  inline: true},
                    {name: "Commit",      value: ("`" + $sha + "` " + $msg)},
                    {name: "Ver log",     value: $url}
                  ],
                  footer: {text: "IntegraV5Interfaz · QA"}
                }]
              }')"