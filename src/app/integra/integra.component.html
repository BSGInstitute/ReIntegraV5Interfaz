<app-crm *ngIf="showCRM"></app-crm>
<kendo-floatingactionbutton
  *ngIf="(showBtnRingover$ | async) && checkStatusRingover"
  title="Toggle Ringover"
  class="kfab-toggleRingover"
  icon="eye"
  [align]="{ vertical: 'top', horizontal: 'center' }"
  (click)="toggleRingover()"
  text="Toggle Ringover"
  themeColor="tertiary"
  size="small"
  rounded="medium"
>
</kendo-floatingactionbutton>
<app-kw-comentario-agenda *ngIf="showComentarioAgenda$ | async"></app-kw-comentario-agenda>
<app-menu (click)="validarReLogin()">
  <router-outlet></router-outlet>
</app-menu>
