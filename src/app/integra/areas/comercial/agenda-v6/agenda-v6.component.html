<div class="agenda-v6-container">
  <div *ngIf="cargando" class="agenda-v6-loader">
    <span>Cargando agenda...</span>
  </div>

  <iframe
    #iframeAgenda
    [src]="urlSegura"
    (load)="alCargar()"
    frameborder="0"
    allow="camera; microphone; fullscreen; clipboard-read; clipboard-write"
    title="Agenda Comercial V6">
  </iframe>
</div>
