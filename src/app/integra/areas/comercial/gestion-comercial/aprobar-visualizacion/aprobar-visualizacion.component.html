<div class="card border-primary">
  <div class="card-header pb-0 bg-color-material">
    <div class="col text-aling-center">
      <h2 class="mb-2 text-white" style="text-align: center ;">
        (O) Aprobación de visualizaciones
      </h2>
    </div>
  </div>
  <div class="card-body border px-4">
    <form [formGroup]="formFiltro">
      <div class="row">
        <div class="row col-md-4 py-3 text-right">
          <kendo-formfield orientation="horizontal">
            <kendo-label [for]="asesores" text="Asesores"></kendo-label>
            <kendo-multiselect
              #asesores
              [data]="listaAsesores"
              valueField="id"
              textField="nombres"
              formControlName="asesores"
              [valuePrimitive]="true"
              (valueChange)="seleccionAsesor($event)"
              [filterable]="true"
              (filterChange)="filtrarAsesores($event)"
              [virtual]="{ itemHeight: 30 }"
            ></kendo-multiselect>
          </kendo-formfield>
        </div>
        <div class="row col-md-4 py-3">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="centroCosto"
              text="Centros de Costos"
            ></kendo-label>
            <kendo-combobox
              #centroCosto
              [data]="listaCentroCostos"
              valueField="id"
              textField="nombre"
              formControlName="centroCosto"
              [valuePrimitive]="true"
              [virtual]="{ itemHeight: 28 }"
              [filterable]="true"
              (filterChange)="filtrarCentroCosto($event)"
            ></kendo-combobox>
          </kendo-formfield>
        </div>
        <div class="row col-md-3 py-3 text-right">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="faseOportunidad"
              text="Fase Oportunidad Actual"
            ></kendo-label>
            <kendo-multiselect
              #faseOportunidad
              [data]="listaFaseOportunidad"
              valueField="id"
              textField="codigo"
              formControlName="faseOportunidad"
              [valuePrimitive]="true"
              [filterable]="true"
              (filterChange)="filtrarFase($event)"
            ></kendo-multiselect>
          </kendo-formfield>
        </div>
        <div class="row col-md-1 p-4">
          <div class="text-center">
            <button
              kendoButton
              icon="search"
              themeColor="success"
              (click)="generarReporteCobertura()"
            >
              Buscar
            </button>
          </div>
        </div>
      </div>
    </form>
    <div class="row">
      <kendo-grid
        [kendoGridBinding]="gridSolicitudVisualizacion.data"
        [pageable]="gridSolicitudVisualizacion.pageable"
        [pageSize]="gridSolicitudVisualizacion.pageSize"
        [sortable]="gridSolicitudVisualizacion.sortable"
        [resizable]="gridSolicitudVisualizacion.resizable"
        [loading]="gridSolicitudVisualizacion.loading"
        filterable="menu"
      >
        <ng-template kendoGridToolbarTemplate>
          <button
            type="button"
            kendoGridExcelCommand
            icon="file-excel"
            (click)="excelexport.save()"
          >
            Export to Excel
          </button>
        </ng-template>
        <kendo-grid-column
          field="area"
          title="Area"
          [width]="110"
          headerClass="text-center"
        >
          <ng-template
            kendoGridFilterMenuTemplate
            let-filter
            let-column="column"
            let-filterService="filterService"
          >
            <kendo-grid-string-filter-menu
              [column]="column"
              [filter]="filter"
              [filterService]="filterService"
              [extra]="false"
              operator="contains"
            >
              <kendo-filter-contains-operator
                text="Contiene"
              ></kendo-filter-contains-operator>
            </kendo-grid-string-filter-menu>
          </ng-template>
        </kendo-grid-column>

        <kendo-grid-command-column title="Aprobar" [width]="80">
          <ng-template kendoGridCellTemplate let-dataItem>
            <div class="text-center">
              <button
                class="btn btn-outline-primary"
                (click)="aprobar(dataItem)"
              >
                <fa-icon [icon]="['fas', 'check']"></fa-icon>
              </button>
            </div>
          </ng-template>
        </kendo-grid-command-column>
        <kendo-excelexport
          [data]="gridSolicitudVisualizacion.data"
          fileName="Reporte Seguimiento de Oportunidades.xlsx"
          #excelexport
        >
          <kendo-excelexport-column field="area" title="Area">
          </kendo-excelexport-column>
          <kendo-excelexport-column
            field="nombreCentroCosto"
            title="Centro de Costo"
          >
