<div class="content px-3">
  <div class="card mt-3">
    <div class="car-header" style="background: #f7f7f7">
      <div class="row mt-3">
        <div
          class="col-12 d-flex justify-content-center"
          style="margin-bottom: 1.4em"
        >
          <kendo-dropdownlist
            [data]="dataProgramaGeneral"
            style="width: 300px"
            [filterable]="true"
            textField="nombre"
            valueField="id"
            [valuePrimitive]="true"
            (filterChange)="filterProgramaGeneral($event)"
            (valueChange)="changeProgramaGeneral($event)"
            [(ngModel)]="idPrograma"
          >
          </kendo-dropdownlist>
        </div>
      </div>
    </div>
    <br />
    <div class="card-body">
      <div class="row">
        <div class="col-12" id="informacionProgramaTabHtml">
          <ng-container *ngIf="resPreguntaFrecuente != null && resPreguntaFrecuente?.data.length > 0">
            <ng-container
              *ngFor="let item of resPreguntaFrecuente.data; let i = index"
            >
              <b><legend> {{ item.nombre }}</legend></b>
              <ng-container *ngIf="item.contenido.length > 0">
                <ng-container *ngFor="let subItem of item.contenido">
                  <h6>
                    <b>
                      <i>
                        {{subItem.pregunta}}
                      </i>
                    </b>
                  </h6>
                  <span [innerHTML]="subItem.respuesta">
                  </span>
                </ng-container>
              </ng-container>

            </ng-container>
          </ng-container>
          <ng-container *ngIf="resPreguntaFrecuente != null && resPreguntaFrecuente.modeloCertificado.length > 0">
            <b><legend> Modelo de Certificador </legend></b>
            <ng-container
              *ngFor="let item of resPreguntaFrecuente.modeloCertificado; let i = index"
            >
              <p>
                {{ item.nombreModelo }}
                <a style="color:black" class="btn btn-link" [href]="item.urlModelo">
                  <span class="k-icon k-i-download k-icon-20"></span>
                </a>
              </p>

            </ng-container>
          </ng-container>
          <!-- <div
            class="col-12"
            id="informacionProgramaTabHtml"
            [innerHTML]="contentPreguntaFrecuente"
          ></div> -->
        </div>
        <loading [loading]="loading"></loading>
      </div>
    </div>
  </div>
</div>
