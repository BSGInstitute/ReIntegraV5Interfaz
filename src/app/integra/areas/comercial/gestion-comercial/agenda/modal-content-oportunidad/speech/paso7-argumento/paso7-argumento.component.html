<div class="col-12 p-2 grid-speech" id="gridFactoresMotivacion">
    <kendo-grid
      [data]="dataGridPresentacionArgumentoCliente$ | async" [sortable]="true">
      <kendo-grid-column
        field="nombrePresentacionArgumento"
        title="Lista de Argumentos"
        [width]="600">
        <ng-template kendoGridCellTemplate let-dataItem>
          <div [class]="dataItem.class">{{dataItem.nombrePresentacionArgumento}}</div>
        </ng-template>
      </kendo-grid-column>
      <ng-template kendoGridDetailTemplate let-dataItem>
        <kendo-grid [kendoGridBinding]="dataItem.argumentos">
          <kendo-grid-column field="detalle" title="Detalle" [width]="150">
            <ng-template kendoGridCellTemplate let-dataItem>
              <div class="w-100" [innerHtml]="dataItem.detalle"></div>
            </ng-template>
          </kendo-grid-column>          
          <kendo-grid-column field="solucion" title="Solucion" [width]="700">
            <ng-template kendoGridCellTemplate let-dataItem>
              <div class="w-100" [innerHtml]="dataItem.solucion"></div>
            </ng-template>
          </kendo-grid-column>
        </kendo-grid>
      </ng-template>
    </kendo-grid>
  </div>
