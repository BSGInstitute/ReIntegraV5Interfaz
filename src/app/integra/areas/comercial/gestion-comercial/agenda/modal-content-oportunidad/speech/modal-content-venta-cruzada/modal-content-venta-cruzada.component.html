
<div class="modal-header bg-integra">
  <h2 class="modal-title text-white mb-0" id="modal-basic-title ">
    Realizar Venta Cruzada
  </h2>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body" id="tabsModalOportunidad" class="p-0">
  <form [formGroup]="formVentaCruzada" class="k-form k-form-horizontal">
    <div class="row my-2 p-3">
      <div class="col-sm-12 col-md-6 my-2">
        <h2 class="mx-4 text-primary">Datos del Alumno</h2>
        <div class="row my-2">
          <div class="col-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="horaContacto" class="k-label">
                <span>Hora Contacto</span>
              </label>
              <kendo-datetimepicker
                #horaContacto
                formControlName="horaContacto"
                [min]="horaContacto.min"
                [format]="horaContacto.format"
                [disabled]="true"
              >
              </kendo-datetimepicker>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="comentarioActividad" class="k-label">
                <span>Comentario de<br />la Actividad</span>
              </label>
              <kendo-textarea
                #comentarioActividad
                [rows]="10"
                formControlName="comentarioActividad"
                placeholder="Comentario de la Actividad"
                class="border border-1"
              >
              </kendo-textarea>
            </kendo-formfield>
          </div>
        </div>
      </div>
      <div class="col-sm-12 col-md-6 my-2">
        <h2 class="text-primary">Datos de la Oportunidad</h2>
        <div class="row my-2">
          <div class="col-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="centroCostos" class="k-label">
                <span>Centro de Costo</span>
              </label>
              <kendo-multiselect
                #centroCostos
                [data]="listaCentroCostosFiltrado"
                formControlName="idCentroCosto"
                textField="nombre"
                valueField="id"
                [valuePrimitive]="true"
                (filterChange)="filterCentroCosto($event)"
                [filterable]="true"
                [virtual]="{ itemHeight: 30 }"
              ></kendo-multiselect>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="asesor" class="k-label">
                <span>Asignado Actividades</span>
              </label>
              <kendo-textbox
                #asesor
                formControlName="asesor"
                [disabled]="true"
              >
              </kendo-textbox>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="tipoDato" class="k-label">
                <span>Tipo de Dato</span>
              </label>
              <kendo-dropdownlist
                #tipoDato
                [data]="listaTipoDato"
                formControlName="tipoDato"
                valueField="id"
                textField="nombre"
                [valuePrimitive]="true"
                [disabled]="true"
            > </kendo-dropdownlist>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="origen" class="k-label">
                <span>Origen</span>
              </label>
              <kendo-textbox
                #origen
                formControlName="origen"
                [disabled]="true"
              >
              </kendo-textbox>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="faseOportunidad" class="k-label">
                <span>Fase de Oportunidad</span>
              </label>
              <kendo-dropdownlist
                #faseOportunidad
                [data]="listaFaseOportunidad"
                formControlName="faseOportunidad"
                valueField="id"
                textField="codigo"
                [valuePrimitive]="true"
                [disabled]="true"
            > </kendo-dropdownlist>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="referido" class="k-label">
                <span>Referido por</span>
              </label>
              <kendo-textbox
                #referido
                formControlName="referido"
                [disabled]="true"
              >
              </kendo-textbox>
            </kendo-formfield>
          </div>
        </div>
      </div>
    </div>
  </form>
  <loading [loading]="agendaService.agendaVentaCruzadaService.loader"></loading>
</div>
<div class="modal-footer">

  <div class="k-form-buttons m-0">
    <button
      class="btn btn-primary"
      (click)="realizarVentaCruzada()"
    >
      Guardar solo oportunidad
    </button>
    <button
      class="btn btn-danger"
      (click)="activeModal.dismiss('Cross click')"
    >
      Cancelar
    </button>
  </div>
</div>
