<div class="col-12 p-2 grid-speech" id="gridFactoresMotivacion">
  <kendo-grid
    [data]="dataGridProblemaCliente$ | async" [sortable]="true">
    <kendo-grid-column
      field="nombreProblema"
      title="Lista de Objeciones"
      [width]="600">
      <ng-template kendoGridCellTemplate let-dataItem>
        <div [class]="dataItem.class">{{dataItem.nombreProblema}}</div>
      </ng-template>
    </kendo-grid-column>
    <ng-template kendoGridDetailTemplate let-dataItem>
      <kendo-grid [kendoGridBinding]="dataItem.argumentos">
        <kendo-grid-column
          field="checkValor"
          title=""
          [width]="50"
        >
          <ng-template kendoGridCellTemplate let-dataItem>
            <div class="text-center">
              <input
                type="checkbox"
                class="custom-size border"
                [ngClass]="
                  dataItem.checkValor && !dataItem.caso.includes('Caso')
                    ? 'check-verde'
                    : (dataItem.checkValor && dataItem.caso.includes('Caso') ? 'check-rojo':(dataItem.caso.includes('Caso') ? 'border-rojo' :'border-verde') )
                    
                "
                [(ngModel)]="dataItem.checkValor"
                (change)="checkboxCheckValor(dataItem)"
                kendoCheckBox
              />
            </div>
          </ng-template>
        </kendo-grid-column>
        <!-- <kendo-grid-column field="cabecera" title="" [width]="120">
          <ng-template kendoGridCellTemplate let-dataItem>
            <div class="w-100" [innerHtml]="dataItem.cabecera"></div>
          </ng-template>
        </kendo-grid-column> -->
        <kendo-grid-column field="caso" title="Detalle" [width]="700">
          <ng-template kendoGridCellTemplate let-dataItem>
            <div class="w-100" [innerHtml]="dataItem.caso"></div>
          </ng-template>
        </kendo-grid-column>
      </kendo-grid>
    </ng-template>
  </kendo-grid>
</div>
