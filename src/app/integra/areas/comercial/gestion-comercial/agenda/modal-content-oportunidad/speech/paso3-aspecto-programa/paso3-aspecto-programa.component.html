<div class="row mt-3">
  <div class="col-12 p-2 grid-speech">
    <kendo-grid
      [data]="dataGridBeneficios$ | async"
      scrollable="none"
      [loading]="gridBeneficios.loading"
    >
      <kendo-grid-column
        field="id"
        title="Id"
        [hidden]="true"
      ></kendo-grid-column>
      <kendo-grid-column
        field="nombre"
        title="¿Cuales son los aspectos mas importantes del programa para ti?"
      ></kendo-grid-column>
      <kendo-grid-column field="respuesta" title="Seleccionar">
        <ng-template
          kendoGridCellTemplate
          let-dataItem
          let-rowIndex="rowIndex"
        >
          <div
            class="w-100 d-flex justify-content-center check-speech"
          >
            <input
              type="checkbox"
              size="large"
              rounded="small"
              kendoCheckBox
              [(ngModel)]="dataItem.checked"
              (change)="checkValue(dataItem)"
              #notification
            />
          </div>
        </ng-template>
      </kendo-grid-column>
      <ng-template
        kendoGridDetailTemplate
        let-dataItem
        [kendoGridDetailTemplateShowIf]="
          gridBeneficios.kendoGridDetailTemplateShowIf
        "
      >
        <kendo-grid
          [data]="dataItem.argumentos"
          scrollable="none"
          kendoGridFocusable
        >
          <kendo-grid-column
            field="id"
            title="Argumentos"
            [width]="150"
          >
            <ng-template
              kendoGridCellTemplate
              let-dataItem
              let-rowIndex="rowIndex"
            >
              <div class="w-100">Argumento {{ rowIndex + 1 }}</div>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column field="nombre" title="">
            <ng-template
              kendoGridCellTemplate
              let-dataItem
              let-rowIndex="rowIndex"
            >
              <div class="w-100" [innerHTML]="dataItem.nombre"></div>
            </ng-template>
          </kendo-grid-column>
        </kendo-grid>
      </ng-template>
    </kendo-grid>
  </div>
</div>
<div class="row my-2">
  <div class="col-12">
    <kendo-label
    [for]="beneficioOportunidad"
    text="Monto de ventas"
    >
    <span class="text-danger fw-bold">&nbsp;*</span>
  </kendo-label>
    <kendo-textbox
    #beneficioOportunidad
    [ngModel]="beneficioOportunidad$ | async"
    (ngModelChange)="beneficioOportunidad$.next($event)"
  ></kendo-textbox>
  </div>
</div>
