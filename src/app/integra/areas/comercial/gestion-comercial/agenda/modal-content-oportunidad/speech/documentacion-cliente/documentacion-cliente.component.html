<div class="row">
  <div class="col-sm-12 col-md-4 col-form-label">
    <ng-container
      *ngIf="
        convenioCliente.url != null && convenioCliente.url.trim() != '';
        else elseTemplateConvenioUrl
      "
    >
      <a [href]="convenioCliente.url" target="_blank"
        >Convenio de<br />Capacitación</a
      >
    </ng-container>
    <ng-template #elseTemplateConvenioUrl>
      Convenio de<br />capacitación
    </ng-template>
  </div>
  <div class="col-sm-12 col-md-8">
    <div class="input-group">
      <button
        class="btn btn-sm btn-link"
        type="button"
        (click)="showConvenioCliente(modalSubirConvenioCapacitacion)"
        [disabled]="convenioCliente.disabled"
      >
        <fa-icon
          [icon]="['fas', convenioCliente.icon]"
          class="fa-lg"
          [ngClass]="convenioCliente.btnClass"
        ></fa-icon>
      </button>
      <div
        class="form-control form-control-sm form-radius-15 form-radius-15-left div-disabled"
      >
        <ng-container *ngIf="convenioCliente.comentario === null">
          <strong style="color: rgb(194, 194, 194)">Comentarios</strong>
        </ng-container>
        <ng-container *ngIf="convenioCliente.comentario !== null">
          {{ convenioCliente.comentario }}
        </ng-container>
      </div>
    </div>
  </div>
</div>
<div class="row">
  <div class="col-sm-12 col-md-4 col-form-label">
    <ng-container
      *ngIf="
        documentoCliente.url != null && documentoCliente.url.trim() != '';
        else elseTemplateDocumentoUrl
      "
    >
      <a [href]="documentoCliente.url" target="_blank"
        >Documento de<br />
        identidad</a
      >
    </ng-container>
    <ng-template #elseTemplateDocumentoUrl>
      Documento de<br />
      identidad
    </ng-template>
  </div>
  <div class="col-sm-12 col-md-8">
    <div class="input-group">
      <button
        class="btn btn-sm btn-link"
        type="button"
        (click)="showDocumentoCliente(modalSubirConvenioCapacitacion)"
        [disabled]="documentoCliente.disabled"
      >
        <fa-icon
          [icon]="['fas', documentoCliente.icon]"
          class="fa-lg"
          [ngClass]="documentoCliente.btnClass"
        ></fa-icon>
      </button>
      <div
        class="form-control form-control-sm form-radius-15 form-radius-15-left div-disabled"
      >
        <ng-container *ngIf="documentoCliente.comentario === null">
          <strong style="color: rgb(194, 194, 194)">Comentarios</strong>
        </ng-container>
        <ng-container *ngIf="documentoCliente.comentario !== null">
          {{ documentoCliente.comentario }}
        </ng-container>
      </div>
    </div>
  </div>
</div>
<!-- #region Modal Subir Convenio Capacitacion -->
<ng-template #modalSubirConvenioCapacitacion let-modal>
  <div class="modal-header">
    <h2 class="modal-title mb-0">
      {{ tituloDocumentoConvenio }}
    </h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="k-form" [formGroup]="formSubirConvenio">
      <div class="row">
        <div class="col-sm-12 col-md-12">
          <kendo-formfield orientation="horizontal">
            <label [for]="file" class="k-label">
              <span
                >Seleccione Archivo<span class="text-danger fw-bold"
                  >*</span
                ></span
              >
            </label>
            <kendo-fileselect
              #file
              [restrictions]="myRestrictions"
              [multiple]="false"
              formControlName="files"
            >
            </kendo-fileselect>
            <kendo-formerror> Seleccione un Archivo </kendo-formerror>
          </kendo-formfield>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-sm-12 col-md-12">
          <kendo-formfield orientation="horizontal">
            <label [for]="comentarioSubida" class="k-label">
              <span>Comentario Subida</span>
            </label>
            <kendo-textarea
              #comentarioSubida
              placeholder="Enter your name"
              formControlName="comentarioSubida"
              [rows]="4"
            >
            </kendo-textarea>
          </kendo-formfield>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button
        (click)="subirDocumentoConvenioOportunidad()"
        kendoButton
        themeColor="success"
        [disabled]="disabledBtnSubirDocumento"
      >
        Subir Documento
      </button>
      <button
        themeColor="error"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
  <loading [loading]="disabledBtnSubirDocumento"></loading>
</ng-template>
<!-- #endregion Modal Subir Convenio Capacitacion-->
