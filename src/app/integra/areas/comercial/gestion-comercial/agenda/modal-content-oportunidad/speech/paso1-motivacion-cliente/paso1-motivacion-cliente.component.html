¿Cuales son los motivos por los que te interesa capacitarte en
{{ programaGeneral }}?
<div class="row mt-3">
  <div class="col-12 p-2 grid-speech" id="gridFactoresMotivacion">
    <kendo-grid
      [data]="dataGridFactoresMotivacion$ | async"
      [loading]="gridFactoresMotivacion.loading"
      scrollable="none"
    >
      <kendo-grid-column
        field="idMotivacion"
        title="Id"
        [hidden]="true"
      ></kendo-grid-column>
      <kendo-grid-column
        field="nombreMotivacion"
        title="Motivacion"
      ></kendo-grid-column>
      <kendo-grid-column field="respuesta" title="Seleccionar" [width]="150">
        <ng-template kendoGridCellTemplate let-dataItem let-rowIndex="rowIndex">
          <div class="w-100 d-flex justify-content-center check-speech">
            <input
              type="checkbox"
              size="large"
              rounded="small"
              kendoCheckBox
              [(ngModel)]="dataItem.checked"
              (change)="checkRespuesta(dataItem)"
              #notification
            />
          </div>
        </ng-template>
      </kendo-grid-column>

      <ng-template
        kendoGridDetailTemplate
        let-dataItem
        [kendoGridDetailTemplateShowIf]="
          gridFactoresMotivacion.kendoGridDetailTemplateShowIf
        "
      >
        <kendo-grid
          [data]="dataItem.argumentos"
          scrollable="none"
          kendoGridFocusable
        >
          <kendo-grid-column
            field="idProgramaGeneralMotivacion"
            title="Nro."
            [width]="250"
          >
            <ng-template
              kendoGridCellTemplate
              let-dataItem
              let-rowIndex="rowIndex"
            >
              <div class="w-100">Argumento {{ rowIndex + 1 }}</div>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column field="nombre" title="Argumentos">
            <ng-template
              kendoGridCellTemplate
              let-dataItem
              let-rowIndex="rowIndex"
            >
              <div class="w-100" [innerHTML]="dataItem.nombre"></div>
            </ng-template>
          </kendo-grid-column>
        </kendo-grid>
      </ng-template>
    </kendo-grid>
  </div>
</div>
