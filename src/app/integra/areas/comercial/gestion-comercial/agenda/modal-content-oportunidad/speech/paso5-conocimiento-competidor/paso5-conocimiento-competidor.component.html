Esta evaluando programas similares ofrecido por los competidores:
<div class="row text-center mt-3">
  <div class="col text-end px-3">
    <label>
      <input
        type="checkbox"
        class="custom-size border border-dark"
        [ngModel]="checkCompetidorSI$ | async"
        (ngModelChange)="checkCompetidorSI$.next($event)"
        kendoCheckBox
      />
      <br>
      Si
    </label>
  </div>
  <div class="col text-start px-3">
    <label>
      <input
        type="checkbox"
        class="custom-size border border-dark"
        [ngModel]="checkCompetidorNO$ | async"
        (ngModelChange)="checkCompetidorNO$.next($event)"
        kendoCheckBox
      /><br />
      No
    </label>
  </div>
</div>
<div class="row mt-3 k-form">
  <kendo-formfield>
    <kendo-label [for]="empresaCompetencia" text="Seleccionar competidores: ">
    </kendo-label>
    <kendo-multiselect
      #empresaCompetencia
      [data]="sourceCompetidores"
      placeholder="Seleccione Empresas Competidoras"
      textField="nombre"
      valueField="id"
      [virtual]="virtual"
      [ngModel]="competidor$ | async"
      (ngModelChange)="competidor$.next($event)"
      [valuePrimitive]="true"
      [kendoDropDownFilter]="filterSettings"
    >
    </kendo-multiselect>
  </kendo-formfield>
</div>
