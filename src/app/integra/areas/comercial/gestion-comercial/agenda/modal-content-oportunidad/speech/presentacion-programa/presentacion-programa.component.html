<div class="content p-3 ps-5 pe-5">
    <div role="tabpanel" class="card" id="tabInformacionv5">
      <div class="card-header" style="background: #5f75bd">
        <div class="row">
          <div class="k-form k-form-horizontal col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                [for]="programaGeneral"
                text="Seleccione Programa"
                style="color:white;font-size: 16px;"
              >
              </kendo-label>
              <kendo-combobox
                #programaGeneral
                [data]="dataProgramaGeneralSpeech"
                [allowCustom]="true"
                [valuePrimitive]="true"
                textField="nombre"
                valueField="id"
                placeholder="<Programa General>"
                [(ngModel)]="idPGeneral"
                [filterable]="true"
                (valueChange)="changeProgramaGeneral($event)"
                [kendoDropDownFilter]="filterSettings"
                >
              </kendo-combobox>
            </kendo-formfield>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="example" *ngIf="loadingPrograma">
          <div class="wrap"></div>
          <div class="example-item">
            <div class="k-block">
              <kendo-loader
                type="converging-spinner"
                themeColor="primary"
                size="medium"
              >
              </kendo-loader>
            </div>
            <div class="k-loading-panel-text fs-5 text-primary" style="text-align: center;">
              Cargando programa...
            </div>
          </div>
        </div>
        <div
          [innerHTML]="informacionProgramaSpeech"
        ></div>
      </div>
    </div>
  </div>
