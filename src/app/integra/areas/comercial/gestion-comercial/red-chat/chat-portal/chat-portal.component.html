<div class="row p-2 mb-2">
    <div class="col-md-6 p-2">
      <div class="w-100 bg-warning text-white text-center py-2 fw-bold mb-2">
        <fa-icon [icon]="['fas', 'comments']" [size]="'xl'"></fa-icon>
        <span class="px-1">CHATS</span>
      </div>
      <div class="w-100 py-2 p-3" id="SegundoTab">
        <mat-tab-group>
            <mat-tab>
              <ng-template mat-tab-label>
                <fa-icon
                  [icon]="['fas', 'paper-plane']"
                  [size]="'xl'"
                ></fa-icon>
                <span class="px-2">ONLINE</span>
              </ng-template>
              <div class="container-grid text-center p-2">
                  <kendo-grid>
                      <kendo-grid-column
                          field="country"
                          title="NOMBRE INTERESADO"
                          [headerClass]="'justify-content-center fw-bold'"
                      ></kendo-grid-column>
                      <kendo-grid-column
                          field="country"
                          title="ULTIMO MENSAJE ENVIADO"
                          [headerClass]="'justify-content-center fw-bold'"
                      ></kendo-grid-column>
                      <kendo-grid-column
                          field="country"
                          title="NRO. MENSAJES SIN LEER"
                          [headerClass]="'justify-content-center fw-bold'"
                      ></kendo-grid-column>
                  </kendo-grid>
              </div>
            </mat-tab>
            <mat-tab>
              <ng-template mat-tab-label>
                <fa-icon
                  [icon]="['far', 'hard-drive']"
                  [size]="'xl'"
                ></fa-icon>
                <span class="px-2">HISTORICOS</span>
              </ng-template>
              <div class="container-grid text-center p-2">
                <kendo-grid>
                    <kendo-grid-column
                        field="country"
                        title="NOMBRE INTERESADO"
                        [headerClass]="'justify-content-center fw-bold'"
                    ></kendo-grid-column>
                    <kendo-grid-column
                        field="country"
                        title="ULTIMO MENSAJE ENVIADO"
                        [headerClass]="'justify-content-center fw-bold'"
                    ></kendo-grid-column>
                    <kendo-grid-column
                        field="country"
                        title="NRO. MENSAJES SIN LEER"
                        [headerClass]="'justify-content-center fw-bold'"
                    ></kendo-grid-column>
                </kendo-grid>
            </div>
            </mat-tab>
          </mat-tab-group>
      </div>
    </div>
    <div class="col-md-6 p-2">
        <div class="w-100 bg-warning text-white text-center py-2 fw-bold">
            <fa-icon [icon]="['fas', 'circle-user']" [size]="'xl'"></fa-icon>
            <span class="px-1 fw-bold">NOMBRES Y APELLIDOS</span>
      </div>
      <div class="content">
        <div class="block-header bg-warning fw-bold">
          <div class="py-1 text-white">
            <div class="flex-row">
                <div class="px-1">
                    <span class="d-flex py-2 px-4">
                        <fa-icon
                            [icon]="['fas', 'display']"
                            [size]="'xl'"
                        ></fa-icon>
                        <span class="px-2">Nombre del Programa:</span>
                    </span>
                    <span class="d-flex py-2 px-4">
                        <fa-icon
                            [icon]="['fas', 'link']"
                            [size]="'xl'"
                        ></fa-icon>
                        <span class="px-2">Url del Programa:</span>
                    </span>
                </div>
            </div>
          </div>
        </div>

        <div
          class="p-2 px-3 block-message"
          style="
            background-color: #e5ddd5;
            overflow-y: scroll;
            background-image: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/1089577/background.png);
            height: 500px;
          "
        >
          <ng-container *ngFor="let mensajes of historialMensajeRecibidosChat">
            <ng-container *ngIf="mensajes.tipo == 2">
              <div class="row">
                <div class="text-start">
                  <div class="d-flex flex-row">
                    <div class="text-end pt-1">
                      <div
                        class="rounded-circle px-2 pt-1 m-1"
                        style="
                          width: 30px;
                          height: 30px;
                          background-color: #d3d6db;
                        "
                      >
                        <fa-icon
                          [icon]="['fas', 'user']"
                          class="fa-lg text-white"
                        ></fa-icon>
                      </div>
                    </div>
                    <div
                      class="w-auto p-2 my-1 rounded"
                      style="max-width: 75%; background-color: #f1f3f4"
                    >
                      <label [innerHTML]="mensajes.mensaje"></label>
                    </div>
                  </div>
                </div>
              </div>
            </ng-container>
            <ng-container *ngIf="mensajes.tipo == 1">
              <div class="row">
                <div class="text-end">
                  <label
                    class="w-auto p-2 m-1 rounded"
                    style="
                      max-width: 75%;
                      background-color: #d9fdd3;
                      text-align: left !important;
                    "
                    [innerHTML]="mensajes.mensaje"
                  ></label>
                </div>
              </div>
            </ng-container>
          </ng-container>
        </div>
      </div>
    </div>
  </div>
  <div class="row py-2 px-4">
    <div class="col-md-12 py-2 p-2 container-table">
        <div class="title">
            OPORTUNIDADES ANTERIORES
        </div>
        <div class="body">
            
        </div>
    </div>
  </div>
