<div class="row p-2">
    <div class="col-md-6 p-2">
      <div class="w-100 bg-success text-white text-center py-2 fw-bold mb-2">
        <fa-icon [icon]="['fas', 'comments']" [size]="'xl'"></fa-icon>
        <span class="px-1">CHATS</span>
      </div>
      <div class="w-100 py-2 p-3" id="SegundoTab">
        <mat-tab-group>
            <mat-tab>
              <ng-template mat-tab-label>
                <fa-icon
                  [icon]="['fas', 'paper-plane']"
                  [size]="'xl'"
                ></fa-icon>
                <span class="px-2">ENVIADOS</span>
              </ng-template>
              <div class="container-grid text-center p-2">
                <kendo-grid
                  [kendoGridBinding]="gridMensajesEnviados.data"
                  [pageSize]="gridMensajesEnviados.pageSize"
                  [pageable]="gridMensajesEnviados.pageable"
                  [sortable]="gridMensajesEnviados.sortable"
                  [loading]="gridMensajesEnviados.loading"
                  [selectable]="gridMensajesEnviados.selectable"
                  (selectionChange)="cargarMensajesChat($event)"
                >
                  <ng-template
                    kendoPagerTemplate
                    let-totalPages="totalPages"
                    let-currentPage="currentPage"
                  >
                    <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                    <kendo-pager-numeric-buttons
                      [buttonCount]="5"
                    ></kendo-pager-numeric-buttons>
                    <kendo-pager-next-buttons></kendo-pager-next-buttons>
                    <kendo-pager-info></kendo-pager-info>
                    <kendo-pager-page-sizes
                      [pageSizes]="[8,16]"
                    ></kendo-pager-page-sizes>
                  </ng-template>
                    <kendo-grid-column
                        field="numero"
                        title="NUMERO"
                        [width]="160"
                        [headerClass]="'justify-content-center fw-bold'"
                    >
                      <ng-template kendoGridCellTemplate let-dataItem>
                        <div class="text-center">
                          <span>{{ dataItem.numero }}</span>
                        </div>
                      </ng-template>
                    </kendo-grid-column>
                    <kendo-grid-column
                        field="fechaCreacion"
                        title="FECHA"
                        [width]="160"
                        [headerClass]="'justify-content-center fw-bold'"
                    >
                      <ng-template kendoGridCellTemplate let-dataItem>
                        <div class="text-center">
                          <span>{{ dataItem.fechaCreacion | date : "yyyy-MM-dd HH:mm"}}</span>
                        </div>
                      </ng-template>
                    </kendo-grid-column>
                    <kendo-grid-column
                        field="mensaje"
                        title="ULTIMO MENSAJE"
                        [headerClass]="'justify-content-center fw-bold'"
                    >
                      <ng-template kendoGridCellTemplate let-dataItem>
                        <span [innerHTML]="dataItem.mensaje"></span>
                      </ng-template>
                    </kendo-grid-column>
                </kendo-grid>
              </div>
            </mat-tab>
            <mat-tab>
              <ng-template mat-tab-label>
                <fa-icon
                  [icon]="['far', 'hard-drive']"
                  [size]="'xl'"
                ></fa-icon>
                <span class="px-2">RECIBIDOS</span>
              </ng-template>
              <div class="container-grid text-center p-2">
                <kendo-grid
                  [kendoGridBinding]="gridMensajesRecibidos.data"
                  [pageSize]="gridMensajesRecibidos.pageSize"
                  [pageable]="gridMensajesRecibidos.pageable"
                  [sortable]="gridMensajesRecibidos.sortable"
                  [loading]="gridMensajesRecibidos.loading"
                  [selectable]="gridMensajesRecibidos.selectable"
                  (selectionChange)="cargarMensajesChat($event)"
                >
                <ng-template
                  kendoPagerTemplate
                  let-totalPages="totalPages"
                  let-currentPage="currentPage"
                >
                  <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                  <kendo-pager-numeric-buttons
                    [buttonCount]="5"
                  ></kendo-pager-numeric-buttons>
                  <kendo-pager-next-buttons></kendo-pager-next-buttons>
                  <kendo-pager-info></kendo-pager-info>
                  <kendo-pager-page-sizes
                    [pageSizes]="[8,16]"
                  ></kendo-pager-page-sizes>
                </ng-template>
                  <kendo-grid-column
                      field="numero"
                      title="NUMERO"
                      [width]="160"
                      [headerClass]="'justify-content-center fw-bold'"
                  >
                    <ng-template kendoGridCellTemplate let-dataItem>
                      <div class="text-center">
                        <span>{{ dataItem.numero }}</span>
                      </div>
                    </ng-template>
                  </kendo-grid-column>
                  <kendo-grid-column
                      field="fechaCreacion"
                      title="FECHA"
                      [width]="160"
                      [headerClass]="'justify-content-center fw-bold'"
                  >
                    <ng-template kendoGridCellTemplate let-dataItem>
                      <div class="text-center">
                        <span>{{ dataItem.fechaCreacion | date : "yyyy-MM-dd HH:mm"}}</span>
                      </div>
                    </ng-template>
                  </kendo-grid-column>
                  <kendo-grid-column
                      field="mensaje"
                      title="ULTIMO MENSAJE"
                      [headerClass]="'justify-content-center fw-bold'"
                  >
                    <ng-template kendoGridCellTemplate let-dataItem>
                      <span [innerHTML]="dataItem.mensaje"></span>
                    </ng-template>
                  </kendo-grid-column>
                </kendo-grid>
                </div>
            </mat-tab>
          </mat-tab-group>
      </div>
    </div>
    <div class="col-md-6 p-2">
      <div class="content bg-danger">
        <div class="block-header bg-success fw-bold">
          <div class="p-2 px-3 text-white text-center">
            <div class="flex-row">
                <fa-icon [icon]="['fas', 'circle-user']" [size]="'xl'"></fa-icon>
                <span class="px-1 fw-bold">{{ nombreYapellido }}</span>
            </div>
          </div>
        </div>
        <loading [loading]="loaderHistorialMensajes"></loading>
        <div
          class="p-2 px-3 block-message"
          style="
            background-color: #e5ddd5;
            overflow-y: scroll;
            background-image: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/1089577/background.png);
            height: 500px;
          "
        >
          <ng-container *ngFor="let mensajes of historialMensajeRecibidosChat">
            <ng-container *ngIf="mensajes.Tipo == 2">
              <div class="row">
                <div class="text-start">
                  <div class="d-flex flex-row">
                    <div class="text-end pt-1">
                      <div
                        class="rounded-circle px-2 pt-1 m-1"
                        style="
                          width: 30px;
                          height: 30px;
                          background-color: #d3d6db;
                        "
                      >
                        <fa-icon
                          [icon]="['fas', 'user']"
                          class="fa-lg text-white"
                        ></fa-icon>
                      </div>
                    </div>
                    <label
                      class="w-auto p-2 my-1 rounded images"
                      style="max-width: 75%; background-color: #f1f3f4"
                    >
                      <span class="px-1" [innerHTML]="mensajes.mensaje"></span>
                      <span class="horaCliente">{{ mensajes.fechaCreacion | date : "HH:mm"}}</span>
                    </label>
                  </div>
                </div>
              </div>
            </ng-container>
            <ng-container *ngIf="mensajes.Tipo == 1">
              <div class="row">
                <div class="text-end">
                  <label
                    class="w-auto p-2 m-1 rounded images"
                    style="
                      max-width: 75%;
                      background-color: #d9fdd3;
                      text-align: left !important;
                    ">
                    <span class="px-1 fw-bold" style="font-size: small;">{{ mensajes.nombrePersonal }}</span>
                    <span class="d-flex px-1" [innerHTML]="mensajes.mensaje"></span>
                    <span class="flex-row-reverse px-2 horaAsesor">{{ mensajes.fechaCreacion | date : "HH:mm"}}</span>
                </label>
                </div>
              </div>
            </ng-container>
          </ng-container>
        </div>
      </div>
    </div>
  </div>
