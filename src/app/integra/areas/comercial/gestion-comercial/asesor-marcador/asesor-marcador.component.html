<div class="content">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h2 class="text-white mb-2">Asesor Marcador</h2>
        </div>
        <div class="card-body p-4" id="grillaAgendaTab">
          <div class="col-12">
            <kendo-grid
              #kgridCategoriaPregunta
              [kendoGridBinding]="gridAsesorMarcado.data"
              [loading]="gridAsesorMarcado.loading"
              [resizable]="true"
              filterable="menu"
              [sortable]="true"
              [pageSize]="10"
              [pageable]="{ pageSizes: [5, 10, 20] }"
            >
              <kendo-grid-column
                field="idPersonal"
                title="Personal"
                [width]="300"
                headerClass="justify-content-center"
              >
              <ng-template kendoGridCellTemplate let-dataItem>
                {{ obtenerNombrePorId(dataItem.idPersonal) }}
              </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                [style]="{
                  'text-align': 'center'
                }"
                headerClass="justify-content-center"
                field="marcadorActivo"
                title="Estado"
                [width]="300"
                [filterable]="false"
                
              >
                <ng-template kendoGridCellTemplate let-dataItem>
                  <kendo-switch
                    [checked]="dataItem.marcadorActivo"
                    (valueChange)="toggleEstado(dataItem, $event)"
                    onLabel="Activo"
                    offLabel="Inactivo"
                  >
                  </kendo-switch>
                </ng-template>
              </kendo-grid-column>

              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
              <kendo-grid-command-column
                title="Opciones"
                [width]="150"
                headerClass="justify-content-center"
              >
                <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  <div class="w-100 d-flex justify-content-center">
                    <button
                      kendoButton
                      themeColor="error"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Eliminar"
                      (click)="eliminar(dataItem.id)"
                    >
                      <span class="k-icon k-i-x k-icon-20"></span>
                    </button>
                  </div>
                </ng-template>
              </kendo-grid-command-column>
              <ng-template kendoPagerTemplate>
                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                <kendo-pager-numeric-buttons
                  [buttonCount]="10"
                ></kendo-pager-numeric-buttons>
                <kendo-pager-next-buttons></kendo-pager-next-buttons>
                <kendo-pager-input></kendo-pager-input>
                <kendo-pager-info></kendo-pager-info>
                <kendo-pager-page-sizes
                  [pageSizes]="pageSizes"
                ></kendo-pager-page-sizes>
                <div class="w-100 text-end">
                  <button
                    kendoButton
                    icon="reload"
                    fillMode="flat"
                    themeColor="secondary"
                    (click)="obtener()"
                  ></button>
                </div>
              </ng-template>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
