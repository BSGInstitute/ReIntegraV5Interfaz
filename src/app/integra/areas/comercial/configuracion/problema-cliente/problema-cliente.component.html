<ng-template #modalProblemaCliente let-modal>
  <div class="modal-header">
    <h3 class="modal-title" id="modal-basic-title">Problema del Cliente</h3>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="row">
      <form [formGroup]="formProblemaCliente">
        <div class="row">
          <kendo-formfield orientation="horizontal" class="col">
            <label [for]="text" class="k-label">
              <span>Nombre <strong class="text-danger">*</strong></span>
            </label>
            <kendo-textbox
              #text
              class="d-flex"
              size="small"
              [clearButton]="true"
              formControlName="nombreProblema"
            >
            </kendo-textbox>
          </kendo-formfield>
        </div>
        <div class="row">
          <kendo-label text="Select items">
            <kendo-multiselect
              formControlName="modalidades"
              [data]="listaModalidades"
              textField="nombre"
              valueField="idModalidadCurso"
            ></kendo-multiselect>
          </kendo-label>
        </div>
      </form>
    </div>
  </div>
  <div class="modal-footer">
    <button
      *ngIf="isNew"
      class="btn btn-info"
      type="button"
      (click)="guardarProblemaCliente()"
    >
      Nuevo
    </button>
    <button
      *ngIf="!isNew"
      class="btn btn-info"
      type="button"
      (click)="actulizarProblemaCliente()"
    >
      Actualizar
    </button>
    <button
      type="button"
      class="btn btn-danger"
      (click)="modal.dismiss('Cross click')"
    >
      Cerrar
    </button>
  </div>
</ng-template>

<div class="">
  <div class="row">
    <div class="col-1fa-rotate-270">
      <div class="card">
        <div class="card-header bg-color-material">
          <h5 class="text-white">(M) Problemas de clientes</h5>
        </div>
        <div class="card-body p-4">
          <div class="row">
            <div class="col text-center" style="text-align: center">
              <ng-template
                #cellTemplateCatAsesor
                let-dataItem="dataItem"
                let-field="field"
                let-itemValue="itemValue"
              >
                <ng-container
                  *ngIf="field == 'modalidades'; else templateDefault"
                >
                  {{ obtenerCadenaModalidades(itemValue) }}
                </ng-container>
                <ng-template #templateDefault>
                  {{ itemValue }}
                </ng-template>
              </ng-template>

              <k-grid
                [gridData]="listaProblemaArgumentoModalidad"
                [loader]="loaderGrid"
                [gridState]="gridProblemaCliente.gridState"
                [kendoGrid]="gridProblemaCliente"
                [cellTemplateRef]="cellTemplateCatAsesor"
                (OnGridEvents)="gridEventsResponse($event)"
              >
              </k-grid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
