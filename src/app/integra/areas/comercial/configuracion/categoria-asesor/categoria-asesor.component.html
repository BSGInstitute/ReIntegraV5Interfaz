<ng-template #modalDetalleCategoriaAsesor let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title ">
      Registro de Categorias de Asesores
    </h3>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body p-3">
    <form [formGroup]="formCategoriaAsesor">
      <div class="row">
        <div class="col-sm-12 col-md-12 k-form-horizontal mb-3">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="nombreCategoriaAsesor"
              text="Nombre de categoría de asesor"
              [style.width.px]="210">
              <span class="text-danger fw-bold">&nbsp;*</span>
            </kendo-label>
            <kendo-textbox
              #nombreCategoriaAsesor
              formControlName="nombreCategoriaAsesor"
              placeholder="Ingrese nombre de categoria"
              [clearButton]="true"
              required
              inputValidSpaceDir>
            </kendo-textbox>
            <kendo-formerror>{{ getErrorMessage("nombreCategoriaAsesor") }}</kendo-formerror>
          </kendo-formfield>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-12 col-md-12 k-form-horizontal mb-3">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="montoVenta"
              text="Monto de ventas"
              [style.width.px]="210"
              >
              <span class="text-danger fw-bold">&nbsp;*</span>
            </kendo-label>
            <kendo-numerictextbox
              #montoVenta
              formControlName="montoVenta"
              placeholder="Monto de ventas"
              [step]="0.01"
              [value]="0"
              [min]="1"
              [autoCorrect]="true"
              required>
            </kendo-numerictextbox>
            <kendo-formerror>El monto es requerido</kendo-formerror>
          </kendo-formfield>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-12 col-md-12 k-form-horizontal mb-3">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="comboMonedaMontoVenta"
              text="Moneda de monto de ventas"
              [style.width.px]="210"
              >
              <span class="text-danger fw-bold">&nbsp;*</span>
            </kendo-label>
            <kendo-dropdownlist
              #comboMonedaMontoVenta
              formControlName="monedaMontoVenta"
              [data]="monedas"
              [defaultItem]="{ codigo: 'Seleccione una Moneda...', id: null}"
              textField="codigo"
              valueField="id"
              [valuePrimitive]="true"
              required>
            </kendo-dropdownlist>
            <kendo-formerror>La moneda es requerida</kendo-formerror>
          </kendo-formfield>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-12 col-md-12 k-form-horizontal mb-3">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="comboUnidad"
              text="Visualización de monto de ventas"
              [style.width.px]="210">
              <span class="text-danger fw-bold">*</span>
            </kendo-label>
            <kendo-dropdownlist
              #comboUnidad
              formControlName="visualMontoVenta"
              [data]="unidades"
              [defaultItem]="{ nombre: 'Seleccione una Unidad...', id: null}"
              textField="nombre"
              valueField="id"
              [valuePrimitive]="true"
              required>
            </kendo-dropdownlist>
            <kendo-formerror>La moneda es requerida</kendo-formerror>
          </kendo-formfield>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-12 col-md-12 k-form-horizontal mb-3">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="montoPremios"
              text="Monto de Premios"
              [style.width.px]="210">
              <span class="text-danger fw-bold">&nbsp;*</span>
            </kendo-label>
            <kendo-numerictextbox
              #montoPremios
              formControlName="montoPremios"
              placeholder="Monto de premios"
              [step]="0.01"
              [value]="0"
              [min]="1"
              [autoCorrect]="true"
              required>
            </kendo-numerictextbox>
            <kendo-formerror>El monto es requerido</kendo-formerror>
          </kendo-formfield>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-12 col-md-12 k-form-horizontal mb-3">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="comboMonedaPremio"
              text="Moneda de monto de premios"
              [style.width.px]="210">
              <span class="text-danger fw-bold">&nbsp;*</span>
            </kendo-label>
            <kendo-dropdownlist
              #comboMonedaPremio
              formControlName="monedaMontoPremios"
              [data]="monedas"
              [defaultItem]="{ codigo: 'Seleccione una Moneda...', id: null}"
              textField="codigo"
              valueField="id"
              [valuePrimitive]="true"
              required>
            </kendo-dropdownlist>
            <kendo-formerror>La moneda es requerida</kendo-formerror>
          </kendo-formfield>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-12 col-md-12 k-form-horizontal mb-3">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="checkVisualizarMonedaLocal"
              text="Visualizar monto de premio según moneda local"
              [style.width.px]="210">
            </kendo-label>
            <input
              #checkVisualizarMonedaLocal
              formControlName="visualMontoPremiosMoneLocal"
              type="checkbox"
              kendoCheckBox
              class="shadow"/>
          </kendo-formfield>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button class="btn btn-info" type="button" (click)="saveData()">
      {{optionButton}}
    </button>
    <button type="button" class="btn btn-danger" (click)="modal.dismiss('Cross click')">
      Cancelar
    </button>
  </div>
</ng-template>

<div class="row">
  <div class="col-1fa-rotate-270">
    <div class="card">
      <div class="card-header bg-color-material pb-0">
        <h3 class="text-white">(M) Categoria Asesores</h3>
      </div>
      <div class="card-body p-4 mb-2">
        <div class="row">
          <div class="col text-center" style="text-align: center">
            <k-grid
              [gridData]="listaCategoriaAsesor"
              [formGroup]="formCategoriaAsesor"
              [loader]="loader"
              [gridState]="gridCategoriaAsesor.gridState"
              [kendoGrid]="gridCategoriaAsesor"
              (OnGridEvents)="gridEventsResponse($event)"
            >
            </k-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
