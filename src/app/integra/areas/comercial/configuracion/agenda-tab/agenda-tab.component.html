<div class="contenedor">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Maestro Agenda Tab</h3>
        </div>
        <div class="card-body p-4" id="grillaAgendaTab">
          <div class="col-12">
            <kendo-grid
              [data]="gridAgendaTab.view"
              [loading]="gridAgendaTab.loading"
              (edit)="gridAgendaTab.editHandler($event)"
              (cancel)="gridAgendaTab.cancelHandler($event)"
              (save)="gridAgendaTab.saveHandler($event)"
              (remove)="gridAgendaTab.removeHandler($event)"
              (add)="gridAgendaTab.addHandler($event)"
              (dataStateChange)="gridAgendaTab.onStateChange($event)"
              [resizable]="gridAgendaTab.resizable"
              [pageable]="gridAgendaTab.pageable"
              [filterable]="gridAgendaTab.filterable"
              [pageSize]="gridAgendaTab.gridState.take"
              [skip]="gridAgendaTab?.gridState.skip"
              [sort]="gridAgendaTab?.gridState.sort"
            >
              <ng-template kendoGridToolbarTemplate>
                <button
                  kendoButton
                  icon="reload"
                  fillMode="flat"
                  themeColor="secondary"
                  (click)="obtenerListaAgendaTab()"
                ></button>
                <kendo-grid-spacer></kendo-grid-spacer>
                <button kendoGridAddCommand themeColor="primary" icon="plus">
                  Agregar
                </button>
              </ng-template>
              <kendo-grid-column
                field="nombre"
                title="Nombre"
                [headerClass]="'header-grid-integra'"
              >
              </kendo-grid-column>
              <kendo-grid-column
                field="codigoAreaTrabajo"
                title="Codigo de Area"
                headerClass="header-grid-integra"
              >
                <ng-template kendoGridEditTemplate let-formGroup="formGroup">
                  <kendo-dropdownlist
                    [formControl]="formGroup.get('codigoAreaTrabajo')"
                    class="d-flex"
                    size="medium"
                    [data]="listaAreas"
                    textField="nombre"
                    valueField="codigo"
                    [valuePrimitive]="true"
                  >
                  </kendo-dropdownlist>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-command-column title="Opciones" [width]="150" [headerClass]="'header-grid-integra'">
                <ng-template kendoGridCellTemplate let-isNew="isNew">
                  <div class="w-100 d-flex justify-content-center">
                    <button
                      kendoGridEditCommand
                      themeColor="warning"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Editar"
                    >
                      <span class="k-icon k-i-edit k-icon-20"></span>
                    </button>
                    <button
                      kendoGridRemoveCommand
                      themeColor="error"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Eliminar"
                    >
                      <span class="k-icon k-i-delete k-icon-20"></span>
                      <!-- Eliminar -->
                    </button>
                    <button
                      kendoGridSaveCommand
                      themeColor="primary"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      [disabled]="gridAgendaTab.formGroup?.invalid"
                      container="body"
                      placement="top"
                      ngbTooltip="Guardar"
                    >
                      <span class="k-icon k-i-save k-icon-20"></span>
                      <!-- {{ gridAgendaTab.isNew ? "Guardar" : "Actualizar" }} -->
                    </button>
                    <button
                      kendoGridCancelCommand
                      themeColor="secondary"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Cancelar"
                    >
                      <span class="k-icon k-i-cancel k-icon-20"></span>
                      <!-- {{ gridAgendaTab.isNew ? "Descartar Cambios" : "Cancelar" }} -->
                    </button>
                  </div>
                </ng-template>
              </kendo-grid-command-column>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
