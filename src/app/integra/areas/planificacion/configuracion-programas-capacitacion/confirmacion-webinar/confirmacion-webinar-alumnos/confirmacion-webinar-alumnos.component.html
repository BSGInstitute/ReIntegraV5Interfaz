<kendo-grid
  [kendoGridBinding]="gridAlumnos.data"
  [loading]="gridAlumnos.loading"
  [selectable]="true"
  [sortable]="true"
  [resizable]="true"
  [pageable]="{
    buttonCount: 5,
    info: true,
    type: 'numeric',
    pageSizes: true,
    previousNext: true,
    position: 'bottom'
  }"
  [skip]="0"
  [pageSize]="10"
  filterable="menu"
>
  <ng-template
    kendoPagerTemplate
    let-totalPages="totalPages"
    let-currentPage="currentPage"
  >
    <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
    <kendo-pager-numeric-buttons
      [buttonCount]="5"
    ></kendo-pager-numeric-buttons>
    <kendo-pager-next-buttons></kendo-pager-next-buttons>
    <kendo-pager-input></kendo-pager-input>
    <kendo-pager-info></kendo-pager-info>
    <kendo-pager-page-sizes
      [pageSizes]="cantidadItems"
    ></kendo-pager-page-sizes>
  </ng-template>

  <kendo-grid-column
    kendoGridFilterMenuTemplate
    field="codigoMatricula"
    title="Codigo Matricula"
    [headerStyle]="{ color: '#999999' }"
    [width]="80"
  >
    <ng-template
      kendoGridFilterMenuTemplate
      let-filter
      let-column="column"
      let-filterService="filterService"
    >
      <kendo-grid-string-filter-menu
        [column]="column"
        [filter]="filter"
        [filterService]="filterService"
        [extra]="false"
        operator="contains"
      >
        <kendo-filter-contains-operator
          text="Contiene"
        ></kendo-filter-contains-operator>
      </kendo-grid-string-filter-menu>
    </ng-template>
  </kendo-grid-column>

  <kendo-grid-column
