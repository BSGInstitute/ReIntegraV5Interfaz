<kendo-dialog
  *ngIf="visible"
  (close)="cerrar(false)"
  [title]="esNuevo ? 'Nuevo Problema' : 'Editar Problema'"
  [minWidth]="'350px'"
  [width]="'90vw'"
  [maxWidth]="'1000px'"
  [height]="'auto'"
  [maxHeight]="'90vh'"
  [draggable]="false"
  [resizable]="true"
  [keepCentered]="false"
>
  <div>
    <div class="modal-body" style="overflow-y: auto; max-height: 70vh; padding: 1rem;">
      <form class="k-form k-form-horizontal" [formGroup]="formProblema">

        <!-- ====== PROBLEMA ====== -->
        <kendo-formfield orientation="horizontal">
          <label class="k-label" for="ddlProblema">Nombre del Problema:</label>
          <kendo-dropdownlist
            id="ddlProblema"
            formControlName="problemaId"
            [data]="opcProblema"
            textField="nombre"
            valueField="id"
            [valuePrimitive]="true"
            [filterable]="true"
            [defaultItem]="{ id: null, nombre: 'Seleccionar…' }"
            style="width:100%"
          ></kendo-dropdownlist>
          <kendo-formerror *ngIf="formProblema.get('problemaId')?.invalid && formProblema.get('problemaId')?.touched">
            Selecciona un nombre de problema.
          </kendo-formerror>
        </kendo-formfield>

        <!-- ====== DETALLE ====== -->
        <kendo-formfield orientation="horizontal">
          <label class="k-label" for="ddlDetalle">Etiqueta Problema:</label>
          <kendo-dropdownlist
            id="ddlDetalle"
            formControlName="detalleId"
            [data]="detalleOptions"
            textField="nombre"
            valueField="id"
            [valuePrimitive]="true"
            [filterable]="true"
            [defaultItem]="{ id: null, nombre: 'Seleccionar…' }"
            style="width:100%"
          ></kendo-dropdownlist>
        </kendo-formfield>

        <!-- ====== DETALLE - Título (vinculado al Detalle) ====== -->
        <kendo-formfield orientation="horizontal">
          <label class="k-label" for="ddlDetalleTitulo">Nombre del Caso:</label>
          <kendo-dropdownlist
            id="ddlDetalleTitulo"
            formControlName="detalleTituloId"
            [data]="detalleTituloOptions"
            textField="titulo"
            valueField="id"
            [valuePrimitive]="true"
            [filterable]="true"
            [defaultItem]="{ id: null, titulo: 'Seleccionar…' }"
            style="width:100%"
          ></kendo-dropdownlist>
        </kendo-formfield>

        <!-- ====== SOLUCIÓN (agrupado) ====== -->

        <!-- Descripción -->
        <kendo-formfield orientation="horizontal">
          <label class="k-label" for="ddlSolDesc">Solución:</label>
          <kendo-dropdownlist
            id="ddlSolDesc"
            formControlName="solucionDescripcionId"
            [data]="descOptions"
            textField="descripcion"
            valueField="id"
            [valuePrimitive]="true"
            [filterable]="true"
            [defaultItem]="{ id: null, descripcion: 'Seleccionar…' }"
            style="width:100%"
          ></kendo-dropdownlist>
        </kendo-formfield>

        <!-- Título -->
        <kendo-formfield orientation="horizontal">
          <label class="k-label" for="ddlSolTitulo">Título:</label>
          <kendo-dropdownlist
            id="ddlSolTitulo"
            formControlName="solucionTituloId"
            [data]="opcSolucionTituloFiltered"
            textField="titulo"
            valueField="id"
            [valuePrimitive]="true"
            [filterable]="true"
            [defaultItem]="{ id: null, titulo: 'Seleccionar…' }"
            style="width:100%"
          ></kendo-dropdownlist>
        </kendo-formfield>

        <!-- SubTítulo -->
        <kendo-formfield orientation="horizontal">
          <label class="k-label" for="ddlSolSubTitulo">Descripcion:</label>
          <kendo-dropdownlist
            id="ddlSolSubTitulo"
            formControlName="solucionSubTituloId"
            [data]="opcSolucionSubTituloFiltered"
            textField="subTitulo"
            valueField="id"
            [valuePrimitive]="true"
            [filterable]="true"
            [defaultItem]="{ id: null, subTitulo: 'Seleccionar…' }"
            style="width:100%"
          ></kendo-dropdownlist>
        </kendo-formfield>

        <!-- ====== PANEL DE SUBSOLUCIONES ====== -->
        <div *ngIf="mostrarCuadro" class="mt-3" style="
            width: 100%;
            display: grid;
            grid-template-columns: 2fr 120px 2fr;
            gap: 10px;
            align-items: stretch;
            max-height: 520px;
          ">

          <!-- Seleccionados -->
          <kendo-card style="width: 100%; height: 100%; overflow: hidden;">
            <kendo-card-header>
              <h4 class="m-0">Seleccionados</h4>
            </kendo-card-header>
            <kendo-card-body style="height: calc(100% - 50px); overflow-y: auto;">
              <kendo-grid
                scrollable="scrollable"
                [height]="400"
                [data]="registrosSeleccionados"
                [filterable]="false">
                <kendo-grid-column [width]="60">
                  <ng-template kendoGridCellTemplate let-dataItem>
                    <button
                      class="btn btn-sm btn-outline-danger"
                      (click)="deseleccionar(dataItem)"
                      title="Quitar de seleccionados">
                      <span class="k-icon k-i-minus"></span>
                    </button>
                  </ng-template>
                </kendo-grid-column>
                <kendo-grid-column field="solucion" title="Nombre">
                  <ng-template kendoGridCellTemplate let-dataItem>
                    {{ dataItem.solucion || dataItem.nombre }}
                  </ng-template>
                </kendo-grid-column>
              </kendo-grid>
            </kendo-card-body>
          </kendo-card>

          <!-- Botones centro -->
          <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; gap:10px;">
            <button class="btn btn-success"
                    (click)="pasarASeleccionados()"
                    [disabled]="registrosPreSeleccionados.length === 0"
                    title="Pasar a seleccionados">
              <span class="k-icon k-i-arrow-60-left k-icon-24"></span>
            </button>

            <button class="btn btn-outline-danger"
                    (click)="revertirTodo()"
                    [disabled]="registrosSeleccionados.length === 0 && registrosPreSeleccionados.length === 0"
                    title="Revertir todo">
              <span class="k-icon k-i-reload k-icon-24"></span>
            </button>
          </div>

          <!-- Disponibles -->
          <kendo-card style="width: 100%; height: 100%; overflow: hidden;">
            <kendo-card-header>
              <h4 class="m-0">Disponibles</h4>
            </kendo-card-header>
            <kendo-card-body style="height: calc(100% - 50px); overflow-y: auto;">
              <kendo-grid [data]="registrosDisponibles" [filterable]="false" [height]="400" scrollable="scrollable">
                <kendo-grid-column [width]="60">
                  <ng-template kendoGridCellTemplate let-dataItem>
                    <input
                      type="checkbox"
                      [checked]="dataItem.seleccionado === true"
                      (change)="
                        dataItem.seleccionado = $any($event).target.checked;
                        marcarPreseleccion(dataItem, $any($event).target.checked)
                      "
                    />
                  </ng-template>
                </kendo-grid-column>

                <kendo-grid-column field="solucion" title="Nombre">
                  <ng-template kendoGridCellTemplate let-dataItem>
                    {{ dataItem.solucion || dataItem.nombre }}
                  </ng-template>
                </kendo-grid-column>
              </kendo-grid>
            </kendo-card-body>
          </kendo-card>
        </div>

      </form>
    </div>
    <loading [loading]="formLoader"></loading>
  </div>

  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button kendoButton themeColor="primary" icon="save" (click)="guardar()">
        {{ esNuevo ? 'Guardar' : 'Actualizar' }}
      </button>
      <button kendoButton themeColor="error" icon="close" (click)="cerrar(false)">
        Cancelar
      </button>
    </div>
  </div>
</kendo-dialog>
