<kendo-dialog *ngIf="visible" (close)="cerrar()" [title]="esNuevo ? 'Nuevo Problema' : 'Editar Problema'"
  [width]="'1000px'" [height]="'auto'" [top]="'10%'" [draggable]="true" [resizable]="true" [keepCentered]="false">
  <div class="modal-body">
    <form class="k-form k-form-horizontal" [formGroup]="formProblema">

      <!-- Nombre del Problema -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlProblema">Nombre del Problema:</label>
        <kendo-dropdownlist id="ddlProblema" formControlName="problemaId" [data]="opcProblema" textField="nombre"
          valueField="id" [valuePrimitive]="true" [filterable]="true" [defaultItem]="ddlDefault" style="width:100%">
        </kendo-dropdownlist>
        <kendo-formerror *ngIf="formProblema.get('problemaId')?.invalid && formProblema.get('problemaId')?.touched">
          Selecciona un nombre de problema.
        </kendo-formerror>
      </kendo-formfield>

      <!-- Detalle -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlDetalle">Detalle del Problema:</label>
        <kendo-dropdownlist id="ddlDetalle" formControlName="detalleId" [data]="opcDetalle" textField="nombre"
          valueField="id" [valuePrimitive]="true" [filterable]="true" [defaultItem]="ddlDefault" style="width:100%">
        </kendo-dropdownlist>
      </kendo-formfield>

      <!-- Detalle Título -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlDetalleTitulo">Título:</label>
        <kendo-dropdownlist id="ddlDetalleTitulo" formControlName="detalleTituloId" [data]="opcDetalleTitulo"
          textField="titulo" valueField="id" [valuePrimitive]="true" [filterable]="true"
          style="width:100%">
        </kendo-dropdownlist>
      </kendo-formfield>

      <!-- Solución Descripción -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlSolDesc">Solución - Descripción:</label>
        <kendo-dropdownlist id="ddlSolDesc" formControlName="solucionDescripcionId" [data]="opcSolucionDescripcion"
          textField="descripcion" valueField="id" [valuePrimitive]="true" [filterable]="true"
          style="width:100%">
        </kendo-dropdownlist>
      </kendo-formfield>

      <!-- Solución Título -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlSolTitulo">Solución - Título:</label>
        <kendo-dropdownlist id="ddlSolTitulo" formControlName="solucionTituloId" [data]="opcSolucionTitulo"
          textField="titulo" valueField="id"
          style="width:100%">
        </kendo-dropdownlist>
      </kendo-formfield>

      <!-- Solución SubTítulo -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlSolSubTitulo">Solución - SubTítulo:</label>
        <kendo-dropdownlist id="ddlSolSubTitulo" formControlName="solucionSubTituloId" [data]="opcSolucionSubTitulo"
          textField="subTitulo" valueField="id" [valuePrimitive]="true"
          style="width:100%">
        </kendo-dropdownlist>
        <kendo-formerror *ngIf="formProblema.get('solucionSubTituloId')?.invalid && formProblema.get('solucionSubTituloId')?.touched">
          Selecciona un subtítulo.
        </kendo-formerror>
      </kendo-formfield>

      <div *ngIf="mostrarCuadro" style="
          width: 100%;
          display: grid;
          grid-template-columns: 2fr 120px 2fr;
          gap: 10px;
          align-items: stretch;
          margin-top: 10px;
          height: 500px;
        ">
        <!-- Tabla izquierda: seleccionados -->
        <kendo-card style="width: 100%; height: 100%; overflow: hidden;">
          <kendo-card-header>
            <h4 class="m-0">Seleccionados</h4>
          </kendo-card-header>
          <kendo-card-body style="height: calc(100% - 50px); overflow-y: auto;">
            <kendo-grid [data]="registrosSeleccionados" [filterable]="false" [expandField]="'expanded'">
              <kendo-grid-column [width]="40">
                <ng-template kendoGridCellTemplate let-dataItem>
                  <input type="checkbox" [checked]="false" (change)="deseleccionar(dataItem)" />
                </ng-template>
              </kendo-grid-column>
      
              <kendo-grid-column field="solucion" title="Nombre"></kendo-grid-column>
      
              <!-- Subregistros -->
              <ng-template kendoGridDetailTemplate let-dataItem>
                <kendo-grid [data]="dataItem.subregistros" [filterable]="false">
                  <kendo-grid-column [width]="40">
                    <ng-template kendoGridCellTemplate let-sub>
                      <input type="checkbox" [(ngModel)]="sub.seleccionado" />
                    </ng-template>
                  </kendo-grid-column>
                  <kendo-grid-column field="nombre" title="Subregistro"></kendo-grid-column>
                </kendo-grid>
              </ng-template>
            </kendo-grid>
          </kendo-card-body>
        </kendo-card>
      
        <!-- Columna central: botones -->
        <div style="
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    align-items: center;
                    height: 100%;
                    gap: 10px;
                  ">
          <button class="btn btn-success" (click)="pasarASeleccionados()" [disabled]="!(registrosPreSeleccionados.length > 0)"
            title="Pasar a seleccionados">
            <span class="k-icon k-i-arrow-60-left k-icon-24"></span>
          </button>
      
          <button class="btn btn-danger" (click)="revertirADisponibles()" [disabled]="!(registrosSeleccionados.length > 0)"
            title="Revertir a disponibles">
            <span class="k-icon k-i-arrow-60-right k-icon-24"></span>
          </button>
      
          <button class="btn btn-outline-danger" (click)="revertirTodo()" [disabled]="
                      !(
                        registrosSeleccionados.length > 0 ||
                        registrosPreSeleccionados.length > 0
                      )
                    " title="Revertir todo">
            <span class="k-icon k-i-reload k-icon-24"></span>
          </button>
        </div>
      
        <!-- Tabla derecha: disponibles -->
        <kendo-card style="width: 100%; height: 100%; overflow: hidden;">
          <kendo-card-header>
            <h4 class="m-0">Disponibles</h4>
          </kendo-card-header>
          <kendo-card-body style="height: calc(100% - 50px); overflow-y: auto;">
            <kendo-grid [data]="registrosDisponibles" [filterable]="false">
              <kendo-grid-column [width]="40">
                <ng-template kendoGridCellTemplate let-dataItem>
                  <input type="checkbox" [checked]="false" (change)="seleccionar(dataItem)" />
                </ng-template>
              </kendo-grid-column>
      
              <kendo-grid-column field="solucion" title="Nombre"></kendo-grid-column>
            </kendo-grid>
          </kendo-card-body>
        </kendo-card>
      </div>


    </form>
  </div>

  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button kendoButton themeColor="primary" icon="save" (click)="guardar()">
        {{ esNuevo ? 'Guardar' : 'Actualizar' }}
      </button>
      <button kendoButton themeColor="error" icon="close" (click)="cerrar()">
        Cancelar
      </button>
    </div>
  </div>
</kendo-dialog>
