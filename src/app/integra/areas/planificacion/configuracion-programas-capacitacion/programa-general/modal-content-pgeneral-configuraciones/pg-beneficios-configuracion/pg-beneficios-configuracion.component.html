<div class="pg-contenedor-tab">
  <div class="row mt-3">
    <div class="col-12 pg-kgrid">
      <kendo-grid
        [kendoGridBinding]="gridBeneficios.data"
        [loading]="gridBeneficios.loading"
        [selectable]="false"
        scrollable="none"
        filterable="menu"
      >
        <ng-template kendoGridToolbarTemplate>
          <h3 class="mb-0 w-auto text-center">Beneficios</h3>
          <kendo-grid-spacer></kendo-grid-spacer>
          <button
            kendoButton
            themeColor="success"
            type="button"
            icon="plus"
            (click)="abrirModal(modalInsertar)"
          >
            Nuevo
          </button>
        </ng-template>
        <kendo-grid-column
          field="nombreBeneficio"
          title="Nombre"
          class="text-start"
          [style]="{ width: '40%' }"
          [filterable]="true"
          headerClass="pg-header-grid justify-content-center "
        ></kendo-grid-column>
        <kendo-grid-column
          field="modalidades"
          title="Modalidad"
          class="text-start fw-bold"
          [style]="{ width: '40%' }"
          headerClass="pg-header-grid justify-content-center"
        >
          <ng-template kendoGridCellTemplate let-dataItem>
            <ng-container
              *ngIf="
                dataItem.modalidades != null && dataItem.modalidades.length > 0
              "
            >
              {{ impresionModalidad(dataItem) }}
            </ng-container>
          </ng-template>
        </kendo-grid-column>
        <kendo-grid-column
          title="Acciones"
          [style]="{ width: '20%' }"
          headerClass="pg-header-grid justify-content-center text-center"
        >
          <ng-template kendoGridCellTemplate let-dataItem="dataItem">
            <div class="row justify-content-center">
              <div kendoTooltip class="col-auto p-0 mx-1">
                <button
                  kendoButton
                  themeColor="warning"
                  icon="pencil"
                  title="Editar"
                  (click)="abrirModal(modalInsertar, dataItem)"
                ></button>
              </div>
              <div kendoTooltip class="col-auto p-0 mx-1">
                <button
                  kendoButton
                  themeColor="error"
                  icon="trash"
                  title="Eliminar"
                  (click)="eliminarBeneficio(dataItem)"
                ></button>
              </div>
            </div>
          </ng-template>
        </kendo-grid-column>
      </kendo-grid>
    </div>
  </div>
</div>

<ng-template #modalInsertar let-modal>
  <div class="modal-header py-2 bg-success text-white text-center">
    <h2 class="modal-title mb-0 w-100" id="modal-basic-title">
      {{ esNuevo ? "Registro de Beneficio" : "Actualizar Beneficio" }}
    </h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="card">
      <div class="card-body">
        <form class="k-form k-form-horizontal" [formGroup]="formBeneficio">
          <div class="row">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="nombre" class="k-label">
                  <span> Nombre<strong> *</strong></span>
                </label>
                <kendo-textbox
                  #nombre
                  formControlName="nombreBeneficio"
                  inputValidSpaceDir
                  placeholder="Ingrese nombre ..."
                >
                </kendo-textbox>
                <kendo-formerror>{{
                  getErrorMessage("nombreBeneficio")
                }}</kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="modalidades" class="k-label">
                  <span>Modalidad<strong> *</strong></span>
                </label>
                <kendo-multiselect
                  #modalidades
                  formControlName="modalidades"
                  [data]="combosModalidad"
                  textField="nombre"
                  valueField="id"
                  placeholder="Seleccione Modalidad ..."
                  [defaultItem]="{
                    id: 0,
                    nombre: 'Seleccionar Modalidad ...'
                  }"
                  [kendoDropDownFilter]="filterSettings"
                ></kendo-multiselect>
                <kendo-formerror>{{
                  getErrorMessage("modalidades")
                }}</kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
        </form>
      </div>
    </div>
    <div class="row mt-3">
      <div class="col-12 pg-kgrid">
        <kendo-grid
          [kendoGridBinding]="gridBeneficiosArgumentos.data"
          [loading]="gridBeneficiosArgumentos.loading"
          [selectable]="false"
          scrollable="none"
          filterable="menu"
        >
          <ng-template kendoGridToolbarTemplate>
            <h3 class="mb-0 w-auto text-center">Argumentos</h3>
            <kendo-grid-spacer></kendo-grid-spacer>
            <button
              kendoGridAddCommand
              icon="plus"
              themeColor="success"
              (click)="abrirModalArgumento(modalArgumento, true, null, 0)"
            >
              Nuevo
            </button>
          </ng-template>
          <kendo-grid-column
            field="nombre"
            title="Nombre Argumento"
            class="text-center"
            [width]="200"
            [filterable]="true"
            headerClass="pg-header-grid justify-content-center "
          >
            <ng-template kendoGridCellTemplate let-dataItem>
              <span [innerHTML]="dataItem.nombre"></span>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column
            title="Acciones"
            [width]="100"
            headerClass="pg-header-grid justify-content-center text-center"
          >
            <ng-template
              kendoGridCellTemplate
              let-dataItem="dataItem"
              let-rowIndex="rowIndex"
            >
              <div class="row justify-content-center">
                <div kendoTooltip class="col-auto p-0 mx-1">
                  <button
                    kendoButton
                    themeColor="warning"
                    icon="pencil"
                    title="Editar"
                    (click)="
                      abrirModalArgumento(
                        modalArgumento,
                        false,
                        dataItem,
                        rowIndex
                      )
                    "
                  ></button>
                </div>
                <div kendoTooltip class="col-auto p-0 mx-1">
                  <button
                    kendoGridRemoveCommand
                    themeColor="error"
                    icon="trash"
                    title="Eliminar"
                    (click)="eliminarArgumento(rowIndex)"
                  ></button>
                </div>
              </div>
            </ng-template>
          </kendo-grid-column>
        </kendo-grid>
      </div>
    </div>
    <loading [loading]="loaderModal"></loading>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button
        themeColor="primary"
        size="medium"
        icon="save"
        kendoButton
        (click)="guardarBeneficio()"
      >
        {{ esNuevo ? "Nuevo" : "Actualizar" }}
      </button>
      <button
        themeColor="error"
        size="medium"
        icon="close"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
</ng-template>

<ng-template #modalArgumento let-modal>
  <div class="modal-header py-2 bg-light text-success text-center">
    <h2 class="modal-title mb-0 w-100" id="modal-basic-title">Argumento</h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <form class="k-form k-form-horizontal" [formGroup]="formBeneficioArgumento">
      
      <kendo-editor
        formControlName="nombre"
        style="height: 100%; width: 100%"
        [pasteCleanupSettings]="{
          removeInvalidHTML: true,
          convertMsLists: true,
          removeMsClasses: true,
          removeMsStyles: true
        }"
      >
      </kendo-editor>
    </form>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button
        themeColor="primary"
        size="medium"
        icon="save"
        kendoButton
        (click)="guardarArgumento()"
      >
        {{ esNuevo ? "Nuevo" : "Actualizar" }}
      </button>
      <button
        themeColor="error"
        size="medium"
        icon="close"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
</ng-template>
