<!-- pg-problemas-cliente-v2.component.html -->
<div class="pg-contenedor-tab pg-grid-problemas">
  <div class="row mt-3">
    <div class="col-12 pg-kgrid">
      <kendo-grid
        [kendoGridBinding]="gridProblemasCliente.data"
        [loading]="gridProblemasCliente.loading"
        [selectable]="false"
        scrollable="none"
        filterable="menu"
      >
        <!-- Toolbar -->
        <ng-template kendoGridToolbarTemplate>
          <h3 class="mb-0 w-auto text-center">Problemas del Cliente V2</h3>
          <kendo-grid-spacer></kendo-grid-spacer>
          <button
            kendoButton
            themeColor="success"
            type="button"
            icon="plus"
            (click)="abrirModal(null, true)"
          >
            Nuevo
          </button>
        </ng-template>

        <kendo-grid-column-group title="Problema" headerClass="pg-group">
          <kendo-grid-column
            field="nombreProblema"
            title="Nombre"
            [width]="220"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>
        </kendo-grid-column-group>


        <kendo-grid-column-group title="Detalle" headerClass="pg-group">
          <kendo-grid-column
            field="detalle"
            title="Detalle"
            [width]="300"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>

          <kendo-grid-column
            field="detalleTitulo"
            title="Titulo"
            [width]="220"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>
        </kendo-grid-column-group>


        <kendo-grid-column-group title="Solución" headerClass="pg-group">
          <kendo-grid-column
            field="solucionTitulo"
            title="Titulo"
            [width]="220"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>

          <kendo-grid-column
            field="solucionSubTitulo"
            title="SubTitulo"
            [width]="220"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>

          <kendo-grid-column
            field="solucionDescripcion"
            title="Descripcion"
            [width]="300"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>
        </kendo-grid-column-group>

        <kendo-grid-column-group title="SubSoluciones" headerClass="pg-group">
          <kendo-grid-column
            field="subSoluciones"
            title="Soluciones"
            [width]="300"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>
        </kendo-grid-column-group>


        <kendo-grid-column-group title="" headerClass="pg-group-empty">
          <kendo-grid-column
            title="Acciones"
            [width]="140"
            headerClass="pg-header-grid justify-content-center text-center"
          >
            <ng-template kendoGridCellTemplate let-dataItem="dataItem">
              <div class="row justify-content-center">
                <div kendoTooltip class="col-auto p-0 mx-1">
                  <button
                    kendoGridEditCommand
                    themeColor="warning"
                    icon="pencil"
                    title="Editar"
                    (click)="abrirModal(null, false)"
                  ></button>
                </div>
                <div kendoTooltip class="col-auto p-0 mx-1">
                  <button
                    kendoGridRemoveCommand
                    themeColor="error"
                    icon="trash"
                    title="Eliminar"
                    
                  ></button>
                </div>
              </div>
            </ng-template>
          </kendo-grid-column>
        </kendo-grid-column-group>

      </kendo-grid>
    </div>
  </div>
</div>

<!-- ================= MODAL ================= -->

    <app-pg-problemas-cliente-form
      *ngIf="mostrarModal"
  [visible]="mostrarModal"
  [esNuevo]="esNuevo"
  [dataProblema]="dataSeleccionada"
  (cerrado)="mostrarModal = false"
      >
    </app-pg-problemas-cliente-form>
