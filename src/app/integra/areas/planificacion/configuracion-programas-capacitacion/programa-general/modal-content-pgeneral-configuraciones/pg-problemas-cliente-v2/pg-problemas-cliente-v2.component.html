<div class="pg-contenedor-tab">
  <div class="row mt-3">
    <div class="col-12 pg-kgrid">
      <kendo-grid
        [kendoGridBinding]="gridProblemasCliente.data"
        [loading]="gridProblemasCliente.loading"
        [selectable]="false"
        scrollable="none"
        filterable="menu"
      >
        <ng-template kendoGridToolbarTemplate>
          <h3 class="mb-0 w-auto text-center">Problemas del Cliente</h3>
          <kendo-grid-spacer></kendo-grid-spacer>
          <button kendoButton themeColor="success" type="button" icon="plus">
            Nuevo
          </button>
        </ng-template>
        <kendo-grid-column
          field="nombreProblema"
          title="Nombre"
          class="text-start"
          [style]="{ width: '40%' }"
          [filterable]="true"
          headerClass="pg-header-grid justify-content-center "
        ></kendo-grid-column>
        <kendo-grid-column
          field="modalidades"
          title="Modalidad"
          class="text-start fw-bold"
          [style]="{ width: '40%' }"
          headerClass="pg-header-grid justify-content-center"
        >
          <ng-template kendoGridCellTemplate let-dataItem>
            <ng-container
              *ngIf="
                dataItem.modalidades != null && dataItem.modalidades.length > 0
              "
            >
              {{ impresionModalidad(dataItem) }}
            </ng-container>
          </ng-template>
        </kendo-grid-column>
        <kendo-grid-column
          title="Acciones"
          [style]="{ width: '20%' }"
          headerClass="pg-header-grid justify-content-center text-center"
        >
          <ng-template kendoGridCellTemplate let-dataItem="dataItem">
            <div class="row justify-content-center">
              <div kendoTooltip class="col-auto p-0 mx-1">
                <button
                  kendoGridEditCommand
                  themeColor="warning"
                  icon="pencil"
                  title="Editar"
                ></button>
              </div>
              <div kendoTooltip class="col-auto p-0 mx-1">
                <button
                  kendoGridRemoveCommand
                  themeColor="error"
                  icon="trash"
                  title="Eliminar"
                ></button>
              </div>
            </div>
          </ng-template>
        </kendo-grid-column>
      </kendo-grid>
    </div>
  </div>
</div>
