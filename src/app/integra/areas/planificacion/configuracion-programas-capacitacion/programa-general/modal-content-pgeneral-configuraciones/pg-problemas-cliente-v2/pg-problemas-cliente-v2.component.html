<!-- pg-problemas-cliente-v2.component.html -->
<div class="pg-contenedor-tab pg-grid-problemas">
  <div class="row mt-3">
    <div class="col-12 pg-kgrid">
      <kendo-grid
        [kendoGridBinding]="gridProblemasCliente.data"
        [loading]="gridProblemasCliente.loading"
        [selectable]="false"
        scrollable="none"
        filterable="menu"
      >
        <!-- Toolbar -->
        <ng-template kendoGridToolbarTemplate>
          <h3 class="mb-0 w-auto text-center">Problemas del Cliente V2</h3>
          <kendo-grid-spacer></kendo-grid-spacer>
          <button
            kendoButton
            themeColor="success"
            type="button"
            icon="plus"
            (click)="abrirModal(modalInsertar, true)"
          >
            Nuevo
          </button>
        </ng-template>

        <kendo-grid-column-group title="Problema" headerClass="pg-group">
          <kendo-grid-column
            field="nombreProblema"
            title="Nombre"
            [width]="220"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>
        </kendo-grid-column-group>


        <kendo-grid-column-group title="Detalle" headerClass="pg-group">
          <kendo-grid-column
            field="detalle"
            title="Detalle"
            [width]="300"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>

          <kendo-grid-column
            field="detalleTitulo"
            title="Titulo"
            [width]="220"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>
        </kendo-grid-column-group>


        <kendo-grid-column-group title="Solución" headerClass="pg-group">
          <kendo-grid-column
            field="solucionTitulo"
            title="Titulo"
            [width]="220"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>

          <kendo-grid-column
            field="solucionSubTitulo"
            title="SubTitulo"
            [width]="220"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>

          <kendo-grid-column
            field="solucionDescripcion"
            title="Descripcion"
            [width]="300"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>
        </kendo-grid-column-group>

        <kendo-grid-column-group title="SubSoluciones" headerClass="pg-group">
          <kendo-grid-column
            field="subSoluciones"
            title="Soluciones"
            [width]="300"
            headerClass="pg-header-grid justify-content-center"
            class="text-start"
            [filterable]="true"
          >
          </kendo-grid-column>
        </kendo-grid-column-group>


        <kendo-grid-column-group title="" headerClass="pg-group-empty">
          <kendo-grid-column
            title="Acciones"
            [width]="140"
            headerClass="pg-header-grid justify-content-center text-center"
          >
            <ng-template kendoGridCellTemplate let-dataItem="dataItem">
              <div class="row justify-content-center">
                <div kendoTooltip class="col-auto p-0 mx-1">
                  <button
                    kendoGridEditCommand
                    themeColor="warning"
                    icon="pencil"
                    title="Editar"
                    (click)="abrirModal(modalInsertar, false, dataItem)"
                  ></button>
                </div>
                <div kendoTooltip class="col-auto p-0 mx-1">
                  <button
                    kendoGridRemoveCommand
                    themeColor="error"
                    icon="trash"
                    title="Eliminar"
                    
                  ></button>
                </div>
              </div>
            </ng-template>
          </kendo-grid-column>
        </kendo-grid-column-group>

      </kendo-grid>
    </div>
  </div>
</div>

<!-- ================= MODAL ================= -->
<ng-template #modalInsertar let-modal>
  <div class="modal-header py-2 bg-primary text-white">
    <h2 class="modal-title mb-0">
      {{ esNuevo ? 'Nuevo Problema del Cliente' : 'Actualizar Problema del Cliente' }}
    </h2>
    <button type="button" class="btn-close btn-close-white" aria-label="Close"
            (click)="modal.dismiss('Cross click')"></button>
  </div>

  <div class="modal-body">
    <form class="k-form k-form-horizontal" [formGroup]="formProblema">

      <!-- Problema (Nombre) -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlProblema">Nombre<strong>*</strong>:</label>
        <kendo-dropdownlist
          id="ddlProblema"
          formControlName="problemaId"
          [data]="opcProblema"
          textField="nombre"
          valueField="id"
          [valuePrimitive]="true"
          [filterable]="true"
          [defaultItem]="ddlDefault"
          style="width:100%">
        </kendo-dropdownlist>
        <kendo-formerror *ngIf="formProblema.get('problemaId')?.invalid && formProblema.get('problemaId')?.touched">
          Selecciona un nombre de problema.
        </kendo-formerror>
      </kendo-formfield>

      <!-- Detalle -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlDetalle">Detalle<strong>*</strong>:</label>
        <kendo-dropdownlist
          id="ddlDetalle"
          formControlName="detalleId"
          [data]="opcDetalle"
          textField="nombre"
          valueField="id"
          [valuePrimitive]="true"
          [filterable]="true"
          [defaultItem]="ddlDefault"
          style="width:100%">
        </kendo-dropdownlist>
        <kendo-formerror *ngIf="formProblema.get('detalleId')?.invalid && formProblema.get('detalleId')?.touched">
          Selecciona un detalle.
        </kendo-formerror>
      </kendo-formfield>

      <!-- Detalle Título -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlDetalleTitulo">Título:</label>
        <kendo-dropdownlist
          id="ddlDetalleTitulo"
          formControlName="detalleTituloId"
          [data]="opcDetalleTitulo"
          textField="nombre"
          valueField="id"
          [valuePrimitive]="true"
          [filterable]="true"
          [defaultItem]="ddlDefault"
          style="width:100%">
        </kendo-dropdownlist>
      </kendo-formfield>

      <!-- Solución Título -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlSolTitulo">Solución - Título:</label>
        <kendo-dropdownlist
          id="ddlSolTitulo"
          formControlName="solucionTituloId"
          [data]="opcSolucionTitulo"
          textField="nombre"
          valueField="id"
          [valuePrimitive]="true"
          [filterable]="true"
          [defaultItem]="ddlDefault"
          style="width:100%">
        </kendo-dropdownlist>
      </kendo-formfield>

      <!-- Solución SubTítulo -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlSolSubTitulo">Solución - SubTítulo:</label>
        <kendo-dropdownlist
          id="ddlSolSubTitulo"
          formControlName="solucionSubTituloId"
          [data]="opcSolucionSubTitulo"
          textField="nombre"
          valueField="id"
          [valuePrimitive]="true"
          [filterable]="true"
          [defaultItem]="ddlDefault"
          style="width:100%">
        </kendo-dropdownlist>
      </kendo-formfield>

      <!-- Solución Descripción -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="ddlSolDesc">Solución - Descripción:</label>
        <kendo-dropdownlist
          id="ddlSolDesc"
          formControlName="solucionDescripcionId"
          [data]="opcSolucionDescripcion"
          textField="nombre"
          valueField="id"
          [valuePrimitive]="true"
          [filterable]="true"
          [defaultItem]="ddlDefault"
          style="width:100%">
        </kendo-dropdownlist>
      </kendo-formfield>

      <!-- SubSoluciones (múltiple selección) -->
      <kendo-formfield orientation="horizontal">
        <label class="k-label" for="msSubSol">SubSoluciones:</label>
        <kendo-multiselect
          id="msSubSol"
          formControlName="subSolucionesIds"
          [data]="subSolucionesCatalogo"
          textField="nombre"
          valueField="id"
          [valuePrimitive]="true"
          [filterable]="true"
          placeholder="Seleccionar subsoluciones..."
          style="width:100%">
        </kendo-multiselect>
      </kendo-formfield>

    </form>

    <loading [loading]="loaderModal"></loading>
  </div>

  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button kendoButton themeColor="primary" icon="save" (click)="guardar()">
        {{ esNuevo ? 'Guardar' : 'Actualizar' }}
      </button>
      <button kendoButton themeColor="error" icon="close" (click)="modal.dismiss('Cross click')">
        Cancelar
      </button>
    </div>
  </div>
</ng-template>
