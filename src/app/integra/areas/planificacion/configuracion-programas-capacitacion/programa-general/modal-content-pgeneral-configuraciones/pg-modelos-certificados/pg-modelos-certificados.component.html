<div class="pg-contenedor-tab">
  <div class="row mt-3">
    <div class="col-12 pg-kgrid">
      <kendo-grid
        [kendoGridBinding]="gridModelosCertificados.data"
        [loading]="gridModelosCertificados.loading"
        [selectable]="false"
        scrollable="none"
        filterable="menu"
      >
        <ng-template kendoGridToolbarTemplate>
          <h3 class="mb-0 w-auto text-center">Modelo de Certificados</h3>
          <kendo-grid-spacer></kendo-grid-spacer>
          <button
            kendoButton
            themeColor="success"
            type="button"
            icon="plus"
            (click)="abrirModal(modalInsertar, true, null)"
          >
            Nuevo
          </button>
        </ng-template>
        <kendo-grid-column
          field="nombreModeloCertificado"
          title="Nombre"
          class="text-center"
          [style]="{ width: '30%' }"
          [filterable]="true"
          headerClass="pg-header-grid justify-content-center "
        ></kendo-grid-column>
        <kendo-grid-column
          field="modalidades"
          title="Modalidad"
          class="text-center"
          [style]="{ width: '30%' }"
          headerClass="pg-header-grid justify-content-center"
        >
          <ng-template kendoGridCellTemplate let-dataItem>
            <ng-container
              *ngIf="
                dataItem.modalidades != null && dataItem.modalidades.length > 0
              "
            >
              {{ impresionModalidad(dataItem) }}
            </ng-container>
          </ng-template>
        </kendo-grid-column>
        <kendo-grid-column
          field="urlModeloCertificado"
          title="Visualizar"
          [style]="{ width: '10%' }"
          headerClass="pg-header-grid justify-content-center "
        >
          <ng-template kendoGridCellTemplate let-dataItem="dataItem">
            <div class="w-100 d-flex- justify-content-center">
              <a
                [href]="dataItem.urlModeloCertificado"
                target="_blank"
                class="btn btn-link"
              >
                <span class="k-icon k-i-eye fs-3"></span>
              </a>
            </div>
          </ng-template>
        </kendo-grid-column>
        <kendo-grid-column
          title="Acciones"
          [style]="{ width: '20%' }"
          headerClass="pg-header-grid justify-content-center text-center"
        >
          <ng-template kendoGridCellTemplate let-dataItem="dataItem">
            <div class="row justify-content-center">
              <div kendoTooltip class="col-auto p-0 mx-1">
                <button
                  kendoButton
                  themeColor="warning"
                  icon="pencil"
                  title="Editar"
                  (click)="abrirModal(modalInsertar, false, dataItem)"
                ></button>
              </div>
              <div kendoTooltip class="col-auto p-0 mx-1">
                <button
                  kendoButton
                  themeColor="error"
                  icon="trash"
                  title="Eliminar"
                  (click)="eliminar(dataItem)"
                ></button>
              </div>
            </div>
          </ng-template>
        </kendo-grid-column>
      </kendo-grid>
    </div>
  </div>
</div>

<ng-template #modalInsertar let-modal>
  <div class="modal-header py-2 bg-success text-white text-center">
    <h2 class="modal-title mb-0 w-100" id="modal-basic-title">
      {{
        esNuevo
          ? "Registro de Modelo de Certificado"
          : "Actualizar Modelo de Certificado"
      }}
    </h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="card">
      <div class="card-body">
        <form
          class="k-form k-form-horizontal"
          [formGroup]="formModelosCertificados"
        >
          <kendo-formfield orientation="horizontal">
            <label [for]="nombre" class="k-label">
              <span>Nombre<strong> *</strong></span>
            </label>
            <kendo-textbox
              #nombre
              formControlName="nombre"
              inputValidSpaceDir
              placeholder="<Nombre>"
            >
            </kendo-textbox>
            <kendo-formerror>{{ getErrorMessage("nombre") }}</kendo-formerror>
          </kendo-formfield>
          <kendo-formfield orientation="horizontal">
            <label [for]="modalidades" class="k-label">
              <span>Modalidad<strong> *</strong></span>
            </label>
            <kendo-multiselect
              #modalidades
              formControlName="modalidades"
              [data]="combosModalidad"
              textField="nombre"
              valueField="idModalidadCurso"
              placeholder="<Modalidad>"
              [kendoDropDownFilter]="filterSettings"
            ></kendo-multiselect>
            <kendo-formerror>{{
              getErrorMessage("modalidades")
            }}</kendo-formerror>
          </kendo-formfield>
          <kendo-formfield orientation="horizontal">
            <label [for]="file" class="k-label">
              <span> Seleccione Archivo:</span>
            </label>
            <kendo-fileselect
              #file
              [restrictions]="myRestrictions"
              [multiple]="false"
              formControlName="files"
              (select)="onFileSelect($event)"
            >
            </kendo-fileselect>
            <kendo-formhint></kendo-formhint>
            <kendo-formerror> Seleccione un Archivo </kendo-formerror>
          </kendo-formfield>
        </form>
      </div>
    </div>
    <loading [loading]="loaderModal"></loading>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button
        themeColor="primary"
        size="medium"
        icon="save"
        kendoButton
        (click)="guardar()"
      >
        {{ esNuevo ? "Nuevo" : "Actualizar" }}
      </button>
      <button
        themeColor="error"
        size="medium"
        icon="close"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
</ng-template>
