<div class="pg-contenedor-tab">
  <div class="row mt-3">
    <div class="col-12 pg-kgrid">
      <kendo-grid
        [kendoGridBinding]="gridResumenRequisitosCertificacion.data"
        [loading]="gridResumenRequisitosCertificacion.loading"
        [selectable]="false"
        scrollable="none"
        filterable="menu"
      >
        <ng-template kendoGridToolbarTemplate>
          <h3 class="mb-0 w-auto text-center">
            Resumen de Requisitos de Certificación
          </h3>
          <kendo-grid-spacer></kendo-grid-spacer>
          <button
            kendoButton
            themeColor="success"
            type="button"
            icon="plus"
            (click)="abrirModal(modalInsertar, true, null)"
          >
            Nuevo
          </button>
        </ng-template>
        <kendo-grid-column
          field="nombreCertificacion"
          title="Nombre"
          class="text-center"
          [style]="{ width: '40%' }"
          [filterable]="true"
          headerClass="pg-header-grid justify-content-center "
        ></kendo-grid-column>
        <kendo-grid-column
          field="modalidades"
          title="Modalidad"
          class="text-center fw-bold"
          [style]="{ width: '40%' }"
          headerClass="pg-header-grid justify-content-center"
        >
          <ng-template kendoGridCellTemplate let-dataItem>
            <ng-container
              *ngIf="
                dataItem.modalidades != null && dataItem.modalidades.length > 0
              "
            >
              {{ impresionModalidad(dataItem) }}
            </ng-container>
          </ng-template>
        </kendo-grid-column>
        <kendo-grid-column
          title="Acciones"
          [style]="{ width: '20%' }"
          headerClass="pg-header-grid justify-content-center text-center"
        >
          <ng-template kendoGridCellTemplate let-dataItem="dataItem">
            <div class="row justify-content-center">
              <div kendoTooltip class="col-auto p-0 mx-1">
                <button
                  kendoGridEditCommand
                  themeColor="warning"
                  icon="pencil"
                  title="Editar"
                  (click)="abrirModal(modalInsertar, false, dataItem)"
                ></button>
              </div>
              <div kendoTooltip class="col-auto p-0 mx-1">
                <button
                  kendoGridRemoveCommand
                  themeColor="error"
                  icon="trash"
                  title="Eliminar"
                  (click)="eliminar(dataItem)"
                ></button>
              </div>
            </div>
          </ng-template>
        </kendo-grid-column>
      </kendo-grid>
    </div>
  </div>
</div>

<ng-template #modalInsertar let-modal>
  <div class="modal-header py-2 bg-success text-white text-center">
    <h2 class="modal-title mb-0 w-100" id="modal-basic-title">
      {{
        esNuevo
          ? "Registro de Certificación"
          : "Actualizar Registro de Certificacíón"
      }}
    </h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="card">
      <div class="card-body">
        <form
          class="k-form k-form-horizontal"
          [formGroup]="formResumenRequisitosCertificacion"
        >
          <kendo-formfield orientation="horizontal">
            <label [for]="nombre" class="k-label">
              <span>Nombre<strong class=""> *</strong></span>
            </label>
            <kendo-textbox
              #nombre
              formControlName="nombreCertificacion"
              inputValidSpaceDir
              placeholder="Ingrese nombre ..."
            >
            </kendo-textbox>
            <kendo-formerror>{{
              getErrorMessage("nombreCertificacion")
            }}</kendo-formerror>
          </kendo-formfield>
          <kendo-formfield orientation="horizontal">
            <label [for]="modalidades" class="k-label">
              <span>Modalidad<strong class=""> *</strong></span>
            </label>
            <kendo-multiselect
              #modalidades
              formControlName="modalidades"
              [data]="combosModalidad"
              textField="nombre"
              valueField="idModalidadCurso"
              placeholder="Seleccione Modalidad ..."
              [defaultItem]="{
                id: null,
                nombre: 'Seleccionar Modalidad ...'
              }"
              [kendoDropDownFilter]="filterSettings"
            ></kendo-multiselect>
            <kendo-formerror>{{
              getErrorMessage("modalidades")
            }}</kendo-formerror>
          </kendo-formfield>
        </form>
      </div>
    </div>
    <div class="row mt-3">
      <div class="col-12 pg-kgrid">
        <kendo-grid
          [kendoGridBinding]="gridResumenRequisitosCertificacionArgumentos.data"
          [loading]="gridResumenRequisitosCertificacionArgumentos.loading"
          [selectable]="false"
          scrollable="none"
          filterable="menu"
        >
          <ng-template kendoGridToolbarTemplate>
            <h3 class="mb-0 w-auto text-center">Requisitos</h3>
            <kendo-grid-spacer></kendo-grid-spacer>
            <button
              kendoGridAddCommand
              icon="plus"
              themeColor="success"
              (click)="abrirModalArgumento(modalArgumento, true, null, 0)"
            >
              Nuevo
            </button>
          </ng-template>
          <kendo-grid-column
            field="nombre"
            title="Requisito"
            [width]="100"
            [filterable]="true"
            headerClass="pg-header-grid justify-content-center"
          >
            <ng-template kendoGridCellTemplate let-dataItem>
              <span [innerHTML]="dataItem.nombre"></span>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column
            title="Acciones"
            [width]="100"
            headerClass="pg-header-grid justify-content-center text-center"
          >
            <ng-template
              kendoGridCellTemplate
              let-dataItem="dataItem"
              let-rowIndex="rowIndex"
            >
              <div class="row justify-content-center">
                <div kendoTooltip class="col-auto p-0 mx-1">
                  <button
                    kendoGridEditCommand
                    themeColor="warning"
                    icon="pencil"
                    title="Editar"
                    (click)="
                      abrirModalArgumento(
                        modalArgumento,
                        false,
                        dataItem,
                        rowIndex
                      )
                    "
                  ></button>
                </div>
                <div kendoTooltip class="col-auto p-0 mx-1">
                  <button
                    kendoGridRemoveCommand
                    themeColor="error"
                    icon="trash"
                    title="Eliminar"
                    (click)="eliminarArgumento(rowIndex)"
                  ></button>
                </div>
              </div>
            </ng-template>
          </kendo-grid-column>
        </kendo-grid>
      </div>
    </div>
    <loading [loading]="loaderModal"></loading>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button
        themeColor="primary"
        size="medium"
        icon="save"
        kendoButton
        (click)="guardar()"
      >
        {{ esNuevo ? "Nuevo" : "Actualizar" }}
      </button>
      <button
        themeColor="error"
        size="medium"
        icon="close"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
</ng-template>

<ng-template #modalArgumento let-modal>
  <div class="modal-header py-2 bg-light text-success text-center">
    <h2 class="modal-title mb-0 w-100" id="modal-basic-title">Argumento</h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <form
      class="k-form k-form-horizontal"
      [formGroup]="formResumenRequisitosCertificacionArgumento"
    >
      <kendo-editor
        formControlName="nombre"
        style="height: 100%; width: 100%"
        [pasteCleanupSettings]="{
          removeInvalidHTML: true,
          convertMsLists: true,
          removeMsClasses: true,
          removeMsStyles: true
        }"
      >
      </kendo-editor>
    </form>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button
        themeColor="primary"
        size="medium"
        icon="save"
        kendoButton
        (click)="guardarArgumento()"
      >
        {{ this.esNuevoArgumento ? "Nuevo" : "Actualizar" }}
      </button>
      <button
        themeColor="error"
        size="medium"
        icon="close"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
</ng-template>
