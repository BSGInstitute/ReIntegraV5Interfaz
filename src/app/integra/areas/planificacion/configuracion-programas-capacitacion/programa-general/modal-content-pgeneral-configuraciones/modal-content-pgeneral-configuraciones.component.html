<!-- #region Modal PgeneralPerfilContacto -->
<div class="modal-header py-2 bg-light text-dark">
  <h2 class="modal-title w-100 mb-0">
    Pre-requisitos, Beneficios, Motivación , Problemas del Cliente y Argumentos
    {{ nombrePgeneral }}
  </h2>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body px-4 ktt-datosPgeneral">
  <kendo-tabstrip [keepTabContent]="true">
    <!-- PREREQUISITOS -->
    <kendo-tabstrip-tab  [selected]="true">
      <ng-template kendoTabTitle>
        <span>Pre-Requisitos</span>
      </ng-template>
      <ng-template kendoTabContent *loadOnDemand>
        <!-- CONTENT -->
        <app-pg-pre-requisitos
          [pgeneralService]="pgeneralService"
        ></app-pg-pre-requisitos>
        <!-- CONTENT -->
      </ng-template>
    </kendo-tabstrip-tab>
    <!-- END PREREQUISITO -->
    <kendo-tabstrip-tab >
      <ng-template kendoTabTitle>
        <span>Beneficios</span>
      </ng-template>
      <ng-template kendoTabContent *loadOnDemand>
        <!-- CONTENT -->
        <app-pg-beneficios-configuracion
          [pgeneralService]="pgeneralService"
        ></app-pg-beneficios-configuracion>
        <!-- CONTENT -->
      </ng-template>
    </kendo-tabstrip-tab>

    <kendo-tabstrip-tab>
      <ng-template kendoTabTitle>
        <span>Factores de Motivación</span>
      </ng-template>
      <ng-template kendoTabContent *loadOnDemand>
        <!-- CONTENT -->
        <app-pg-factores-motivacion
          [pgeneralService]="pgeneralService"
        ></app-pg-factores-motivacion>
        <!-- CONTENT -->
      </ng-template>
    </kendo-tabstrip-tab>

    <kendo-tabstrip-tab>
      <ng-template kendoTabTitle>
        <span>Problemas del Cliente</span>
      </ng-template>
      <ng-template kendoTabContent *loadOnDemand>
        <!-- CONTENT -->
        <app-pg-problemas-cliente
          [pgeneralService]="pgeneralService"
        ></app-pg-problemas-cliente>
        <!-- CONTENT -->
      </ng-template>
    </kendo-tabstrip-tab>
    <kendo-tabstrip-tab>
      <ng-template kendoTabTitle>
        <span>Problemas del Cliente V2</span>
      </ng-template>
      <ng-template kendoTabContent *loadOnDemand>
        <!-- CONTENT -->
        <app-pg-problemas-cliente-v2
          [pgeneralService]="pgeneralService"
        ></app-pg-problemas-cliente-v2>
        <!-- CONTENT -->
      </ng-template>
    </kendo-tabstrip-tab>
    <kendo-tabstrip-tab>
      <ng-template kendoTabTitle>
        <span>Resumen de Requisitos de Certificación</span>
      </ng-template>
      <ng-template kendoTabContent *loadOnDemand>
        <!-- CONTENT -->
        <app-pg-resumen-requisitos-certificacion
          [pgeneralService]="pgeneralService"
        ></app-pg-resumen-requisitos-certificacion>
        <!-- CONTENT -->
      </ng-template>
    </kendo-tabstrip-tab>

    <kendo-tabstrip-tab>
      <ng-template kendoTabTitle>
        <span>Modelos de Certificados</span>
      </ng-template>
      <ng-template kendoTabContent *loadOnDemand>
        <!-- CONTENT -->
        <app-pg-modelos-certificados
          [pgeneralService]="pgeneralService"
        ></app-pg-modelos-certificados>
        <!-- CONTENT -->
      </ng-template>
    </kendo-tabstrip-tab>
    <kendo-tabstrip-tab >
      <ng-template kendoTabTitle>
        <span>Argumentos</span>
      </ng-template>
      <ng-template kendoTabContent *loadOnDemand>
        <!-- CONTENT -->
        <app-pg-presentacion-argumento
          [pgeneralService]="pgeneralService"
        ></app-pg-presentacion-argumento>
        <!-- CONTENT -->
      </ng-template>
    </kendo-tabstrip-tab>

    <!-- Argumentos de Motivacion (V2) -->
    <kendo-tabstrip-tab >
      <ng-template kendoTabTitle>
        <span>Argumentos de Motivacion</span>
      </ng-template>
      <ng-template kendoTabContent *loadOnDemand>
        <app-pg-garantia-confiabilidad
          [pgeneralService]="pgeneralService"
        ></app-pg-garantia-confiabilidad>
      </ng-template>
    </kendo-tabstrip-tab>

  </kendo-tabstrip>
</div>

<div class="modal-footer">
  <div class="k-form-buttons m-0">
    <button
      themeColor="error"
      size="medium"
      class="w-100"
      icon="cancel"
      kendoButton
      (click)="activeModal.dismiss('Cross click')"
    >
      Cancelar
    </button>
  </div>
</div>
