<!-- #region Modal PgeneralPerfilContacto -->
<div class="modal-header py-2 bg-light text-dark text-center">
  <h2 *ngIf="isNewPgeneral" class="modal-title w-100 mb-0">
    Datos del Programa General
  </h2>
  <h2 *ngIf="!isNewPgeneral" class="modal-title w-100 mb-0">
    Datos del Programa General: {{ dataItemPgeneral.nombre }}
  </h2>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body px-4 ktt-datosPgeneral">
  <kendo-tabstrip [keepTabContent]="true">
    <!-- DATOS GENERALES -->
    <kendo-tabstrip-tab [selected]="true">
      <ng-template kendoTabTitle>
        <span>DATOS GENERALES</span>
      </ng-template>
      <ng-template kendoTabContent *loadOnDemand>
        <!-- CONTENT -->
        <app-pg-datos-generales
          [pgeneralService]="pgeneralService"
        ></app-pg-datos-generales>
        <loading [loading]="loadingPgeneral"></loading>
        <!-- CONTENT -->
      </ng-template>
    </kendo-tabstrip-tab>
    <!-- END DATOS GENERALES -->
    <!-- PROYECTO APLICACION -->

      <ng-template kendoTabTitle>

<div class="modal-footer">
  <div class="k-form-buttons m-0">
    <button
      *ngIf="!isNewPgeneral"
      themeColor="primary"
      size="medium"
      class="w-100"
      icon="save"
      kendoButton
      (click)="actualizarPgeneral()"
      [disabled]="bloquearBtnActualizar || loadingPgeneral"
    >
      Actualizar
    </button>
    <button
      *ngIf="isNewPgeneral"
      themeColor="primary"
      size="medium"
      class="w-100"
      icon="save"
      kendoButton
      (click)="nuevoPgeneral()"
    >
      Nuevo
    </button>
    <button
      themeColor="error"
      size="medium"
      class="w-100"
      icon="cancel"
      kendoButton
      (click)="activeModal.dismiss('Cross click')"
    >
      Cancelar
    </button>
  </div>
</div>
<!-- #endregion PgeneralPerfilContacto-->
