<div class="pg-contenedor-tab container">
    <form [formGroup]="formFiltro" class="row g-3 align-items-center">
  
      <!-- Programa Específico -->
      <div class="col-md-6">
        <kendo-formfield orientation="horizontal" class="w-100">
          <label class="k-label me-2 text-nowrap">
            <span>Programa Específico</span>
          </label>
          <kendo-dropdownlist [data]="combosPEspecifico" textField="nombrePEspecifico" valueField="idPEspecifico"
            [defaultItem]="{ idPEspecifico: null, nombrePEspecifico: '<Seleccione>' }" [valuePrimitive]="true"
            formControlName="idPEspecifico" class="pg-dropDown w-100"
            [kendoDropDownFilter]="filterSettings"></kendo-dropdownlist>
        </kendo-formfield>
      </div>
    </form>
  </div>
  <br />
  <div class="d-flex justify-content-end">
    <button class="btn btn-success" (click)="generarReporte()">
      <i class="k-icon k-i-search"></i> Buscar
    </button>
  </div>
  <br />
  
<div class="content">
    <div class="row">
      <div class="col-12">
        <div class="card">
          <div class="card-header bg-color-material pb-0">
            <h2 class="text-white mb-2">Valoraciones</h2>
          </div>
          <div class="card-body p-4" id="grillaAgendaTab">
            <div class="col-12">
              <kendo-grid #kgridCronograma [kendoGridBinding]="gridValoracion.data" [loading]="gridValoracion.loading"
                [resizable]="true" filterable="menu" [sortable]="true" [pageSize]="10"
                [pageable]="{ pageSizes: [5, 10, 20] }">
                <!-- filterable="menu" -->
                <kendo-grid-column field="nombrePEspecifico" title="Nombre" [width]="200"
                  headerClass="justify-content-center">
                  <ng-template kendoGridFilterMenuTemplate let-filter let-column="column"
                    let-filterService="filterService">
                    <kendo-grid-string-filter-menu [column]="column" [filter]="filter" [filterService]="filterService"
                      [extra]="false" operator="contains">
                      <kendo-filter-contains-operator text="Contiene"></kendo-filter-contains-operator>
                    </kendo-grid-string-filter-menu>
                  </ng-template>
                </kendo-grid-column>
                <kendo-grid-column field="promedio1" title="Servicio al cliente" [width]="150"
                  headerClass="justify-content-center">
                </kendo-grid-column>
                <kendo-grid-column field="promedio2" title="Docente y metodología" [width]="180"
                  headerClass="justify-content-center">
                </kendo-grid-column>
                <kendo-grid-column field="promedio3" title="Calidad de materiales y contenido" [width]="200"
                  headerClass="justify-content-center">
                </kendo-grid-column>
                <kendo-grid-column field="promedio4" title="Planificación y organización" [width]="200"
                  headerClass="justify-content-center">
                </kendo-grid-column>
                <kendo-grid-column field="promedio5" title="Evaluación general" [width]="160"
                  headerClass="justify-content-center">
                </kendo-grid-column>
                <kendo-grid-column field="promedioTotal" title="Promedio Total" [width]="160"
                headerClass="justify-content-center">
              </kendo-grid-column>
                <kendo-grid-column field="nroEncuesta" title="Nro de Reseñas" [width]="160"
                  headerClass="justify-content-center">
                </kendo-grid-column>
                <kendo-grid-column
                [style]="{
                  'text-align': 'center'
                }"
                headerClass="justify-content-center"
                field="visiblePw"
                title="Visible"
                [width]="300"
                [filterable]="false"
                
              >
                <ng-template kendoGridCellTemplate let-dataItem>
                  <kendo-switch
                    [checked]="dataItem.visiblePw"
                    (valueChange)="toggleEstado(dataItem, $event)"
                    onLabel="Visible"
                    offLabel="Inactivo"
                  >
                  </kendo-switch>
                </ng-template>
              </kendo-grid-column>
  
              </kendo-grid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
