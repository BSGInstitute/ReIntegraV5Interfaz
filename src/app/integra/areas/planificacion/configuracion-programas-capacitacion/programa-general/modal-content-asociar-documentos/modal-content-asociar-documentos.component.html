<div class="modal-header py-2 bg-light text-dark text-center">
  <h2 class="modal-title w-100 mb-0">
    Asociar documentos a: {{ dataItemPgeneral.nombre }}
  </h2>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body">
  <div class="card">
    <div class="card-body">
      <div class="w-100">
        <div class="row">
          <div class="col-sm-4 col-md col-lg pg-kgrid">
            <kendo-grid
              [kendoGridBinding]="gridDocumentosNoAsociados.data"
              [selectable]="true"
              kendoGridSelectBy="idDocumentos"
              [(selectedKeys)]="mySelectionNoAsociados"
              scrollable="scrollable"
              [pageable]="{
                buttonCount: 5,
                info: true,
                type: 'numeric',
                pageSizes: true,
                previousNext: true,
                position: 'bottom'
              }"
              filterable="menu"
              [pageSize]="10"
            >
              <ng-template kendoGridToolbarTemplate>
                <h3 class="mb-0 w-auto text-center">Documentos No Asociados</h3>
              </ng-template>
              <ng-template
                kendoPagerTemplate
                let-totalPages="totalPages"
                let-currentPage="currentPage"
                class="k-pager k-grid-pager ng-star-inserted"
              >
                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                <kendo-pager-numeric-buttons
                  [buttonCount]="3"
                ></kendo-pager-numeric-buttons>
                <kendo-pager-next-buttons></kendo-pager-next-buttons>
                <kendo-pager-input></kendo-pager-input>
                <kendo-pager-info></kendo-pager-info>
              </ng-template>
              <kendo-grid-column
                field="nombre"
                title="Nombre"
                [width]="200"
                headerClass="pg-header-grid justify-content-center"
              ></kendo-grid-column>
            </kendo-grid>
          </div>
          <div
            class="col-sm-auto col-md-auto col-md-auto d-flex align-items-center px-0"
          >
            <div class="row">
              <div class="col-12">
                <div class="row my-2">
                  <div class="col">
                    <button
                      kendoButton
                      themeColor="tertiary"
                      size="large"
                      class="py-1"
                      title="right"
                      [disabled]="loader"
                      (click)="asociarDocumento()"
                    >
                      <fa-icon
                        [icon]="['fas', 'circle-chevron-right']"
                        style="font-size: 24px"
                      ></fa-icon>
                    </button>
                  </div>
                </div>
                <div class="row my-2">
                  <div class="col">
                    <button
                      kendoButton
                      themeColor="tertiary"
                      size="large"
                      class="py-1"
                      title="left"
                      [disabled]="loader"
                      (click)="desasociarDocumento()"
                    >
                      <fa-icon
                        [icon]="['fas', 'circle-chevron-left']"
                        style="font-size: 24px"
                      ></fa-icon>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-md col-lg pg-kgrid">
            <kendo-grid
              [kendoGridBinding]="gridDocumentosAsociados.data"
              [selectable]="true"
              kendoGridSelectBy="idDocumentos"
              [(selectedKeys)]="mySelectionAsociados"
              [pageable]="{
                buttonCount: 5,
                info: true,
                type: 'numeric',
                pageSizes: true,
                previousNext: true,
                position: 'bottom'
              }"
              filterable="menu"
              [pageSize]="10"
            >
              <ng-template kendoGridToolbarTemplate>
                <h3 class="mb-0 w-auto text-center">Documentos Asociados</h3>
              </ng-template>
              <ng-template
                kendoPagerTemplate
                let-totalPages="totalPages"
                let-currentPage="currentPage"
                class="k-pager k-grid-pager ng-star-inserted"
              >
                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                <kendo-pager-numeric-buttons
                  [buttonCount]="3"
                ></kendo-pager-numeric-buttons>
                <kendo-pager-next-buttons></kendo-pager-next-buttons>
                <kendo-pager-input></kendo-pager-input>
                <kendo-pager-info></kendo-pager-info>
              </ng-template>
              <kendo-grid-column
                field="nombre"
                title="Nombre"
                [width]="200"
                headerClass="pg-header-grid justify-content-center"
              ></kendo-grid-column>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
  <loading [loading]="loader"></loading>
</div>
<div class="modal-footer">
  <div class="k-form-buttons m-0">
    <button
      themeColor="primary"
      size="medium"
      icon="save"
      kendoButton
      [disabled]="loader"
      (click)="guardarDocumentosAsociados()"
    >
      Asociar Documentos
    </button>
    <button
      themeColor="error"
      size="medium"
      icon="cancel"
      kendoButton
      (click)="activeModal.dismiss('Cross click')"
    >
      Cancelar
    </button>
  </div>
</div>
<!-- #endregion PgeneralAsociarPrograma-->
