<!-- #region Modal PgeneralPerfilContacto -->
<div class="modal-header">
  <h2 class="modal-title w-100 mb-0 fw-bold">Modelo Predictivo</h2>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body px-4 k-form k-form-horizontal"></div>
<div class="modal-footer">
  <div class="k-form-buttons m-0">
    <button
      themeColor="error"
      size="medium"
      class="w-100"
      icon="cancel"
      kendoButton
      (click)="activeModal.dismiss('Cross click')"
    >
      Cancelar
    </button>
  </div>
</div>
<!-- #endregion PgeneralPerfilContacto-->
