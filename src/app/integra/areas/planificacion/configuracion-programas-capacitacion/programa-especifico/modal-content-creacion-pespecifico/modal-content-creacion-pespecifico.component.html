<!-- #region Modal Pespecifico -->
<div class="modal-header bg-light py-2">
  <h2 class="modal-title w-100 mb-0 text-center">Datos del Programa Especifico</h2>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body">
  <div class="row">
    <div class="col-12 k-form k-form-horizontal">
      <form [formGroup]="formPespecifico">
        <div class="row my-2">
          <div class="col-sm-12 col-md-10">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start">
                <span
                    >Programa General<span class="text-danger fw-bold"> *</span></span
                  >
              </label>
              <kendo-dropdownlist
                [data]="combosModulo.programaGeneral"
                textField="nombre"
                valueField="id"
                formControlName="idPgeneral"
                [valuePrimitive]="true"
                [defaultItem]="{ id: null, nombre: '<Seleccione>' }"
                [kendoDropDownFilter]="filterSettings"
              ></kendo-dropdownlist>
              <kendo-formerror>Seleccione un Programa General</kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-sm-12 col-md-10">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start">
                <span
                    >Programa Especifico<span class="text-danger fw-bold"> *</span></span
                  >
              </label>
              <kendo-textbox
                formControlName="nombrePespecifico"
                placeholder="<Programa Especifico>"
                [clearButton]="true"
                inputValidSpaceDir
              ></kendo-textbox>
              <kendo-formerror>Ingrese el nombre de programa especifico</kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start">
                <span
                    >Centro Costo<span class="text-danger fw-bold"> *</span></span
                  >
              </label>
              <kendo-dropdownlist
                [data]="centroCostoCreacion"
                textField="nombre"
                valueField="id"
                formControlName="idCentroCosto"
                [valuePrimitive]="true"
                [kendoDropDownFilter]="filterSettings"
              ></kendo-dropdownlist>
              <kendo-formerror>Seleccione un Centro de Costo</kendo-formerror>
            </kendo-formfield>
          </div>
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start">
                <span
                    >Estado<span class="text-danger fw-bold"> *</span></span
                  >
              </label>
              <kendo-dropdownlist
                [data]="combosModulo.estadoPEspecifico"
                textField="nombre"
                valueField="id"
                formControlName="idEstado"
                [valuePrimitive]="true"
                [defaultItem]="{ id: null, nombre: '<Seleccione>' }"
                [kendoDropDownFilter]="filterSettings"
              ></kendo-dropdownlist>
              <kendo-formerror>Seleccione un Estado</kendo-formerror>
            </kendo-formfield>
          </div>
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start">
                <span
                    >Origen<span class="text-danger fw-bold"> *</span></span
                  >
              </label>
              <kendo-dropdownlist
                [data]="combosModulo.origen"
                textField="nombre"
                valueField="id"
                formControlName="idOrigen"
                [valuePrimitive]="true"
                [defaultItem]="{ id: null, nombre: '<Seleccione>' }"
                [kendoDropDownFilter]="filterSettings"
              ></kendo-dropdownlist>
              <kendo-formerror>Seleccione un Origen</kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label
                [for]="codigo"
                class="k-label pt-0 d-flex align-items-start text-start"
              >
                <span
                    >Codigo<span class="text-danger fw-bold"> *</span></span
                  >
              </label>
              <kendo-textbox
                #codigo
                formControlName="codigo"
                placeholder="<Codigo>"
                inputValidSpaceDir
              ></kendo-textbox>
              <kendo-formerror>Ingrese un Codigo</kendo-formerror>
            </kendo-formfield>
          </div>
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label
                [for]="codigoBanco"
                class="k-label pt-0 d-flex align-items-start text-start"
              >
                <span
                    >Codigo Banco<span class="text-danger fw-bold"> *</span></span
                  >
              </label>
              <kendo-textbox
                #codigoBanco
                formControlName="codigoBanco"
                placeholder="<CodigoBanco>"
                inputValidSpaceDir
              ></kendo-textbox>
              <kendo-formerror>Ingrese un Codigo de Banco</kendo-formerror>
            </kendo-formfield>
          </div>
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start">
                <span
                    >Modalidad<span class="text-danger fw-bold"> *</span></span
                  >
              </label>
              <kendo-dropdownlist
                [data]="combosModulo.modalidad"
                textField="nombre"
                valueField="id"
                formControlName="modalidad"
                [valuePrimitive]="true"
                [defaultItem]="{ id: null, nombre: '<Seleccione>' }"
              ></kendo-dropdownlist>
              <kendo-formerror>Seleccione una modalidad</kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2">
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start">
                Duracion<br />
                (Horas)
              </label>
              <kendo-numerictextbox
                formControlName="duracion"
                [min]="0"
                format="n0"
              >
              </kendo-numerictextbox>
            </kendo-formfield>
          </div>
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start">
                Tipo Carrera
              </label>
              <kendo-dropdownlist
                [data]="tipoCarrera"
                textField="nombre"
                valueField="id"
                [valuePrimitive]="true"
                formControlName="idTipoProgramaCarrera"
                [kendoDropDownFilter]="filterSettings"
                [defaultItem]="{ id: null, nombre: '<Seleccione>' }"
              ></kendo-dropdownlist>
            </kendo-formfield>
          </div>
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label
                [for]="checkCursoIndividual"
                class="k-label pt-0 d-flex align-items-start text-start"
              >
                Curso Individual
              </label>
              <input
                #checkCursoIndividual
                formControlName="esCursoIndividual"
                type="checkbox"
                kendoCheckBox
                class="shadow"
              />
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2" *ngIf="this.controlesFormPespecifico.showCiudad">
          <div class="col-sm-12 col-md-8">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start">
                Ciudad
              </label>
              <kendo-dropdownlist
                [data]="combosModulo.locacionTroncal"
                textField="nombre"
                valueField="idCiudad"
                formControlName="ciudad"
                [kendoDropDownFilter]="filterSettings"
                [defaultItem]="{ idCiudad: null, nombre: '<Seleccione>' }"
              ></kendo-dropdownlist>
            </kendo-formfield>
          </div>
        </div>

        <div class="row my-2">
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start" for="resumenClase">
                Resumen de clase Activo
              </label>
              <input
                class="form-check-input ms-2"
                style="margin-top: 0;"
                type="checkbox"
                id="resumenClase"
                formControlName="resumenClaseActivo"
                kendoCheckBox />
            </kendo-formfield>
          </div>
          <div class="col-sm-12 col-md-4">
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start" for="tutorVirtual">
                Tutor Virtual Activo
              </label>
              <input
                class="form-check-input ms-2"
                style="margin-top: 0;"
                type="checkbox"
                id="tutorVirtual"
                formControlName="tutorVirtualActivo"
                kendoCheckBox />
            </kendo-formfield>
          </div>
        </div>

        <!-- Curso adicional-->
        <div class="row my-2">
          <div
            *ngIf="formPespecifico.get('esCursoIndividual').value == true"
            class="col-sm-12 col-md-4"
          >
            <kendo-formfield orientation="horizontal">
              <label
                [for]="checkCursoIndividual"
                class="k-label pt-0 d-flex align-items-start text-start"
              >
                Tiene Curso Adicional
              </label>
              <input
                #checkCursoIndividual
                formControlName="tieneCursoAdicional"
                type="checkbox"
                kendoCheckBox
                class="shadow"
              />
            </kendo-formfield>
          </div>
          <div
            *ngIf="formPespecifico.get('tieneCursoAdicional').value == true"
            class="col-sm-12 col-md-12"
          >
            <kendo-formfield orientation="horizontal">
              <label class="k-label pt-0 d-flex align-items-start text-start">
                <span>Programa Adicional</span>
              </label>
              <kendo-dropdownlist
                [data]="pEspecificosAdicional"
                textField="nombre"
                valueField="id"
                formControlName="idPespecificoAdicional"
                [defaultItem]="{ id: null, nombre: '<Seleccione>' }"
                [valuePrimitive]="true"
                [kendoDropDownFilter]="filterSettings"
              ></kendo-dropdownlist>
            </kendo-formfield>
          </div>
        </div>
        <!-- curso adicional -->

        <div class="row mt-3">
          <div class="col-sm-12 col-md-12">
            <fieldset class="k-form-fieldset">
              <legend class="k-form-legend">Url Cronograma</legend>
              <div
                *ngIf="controlesFormPespecifico.showUrlDocumentoCronograma"
                class="row d-flex justify-content-md-end"
              >
                <div class="col-md-10">
                  <kendo-formfield orientation="horizontal">
                    <label
                      class="k-label pt-0 d-flex align-items-start text-start"
                    >
                      Perú/Colombia
                    </label>
                    <kendo-textbox
                      formControlName="urlDocumentoCronograma"
                      placeholder="<Url Documento Cronograma>"
                      inputValidSpaceDir
                    ></kendo-textbox>
                  </kendo-formfield>
                </div>
              </div>
              <div
                *ngIf="controlesFormPespecifico.showUrlDocumentoCronogramaM"
                class="row d-flex justify-content-md-end"
              >
                <div class="col-md-10">
                  <kendo-formfield orientation="horizontal">
                    <label
                      class="k-label pt-0 d-flex align-items-start text-start"
                    >
                      México
                    </label>
                    <kendo-textbox
                      formControlName="urlDocumentoCronogramaM"
                      placeholder="<Url Documento Cronograma>"
                      inputValidSpaceDir
                    ></kendo-textbox>
                  </kendo-formfield>
                </div>
              </div>
              <div
                *ngIf="controlesFormPespecifico.showUrlDocumentoCronogramaB"
                class="row d-flex justify-content-md-end"
              >
                <div class="col-md-10">
                  <kendo-formfield orientation="horizontal">
                    <label
                      class="k-label pt-0 d-flex align-items-start text-start"
                    >
                      Bolivia
                    </label>
                    <kendo-textbox
                      formControlName="urlDocumentoCronogramaB"
                      placeholder="<Url Documento Cronograma>"
                      inputValidSpaceDir
                    ></kendo-textbox>
                  </kendo-formfield>
                </div>
              </div>
              <div
                *ngIf="controlesFormPespecifico.showUrlDocumentoCronogramaI"
                class="row d-flex justify-content-md-end"
              >
                <div class="col-md-10">
                  <kendo-formfield orientation="horizontal">
                    <label
                      class="k-label pt-0 d-flex align-items-start text-start"
                    >
                      Internacional
                    </label>
                    <kendo-textbox
                      formControlName="urlDocumentoCronogramaI"
                      placeholder="<Url Documento Cronograma>"
                      inputValidSpaceDir
                    ></kendo-textbox>
                  </kendo-formfield>
                </div>
              </div>
              <div class="row mt-2">
                <div class="d-flex justify-content-end" style="width: 542px">
                  <button
                    themeColor="primary"
                    icon="file"
                    kendoButton
                    (click)="generarUrlCronograma()"
                  >
                    Generar Cronograma Modulo
                  </button>
                </div>
              </div>
            </fieldset>
          </div>
        </div>
        <div class="row mt-2">
          <div class="col-sm-12 col-md-12">
            <fieldset class="k-form-fieldset">
              <legend class="k-form-legend">
                Url Cronograma(Todos los Grupos)
              </legend>
              <div
                *ngIf="
                  controlesFormPespecifico.showUrlDocumentoCronogramaGrupos
                "
                class="row d-flex justify-content-md-end"
              >
                <div class="col-md-10">
                  <kendo-formfield orientation="horizontal">
                    <label
                      class="k-label pt-0 d-flex align-items-start text-start"
                    >
                      Perú/Colombia
                    </label>
                    <kendo-textbox
                      formControlName="urlDocumentoCronogramaGrupos"
                      placeholder="<Url Documento Cronograma>"
                      inputValidSpaceDir
                    ></kendo-textbox>
                  </kendo-formfield>
                </div>
              </div>
              <div
                *ngIf="
                  controlesFormPespecifico.showUrlDocumentoCronogramaGruposM
                "
                class="row d-flex justify-content-md-end"
              >
                <div class="col-md-10">
                  <kendo-formfield orientation="horizontal">
                    <label
                      class="k-label pt-0 d-flex align-items-start text-start"
                    >
                      México
                    </label>
                    <kendo-textbox
                      formControlName="urlDocumentoCronogramaGruposM"
                      placeholder="<Url Documento Cronograma>"
                      inputValidSpaceDir
                    ></kendo-textbox>
                  </kendo-formfield>
                </div>
              </div>
              <div
                *ngIf="
                  controlesFormPespecifico.showUrlDocumentoCronogramaGruposB
                "
                class="row d-flex justify-content-md-end"
              >
                <div class="col-md-10">
                  <kendo-formfield orientation="horizontal">
                    <label
                      class="k-label pt-0 d-flex align-items-start text-start"
                    >
                      Bolivia
                    </label>
                    <kendo-textbox
                      formControlName="urlDocumentoCronogramaGruposB"
                      placeholder="<Url Documento Cronograma>"
                      inputValidSpaceDir
                    ></kendo-textbox>
                  </kendo-formfield>
                </div>
              </div>
              <div
                *ngIf="
                  controlesFormPespecifico.showUrlDocumentoCronogramaGruposI
                "
                class="row mt-1 d-flex justify-content-md-end"
              >
                <div class="col-md-10">
                  <kendo-formfield orientation="horizontal">
                    <label
                      class="k-label pt-0 d-flex align-items-start text-start"
                    >
                      Internacional
                    </label>
                    <kendo-textbox
                      formControlName="urlDocumentoCronogramaGruposI"
                      placeholder="<Url Documento Cronograma>"
                      inputValidSpaceDir
                    ></kendo-textbox>
                  </kendo-formfield>
                </div>
              </div>
              <div class="row mt-2">
                <div class="d-flex justify-content-end" style="width: 609px">
                  <button
                    themeColor="primary"
                    icon="file"
                    kendoButton
                    (click)="generarUrlCronogramaGrupal()"
                  >
                    Generar Cronograma(Todos los grupos)
                  </button>
                </div>
              </div>
            </fieldset>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="modal-footer">
  <div class="k-form-buttons m-0 justify-content-end">
    <button
      *ngIf="isNewPespecifico"
      themeColor="primary"
      icon="save"
      kendoButton
      (click)="insertarPespecifico()"
    >
      Crear Nuevo
    </button>
    <button
      *ngIf="!isNewPespecifico"
      themeColor="tertiary"
      icon="save"
      kendoButton
      (click)="actualizarPespecifico()"
    >
      Actualizar
    </button>
    <button
      themeColor="error"
      icon="cancel"
      kendoButton
      (click)="activeModal.dismiss('Cross click')"
    >
      Cancelar
    </button>
  </div>
</div>
<loading [loading]="loadingCreacionPespecifico"></loading>
<!-- #endregion Modal Pespecifico-->
