<div class="contenedor" #revisaraprobarmaterial id="revisaraprobarmaterial">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header pb-0 bg-color-material">
          <h2 class="mb-2 text-white text-center">
            Filtros programa especifico

          </h2>
        </div>
        <div class="card-body p-4 k-form k-form-horizontal">
          <div class="row mt-1">
            <legend class="col fw-bold fs-6">Búsqueda por:</legend>
          </div>
          <form [formGroup]="formFiltro">
            <div class="row">
              <div class="col-sm-12 col-md-6">
                <div class="row">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        Área
                      </label>
                      <kendo-multiselect
                        [data]="dataArea"
                        textField="nombre"
                        valueField="id"
                        formControlName="idsAreas"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings"
                        (valueChange)="cargarSubAreas($event)"
                      ></kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        Sub Área
                      </label>
                      <kendo-multiselect
                        [data]="subAreasCapacitacion"
                        textField="nombre"
                        valueField="id"
                        formControlName="idsSubAreas"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings"
                        [disabled]="isDisabledSubArea"
                        (valueChange)="cargarPGenerales($event)"
                      ></kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        Programa General
                      </label>
                      <kendo-multiselect
                        [data]="programasGeneralP"
                        textField="nombre"
                        valueField="id"
                        formControlName="idsProgramasGenerales"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings"
                        [disabled]="isDisabledPGeneral"
                        (valueChange)="cargarPEspecificos($event)"
                      ></kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        Programa Específico
                      </label>
                      <kendo-multiselect
                        [data]="programasEspecifico"
                        textField="nombre"
                        valueField="id"
                        formControlName="idsProgramasEspecificoPadreIndividual"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings"
                        [disabled]="isDisabledPEspecifico"
                        (valueChange)="cargarPEspecificoCurso($event)"
                      ></kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        Curso
                      </label>
                      <kendo-multiselect
                        [data]="programaEspecificoCurso"
                        textField="nombre"
                        valueField="id"
                        formControlName="idsProgramasEspecificoCurso"
                        [valuePrimitive]="true"
                        [disabled]="isDisabledPEspecificoCurso"
                        [kendoDropDownFilter]="filterSettings"
                      ></kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>
              </div>
              <div class="col-sm-12 col-md-6">
                <div class="row">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        Grupo
                      </label>
                      <kendo-multiselect
                        [data]="dataGrupo"
                        [filterable]="true"
                        textField="nombre"
                        valueField="id"
                        formControlName="idsGrupos"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings"
                      ></kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        Estado Programa Específico
                      </label>
                      <kendo-multiselect
                        [data]="dataEstadoPEspecifico"
                        [filterable]="true"
                        textField="nombre"
                        valueField="id"
                        formControlName="idsEstadosPEspecifico"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings"
                      ></kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        Ciudad
                      </label>
                      <kendo-multiselect
                        [data]="dataCiudadBS"
                        [filterable]="true"
                        textField="nombre"
                        valueField="id"
                        formControlName="idsCiudades"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings"
                      ></kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        Modalidad
                      </label>
                      <kendo-multiselect
                        [data]="dataModalidad"
                        [filterable]="true"
                        textField="nombre"
                        valueField="id"
                        formControlName="idsModalidades"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings"
                      ></kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>

              </div>
            </div>
          </form>
        </div>
        <div class="card-footer py-3">
          <div class="k-form-buttons m-0 justify-content-end">
            <button
              themeColor="primary"
              kendoButton
              icon="search"
              themeColor="success"
              (click)="generarReporte()"


            >
              Buscar
            </button>
          </div>
        </div>

      </div>
      <p class="text-verde">(*) El recuadro que se visualiza solo mostrará los materiales cuya version sea material impreso para alumnos y que haya sido enviado al proveedor.
      </p>
    </div>

  </div>

  <div class="row mt-2">
    <div class="col-12">
      <div class="card">
        <div class="card-header pb-0 bg-color-material">
          <div class="row d-flex justify-content-between">
            <div class="col">
              <h2 class="mb-2 text-white text-center">Validación de criterios del material</h2>
            </div>
          </div>
        </div>
        <br />




        <div class="card-body">
          <kendo-grid
            [kendoGridBinding]="gridRevisarAprobarMaterial.data"
            [loading]="gridRevisarAprobarMaterial.loading"
            [selectable]="true"
            [sortable]="true"
            [resizable]="true"
            [pageable]="{
              buttonCount: 5,
              info: true,
              type: 'numeric',
              pageSizes: true,
              previousNext: true,
              position: 'bottom'
            }"
            [skip]="gridRevisarAprobarMaterial.gridState.skip"
            [pageSize]="gridRevisarAprobarMaterial.gridState.take"
            (dataStateChange)="gridRevisarAprobarMaterial.onStateChange($event)"
            filterable="menu"
          >
            <ng-template
              kendoPagerTemplate
              let-totalPages="totalPages"
              let-currentPage="currentPage"
            >
              <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
              <kendo-pager-numeric-buttons
                [buttonCount]="5"
              ></kendo-pager-numeric-buttons>
              <kendo-pager-next-buttons></kendo-pager-next-buttons>
              <kendo-pager-input></kendo-pager-input>
              <kendo-pager-info></kendo-pager-info>
              <kendo-pager-page-sizes
                [pageSizes]="cantidadItems"
              ></kendo-pager-page-sizes>
              <div class="w-100 text-end">
                <button
                  kendoButton
                  icon="reload"
                  fillMode="flat"
                  themeColor="secondary"

                ></button>
              </div>
            </ng-template>
            <kendo-grid-column
              field="nombrePEspecifico"
              title="Curso"
              [width]="200"
              headerClass="justify-content-center"
              [editable]="false"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              field="grupo"
              title="Grupo"
              [width]="80"
              headerClass="justify-content-center"
              [editable]="false"
            >
              <ng-template kendoGridCellTemplate let-dataItem>
                <div class="text-center">
                  {{ dataItem.grupo }}
                </div>
              </ng-template>
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>


            <kendo-grid-column
              field="materialTipo"
              title="Material "
              [width]="100"
              headerClass="justify-content-center"
              [editable]="false"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>

            <kendo-grid-column
              field=""
              title="Material no Borroso"
              [width]="100"
              headerClass="justify-content-center"
              [editable]="false"
            >
              <ng-template kendoGridCellTemplate let-dataItem>
                <div class="text-center">
                  {{ dataItem.nombreMaterialEstado }}
                </div>
              </ng-template>
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              field=""
              title="Numeracion Correcta"
              [width]="180"
              headerClass="justify-content-center"
              [editable]="false"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>

            <kendo-grid-command-column
              title="Acciones"
              [width]="180"
              headerClass="justify-content-center"
            >
              <ng-template kendoGridCellTemplate let-dataItem>
                <div class="text-center">
                  <a [href]="dataItem.urlArchivo" target="_blank">
                    <button
                      kendoButton
                      kendoTooltip
                      themeColor="info"
                      fillMode="solid"
                      icon="check"
                      class="mx-1"
                      container="body"
                      placement="top"
                      title="Descargar material"
                    ></button>
                  </a>
                  <button
                    kendoButton
                    kendoTooltip
                    themeColor="warning"
                    fillMode="solid"
                    icon="eye"
                    class="mx-1"
                    container="body"
                    placement="top"
                    title="Aprobar versión material"

                  ></button>
                  <button
                    kendoButton
                    kendoTooltip
                    themeColor="error"
                    fillMode="solid"
                    icon="cancel"
                    class="mx-1"
                    container="body"
                    placement="top"
                    title="Desaprobar versión material"

                  ></button>
                </div>
              </ng-template>
            </kendo-grid-command-column>
          </kendo-grid>
        </div>
      </div>
    </div>
  </div>
</div>
