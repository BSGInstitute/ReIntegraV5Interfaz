<div class="contenedor">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">(C) Criterios de evaluación de programas específicos</h3>
        </div>
        <div class="card-body p-4" style="margin-bottom: -50px;">
          <div class="row d-flex justify-content-center mb-4">
            <div class="col-12">
              <div class="card">
                <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Filtro de búsqueda</h3>
                </div>
                <div class="card-body k-form k-form-horizontal">
                  <div style="font-size: 15px;font-weight: bold;">
                    Búsqueda por:
                  </div>
                  <form [formGroup]="formFiltroBusqueda">
                    <div class="row">
                      <div class="col-12 col-md-6">
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdArea" class="k-label">
                                <span>Area: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdArea
                                formControlName="IdArea"
                                [data]="AreasFiltro"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                                [disabled]="!Filtro1"
                                (filterChange)="filterAreas($event)"
                                (valueChange)="changeArea($event)"
                                (removeTag)="removeArea($event)"
                                [kendoDropDownFilter]="filterSettings"
                                [clearButton]="false"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdPGeneral" class="k-label">
                                <span>Programa General: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdPGeneral
                                formControlName="IdPGeneral"
                                [data]="ProgramaGeneralFiltro"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                                [disabled]="!Filtro1"
                                [kendoDropDownFilter]="filterSettings"
                                (valueChange)="changePGeneral($event)"
                                (removeTag)="removePGeneral($event)"
                                [clearButton]="false"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdCentroCosto" class="k-label">
                                <span>Centro de Costo: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdCentroCosto
                                formControlName="IdCentroCosto"
                                [data]="CentroCostoFiltro"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                                [disabled]="!Filtro1"
                                [kendoDropDownFilter]="filterSettings"
                                [clearButton]="false"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="CodigoBs" class="k-label">
                                <span>Ciudad: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #CodigoBs
                                formControlName="CodigoBs"
                                [data]="filtrosGenerales.listaCiudad"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                                [disabled]="!Filtro1"
                                [kendoDropDownFilter]="filterSettings"
                                [clearButton]="false"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                      </div>
                      <div class="col-12 col-md-6">
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdSubArea" class="k-label">
                                <span>Subárea: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdSubArea
                                formControlName="IdSubArea"
                                [data]="SubAreasFiltro"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                                [disabled]="!Filtro1"
                                [kendoDropDownFilter]="filterSettings"
                                (valueChange)="changeSubArea($event)"
                                (removeTag)="removeSubArea($event)"
                                [clearButton]="false"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdProgramaEspecifico" class="k-label">
                                <span>Programa Específico: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdProgramaEspecifico
                                formControlName="IdProgramaEspecifico"
                                [data]="ProgramaEspecificoFiltro"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                                [disabled]="!Filtro1"
                                [kendoDropDownFilter]="filterSettings"
                                (valueChange)="changePEspecifico($event)"
                                (removeTag)="removePEspecifico($event)"
                                [clearButton]="false"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdEstadoPEspecifico" class="k-label">
                                <span>Estado Programa Específico: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdEstadoPEspecifico
                                formControlName="IdEstadoPEspecifico"
                                [data]="filtrosGenerales.listaEstadoProgramaEspecifico"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                                [disabled]="!Filtro1"
                                [kendoDropDownFilter]="filterSettings"
                                [clearButton]="false"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
                <div class="card-body k-form k-form-horizontal">
                  <div style="font-size: 15px;font-weight: bold;">
                    Búsqueda por centro de costo:
                  </div>
                  <form [formGroup]="formFiltroBusqueda">
                    <div class="row">
                      <div class="col-12 col-md-6">
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal" >
                              <label [for]="IdCentroCostoD" class="k-label">
                                <span>Centro de Costo: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdCentroCostoD
                                formControlName="IdCentroCostoD"
                                [data]="filtrosGenerales.listaCentroCostoPersonalizado"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                                [disabled]="!Filtro2"
                                (valueChange)="ActualizarFiltroCentroCosto($event)"
                                [kendoDropDownFilter]="filterSettings"
                                [clearButton]="false"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
                <div class="card-footer">
                  <div class="row">
                    <div class="col-12 d-flex justify-content-end">
                      <button
                        class="btn btn-sm btn-primary"
                        (click)="BuscarFiltros()"
                      >
                        Buscar
                        <fa-icon
                          [icon]="['fas', 'search']"
                          class="fa-lg"
                        ></fa-icon>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="card-body p-4">
          <div class="row d-flex justify-content-center mb-4">
            <div class="col-12">
              <div class="card">
                <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Programas Específicos</h3>
                </div>
                <div class="card-body p-4">
                  <div class="row">
                    <div class="col">
                      <kendo-grid
                        [kendoGridBinding]="gridEsquemasProgramaEspecifico.view.data"
                        [loading]="gridEsquemasProgramaEspecifico.loading"
                        (remove)="gridEsquemasProgramaEspecifico.removeHandler($event)"
                        (dataStateChange)="gridEsquemasProgramaEspecifico.onStateChange($event)"
                        [filterable]="gridEsquemasProgramaEspecifico.filterable"
                        [sortable]="gridEsquemasProgramaEspecifico.sortable"
                        [resizable]="gridEsquemasProgramaEspecifico.resizable"
                        [pageable]="gridEsquemasProgramaEspecifico.pageable"
                        [skip]="gridEsquemasProgramaEspecifico.gridState.skip"
                        [pageSize]="gridEsquemasProgramaEspecifico.gridState.take"
                        [sort]="gridEsquemasProgramaEspecifico.gridState.sort"
                        [filterable]="true"
                      >
                        <kendo-grid-column
                          *ngFor="let item of gridEsquemasProgramaEspecifico.columns"
                          [field]="item.field"
                          [title]="item.title"
                          [filterable]="item.filterable"
                          [headerClass]="item.headerClass"
                          [width]="item.width"
                        >
                          <ng-template
                            kendoGridFilterMenuTemplate
                            let-filter
                            let-column="column"
                            let-filterService="filterService"
                          >
                            <kendo-grid-string-filter-menu
                              [column]="column"
                              [filter]="filter"
                              [filterService]="filterService"
                              [extra]="false"
                              operator="eq"
                            >
                              <kendo-filter-eq-operator
                                text="Igual a"
                              ></kendo-filter-eq-operator>
                            </kendo-grid-string-filter-menu>
                          </ng-template>
                        </kendo-grid-column>
                        <kendo-grid-command-column
                        title="Configurar"
                        [width]="100"
                        [headerClass]="'header-grid-integra'"
                        >
                        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                          <div class="w-100 d-flex justify-content-center">
                            <button
                            kendoButton
                            themeColor="primary"
                            fillMode="solid"
                            rounded="large"
                            size="large"
                            class="p-2 me-1 ms-1"
                            container="body"
                            (click)="abrirModalConfigurarEsquema(dataItem)"
                            placement="top"
                            ngbTooltip="Configurar"
                            >
                            <span class="k-icon k-i-link-add k-icon-20"></span>
                            </button>
                          </div>
                        </ng-template>
                      </kendo-grid-command-column>

                      </kendo-grid>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<ng-template #modalRegistroEsquema let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title">
      Configuración de Esquema de Evaluación
    </h3>
    <button
      type="button"
      class="btn-close btn-close-white"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="row">
      <div class="col-12">
        <form class="k-form k-form-horizontal" [formGroup]="formRegistroEsquema">
          <fieldset class="k-form-fieldset">
            <div class="row">
              <div class="col-12 col-md-12" style="margin-bottom: 20px;">
                <div class="col-sm-12 col-md-12">
                  <kendo-formfield orientation="horizontal">
                    <label [for]="programaEspecifico" class="k-label" style="align-items: baseline;text-align: left;">
                      <span>Programa Específico<span class="text-danger fw-bold"></span></span>
                    </label>
                    <kendo-textbox
                      [disabled]="true"
                      #programaEspecifico
                      size="medium"
                      placeholder="Programa Específico"
                      formControlName="programaEspecifico"
                      [clearButton]="true"
                      inputValidSpaceDir
                    >
                    </kendo-textbox>
                  </kendo-formfield>
                </div>
              </div>
              <div class="col-12 col-md-12" style="margin-bottom: 20px;">
                <div class="col-sm-12 col-md-12">
                  <kendo-formfield orientation="horizontal">
                    <label [for]="idEsquemaEvaluacion" class="k-label" style="align-items: baseline;text-align: left;">
                      <span>Esquema de Evaluación<span class="text-danger fw-bold"></span></span>
                    </label>
                    <kendo-dropdownlist
                    #idEsquemaEvaluacion
                    formControlName="idEsquemaEvaluacion"
                    class="d-flex"
                    size="medium"
                    [data]="FiltroEsquema"
                    [defaultItem]="{
                      nombre: 'Ninguno',
                      id: 0
                    }"
                    textField="nombre"
                    valueField="id"
                    (valueChange)="obtenerCriterioEvaluacionPorEsquema($event)"
                    [valuePrimitive]="true"
                    >
                    </kendo-dropdownlist>
                  </kendo-formfield>
                </div>
              </div>
            </div>
          </fieldset>
          <label class="col-sm-12 col-form-label k-label fst-italic" style="margin-left: 5%;font-weight: bold;">Criterios de Evaluación:</label>
          <div class="card-body">
            <div class="row">
              <div class="col">

                <kendo-grid
                [kendoGridBinding]="CriteriosEvaluacionDetalle"
                [pageSize]="10"
                [sortable]="true"
                [filterable]="true"
                [pageable]="{
                  buttonCount: 5,
                  info: true,
                  type: 'numeric',
                  pageSizes: true,
                  previousNext: true,
                  position: 'bottom'}"

                >


                  <kendo-grid-column
                    field="criterioEvaluacion"
                    title="Nombre"
                  >
                  </kendo-grid-column>

                  <kendo-grid-column
                    field="ponderacion"
                    title="Ponderación"
                  >
                  </kendo-grid-column>

                </kendo-grid>

              </div>
            </div>
        </div>
        </form>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0" style="display: contents;">
      <button *ngIf="isNew==true;" [disabled]="registrandoCriterios" style="margin: 5px;background: #0070C0;color:white"
        kendoButton
        (click)="CrearNuevoRegistro()"
      >
        Registrar
      </button>
      <button *ngIf="isNew==false;" [disabled]="registrandoCriterios"  style="margin: 5px;background: #0070C0;color:white"
        kendoButton
        (click)="ActualizarRegistro()"
      >
        Actualizar
      </button>
    </div>
  </div>
</ng-template>
