<div class="card">
  <div class="card-header bg-color-material pb-0">
    <h3 class="text-white mb-2">Filtro Programa Especifico</h3>
  </div>
  <div class="card-body p-0">
    <div class="k-form k-form-horizontal">
      <form [formGroup]="formFiltro">
        <div class="row mb-2">
          <div class="row col-sm-12 col-md-12 mx-2">
            <div class="col-sm-6 col-md-6">
              <div class="row k-form-horizontal">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="150"
                    [for]="area"
                    text="Area:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #area
                    [data]="listaAreas"
                    textField="nombre"
                    valueField="id"
                    formControlName="areas"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Areas>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarAreaBusqueda($event)"
                    (valueChange)="filtrarSubAreasPorAreas($event)"
                    (removeTag)="removerSubAreasPorAreas($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
              <div class="row k-form-horizontal">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="150"
                    [for]="subarea"
                    text="Sub Area:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #subarea
                    [data]="listaSubAreas"
                    textField="nombre"
                    valueField="id"
                    formControlName="subareas"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Sub Areas>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarSubAreaBusqueda($event)"
                    (valueChange)="filtrarPgeneralPorSubAreas($event)"
                    (removeTag)="removerPgeneralPorSubAreas($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
              <div class="row k-form-horizontal">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="150"
                    [for]="programaGeneral"
                    text="Programa General:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #programaGeneral
                    [data]="listaPgeneral"
                    textField="nombre"
                    valueField="id"
                    formControlName="pgenerales"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Programa General>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarPgeneralBusqueda($event)"
                    (valueChange)="filtrarPespecificoPorPgeneral($event)"
                    (removeTag)="removerPespecificoPorPgeneral($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
              <div class="row k-form-horizontal">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="150"
                    [for]="programaEspecifico"
                    text="Programa Especifico:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #programaEspecifico
                    [data]="listaPespecificos"
                    textField="nombre"
                    valueField="id"
                    formControlName="pespecificos"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Programa Especifico>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarPespecificoBusqueda($event)"
                    (valueChange)="filtrarCentroCostoPorPespecifico($event)"
                    (removeTag)="removerCentroCostoPorPespecifico($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
              <div class="row k-form-horizontal">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="150"
                    [for]="centroCosto"
                    text="Centro de Costo:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #centroCosto
                    [data]="listaCentroCostos"
                    textField="nombre"
                    valueField="id"
                    formControlName="centroCostos"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Centro Costos>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarCentroCostoBusqueda($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
            </div>
            <div class="col-sm-6 col-md-6">
              <div class="row k-form-horizontal mb-1">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="180"
                    [for]="estadoProgramaEspecifico"
                    text="Estado Programa Especifico:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #estadoProgramaEspecifico
                    [data]="listaEstadoProgramas"
                    textField="nombre"
                    valueField="id"
                    formControlName="estadoProgramas"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Estado Programas>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarEstadoBusqueda($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
              <div class="row k-form-horizontal mb-1">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="180"
                    [for]="ciudad"
                    text="Ciudad:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #ciudad
                    [data]="listaCiudades"
                    textField="nombre"
                    valueField="id"
                    formControlName="ciudades"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Ciudades>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarCiudadBusqueda($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
              <div class="row k-form-horizontal mb-1">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="180"
                    [for]="modalidad"
                    text="Modalidad:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #modalidad
                    [data]="listaModalidades"
                    textField="nombre"
                    valueField="id"
                    formControlName="modalidades"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Modalidades>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarModalidadBusqueda($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
            </div>
          </div>
        </div>
        <div class="row mt-1 mb-2 mx-3">
          <div class="col-md-12 text-end">
            <button class="btn btn-primary" (click)="obtenerFiltro()">
              Buscar
              <fa-icon [icon]="['fas', 'search']" class="fa-lg"></fa-icon>
            </button>
          </div>
        </div>
      </form>
    </div>
    <loading [loading]="loaderFiltro"></loading>
  </div>
</div>
<div class="card my-3">
  <div class="card-header bg-color-material pb-0">
    <h3 class="text-white mb-2">Gestión Programa General</h3>
  </div>
  <div class="card-body">
    <kendo-grid
      [kendoGridBinding]="gridProgramaEspecificoMaterial.data"
      [loading]="gridProgramaEspecificoMaterial.loading"
      [selectable]="true"
      [resizable]="true"
      [pageable]="{
        buttonCount: 5,
        info: true,
        type: 'numeric',
        pageSizes: true,
        previousNext: true,
        position: 'bottom'
      }"
      [skip]="0"
      [pageSize]="15"
      filterable="menu"
    >
      <ng-template
        kendoPagerTemplate
        let-totalPages="totalPages"
        let-currentPage="currentPage"
      >
        <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
        <kendo-pager-numeric-buttons
          [buttonCount]="5"
        ></kendo-pager-numeric-buttons>
        <kendo-pager-next-buttons></kendo-pager-next-buttons>
        <kendo-pager-input></kendo-pager-input>
        <kendo-pager-info></kendo-pager-info>
        <kendo-pager-page-sizes
          [pageSizes]="cantidadItems"
        ></kendo-pager-page-sizes>
      </ng-template>

      <kendo-grid-column
        field="programaEspecifico"
        title="Programa Especifico"
        [width]="250"
        [headerClass]="'justify-content-center'"
        [filterable]="true"
      >
        <ng-template
          kendoGridFilterMenuTemplate
          let-filter
          let-column="column"
          let-filterService="filterService"
        >
          <kendo-grid-string-filter-menu
            [column]="column"
            [filter]="filter"
            [filterService]="filterService"
            [extra]="false"
            operator="contains"
          >
            <kendo-filter-contains-operator
              text="Contiene"
            ></kendo-filter-contains-operator>
          </kendo-grid-string-filter-menu>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="estadoProgramaEspecifico"
        title="Estado"
        [width]="100"
        [headerClass]="'justify-content-center'"
        [filterable]="true"
      >
        <ng-template
          kendoGridFilterMenuTemplate
          let-filter
          let-column="column"
          let-filterService="filterService"
        >
          <kendo-grid-string-filter-menu
            [column]="column"
            [filter]="filter"
            [filterService]="filterService"
            [extra]="false"
            operator="contains"
          >
            <kendo-filter-contains-operator
              text="Contiene"
            ></kendo-filter-contains-operator>
          </kendo-grid-string-filter-menu>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="modalidad"
        title="Modalidad"
        [width]="100"
        [headerClass]="'justify-content-center'"
        [filterable]="true"
      >
        <ng-template
          kendoGridFilterMenuTemplate
          let-filter
          let-column="column"
          let-filterService="filterService"
        >
          <kendo-grid-string-filter-menu
            [column]="column"
            [filter]="filter"
            [filterService]="filterService"
            [extra]="false"
            operator="contains"
          >
            <kendo-filter-contains-operator
              text="Contiene"
            ></kendo-filter-contains-operator>
          </kendo-grid-string-filter-menu>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="ciudad"
        title="Ciudad"
        [width]="100"
        [headerClass]="'justify-content-center'"
        [filterable]="true"
      >
        <ng-template
          kendoGridFilterMenuTemplate
          let-filter
          let-column="column"
          let-filterService="filterService"
        >
          <kendo-grid-string-filter-menu
            [column]="column"
            [filter]="filter"
            [filterService]="filterService"
            [extra]="false"
            operator="contains"
          >
            <kendo-filter-contains-operator
              text="Contiene"
            ></kendo-filter-contains-operator>
          </kendo-grid-string-filter-menu>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-command-column
        title="Acciones"
        [headerStyle]="{ color: '#5f75bd' }"
        [width]="45"
        [headerClass]="'justify-content-center'"
      >
        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
          <div class="text-center">
            <button
              kendoGridEditCommand
              themeColor="warning"
              fillMode="solid"
              rounded="large"
              size="large"
              class="p-2 me-1 ms-1"
              container="body"
              placement="top"
              ngbTooltip="Editar"
              (click)="abrirModalProgramasEspecificosAsociados(dataItem)"
            >
              <span class="k-icon k-i-gears k-icon-20"></span>
            </button>
          </div>
        </ng-template>
      </kendo-grid-command-column>
    </kendo-grid>
  </div>
</div>
<ng-template #modalConfiguracionProgramasEspecificosAsociados let-modal>
  <div class="bg-primary-header-modal" style="border-radius: 6px 6px 0 0">
    <div class="container row mt-3 mb-2">
      <div class="col-md-11">
        <div class="row">
          <span class="fs-5">Programas Especificos asociado:</span>
        </div>
        <div class="row">
          <span class="mt-1" style="font-size: small;">{{ nombrePrograma }}</span>
        </div>
      </div>
      <div class="col-md-1 text-end">
        <button
          type="button"
          class="btn-close my-2"
          aria-label="Close"
          (click)="modal.close()"
        ></button>
      </div>
    </div>
  </div>
  <div class="modal-body">
    <div class="row">
      <kendo-grid
        [kendoGridBinding]="gridProgramaEspecificoMaterialDetalle.data"
        [loading]="gridProgramaEspecificoMaterialDetalle.loading"
        [selectable]="true"
        [resizable]="true"
        [pageable]="{
          buttonCount: 5,
          info: true,
          type: 'numeric',
          pageSizes: true,
          previousNext: true,
          position: 'bottom'
        }"
        [skip]="0"
        [pageSize]="15"
        filterable="menu"
      >
        <ng-template
          kendoPagerTemplate
          let-totalPages="totalPages"
          let-currentPage="currentPage"
        >
          <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
          <kendo-pager-numeric-buttons
            [buttonCount]="5"
          ></kendo-pager-numeric-buttons>
          <kendo-pager-next-buttons></kendo-pager-next-buttons>
          <kendo-pager-input></kendo-pager-input>
          <kendo-pager-info></kendo-pager-info>
          <kendo-pager-page-sizes
            [pageSizes]="cantidadItems"
          ></kendo-pager-page-sizes>
        </ng-template>
        <kendo-grid-column
          field="programaEspecifico"
          title="#"
          [width]="60"
          [headerClass]="'justify-content-center'"
          [filterable]="false"
        >
          <ng-template kendoGridCellTemplate let-rowIndex="rowIndex">
            <div class="text-center">
              {{ rowIndex + 1 }}
            </div>
          </ng-template>
        </kendo-grid-column>
        <kendo-grid-column
          field="nombre"
          title="Nombre"
          [width]="260"
          [headerClass]="'justify-content-center'"
          [filterable]="true"
        >
          <ng-template
            kendoGridFilterMenuTemplate
            let-filter
            let-column="column"
            let-filterService="filterService"
          >
            <kendo-grid-string-filter-menu
              [column]="column"
              [filter]="filter"
              [filterService]="filterService"
              [extra]="false"
              operator="contains"
            >
              <kendo-filter-contains-operator
                text="Contiene"
              ></kendo-filter-contains-operator>
            </kendo-grid-string-filter-menu>
          </ng-template>
        </kendo-grid-column>
        <kendo-grid-column
          field="duracion"
          title="Duracion"
          [width]="70"
          [headerClass]="'justify-content-center'"
          [filterable]="true"
        >
          <ng-template
            kendoGridFilterMenuTemplate
            let-filter
            let-column="column"
            let-filterService="filterService"
          >
            <kendo-grid-string-filter-menu
              [column]="column"
              [filter]="filter"
              [filterService]="filterService"
              [extra]="false"
              operator="contains"
            >
              <kendo-filter-contains-operator
                text="Contiene"
              ></kendo-filter-contains-operator>
            </kendo-grid-string-filter-menu>
          </ng-template>
        </kendo-grid-column>
        <ng-template kendoGridDetailTemplate let-dataItem>
          <app-grid-child-tipo-material-especifico
            [idPespecifico]="dataItem.id"
            [listaTipoMaterial]="listaMaterialTipo"
            [listaGrupo]="dataItem.grupos"
            [listaGrupoEdicion]="dataItem.gruposEdicion"
          ></app-grid-child-tipo-material-especifico>
        </ng-template>
      </kendo-grid>
    </div>
    <div class="mt-1 text-end">
      <button type="button" class="btn btn-danger" (click)="modal.close()">
        Cerrar
      </button>
    </div>
  </div>
  <loading [loading]="loaderModal"></loading>
</ng-template>
<loading [loading]="loaderModal"></loading>
