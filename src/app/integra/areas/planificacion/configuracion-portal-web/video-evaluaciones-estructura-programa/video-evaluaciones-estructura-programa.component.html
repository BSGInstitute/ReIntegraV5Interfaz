<div class="card">
  <div class="card-header bg-color-material pb-0">
    <h3 class="text-white mb-2">Filtro Preguntas</h3>
  </div>
  <div class="card-body p-0">
    <div class="k-form k-form-horizontal">
      <form [formGroup]="formFiltro">
        <div class="row mb-2">
          <div class="row col-sm-12 col-md-12 mx-2">
            <div class="col-sm-6 col-md-6">
              <div class="row k-form-horizontal mb-1">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="120"
                    [for]="areasFiltro"
                    text="Area:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #areasFiltro
                    [data]="listaAreas"
                    textField="nombre"
                    valueField="id"
                    formControlName="areas"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Areas>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarAreaBusqueda($event)"
                    (valueChange)="filtrarSubAreasPorAreas($event)"
                    (removeTag)="removerSubAreasPorAreas($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
              <div class="row k-form-horizontal">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="120"
                    [for]="pgeneralFiltro"
                    text="Programa General:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #pgeneralFiltro
                    [data]="listaPgeneral"
                    textField="nombre"
                    valueField="id"
                    formControlName="pgenerales"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Programa General>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarPgeneralBusqueda($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
            </div>
            <div class="col-sm-6 col-md-6">
              <div class="row k-form-horizontal mb-1">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="100"
                    [for]="subareasFiltro"
                    text="Sub Area:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #subareasFiltro
                    [data]="listaSubAreas"
                    textField="nombre"
                    valueField="id"
                    formControlName="subareas"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Sub Area>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarSubAreaBusqueda($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
              <div class="row k-form-horizontal mb-1">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.width.px]="100"
                    [for]="partnertFiltro"
                    text="Partner:"
                  >
                  </kendo-label>
                  <kendo-multiselect
                    #partnertFiltro
                    [data]="listaPartner"
                    textField="nombre"
                    valueField="id"
                    formControlName="partnerts"
                    [style.width.px]="400"
                    [valuePrimitive]="true"
                    [defaultItem]="{ nombre: '<Sub Area>', id: 0 }"
                    [virtual]="false"
                    [filterable]="true"
                    (filterChange)="filtrarParnetsBusqueda($event)"
                  ></kendo-multiselect>
                </kendo-formfield>
              </div>
            </div>
          </div>
        </div>
        <div class="row my-3 mx-3">
          <div class="col-md-12 text-end">
            <button class="btn btn-primary" (click)="obtener()">
              Buscar
              <fa-icon [icon]="['fas', 'search']" class="fa-lg"></fa-icon>
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="py-3" style="padding-right: 2rem; padding-left: 2rem">
  <div class="border p-2 d-flex flex-wrap gap-4">
    <div class="d-flex align-items-center gap-3">
      <span class="fw-bold">CV:</span>
      <span>Configuración de Video</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span class="fw-bold">CRD:</span>
      <span>Configuración Reproduccion y Descarga</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span class="fw-bold">CE:</span>
      <span>Configuración de Evaluación</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span class="fw-bold">CP:</span>
      <span>Configuración de Proyecto</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span class="fw-bold">PVT:</span>
      <span>Procesamiento de Videos Tutor Virtual</span>
    </div>
  </div>
</div>
<div class="card my-3">
  <div class="card-header bg-color-material pb-0">
    <h3 class="text-white mb-2">Gestión Programa General</h3>
  </div>
  <div class="card-body">
    <kendo-grid
      [kendoGridBinding]="gridConfiguraciones.data"
      [loading]="gridConfiguraciones.loading"
      [selectable]="true"
      [resizable]="true"
      [pageable]="{
        buttonCount: 5,
        info: true,
        type: 'numeric',
        pageSizes: true,
        previousNext: true,
        position: 'bottom'
      }"
      [skip]="0"
      [pageSize]="15"
      filterable="menu"
    >
      <ng-template
        kendoPagerTemplate
        let-totalPages="totalPages"
        let-currentPage="currentPage"
      >
        <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
        <kendo-pager-numeric-buttons
          [buttonCount]="5"
        ></kendo-pager-numeric-buttons>
        <kendo-pager-next-buttons></kendo-pager-next-buttons>
        <kendo-pager-input></kendo-pager-input>
        <kendo-pager-info></kendo-pager-info>
        <kendo-pager-page-sizes
          [pageSizes]="cantidadItems"
        ></kendo-pager-page-sizes>
      </ng-template>

      <kendo-grid-column
        field="nombre"
        title="Nombre Programa General"
        [width]="140"
        [headerClass]="'justify-content-start'"
        [filterable]="true"
      >
        <ng-template
          kendoGridFilterMenuTemplate
          let-filter
          let-column="column"
          let-filterService="filterService"
        >
          <kendo-grid-string-filter-menu
            [column]="column"
            [filter]="filter"
            [filterService]="filterService"
            [extra]="false"
            operator="contains"
          >
            <kendo-filter-contains-operator
              text="Contiene"
            ></kendo-filter-contains-operator>
          </kendo-grid-string-filter-menu>
        </ng-template>
      </kendo-grid-column>

      <kendo-grid-column
        field="nombreArea"
        title="Area"
        [width]="80"
        [headerClass]="'justify-content-start'"
        [filterable]="false"
      ></kendo-grid-column>

      <kendo-grid-column
        field="nombreSubArea"
        title="Sub Area"
        [width]="80"
        [headerClass]="'justify-content-start'"
        [filterable]="false"
      ></kendo-grid-column>

      <kendo-grid-column
        field="nombrePartner"
        title="Partner"
        [width]="100"
        [headerClass]="'justify-content-start'"
        [filterable]="false"
      ></kendo-grid-column>

      <kendo-grid-command-column
        title="CV"
        [headerStyle]="{ color: '#5f75bd' }"
        [width]="20"
        [headerClass]="'justify-content-center'"
      >
        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
          <button
            kendoGridEditCommand
            themeColor="warning"
            fillMode="solid"
            rounded="large"
            size="large"
            class="p-2 me-1 ms-1"
            container="body"
            placement="top"
            ngbTooltip="Editar"
            (click)="abrirModalConfiguracionVideo(dataItem)"
          >
            <span class="k-icon k-i-gears k-icon-20"></span>
          </button>
        </ng-template>
      </kendo-grid-command-column>
  <kendo-grid-command-column
        title="CRD"
        [headerStyle]="{ color: '#5f75bd' }"
        [width]="20"
        [headerClass]="'justify-content-center'"
      >
        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
          <button
            kendoGridEditCommand
            themeColor="warning"
            fillMode="solid"
            rounded="large"
            size="large"
            class="p-2 me-1 ms-1"
            container="body"
            placement="top"
            ngbTooltip="Editar"
            (click)="abirmodalConfigurarReproduccionyDescarga(dataItem)"
          >
            <span class="k-icon k-i-gears k-icon-20"></span>
          </button>
        </ng-template>
      </kendo-grid-command-column>
      <kendo-grid-command-column
        title="CE"
        [headerStyle]="{ color: '#5f75bd' }"
        [width]="20"
        [headerClass]="'justify-content-center'"
      >
        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
          <button
            kendoGridEditCommand
            themeColor="warning"
            fillMode="solid"
            rounded="large"
            size="large"
            class="p-2 me-1 ms-1"
            container="body"
            placement="top"
            ngbTooltip="Editar"
            (click)="abrirModalConfiguracionEvaluaciones(dataItem)"
          >
            <span class="k-icon k-i-gears k-icon-20"></span>
          </button>
        </ng-template>
      </kendo-grid-command-column>

      <kendo-grid-command-column
        title="CP"
        [headerStyle]="{ color: '#5f75bd' }"
        [width]="20"
        [headerClass]="'justify-content-center'"
      >
        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
          <button
            kendoGridEditCommand
            themeColor="warning"
            fillMode="solid"
            rounded="large"
            size="large"
            class="p-2 me-1 ms-1"
            container="body"
            placement="top"
            ngbTooltip="Editar"
            (click)="abrirModalConfiguracionProyecto(dataItem)"
          >
            <span class="k-icon k-i-gears k-icon-20"></span>
          </button>
        </ng-template>
      </kendo-grid-command-column>
      <kendo-grid-command-column
        title="PVT"
        [headerStyle]="{ color: '#5f75bd' }"
        [width]="20"
        [headerClass]="'justify-content-center'"
      >
        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
          <button
            kendoGridEditCommand
            themeColor="warning"
            fillMode="solid"
            rounded="large"
            size="large"
            class="p-2 me-1 ms-1"
            container="body"
            placement="top"
            ngbTooltip="Editar"
            (click)="abrirModalConfiguracionTutorVirtual(dataItem)"
            [disabled]="!dataItem.tutorVirtualActivo"
          >
            <span class="k-icon k-i-gears k-icon-20"></span>
          </button>
        </ng-template>
      </kendo-grid-command-column>
    </kendo-grid>
  </div>
</div>
<!-- Modal Edicion -->
<loading [loading]="loaderModal"></loading>
