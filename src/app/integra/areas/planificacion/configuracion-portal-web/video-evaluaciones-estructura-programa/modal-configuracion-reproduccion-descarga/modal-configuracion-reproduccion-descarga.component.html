<div class="modal-header bg-primary-header-modal">
  <h3 class="modal-title m-0 p-0" id="modal-basic-title">
    Configuración Reproducción y Descarga
  </h3>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="modalContext.close()"
  ></button>
</div>

<div class="modal-body">
  <form [formGroup]="formConfiguracionVideo">
    <div class="row g-3">
      <!-- Reproducción -->
      <div class="col-12 col-md-6">
        <h2 class="text-muted mb-2">Reproducción</h2>

        <!-- Brightcove -->
        <div class="row g-1 align-items-center mb-2">
          <div class="col-8 col-sm-9 col-md-6">
            <label for="pb-brightcove" class="mb-0">
              Brightcove ({{ conteos?.reproduccionBrightcove }})
            </label>
          </div>
          <div class="col-auto">
            <input
              id="pb-brightcove"
              class="form-check-input"
              type="radio"
              formControlName="reproduccionVideo"
              [value]="1"
            />
          </div>
        </div>

        <!-- Vimeo -->
        <div class="row g-1 align-items-center mb-2">
          <div class="col-8 col-sm-9 col-md-6">
            <label for="pb-vimeo" class="mb-0">
              Vimeo ({{ conteos?.reproduccionVimeo }})
            </label>
          </div>
          <div class="col-auto">
            <input
              id="pb-vimeo"
              class="form-check-input"
              type="radio"
              formControlName="reproduccionVideo"
              [value]="2"
            />
          </div>
        </div>
      </div>

      <!-- Descarga -->
      <div class="col-12 col-md-6">
        <h2 class="text-muted mb-2">Descarga</h2>

        <!-- Brightcove -->
        <div class="row g-1 align-items-center mb-2">
          <div class="col-8 col-sm-9 col-md-6">
            <label for="dl-brightcove" class="mb-0">
              Brightcove ({{ conteos?.descargaBrightcove }})
            </label>
          </div>
          <div class="col-auto">
            <input
              id="dl-brightcove"
              class="form-check-input"
              type="radio"
              formControlName="descargaVideo"
              [value]="1"
            />
          </div>
        </div>

        <!-- Vimeo -->
        <div class="row g-1 align-items-center">
          <div class="col-8 col-sm-9 col-md-6">
            <label for="dl-vimeo" class="mb-0">
              Vimeo ({{ conteos?.descargaVimeo }})
            </label>
          </div>
          <div class="col-auto">
            <input
              id="dl-vimeo"
              class="form-check-input"
              type="radio"
              formControlName="descargaVideo"
              [value]="2"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex flex-wrap justify-content-end gap-2 mt-3">
      <button
        type="button"
        class="btn btn-primary"
        [disabled]="enProcesoSolicitud"
        (click)="actualizar()"
      >
        Actualizar
      </button>

      <button
        type="button"
        class="btn btn-danger"
        [disabled]="enProcesoSolicitud"
        (click)="modalContext.close('Close click')"
      >
        Cancelar
      </button>
    </div>
  </form>
</div>
