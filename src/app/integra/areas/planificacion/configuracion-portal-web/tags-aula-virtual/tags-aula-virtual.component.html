<div class="card border-primary" #reporte>
  <div class="card-header pb-0 bg-color-material">
    <div class="col text-aling-center">
      <h2 class="mb-3 text-white">(M) Gestion Tags</h2>
    </div>
  </div>

  <div class="card-body p-0">
    <form class="k-form k-form-horizontal">
      <div class="row">
        <div class="col-sm-12 my-2">
          <kendo-grid
            [kendoGridBinding]="gridTagsAulaVirtual.data"
            [loading]="gridTagsAulaVirtual.loading"
            [selectable]="true"
            [sortable]="true"
            [resizable]="true"
            [pageable]="{
              buttonCount: 5,
              info: true,
              type: 'numeric',
              pageSizes: true,
              previousNext: true,
              position: 'bottom'
            }"
            [skip]="0"
            [pageSize]="15"
            filterable="menu"
          >
            <ng-template kendoGridToolbarTemplate>
              <div class="row col-md-12">
                <div class="col-md-12 text-end">
                  <button
                    type="button"
                    class="btn btn-success text-white"
                    (click)="abrirModalDetalleInsertar()"
                  >
                    Nuevo
                  </button>
                </div>
              </div>
            </ng-template>

            <ng-template
              kendoPagerTemplate
              let-totalPages="totalPages"
              let-currentPage="currentPage"
            >
              <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
              <kendo-pager-numeric-buttons
                [buttonCount]="5"
              ></kendo-pager-numeric-buttons>
              <kendo-pager-next-buttons></kendo-pager-next-buttons>
              <kendo-pager-input></kendo-pager-input>
              <kendo-pager-info></kendo-pager-info>
              <kendo-pager-page-sizes
                [pageSizes]="cantidadItems"
              ></kendo-pager-page-sizes>
            </ng-template>

            <kendo-grid-column
              field="tagWebId"
              title="Web Id"
              [width]="30"
              [headerClass]="'justify-content-start'"
              [filterable]="true"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>

            <kendo-grid-column
              field="nombre"
              title="Nombre"
              [width]="120"
              [headerClass]="'justify-content-start'"
              [filterable]="true"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>

            <kendo-grid-column
              field="codigo"
              title="Codigo"
              [width]="120"
              [headerClass]="'justify-content-start'"
              [filterable]="true"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>

            <kendo-grid-command-column
              title="Acciones"
              [headerStyle]="{ color: '#5f75bd' }"
              [width]="30"
              [headerClass]="'justify-content-center'"
            >
              <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                <div class="text-center">
                  <button
                    kendoGridEditCommand
                    themeColor="warning"
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Editar"
                    (click)="abrirModalDetalleActualizar(dataItem)"
                  >
                    <span class="k-icon k-i-pencil k-icon-20"></span>
                  </button>

                  <button
                    kendoGridEditCommand
                    themeColor="error"
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Eliminar"
                    (click)="eliminar(dataItem)"
                  >
                    <span class="k-icon k-i-x k-icon-20"></span>
                  </button>
                </div>
              </ng-template>
            </kendo-grid-command-column>
          </kendo-grid>
        </div>
      </div>
    </form>
  </div>
</div>
<!-- Modal Edicion -->
<ng-template #modalTags let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title">
      Configuracion de Tags
    </h3>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="limpiarCamposForm()"
    ></button>
  </div>
  <div class="modal-body">
    <form [formGroup]="formTagsAulaVirtual">
      <div class="row mb-3">
        <div class="col-sm-12 col-md-12 k-form-horizontal px-3">
          <kendo-formfield orientation="vertical">
            <div class="row">
              <kendo-label
                class="d-flex align-items-start"
                [style.width.px]="50"
                [for]="nombre"
                text="Nombre:"
              >
              </kendo-label>
            </div>
            <div class="row px-2 py-1">
              <kendo-textbox
                #nombre
                formControlName="nombre"
                [style.width.px]="775"
                placeholder="Nombre"
                (valueChange)="generarCodigo($event)"
                required
              ></kendo-textbox>
            </div>
          </kendo-formfield>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-sm-12 col-md-12 k-form-horizontal px-3">
          <kendo-formfield orientation="vertical">
            <div class="row">
              <kendo-label
                class="d-flex align-items-start"
                [style.width.px]="50"
                [for]="codigo"
                text="Codigo:"
              >
              </kendo-label>
            </div>
            <div class="row px-2 py-1">
              <kendo-textbox
                #codigo
                formControlName="codigo"
                [style.width.px]="775"
              ></kendo-textbox>
            </div>
          </kendo-formfield>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-sm-12 col-md-12 k-form-horizontal px-2">
          <kendo-formfield orientation="vertical">
            <div class="row px-2">
              <kendo-label
                class="d-flex align-items-start"
                [style.width.px]="50"
                [for]="descripcion"
                text="Descripcion:"
              >
              </kendo-label>
            </div>
            <div class="row py-1">
              <kendo-editor
                #descripcion
                formControlName="descripcion"
                style="height: 300px"
                [style.width.px]="797"
                [pasteCleanupSettings]="{
                  removeInvalidHTML: true,
                  convertMsLists: true,
                  removeMsClasses: true,
                  removeMsStyles: true
                }"
              >
                <kendo-toolbar>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorBoldButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorItalicButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorUnderlineButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorStrikethroughButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorAlignLeftButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAlignCenterButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAlignRightButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAlignJustifyButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-dropdownlist
                    kendoEditorFormat
                  ></kendo-toolbar-dropdownlist>
                  <kendo-toolbar-dropdownlist
                    kendoEditorFontSize
                  ></kendo-toolbar-dropdownlist>
                  <kendo-toolbar-colorpicker
                    kendoEditorForeColor
                  ></kendo-toolbar-colorpicker>
                  <kendo-toolbar-colorpicker
                    kendoEditorBackColor
                    view="gradient"
                  ></kendo-toolbar-colorpicker>
                  <kendo-toolbar-dropdownlist
                    kendoEditorFontFamily
                  ></kendo-toolbar-dropdownlist>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorInsertUnorderedListButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorInsertOrderedListButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorIndentButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorOutdentButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-button
                    kendoEditorBlockquoteButton
                  ></kendo-toolbar-button>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorCreateLinkButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorUnlinkButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-button
                    kendoEditorViewSourceButton
                  ></kendo-toolbar-button>
                  <kendo-toolbar-button
                    kendoEditorCleanFormattingButton
                  ></kendo-toolbar-button>
                  <kendo-editor-insert-table-button></kendo-editor-insert-table-button>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorAddColumnBeforeButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAddColumnAfterButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAddRowBeforeButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAddRowAfterButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorDeleteColumnButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorDeleteRowButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorDeleteTableButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                </kendo-toolbar>
              </kendo-editor>
            </div>
          </kendo-formfield>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-sm-12 col-md-12 k-form-horizontal px-3">
          <kendo-formfield orientation="vertical">
            <kendo-label
              class="d-flex align-items-end"
              [style.width.px]="130"
              [for]="parametroSeo"
              text="Parametro SEO:"
            >
            </kendo-label>
            <kendo-multiselect
              #parametroSeo
              textField="nombreParametroSeo"
              valueField="idParametroSeo"
              [style.width.px]="650"
              formControlName="parametroSeoAsociados"
              [data]="listaParametroSeo"
              (valueChange)="adjuntarRegistro($event)"
            ></kendo-multiselect>
          </kendo-formfield>
        </div>
      </div>
      <div class="row mb-3" *ngIf="gridParametrosSeo.data.length > 0">
        <div class="col-sm-12 col-md-12 k-form-horizontal px-3">
          <kendo-grid
            [kendoGridBinding]="gridParametrosSeo.data"
            [loading]="gridParametrosSeo.loading"
            [selectable]="true"
            [resizable]="true"
          >
            <kendo-grid-column
              field="nombreParametroSeo"
              title="Nombre"
              [width]="100"
              [headerClass]="'justify-content-center'"
            >
            </kendo-grid-column>

            <kendo-grid-column
              field="descripcion"
              title="Contenido"
              [width]="300"
              [headerClass]="'justify-content-center'"
            >
            </kendo-grid-column>

            <kendo-grid-command-column
              title="Editar"
              [headerStyle]="{ color: '#5f75bd' }"
              [width]="50"
              [headerClass]="'justify-content-center'"
            >
              <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                <button
                  kendoButton
                  fillMode="solid"
                  rounded="large"
                  size="large"
                  class="p-2 me-1 ms-1"
                  container="body"
                  placement="top"
                  ngbTooltip="Modificar"
                  (click)="abrirModalDetalleContenido(dataItem)"
                >
                  <span class="k-icon k-i-pencil k-icon-20"></span>
                </button>
              </ng-template>
            </kendo-grid-command-column>
          </kendo-grid>
        </div>
      </div>
    </form>

    <div class="row my-2">
      <div class="text-end">
        <button
          class="btn btn-primary mx-1"
          [disabled]="!formTagsAulaVirtual.valid"
          (click)="insertar()"
          *ngIf="nuevoRegistro"
        >
          <span class="px-1">Nuevo</span>
        </button>
        <button
          class="btn btn-primary mx-1"
          [disabled]="!formTagsAulaVirtual.valid"
          (click)="actualizar()"
          *ngIf="!nuevoRegistro"
        >
          <span class="px-1">Actualizar</span>
        </button>

        <button class="btn btn-danger" (click)="limpiarCamposForm()">
          <span class="px-1">Cancelar</span>
        </button>
      </div>
    </div>
  </div>
  <loading [loading]="loaderModal"></loading>
</ng-template>
<!-- Modal Edicion -->
<!-- Modal Edicion Contenido -->
<ng-template #modalTagsContenido let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title">Editar Contenido</h3>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss()"
    ></button>
  </div>
  <div class="modal-body">
    <form [formGroup]="formContenidoModificado">
      <div class="row mb-3 col-md-12">
        <div class="col-sm-4 col-md-4 k-form-horizontal">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              class="d-flex align-items-end"
              [style.width.px]="100"
              [for]="contenido"
              text="Contenido:"
            >
            </kendo-label>
            <kendo-textarea
              #contenido
              [style.width.px]="380"
              resizable="auto"
              formControlName="descripcion"
            ></kendo-textarea>
          </kendo-formfield>
        </div>
      </div>
    </form>

    <div class="row">
      <div class="text-end">
        <button class="btn btn-primary mx-1" (click)="actualizarContenido()">
          <span class="px-1">Modificar</span>
        </button>
        <button class="btn btn-danger" (click)="limpiarCamposFormContenido()">
          <span class="px-1">Cerrar</span>
        </button>
      </div>
    </div>
  </div>
  <loading [loading]="loaderModal"></loading>
</ng-template>
<!-- Modal Edicion Contenido -->
<loading [loading]="loaderModal"></loading>
