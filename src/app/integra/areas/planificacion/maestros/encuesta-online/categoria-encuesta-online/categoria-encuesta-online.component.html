<ng-template #modalPreguntaCategoria let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header">
    <h2 class="modal-title m-0 p-0" id="modal-basic-title">
      {{ nombreModal }}
    </h2>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
  </div>

  <div class="modal-body">
    <form class="k-form" [formGroup]="formGroupPreguntaEncuestaCategoria">
      <fieldset class="k-form-fieldset">
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="txtName" class="k-label">
                <span>Nombre :
                  <strong class="text-danger">*</strong></span>
              </label>
              <kendo-textbox #txtName formControlName="nombre" placeholder="Ingrese Nombre" showSuccessIcon="initial"
                showErrorIcon="initial">
              </kendo-textbox>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="txtDescription" class="k-label">
                <span>Descripción :
                  <strong class="text-danger">*</strong></span>
              </label>
              <kendo-textbox #txtDescription formControlName="descripcion" placeholder="Ingrese Descripcion" showSuccessIcon="initial"
                showErrorIcon="initial">
              </kendo-textbox>
            </kendo-formfield>
          </div>
        </div>
      </fieldset>
    </form>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-primary" (click)="actionModal();">
      {{ btnModalNombre }}
    </button>
    <button type="button" class="btn btn-danger" (click)="modal.close('Close click')">
      Cancelar
    </button>
  </div>
</ng-template>





<div class="">
  <div class="row">
    <div class="col-1fa-rotate-270">
      <div class="card">
        <div class="card-header bg-color-material">
          <h1 class="text-white">Categoria Pregunta</h1>
        </div>
        <div class="card-body p-4">
          <div class="row">
            <div class="col">
              <ng-template #cellTemplateGridCategoriaEncuesta let-dataItem="dataItem" let-field="field"
                let-itemValue="itemValue">
                <ng-container *ngIf="field == 'fechaModificacion'; else gridTempDefault">
                  {{ itemValue | date: "dd/MM/yyyy hh:mm" }}
                </ng-container>
                <ng-template #gridTempDefault>
                  {{ itemValue }}
                </ng-template>
              </ng-template>
              <k-grid-edit [gridData]="listaCategoria" [loader]="loader" [columns]="gridCategoriaEncuestaOnline.columns"
                [commands]="gridCategoriaEncuestaOnline.comands"
                [readOnlyColumns]="gridCategoriaEncuestaOnline.readOnlyColumns"
                [gridConfig]="gridCategoriaEncuestaOnline.gridConfig"
                [gridState]="gridCategoriaEncuestaOnline.gridState" [commandAdd]="'external'" [commandEdit]="'external'"
                (OnGridEvents)="gridEventsResponse($event)" [cellTemplateRef]="cellTemplateGridCategoriaEncuesta">

              </k-grid-edit>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
