<div class="contenedor">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h2 class="text-white mb-2">(M) Versiones de programas de capacitación</h2>
        </div>
        <div class="card-body p-4" id="grillaAgendaTab">
          <div class="col-12">
            <kendo-grid
              [kendoGridBinding]="gridVersionPrograma.data"
              [loading]="gridVersionPrograma.loading"
              (edit)="gridVersionPrograma.editHandler($event)"
              (cancel)="gridVersionPrograma.cancelHandler($event)"
              (save)="gridVersionPrograma.saveHandler($event)"
              (remove)="gridVersionPrograma.removeHandler($event)"
              (add)="gridVersionPrograma.addHandler($event)"
              (dataStateChange)="gridVersionPrograma.onStateChange($event)"
              [resizable]="true"
              [pageable]="{
                buttonCount: 5,
                info: true,
                type: 'numeric',
                pageSizes: true,
                previousNext: true,
                position: 'bottom'
              }"
              [skip]="0"
              [pageSize]="5"
              filterable="menu"
            >
              <ng-template kendoGridToolbarTemplate>
                <button
                  kendoButton
                  icon="reload"
                  fillMode="flat"
                  themeColor="secondary"
                  (click)="obtener()"
                ></button>
                <kendo-grid-spacer></kendo-grid-spacer>
                <button kendoGridAddCommand themeColor="primary" icon="plus">
                  Nuevo
                </button>
              </ng-template>
              <kendo-grid-column
                field="nombre"
                title="Nombre"
                headerClass="header-grid-integra"
              >
              </kendo-grid-column>

              <kendo-grid-command-column
                title="Opciones"
                [width]="150"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template kendoGridCellTemplate let-isNew="isNew">
                  <div class="w-100 d-flex justify-content-center">
                    <button
                      kendoGridEditCommand
                      themeColor="warning"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Editar"
                    >
                      <span class="k-icon k-i-edit k-icon-20"></span>
                    </button>
                    <button
                      kendoGridRemoveCommand
                      themeColor="error"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Eliminar"
                    >
                      <span class="k-icon k-i-delete k-icon-20"></span>
                    </button>
                    <button
                      kendoGridSaveCommand
                      themeColor="primary"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      [disabled]="gridVersionPrograma.formGroup?.invalid"
                      container="body"
                      placement="top"
                      ngbTooltip="Guardar"
                    >
                      <span class="k-icon k-i-save k-icon-20"></span>
                    </button>
                    <button
                      kendoGridCancelCommand
                      themeColor="secondary"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Cancelar"
                    >
                      <span class="k-icon k-i-cancel k-icon-20"></span>
                    </button>
                  </div>
                </ng-template>
              </kendo-grid-command-column>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
