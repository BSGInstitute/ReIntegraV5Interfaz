<div class="card border-primary" #reporte>
    <div class="card-header pb-0 bg-color-material">
      <div class="col text-aling-center">
        <h2 class="mb-3 text-white">Tipos de Feedback</h2>
      </div>
    </div>
  
    <div class="card-body p-0">
      <form class="k-form k-form-horizontal">
        <div class="row">
          <div class="col-sm-12 my-2">
            <kendo-grid
              [kendoGridBinding]="gridTiposFeedback.data"
              [loading]="gridTiposFeedback.loading"
              [selectable]="true"
              [sortable]="true"
              [resizable]="true"
              [pageable]="{
                buttonCount: 5,
                info: true,
                type: 'numeric',
                pageSizes: true,
                previousNext: true,
                position: 'bottom'
              }"
              [skip]="0"
              [pageSize]="15"
              filterable="menu"
            >
              <ng-template kendoGridToolbarTemplate>
                <div class="row col-md-12">
                  <div class="col-md-12 text-end">
                    <button
                      type="button"
                      class="btn btn-success text-white"
                      (click)="abrirModalDetalleInsertar()"
                    >
                      Nuevo
                    </button>
                  </div>
                </div>
              </ng-template>
  
              <ng-template
                kendoPagerTemplate
                let-totalPages="totalPages"
                let-currentPage="currentPage"
              >
                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                <kendo-pager-numeric-buttons
                  [buttonCount]="5"
                ></kendo-pager-numeric-buttons>
                <kendo-pager-next-buttons></kendo-pager-next-buttons>
                <kendo-pager-input></kendo-pager-input>
                <kendo-pager-info></kendo-pager-info>
                <kendo-pager-page-sizes
                  [pageSizes]="cantidadItems"
                ></kendo-pager-page-sizes>
              </ng-template>
  
              <kendo-grid-column
                field="nombre"
                title="Nombre"
                [width]="200"
                [headerClass]="'justify-content-start'"
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
              </kendo-grid-column>
  
              <kendo-grid-command-column
                title="Acciones"
                [headerStyle]="{ color: '#5f75bd' }"
                [width]="20"
                [headerClass]="'justify-content-center'"
              >
                <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  <button
                    kendoGridEditCommand
                    themeColor="warning"
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Editar"
                    (click)="abrirModalDetalleActualizar(dataItem)"
                  >
                    <span class="k-icon k-i-pencil k-icon-20"></span>
                  </button>
  
                  <button
                    kendoGridEditCommand
                    themeColor="error"
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Eliminar"
                    (click)="eliminar(dataItem)"
                  >
                    <span class="k-icon k-i-x k-icon-20"></span>
                  </button>
                </ng-template>
              </kendo-grid-command-column>
            </kendo-grid>
          </div>
        </div>
      </form>
    </div>
  </div>
  
  <!-- Modal Edicion -->
  <ng-template #modalTipoFeedbackEditar let-modal>
    <div class="modal-header bg-primary-header-modal">
      <h3 class="modal-title m-0 p-0" id="modal-basic-title">
        Datos del Feedback Tipo
      </h3>
      <button
        type="button"
        class="btn-close"
        aria-label="Close"
        (click)="limpiarCamposForm()"
      ></button>
    </div>
    <div class="modal-body">
      <form [formGroup]="formTipoFeedback">
        <div class="row mb-3">
          <div class="col-sm-12 col-md-12 k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                class="d-flex align-items-end"
                [style.width.px]="100"
                [for]="nombre"
                text="Nombre:"
              >
              </kendo-label>
              <kendo-textbox
                #nombre
                formControlName="nombre"
                [style.width.px]="310"
                placeholder="Nombre"
                required
              >
              </kendo-textbox>
              <kendo-formerror>{{
                getErrorMessageEditar("nombre")
              }}</kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
      </form>
  
      <div class="row my-2">
        <div class="text-end">
          <ng-container *ngIf="nuevoRegistro">
            <button
              class="btn btn-primary mx-1"
              [disabled]="formTipoFeedback.invalid"
              (click)="insertar()"
            >
              <span class="px-1">Nuevo</span>
            </button>
          </ng-container>
          <ng-container *ngIf="!nuevoRegistro">
            <button
              class="btn btn-primary mx-1"
              [disabled]="formTipoFeedback.invalid"
              (click)="actualizar()"
            >
              <span class="px-1">Actualizar</span>
            </button>
          </ng-container>
  
          <button class="btn btn-danger" (click)="limpiarCamposForm()">
            <span class="px-1">Cancelar</span>
          </button>
        </div>
      </div>
    </div>
    <loading [loading]="loaderModal"></loading>
  </ng-template>
  <!-- Modal Edicion -->
  <loading [loading]="loaderModal"></loading>
