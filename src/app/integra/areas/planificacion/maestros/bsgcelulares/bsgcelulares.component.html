<div class="card border-primary" #reporte>
    <div class="card-header pb-0 bg-color-material">
      <div class="col text-aling-center">
        <h2 class="mb-3 text-white">(C) Grabaciones Celulares</h2>
      </div>
    </div>
  
    <div class="card-body p-0">
      <form class="k-form k-form-horizontal">
        <div class="row">
          <div class="col-sm-12 my-2">
            <kendo-grid
              [kendoGridBinding]="gridGrabaciones.data"
              [loading]="gridGrabaciones.loading"
              [pageSize]="10"
              [selectable]="true"
              [sortable]="true"
              [resizable]="true"
              [pageable]="{
                buttonCount: 5,
                info: true,
                type: 'numeric',
                pageSizes: true,
                previousNext: true,
                position: 'bottom'
              }"
              filterable="menu"
            >
              <ng-template kendoGridToolbarTemplate>
                <div class="row col-md-12">
                  <div class="col-md-12 text-end">
                    <button
                      type="button"
                      class="btn btn-success text-white"
                      (click)="abrirModalDetalleInsertar()"
                    >
                      Subir Grabacion
                    </button>
                  </div>
                </div>
              </ng-template>
  
              <ng-template
                kendoPagerTemplate
                let-totalPages="totalPages"
                let-currentPage="currentPage"
              >
                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                <kendo-pager-numeric-buttons
                  [buttonCount]="5"
                ></kendo-pager-numeric-buttons>
                <kendo-pager-next-buttons></kendo-pager-next-buttons>
                <kendo-pager-input></kendo-pager-input>
                <kendo-pager-info></kendo-pager-info>
                <kendo-pager-page-sizes
                  [pageSizes]="cantidadItems"
                ></kendo-pager-page-sizes>
              </ng-template>
              <kendo-grid-column
                field="nombreArchivo"
                title="Nombre Archivo"
                [width]="200"
                [headerClass]="'justify-content-start'"
                [filterable]="true"
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                field="numeroDestino"
                title="Numero Destino"
                [width]="200"
                [headerClass]="'justify-content-start'"
                [filterable]="true"
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
              </kendo-grid-column>

              <kendo-grid-column
                field="fechaGrabacion"
                title="Fecha Grabacion"
                [width]="200"
                [headerClass]="'justify-content-start'"
                [filterable]="false"
              >
              </kendo-grid-column>

              <kendo-grid-column
                field="url"
                title="Url Grabacion"
                [width]="200"
                [headerClass]="'justify-content-start'"
                [filterable]="true"
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
              </kendo-grid-column>

              <kendo-grid-column
                field="area"
                title="Area"
                [width]="200"
                [headerClass]="'justify-content-start'"
                [filterable]="true"
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
              </kendo-grid-column>

            </kendo-grid>
          </div>
        </div>
      </form>
    </div>
  </div>
  
  <!-- Modal Edicion -->
  <ng-template #modalVersionMaterialEditar let-modal>
    <div class="modal-header bg-primary-header-modal">
      <h3 class="modal-title m-0 p-0" id="modal-basic-title">
        Subir Grabacion Celular
      </h3>
      <button
        type="button"
        class="btn-close"
        aria-label="Close"
        (click)="limpiarCamposForm()"
      ></button>
    </div>
    <div class="modal-body">
      <form [formGroup]="formVersionMaterialEditar">
        <div class="row mb-3">
          <div class="col-sm-12 col-md-12 k-form-horizontal">
            <kendo-formfield orientation="horizontal">
             <label
                for="inputArchivoConfiguracionVideo"
                class="col-sm-3 col-form-label font-weight-bold"
                >Archivo:</label
              >
              <div class="col-sm-9">
                <kendo-fileselect
                  placeholder="Seleccionar audio"
                  (select)="select($event)"
                  [multiple]="false"
                  [restrictions]="validationAudio"
                >
                </kendo-fileselect>
              </div>
             
            </kendo-formfield>
            <br>
            <kendo-formfield orientation="horizontal">
                <label
                for="inputArchivoConfiguracionVideo"
                class="col-sm-3 col-form-label font-weight-bold"
                >Area del Personal:</label
              >
                <kendo-dropdownlist
                  [data]="estadoAreas"
                  textField="nombre"
                  valueField="id"
                  [defaultItem]="{ nombre: '<Seleccione Area>', id: null }"
                  (valueChange)="changeArea($event)"
                >
                </kendo-dropdownlist>
              </kendo-formfield>
          </div>
        </div>
      </form>
  
      <div class="row my-2">
        <div class="text-end">
          <ng-container *ngIf="nuevoRegistro">
            <button
              class="btn btn-primary mx-1"
              [disabled]="buttonDisable"
              (click)="insertar()"
            >
              <span class="px-1">Nuevo</span>
            </button>
          </ng-container>
          <ng-container *ngIf="!nuevoRegistro">
            <button
              class="btn btn-primary mx-1"
              [disabled]="formVersionMaterialEditar.invalid"
              (click)="actualizar()"
            >
              <span class="px-1">Actualizar</span>
            </button>
          </ng-container>
  
          <button class="btn btn-danger" (click)="limpiarCamposForm()">
            <span class="px-1">Cancelar</span>
          </button>
        </div>
      </div>
    </div>
   
  </ng-template>
  <!-- Modal Edicion -->
