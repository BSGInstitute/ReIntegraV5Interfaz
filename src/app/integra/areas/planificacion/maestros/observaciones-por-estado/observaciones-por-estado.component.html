<div class="content">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h2 class="text-white mb-2">Maestro Observaciones por Estado</h2>
        </div>
        <div class="card-body p-4" id="grillaObservacionPorEstado">
          <div class="col-12">
            <kendo-grid
              #kgridObservacionPorEstado
              [kendoGridBinding]="gridObservacionPorEstado.data"
              [loading]="gridObservacionPorEstado.loading"
              [resizable]="true"
              filterable="menu"
              [sortable]="true"
              [pageSize]="10"
              [pageable]="{ pageSizes: [5, 10, 20] }"
            >
              <ng-template kendoGridToolbarTemplate let-dataItem="dataItem">
                <kendo-grid-spacer></kendo-grid-spacer>
                <button
                  kendoButton
                  icon="plus"
                  themeColor="primary"
                  (click)="abrirModal(modalObservacionPorEstado, true)"
                >
                  Nuevo
                </button>
              </ng-template>

              <kendo-grid-column
                field="nombre"
                title="Observacion"
                [headerClass]="'header-grid-integra'"
              >
              </kendo-grid-column>

              <kendo-grid-column
                field="estadoCursoNombre"
                title="Estado"
                [width]="200"
                [headerClass]="'header-grid-integra'"
              >
              </kendo-grid-column>

              <kendo-grid-command-column
                title="Acciones"
                [width]="80"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  <div class="w-100 d-flex justify-content-center">
                    <button
                      kendoGridEditCommand
                      themeColor="warning"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Editar"
                      (click)="abrirModal(modalObservacionPorEstado, false, dataItem)"
                    >
                      <span class="k-icon k-i-pencil k-icon-20"></span>
                    </button>

                    <button
                      kendoButton
                      themeColor="error"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Eliminar"
                      (click)="eliminar(dataItem.id)"
                    >
                      <span class="k-icon k-i-x k-icon-20"></span>
                    </button>
                  </div>
                </ng-template>
              </kendo-grid-command-column>

              <ng-template kendoPagerTemplate>
                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                <kendo-pager-numeric-buttons
                  [buttonCount]="10"
                ></kendo-pager-numeric-buttons>
                <kendo-pager-next-buttons></kendo-pager-next-buttons>
                <kendo-pager-input></kendo-pager-input>
                <kendo-pager-info></kendo-pager-info>
                <kendo-pager-page-sizes
                  [pageSizes]="pageSizes"
                ></kendo-pager-page-sizes>
                <div class="w-100 text-end">
                  <button
                    kendoButton
                    icon="reload"
                    fillMode="flat"
                    themeColor="secondary"
                    (click)="obtener()"
                  ></button>
                </div>
              </ng-template>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- -----------------------Modal Crear Nuevo/Actualizar ---------------------- -->
<ng-template #modalObservacionPorEstado let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h1 class="modal-title m-0 p-0" id="modal-basic-title">
      {{ isNew ? 'Nueva Observación por Estado' : 'Editar Observación por Estado' }}
    </h1>
  </div>

  <div class="modal-body p-4">
    <form [formGroup]="formObservacionPorEstado">
      <div class="row g-4">

        <div class="col-12">
          <label class="form-label fw-semibold mb-2">
            Estado Curso <strong class="text-danger">*</strong>
          </label>
          <kendo-formfield>
            <kendo-dropdownlist
              formControlName="idPEspecificoSesionEstado"
              [data]="listaEstadoCurso"
              textField="nombre"
              valueField="id"
              [valuePrimitive]="true"
              [defaultItem]="{ id: null, nombre: 'Seleccione un estado...' }"
              class="w-100"
            >
            </kendo-dropdownlist>
            <kendo-formerror>El campo Estado Curso es obligatorio</kendo-formerror>
          </kendo-formfield>
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold mb-2">
            Observación <strong class="text-danger">*</strong>
          </label>
          <kendo-formfield>
            <textarea
              formControlName="nombre"
              class="form-control"
              rows="4"
              placeholder="Ingrese la observación..."
            ></textarea>
            <kendo-formerror>El campo Observación es obligatorio</kendo-formerror>
          </kendo-formfield>
        </div>

      </div>
    </form>
  </div>

  <div class="modal-footer gap-2">
    <button
      *ngIf="isNew"
      type="button"
      class="btn btn-primary"
      [disabled]="enProcesoSolicitud"
      (click)="guardar()"
    >
      <i class="fas fa-save me-1"></i> Guardar
    </button>
    <button
      *ngIf="!isNew"
      type="button"
      class="btn btn-primary"
      [disabled]="enProcesoSolicitud"
      (click)="actualizar()"
    >
      <i class="fas fa-sync-alt me-1"></i> Actualizar
    </button>
    <button
      type="button"
      class="btn btn-outline-secondary"
      (click)="modal.close('Close click')"
      [disabled]="enProcesoSolicitud"
    >
      Cancelar
    </button>
  </div>
  <loading [loading]="enProcesoSolicitud"></loading>
</ng-template>
