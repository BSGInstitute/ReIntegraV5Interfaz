<div class="content">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h2 class="text-white mb-2">Gestion Academica</h2>
        </div>
        <div class="card-body p-4" id="grillaAgendaTab">
          <div class="col-12">
            <kendo-grid
              #kgridGestionAcademica
              [kendoGridBinding]="gridGestionAcademica.data"
              [loading]="gridGestionAcademica.loading"
              [resizable]="true"
              filterable="menu"
              [sortable]="true"
              [pageSize]="10"
              [pageable]="{ pageSizes: [5, 10, 20] }"
            >
              <ng-template kendoGridToolbarTemplate>
                <kendo-grid-spacer></kendo-grid-spacer>
                <button
                  kendoButton
                  icon="plus"
                  themeColor="primary"
                  (click)="abrirModal(modalGestionAcademica, true)"
                >
                  Agregar
                </button>
              </ng-template>

              <kendo-grid-column
                field="fechaAsignacion"
                title="FechaAsignacion"
                [width]="130"
                [headerClass]="'header-grid-integra'"
              >
              </kendo-grid-column>

              <kendo-grid-column
                field="nombre"
                title="Docente"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
              </kendo-grid-column>

              <kendo-grid-command-column
                title="Acciones"
                [width]="80"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  <div class="w-100 d-flex justify-content-center">
                    <button
                      kendoButton
                      themeColor="success"
                      fillMode="solid"
                      rounded="large"
                      size="small"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Editar"
                      (click)="abrirModal(modalGestionAcademica, false, dataItem)"
                    >
                      Editar
                    </button>
                  </div>
                </ng-template>
              </kendo-grid-command-column>

              <ng-template kendoPagerTemplate>
                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                <kendo-pager-numeric-buttons
                  [buttonCount]="10"
                ></kendo-pager-numeric-buttons>
                <kendo-pager-next-buttons></kendo-pager-next-buttons>
                <kendo-pager-input></kendo-pager-input>
                <kendo-pager-info></kendo-pager-info>
                <kendo-pager-page-sizes
                  [pageSizes]="pageSizes"
                ></kendo-pager-page-sizes>
                <div class="w-100 text-end">
                  <button
                    kendoButton
                    icon="reload"
                    fillMode="flat"
                    themeColor="secondary"
                    (click)="obtener()"
                  ></button>
                </div>
              </ng-template>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- -----------------------Modal Crear Nuevo/Actualizar ---------------------- -->
<ng-template #modalGestionAcademica let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h1 class="modal-title m-0 p-0" id="modal-basic-title">
      Registro de Gestion Academica
    </h1>
  </div>

  <div class="modal-body p-3">
    <form [formGroup]="formGestionAcademica">
      <div class="row">
        <!-- Docente -->
        <div class="col-sm-12 col-md-12 k-form-horizontal mb-3">
          <kendo-formfield orientation="horizontal">
            <label class="d-flex align-items-start">
              <span><b>Docente</b><strong class="text-danger">*</strong>:</span>
            </label>
            <kendo-dropdownlist
              [data]="listaDocentes"
              textField="nombre"
              valueField="id"
              formControlName="idDocente"
              [defaultItem]="{ id: null, nombre: 'Seleccione...' }"
            ></kendo-dropdownlist>
            <kendo-formerror>El campo Docente es obligatorio</kendo-formerror>
          </kendo-formfield>
        </div>

        <!-- Cursos -->
        <div class="col-sm-12 col-md-12 k-form-horizontal mb-3">
          <kendo-formfield orientation="horizontal">
            <label class="d-flex align-items-start">
              <span><b>Cursos</b> :</span>
            </label>
            <div class="d-flex align-items-center gap-2">
              <kendo-dropdownlist
                [data]="listaCursos"
                textField="nombre"
                valueField="id"
                formControlName="idCurso"
                [defaultItem]="{ id: null, nombre: 'Seleccione...' }"
                style="flex: 1"
              ></kendo-dropdownlist>
              <button
                kendoButton
                themeColor="primary"
                type="button"
                (click)="agregarCurso()"
              >
                Guardar
              </button>
            </div>
          </kendo-formfield>
        </div>
      </div>
    </form>

    <!-- Sub-grid Cursos Asignados -->
    <div class="row mt-3">
      <div class="col-12">
        <kendo-grid
          [data]="cursosAsignados"
          [resizable]="true"
        >
          <kendo-grid-column
            field="nombre"
            title="Cursos Asignados"
            [headerClass]="'header-grid-integra text-center'"
          ></kendo-grid-column>
          <kendo-grid-command-column
            title="Acciones"
            [width]="80"
            [headerClass]="'header-grid-integra text-center'"
          >
            <ng-template kendoGridCellTemplate let-dataItem="dataItem">
              <div class="w-100 d-flex justify-content-center">
                <button
                  kendoButton
                  themeColor="error"
                  fillMode="solid"
                  rounded="large"
                  size="small"
                  class="p-1"
                  (click)="eliminarCursoAsignado(dataItem.id)"
                >
                  <span class="k-icon k-i-x k-icon-16"></span>
                </button>
              </div>
            </ng-template>
          </kendo-grid-command-column>
        </kendo-grid>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button
      *ngIf="isNew"
      type="button"
      class="btn btn-primary"
      [disabled]="enProcesoSolicitud"
      (click)="guardar()"
    >
      Guardar
    </button>
    <button
      *ngIf="!isNew"
      type="button"
      class="btn btn-primary"
      [disabled]="enProcesoSolicitud"
      (click)="actualizar()"
    >
      Actualizar
    </button>
    <button
      type="button"
      class="btn btn-danger"
      (click)="modal.close('Close click')"
      [disabled]="enProcesoSolicitud"
    >
      Cancelar
    </button>
  </div>
  <loading [loading]="enProcesoSolicitud"></loading>
</ng-template>
