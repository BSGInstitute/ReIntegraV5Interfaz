<div class="content">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h2 class="text-white mb-2">Lista de los Feedback Configurados</h2>
        </div>
        <div class="card-body p-4" id="grillaAgendaTab">
          <div class="col-12">
            <kendo-grid
              #kgridCronograma
              [kendoGridBinding]="gridFeedBackConfigurar.data"
              [loading]="gridFeedBackConfigurar.loading"
              (cancel)="gridFeedBackConfigurar.cancelHandler($event)"
              [pageSize]="10"
              [pageable]="true"
              filterable="menu"
              [pageable]="{ pageSizes: [10, 20, 30] }"
            >
              <!-- filterable="menu" -->
              <ng-template
                kendoGridToolbarTemplate
                let-dataItem="dataItem"
                [headerClass]="'header-grid-integra'"
              >
                <button
                  kendoButton
                  icon="reload"
                  fillMode="flat"
                  themeColor="primary"
                  (click)="obtener()"
                ></button>

                <kendo-grid-spacer></kendo-grid-spacer>
                <button
                  kendoButton
                  icon="plus"
                  themeColor="primary"
                  (click)="abrirModal(modalCrearEsquemaEvaluacion, true)"
                >
                  Nuevo
                </button>
              </ng-template>
              <kendo-grid-column
                field="nombre"
                title="Nombre"
                [width]="100"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                field="nombreFeedbackTipo"
                title="Tipo Feedback"
                [width]="100"
                [headerClass]="'header-grid-integra'"
              >
              </kendo-grid-column>

              <kendo-grid-command-column
                title="Acciones"
                [width]="60"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template
                  kendoGridCellTemplate
                  let-dataItem="dataItem"
                  let-isNew="isNew"
                >
                  <div class="w-100 d-flex justify-content-center">
                    <!-- Editar -->
                    <button
                      kendoGridEditCommand
                      fillMode="solid"
                      rounded="large"
                      themeColor="warning"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Editar"
                      (click)="
                        abrirModal(modalCrearEsquemaEvaluacion, false, dataItem)
                      "
                    >
                      <span class="k-icon k-i-edit k-icon-20"></span>
                    </button>
                    <!-- Eliminar -->
                    <button
                      kendoButton
                      themeColor="error"
                      icon="trash"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      (click)="eliminar(dataItem.id)"
                    ></button>
                  </div>
                </ng-template>
              </kendo-grid-command-column>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!--------------------------- Modal Creacion y Editar --------------------------------- -->

<ng-template #modalCrearEsquemaEvaluacion let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h1 class="modal-title m-0 p-0" id="modal-basic-title">
      Datos de Configurar Feedback
    </h1>
  </div>
  <div class="modal-body">
    <div class="row">
      <form
        class="k-form k-form-horizontal"
        [formGroup]="formDatosdeFeedbackConfigurar"
        class="k-form"
      >
        <div class="row">
          <div class="col-sm-12 col-md-6 k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label
                [for]="FeedbackTipo"
                class="k-label d-flex align-items-start text-start pt-0"
                ><b> Tipo <br />Feedback <strong class="text-danger">*</strong>: </b>
              </label>

              <kendo-dropdownlist
                #FeedbackTipo
                [data]="DataFeedTipos"
                formControlName="idFeedbackTipo"
                [valuePrimitive]="true"
                textField="nombre"
                valueField="id"
              ></kendo-dropdownlist>
              <kendo-formerror>Ingrese Tipo Feedback</kendo-formerror>
            </kendo-formfield>
          </div>
          <div class="col-sm-12 col-md-6 k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label
                [for]="nombre"
                class="k-label d-flex align-items-start text-start pt-0"
                ><b> Nombre <strong class="text-danger">*</strong>:</b>
              </label>
              <kendo-textbox #nombre formControlName="nombre" required>
              </kendo-textbox>
              <kendo-formerror>Ingrese Nombre</kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
        <br>
        <div class="row">
          <div class="row">
            <div class="col-12">
              <kendo-grid
                #kgridCronograma
                [kendoGridBinding]="gridFeedbackDetalle.data"
                [loading]="gridFeedbackDetalle.loading"
                (remove)="gridFeedbackDetalle.removeHandler($event)"
                (cancel)="gridFeedbackDetalle.cancelHandler($event)"
                (save)="gridFeedbackDetalle.saveHandler($event)"
                (add)="gridFeedbackDetalle.addHandler($event)"
                (edit)="gridFeedbackDetalle.editHandler($event)"
                [pageSize]="10"
                [pageable]="true"
                [resizable]="true"
                
              >
                <ng-template kendoGridToolbarTemplate>
                  <button
                    kendoGridAddCommand
                    fillMode="flat"
                    themeColor="primary"
                    icon="plus"
                  >
                    Agregar
                  </button>
                </ng-template>
                <kendo-grid-column
                  field="puntaje"
                  title="Puntaje"
                  [width]="90"
                  headerClass="justify-content-center"
                >
                  <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                    {{ dataItem.puntaje }}
                  </ng-template>
                  <ng-template
                    kendoGridEditTemplate
                    let-formGroup="formGroup"
                    let-dataItem="dataItem"
                  >
                    <kendo-numerictextbox
                      [formControl]="formGroup.get('puntaje')"
                      [min]="0"
                      [decimals]="0"
                    ></kendo-numerictextbox>
                  </ng-template>
                </kendo-grid-column>

                <kendo-grid-column
                  field="idSexo"
                  title="Sexo"
                  [width]="90"
                  headerClass="justify-content-center"
                >
                  <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                    {{ getSexoName(dataItem.idSexo) }}
                  </ng-template>
                  <ng-template
                    kendoGridEditTemplate
                    let-formGroup="formGroup"
                    let-dataItem="dataItem"
                  >
                    <kendo-dropdownlist
                      [data]="DataSexo"
                      textField="nombre"
                      valueField="id"
                      [valuePrimitive]="true"
                      [formControl]="formGroup.get('idSexo')"
                    >
                    </kendo-dropdownlist>
                  </ng-template>
                </kendo-grid-column>
                <kendo-grid-column
                  field="nombreVideo"
                  title="Nombre Video"
                  [width]="90"
                  headerClass="justify-content-center"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Comando"
                  [width]="90"
                  headerClass="justify-content-center"
                >
                  <ng-template kendoGridCellTemplate let-dataItem>
                    <div class="text-center">
                      <button
                        kendoGridEditCommand
                        rounded="large"
                        themeColor="warning"
                        size="large"
                        class="p-2 me-1 ms-1"
                        container="body"
                        placement="top"
                        ngbTooltip="Editar"
                      >
                        <span class="k-icon k-i-edit k-icon-20"></span>
                      </button>
                      <button
                        kendoGridSaveCommand
                        themeColor="primary"
                        fillMode="solid"
                        rounded="large"
                        size="large"
                        class="p-2 me-1 ms-1"
                        [disabled]="gridFeedbackDetalle.formGroup?.invalid"
                        container="body"
                        placement="top"
                        ngbTooltip="Guardar"
                      >
                        <span class="k-icon k-i-save k-icon-20"></span>
                      </button>
                      <button
                        kendoGridCancelCommand
                        themeColor="secondary"
                        fillMode="solid"
                        rounded="large"
                        size="large"
                        class="p-2 me-1 ms-1"
                        container="body"
                        placement="top"
                        ngbTooltip="Cancelar"
                      >
                        <span class="k-icon k-i-cancel k-icon-20"></span>
                      </button>
                      <button
                        kendoGridRemoveCommand
                        themeColor="error"
                        fillMode="solid"
                        rounded="large"
                        class="p-2 me-1 ms-1"
                        container="body"
                        placement="top"
                        ngbTooltip="Eliminar"
                      >
                        <span class="k-icon k-i-trash k-icon-20"></span>
                      </button>
                    </div>
                  </ng-template>
                </kendo-grid-column>
              </kendo-grid>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="modal-footer">
    <button
      *ngIf="isNew"
      type="button"
      class="btn btn-primary"
      [disabled]="enProcesoSolicitud"
      (click)="guardar()"
    >
      Guardar
    </button>
    <button
      *ngIf="!isNew"
      type="button"
      class="btn btn-primary"
      [disabled]="enProcesoSolicitud"
      (click)="actualizar()"
    >
      Actualizar
    </button>
    <button
      type="button"
      class="btn btn-danger"
      (click)="modal.close('Close click')"
      [disabled]="enProcesoSolicitud"
    >
      Cancelar
    </button>
  </div>
  <loading [loading]="enProcesoSolicitud"></loading>
</ng-template>
