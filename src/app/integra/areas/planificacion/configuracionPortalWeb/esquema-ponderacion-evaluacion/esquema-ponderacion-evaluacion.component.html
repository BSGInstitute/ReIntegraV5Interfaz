<div class="content">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h2 class="text-white mb-2">Maestro Esquema de Evaluacion</h2>
        </div>
        <div class="card-body p-4" id="grillaAgendaTab">
          <div class="col-12">
            <kendo-grid
              #kgridCronograma
              [kendoGridBinding]="gridEsquemaEvaluacion.data"
              [loading]="gridEsquemaEvaluacion.loading"
              (cancel)="gridEsquemaEvaluacion.cancelHandler($event)"
              [pageSize]="10"
              [pageable]="true"
              filterable="menu"
              [pageable]="{ pageSizes: [10, 20, 30] }"
            >
              <!-- filterable="menu" -->
              <ng-template kendoGridToolbarTemplate let-dataItem="dataItem">
                <button
                  kendoButton
                  icon="reload"
                  fillMode="flat"
                  themeColor="primary"
                  (click)="obtener()"
                ></button>

                <kendo-grid-spacer></kendo-grid-spacer>

                <button
                  kendoButton
                  icon="plus"
                  themeColor="primary"
                  (click)="abrirModalNuevo(modalCrearEsquemaEvaluacion, true)"
                >
                  Nuevo
                </button>
              </ng-template>
              <kendo-grid-column
                field="nombre"
                title="Nombre"
                [width]="90"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                field="FormaCalculoEvaluacion"
                title="Forma Calculo Evaluacion"
                [width]="90"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
                <!-- <ng-template kendoGridCellTemplate let-dataItem>
            {{
              getNombreFormaCalculoEvaluacion(dataItem.idFormaCalculoEvaluacion)
            }}
          </ng-template> -->
              </kendo-grid-column>

              <kendo-grid-command-column
                title="Editar"
                [width]="80"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template
                  kendoGridCellTemplate
                  let-dataItem="dataItem"
                  let-isNew="isNew"
                >
                  <div class="w-100 d-flex justify-content-center">
                    <!-- Editar -->
                    <button
                      kendoGridEditCommand
                      fillMode="solid"
                      rounded="large"
                      themeColor="warning"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Editar"
                      (click)="
                        abrirModalNuevo(
                          modalCrearEsquemaEvaluacion,
                          false,
                          dataItem
                        )
                      "
                    >
                      <span class="k-icon k-i-edit k-icon-20"></span>
                    </button>
                  </div>
                </ng-template>
              </kendo-grid-command-column>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ----------------Modal Crear Nuevo---------------------- -->
<ng-template #modalCrearEsquemaEvaluacion let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h1 class="modal-title m-0 p-0" id="modal-basic-title">
      Detalle: Esquema de Evaluación
    </h1>
  </div>
  <div class="modal-body">
    <div class="row">
      <form
        class="k-form k-form-horizontal"
        [formGroup]="formEsquemaEvaluacion"
      >
        <div class="col-sm-12 col-md-12 k-form-horizontal">
          <kendo-formfield orientation="horizontal">
            <label [for]="nombre" class="d-flex align-items-start">
              <span><b>Nombre</b><strong class="text-danger">*</strong>:</span>
            </label>
            <kendo-textbox
              #nombre
              formControlName="nombre"
              placeholder="<Ingrese nombre>"
            >
            </kendo-textbox>
            <kendo-formerror>Ingrese Nombre</kendo-formerror>
          </kendo-formfield>
        </div>

        <div class="col-sm-12 col-md-12 k-form-horizontal">
          <kendo-formfield orientation="horizontal">
            <label
              [for]="FormaCalculoEvaluacion"
              class="k-label d-flex align-items-start text-start pt-0"
              ><b>
                Forma Calculo Evaluacion<strong class="text-danger">*</strong
                >:</b
              >
            </label>
            <kendo-dropdownlist
              [data]="DataFormaCalculoEvaluacion"
              textField="nombre"
              [valuePrimitive]="true"
              #FormaCalculoEvaluacion
              valueField="id"
              formControlName="idFormaCalculoEvaluacion"
              [defaultItem]="{
                nombre: 'Seleccione ...',
                idFormaCalculoEvaluacion: null
              }"
            >
            </kendo-dropdownlist>
            <kendo-formerror>Seleccione una Forma de Calculo</kendo-formerror>
          </kendo-formfield>
        </div>

        <div class="col-sm-12 col-md-12 k-form-horizontal">
          <kendo-formfield orientation="horizontal">
            <label
              [for]="ModalidadCurso"
              class="k-label d-flex align-items-start text-start pt-0"
              ><b>Modalidad<strong class="text-danger">*</strong>:</b>
            </label>
            <kendo-dropdownlist
              [data]="DataModalidadCurso"
              textField="nombre"
              #ModalidadCurso
              [valuePrimitive]="true"
              valueField="id"
              formControlName="idModalidadCurso"
              [defaultItem]="{
                nombre: 'Seleccione ...',
                idModalidadCurso: null
              }"
              (valueChange)="cambiarCriteriosPorModalidad($event)"
            >
            </kendo-dropdownlist>

            <kendo-formerror>Seleccione una Modalidad</kendo-formerror>
          </kendo-formfield>
        </div>

        <div class="row">
          <div class="col-12">
            <kendo-grid
              #kgridCronograma
              [kendoGridBinding]="gridEsquemaEvaluacionDetalle.data"
              [loading]="gridEsquemaEvaluacionDetalle.loading"
              (remove)="gridEsquemaEvaluacionDetalle.removeHandler($event)"
              (cancel)="gridEsquemaEvaluacionDetalle.cancelHandler($event)"
              (save)="gridEsquemaEvaluacionDetalle.saveHandler($event)"
              (add)="gridEsquemaEvaluacionDetalle.addHandler($event)"
              (edit)="gridEsquemaEvaluacionDetalle.editHandler($event)"
              [pageSize]="10"
              [pageable]="true"
              [resizable]="true"
              [pageable]="{ pageSizes: true }"
              [kendoGridPagerInfoTemplate]="pagerInfoTemplate"
            >
              <ng-template kendoGridToolbarTemplate>
                <button
                  kendoGridAddCommand
                  fillMode="flat"
                  themeColor="primary"
                  icon="plus"
                  [disabled]="valorBandera == null"
                >
                  <!-- (click)="ObternerContactos()" -->
                  Agregar
                </button>
              </ng-template>
              <kendo-grid-column
                field="idCriterioEvaluacion"
                title="Criterio Evaluacion"
                [width]="90"
                headerClass="justify-content-center"
              >
                <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  {{
                    ObtenerNombreCriterioEvaluacion(
                      dataItem.idCriterioEvaluacion
                    )
                  }}
                </ng-template>
                <ng-template
                  kendoGridEditTemplate
                  let-formGroup="formGroup"
                  let-dataItem="dataItem"
                >
                  <kendo-dropdownlist
                    [data]="filteredCriterioEvaluacion"
                    textField="nombre"
                    valueField="id"
                    [valuePrimitive]="true"
                    [formControl]="formGroup.get('idCriterioEvaluacion')"
                  >
                  </kendo-dropdownlist>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                field="ponderacion"
                title="Ponderacion"
                [width]="90"
                headerClass="justify-content-center"
              >
                <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  {{ dataItem.ponderacion }}
                </ng-template>
                <ng-template
                  kendoGridEditTemplate
                  let-formGroup="formGroup"
                  let-dataItem="dataItem"
                >
                  <kendo-numerictextbox
                    [formControl]="formGroup.get('ponderacion')"
                    [min]="0"
                    [decimals]="0"
                  ></kendo-numerictextbox>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                title="Comando"
                [width]="90"
                headerClass="justify-content-center"
              >
                <ng-template kendoGridCellTemplate let-dataItem>
                  <div class="text-center">
                    <button
                      kendoGridEditCommand
                      rounded="large"
                      themeColor="warning"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Editar"
                    >
                      <span class="k-icon k-i-edit k-icon-20"></span>
                    </button>
                    <button
                      kendoGridSaveCommand
                      themeColor="primary"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      [disabled]="
                        gridEsquemaEvaluacionDetalle.formGroup?.invalid
                      "
                      container="body"
                      placement="top"
                      ngbTooltip="Guardar"
                    >
                      <span class="k-icon k-i-save k-icon-20"></span>
                    </button>
                    <button
                      kendoGridCancelCommand
                      themeColor="secondary"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Cancelar"
                    >
                      <span class="k-icon k-i-cancel k-icon-20"></span>
                    </button>

                    <button
                      kendoGridRemoveCommand
                      themeColor="error"
                      fillMode="solid"
                      rounded="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Eliminar"
                    >
                      <span class="k-icon k-i-trash k-icon-20"></span>
                    </button>
                  </div>
                </ng-template>
              </kendo-grid-column>
              <ng-template #pagerInfoTemplate let-from="from" let-to="to" let-total="total">
                {{ from }} - {{ to }} of {{ total }} items
              </ng-template>
            </kendo-grid>
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="modal-footer">
    <button
      *ngIf="isNew"
      type="button"
      class="btn btn-primary"
      [disabled]="enProcesoSolicitud"
      (click)="guardar()"
    >
      Guardar
    </button>
    <button
      *ngIf="!isNew"
      type="button"
      class="btn btn-primary"
      [disabled]="enProcesoSolicitud"
      (click)="actualizar()"
    >
      Actualizar
    </button>
    <button
      type="button"
      class="btn btn-danger"
      (click)="closeModal()"
      [disabled]="enProcesoSolicitud"
    >
      Cancelar
    </button>
  </div>
  <loading [loading]="enProcesoSolicitud"></loading>
</ng-template>
