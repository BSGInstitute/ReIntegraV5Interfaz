<div class="card border-primary" #reporte>
    <div class="card-header pb-0 bg-color-material">
      <div class="col text-aling-center">
        <h2 class="mb-3 text-white">Lista de Configuracion</h2>
      </div>
    </div>
  
    <div class="card-body p-0">
      <form class="k-form k-form-horizontal">
        <div class="row">
          <div class="col-sm-12 my-2">
            <kendo-grid
              [kendoGridBinding]="gridFeedbackPrograma.data"
              [loading]="gridFeedbackPrograma.loading"
              [selectable]="true"
              [sortable]="true"
              [resizable]="true"
              [pageable]="{
                buttonCount: 5,
                info: true,
                type: 'numeric',
                pageSizes: true,
                previousNext: true,
                position: 'bottom'
              }"
              [skip]="0"
              [pageSize]="15"
              filterable="menu"
            >
              <ng-template kendoGridToolbarTemplate>
                <div class="row col-md-12">
                  <div class="col-md-12 text-end">
                    <button
                      type="button"
                      class="btn btn-success text-white"
                      (click)="abrirModalDetalleInsertar()"
                    >
                      Nuevo
                    </button>
                  </div>
                </div>
              </ng-template>
  
              <ng-template
                kendoPagerTemplate
                let-totalPages="totalPages"
                let-currentPage="currentPage"
              >
                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                <kendo-pager-numeric-buttons
                  [buttonCount]="5"
                ></kendo-pager-numeric-buttons>
                <kendo-pager-next-buttons></kendo-pager-next-buttons>
                <kendo-pager-input></kendo-pager-input>
                <kendo-pager-info></kendo-pager-info>
                <kendo-pager-page-sizes
                  [pageSizes]="cantidadItems"
                ></kendo-pager-page-sizes>
              </ng-template>
  
              <kendo-grid-column
                field="nombre"
                title="Feedback Grupo"
                [width]="200"
                
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
              </kendo-grid-column>
  
  
              <kendo-grid-command-column
                title="Acciones"
                [headerStyle]="{ color: '#5f75bd' }"
                [width]="70"
                [headerClass]="'justify-content-center'"
              >
                <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  <button
                    kendoButton
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Editar"
                    (click)="abrirModalDetalleActualizar(dataItem)"
                  >
                    <span class="k-icon k-i-pencil k-icon-20"></span>
                  </button>

                  <button
                    kendoButton
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Eliminar"
                    (click)="eliminar(dataItem)"
                  >
                    <span class="k-icon k-i-x k-icon-20"></span>
                  </button>
                </ng-template>
              </kendo-grid-command-column>
            </kendo-grid>
          </div>
        </div>
      </form>
    </div>
  </div>


<!-- Modal Edicion -->
<ng-template #modalAsociarFeedbackEditar let-modal>
    <div class="modal-header bg-primary-header-modal">
      <h3 class="modal-title m-0 p-0" id="modal-basic-title">
        Datos del Feedback Tipo
      </h3>
      <button type="button" class="btn-close" aria-label="Close"></button>
    </div>
    <div class="modal-body">
      <form [formGroup]="formAreaEditar">


        <div class="row mb-3">
          <div class="col-sm-12 col-md-12 k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                class="d-flex align-items-end"
                [for]="ProgramasGenerales"
                text="Programa General:"
              >
              </kendo-label>
              <kendo-multiselect
                #ProgramasGenerales
                textField="nombre"
                valueField="id"
                formControlName="idsProgramaGenerales"
                [valuePrimitive]="true"
                (valueChange)="cargarPespecificos($event)"
                [data]="dataProgramasGenerales"
                placeholder="<Seleccione Programa General>"
                
              ></kendo-multiselect>
            </kendo-formfield>
          </div>
        </div>
        <div class="row mb-3">
            <div class="col-sm-12 col-md-12 k-form-horizontal">
              <kendo-formfield orientation="horizontal">
                <kendo-label
                  class="d-flex align-items-end"
                  [for]="ProgramaEspecifico"
                  text="Programa Especifico:"
                >
                </kendo-label>
                <kendo-multiselect
                  #ProgramaEspecifico
                  textField="nombre"
                  valueField="id"
                  defaultValue="[]"
                  formControlName="idsProgramaEspecifico"
                  [data]="dataProgramasEspecificos"
                  [valuePrimitive]="true"
                  placeholder="<Seleccione Programa Especifico>"
                ></kendo-multiselect>
              </kendo-formfield>
            </div>
          </div>
        <div class="row mb-3">
            <div class="col-sm-12 col-md-12 k-form-horizontal">
              <kendo-formfield orientation="horizontal">
                <kendo-label
                  class="d-flex align-items-end"
                  [for]="FeedbackConfigurar"
                  text="Configuracion Feedback:"
                >
                </kendo-label>
                <kendo-dropdownlist
                  #FeedbackConfigurar
                  textField="nombre"
                  valueField="id"
                  formControlName="idFeedbackConfigurar"
                  [valuePrimitive]="true"
                  [data]="dataFeedbackConfigurados"
                  placeholder="<Seleccione dato>"
                ></kendo-dropdownlist>
                
              </kendo-formfield>
            </div>
          </div>
      </form>
  
      <div class="row my-2">
        <div class="text-end">
          <ng-container *ngIf="nuevoRegistro">
            <button
              class="btn btn-primary mx-1"
              [disabled]="formAreaEditar.invalid"
              (click)="insertar()"
            >
              <span class="px-1">Nuevo</span>
            </button>
          </ng-container>
          <ng-container *ngIf="!nuevoRegistro">
            <button
              class="btn btn-primary mx-1"
              [disabled]="formAreaEditar.invalid"
              (click)="actualizar()"
            >
              <span class="px-1">Actualizar</span>
            </button>
          </ng-container>
  
          <button class="btn btn-danger" (click)="limpiarCamposForm()">
            <span class="px-1">Cancelar</span>
          </button>
        </div>
      </div>
    </div>
    <loading [loading]="loaderModal"></loading>
  </ng-template>
  <!-- Modal Edicion -->
