<div class="card border-primary mb-3 atp">
  <div class="card-header bg-color-material pb-0">
    <h2 class="mb-2 text-white text-center">(O) Asociar Tags a Programas</h2>
  </div>
  <div class="card-body p-4">
    <form [formGroup]="formFiltro" orientation="horizontal">
      <div class="row">
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3" style="padding-top: 5px">
              <label [for]="idsTiposCategoriaError" class="k-label">
                <span><b>Área</b></span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-dropdownlist
                #idsTiposCategoriaError
                formControlName="idArea"
                [data]="dataArea"
                [defaultItem]="defaultItemTag"
                textField="nombre"
                [virtual]="virtual"
                valueField="id"
                [valuePrimitive]="true"
                (valueChange)="filtroSubArea($event)"
              >
              </kendo-dropdownlist>
            </div>
          </div>
        </div>
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3" style="padding-top: 5px">
              <label [for]="idsTiposCategoriaError" class="k-label">
                <span><b>Sub Área</b></span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-dropdownlist
                #idsTiposCategoriaError
                formControlName="idSubArea"
                [data]="dataSubArea"
                [defaultItem]="defaultItemTag"
                [virtual]="virtual"
                textField="nombre"
                valueField="id"
                [valuePrimitive]="true"
                [disabled]="isDisabledSubArea"
              >
              </kendo-dropdownlist>
            </div>
          </div>
        </div>
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3" style="padding-top: 5px">
              <label [for]="idsTiposCategoriaError" class="k-label">
                <span><b>Categoría</b></span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-dropdownlist
                #idsTiposCategoriaError
                formControlName="idCategoria"
                [data]="dataCategoriaPrograma"
                [defaultItem]="defaultItemTag"
                [virtual]="virtual"
                textField="nombre"
                valueField="id"
                [valuePrimitive]="true"
              >
              </kendo-dropdownlist>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="card-footer">
    <div class="row">
      <div class="col-12 d-flex justify-content-end">
        <button
          kendoButton
          class="send-button"
          icon="search"
          style="height: 35px"
          themeColor="success"
          [disabled]="btnBuscarDisabled"
          (click)="generarReporte()"
        >
          Buscar
        </button>
      </div>
    </div>
  </div>
</div>

<div class="card border-primary" #reporte>
  <div class="card-header pb-0 bg-color-material">
    <div class="col text-aling-center">
      <h2 class="mb-2 text-white text-center">Lista de Programa General</h2>
    </div>
  </div>
  <div class="card-body p-0">
    <form class="k-form k-form-horizontal">
      <div class="row">
        <div class="col-sm-12 my-2">
          <kendo-grid
            [kendoGridBinding]="gridTagPrograma.data"
            [loading]="gridTagPrograma.loading"
            [selectable]="true"
            [sortable]="true"
            [resizable]="true"
            [pageable]="{
              buttonCount: 5,
              info: true,
              type: 'numeric',
              pageSizes: true,
              previousNext: true,
              position: 'bottom'
            }"
            [skip]="gridTagPrograma.gridState.skip"
            [pageSize]="gridTagPrograma.gridState.take"
            (dataStateChange)="gridTagPrograma.onStateChange($event)"
            filterable="menu"
            kendoGridSelectBy="id"
            (cellClick)="eventoClick($event)"
          >
            <ng-template
              kendoPagerTemplate
              let-totalPages="totalPages"
              let-currentPage="currentPage"
            >
              <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
              <kendo-pager-numeric-buttons
                [buttonCount]="5"
              ></kendo-pager-numeric-buttons>
              <kendo-pager-next-buttons></kendo-pager-next-buttons>
              <kendo-pager-input></kendo-pager-input>
              <kendo-pager-info></kendo-pager-info>
              <kendo-pager-page-sizes
                [pageSizes]="cantidadItems"
              ></kendo-pager-page-sizes>
              <div class="w-100 text-end">
                <button
                  kendoButton
                  icon="reload"
                  fillMode="flat"
                  themeColor="secondary"
                  (click)="obtener()"
                ></button>
              </div>
            </ng-template>
            <kendo-grid-column
              field="nombre"
              title="Nombre Programa General"
              [width]="80"
              headerClass="justify-content-center"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              field="nombreArea"
              title="Área"
              [width]="80"
              headerClass="justify-content-center"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              field="nombreSubArea"
              title="Sub Área"
              [width]="80"
              [data]="dataSubArea"
              headerClass="justify-content-center"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              title="Asociar Tags Existentes"
              [width]="60"
              headerClass="justify-content-center"
            >
              <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                <div style="display: flex; justify-content: center">
                  <button
                    kendoButton
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-6 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Asociar"
                    (click)="
                      abrirModalAsociarTag(modalTipoTagAsociar, dataItem)
                    "
                  >
                    <fa-icon [icon]="['fas', 'paper-plane']"></fa-icon>
                  </button>
                </div>
              </ng-template>
            </kendo-grid-column>
          </kendo-grid>
        </div>
      </div>
    </form>
  </div>
</div>
<br />

<div class="card border-primary" #listaTags>
  <div class="card-header pb-0 bg-color-material">
    <div class="row">
      <div class="col-md-6" style="display: flex; justify-content: start">
        <h2 class="mb-2 text-white text-center">Lista de Tags</h2>
      </div>
      <div class="col-md-6" style="display: flex; justify-content: end">
        <div style="padding-bottom: 5px" *ngIf="dataItemTemp">
          <button
            kendoButton
            fillMode="solid"
            rounded="large"
            size="large"
            container="body"
            placement="top"
            ngbTooltip="Asociar"
            (click)="abrirModalEditarTag(modalNuevoEditarTag)"
          >
            Nuevo
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="card-body p-0">
    <form class="k-form k-form-horizontal">
      <div class="row">
        <div class="col-sm-12 my-2">
          <kendo-grid
            [kendoGridBinding]="listaAsociarTags"
            [loading]="gridListaAsociarTags.loading"
            [selectable]="true"
            [sortable]="true"
            [resizable]="true"
            [skip]="0"
            [pageSize]="15"
            filterable="menu"
          >
            <kendo-grid-column
              field="nombre"
              title="Nombre"
              [width]="80"
              headerClass="justify-content-center"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              title="Desasociar"
              [width]="80"
              headerClass="justify-content-center"
            >
              <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                <div style="display: flex; justify-content: center">
                  <button
                    kendoButton
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-6 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Desasociar"
                    (click)="desasociarTag(dataItem)"
                  >
                    <fa-icon [icon]="['fas', 'paper-plane']"></fa-icon>
                  </button>
                </div>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              title="Editar"
              [width]="80"
              headerClass="justify-content-center"
            >
              <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                <div style="display: flex; justify-content: center">
                  <button
                    kendoButton
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Editar"
                    (click)="abrirModalEditarTag(modalNuevoEditarTag, dataItem)"
                  >
                    <span class="k-icon k-i-pencil k-icon-20"></span>
                  </button>
                  <button
                    kendoButton
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Eliminar"
                    (click)="eliminarTag(dataItem)"
                  >
                    <kendo-icon name="close"></kendo-icon>
                  </button>
                </div>
              </ng-template>
            </kendo-grid-column>
          </kendo-grid>
        </div>
      </div>
    </form>
  </div>
</div>

<ng-template #modalTipoTagAsociar let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header bg-primary-header-modal">
    <h1 class="modal-title m-0 p-0" id="modal-basic-title">
      <strong>Asociación: Programa General - Tags</strong>
    </h1>
  </div>
  <div class="modal-body px-4">
    <form class="k-form k-form-horizontal">
      <div class="row">
        <div class="col-sm col-md m-6">
          <div class="row mb-4">
            <div class="col-md-3">
              <label class="tag-label" [for]="asociarTags">
                <b>Tags: </b>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #asociarTags
                [formControl]="formControlIdsAsociarTag"
                [data]="listaSinAsicuarTags"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                valueField="id"
              >
              </kendo-multiselect>
            </div>
          </div>
        </div>
      </div>
    </form>
    <kendo-grid
      [kendoGridBinding]="asociarTags.value"
      [selectable]="true"
      [sortable]="true"
      [resizable]="true"
      [skip]="0"
      [pageSize]="15"
    >
      <kendo-grid-column
        field="nombre"
        title="Nombre"
        [width]="80"
        headerClass="justify-content-center"
      >
      </kendo-grid-column>
      <kendo-grid-column
        field="descripcion"
        title="Descripción"
        [width]="80"
        headerClass="justify-content-center"
      >
      </kendo-grid-column>
    </kendo-grid>
  </div>
  <div class="modal-footer">
    <div class="text-end">
      <button class="btn btn-primary mx-1" (click)="asociarTagPrograma()">
        Asociar
      </button>
      <button class="btn btn-danger" (click)="modal.close()">Cancelar</button>
    </div>
  </div>
</ng-template>

<ng-template #modalNuevoEditarTag let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header bg-primary-header-modal">
    <h1 class="modal-title m-0 p-0" id="modal-basic-title">
      <strong>Datos del Tag</strong>
    </h1>
  </div>
  <div class="modal-body px-4">
    <form [formGroup]="formDatosTag" class="k-form k-form-horizontal">
      <div class="row">
        <div class="col-sm col-md m-6">
          <div class="row mb-4">
            <div class="row">
              <div class="col-sm-7 col-md-7 k-form-horizontal">
                <kendo-formfield orientation="horizontal">
                  <kendo-label
                    class="d-flex align-items-start"
                    [style.fontWeight]="'bold'"
                    [style.width.px]="182"
                    text="Nombre:"
                  >
                  </kendo-label>
                  <kendo-textbox
                    class="d-flex"
                    size="small"
                    formControlName="nombre"
                    [style.width.%]="223"
                    fillMode="outline"
                  >
                  </kendo-textbox>
                  <kendo-formerror>*Campo Oblgatorio</kendo-formerror>
                </kendo-formfield>
              </div>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <label class="k-label">
                <span><b>Descripción: </b></span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-editor
                formControlName="descripcion"
                style="height: 450px"
                fillMode="outline"
              >
                <kendo-toolbar>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorBoldButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorItalicButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorUnderlineButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorStrikethroughButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorSubscriptButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorSuperscriptButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorAlignLeftButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAlignCenterButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAlignRightButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAlignJustifyButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-dropdownlist
                    kendoEditorFormat
                  ></kendo-toolbar-dropdownlist>
                  <kendo-toolbar-dropdownlist
                    kendoEditorFontSize
                  ></kendo-toolbar-dropdownlist>
                  <kendo-toolbar-dropdownlist
                    kendoEditorFontFamily
                  ></kendo-toolbar-dropdownlist>
                  <kendo-toolbar-colorpicker
                    kendoEditorForeColor
                  ></kendo-toolbar-colorpicker>
                  <kendo-toolbar-colorpicker
                    kendoEditorBackColor
                    view="gradient"
                  ></kendo-toolbar-colorpicker>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorInsertUnorderedListButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorInsertOrderedListButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorIndentButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorOutdentButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-button
                    kendoEditorBlockquoteButton
                  ></kendo-toolbar-button>
                  <kendo-toolbar-button
                    kendoEditorSelectAllButton
                  ></kendo-toolbar-button>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorUndoButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorRedoButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorCreateLinkButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorUnlinkButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-button
                    kendoEditorInsertFileButton
                  ></kendo-toolbar-button>
                  <kendo-toolbar-button
                    kendoEditorInsertImageButton
                  ></kendo-toolbar-button>
                  <kendo-toolbar-button
                    kendoEditorViewSourceButton
                  ></kendo-toolbar-button>
                  <kendo-toolbar-button
                    kendoEditorCleanFormattingButton
                  ></kendo-toolbar-button>
                  <kendo-editor-insert-table-button></kendo-editor-insert-table-button>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorAddColumnBeforeButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAddColumnAfterButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAddRowBeforeButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorAddRowAfterButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorDeleteColumnButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorDeleteRowButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorDeleteTableButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-buttongroup>
                    <kendo-toolbar-button
                      kendoEditorMergeCellsButton
                    ></kendo-toolbar-button>
                    <kendo-toolbar-button
                      kendoEditorSplitCellButton
                    ></kendo-toolbar-button>
                  </kendo-toolbar-buttongroup>
                  <kendo-toolbar-button
                    kendoEditorPrintButton
                  ></kendo-toolbar-button>
                </kendo-toolbar>
              </kendo-editor>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <label class="k-label">
                <span><b>Parámetro SEO: </b></span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #parametroSEOM
                [data]="comboParametroSEO"
                [kendoDropDownFilter]="filterSettings"
                textField="nombreParametroSeo"
                valueField="idParametroSeo"
                fillMode="outline"
                formControlName="parametroSeoAsociados"
              >
              </kendo-multiselect>
            </div>
          </div>
        </div>
      </div>
    </form>
    <kendo-grid
      [kendoGridBinding]="parametroSEOM.value"
      [selectable]="true"
      [sortable]="true"
      [resizable]="true"
    >
      <kendo-grid-column
        field="nombreParametroSeo"
        title="Nombre"
        [width]="80"
        headerClass="justify-content-center"
      >
      </kendo-grid-column>
      <kendo-grid-column
        field="contenido"
        title="Contenido"
        [width]="80"
        headerClass="justify-content-center"
      >
      </kendo-grid-column>
      <kendo-grid-column
        title="Editar"
        [width]="80"
        headerClass="justify-content-center"
      >
        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
          <div style="display: flex; justify-content: center">
            <button
              kendoButton
              fillMode="solid"
              rounded="large"
              size="large"
              class="p-2 me-1 ms-1"
              container="body"
              placement="top"
              ngbTooltip="Editar"
              (click)="abrirModalEditarContenido(modalEditarContenido, dataItem)"
            >
              <span class="k-icon k-i-pencil k-icon-20"></span>
            </button>
          </div>
        </ng-template>
      </kendo-grid-column>
    </kendo-grid>
  </div>
  <div class="modal-footer">
    <button
      class="btn btn-primary"
      style="color: white"
      [disabled]="btnActualizarTagDisabled"
      (click)="esNuevo ? insertarTag() : actualizarTag()"
    >
      {{ esNuevo ? "Nuevo" : "Actualizar" }}
    </button>
    <button class="btn btn-danger" style="color: white" (click)="modal.close()">
      Cancelar
    </button>
  </div>
</ng-template>

<ng-template #modalEditarContenido let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h1 class="modal-title m-0 p-0" id="modal-basic-title">
      <strong>Editar Contenido</strong>
    </h1>
  </div>
  <div class="modal-body px-4">
    <div class="row">
      <div class="col-sm col-md m-6">
        <div class="row mb-4">
          <div class="row">
            <div class="col-sm-7 col-md-7 k-form-horizontal">
              <kendo-formfield orientation="horizontal">
                <kendo-label
                  class="d-flex align-items-start"
                  [style.fontWeight]="'bold'"
                  [style.width.px]="182"
                  text="Contenido:"
                >
                </kendo-label>
                <kendo-textarea
                  class="d-flex"
                  size="small"
                  [formControl]="formControlContenido"
                  [style.width.%]="223"
                  fillMode="outline"
                >
                </kendo-textarea>
                <kendo-formerror>*Campo Oblgatorio</kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button
      class="btn btn-primary"
      style="color: white"
      [disabled]="formDatosTag.invalid"
      (click)="llenarContenido()"
    >
      Actualizar
    </button>
    <button class="btn btn-danger" style="color: white" (click)="modal.close()">
      Cancelar
    </button>
  </div>
</ng-template>
