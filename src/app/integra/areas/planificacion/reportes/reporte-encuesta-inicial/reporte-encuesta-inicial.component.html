<div class="card border-primary mb-3 rei">
  <div class="card-header bg-color-material pb-0">
    <h2 class="mb-2 text-white text-center">(R) Reporte Encuesta Inicial</h2>
  </div>
  <div class="card-body p-4">
    <form [formGroup]="formFiltro" orientation="horizontal">
      <div class="row">
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsProgramasGenerales" class="k-label">
                <span>Curso</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsProgramasGenerales
                formControlName="idsProgramasGenerales"
                [data]="dataProgramaGeneral"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                [valuePrimitive]="true"
                valueField="id"
                (valueChange)="obtenerCursoPEspecifico($event)"
              >
              </kendo-multiselect>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsProgramasEspecificos" class="k-label">
                <span>Curso Especifico</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsProgramasEspecificos
                formControlName="idsProgramasEspecificos"
                [data]="dataProgramaEspecifico"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                [valuePrimitive]="true"
                valueField="id"
              >
              </kendo-multiselect>
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsExpositores" class="k-label">
                <span>Docentes</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsExpositores
                formControlName="idsExpositores"
                [data]="dataExpositores"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                [valuePrimitive]="true"
                valueField="id"
              >
              </kendo-multiselect>
            </div>
          </div>

        </div>
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="version" class="k-label">
                <span>Nro. Version</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-dropdownlist
              #version
              formControlName="version"
              [data]="dataVersionesEncuesta"
              [popupSettings]="{ popupClass: 'pg-popup' }"
              textField="version"
              valueField="version"
              [valuePrimitive]="true"
              [defaultItem]="{ version: 'Insertar el número de versión' }"
              placeholder="Seleccione Tipo"
              >
              </kendo-dropdownlist>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <span>Fecha Inicio</span>
            </div>
            <div class="col-md-8">
              <kendo-datepicker
                #fechaInicio
                [incompleteDateValidation]="true"
                formControlName="fechaInicio"
                format="yyyy-MM-dd"
                [max]="obtenerFechaActual"
              ></kendo-datepicker>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <span>Fecha Fin</span>
            </div>
            <div class="col-md-8">
              <kendo-datepicker
                #fechaFin
                [incompleteDateValidation]="true"
                formControlName="fechaFin"
                format="yyyy-MM-dd"
                [min]="fechaInicio.value"
              ></kendo-datepicker>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="card-footer">
    <div class="row">
      <div class="col-12 d-flex justify-content-end">
        <button
          kendoButton
          class="send-button"
          icon="search"
          style="height: 35px"
          themeColor="success"
          [disabled]="btnBuscarDisabled"
          (click)="generarReporte()"
        >
          Buscar
        </button>
      </div>
    </div>
  </div>
</div>

<div class="card-body">
  <kendo-grid
    [kendoGridBinding]="gridReporteEncuestaInicial.data"
    [loading]="gridReporteEncuestaInicial.loading"
    [pageSize]="20"
    [pageable]="{
      buttonCount: 5,
      info: true,
      type: 'numeric',
      pageSizes: true,
      previousNext: true,
      position: 'bottom'
    }"
    [sortable]="true"
    [selectable]="true"
    [resizable]="true"
    filterable="menu"
  >
    <ng-template kendoGridToolbarTemplate>
      <button
        class="btn btn-success"
        type="button"
        kendoGridExcelCommand
        icon="file-excel"
        themeColor="success"
      >
        Export to Excel
      </button>
    </ng-template>
    <ng-template
      kendoPagerTemplate
      let-totalPages="totalPages"
      let-currentPage="currentPage"
    >
      <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
      <kendo-pager-numeric-buttons
        [buttonCount]="5"
      ></kendo-pager-numeric-buttons>
      <kendo-pager-next-buttons></kendo-pager-next-buttons>
      <kendo-pager-input></kendo-pager-input>
      <kendo-pager-info></kendo-pager-info>
      <kendo-pager-page-sizes
        [pageSizes]="cantidadItems"
      ></kendo-pager-page-sizes>
    </ng-template>
    <kendo-grid-column
      field="pGeneralMatricula"
      title="Programa General"
      [width]="200"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="centroCostoMatricula"
      title="Centro de Costo"
      [width]="210"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="codigoMatricula"
      title="Código del Alumno"
      [width]="180"
      headerClass="justify-content-center"
    >
      <ng-template kendoGridCellTemplate let-dataItem>
        <div class="text-center">
          {{ dataItem.codigoMatricula }}
        </div>
      </ng-template>
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="alumno"
      title="Alumno"
      [width]="200"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="coordinadorAcademico"
      title="Coordinadora Académica"
      [width]="210"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="pGeneralExamen"
      title="Curso"
      [width]="200"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="pEspecificoExamen"
      title="Curso Específico"
      [width]="200"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
        [style]="'justify-content-center'"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"

        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="centroCostoExamen"
      title="Centro de Costo Curso"
      [width]="180"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="encuesta"
      title="Encuesta"
      [width]="150"
      headerClass="justify-content-center"
    >
      <ng-template kendoGridCellTemplate let-dataItem>
        <div class="text-center">
          {{ dataItem.encuesta }}
        </div>
      </ng-template>
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="nombreDocente"
      title="Docente"
      [width]="180"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="fechaCreacion"
      title="Fecha de Creación"
      [width]="180"
      headerClass="justify-content-center"
    >
      <ng-template kendoGridCellTemplate let-dataItem>
        <div class="text-center">
          {{ dataItem.fechaCreacion | date : "dd-MM-yyyy" }}
        </div>
      </ng-template>
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-excel
      fileName="Reporte-Encuesta-Inicial.xlsx"
      [fetchData]="allData"
    >
      <kendo-excelexport-column *ngFor="let item of arrayColumnas" [field]="item.field" [title]="item.title">
      </kendo-excelexport-column>
    </kendo-grid-excel>
    <ng-template kendoGridDetailTemplate let-dataItem>
      <app-detalle-encuesta-inicial
        [listaPreguntas]="dataItem.preguntas"
      ></app-detalle-encuesta-inicial>
    </ng-template>
  </kendo-grid>
</div>
