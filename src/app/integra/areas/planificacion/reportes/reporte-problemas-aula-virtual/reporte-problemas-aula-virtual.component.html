<div class="card border-primary mb-3 rpav">
  <div class="card-header bg-color-material pb-0">
    <h2 class="mb-2 text-white text-center">
      (R) Reporte Problemas del Aula Virtual
    </h2>
  </div>
  <div class="card-body p-4">
    <form [formGroup]="formFiltro" orientation="horizontal">
      <div class="row">
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsCentrosCosto" class="k-label">
                <span>Centro Costo</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsCentrosCosto
                formControlName="idsCentrosCosto"
                [data]="dataCentroCosto"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                [virtual]="virtual"
                [valuePrimitive]="true"
                valueField="id"
              >
              </kendo-multiselect>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsMatriculasCabecera" class="k-label">
                <span>Código Matrícula</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsMatriculasCabecera
                formControlName="idsMatriculasCabecera"
                [data]="dataMatriculaCabecera"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="codigoMatricula"
                [virtual]="virtual"
                [valuePrimitive]="true"
                valueField="id"
              >
              </kendo-multiselect>
            </div>
          </div>
        </div>
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsTiposCategoriaError" class="k-label">
                <span>Tipo Observación</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsTiposCategoriaError
                formControlName="idsTiposCategoriaError"
                [data]="dataTiposCategoriaError"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                [valuePrimitive]="true"
                valueField="id"
              >
              </kendo-multiselect>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsCoordinadores" class="k-label">
                <span>Coordinador Académico</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsCoordinadores
                formControlName="idsCoordinadores"
                [data]="dataCoordinadores"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                [filterable]="true"
                textField="nombres"
                [virtual]=""
                [valuePrimitive]="true"
                valueField="id"
              >
              </kendo-multiselect>
            </div>
          </div>
        </div>
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3">
              <span>Fecha Inicio</span>
            </div>
            <div class="col-md-8">
              <kendo-datepicker
                #fechaInicio
                formControlName="fechaInicio"
                format="yyyy-MM-dd"
                [max]="obtenerFechaActual"
              ></kendo-datepicker>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <span>Fecha Fin</span>
            </div>
            <div class="col-md-8">
              <kendo-datepicker
                #fechaFin
                formControlName="fechaFin"
                format="yyyy-MM-dd"
                [min]="fechaInicio.value"
              ></kendo-datepicker>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="card-footer">
    <div class="row">
      <div class="col-12 d-flex justify-content-end">
        <button
          kendoButton
          class="send-button"
          icon="search"
          style="height: 35px"
          themeColor="success"
          [disabled]="btnBuscarDisabled"
          (click)="generarReporte()"
        >
          Buscar
        </button>
      </div>
    </div>
  </div>
</div>

<div class="card-body">
  <kendo-grid
    [kendoGridBinding]="gridReporteProblemasAulaVirtual.data"
    [loading]="gridReporteProblemasAulaVirtual.loading"
    [pageSize]="20"
    [pageable]="{
      buttonCount: 5,
      info: true,
      type: 'numeric',
      pageSizes: true,
      previousNext: true,
      position: 'bottom'
    }"
    [sortable]="true"
    [selectable]="true"
    [resizable]="true"
    filterable="menu"
  >
    <ng-template kendoGridToolbarTemplate>
      <button
        class="btn btn-success"
        type="button"
        kendoGridExcelCommand
        icon="file-excel"
        themeColor="success"
      >
        Export to Excel
      </button>
    </ng-template>
    <ng-template
      kendoPagerTemplate
      let-totalPages="totalPages"
      let-currentPage="currentPage"
    >
      <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
      <kendo-pager-numeric-buttons
        [buttonCount]="5"
      ></kendo-pager-numeric-buttons>
      <kendo-pager-next-buttons></kendo-pager-next-buttons>
      <kendo-pager-input></kendo-pager-input>
      <kendo-pager-info></kendo-pager-info>
      <kendo-pager-page-sizes
        [pageSizes]="cantidadItems"
      ></kendo-pager-page-sizes>
    </ng-template>
    <kendo-grid-column
      field="nombreAlumno"
      title="Contacto"
      [width]="110"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="codigoMatricula"
      title="Código Matricula"
      [width]="110"
      headerClass="justify-content-center"
    >
      <ng-template kendoGridCellTemplate let-dataItem>
        <div class="text-center">
          {{ dataItem.codigoMatricula }}
        </div>
      </ng-template>
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
        [style]="'justify-content-center'"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="nombreCentroCosto"
      title="Centro Costo"
      [width]="110"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="coordinador"
      title="Coordinador Académico"
      [width]="110"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="capitulo"
      title="Capítulo"
      [width]="150"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="sesion"
      title="Sesión"
      [width]="150"
      headerClass="justify-content-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="nombreTipoCategoriaError"
      title="Tipo Observación"
      [width]="110"
      headerClass="justify-content-center"
    >
    </kendo-grid-column>
    <kendo-grid-column
      field="fechaCreacion"
      title="Fecha Registro"
      [width]="163"
      headerClass="justify-content-center"
    >
      <ng-template kendoGridCellTemplate let-dataItem>
        <div class="text-center">
          {{ dataItem.fechaCreacion | date : "dd-MM-yyyy HH:mm" }}
        </div>
      </ng-template>
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="descripcion"
      title="Detalle Observación"
      [width]="200"
      headerClass="justify-content-center"
    >
      <ng-template kendoGridCellTemplate let-dataItem>
        <div class="texto">
          {{ dataItem.descripcion }}
        </div>
      </ng-template>
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="comentario"
      title="Propuesta de Solución"
      [width]="200"
      headerClass="justify-content-center"
    >
      <ng-template kendoGridCellTemplate let-dataItem>
        <div class="texto">
          {{ dataItem.comentario }}
        </div>
      </ng-template>
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-excel
      fileName="Reporte-Problemas-Del-Aula-Virtual.xlsx"
      [fetchData]="allData"
    >
    </kendo-grid-excel>
  </kendo-grid>
</div>
