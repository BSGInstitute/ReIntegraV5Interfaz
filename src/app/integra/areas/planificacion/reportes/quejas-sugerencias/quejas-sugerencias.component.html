<div class="card border-primary mb-3">
  <div class="card-header bg-color-material pb-0">
    <h2 class="mb-2 text-white text-center">
      Filtro para Quejas y Sugerencias
    </h2>
  </div>

  <div class="card-body">
    <div class="row">
      <div class="col-sm-6">
        <div class="card-body p-4">
          <b>Búsqueda por filtros:</b>
          <form [formGroup]="formFiltro" orientation="horizontal">
            <div class="row">
              <div class="row mb-4">
                <div class="col-md-3">
                  <label [for]="idsProgramasGenerales" class="k-label">
                    <span>Area Capacitación</span>
                  </label>
                </div>
                <div class="col-md-8">
                  <kendo-multiselect
                    [data]="dataArea"
                    textField="nombre"
                    valueField="id"
                    formControlName="idsAreas"
                    placeholder="<Todos>"
                    [valuePrimitive]="true"
                    (valueChange)="cargarSubAreas($event)"
                  ></kendo-multiselect>
                </div>
              </div>

              <div class="row mb-4">
                <div class="col-md-3">
                  <label [for]="idsProgramasGenerales" class="k-label">
                    <span>Programa General</span>
                  </label>
                </div>
                <div class="col-md-8">
                  <kendo-multiselect
                    #idsProgramasGenerales
                    formControlName="idsProgramasGenerales"
                    [data]="dataProgramaGeneral"
                    placeholder="<Todos>"
                    [kendoDropDownFilter]="filterSettings"
                    textField="nombre"
                    [valuePrimitive]="true"
                    valueField="id"
                  >
                  </kendo-multiselect>
                </div>
              </div>

              <div class="row mb-4">
                <div class="col-md-3">
                  <label [for]="idsProgramasGenerales" class="k-label">
                    <span>Tipo</span>
                  </label>
                </div>
                <div class="col-md-8">
                  <kendo-multiselect
                    #idsProgramasGenerales
                    formControlName="idsTipos"
                    [data]="tipo"
                    placeholder="<Todos>"
                    [kendoDropDownFilter]="filterSettings"
                    textField="nombre"
                    [valuePrimitive]="true"
                    valueField="id"
                  >
                  </kendo-multiselect>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
      <div class="col-sm-6">
        <div class="card-body p-4">
          <form [formGroup]="formFiltro" orientation="horizontal">
            <div class="row mb-4">
              <div class="col-md-3">
                <label [for]="idsProgramasGenerales" class="k-label">
                  <span>SubArea</span>
                </label>
              </div>
              <div class="col-md-8">
                <kendo-multiselect
                  [data]="filtroSubArea"
                  textField="nombre"
                  valueField="id"
                  formControlName="idsSubAreas"
                  [valuePrimitive]="true"
                  [kendoDropDownFilter]="filterSettings"
                ></kendo-multiselect>
              </div>
            </div>

            <b>Rango de Fechas :</b>
            <div class="row mb-4">
              <div class="col-md-3">
                <span>Fecha Inicio</span>
              </div>
              <div class="col-md-8">
                <kendo-datepicker
                  #fechaInicio
                  [incompleteDateValidation]="true"
                  formControlName="fechaInicio"
                  format="yyyy-MM-dd"
                  [max]="obtenerFechaActual"
                ></kendo-datepicker>
              </div>
            </div>
            <div class="row mb-4">
              <div class="col-md-3">
                <span>Fecha Fin</span>
              </div>
              <div class="col-md-8">
                <kendo-datepicker
                  #fechaFin
                  [incompleteDateValidation]="true"
                  formControlName="fechaFin"
                  format="yyyy-MM-dd"
                  [min]="fechaInicio.value"
                ></kendo-datepicker>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="card-footer">
    <div class="row">
      <div class="col-md"></div>
      <div class="col-md-auto d-flex justify-content-end">
        <button
          kendoButton
          class="send-button"
          icon="search"
          style="height: 35px"
          themeColor="success"
          (click)="generarReporte()"
        >
          Buscar
        </button>
      </div>
    </div>
  </div>
</div>

<div class="card-body">

      buttonCount: 5,
      info: true,
      type: 'numeric',
      pageSizes: true,
      previousNext: true,
      position: 'bottom'

    [selectable]="true"
    [resizable]="true"
    filterable="menu"
  >
    <ng-template kendoGridToolbarTemplate>
      <button
        class="btn btn-success"

        kendoGridExcelCommand

        themeColor="success"
      >
        Export to Excel
      </button>
    </ng-template>
    <ng-template
      kendoPagerTemplate
      let-totalPages="totalPages"
      let-currentPage="currentPage"
    >
      <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
      <kendo-pager-numeric-buttons
        [buttonCount]="5"
      ></kendo-pager-numeric-buttons>
      <kendo-pager-next-buttons></kendo-pager-next-buttons>
      <kendo-pager-input></kendo-pager-input>
      <kendo-pager-info></kendo-pager-info>
      <kendo-pager-page-sizes
        [pageSizes]="cantidadItems"
      ></kendo-pager-page-sizes>
    </ng-template>

      field="tipoQueja"
      title="Tipo"

    >

        let-filter

        let-filterService="filterService"
      >

          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator

        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
