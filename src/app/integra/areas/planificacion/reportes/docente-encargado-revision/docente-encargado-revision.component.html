<div class="card border-primary mb-3 rpav">
  <div class="card-header bg-color-material pb-0">
    <h2 class="mb-2 text-white text-center">
      Filtros para reporte docentes encargados de revisión
    </h2>
  </div>
  <div class="card-body p-4">
    <form [formGroup]="formFiltro" orientation="horizontal">
      <div class="row">
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsCentrosCosto" class="k-label">
                <span>Área</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsCentrosCosto
                formControlName="idsArea"
                [data]="dataAreaCapacitacion"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                [virtual]="virtual"
                [valuePrimitive]="true"
                valueField="id"
                (valueChange)="cargarSubAreas($event)"
              >
              </kendo-multiselect>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsMatriculasCabecera" class="k-label">
                <span>SubArea</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsMatriculasCabecera
                formControlName="idsSubArea"
                [data]="filtroSubAreaCapacitacion"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                [virtual]="virtual"
                [valuePrimitive]="true"
                valueField="id"
                (valueChange)="cargarPGeneral($event)"
              >
              </kendo-multiselect>
            </div>
          </div>
        </div>
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsTiposCategoriaError" class="k-label">
                <span>Programa General</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsTiposCategoriaError
                formControlName="idsProgramaGeneral"
                [data]="filtroPGeneral"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                [valuePrimitive]="true"
                valueField="id"
              >
              </kendo-multiselect>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsCoordinadores" class="k-label">
                <span>Docente</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsCoordinadores
                formControlName="idsDocente"
                [data]="dataProveedor"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                [filterable]="true"
                textField="nombre"
                [valuePrimitive]="true"
                valueField="id"
              >
              </kendo-multiselect>
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsTiposCategoriaError" class="k-label">
                <span>Categoría de revisión</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-dropdownlist
                #idsTiposCategoriaError
                formControlName="idCategoriaRevision"
                [data]="categoriaRevision"
                placeholder="<Todos>"
                textField="nombre"
                valueField="id"
                [kendoDropDownFilter]="filterSettings"
                [valuePrimitive]="true"
                [defaultItem]="{
                  id: null,
                  nombre: '<Todos>'
                }"
              >
              </kendo-dropdownlist>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="card-footer">
    <div class="row">
      <div class="col-12 d-flex justify-content-end">
        <button
          kendoButton
          class="send-button"
          icon="search"
          style="height: 35px"
          themeColor="success"
          [disabled]="btnBuscarDisabled"
          (click)="generarReporte()"
        >
          Buscar
        </button>
      </div>
    </div>
  </div>
</div>

<div class="card-body">
  <div class="card-header bg-color-material pb-0">
    <h2 class="mb-2 text-white text-center">
      (R) Docentes encargados de revisión
    </h2>
  </div>

  <kendo-grid
    [kendoGridBinding]="gridReporteRevisionDocente.data"
    [loading]="gridReporteRevisionDocente.loading"
    [pageSize]="20"
    [pageable]="{
      buttonCount: 5,
      info: true,
      type: 'numeric',
      pageSizes: true,
      previousNext: true,
      position: 'bottom'
    }"
    [sortable]="true"
    [selectable]="true"
    [resizable]="true"
    filterable="menu"
  >
    <ng-template kendoGridToolbarTemplate>
      <button
        class="btn btn-success"
        type="button"
        kendoGridExcelCommand
        icon="file-excel"
        themeColor="success"
      >
        Exportar Excel
      </button>
    </ng-template>
    <ng-template
      kendoPagerTemplate
      let-totalPages="totalPages"
      let-currentPage="currentPage"
    >
      <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
      <kendo-pager-numeric-buttons
        [buttonCount]="5"
      ></kendo-pager-numeric-buttons>
      <kendo-pager-next-buttons></kendo-pager-next-buttons>
      <kendo-pager-input></kendo-pager-input>
      <kendo-pager-info></kendo-pager-info>
      <kendo-pager-page-sizes
        [pageSizes]="cantidadItems"
      ></kendo-pager-page-sizes>
    </ng-template>

    <kendo-grid-column
      field="area"
      title="Area"
      [width]="110"
      headerClass="justify-content-center"
      class="text-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="subArea"
      title="SubArea"
      [width]="110"
      headerClass="justify-content-center"
      class="text-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
        [style]="'justify-content-center'"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="pGeneral"
      title="Programa General"
      [width]="110"
      headerClass="justify-content-center"
      class="text-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="modalidadCurso"
      title="Modalidad"
      [width]="110"
      headerClass="justify-content-center"
      class="text-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="nombre"
      title="Docente"
      [width]="150"
      headerClass="justify-content-center"
      class="text-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="categoriaRevision"
      title="Encargado de"
      [width]="150"
      headerClass="justify-content-center"
      class="text-center"
    >
      <ng-template
        kendoGridFilterMenuTemplate
        let-filter
        let-column="column"
        let-filterService="filterService"
      >
        <kendo-grid-string-filter-menu
          [column]="column"
          [filter]="filter"
          [filterService]="filterService"
          [extra]="false"
          operator="contains"
        >
          <kendo-filter-contains-operator
            text="Contiene"
          ></kendo-filter-contains-operator>
        </kendo-grid-string-filter-menu>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="personalAsignado"
      title="Coordinador"
      [width]="110"
      headerClass="justify-content-center"
      class="text-center"
    >
    </kendo-grid-column>

    <kendo-grid-excel
      fileName="Reporte-docente-encargado-revision.xlsx"
      [fetchData]="allData"
    >
    </kendo-grid-excel>
  </kendo-grid>
</div>
