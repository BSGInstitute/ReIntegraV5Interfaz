<div class="card border-primary mb-3 rei">
  <div class="card-header bg-color-material pb-0">
    <h2 class="mb-2 text-white text-center">
      (R) Reporte de Encuestas Iniciales de Cursos Sincrónicos
    </h2>
  </div>
  <div class="card-body p-4">
    <form [formGroup]="formFiltro" orientation="horizontal">
      <div class="row">
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsProgramasGenerales" class="k-label">
                <span>Programa General</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsProgramasGenerales
                formControlName="idsProgramasGenerales"
                [data]="dataProgramaGeneral"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                [valuePrimitive]="true"
                valueField="id"
                (valueChange)="obtenerCursoPEspecifico($event)">
              </kendo-multiselect>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <label [for]="idsProgramasEspecificos" class="k-label">
                <span>Curso</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsProgramasEspecificos
                formControlName="idsProgramasEspecificos"
                [data]="dataProgramaEspecifico"
                placeholder="<Todos>"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                [valuePrimitive]="true"
                valueField="id">
              </kendo-multiselect>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <label for="idsDocentes" class="k-label">
                <span>Docente</span>
              </label>
            </div>
            <div class="col-md-8">
              <kendo-multiselect
                #idsDocentes
                formControlName="idsDocentes"
                [data]="dataDocentes"
                placeholder="<Todos>"
                textField="nombre"
                [valuePrimitive]="true"
                valueField="id">
              </kendo-multiselect>
            </div>
          </div>
        </div>
        <!-- Merge -->
        <div class="col-sm col-md m-3">
          <div class="row mb-4">
            <div class="col-md-3">
              <span>Nro. Versión</span>
            </div>
            <div class="col-md-8">
              <kendo-dropdownlist
                formControlName="version" 
                [data]="dataVersionesEncuesta"
                [textField]="'version'" 
                [valueField]="'version'" 
                [defaultItem]="{ version: 'Insertar el número de versión' }"
                [valuePrimitive]="true"
                placeholder="Seleccione Tipo">
              </kendo-dropdownlist>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <span>Fecha Inicio</span>
            </div>
            <div class="col-md-8">
              <kendo-datepicker
                #fechaInicio
                [incompleteDateValidation]="true"
                formControlName="fechaInicio"
                format="yyyy-MM-dd"
                [max]="obtenerFechaActual">
              </kendo-datepicker>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-md-3">
              <span>Fecha Fin</span>
            </div>
            <div class="col-md-8">
              <kendo-datepicker
                #fechaFin
                [incompleteDateValidation]="true"
                formControlName="fechaFin"
                format="yyyy-MM-dd"
                [min]="fechaInicio.value">
              </kendo-datepicker>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="card-footer">
    <div class="row">
      <div class="col-12 d-flex justify-content-end">
        <button
          kendoButton
          class="send-button"
          icon="search"
          style="height: 35px"
          themeColor="success"
          [disabled]="btnBuscarDisabled"
          (click)="generarReporte()">
          Buscar
        </button>
      </div>
    </div>
  </div>
</div>

<div class="card-body">

    [loading]="gridReporteEncuestaInicialSincronico.loading"
    [pageSize]="10"
    [pageable]="{
      buttonCount: 5,
      info: true,
      type: 'numeric',
      pageSizes: true,
      previousNext: true,
      position: 'bottom'
    }"
    [sortable]="true"
    [selectable]="true"
    [resizable]="true"
    filterable="menu">
    <ng-template kendoGridToolbarTemplate>
      <button

        type="button"
        kendoGridExcelCommand
        icon="file-excel"
        themeColor="success">
        Export to Excel
      </button>

      kendoPagerTemplate
      let-totalPages="totalPages"
      let-currentPage="currentPage">
      <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
      <kendo-pager-numeric-buttons
        [buttonCount]="5">
      </kendo-pager-numeric-buttons>
      <kendo-pager-next-buttons></kendo-pager-next-buttons>
      <kendo-pager-input></kendo-pager-input>
      <kendo-pager-info></kendo-pager-info>
      <kendo-pager-page-sizes
        [pageSizes]="cantidadItems">
      </kendo-pager-page-sizes>
    </ng-template>
