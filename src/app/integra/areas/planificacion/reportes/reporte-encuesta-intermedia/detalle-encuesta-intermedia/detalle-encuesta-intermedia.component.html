<kendo-grid
  [kendoGridBinding]="listaPreguntas"
  [loading]="false"
  [pageSize]="20"
  [sortable]="true"
  [selectable]="true"
  [resizable]="true"
  filterable="menu"
>
  <kendo-grid-column
    field="nroOrden"
    title="Nro"
    [width]="30"
    headerClass="justify-content-center"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      <div class="text-center">
        {{ dataItem.nroOrden }}
      </div>
    </ng-template>
    <ng-template
      kendoGridFilterMenuTemplate
      let-filter
      let-column="column"
      let-filterService="filterService"
    >
      <kendo-grid-string-filter-menu
        [column]="column"
        [filter]="filter"
        [filterService]="filterService"
        [extra]="false"
        operator="contains"
      >
        <kendo-filter-contains-operator
          text="Contiene"
        ></kendo-filter-contains-operator>
      </kendo-grid-string-filter-menu>
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    field="enunciadoPregunta"
    title="Enunciado de la Pregunta"
    [width]="210"
    headerClass="justify-content-center"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      {{ convertirHTML(dataItem.enunciadoPregunta) }}
    </ng-template>
    <ng-template
      kendoGridFilterMenuTemplate
      let-filter
      let-column="column"
      let-filterService="filterService"
    >
      <kendo-grid-string-filter-menu
        [column]="column"
        [filter]="filter"
        [filterService]="filterService"
        [extra]="false"
        operator="contains"
      >
        <kendo-filter-contains-operator
          text="Contiene"
        ></kendo-filter-contains-operator>
      </kendo-grid-string-filter-menu>
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    field="respuestas"
    title="Respuesta"
    [width]="180"
    headerClass="justify-content-center"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      <div class="text-center">
        <ng-container *ngIf="dataItem.idTipoPregunta == 5">
        {{ obtenerRespuestaSeleccionUnica(dataItem.respuestas) }}
        </ng-container>
      </div>
    </ng-template>
    <ng-template
      kendoGridFilterMenuTemplate
      let-filter
      let-column="column"
      let-filterService="filterService"
    >
      <kendo-grid-string-filter-menu
        [column]="column"
        [filter]="filter"
        [filterService]="filterService"
        [extra]="false"
        operator="contains"
      >
        <kendo-filter-contains-operator
          text="Contiene"
        ></kendo-filter-contains-operator>
      </kendo-grid-string-filter-menu>
    </ng-template>
  </kendo-grid-column>
</kendo-grid>
