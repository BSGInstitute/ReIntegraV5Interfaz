<ng-template #modalConvotorias let-modal>
  <app-modal-convocatoria
  [modal]="modal"
  [nombreModal]="nombreModalConvocatoria"
  [nombreBTN]="nombreBTNConvocatoria"
  [data]="dataEditar"
  [listaSede]="listaSede"
  [listaArea]="listaAreas"
  [listaProveedor]="listaProveedor"
  [listaEncargados]="listaEncargados"
  [listaProceso]="listaProceso"
  [listaMoneda]="listaMoneda"
  [listaGrupoCombo]="listaGrupoCombo"
  (resultadoEmit)="actualizarGrid($event)"
  >

  </app-modal-convocatoria>
</ng-template>


<div class="">
    <div class="row">
      <div class="col-1fa-rotate-270">
        <div class="card">
            <div class="card-header bg-color-material">
                <h1 class="text-white">(O) Avisos Laborales</h1>
            </div>
            <div class="card-body p-4">
                <div class="row">
                    <kendo-grid
                    [kendoGridBinding]="listaConvocatorias"
                    [loading]="loader"
                    [pageSize]="5"
                    [sortable]="false"
                    [reorderable]="true"
                    [resizable]="true"
                    filterable="menu"
                    [sort]="[{field:'id',dir:'desc'}]"
                    [pageable]="true"
                    kendoGridSelectBy="id"
                    [(selectedKeys)]="listaSeleccion"
                    [selectable]="{ enabled: true, checkboxOnly: true }"
                    style="max-height: 700px"
                    >
                    <ng-template kendoGridToolbarTemplate class="bg-danger">

                        <button mat-raised-button (click)="refrescarGrilla()"
                        >
                            <mat-icon>refresh</mat-icon>
                        </button>
                        <button mat-raised-button
                    style="background-color: rgb(0, 127, 131) !important;color:whitesmoke"
                    (click)="ExportarExcel(excelexport)"
                     
                      >
                      <span class="k-icon k-i-file-excel" style="font-size:23px;" ></span>
                      Exportar a Excel
                    </button>
                    <kendo-excelexport 
                    fileName="ListaConvocatorias.xlsx" #excelexport>
                      <kendo-excelexport-column field="personalEncargado" title="Encargado(a)">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="activoExcel" title="Activo">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="sedeTrabajo" title="Sede">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="area" title="Area">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="proveedor" title="Proveedor">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="nombre" title="Nombre">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="nombreProcesoSeleccion" title="Proceso Selección">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="codigo" title="Código">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="urlAviso" title="Vista de aviso (Link)">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="fechaInicio" title="Fecha Publicación">
                      </kendo-excelexport-column>
                    </kendo-excelexport>
                        <kendo-grid-spacer></kendo-grid-spacer>
                        <button
                        mat-raised-button
                        color="primary"
                        (click)="openModalConvocatorias(true)"
                        >
                          + Nuevo
                        </button>
                      </ng-template>
                      <kendo-grid-checkbox-column
                      [width]="45"
                      [headerClass]="{ 'text-center': true }"
                      [class]="{ 'text-center': true }"
                      [sticky]="true"
                      >
                        <ng-template kendoGridHeaderTemplate>
                          <input
                            type="checkbox"
                            kendoCheckBox
                            id="selectAllCheckboxId"
                            kendoGridSelectAllCheckbox
                            (selectAllChange)="onSelectAllChange($event)"
                          />
                          <label class="k-checkbox-label" for="selectAllCheckboxId"></label>
                        </ng-template>
                      </kendo-grid-checkbox-column>
                      <kendo-grid-column
                          title="Encargado(a)"
                          [headerStyle]="{
                            'background-color': '#3382a9',
                            color: 'white'
                          }"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="personalEncargado"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                        </kendo-grid-column>
                      <kendo-grid-column
                          title="Activo"
                          [headerStyle]="{
                            'background-color': '#3382a9',
                            color: 'white'
                          }"
                          headerClass="justify-content-center k-grid-header "
                          [width]="100"
                          field="activo"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                        <ng-template kendoGridFilterMenuTemplate let-filter let-column="column" let-filterService="filterService">
                          <kendo-grid-boolean-filter-menu
                            [column]="column"
                            [filter]="filter"
                            [filterService]="filterService"
                            >

                          </kendo-grid-boolean-filter-menu>
                        </ng-template>
                        <ng-template
                        kendoGridCellTemplate
                        let-dataItem
                      >
                        <div style="text-align: center">
                          <ng-container
                            *ngIf="dataItem.activo == true"
                          >
                            <span
                              class="k-icon k-i-check-outline k-icon-30"
                              style="
                                color: rgb(105, 185, 105);
                                font-size: medium;
                              "
                            ></span>
                          </ng-container>
                          <ng-container
                            *ngIf="dataItem.activo == false"
                          >
                            <span
                              class="k-icon k-i-x-outline k-icon-30"
                              style="
                                color: rgb(179, 97, 90);
                                font-size: medium;
                              "
                            ></span>
                          </ng-container>
                        </div>
                      </ng-template>
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Sede"
                          [headerStyle]="{
                            'background-color': '#3382a9',
                            color: 'white'
                          }"
                          headerClass="justify-content-center k-grid-header "
                          [width]="100"
                          field="sedeTrabajo"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Area"
                          [headerStyle]="{
                            'background-color': '#3382a9',
                            color: 'white'
                          }"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="area"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Proveedor"
                          [headerStyle]="{
                            'background-color': '#3382a9',
                            color: 'white'
                          }"
                          headerClass="justify-content-center k-grid-header "
                          [width]="200"
                          field="proveedor"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Nombre"
                          [headerStyle]="{
                            'background-color': '#3382a9',
                            color: 'white'
                          }"
                          headerClass="justify-content-center k-grid-header "
                          [width]="200"
                          field="nombre"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Proceso Selección"
                          [headerStyle]="{
                            'background-color': '#3382a9',
                            color: 'white'
                          }"
                          headerClass="justify-content-center k-grid-header "
                          [width]="200"
                          field="nombreProcesoSeleccion"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Código"
                          [headerStyle]="{
                            'background-color': '#3382a9',
                            color: 'white'
                          }"
                          headerClass="justify-content-center k-grid-header "
                          [width]="200"
                          field="codigo"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Vista de aviso (Link)"
                          [headerStyle]="{
                            'background-color': '#3382a9',
                            color: 'white'
                          }"
                          headerClass="justify-content-center k-grid-header "
                          [width]="350"
                          field="urlAviso"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                        <ng-template  kendoGridCellTemplate let-dataItem>
                          <span *ngIf="dataItem.urlAviso!=null" 
                            style="color: blue; text-decoration: underline; cursor: pointer;">
                              <a href="{{dataItem.urlAviso}}">
                                {{dataItem.urlAviso}}
                              </a>
                          </span>
                        </ng-template>
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Fecha Publicación"
                          [headerStyle]="{
                            'background-color': '#3382a9',
                            color: 'white'
                          }"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="fechaInicio"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                            <ng-template kendoGridFilterMenuTemplate let-filter let-column="column" let-filterService="filterService">
                                <kendo-grid-date-filter-menu
                                    [column]="column"
                                    [format]="'dd-MM-yyyy'"
                                    [filter]="filter"
                                    [placeholder]="'dia-mes-año'"
                                    [filterService]="filterService"
                                    >
                                </kendo-grid-date-filter-menu>
                            </ng-template>
                            <ng-template  kendoGridCellTemplate let-dataItem>
                              {{finanzasService.fechaTemplate(dataItem.fechaInicio,false)}}
                            </ng-template>
                        </kendo-grid-column>
                        <kendo-grid-command-column
                        [sticky]="true"
                        title="Acciones"
                        [width]="150"
                        headerClass="justify-content-center text-center k-grid-header-command"
                        >
                        <ng-template
                        kendoGridCellTemplate
                        let-dataItem="dataItem"
                        let-rowIndex="rowIndex"
                        >
                            <div class="w-100 d-flex justify-content-center" style="padding:20px" kendoTooltip>
                                <button
                                title="Editar"
                                kendoButton
                                themeColor="warning"
                                fillMode="solid"
                                rounded="large"
                                size="large"
                                class="p-2 me-1 ms-1"
                                container="body"
                                placement="top"
                                (click)="openModalConvocatorias(false,dataItem)"
                                >
                                <span class="k-icon k-i-pencil k-icon-20"></span>
                                </button>

                                <button
                                title="Eliminar"
                                kendoButton
                                themeColor="error"
                                fillMode="solid"
                                rounded="large"
                                size="large"
                                class="p-2 me-1 ms-1"
                                container="body"
                                placement="top"
                                (click)="msgEliminarConvocatoria(dataItem)"
                                >
                                <span class="k-icon k-i-trash k-icon-20"></span>
                                </button>
                            </div>
                        </ng-template>
                        </kendo-grid-command-column>
                        <ng-template kendoGridNoRecordsTemplate>
                            <div>
                              <kendo-badge-container>
                                <kendo-icon name="cloud" size="large"></kendo-icon>
                                <kendo-badge position="inside">
                                  <kendo-icon name="close" style="color: red;" ></kendo-icon>
                                </kendo-badge>
                              </kendo-badge-container>
                            </div>
                            <p>No hay registros cargados!</p>
                        </ng-template>
                        <ng-template
                        kendoPagerTemplate
                        let-totalPages="totalPages"
                        let-currentPage="currentPage"
                        >
                          <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                          <kendo-pager-numeric-buttons
                            [buttonCount]="5"
                          ></kendo-pager-numeric-buttons>
                          <kendo-pager-next-buttons></kendo-pager-next-buttons>
                          <!-- <kendo-pager-input></kendo-pager-input> -->
                          <kendo-pager-info></kendo-pager-info>
                          <kendo-pager-page-sizes [pageSizes]="pageSizes"></kendo-pager-page-sizes>
    
                      </ng-template>
                    </kendo-grid>
                </div>
            </div>
            
        </div>
      </div>
    </div>
</div>
