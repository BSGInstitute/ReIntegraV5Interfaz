<div class="card">
  <div class="card-header card-header-rep">
    <h2 class="mb-0">
      (R) Evaluación de postulantes - Filtros de búsqueda de postulantes
    </h2>
  </div>
  <div class="card-body k-form k-form-horizontal">
    <form [formGroup]="formFiltro">
      <div class="row">
        <div class="col-sm-12 col-md-6">
          <div class="row">
            <h3 class="fw-bold mb-0">Búsqueda por filtros</h3>
          </div>

          <!-- Proceso de selección -->
          <div class="row my-2">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label align-items-start">
                  Proceso de Selección
                </label>
                <kendo-dropdownlist
                  [data]="comboProcesoSeleccion"
                  textField="nombre"
                  valueField="id"
                  formControlName="procesoSeleccion"
                  [valuePrimitive]="true"
                  [kendoDropDownFilter]="filterSettings"
                  [popupSettings]="{ popupClass: 'rep-popup' }"
                  [defaultItem]="{ id: null, nombre: '<Todos los Procesos>' }"
                  class="rep-dropDown"
                  (valueChange)="onValueChangeProcesoSeleccion($event)"
                ></kendo-dropdownlist>
              </kendo-formfield>
            </div>
          </div>

          <!-- Etapas -->
          <div class="row my-2">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label align-items-start">
                  Etapas de Proceso
                </label>
                <kendo-multiselect
                  [data]="comboEtapaProceso"
                  textField="nombre"
                  valueField="id"
                  formControlName="etapasProceso"
                  [valuePrimitive]="true"
                  [kendoDropDownFilter]="filterSettings"
                  [popupSettings]="{ popupClass: 'rep-popup' }"
                  placeholder="<Todas las Etapas>"
                  class="rep-dropDown"
                ></kendo-multiselect>
              </kendo-formfield>
            </div>
          </div>

          <!-- Estado etapas -->
          <div class="row my-2">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label align-items-start">
                  Estado de Etapas
                </label>
                <kendo-multiselect
                  [data]="comboEstadoEtapa"
                  textField="nombre"
                  valueField="id"
                  formControlName="estadoEtapas"
                  [valuePrimitive]="true"
                  [kendoDropDownFilter]="filterSettings"
                  [popupSettings]="{ popupClass: 'rep-popup' }"
                  class="rep-dropDown"
                  placeholder="<Todos los Estados de Etapas>"
                ></kendo-multiselect>
              </kendo-formfield>
            </div>
          </div>

          <!-- Búsqueda por postulante -->
          <div class="row">
            <div class="col-12">
              <h3 class="fw-bold mb-0">Búsqueda por postulante</h3>
            </div>
          </div>

          <div class="row my-2">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label align-items-start">
                  Grupo Comparación
                </label>
                <kendo-dropdownlist
                  [data]="comboGrupoComparacion"
                  textField="nombre"
                  valueField="id"
                  formControlName="grupoComparacion"
                  [valuePrimitive]="true"
                  [kendoDropDownFilter]="filterSettings"
                  [popupSettings]="{ popupClass: 'rep-popup' }"
                  class="rep-dropDown"
                  [defaultItem]="{
                    id: null,
                    nombre: '<Seleccione Grupo>'
                  }"
                ></kendo-dropdownlist>
              </kendo-formfield>
            </div>
          </div>

          <div class="row my-2">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <kendo-label
                  text="Habilitar Filtro por postulante"
                  class="k-checkbox-label"
                ></kendo-label>
                <kendo-switch
                  formControlName="filtroPorPostulante"
                  onLabel="SI"
                  offLabel="NO"
                  (valueChange)="onChangeFiltroPostulante($event)"
                ></kendo-switch>
              </kendo-formfield>
            </div>
          </div>

          <div class="row my-2">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label align-items-start">
                  Postulante
                </label>
                <kendo-multiselect
                  [data]="comboPostulante"
                  textField="nombre"
                  valueField="id"
                  formControlName="postulantes"
                  [valuePrimitive]="true"
                  [popupSettings]="{ popupClass: 'rep-popup' }"
                  class="rep-dropDown"
                  [filterable]="true"
                  [virtual]="true"
                  (filterChange)="onFilterChangePostulante($event)"
                ></kendo-multiselect>
              </kendo-formfield>
            </div>
          </div>
        </div>

        <!-- Columna derecha -->
        <div class="col-sm-12 col-md-6">
          <div class="row">
            <h3 class="fw-bold mb-0">Rango de fechas</h3>
          </div>

          <div class="row my-2">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label align-items-start">
                  Fecha Inicio
                </label>
                <kendo-datepicker
                  format="yyyy-MM-dd"
                  formControlName="fechaInicio"
                ></kendo-datepicker>
              </kendo-formfield>
            </div>
          </div>

          <div class="row my-2">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label align-items-start">
                  Fecha Fin
                </label>
                <kendo-datepicker
                  format="yyyy-MM-dd"
                  formControlName="fechaFin"
                ></kendo-datepicker>
              </kendo-formfield>
            </div>
          </div>

          <div class="row my-2 justify-content-end">
            <div class="col-auto">
              <small>
                * Las fechas (Fecha Inicio - Fecha Fin) se basan en la fecha de
                asignación de examenes del postulante
              </small>
            </div>
          </div>

          <div class="row my-2">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label align-items-start">
                  Versión Centil
                </label>
                <kendo-dropdownlist
                  [data]="comboVersionCentil"
                  textField="valor"
                  valueField="clave"
                  formControlName="versionCentil"
                  [valuePrimitive]="true"
                  [kendoDropDownFilter]="filterSettings"
                  [popupSettings]="{ popupClass: 'rep-popup' }"
                  [defaultItem]="{ clave: null, valor: '<Todos>' }"
                  class="rep-dropDown"
                  [style.width.px]="250"
                ></kendo-dropdownlist>
              </kendo-formfield>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="card-footer">
    <div class="row justify-content-end">
      <div class="col-auto">
        <button
          kendoButton
          icon="search"
          themeColor="success"
          [disabled]="btnBuscarDisabled"
          (click)="onBuscar()"
        >
          Buscar
        </button>
      </div>
    </div>
  </div>
</div>
