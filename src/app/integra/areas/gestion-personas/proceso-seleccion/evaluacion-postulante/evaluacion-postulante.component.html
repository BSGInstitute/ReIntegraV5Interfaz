<div class="content">
  <div class="row">
    <div class="col-12">
      <!-- ================== FILTROS ================== -->
      <app-filtro-evaluacion-postulante
        [formFiltro]="formFiltro"
        [comboProcesoSeleccion]="comboProcesoSeleccion"
        [comboEtapaProceso]="comboEtapaProceso"
        [comboEstadoEtapa]="comboEstadoEtapa"
        [comboGrupoComparacion]="comboGrupoComparacion"
        [comboPostulante]="comboPostulante"
        [comboVersionCentil]="comboVersionCentil"
        [filterSettings]="filterSettings"
        [btnBuscarDisabled]="btnBuscarDisabled"
        (buscar)="generarReporte()"
        (filterChangePostulante)="onFilterChangePostulante($event)"
        (changeFiltroPostulante)="onChangeFiltroPostulate($event)"
        (valueChangeProcesoSeleccion)="valueChangeProcesoSeleccion($event)"
      >
      </app-filtro-evaluacion-postulante>

      <!-- ================== REPORTE ETAPAS PROCESO ================== -->
      <app-reporte-etapas-proceso
        *ngIf="showReporteEtapaProceso"
        [gridEtapaProcesoSeleccion]="gridEtapaProcesoSeleccion"
        [sortEtapa]="sortEtapa"
        [etapasAprobadas]="etapasAprobadas"
        [comboEstadoEtapa]="comboEstadoEtapa"
        [filterSettings]="filterSettings"
        [showReporteEtapaProceso]="showReporteEtapaProceso"
        [loadingReporteEtapaProceso]="loadingReporteEtapaProceso"
        (refrescarEtapas)="generarReporteIntegra()"
      >
      </app-reporte-etapas-proceso>

      <!-- ================== REPORTE POSTULANTE ================== -->
      <app-reporte-postulante
        [gridReportePostulante]="gridReportePostulante"
        [postulantesTemp]="postulantesTemp"
        [comboVersionCentil]="comboVersionCentil"
        [versionCentilTemp]="versionCentilTemp"
        [sortPostulante]="sortPostulante"
        [groupPostulante]="groupPostulante"
        [colorEvaluaciones]="colorEvaluaciones"
        [showReportePostulante]="showReportePostulante"
        [loadingReportePostulante]="loadingReportePostulante"
        (enviarAccesoTemporalPostulante)="
          enviarAccesoTemporal($event.dataItem, $event.idPostulante)
        "
      >
      </app-reporte-postulante>

      <!-- ================== REPORTE CURSO ASESOR CAPACITACIÓN ================== -->
      <app-reporte-curso-asesor-capacitacion
        [gridCursoAsesorCapacitacion]="gridCursoAsesorCapacitacion"
        [showReporteAsesorCapacitacion]="showReporteAsesorCapacitacion"
        [loadingReporteAsesorCapacitacion]="loadingReporteAsesorCapacitacion"
        (confirmarReestablecerEnviar)="confirmarReestablecerEnviar($event)"
      >
      </app-reporte-curso-asesor-capacitacion>
    </div>
  </div>
</div>
