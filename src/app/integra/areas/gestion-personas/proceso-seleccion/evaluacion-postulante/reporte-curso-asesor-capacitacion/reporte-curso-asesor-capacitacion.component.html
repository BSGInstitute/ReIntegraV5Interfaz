<div class="card mt-4">
  <div class="card-header card-header-rep">
    <h2 class="mb-0">Reporte Curso Asesor Capacitación</h2>
  </div>
  <div class="card-body">
    <kendo-grid
      *ngIf="showReporteAsesorCapacitacion"
      [kendoGridBinding]="gridCursoAsesorCapacitacion?.data"
      [loading]="gridCursoAsesorCapacitacion?.loading"
      [resizable]="true"
    >
      <ng-template kendoGridToolbarTemplate>
        <kendo-grid-spacer></kendo-grid-spacer>
      </ng-template>

      <kendo-grid-column
        field="nombrePostulante"
        title="Nombre Postulante"
        [width]="150"
        headerClass="headerGridCursoAsesorCapacitacion justify-content-center"
      >
      </kendo-grid-column>

      <kendo-grid-column
        field="nombreProgramaEspecifico"
        title="Curso"
        [width]="150"
        headerClass="headerGridCursoAsesorCapacitacion justify-content-center"
      >
      </kendo-grid-column>

      <kendo-grid-column
        field="valorEscala"
        title="Promedio"
        [width]="150"
        headerClass="headerGridCursoAsesorCapacitacion justify-content-center"
      >
      </kendo-grid-column>

      <kendo-grid-command-column
        title="Reenviar"
        [width]="150"
        headerClass="headerGridCursoAsesorCapacitacion justify-content-center"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <div class="w-100 d-flex justify-content-center">
            <div class="col-auto">
              <button
                kendoButton
                icon="email"
                themeColor="success"
                (click)="onConfirmarReestablecerEnviar(dataItem)"
              >
                Enviar
              </button>
            </div>
          </div>
        </ng-template>
      </kendo-grid-command-column>
    </kendo-grid>

    <loading [loading]="loadingReporteAsesorCapacitacion"></loading>
  </div>
</div>
