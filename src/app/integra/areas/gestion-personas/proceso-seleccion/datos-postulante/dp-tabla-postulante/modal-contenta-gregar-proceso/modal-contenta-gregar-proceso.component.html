<!-- #region Modal Agregar nuevo Postulante -->
<div class="modal-header py-2 bg-light text-dark text-center">
  <h2 class="modal-title w-100 mb-0">Nuevo Proceso para el Postulante</h2>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body px-4">
  <div class="card">
    <div class="card-header">
      <h3>{{ nombreCompleto }}</h3>
    </div>
    <div class="card-body">
      <form [formGroup]="formNuevoProceso" class="Form-Postulantes">
        <div class="row">
          <div class="col-sm-12 col-md-12 k-form-horizontal">
            <div class="row">
              <div class="col-12">
                <kendo-formfield orientation="horizontal">
                  <label class="k-label"> Proceso Seleccion Nuevo* </label>
                  <kendo-dropdownlist
                    textField="nombre"
                    valueField="id"
                    [data]="comboPostulante.procesoSeleccion"
                    [defaultItem]="{
                      id: null,
                      nombre: 'Seleccione Proceso de Seleccion'
                    }"
                    [valuePrimitive]="true"
                    formControlName="IdProcesoSeleccionDestino"
                    [kendoDropDownFilter]="filterSettings"
                  ></kendo-dropdownlist>
                  <kendo-formerror>Seleccione un proceso de seleccion</kendo-formerror>
                </kendo-formfield>
              </div>
            </div>
            <div class="row mt-3">
              <div class="col-12">
                <kendo-formfield orientation="horizontal">
                  <label class="k-label" [for]="ProcesoAnterior"
                    >¿Usar calificaciones de un proceso anterior?</label
                  >
                  <kendo-switch
                    #ProcesoAnterior
                    formControlName="ProcesoAnterior"
                    size="small"
                    trackRounded="full"
                    thumbRounded="full"
                    onLabel="Si"
                    offLabel="No"
                  >
                  </kendo-switch>
                </kendo-formfield>
              </div>
            </div>
            <div class="row mt-3">
              <div class="col-12">
                <kendo-formfield orientation="horizontal">
                  <label class="k-label"> Seleccione Proceso Anterior* </label>
                  <kendo-dropdownlist
                    textField="nombre"
                    valueField="id"
                    [data]="filtroProceso"
                    [defaultItem]="{
                      id: null,
                      nombre: 'Seleccione Proceso de Seleccion'
                    }"
                    [valuePrimitive]="true"
                    formControlName="IdProcesoSeleccionOrigen"
                    [kendoDropDownFilter]="filterSettings"
                  ></kendo-dropdownlist>
                  <kendo-formerror>Dato Requerido</kendo-formerror>
                </kendo-formfield>
              </div>
            </div>
            <div class="row mt-3" *ngIf="mostrarTabla">
              <div class="col-12 p-1">
                <kendo-grid
                  #ComparacionProcesosSeleccion
                  [kendoGridBinding]="gridComparacionProcesosSeleccion.data"
                  [loading]="gridComparacionProcesosSeleccion.loading"
                  [(selectedKeys)]="mySelection"
                  [selectable]="{
                    checkboxOnly: true,
                    mode: 'multiple'
                  }"
                  kendoGridSelectBy="idProcesoSeleccionEtapaOrigen"
                >
                  <kendo-grid-column
                    field="nombreProcesoSeleccionEtapaOrigen"
                    title="Evaluaciones"
                    [width]="100"
                    headerClass="header-grid-integra"
                  >
                  </kendo-grid-column>
                  <kendo-grid-column
                    field="esEtapaAprobada"
                    title="Estado de Evaluacion"
                    [width]="100"
                    headerClass="header-grid-integra"
                  >
                  </kendo-grid-column>
                  <kendo-grid-checkbox-column
                    title="Convalidar en el nuevo proceso"
                    [resizable]="false"
                    [width]="45"
                    headerClass="header-grid-integra"
                    [headerStyle]="colorColumnasEstaticas"
                  >
                  </kendo-grid-checkbox-column>
                </kendo-grid>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="modal-footer">
  <div class="k-form-buttons m-0">
    <button
      themeColor="primary"
      size="medium"
      class="w-100"
      kendoButton
      [disabled]="controlBotton"
      (click)="guardar()"
    >
      <kendo-loader *ngIf="loadingPanelVisible" themeColor="light">
      </kendo-loader>
      Guardar
    </button>
    <button
      themeColor="error"
      size="medium"
      class="w-100"
      kendoButton
      (click)="activeModal.dismiss('Cross click')"
    >
      Cancelar
    </button>
  </div>
</div>
