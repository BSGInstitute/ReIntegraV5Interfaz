<!-- #region Modal Agregar nuevo Postulante -->
<div class="modal-header py-2 bg-light text-dark text-center">
  <h2 class="modal-title w-100 mb-0">Envio de {{ tipoEnvio }}</h2>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body px-4">
  <form [formGroup]="formContactoEnvio" class="Form-Postulantes">
    <div class="row">
      <div class="col-sm-12 col-md-12 k-form-horizontal">
        <div class="row mt-3">
          <div class="col-12">
            <kendo-formfield orientation="horizontal">
              <label class="k-label">Plantilla {{ tipoPlantilla }}</label>
              <kendo-dropdownlist
                textField="nombrePlantillaBase"
                valueField="idPlantilla"
                [data]="plantilla"
                [defaultItem]="{
                  idPlantilla: null,
                  nombrePlantillaBase: 'Seleccione Plantilla'
                }"
                [valuePrimitive]="true"
                formControlName="idPlantilla"
                [kendoDropDownFilter]="filterSettings"
              ></kendo-dropdownlist>
              <kendo-formerror>Seleccione una plantilla</kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
        <div class="row mt-3">
          <div class="col-12">
            <kendo-formfield orientation="horizontal">
              <label class="k-label" [for]="Fecha">Fecha de Envio </label>
              <kendo-datetimepicker
                #Fecha
                formControlName="Fecha"
                [format]="format"
                placeholder="Seleccione fecha y hora"
              >
              </kendo-datetimepicker>
              <kendo-formerror>Fecha Erronea</kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
<div class="modal-footer">
  <div class="k-form-buttons m-0">
    <button
      themeColor="primary"
      size="medium"
      class="w-100"
      kendoButton
      [disabled]="controlBotton"
      (click)="enviar()"
    >
      <kendo-loader *ngIf="loadingPanelVisible" themeColor="light">
      </kendo-loader>
      Enviar {{ tipoEnvio }}
    </button>
    <button
      themeColor="error"
      size="medium"
      class="w-100"
      kendoButton
      (click)="activeModal.dismiss('Cross click')"
    >
      Cancelar
    </button>
  </div>
</div>
<!-- #endregion Modal Agregar nuevo Postulante-->
