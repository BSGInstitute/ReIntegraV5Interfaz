<!-- #region Modal Agregar nuevo Postulante -->
<div class="modal-header py-2 bg-light text-dark text-center">
  <h2 class="modal-title w-100 mb-0">
    Historial de Actualizaciones Formacion Postulante
  </h2>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body px-4">
  <div class="col-12">
    <kendo-grid
      #kgridHistorialFormacionPostulante
      [kendoGridBinding]="gridHistorialPostulanteFormacion.data"
      [loading]="gridHistorialPostulanteFormacion.loading"
      [pageable]="true"
      [pageSize]="pageSize"
      [resizable]="true"
    >
      <kendo-grid-column
        field="pais"
        title="Pais"
        headerClass="header-grid-historial"
        [width]="125"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.pais)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="centroEstudio"
        title="Institucion"
        headerClass="header-grid-historial"
        [width]="150"
        [filterable]="true"
        [hidden]="false"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.centroEstudio)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="otraInstitucion"
        title="Otra Institución"
        headerClass="header-grid-historial"
        [width]="150"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.otraInstitucion)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="tipoEstudio"
        title="Nivel"
        headerClass="header-grid-historial"
        [width]="150"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.tipoEstudio)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="estadoEstudio"
        title="Estado"
        headerClass="header-grid-historial"
        [width]="150"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.estadoEstudio)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="areaFormacion"
        title="Carrera Profesional"
        headerClass="header-grid-historial"
        [width]="150"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.areaFormacion)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="otraCarrera"
        title="Otra Carrera"
        headerClass="header-grid-historial"
        [width]="125"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.otraCarrera)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="fechaInicio"
        title="Fecha Inicio"
        headerClass="header-grid-historial"
        [width]="110"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.fechaInicio)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="fechaFin"
        title="Fecha Termino"
        headerClass="header-grid-historial"
        [width]="110"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.fechaFin)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="alaActualidad"
        title="A la Actualidad"
        headerClass="header-grid-historial"
        [width]="100"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.alaActualidad)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="turnoEstudio"
        title="Turno"
        headerClass="header-grid-historial"
        [width]="100"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.turnoEstudio)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="tipoActualizacion"
        title="Tipo de Actualización"
        headerClass="header-grid-historial"
        [width]="100"
      >
      </kendo-grid-column>
      <kendo-grid-column
        field="fechaModificacion"
        title="Fecha de Modificacion"
        headerClass="header-grid-historial"
        [width]="100"
      >
      </kendo-grid-column>
      <kendo-grid-column
        field="usuarioModificacion"
        title="Usuario Modificacion"
        headerClass="header-grid-historial"
        [width]="100"
      >
      </kendo-grid-column>
      <ng-template
        kendoPagerTemplate
        let-totalPages="totalPages"
        let-currentPage="currentPage"
      >
        <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
        <kendo-pager-numeric-buttons
          [buttonCount]="buttonCount"
        ></kendo-pager-numeric-buttons>
        <kendo-pager-next-buttons></kendo-pager-next-buttons>
        <kendo-pager-input></kendo-pager-input>
        <kendo-pager-info></kendo-pager-info>
        <kendo-pager-page-sizes [pageSizes]="sizes"></kendo-pager-page-sizes>
      </ng-template>
    </kendo-grid>
  </div>
</div>
