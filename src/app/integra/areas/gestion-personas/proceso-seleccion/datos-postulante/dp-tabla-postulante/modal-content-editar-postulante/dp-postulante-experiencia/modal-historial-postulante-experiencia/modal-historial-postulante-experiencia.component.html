<!-- #region Modal Agregar nuevo Postulante -->
<div class="modal-header py-2 bg-light text-dark text-center">
  <h2 class="modal-title w-100 mb-0">
    Historial de Actualizaciones Experiencia del Postulante
  </h2>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body px-4">
  <div class="col-12">
    <kendo-grid
      #kgridHistorialFormacionPostulante
      [kendoGridBinding]="gridHistorialPostulanteExperiencia.data"
      [loading]="gridHistorialPostulanteExperiencia.loading"
      [pageable]="true"
      [pageSize]="pageSize"
      [resizable]="true"
    >
      <kendo-grid-column
        field="empresa"
        title="Empresa"
        headerClass="header-grid-historial"
        [width]="125"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <span [innerHTML]="SanitizedHTML(dataItem.empresa)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="otraEmpresa"
        title="Otra Empresa"
        headerClass="header-grid-historial"
        [width]="150"
        [filterable]="true"
        [hidden]="false"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.otraEmpresa)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="cargo"
        title="Cargo"
        headerClass="header-grid-historial"
        [width]="150"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.cargo)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="areaTrabajo"
        title="Área"
        headerClass="header-grid-historial"
        [width]="150"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.areaTrabajo)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="industria"
        title="Industria"
        headerClass="header-grid-historial"
        [width]="150"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.industria)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="esUltimoEmpleo"
        title="Ultimo Empleo"
        headerClass="header-grid-historial"
        [width]="150"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.esUltimoEmpleo)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="salario"
        title="Salario"
        headerClass="header-grid-historial"
        [width]="125"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.salario)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="salarioComision"
        title="Salario Comision"
        headerClass="header-grid-historial"
        [width]="110"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.salarioComision)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="moneda"
        title="Moneda"
        headerClass="header-grid-historial"
        [width]="110"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.moneda)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="fechaInicio"
        title="Fecha Inicio"
        headerClass="header-grid-historial"
        [width]="100"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.fechaInicio)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="fechaFin"
        title="Fecha Fin"
        headerClass="header-grid-historial"
        [width]="100"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.fechaFin)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="alaActualidad"
        title="A la Actualidad"
        headerClass="header-grid-historial"
        [width]="100"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.alaActualidad)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="nombreJefe"
        title="Jefe Inmediato"
        headerClass="header-grid-historial"
        [width]="100"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.nombreJefe)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="numeroJefe"
        title="Telefono Jefe"
        headerClass="header-grid-historial"
        [width]="100"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.numeroJefe)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="funcion"
        title="Funciones"
        headerClass="header-grid-historial"
        [width]="250"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
          <span [innerHTML]="SanitizedHTML(dataItem.funcion)"></span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column
        field="tipoActualizacion"
        title="Tipo de Actualización"
        headerClass="header-grid-historial"
        [width]="100"
      >
      </kendo-grid-column>
      <kendo-grid-column
        field="fechaModificacion"
        title="Fecha de Modificacion"
        headerClass="header-grid-historial"
        [width]="100"
      >
      </kendo-grid-column>
      <kendo-grid-column
        field="usuarioModificacion"
        title="Usuario Modificacion"
        headerClass="header-grid-historial"
        [width]="100"
      >
      </kendo-grid-column>
      <ng-template
        kendoPagerTemplate
        let-totalPages="totalPages"
        let-currentPage="currentPage"
      >
        <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
        <kendo-pager-numeric-buttons
          [buttonCount]="buttonCount"
        ></kendo-pager-numeric-buttons>
        <kendo-pager-next-buttons></kendo-pager-next-buttons>
        <kendo-pager-input></kendo-pager-input>
        <kendo-pager-info></kendo-pager-info>
        <kendo-pager-page-sizes [pageSizes]="sizes"></kendo-pager-page-sizes>
      </ng-template>
    </kendo-grid>
  </div>
</div>
