<form [formGroup]="formEditarPostulante" class="Form-Postulantes">
  <div class="row">
    <div class="col-sm-12 col-md-6 k-form-horizontal">
      <!-- Campo Nombre -->
      <div class="container-form">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="Nombre">Nombre* </label>
            <kendo-textbox
              #Nombre
              formControlName="Nombre"
              (blur)="actualizarDatos()"
            >
            </kendo-textbox>
            <kendo-formerror>Campo Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarHistorialNombre"
            class="k-icon k-i-arrow-60-left button-icon"
            id="Nombre"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarHistorialNombre
            clave="Nombre"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div class="col-12 container-tabla" #HistorialNombre id="HistorialNombre"></div>
      <!-- Campo Apellido P -->
      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="ApellidoPaterno"
              >Apellido Paterno*
            </label>
            <kendo-textbox
              #ApellidoPaterno
              formControlName="ApellidoPaterno"
              (blur)="actualizarDatos()"
            >
            </kendo-textbox>
            <kendo-formerror>Campo Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarHistorialApellidoPaterno"
            class="k-icon k-i-arrow-60-left button-icon"
            id="ApellidoPaterno"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarHistorialApellidoPaterno
            clave="ApellidoPaterno"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div
        class="col-12 container-tabla"
        #HistorialApellidoPaterno
        id="HistorialApellidoPaterno"
      ></div>
      <!-- Campo Apellido M -->
      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="ApellidoMaterno"
              >Apellido Materno*
            </label>
            <kendo-textbox
              #ApellidoMaterno
              formControlName="ApellidoMaterno"
              (blur)="actualizarDatos()"
            >
            </kendo-textbox>
            <kendo-formerror>Campo Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarHistorialApellidoMaterno"
            class="k-icon k-i-arrow-60-left button-icon"
            id="ApellidoMaterno"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarHistorialApellidoMaterno
            clave="ApellidoMaterno"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div
        class="col-12 container-tabla"
        #HistorialApellidoMaterno
        id="HistorialApellidoMaterno"
      ></div>
      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label"> Tipo Documento* </label>
            <kendo-dropdownlist
              textField="nombre"
              valueField="id"
              [data]="comboPostulante.documento"
              [defaultItem]="{
                id: null,
                nombre: 'Seleccione Tipo Documento'
              }"
              [valuePrimitive]="true"
              formControlName="IdTipoDocumento"
              [kendoDropDownFilter]="filterSettings"
              (blur)="actualizarDatos()"
            ></kendo-dropdownlist>
            <kendo-formerror>Dato Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarHistorialIdTipoDocumento"
            class="k-icon k-i-arrow-60-left button-icon"
            id="IdTipoDocumento"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarHistorialIdTipoDocumento
            clave="IdTipoDocumento"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div
        class="col-12 container-tabla"
        #HistorialIdTipoDocumento
        id="HistorialIdTipoDocumento"
      ></div>
      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="NroDocumento"
              >Nro de Documento*
            </label>
            <kendo-textbox
              #NroDocumento
              formControlName="NroDocumento"
              (blur)="actualizarDatos()"
            >
            </kendo-textbox>
            <kendo-formerror>Campo Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarHistorialNroDocumento"
            class="k-icon k-i-arrow-60-left button-icon"
            id="NroDocumento"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarHistorialNroDocumento
            clave="NroDocumento"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div
        class="col-12 container-tabla"
        #HistorialNroDocumento
        id="HistorialNroDocumento"
      ></div>
      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label">
              <span>Pais<span class="fw-bold"> *</span></span>
            </label>
            <kendo-dropdownlist
              textField="nombre"
              valueField="id"
              [data]="comboPostulante.pais"
              [defaultItem]="{
                id: null,
                nombre: 'Seleccione Pais'
              }"
              [valuePrimitive]="true"
              formControlName="IdPais"
              [kendoDropDownFilter]="filterSettings"
              (blur)="actualizarDatos()"
            ></kendo-dropdownlist>
            <kendo-formerror>Dato Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarHistorialIdPais"
            class="k-icon k-i-arrow-60-left button-icon"
            id="IdPais"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarHistorialIdPais
            clave="IdPais"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div class="col-12 container-tabla" #HistorialIdPais id="HistorialIdPais"></div>
      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label">
              <span>Ciudad<span class="fw-bold"> *</span></span>
            </label>
            <kendo-dropdownlist
              textField="nombre"
              valueField="id"
              [data]="ciudadesFiltradas"
              [defaultItem]="{
                id: null,
                nombre: 'Seleccione Ciudad'
              }"
              [valuePrimitive]="true"
              formControlName="IdCiudad"
              [kendoDropDownFilter]="filterSettings"
              (blur)="actualizarDatos()"
            ></kendo-dropdownlist>
            <kendo-formerror>Dato Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarHistorialIdCiudad"
            class="k-icon k-i-arrow-60-left button-icon"
            id="IdCiudad"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarHistorialIdCiudad
            clave="IdCiudad"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div class="col-12 container-tabla" #HistorialIdCiudad id="HistorialIdCiudad"></div>
      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="Celular">Celular </label>
            <kendo-textbox
              #Celular
              formControlName="Celular"
              (blur)="actualizarDatos()"
            >
            </kendo-textbox>
            <kendo-formerror>Campo Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarHistorialCelular"
            class="k-icon k-i-arrow-60-left button-icon"
            id="Celular"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarHistorialCelular
            clave="Celular"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div class="col-12 container-tabla" #HistorialCelular id="HistorialCelular"></div>
    </div>
    <div class="col-sm-12 col-md-6 k-form-horizontal">
      <div class="container-form">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="Email">E-mail </label>
            <kendo-textbox
              #Email
              formControlName="Email"
              (blur)="actualizarDatos()"
            >
            </kendo-textbox>
            <kendo-formerror>Campo Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarHistorialEmail"
            class="k-icon k-i-arrow-60-left button-icon"
            id="Email"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarHistorialEmail
            clave="Email"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div class="col-12 container-tabla" #HistorialEmail id="HistorialEmail"></div>
      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="FechaNacimiento"
              >Fecha de Nacimiento
            </label>
            <kendo-datepicker
              #FechaNacimiento
              formControlName="FechaNacimiento"
              [max]="max"
              [incompleteDateValidation]="true"
              calendarType="classic"
              [format]="format"
              placeholder="dia/mes/año"
              (blur)="actualizarDatos()"
            >
            </kendo-datepicker>
            <kendo-formerror>Fecha Erronea</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarFechaNacimiento"
            class="k-icon k-i-arrow-60-left button-icon"
            id="FechaNacimiento"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarFechaNacimiento
            clave="FechaNacimiento"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div
        class="col-12 container-tabla"
        #HistorialFechaNacimiento
        id="HistorialFechaNacimiento"
      ></div>

      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label">Sexo </label>
            <kendo-dropdownlist
              textField="nombre"
              valueField="id"
              [data]="comboPostulante.sexo"
              [defaultItem]="{
                id: null,
                nombre: 'Seleccione Sexo'
              }"
              [valuePrimitive]="true"
              formControlName="IdSexo"
              (blur)="actualizarDatos()"
            ></kendo-dropdownlist>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarIdSexo"
            class="k-icon k-i-arrow-60-left button-icon"
            id="IdSexo"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarIdSexo
            clave="IdSexo"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div class="col-12 container-tabla" #HistorialIdSexo id="HistorialIdSexo"></div>

      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="TieneHijo">Tiene hijo/s </label>
            <kendo-switch
              #TieneHijo
              formControlName="TieneHijo"
              size="small"
              trackRounded="full"
              thumbRounded="full"
              onLabel="Si"
              offLabel="No"
              (blur)="actualizarDatos()"
            >
            </kendo-switch>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarTieneHijo"
            class="k-icon k-i-arrow-60-left button-icon"
            id="TieneHijo"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarTieneHijo
            clave="TieneHijo"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div class="col-12 container-tabla" #HistorialTieneHijo id="HistorialTieneHijo"></div>

      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="CantidadHijo">Total hijos</label>
            <kendo-numerictextbox
              #CantidadHijo
              formControlName="CantidadHijo"
              [min]="0"
              [format]="'0'"
              [decimals]="0"
              (blur)="actualizarDatos()"
            ></kendo-numerictextbox>
            <kendo-formerror>Cantidad invalida</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarCantidadHijo"
            class="k-icon k-i-arrow-60-left button-icon"
            id="CantidadHijo"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarCantidadHijo
            clave="CantidadHijo"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div
        class="col-12 container-tabla"
        #HistorialCantidadHijo
        id="HistorialCantidadHijo"
      ></div>

      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="UrlPerfilFacebook"
              >URL perfil de Facebook
            </label>
            <kendo-textbox
              #UrlPerfilFacebook
              formControlName="UrlPerfilFacebook"
              (blur)="actualizarDatos()"
            >
            </kendo-textbox>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarUrlPerfilFacebook"
            class="k-icon k-i-arrow-60-left button-icon"
            id="UrlPerfilFacebook"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarUrlPerfilFacebook
            clave="UrlPerfilFacebook"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div
        class="col-12 container-tabla"
        #HistorialUrlPerfilFacebook
        id="HistorialUrlPerfilFacebook"
      ></div>

      <div class="container-form mt-3">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label" [for]="UrlPerfilLinkedin"
              >URL perfil de Linkedin
            </label>
            <kendo-textbox
              #UrlPerfilLinkedin
              formControlName="UrlPerfilLinkedin"
              (blur)="actualizarDatos()"
            >
            </kendo-textbox>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarUrlPerfilLinkedin"
            class="k-icon k-i-arrow-60-left button-icon"
            id="UrlPerfilLinkedin"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarUrlPerfilLinkedin
            clave="UrlPerfilLinkedin"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div
        class="col-12 container-tabla"
        #HistorialUrlPerfilLinkedin
        id="HistorialUrlPerfilLinkedin"
      ></div>
    </div>
  </div>
</form>
