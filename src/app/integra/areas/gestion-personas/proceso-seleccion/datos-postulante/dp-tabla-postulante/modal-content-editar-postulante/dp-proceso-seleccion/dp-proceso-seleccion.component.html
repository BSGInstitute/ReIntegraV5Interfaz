<form [formGroup]="formEditarPostulante" class="Form-Postulantes">
  <div class="row">
    <div class="col-sm-12 col-md-12 k-form-horizontal">
      <div class="container-form">
        <div class="form-input">
          <kendo-formfield orientation="horizontal">
            <label class="k-label"> Proceso Seleccion* </label>
            <kendo-dropdownlist
              textField="nombre"
              valueField="id"
              [data]="comboPostulante.procesoSeleccion"
              [defaultItem]="{
                id: null,
                nombre: 'Seleccione Proceso de Seleccion'
              }"
              [valuePrimitive]="true"
              formControlName="IdProcesoSeleccion"
              [kendoDropDownFilter]="filterSettings"
              (blur)="actualizarDatos()"
            ></kendo-dropdownlist>
            <kendo-formerror>Dato Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label
            class="k-checkbox-label"
            [for]="MostrarHistorialProcesoSeleccion"
            class="k-icon k-i-arrow-60-left button-icon"
            id="ProcesoSeleccion"
          >
          </label>
          <input
            type="checkbox"
            class="button-check"
            size="none"
            #MostrarHistorialProcesoSeleccion
            clave="ProcesoSeleccion"
            (change)="onCheckboxChange($event)"
          />
        </div>
      </div>
      <div class="col-12 container-tabla" #HistorialProcesoSeleccion id="HistorialProcesoSeleccion"></div>

      <div class="container-form mt-3">

            </label>
            <kendo-dropdownlist
              textField="nombreConvocatoria"
              valueField="idConvocatoria"

              [defaultItem]="{
                id: null,
                nombre: 'Seleccione Codigo'
              }"
              [valuePrimitive]="true"
              formControlName="IdConvocatoriaPersonal"
              [kendoDropDownFilter]="filterSettings"
              (blur)="actualizarDatos()"
            ></kendo-dropdownlist>
            <kendo-formerror>Dato Requerido</kendo-formerror>
          </kendo-formfield>
        </div>
        <div class="form-button container-button">
          <label

        </div>
      </div>
      <div class="col-12 container-tabla" #HistorialCodigoConvocatoria id="HistorialCodigoConvocatoria"></div>
