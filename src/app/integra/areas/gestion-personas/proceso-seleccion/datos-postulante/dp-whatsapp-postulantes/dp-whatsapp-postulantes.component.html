<div class="row">
  <div class="col-6 col-sm-12 col-md-6">
    <div class="card">
      <div class="card-header">
        <h3 class="text-center">
          <span>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              fill="currentColor"
              class="bi bi-wechat"
              viewBox="0 0 16 16"
            >
              <path
                d="M11.176 14.429c-2.665 0-4.826-1.8-4.826-4.018 0-2.22 2.159-4.02 4.824-4.02S16 8.191 16 10.411c0 1.21-.65 2.301-1.666 3.036a.32.32 0 0 0-.12.366l.218.81a.6.6 0 0 1 .029.117.166.166 0 0 1-.162.162.2.2 0 0 1-.092-.03l-1.057-.61a.5.5 0 0 0-.256-.074.5.5 0 0 0-.142.021 5.7 5.7 0 0 1-1.576.22M9.064 9.542a.647.647 0 1 0 .557-1 .645.645 0 0 0-.646.647.6.6 0 0 0 .09.353Zm3.232.001a.646.646 0 1 0 .546-1 .645.645 0 0 0-.644.644.63.63 0 0 0 .098.356"
              />
              <path
                d="M0 6.826c0 1.455.781 2.765 2.001 3.656a.385.385 0 0 1 .143.439l-.161.6-.1.373a.5.5 0 0 0-.032.14.19.19 0 0 0 .193.193q.06 0 .111-.029l1.268-.733a.6.6 0 0 1 .308-.088q.088 0 .171.025a6.8 6.8 0 0 0 1.625.26 4.5 4.5 0 0 1-.177-1.251c0-2.936 2.785-5.02 5.824-5.02l.15.002C10.587 3.429 8.392 2 5.796 2 2.596 2 0 4.16 0 6.826m4.632-1.555a.77.77 0 1 1-1.54 0 .77.77 0 0 1 1.54 0m3.875 0a.77.77 0 1 1-1.54 0 .77.77 0 0 1 1.54 0"
              />
            </svg>
          </span>
          Chats
        </h3>
      </div>
      <div class="card-body">
        <kendo-grid
          #gridComponent
          [kendoGridBinding]="gridHistorialChat.data"
          [loading]="gridHistorialChat.loading"
          [selectable]="selectableSettings"
          [pageable]="true"
          [pageSize]="pageSize"
          [resizable]="true"
          kendoGridSelectBy="numero"
          (selectedKeysChange)="onSelectionChange($event)"
        >
          <kendo-grid-column
            field="numero"
            title="Numero"
            [width]="100"
            headerClass="header-grid-integra"
          >
          </kendo-grid-column>
          <kendo-grid-column
            field="fechaCreacion"
            title="Fecha"
            [width]="100"
            headerClass="header-grid-integra"
          >
            <ng-template kendoGridCellTemplate let-dataItem>
              {{ dataItem.fechaCreacion | date : "dd-MM-YYYY" }}
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column
            field="mensaje"
            title="Ultimo Mensaje"
            [width]="250"
            headerClass="header-grid-integra"
          >
            <ng-template kendoGridCellTemplate let-dataItem>
              <!-- <span [innerHTML]="pruebaLabel(dataItem.pais)"> </span> -->
              <span [innerHTML]="SanitizedHTML(dataItem.mensaje)"></span>
            </ng-template>
          </kendo-grid-column>
          <ng-template
            kendoPagerTemplate
            let-totalPages="totalPages"
            let-currentPage="currentPage"
          >
            <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
            <kendo-pager-numeric-buttons
              [buttonCount]="buttonCount"
            ></kendo-pager-numeric-buttons>
            <kendo-pager-next-buttons></kendo-pager-next-buttons>
            <kendo-pager-input></kendo-pager-input>
            <kendo-pager-info></kendo-pager-info>
            <kendo-pager-page-sizes
              [pageSizes]="sizes"
            ></kendo-pager-page-sizes>
          </ng-template>
        </kendo-grid>
      </div>
    </div>
  </div>
  <div class="col-6 col-sm-12 col-md-6 panel-whatsapp">
    <div class="k-loading-panel" *ngIf="loaderChatAndGridWhatsapp">
      <div class="k-loading-panel-mask"></div>
      <div class="k-loading-panel-wrapper">
        <kendo-loader themeColor="primary" size="large"> </kendo-loader>
      </div>
    </div>
    <div class="col-md-12 px-2">
      <div class="block-header bg-success fw-bold">
        <div class="text-white text-center">
          <div class="row">
            <div class="col">
              <div class="flex-row my-2">
                <fa-icon
                  [icon]="['fas', 'circle-user']"
                  [size]="'xl'"
                ></fa-icon>
                <span class="px-1 fs-5 fw-bold">{{
                  nombreCompletoPostulante
                }}</span>
              </div>
            </div>
            <div class="col-auto">
              <div class="text-end">
                <button
                  class="btn"
                  (click)="ActualizarChatPostulanteSeleccionado()"
                >
                  <fa-icon [icon]="['fas', 'arrows-rotate']"></fa-icon>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div
        #chwcBlockMessage
        class="p-2 px-3 chwc-block-message"
        style="
          background-image: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/1089577/background.png);
        "
      >
        <ng-container *ngFor="let mensajes of chatHistorialChatWhatsApp">
          <ng-container *ngIf="mensajes.tipo == 2">
            <div class="row message">
              <div class="text-start">
                <div class="d-flex flex-row">
                  <div class="text-end pt-1">
                    <div
                      class="rounded-circle px-2 pt-1 m-1"
                      style="
                        width: 30px;
                        height: 30px;
                        background-color: #d3d6db;
                      "
                    >
                      <fa-icon
                        [icon]="['fas', 'user']"
                        class="fa-lg text-white"
                      ></fa-icon>
                    </div>
                  </div>
                  <label
                    class="w-auto p-2 my-1 rounded chwc-images"
                    style="max-width: 75%; background-color: #f1f3f4"
                  >
                    <span class="px-1" [innerHTML]="mensajes.mensaje"></span>
                    <span class="d-flex pt-1 chwc-hora-chat">{{
                      mensajes.fechaCreacion | date : "yyyy/MM/dd hh:mm a"
                    }}</span>
                  </label>
                </div>
              </div>
            </div>
          </ng-container>
          <ng-container *ngIf="mensajes.tipo == 1">
            <!-- WHATSAPP MANUALES -->
            <div class="row message">
              <div class="text-end">
                <label
                  class="w-auto p-2 m-1 rounded chwc-images"
                  style="
                    max-width: 75%;
                    background-color: #d9fdd3;
                    text-align: left !important;
                  "
                >
                  <span class="px-1 fw-bold" style="font-size: small">
                    {{ mensajes.nombrePersonal }}
                  </span>
                  <span
                    class="d-flex px-1"
                    [innerHTML]="mensajes.mensaje"
                  ></span>
                  <span
                    class="d-flex flex-row-reverse px-2 chwc-hora-chat"
                    style="height: 10px"
                  >
                    <p
                      class="ps-3 estado-mensaje"
                      *ngIf="
                        mensajes.estadoMensaje == 1 ||
                        mensajes.estadoMensaje == null
                      "
                    >
                      <fa-icon
                        [icon]="['fas', 'check']"
                        class="text-muted chwc-visto"
                      ></fa-icon>
                      <fa-icon
                        [icon]="['fas', 'check']"
                        class="text-muted chwc-visto"
                      ></fa-icon>
                    </p>
                    <p
                      class="ps-3 estado-mensaje"
                      *ngIf="mensajes.estadoMensaje == 2"
                    >
                      <fa-icon
                        [icon]="['fas', 'check']"
                        class="text-primary chwc-visto"
                      ></fa-icon>
                      <fa-icon
                        [icon]="['fas', 'check']"
                        class="text-muted chwc-visto"
                      ></fa-icon>
                    </p>
                    <p
                      class="ps-3 estado-mensaje"
                      *ngIf="mensajes.estadoMensaje == 3"
                    >
                      <fa-icon
                        [icon]="['fas', 'check']"
                        class="text-primary chwc-visto"
                      ></fa-icon>
                      <fa-icon
                        [icon]="['fas', 'check']"
                        class="text-primary chwc-visto"
                      ></fa-icon>
                    </p>
                    {{ mensajes.fechaCreacion | date : "yyyy/MM/dd hh:mm a" }}
                  </span>
                </label>
              </div>
            </div>
          </ng-container>
        </ng-container>
      </div>
      <div
        class="py-2"
        style="
          background-color: #e5ddd5;
          background-image: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/1089577/background.png);
        "
      >
        <div class="container">
          <div class="container__files">
            <div class="btn-platilla">
              <button
                kendoButton
                themeColor="primary"
                ngbTooltip="Ver plantillas"
                (click)="abrirModalPlantillas()"
              >
                <fa-icon
                  [icon]="['fas', 'book']"
                  [size]="'lg'"
                  class="text-white"
                ></fa-icon>
              </button>
            </div>
            <div class="btn-docs">
              <button
                kendoButton
                themeColor="warning"
                [disabled]="bloquearRedaccion || bloquearSeleccion"
                container="body"
                placement="top"
                ngbTooltip="Subir Archivo"
              >
                <label for="upload-file">
                  <fa-icon
                    [icon]="['fas', 'file']"
                    [size]="'lg'"
                    class="text-white"
                  ></fa-icon>
                </label>
              </button>
              <input
                style="display: none"
                type="file"
                id="upload-file"
                accept="application/pdf"
                [disabled]="bloquearRedaccion || bloquearSeleccion"
                (change)="seleccionarArchivo($event)"
              />
            </div>
            <div class="btn-image">
              <button
                kendoButton
                themeColor="success"
                [disabled]="bloquearRedaccion || bloquearSeleccion"
                container="body"
                placement="top"
                ngbTooltip="Subir Imagen"
              >
                <label for="upload-image">
                  <fa-icon
                    [icon]="['fas', 'image']"
                    [size]="'lg'"
                    class="text-white"
                  ></fa-icon>
                </label>
              </button>
              <input
                style="display: none"
                type="file"
                id="upload-image"
                [disabled]="bloquearRedaccion || bloquearSeleccion"
                (change)="seleccionarArchivo($event)"
                accept="image/png, image/jpeg"
              />
            </div>
          </div>
          <div class="container__textarea">
            <form [formGroup]="formMensaje">
              <kendo-textarea
                *ngIf="!esPlantillaAlterno"
                [readonly]="bloquearRedaccion || bloquearSeleccion"
                class="w-100 p-0 m-0"
                formControlName="WaCaption"
                [flow]="'vertical'"
                [rows]="8"
                (ngModelChange)="obtenerCaracteres()"
              >
              </kendo-textarea>
              <div
                *ngIf="esPlantillaAlterno"
                [innerHtml]="valorAlterno"
                class="form-control w-100"
                style="overflow-y: auto; height: 170px; margin: 0px"
              ></div>
            </form>
          </div>
          <div class="container__btncontrols">
            <div class="btn-send">
              <button
                (click)="enviarTexto()"
                kendoButton
                themeColor="info"
                container="body"
                placement="top"
                ngbTooltip="Enviar Mensaje"
                class=""
                style="height: 80px"
                [disabled]="
                  !(
                    formMensaje.get('WaCaption').value &&
                    formMensaje.get('WaCaption').value.length > 0
                  )
                "
              >
                <fa-icon
                  [icon]="['fas', 'paper-plane']"
                  [size]="'lg'"
                  class="text-white"
                ></fa-icon>
              </button>
            </div>
            <div class="btn-delete">
              <button
                kendoButton
                themeColor="error"
                container="body"
                placement="top"
                (click)="reestablecer()"
                ngbTooltip="Limpiar"
                class=""
              >
                <fa-icon
                  [icon]="['fas', 'x']"
                  [size]="'sm'"
                  class="text-white"
                ></fa-icon>
              </button>
            </div>
            <div class="count-caracter">
              <div
                class="text-center rounded border bg-disabled"
                style="height: 40px; margin-left: 1px"
              >
                <span class="fw-bold"> {{ cantidadCaracterMensaje }} </span>
              </div>
            </div>
          </div>
          <!-- <div class="row justify-content-end">
            <div class="col-md-2 mt-3 d-flex align-items-start">
              <button
                kendoButton
                themeColor="tertiary"
                container="body"
                placement="top"
                ngbTooltip="Ocultar WhatsApp"
                class="p-2 me-1 ms-1 w-100"
              >
                <fa-icon [icon]="['fas', 'right-from-bracket']"></fa-icon>
              </button>
            </div>
          </div> -->
        </div>
      </div>
      <!-- <loading [loading]="loaderChatAndGridWhatsapp"></loading> -->
    </div>
  </div>
</div>

<!-- Modal Seleccion Plantillas Predefinidas  -->
<ng-template #modalPlantillaWhatsapp let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h2 class="modal-title m-0 p-0" id="modal-basic-title ">
      Plantillas para Whatsapp
    </h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <form [formGroup]="formContactoEnvio" class="Form-Postulantes">
      <div class="row">
        <div class="col-sm-12 col-md-12 k-form-horizontal">
          <div class="row mt-3">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label">Plantillas para WhatsApp</label>
                <kendo-dropdownlist
                  textField="nombrePlantillaBase"
                  valueField="idPlantilla"
                  [data]="comboPlantillas.plantillaWhatsApp"
                  [defaultItem]="{
                    idPlantilla: null,
                    nombrePlantillaBase: 'Seleccione Plantilla'
                  }"
                  [valuePrimitive]="true"
                  formControlName="idPlantilla"
                  [kendoDropDownFilter]="filterSettings"
                ></kendo-dropdownlist>
                <kendo-formerror>Seleccione una plantilla</kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label" [for]="Fecha">Fecha de Envio </label>
                <kendo-datetimepicker
                  #Fecha
                  formControlName="Fecha"
                  [format]="format"
                  placeholder="Seleccione fecha y hora"
                >
                </kendo-datetimepicker>
                <kendo-formerror>Fecha Erronea</kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <!-- <button themeColor="info" kendoButton>Validar</button> -->
    <button
      themeColor="success"
      kendoButton
      [disabled]="controlBotton"
      (click)="RemplazarPlantillaEtiqueta()"
    >
      <kendo-loader *ngIf="loadingPanelVisible" themeColor="light">
      </kendo-loader>
      Aceptar
    </button>
    <button
      themeColor="error"
      kendoButton
      (click)="modal.dismiss('Cross click')"
    >
      Cerrar
    </button>
  </div>
  <!-- <loading [loading]="loaderArmandoPlantillaWhatsapp"></loading> -->
</ng-template>
<!-- Modal Seleccion Plantillas Predefinidas  -->

<!-- Modal Seleccion Archivos PDF/Imagenes  -->
<ng-template #modalSeleccionarArchivo let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title ">
      Archivo seleccionado
    </h3>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="row pt-2 px-2 mt-2">
      <div class="text-center">
        <div class="mb-4">
          <ng-container
            *ngIf="fileWhatsapp.type == 'application/pdf'; else esImagen"
          >
            <fa-icon [icon]="['far', 'file-pdf']" [size]="'10x'"></fa-icon>
          </ng-container>
          <ng-template #esImagen>
            <fa-icon [icon]="['far', 'image']" [size]="'10x'"></fa-icon>
          </ng-template>
        </div>
        <div>{{ fileWhatsapp.name }}</div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <div class="row">
      <div class="text end">
        <button class="btn btn-danger" (click)="modal.dismiss()">
          <fa-icon [icon]="['fas', 'times']"></fa-icon>
          Cancelar
        </button>
        <button
          class="btn btn-primary mx-2"
          (click)="adjuntarArchivoWhatsapp()"
        >
          <fa-icon [icon]="['fas', 'check']"></fa-icon>
          Confirmar
        </button>
      </div>
    </div>
  </div>
</ng-template>
<!-- End Modal Seleccion Archivos PDF/Imagenes -->
