<div class="row my-3">
  <div class="col-12">
    <div class="modal-body px-4 ktt-datosPgeneral">
      <kendo-tabstrip [keepTabContent]="true">
        <!-- DATOS DEL POSTULANTE -->
        <kendo-tabstrip-tab [selected]="true">
          <ng-template kendoTabTitle>
            <span>Datos del Postulante</span>
          </ng-template>
          <ng-template kendoTabContent>
            <!-- CONTENT -->
            <app-dp-tabla-postulante></app-dp-tabla-postulante>
            <!-- CONTENT -->
          </ng-template>
        </kendo-tabstrip-tab>
        <!-- END DATOS DEL POSTULANTE -->
        <!-- WHATSAPP -->
        <kendo-tabstrip-tab>
          <ng-template kendoTabTitle>
            <span><i class='k-icon k-i-whatsapp'></i>Chat Whatsapp</span>
          </ng-template>
          <ng-template kendoTabContent *loadOnDemand>
            <!-- CONTENT -->
            <app-dp-whatsapp-postulantes></app-dp-whatsapp-postulantes>
            <!-- CONTENT -->
          </ng-template>
        </kendo-tabstrip-tab>
        <!-- END WHATSAPP -->
      </kendo-tabstrip>
    </div>
  </div>
</div>

<!-- WhatsApp floating panel (FAB + chat) — posiciona fixed bottom-right por CSS -->
<app-dp-whatsapp-floating-panel></app-dp-whatsapp-floating-panel>
