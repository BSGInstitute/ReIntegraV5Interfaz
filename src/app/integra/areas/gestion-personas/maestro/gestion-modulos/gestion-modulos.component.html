<div class="card border-primary">
  <div class="card-header pb-0 bg-color-material">
    <div class="col text-aling-center">
      <h2 class="mb-2 text-white">Gestion de Modulos</h2>
    </div>
  </div>
  <div class="card-body p-2">
    <kendo-grid
      [kendoGridBinding]="gridPaqueteModulo.data"
      [loading]="gridPaqueteModulo.loading"
      [selectable]="true"
      [resizable]="true"
      [pageable]="{
        buttonCount: 5,
        info: true,
        type: 'numeric',
        pageSizes: true,
        previousNext: true,
        position: 'bottom'
      }"
      [skip]="0"
      [pageSize]="15"
      filterable="menu"
    >
      <ng-template kendoGridToolbarTemplate>
        <kendo-grid-spacer></kendo-grid-spacer>
        <button
          kendoButton
          themeColor="primary"
          icon="plus"
          (click)="abrirModalInsertar()"
        >
          Nuevo
        </button>
      </ng-template>
      <ng-template
        kendoPagerTemplate
        let-totalPages="totalPages"
        let-currentPage="currentPage"
      >
        <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
        <kendo-pager-numeric-buttons
          [buttonCount]="5"
        ></kendo-pager-numeric-buttons>
        <kendo-pager-next-buttons></kendo-pager-next-buttons>
        <kendo-pager-input></kendo-pager-input>
        <kendo-pager-info></kendo-pager-info>
        <kendo-pager-page-sizes
          [pageSizes]="cantidadItems"
        ></kendo-pager-page-sizes>
      </ng-template>

      <kendo-grid-column
        field="nombre"
        title="Nombre"
        [width]="150"
        [headerClass]="'justify-content-start'"
        [filterable]="true"
      >
        <ng-template
          kendoGridFilterMenuTemplate
          let-filter
          let-column="column"
          let-filterService="filterService"
        >
          <kendo-grid-string-filter-menu
            [column]="column"
            [filter]="filter"
            [filterService]="filterService"
            [extra]="false"
            operator="contains"
          >
            <kendo-filter-contains-operator
              text="Contiene"
            ></kendo-filter-contains-operator>
          </kendo-grid-string-filter-menu>
        </ng-template>
      </kendo-grid-column>

      <kendo-grid-column
        field="descripcion"
        title="Descripcion"
        [width]="150"
        [headerClass]="'justify-content-start'"
        [filterable]="true"
      >
        <ng-template
          kendoGridFilterMenuTemplate
          let-filter
          let-column="column"
          let-filterService="filterService"
        >
          <kendo-grid-string-filter-menu
            [column]="column"
            [filter]="filter"
            [filterService]="filterService"
            [extra]="false"
            operator="contains"
          >
            <kendo-filter-contains-operator
              text="Contiene"
            ></kendo-filter-contains-operator>
          </kendo-grid-string-filter-menu>
        </ng-template>
      </kendo-grid-column>

      <kendo-grid-command-column
        title="Acciones"
        [headerStyle]="{ color: '#5f75bd' }"
        [width]="30"
        [headerClass]="'justify-content-center'"
      >
        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
          <div class="text-center">
            <button
              kendoButton
              themeColor="warning"
              fillMode="solid"
              rounded="large"
              size="large"
              class="p-2 me-1 ms-1"
              container="body"
              placement="top"
              ngbTooltip="Editar"
              (click)="abrirModalActualizar(dataItem)"
            >
              <span class="k-icon k-i-pencil k-icon-20"></span>
            </button>

            <button
              kendoButton
              themeColor="error"
              fillMode="solid"
              rounded="large"
              size="large"
              class="p-2 me-1 ms-1"
              container="body"
              placement="top"
              ngbTooltip="Eliminar"
              (click)="eliminar(dataItem.id)"
            >
              <span class="k-icon k-i-x k-icon-20"></span>
            </button>
          </div>
        </ng-template>
      </kendo-grid-command-column>
    </kendo-grid>
  </div>
</div>

<ng-template #modalAsociarModulos let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title">
      Configuracion de Paquetes
    </h3>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss()"
    ></button>
  </div>
  <div class="modal-body">
    <div class="row">
      <form [formGroup]="formPaqueteModulos">
        <div class="row mb-3">
          <div class="col-sm-6 col-md-6 k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                class="d-flex align-items-end"
                [style.width.px]="80"
                [for]="nombre"
                text="Nombre:"
              >
              </kendo-label>
              <kendo-textbox
                #nombre
                formControlName="nombre"
                [style.width.px]="400"
                placeholder="Nombre"
                required
              >
              </kendo-textbox>
            </kendo-formfield>
          </div>

          <div class="col-sm-6 col-md-6 k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                class="d-flex align-items-end"
                [style.width.px]="80"
                [for]="descripcion"
                text="Descripcion:"
              >
              </kendo-label>
              <kendo-textbox
                #descripcion
                formControlName="descripcion"
                [style.width.px]="400"
                placeholder="Descripcion"
                required
              >
              </kendo-textbox>
            </kendo-formfield>
          </div>
        </div>
      </form>
    </div>
    <div class="row">
      <div class="d-flex justify-content-around">
        <div class="first-grid">
          <kendo-grid
            [kendoGridBinding]="gridPaqueteMisModulo.data"
            [loading]="gridPaqueteMisModulo.loading"
            [selectable]="true"
            [resizable]="true"
            [height]="435"
            filterable="menu"
            kendoGridSelectBy="id"
            [(selectedKeys)]="listaDesasociarModulo"
          >
            <kendo-grid-checkbox-column
              [width]="40"
              [headerClass]="{ 'text-center': true }"
              [class]="{ 'text-center': true }"
              [resizable]="false"
              [columnMenu]="false"
              [showSelectAll]="true"
            ></kendo-grid-checkbox-column>
            <kendo-grid-column
              field="nombreGrupo"
              title="Grupo"
              [width]="150"
              [headerClass]="'justify-content-start'"
              [filterable]="true"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              field="nombreModulo"
              title="Modulo"
              [width]="150"
              [headerClass]="'justify-content-start'"
              [filterable]="true"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              field="url"
              title="URL"
              [width]="180"
              [headerClass]="'justify-content-start'"
              [filterable]="true"
            >
              <ng-template kendoGridFooterTemplate let-column>
                <div class="text-end">
                  {{ gridPaqueteMisModulo.data.length }} Items
                </div>
              </ng-template>
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
          </kendo-grid>
        </div>
        <div class="second-grid mx-2">
          <button
            class="btn btn-success"
            (click)="asociarModulo()"
            [disabled]="!(listaAsociarModulo.length > 0)"
          >
            <span class="k-icon k-i-arrow-60-left k-icon-24"></span>
          </button>
          <button
            class="btn btn-danger my-2"
            (click)="desasociarModulo()"
            [disabled]="!(listaDesasociarModulo.length > 0)"
          >
            <span class="k-icon k-i-arrow-60-right k-icon-24"></span>
          </button>
          <button
            class="btn btn-outline-danger my-2"
            (click)="reestablecer()"
            [disabled]="
              !(
                listaDesasociarModulo.length > 0 ||
                listaAsociarModulo.length > 0
              )
            "
          >
            <span class="k-icon k-i-reload k-icon-24"></span>
          </button>
        </div>
        <div class="third-grid">
          <kendo-grid
            [kendoGridBinding]="gridPaqueteListaModulo.data"
            [loading]="gridPaqueteListaModulo.loading"
            [selectable]="true"
            [resizable]="true"
            [height]="435"
            filterable="menu"
            kendoGridSelectBy="id"
            [(selectedKeys)]="listaAsociarModulo"
          >
            <kendo-grid-checkbox-column
              [width]="40"
              [headerClass]="{ 'text-center': true }"
              [class]="{ 'text-center': true }"
              [resizable]="false"
              [columnMenu]="false"
              [showSelectAll]="true"
              [disabled]="listaDesasociarModulo.length > 0"
            ></kendo-grid-checkbox-column>

            <kendo-grid-column
              field="nombreGrupo"
              title="Grupo"
              [width]="150"
              [headerClass]="'justify-content-start'"
              [filterable]="true"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              field="nombreModulo"
              title="Modulo"
              [width]="150"
              [headerClass]="'justify-content-start'"
              [filterable]="true"
            >
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              field="url"
              title="URL"
              [width]="180"
              [headerClass]="'justify-content-start'"
              [filterable]="true"
            >
              <ng-template kendoGridFooterTemplate let-column>
                <div class="text-end">
                  {{ gridPaqueteListaModulo.data.length }} Items
                </div>
              </ng-template>
              <ng-template
                kendoGridFilterMenuTemplate
                let-filter
                let-column="column"
                let-filterService="filterService"
              >
                <kendo-grid-string-filter-menu
                  [column]="column"
                  [filter]="filter"
                  [filterService]="filterService"
                  [extra]="false"
                  operator="contains"
                >
                  <kendo-filter-contains-operator
                    text="Contiene"
                  ></kendo-filter-contains-operator>
                </kendo-grid-string-filter-menu>
              </ng-template>
            </kendo-grid-column>
          </kendo-grid>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="d-flex justify-content-end mt-2">
        <ng-container *ngIf="esNuevo; else esExistente">
          <button
            class="btn btn-primary mx-1"
            (click)="insertar()"
            [disabled]="!formPaqueteModulos.valid"
          >
            Registrar
          </button>
        </ng-container>
        <ng-template #esExistente>
          <button class="btn btn-success mx-1" (click)="actualizar()">
            Actualizar
          </button>
        </ng-template>
        <button class="btn btn-danger" (click)="modal.dismiss()">
          Cancelar
        </button>
      </div>
    </div>
  </div>
  <loading [loading]="loaderModal"></loading>
</ng-template>
<!-- Modal Edicion -->
<loading [loading]="loaderModal"></loading>
