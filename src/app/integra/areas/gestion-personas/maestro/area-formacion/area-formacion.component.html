<div class="content">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h2 class="text-white mb-2">(M) Area de Formacion</h2>
        </div>
        <div class="card-body p-4">
          <div class="col-12">
            <kendo-grid
              #kgridNivelPuestoTrabajo
              [kendoGridBinding]="gridAreaFormacion.data"
              [loading]="gridAreaFormacion.loading"
              (remove)="gridAreaFormacion.removeHandler($event)"
              [resizable]="true"
              [pageSize]="10"
              [sortable]="true"
              filterable="menu"
              [pageable]="{ pageSizes: [10, 20, 30] }"
            >
              <!-- filterable="menu" -->
              <ng-template kendoGridToolbarTemplate>
                <button
                  kendoButton
                  icon="reload"
                  fillMode="flat"
                  themeColor="primary"
                  (click)="obtener()"
                ></button>
                <kendo-grid-spacer></kendo-grid-spacer>

                <button
                  kendoButton
                  icon="plus"
                  themeColor="primary"
                  (click)="abrirModal(modalAreaFormacion)"
                >
                  Nuevo
                </button>
              </ng-template>
              <kendo-grid-column
                field="nombre"
                title="Nombre"
                [width]="150"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template
                  kendoGridFilterMenuTemplate
                  let-filter
                  let-column="column"
                  let-filterService="filterService"
                >
                  <kendo-grid-string-filter-menu
                    [column]="column"
                    [filter]="filter"
                    [filterService]="filterService"
                    [extra]="false"
                    operator="contains"
                  >
                    <kendo-filter-contains-operator
                      text="Contiene"
                    ></kendo-filter-contains-operator>
                  </kendo-grid-string-filter-menu>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-command-column
                title="Editar"
                [width]="60"
                [headerClass]="'header-grid-integra'"
              >
                <ng-template
                  kendoGridCellTemplate
                  let-dataItem="dataItem"
                  let-isNew="isNew"
                >
                  <div class="w-100 d-flex justify-content-center">
                    <!-- Editar -->
                    <button
                      kendoButton
                      fillMode="solid"
                      rounded="large"
                      themeColor="warning"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      (click)="abrirModal(modalAreaFormacion, dataItem)"
                      ngbTooltip="Editar"
                    >
                      <span class="k-icon k-i-edit k-icon-20"></span>
                    </button>
                    <!-- Eliminar -->
                    <button
                      kendoButton
                      themeColor="error"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      ngbTooltip="Eliminar"
                      (click)="eliminar(dataItem.id)"
                    >
                      <span class="k-icon k-i-x k-icon-20"></span>
                    </button>
                  </div>
                </ng-template>
              </kendo-grid-command-column>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal para Insertar y Actualizar -->
<ng-template #modalAreaFormacion let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h1 class="modal-title m-0 p-0" id="modal-basic-title">
      Registro Area Formacion
    </h1>
  </div>
  <div class="modal-body">
    <div class="row">
      <!-- CONTENT -->
      <form
        class="k-form k-form-horizontal"
        [formGroup]="formAreaFormacion"
        class="k-form"
      >
        <div class="row">
          <div class="col-sm-12 col-md-12 k-form-horizontal mb-3">
            <kendo-formfield orientation="horizontal">
              <label [for]="nombre" class="d-flex align-items-start">
                <span
                  ><b>Nombre</b><strong class="text-danger">*</strong>:</span
                >
              </label>
              <kendo-textbox
                #nombre
                formControlName="nombre"
                inputValidSpaceDir
              >
              </kendo-textbox>
            </kendo-formfield>
          </div>
        </div>
      </form>
    </div>
  </div>
  <div class="modal-footer">
    <button
      *ngIf="isNew"
      type="button"
      class="btn btn-primary"
      [disabled]="enProcesoSolicitud"
      (click)="guardar()"
    >
      Guardar
    </button>
    <button
      *ngIf="!isNew"
      type="button"
      class="btn btn-primary"
      [disabled]="enProcesoSolicitud"
      (click)="actualizar()"
    >
      Actualizar
    </button>

    <button
      type="button"
      class="btn btn-danger"
      (click)="modal.close('Close click')"
      [disabled]="enProcesoSolicitud"
    >
      Cancelar
    </button>
  </div>
  <loading [loading]="enProcesoSolicitud"></loading>
</ng-template>
