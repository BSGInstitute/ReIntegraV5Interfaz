<div class="content">
    <div class="row">
      <div class="col-12">
        <div class="card">
          <div class="card-header bg-color-material pb-0">
            <h2 class="text-white mb-2">(M) Relaciones Externas</h2>
          </div>
          <div class="card-body p-4" id="grillaAgendaTab">
            <div class="col-12">
              <kendo-grid
                #kgridPersonalRelacionExterna
                [kendoGridBinding]="gridPersonalRelacionExterna.data"
                [loading]="gridPersonalRelacionExterna.loading"
                [resizable]="true"
                filterable="menu"
                [sortable]="true"
                [pageSize]="10"
                [pageable]="{ pageSizes: [5, 10, 20] }"
              >
                <ng-template kendoGridToolbarTemplate let-dataItem="dataItem">
                  <kendo-grid-spacer></kendo-grid-spacer>
                  <button
                    kendoButton
                    icon="plus"
                    themeColor="primary"
                    (click)="openModalPersonalRelacionExterna(modalPersonalRelacionExterna)"
                  >
                    Nuevo
                  </button>
                </ng-template>
                <kendo-grid-column
                  field="nombre"
                  title="Area Externa"
                  [width]="150"
                  headerClass="header-grid-integra"
                >
                  <ng-template
                    kendoGridFilterMenuTemplate
                    let-filter
                    let-column="column"
                    let-filterService="filterService"
                  >
                    <kendo-grid-string-filter-menu
                      [column]="column"
                      [filter]="filter"
                      [filterService]="filterService"
                      [extra]="false"
                      operator="contains"
                    >
                      <kendo-filter-contains-operator
                        text="Contiene"
                      ></kendo-filter-contains-operator>
                    </kendo-grid-string-filter-menu>
                  </ng-template>
                </kendo-grid-column>
                <kendo-grid-column
                  field="personalAreaTrabajo"
                  title="Area de Trabajo"
                  [width]="100"
                  [headerClass]="'header-grid-integra'"
                ></kendo-grid-column>
                <kendo-grid-command-column
                  title="Opciones"
                  [width]="100"
                  headerClass="header-grid-integra"
                >
                  <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                    <div class="row justify-content-center">
                      <div kendoTooltip class="col-auto p-0 mx-1">
                        <button
                          kendoButton
                          themeColor="warning"
                          title="Editar"
                          icon="pencil"
                          (click)="
                            openModalPersonalRelacionExterna(
                              modalPersonalRelacionExterna,
                              dataItem
                            )
                          "
                        ></button>
                      </div>
                      <div kendoTooltip class="col-auto p-0 mx-1">
                        <button
                          kendoButton
                          themeColor="error"
                          icon="trash"
                          title="Eliminar"
                          (click)="eliminarPersonalRelacionExterna(dataItem.id)"
                        ></button>
                      </div>
                    </div>
                  </ng-template>
                </kendo-grid-command-column>
                <ng-template kendoPagerTemplate>
                  <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                  <kendo-pager-numeric-buttons
                    [buttonCount]="10"
                  ></kendo-pager-numeric-buttons>
                  <kendo-pager-next-buttons></kendo-pager-next-buttons>
                  <kendo-pager-input></kendo-pager-input>
                  <kendo-pager-info></kendo-pager-info>
                  <kendo-pager-page-sizes
                    [pageSizes]="pageSizes"
                  ></kendo-pager-page-sizes>
                  <div class="w-100 text-end">
                    <button
                      kendoButton
                      icon="reload"
                      fillMode="flat"
                      themeColor="secondary"
                      (click)="obtenerPersonalRelacionExterna()"
                    ></button>
                  </div>
                </ng-template>
              </kendo-grid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- #region ModalPersonalRelacionExterna -->
  <ng-template #modalPersonalRelacionExterna let-modal>
    <div class="modal-header py-2 bg-primary-header-modal text-center">
      <h2 class="modal-title mb-0 w-100">Registro Relación Área Externa</h2>
      <button
        type="button"
        class="btn-close"
        aria-label="Close"
        (click)="modal.dismiss('Cross click')"
      ></button>
    </div>
    <div class="modal-body p-3">
      <form [formGroup]="formPersonalRelacionExterna">
        <kendo-formfield>
          <label [for]="nombreB" class="k-label">
            <span><b>Nombre de Área Externa</b><span class="fw-bold"> *</span></span>
          </label>
          <kendo-textbox #nombreB formControlName="nombre" placeholder="<Nombre>">
          </kendo-textbox>
          <kendo-formerror>
            <span *ngIf="formPersonalRelacionExterna.get('nombre').hasError('required')" class="text-danger">
              Error: Nombre es requerido
            </span>
            <span *ngIf="formPersonalRelacionExterna.get('nombre').hasError('maxlength')" class="text-danger">
              Error: Máximo 50 caracteres. Has escrito {{ formPersonalRelacionExterna.get("nombre").value.length }} caracteres
            </span>
          </kendo-formerror>
          <kendo-formhint>50 caracteres como máximo</kendo-formhint>
        </kendo-formfield>
        <kendo-formfield>
          <label [for]="PersonalAreaTrabajo" class="k-label">
            <span><b>Área Trabajo</b></span>
          </label>
          <kendo-dropdownlist
            #PersonalAreaTrabajo
            [data]="PersonalAreaTrabajoData"
            [valuePrimitive]="true"
            valueField="id"
            textField="nombre"
            formControlName="idPersonalAreaTrabajo"
            [filterable]="true"
            [defaultItem]="{
              nombre: 'Seleccione ...',
              id: null
            }"
            [kendoDropDownFilter]="filterSettings"
          >
          </kendo-dropdownlist>
          <kendo-formerror>Ingrese Tipo Formacion</kendo-formerror>
        </kendo-formfield>
      </form>
      <loading [loading]="enProcesoSolicitud"></loading>
    </div>
    <div class="modal-footer">
      <div class="k-form-buttons m-0">
        <button
          themeColor="primary"
          icon="save"
          kendoButton
          (click)="isNew ? insertarPersonalRelacionExterna() : actualizarPersonalRelacionExterna()"
        >
          {{ isNew ? "Guardar" : "Actualizar" }}
        </button>
        <button
          themeColor="error"
          icon="cancel"
          kendoButton
          [disabled]="enProcesoSolicitud"
          (click)="modal.dismiss('Cross click')"
        >
          Cancelar
        </button>
      </div>
    </div>
  </ng-template>
  <!-- #endregion -->
