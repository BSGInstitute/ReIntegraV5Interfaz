<div class="card border-primary">
  <div class="card-header pb-0 bg-color-material">
    <div class="col text-aling-center">
      <h2 class="mb-2 text-white">(M) Maestro Estado Formación</h2>
    </div>
  </div>
  <div class="card-body p-2">
    <kendo-grid
      [kendoGridBinding]="gridGradoEstudio.data"
      [loading]="gridGradoEstudio.loading"
      [selectable]="true"
      [resizable]="true"
      [pageable]="{
        buttonCount: 5,
        info: true,
        type: 'numeric',
        pageSizes: true,
        previousNext: true,
        position: 'bottom'
      }"
      [skip]="0"
      [pageSize]="10"
      filterable="menu"
    >
      <ng-template kendoGridToolbarTemplate>
        <button
          kendoButton
          themeColor="secondary"
          icon="arrow-rotate-ccw"
          (click)="obtener()"
        >
          Refrescar
        </button>
        <kendo-grid-spacer></kendo-grid-spacer>
        <button
          kendoButton
          themeColor="primary"
          icon="plus"
          (click)="abrirModalInsertar()"
        >
          Nuevo
        </button>
      </ng-template>
      <ng-template
        kendoPagerTemplate
        let-totalPages="totalPages"
        let-currentPage="currentPage"
      >
        <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
        <kendo-pager-numeric-buttons
          [buttonCount]="5"
        ></kendo-pager-numeric-buttons>
        <kendo-pager-next-buttons></kendo-pager-next-buttons>
        <kendo-pager-input></kendo-pager-input>
        <kendo-pager-info></kendo-pager-info>
        <kendo-pager-page-sizes
          [pageSizes]="cantidadItems"
        ></kendo-pager-page-sizes>
      </ng-template>

      <kendo-grid-column
        field="nombre"
        title="Nombre"
        [headerStyle]="headerStyle"
        [width]="150"
        [filterable]="true"
      >
        <ng-template
          kendoGridFilterMenuTemplate
          let-filter
          let-column="column"
          let-filterService="filterService"
        >
          <kendo-grid-string-filter-menu
            [column]="column"
            [filter]="filter"
            [filterService]="filterService"
            [extra]="false"
            operator="contains"
          >
            <kendo-filter-contains-operator
              text="Contiene"
            ></kendo-filter-contains-operator>
          </kendo-grid-string-filter-menu>
        </ng-template>
      </kendo-grid-column>

      <kendo-grid-command-column
        title="Opciones"
        [headerStyle]="headerStyle"
        [width]="30"
        [headerClass]="'justify-content-center'"
      >
        <ng-template kendoGridCellTemplate let-dataItem>
          <div class="text-center">
            <button
              kendoButton
              themeColor="warning"
              fillMode="solid"
              rounded="large"
              size="large"
              class="p-2 me-1 ms-1"
              container="body"
              placement="top"
              ngbTooltip="Editar"
              (click)="abrirModalActualizar(dataItem)"
            >
              <span class="k-icon k-i-pencil k-icon-20"></span>
            </button>

            <button
              kendoButton
              themeColor="error"
              fillMode="solid"
              rounded="large"
              size="large"
              class="p-2 me-1 ms-1"
              container="body"
              placement="top"
              ngbTooltip="Eliminar"
              (click)="abrirModalEliminar(dataItem)"
            >
              <span class="k-icon k-i-x k-icon-20"></span>
            </button>
          </div>
        </ng-template>
      </kendo-grid-command-column>
    </kendo-grid>
  </div>
</div>

<ng-template #modalGradoEstudio let-modal>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title">
      {{ formAction }} Grado Estudio
    </h3>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss(); limpiarForm()"
    ></button>
  </div>
  <form
    (submit)="enviarFormulario(modal.dismiss)"
    [formGroup]="formGradoEstudio"
  >
    <div class="modal-body">
      <div class="row mb-3 justify-content-start">
        <div class="col-sm-6 col-md-6 k-form-horizontal flex-grow-1">
          <kendo-formfield orientation="horizontal" class="d-flex flex-row">
            <kendo-label
              style="width: fit-content"
              [for]="nombre"
              text="(*) Nombre:"
            >
            </kendo-label>
            <kendo-textbox
              #nombre
              formControlName="nombre"
              class="flex-grow-1"
              required
            >
            </kendo-textbox>
            <kendo-formerror *ngIf="nombreForm.errors?.['required']">Nombre es requerido</kendo-formerror>
            <kendo-formerror *ngIf="nombreForm.errors?.['maxlength']">Nombre debe tener 50 caracteres o menos</kendo-formerror>
            <kendo-formerror *ngIf="nombreForm.errors?.['noStartSpace'] || nombreForm.errors?.['noEndSpace']">No se permite espacios al inicio/final</kendo-formerror>
            
          </kendo-formfield>
        </div>
      </div>
    </div>
    <div class="d-flex justify-content-end modal-footer">
      <button
        kendoButton
        themeColor="primary"
        type="submit"
      >
        {{ formAction }}
      </button>
      <button
        kendoButton
        type="button"
        themeColor="secondary"
        (click)="modal.dismiss(); limpiarForm()"
      >
        Cancelar
      </button>
    </div>
  </form>
  <loading [loading]="isPageLoading"></loading>
</ng-template>
