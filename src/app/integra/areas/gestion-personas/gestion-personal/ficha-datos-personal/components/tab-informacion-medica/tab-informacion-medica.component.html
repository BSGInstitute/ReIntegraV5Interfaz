<div class="row">
  <div class="col-md-12">
    <div class="card p-3">
      <form [formGroup]="formDatosPersonal" class="k-form">
        <div class="row">
          <div class="col-sm-12 col-md-12">
            <h4 class="mb-3 text-primary">
              <b>Información Médica</b>
            </h4>
            <div class="row mb-3 justify-content-center">
              <div class="col-md-12 col-12">
                <kendo-formfield>
                  <div class="row align-items-center">
                    <div class="col-md-5 col-sm-12">
                      <label for="TipoSangre" class="k-label">Tipo de Sangre</label>
                    </div>
                    <div class="col-md-5 col-sm-12">
                      <kendo-dropdownlist
                        #TipoSangre
                        formControlName="idTipoSangre"
                        [data]="DataTipoSangre"
                        [defaultItem]="{
                          id: null,
                          tipoSangre: '-Seleccione Tipo Sangre-'
                        }"
                        valueField="id"
                        textField="tipoSangre"
                        size="small"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings"
                      ></kendo-dropdownlist>
                    </div>
                  </div>
                </kendo-formfield>
              </div>
              <br />
              <br />
            </div>
            <div class="col-md-12">
              <div class="card p-3">
                <div class="modal-header bg-primary-header-modal">
                  <h3 class="modal-title m-0 p-0" id="modal-basic-title">
                    Información Médica
                  </h3>
                </div>
                <div class="row">
                  <div class="col-12">
                    <kendo-grid
                      #kgridPersonalInformacionMedica
                      [kendoGridBinding]="gridPersonalInformacionMedica.data"
                      [loading]="gridPersonalInformacionMedica.loading"
                      (remove)="gridPersonalInformacionMedica.removeHandler($event)"
                      (cancel)="gridPersonalInformacionMedica.cancelHandler($event)"
                      (save)="gridPersonalInformacionMedica.saveHandler($event)"
                      (add)="gridPersonalInformacionMedica.addHandler($event)"
                      (edit)="gridPersonalInformacionMedica.editHandler($event)"
                      [pageSize]="10"
                      [pageable]="true"
                      [resizable]="true"
                    >
                      <ng-template kendoGridToolbarTemplate>
                        <button
                          kendoGridAddCommand
                          fillMode="flat"
                          themeColor="primary"
                          icon="plus"
                        >
                          Añadir
                        </button>
                      </ng-template>
                      <kendo-grid-column
                        field="alergia"
                        title="Alergias"
                        [width]="150"
                        headerClass="justify-content-center"
                      >
                      </kendo-grid-column>

                      <kendo-grid-column
                        field="precaucion"
                        title="Precauciones"
                        [width]="150"
                        headerClass="justify-content-center"
                      >
                        <ng-template
                          kendoGridEditTemplate
                          let-formGroup="formGroup"
                          let-dataItem="dataItem"
                        >
                          <textarea
                            [formControl]="formGroup.get('precaucion')"
                            rows="3"
                            class="form-control"
                          ></textarea>
                        </ng-template>
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Comando"
                        [width]="150"
                        headerClass="justify-content-center"
                      >
                        <ng-template kendoGridCellTemplate let-dataItem>
                          <div class="text-center">
                            <button
                              kendoGridEditCommand
                              rounded="large"
                              themeColor="warning"
                              size="large"
                              class="p-2 me-1 ms-1"
                              container="body"
                              placement="top"
                              ngbTooltip="Editar"
                            >
                              <span class="k-icon k-i-edit k-icon-20"></span>
                            </button>
                            <button
                              kendoGridRemoveCommand
                              themeColor="error"
                              fillMode="solid"
                              rounded="large"
                              class="p-2 me-1 ms-1"
                              container="body"
                              placement="top"
                              ngbTooltip="Eliminar"
                            >
                              <span class="k-icon k-i-trash k-icon-20"></span>
                            </button>
                            <button
                              kendoGridSaveCommand
                              themeColor="primary"
                              fillMode="solid"
                              rounded="large"
                              size="large"
                              class="p-2 me-1 ms-1"
                              [disabled]="gridPersonalInformacionMedica.formGroup?.invalid"
                              container="body"
                              placement="top"
                              ngbTooltip="Guardar"
                            >
                              <span class="k-icon k-i-save k-icon-20"></span>
                            </button>
                            <button
                              kendoGridCancelCommand
                              themeColor="secondary"
                              fillMode="solid"
                              rounded="large"
                              size="large"
                              class="p-2 me-1 ms-1"
                              container="body"
                              placement="top"
                              ngbTooltip="Cancelar"
                            >
                              <span class="k-icon k-i-cancel k-icon-20"></span>
                            </button>
                          </div>
                        </ng-template>
                      </kendo-grid-column>
                    </kendo-grid>
                  </div>
                </div>
              </div>
              <br />
              <div class="modal-header bg-primary-header-modal">
                <h3 class="modal-title m-0 p-0" id="modal-basic-title">
                  Historial Médico
                </h3>
              </div>
              <div class="content">
                <div class="row">
                  <div class="col-12">
                    <kendo-grid
                      #kgridPersonalHistorialMedico
                      [kendoGridBinding]="gridPersonalHistorialMedico.data"
                      [loading]="gridPersonalHistorialMedico.loading"
                      (remove)="gridPersonalHistorialMedico.removeHandler($event)"
                      (cancel)="gridPersonalHistorialMedico.cancelHandler($event)"
                      (save)="gridPersonalHistorialMedico.saveHandler($event)"
                      (add)="gridPersonalHistorialMedico.addHandler($event)"
                      (edit)="gridPersonalHistorialMedico.editHandler($event)"
                      [pageSize]="10"
                      [pageable]="true"
                      [resizable]="true"
                    >
                      <ng-template kendoGridToolbarTemplate>
                        <button
                          kendoGridAddCommand
                          fillMode="flat"
                          themeColor="primary"
                          icon="plus"
                        >
                          Añadir
                        </button>
                      </ng-template>
                      <kendo-grid-column
                        field="enfermedad"
                        title="Enfermedad"
                        [width]="150"
                        headerClass="justify-content-center"
                      >
                      </kendo-grid-column>

                      <kendo-grid-column
                        field="detalleEnfermedad"
                        title="Detalle de la Enfermedad	"
                        [width]="150"
                        headerClass="justify-content-center"
                      >
                        <ng-template
                          kendoGridEditTemplate
                          let-formGroup="formGroup"
                          let-dataItem="dataItem"
                        >
                          <textarea
                            [formControl]="formGroup.get('detalleEnfermedad')"
                            rows="3"
                            class="form-control"
                          ></textarea>
                        </ng-template>
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Comando"
                        [width]="150"
                        headerClass="justify-content-center"
                      >
                        <ng-template kendoGridCellTemplate let-dataItem>
                          <div class="text-center">
                            <button
                              kendoGridEditCommand
                              rounded="large"
                              themeColor="warning"
                              size="large"
                              class="p-2 me-1 ms-1"
                              container="body"
                              placement="top"
                              ngbTooltip="Editar"
                            >
                              <span class="k-icon k-i-edit k-icon-20"></span>
                            </button>
                            <button
                              kendoGridRemoveCommand
                              themeColor="error"
                              fillMode="solid"
                              rounded="large"
                              class="p-2 me-1 ms-1"
                              container="body"
                              placement="top"
                              ngbTooltip="Eliminar"
                            >
                              <span class="k-icon k-i-trash k-icon-20"></span>
                            </button>
                            <button
                              kendoGridSaveCommand
                              themeColor="primary"
                              fillMode="solid"
                              rounded="large"
                              size="large"
                              class="p-2 me-1 ms-1"
                              [disabled]="gridPersonalHistorialMedico.formGroup?.invalid"
                              container="body"
                              placement="top"
                              ngbTooltip="Guardar"
                            >
                              <span class="k-icon k-i-save k-icon-20"></span>
                            </button>
                            <button
                              kendoGridCancelCommand
                              themeColor="secondary"
                              fillMode="solid"
                              rounded="large"
                              size="large"
                              class="p-2 me-1 ms-1"
                              container="body"
                              placement="top"
                              ngbTooltip="Cancelar"
                            >
                              <span class="k-icon k-i-cancel k-icon-20"></span>
                            </button>
                          </div>
                        </ng-template>
                      </kendo-grid-column>
                    </kendo-grid>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
