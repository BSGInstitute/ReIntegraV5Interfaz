<div class="row">
  <div class="col-md-12">
    <div class="card p-3">
      <div class="modal-header bg-primary-header-modal">
        <h3 class="modal-title m-0 p-0" id="modal-basic-title">
          Configuración de Asignación de Accesos Temporales
        </h3>
      </div>
      <div class="content">
        <div class="row">
          <div class="col-12">
            <kendo-grid
              #kgridAccesoTemporal
              [kendoGridBinding]="gridAccesoTemporal.data"
              [loading]="gridAccesoTemporal.loading"
              (remove)="gridAccesoTemporal.removeHandler($event)"
              (cancel)="gridAccesoTemporal.cancelHandler($event)"
              (save)="gridAccesoTemporal.saveHandler($event)"
              (add)="gridAccesoTemporal.addHandler($event)"
              (edit)="gridAccesoTemporal.editHandler($event)"
              [pageSize]="10"
              [pageable]="true"
              [resizable]="true"
            >
              <ng-template kendoGridToolbarTemplate>
                <button
                  kendoButton
                  icon="plus"
                  themeColor="primary"
                  (click)="abrirModalAccesos()"
                >
                  Nuevo
                </button>
              </ng-template>
              <kendo-grid-column
                field="nombreProgramaPadre"
                title="Programa"
                [width]="150"
                headerClass="justify-content-center"
              >
              </kendo-grid-column>

              <kendo-grid-column
                field="fechaInicio"
                title="Día inicio"
                [width]="150"
                headerClass="justify-content-center"
              >
                <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  {{ dataItem.fechaInicio | date : "dd/MM/yyyy" }}
                </ng-template>
                <ng-template kendoGridEditTemplate let-formGroup="formGroup">
                  <kendo-datepicker
                    [formControl]="formGroup.get('fechaInicio')"
                    format="dd/MM/yyyy"
                    [placeholder]="'Seleccione una fecha...'"
                  >
                  </kendo-datepicker>
                </ng-template>
              </kendo-grid-column>

              <kendo-grid-column
                field="fechaFin"
                title="Día termino"
                [width]="150"
                headerClass="justify-content-center"
              >
                <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  {{ dataItem.fechaFin | date : "dd/MM/yyyy" }}
                </ng-template>
                <ng-template kendoGridEditTemplate let-formGroup="formGroup">
                  <kendo-datepicker
                    [formControl]="formGroup.get('fechaFin')"
                    format="dd/MM/yyyy"
                    [placeholder]="'Seleccione una fecha...'"
                  >
                  </kendo-datepicker>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                field="avance"
                title="Avance"
                [width]="150"
              >
                <ng-template kendoGridCellTemplate let-dataItem>
                  {{ dataItem.avance }}%
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                field="nota"
                title="Nota"
                [width]="150"
                headerClass="justify-content-center"
              >
              </kendo-grid-column>
              <kendo-grid-command-column
                title="Acciones"
                [headerStyle]="{ color: '#5f75bd' }"
                [width]="150"
                [headerClass]="'justify-content-center'"
              >
                <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  <button
                    kendoButton
                    fillMode="solid"
                    rounded="large"
                    themeColor="warning"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Editar"
                    (click)="editarAcceso(dataItem)"
                  >
                    <span class="k-icon k-i-pencil k-icon-20"></span>
                  </button>
                  <button
                    kendoButton
                    fillMode="solid"
                    rounded="large"
                    themeColor="error"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    ngbTooltip="Eliminar"
                    (click)="eliminarAcceso(dataItem)"
                  >
                    <span class="k-icon k-i-trash k-icon-20"></span>
                  </button>
                </ng-template>
              </kendo-grid-command-column>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
