<div class="card">
  <div class="card-header">
    <h3 class="card-title">Horario Actual</h3>
  </div>
  <div class="card-body">
    <div class="container">
      <form [formGroup]="horarioForm">
        <div class="horario-container">
          <div class="horario-header">
            <div class="horario-cell">Día</div>
            <div class="horario-cell">Entrada</div>
            <div class="horario-cell">Receso Inicio</div>
            <div class="horario-cell">Receso Fin</div>
            <div class="horario-cell">Salida</div>
          </div>
          <div *ngFor="let dia of diasSemana" class="horario-row">
            <div class="horario-cell dia">{{ dia }}</div>
            <div class="horario-cell">
              <kendo-textbox formControlName="{{ dia }}1"></kendo-textbox>
            </div>
            <div class="horario-cell">
              <kendo-textbox formControlName="{{ dia }}2"></kendo-textbox>
            </div>
            <div class="horario-cell">
              <kendo-textbox formControlName="{{ dia }}3"></kendo-textbox>
            </div>
            <div class="horario-cell">
              <kendo-textbox formControlName="{{ dia }}4"></kendo-textbox>
            </div>
          </div>
        </div>

        <div class="botones">
          <button
            type="button"
            class="btn btn-primary"
            [disabled]="enProcesoSolicitud"
            (click)="guardarHorario()"
          >
            GUARDAR
          </button>
          <button
            type="button"
            class="btn btn-danger"
            [disabled]="enProcesoSolicitud"
            (click)="cerrarModal()"
          >
            CANCELAR
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
