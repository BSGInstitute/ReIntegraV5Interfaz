<div class="content">
  <div class="row">
    <div class="col-12">
      <div class="card">

        <!-- HEADER -->
        <div class="card-header bg-color-material pb-0">
          <h2 class="text-white mb-2">
            Subir marcación - Lectura de Archivo CSV para subir Marcaciones del Personal
          </h2>
        </div>

        <!-- BODY -->
        <div class="card-body p-4">

          <!-- CONTROLES SUPERIORES -->
          <div class="row align-items-center mb-3">
            <div class="col-md-6 d-flex align-items-center gap-2">

              <button kendoButton themeColor="primary">
                Seleccionar archivo
              </button>

              <span class="text-muted">
                SIN ARCHIVOS SELECCIONADOS
              </span>

            </div>

            <div class="col-md-6 text-end">
              <button
                kendoButton
                themeColor="warning"
                icon="upload"
              >
                CARGAR
              </button>
            </div>
          </div>

          <!-- GRID -->
          <div class="row">
            <div class="col-12">

              <kendo-grid
                [kendoGridBinding]="gridMarcaciones.data"
                [loading]="gridMarcaciones.loading"
                [resizable]="true"
                [sortable]="true"
                [pageable]="{ pageSizes: [10, 20, 50] }"
                [pageSize]="10"
              >

                <!-- COLUMNA ELIMINAR -->
                <kendo-grid-column
                  title="Eliminar"
                  [width]="90"
                  headerClass="header-grid-integra"
                >
                  <ng-template kendoGridCellTemplate let-dataItem>
                    <button
                      kendoButton
                      themeColor="error"
                      icon="trash"
                      fillMode="flat"
                    ></button>
                  </ng-template>
                </kendo-grid-column>

                <kendo-grid-column field="idPersonal" title="IdPersonal" [width]="120"></kendo-grid-column>
                <kendo-grid-column field="idCiudad" title="IdCiudad" [width]="120"></kendo-grid-column>
                <kendo-grid-column field="pin" title="Pin" [width]="100"></kendo-grid-column>
                <kendo-grid-column field="fecha" title="Fecha" [width]="140"></kendo-grid-column>

                <kendo-grid-column field="m1" title="M1" [width]="80"></kendo-grid-column>
                <kendo-grid-column field="m2" title="M2" [width]="80"></kendo-grid-column>
                <kendo-grid-column field="m3" title="M3" [width]="80"></kendo-grid-column>
                <kendo-grid-column field="m4" title="M4" [width]="80"></kendo-grid-column>
                <kendo-grid-column field="m5" title="M5" [width]="80"></kendo-grid-column>
                <kendo-grid-column field="m6" title="M6" [width]="80"></kendo-grid-column>

                <ng-template kendoGridNoRecordsTemplate>
                  No items to display
                </ng-template>

              </kendo-grid>

            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
