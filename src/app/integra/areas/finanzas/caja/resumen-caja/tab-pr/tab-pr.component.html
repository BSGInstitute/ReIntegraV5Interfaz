<div class="row" >
    <div class="k-loading-panel" *ngIf="loader">
        <div class="k-loading-panel-mask"></div>
        <div class="k-loading-panel-wrapper">
          <kendo-loader
            type="converging-spinner"
            themeColor="primary"
            size="large"
          >
          </kendo-loader>
          <div class="k-loading-panel-text fs-5 text-primary">Cargando...</div>
        </div>
      </div>
    <div class="col-md-5" style="padding: 0px !important;margin-top: 1.5rem;"> 
        <kendo-daterange>
            <div class="row">
                <div class="col-md-1"></div>
                <div class="col-md-4">
                    <div class="row">
                        <div class="col-md-7" 
                        style="
                        padding-top: 5px;
                        padding-right: 0px !important;
                        padding-left: 0px !important;">
                            Fecha Inicio :
                        </div>
                        <div class="col-md-3" style=" padding:0px;">
                            <kendo-dateinput
                                [formControl]="fechaInicio"
                                kendoDateRangeStartInput
                                [incompleteDateValidation]="true"
                                [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                placeholder="dia-mes-año"
                            ></kendo-dateinput>
                        </div>
                    </div>
                </div>
                <div class="col-md-2"></div>
                <div class="col-md-4">
                    <div class="row">
                        <div class="col-md-7" style="padding-top: 5px;padding-right: 0px !important;">
                            Fecha Fin :
                        </div>
                        <div class="col-md-3" style=" padding:0px;">
                            <kendo-dateinput
                                [formControl]="fechaFin"
                                kendoDateRangeEndInput
                                [incompleteDateValidation]="true"
                                [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                placeholder="dia-mes-año"
                            ></kendo-dateinput>
                        </div>
                        <div class="col-md-2"></div>
                    </div>
                </div>
            </div>
        </kendo-daterange>
    </div>
    <div class="col-md-2" style="margin-top: 1.5rem;">
        <button
            kendoButton 
            icon="k-icon k-i-search k-icon-20"
            type="button"
            themeColor="primary"
            (click)="GenerarReporteREC()"
            >
            Buscar
        </button>
    </div>
    <div class="card element col-md-3" >
                          
        <div class="row" style="padding: 0.5rem;">
          <div class="col-md-5">
            Tipo de Moneda :
          </div>
          <div class="col-md-7" style="margin-left: -1.5rem;">
            <kendo-textbox
            [readonly]="true"
            [value]="tipoMoneda"
            class="d-flex"
            size="small"
          >
          </kendo-textbox>
          </div>
          
        </div>
        <div class="row" style="padding: 0.5rem;">
          <div class="col-md-5">
            Total Efectivo :
          </div>
          <div class="col-md-7" style="margin-left: -1.5rem;">
            <kendo-numerictextbox
            
            [spinners]="false"
            [readonly]="true"
            [value]="total"
            class="d-flex"
            size="small"
          >
          </kendo-numerictextbox>
          </div>
        </div>
      
    </div>
</div>


<br>

<div class="row">
    <div class="col-md-12">
      <div class="card-header bg-color-material col-md-12">
          <div class="row col-md-12">
              <div div class="col-md-12" style="text-align: left;">
                <div class="row">
                  <div class="col-md-7">
                    <button
                      kendoButton 
                      style="margin-right: 1rem;"
                      icon="k-icon k-i-file-excel k-icon-20"
                      type="button"
                      themeColor="tertiary"
                      (click)="excelexport.save()"
                      >
                      Exportar a Excel
                    </button>
                    
                    <kendo-excelexport 
                    [data]="listaPR" 
                    fileName="ResumenCaja-PR.xlsx" #excelexport>
                      <kendo-excelexport-column field="codigoPorRendir" title="Código PR">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="codigoFur" title="Código FURS">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="entregadoA" title="Solicitante">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="montoTotal" title="Total Efectivo">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="montoPendienteRendicion" title="Pendiente Rendición">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="fechaAprobacion" title="Fecha Aprobación">
                      </kendo-excelexport-column>
                      <kendo-excelexport-column field="montoDevolucion" title="Devolución">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="fechasRendicion" title="Fechas Rendición">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="codigoCajaEgreso" title="Recibos Egreso Caja">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="detalle" title="Detalle">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="observacion" title="Observación">
                    </kendo-excelexport-column>

                    </kendo-excelexport>
                    <button
                      kendoButton 
                      icon="k-icon k-i-file-pdf k-icon-20"
                      type="button"
                      themeColor="error"
                      (click)="GenerarPDf()"
                      >
                      Exportar a Pdf
                    </button>
                  </div>
                </div>
              </div>
          </div>
      </div>
      <kendo-grid
      [kendoGridBinding]="listaPR"
      [pageSize]="5"
      [sortable]="true"
      [reorderable]="true"
      [resizable]="true"
      [columnMenu]="{ filter: true }"
      kendoGridSelectBy="idPorRendirCabecera"
      [(selectedKeys)]="listaSeleccion"
      (selectedKeysChange)="CalcularTotal()"
      [selectable]="{ enabled: true, checkboxOnly: true }"
      [pageable]="true"
      style="max-height: 700px"
      (filterChange)="limpiarSeleccion()"
      
      >
        <kendo-grid-checkbox-column
        [width]="45"
        [headerClass]="{ 'text-center': true }"
        [class]="{ 'text-center': true }"
        [resizable]="false"
        [columnMenu]="false"
        [showSelectAll]="true"
        [sticky]="true"
        >
        </kendo-grid-checkbox-column>
        <kendo-grid-column
            title="Código PR"
            headerClass="justify-content-center k-grid-header "
            [width]="150"
            field="codigoPorRendir"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Código FURS"
            headerClass="justify-content-center k-grid-header "
            [width]="150"
            field="codigoFur"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Solicitante"
            headerClass="justify-content-center k-grid-header "
            [width]="150"
            field="entregadoA"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Total Efectivo"
            headerClass="justify-content-center k-grid-header "
            [width]="150"
            field="montoTotal"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Pendiente Rendición"
            headerClass="justify-content-center k-grid-header "
            [width]="150"
            field="montoPendienteRendicion"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Fecha Aprobación"
            headerClass="justify-content-center k-grid-header "
            [width]="250"
            field="fechaAprobacion"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Devolución"
            headerClass="justify-content-center k-grid-header "
            [width]="250"
            field="montoDevolucion"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Fechas Rendición"
            headerClass="justify-content-center k-grid-header "
            [width]="250"
            field="fechasRendicion"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Recibos Egreso Caja"
            headerClass="justify-content-center k-grid-header "
            [width]="250"
            field="codigoCajaEgreso"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Detalle"
            headerClass="justify-content-center k-grid-header "
            [width]="250"
            field="detalle"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Observación"
            headerClass="justify-content-center k-grid-header "
            [width]="250"
            field="observacion"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <ng-template
            kendoPagerTemplate
            let-totalPages="totalPages"
            let-currentPage="currentPage"
            >
              <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
              <kendo-pager-numeric-buttons
                [buttonCount]="5"
              ></kendo-pager-numeric-buttons>
              <kendo-pager-next-buttons></kendo-pager-next-buttons>
              <!-- <kendo-pager-input></kendo-pager-input> -->
              <kendo-pager-info></kendo-pager-info>
              <kendo-pager-page-sizes [pageSizes]="pageSizes"></kendo-pager-page-sizes>

          </ng-template>
      </kendo-grid>
      
    </div>
</div>
