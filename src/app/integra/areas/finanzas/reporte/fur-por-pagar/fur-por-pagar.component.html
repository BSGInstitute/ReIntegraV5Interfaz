<div class="row">
  <div class="col-1fa-rotate-270">
    <div class="card">
      <div class="card-header bg-color-material">
        <h1 class="text-white">Reporte de Furs Por Pagar</h1>
      </div>
      <div class="card-body p-4">
        <div class="k-loading-panel" *ngIf="loader">
          <div class="k-loading-panel-mask"></div>
          <div class="k-loading-panel-wrapper">
            <kendo-loader
              type="converging-spinner"
              themeColor="primary"
              size="large"
            >
            </kendo-loader>
            <div class="k-loading-panel-text fs-5 text-primary">
              Cargando...
            </div>
          </div>
        </div>
        <div class="row conteiner-toolbar-retiros-matricula">
          <div class="card" style="padding: 0px">
            <div class="card-header bg-color-material pb-0">
              <h3 class="text-white mb-2">Filtro</h3>
            </div>
            <div class="card-body p-4">
              <form class="k-form" [formGroup]="formGroupFiltro">
                <fieldset class="k-form-fieldset">
                  <div
                    class="row"
                    style="display: flex; justify-content: center"
                  >
                    <div class="col-md-8">
                      <form class="k-form" [formGroup]="formGroupFiltro">
                        <fieldset class="k-form-fieldset">
                          <div
                            class="row"
                            style="display: flex; justify-content: center"
                          >
                            <div class="col-md-8">
                              <kendo-daterange
                                [incompleteDateValidation]="true"
                              >
                                <div class="col-md-5">
                                  <label style="width: 250px">
                                    <span>Fechas :</span>
                                  </label>
                                  <kendo-dateinput
                                    kendoDateRangeStartInput
                                    [size]="'medium'"
                                    formControlName="fechaInicio"
                                    [placeholder]="'Inicio'"
                                    [format]="{
                                      displayFormat: 'dd-MM-yyyy',
                                      inputFormat: 'dd-MM-yyyy'
                                    }"
                                    [incompleteDateValidation]="true"
                                    fillMode="outline"
                                  >
                                  </kendo-dateinput>
                                </div>
                                <div
                                  class="col-md-2"
                                  style="
                                    padding: 0%;
                                    width: 5%;
                                    text-align: center;
                                  "
                                >
                                  <p style="margin-bottom: 5px">
                                    <strong>—</strong>
                                  </p>
                                </div>
                                <div class="col-md-5">
                                  <kendo-dateinput
                                    kendoDateRangeEndInput
                                    [size]="'medium'"
                                    [placeholder]="'fin'"
                                    formControlName="fechaFin"
                                    [format]="{
                                      displayFormat: 'dd-MM-yyyy',
                                      inputFormat: 'dd-MM-yyyy'
                                    }"
                                    [incompleteDateValidation]="true"
                                    fillMode="outline"
                                  ></kendo-dateinput>
                                </div>
                              </kendo-daterange>
                            </div>
                            <div class="col-md-2" style="padding-top: 15px">
                              <button mat-raised-button color="primary" (click)="generarReporte()">
                                <mat-icon>search</mat-icon>
                                Buscar
                              </button>
                            </div>
                          </div>
                        </fieldset>
                      </form>
                    </div>
                  </div>
                </fieldset>
              </form>
            </div>
          </div>
          <div style="height: 30px"></div>
          <kendo-grid
            #grid
            [kendoGridBinding]="listaReporte"
            [pageSize]="10"
            [sortable]="true"
            [reorderable]="false"
            [resizable]="true"
            filterable="menu"
            [pageable]="true"
            style="max-height: 700px; border-top-width: 0px; padding: 0px"
            [groupable]="true"
            (groupChange)="groupChange($event)"
          >
            <ng-template kendoGridToolbarTemplate>
              <div
                class="col-md-7"
                style="display: flex; justify-content: start"
              >
                 <button
                 (click)="generarExcel(excelexport)"
                 mat-raised-button
                 class="btn-export-excel"
               >
               <span class="k-icon k-i-file-excel k-icon-20"></span>
                 Exportar a Excel
               </button>
               <kendo-excelexport 
               [data]="listaReporte" 
               [group]="groupo"
               [collapsible]="true"
               fileName="Reporte de Furs Por Pagar.xlsx" #excelexport>
                 <kendo-excelexport-column field="empresa" title="Empresa">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="sede" title="Sede">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="area" title="Área Solicitante">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="tipoPedido" title="Tipo de Pedido">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="codigoFur" title="Código FUR">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="productoServicio" title="Producto/Servicio">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="cantidad" title="Cantidad">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="unidades" title="Unidades">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="precioUnitario" title="Precio Unitario">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="monedaProveedor" title="Moneda Proveedor">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="descripcion" title="Descripción" [width]="300">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="centroCosto" title="Centro Costo">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="atipico" title="Atipico">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="rubro" title="Rubro">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="usuarioModificacion" title="Usuario">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="ruc" title="RUC">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="proveedor" title="Proveedor">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="monedaReal" title="Moneda a Pagar">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="montoAPagar" title="Monto a Pagar">
                 </kendo-excelexport-column>
                 <kendo-excelexport-column field="montoAPagarDolares" title="Monto Dolares">
                </kendo-excelexport-column>
                <kendo-excelexport-column field="fechaProgramada" title="Fecha Programada" [width]="150">
                </kendo-excelexport-column>
                <kendo-excelexport-column field="mesProgramado" title="Mes Programado">
                </kendo-excelexport-column>
                <kendo-excelexport-column field="estado" title="Estado">
                </kendo-excelexport-column>
               </kendo-excelexport>
              </div>
            </ng-template>
            <kendo-grid-column
              title="Empresa"
              headerClass="justify-content-center k-grid-header "
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
              [width]="150"
              field="empresa"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Sede"
              headerClass="justify-content-center k-grid-header "

              [width]="150"

              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Producto/Servicio"

            <kendo-grid-column

              [width]="150"

              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Unidades"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="unidades"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Precio Unitario"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="precioUnitario"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Moneda Proveedor"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="monedaProveedor"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Descripción"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="descripcion"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Centro Costo"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="centroCosto"
              [locked]="false"
              [sticky]="false"

              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Atipico"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="atipico"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Rubro"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="rubro"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Nro. Cuenta"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="nroCuenta"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Usuario"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="usuarioModificacion"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="RUC"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="ruc"
              [locked]="false"

              [width]="150"

              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Moneda a Pagar"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="monedaReal"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{

                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Monto a Pagar"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="montoAPagar"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Monto Dolares"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="montoAPagarDolares"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Fecha Programada"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="fechaProgramada"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            <ng-template kendoGridFilterMenuTemplate let-filter let-column="column" let-filterService="filterService">
                <kendo-grid-date-filter-menu
                    [column]="column"
                    [format]="'dd-MM-yyyy'"
                    [filter]="filter"
                    [placeholder]="'dia-mes-año'"
                    [filterService]="filterService"
                    >
                </kendo-grid-date-filter-menu>
              </ng-template>
            <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                {{finanzasService.fechaTemplate(dataItem.fechaProgramada)}}
            </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              title="Mes Programado"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="mesProgramado"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Estado"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="estado"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>
            <ng-template kendoGridNoRecordsTemplate>
              <div>
                <kendo-badge-container>
                  <kendo-icon name="cloud" size="large"></kendo-icon>
                  <kendo-badge position="inside">
                    <kendo-icon name="close" style="color: red"></kendo-icon>
                  </kendo-badge>
                </kendo-badge-container>
              </div>
              <p>No hay registros cargados!</p>
            </ng-template>
            <ng-template
              kendoPagerTemplate
              let-totalPages="totalPages"
              let-currentPage="currentPage"
            >
              <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
              <kendo-pager-numeric-buttons
                [buttonCount]="5"
              ></kendo-pager-numeric-buttons>
              <kendo-pager-next-buttons></kendo-pager-next-buttons>
              
              <kendo-pager-info></kendo-pager-info>
              <kendo-pager-page-sizes
                [pageSizes]="pageSizes"
              ></kendo-pager-page-sizes>
            </ng-template>
          </kendo-grid>

        <br />
      </div>

  </div>
</div>
