<kendo-grid
    #grid
    [kendoGridBinding]="listaReporte"
    [pageSize]="undefined"
    [sortable]="false"
    [reorderable]="false"
    [resizable]="true"
    filterable="menu"
    [pageable]="false"
    style="max-height: 700px; border-top-width: 0px"
    [groupable]="false"
    [group]="group"
    [sort]="sort"
  >
    <ng-template kendoGridToolbarTemplate>
      <div class="col-md-7" style="display: flex; justify-content: start">
          <button
          kendoGridExcelCommand 
          mat-raised-button
          class="btn-export-excel"
        >
        <span class="k-icon k-i-file-excel k-icon-20"></span>
          Exportar a Excel
        </button>
      </div>
    </ng-template>

    <kendo-grid-column
      title="Estado Matricula"
      headerClass="justify-content-center k-grid-header "
      [width]="150"
      field="estadoMatricula"
      [locked]="false"
      [sticky]="false"
      [filterable]="true"
      [hidden]="false"
      [headerStyle]="{
        'background-color': '#27ae60',
        color: 'white'
      }"
    >
    </kendo-grid-column>
    <kendo-grid-column
    title="Agrupación de matrícula"
    headerClass="justify-content-center k-grid-header "
    [width]="150"
    field="agrupacionMat"
    [locked]="false"
    [sticky]="false"
    [filterable]="true"
    [hidden]="false"
    [headerStyle]="{
      'background-color': '#27ae60',
      color: 'white'
    }"
  >
  </kendo-grid-column>
    <ng-container *ngFor="let item of detalle">
        <kendo-grid-column
        [title]="item.periodo"
        headerClass="justify-content-center k-grid-header "
        [width]="150"
        [field]="item.periodo"
        [locked]="false"
        [sticky]="false"
        [filterable]="false"
        [hidden]="false"
        [headerStyle]="{
          'background-color': '#27ae60',
          color: 'white'
        }"
      >
      </kendo-grid-column>
    </ng-container>
    <ng-template kendoGridNoRecordsTemplate>
      <div>
        <kendo-badge-container>
          <kendo-icon name="cloud" size="large"></kendo-icon>
          <kendo-badge position="inside">
            <kendo-icon name="close" style="color: red"></kendo-icon>
          </kendo-badge>
        </kendo-badge-container>
      </div>
      <p>No hay registros cargados!</p>
    </ng-template>
    <kendo-grid-excel [fileName]="'Reporte por estados de matricula-'+tipo+'.xlsx'"></kendo-grid-excel>
  
  </kendo-grid>
''
