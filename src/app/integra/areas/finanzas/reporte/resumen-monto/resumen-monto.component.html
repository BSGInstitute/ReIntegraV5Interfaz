<div class="">
    <div class="row">
        <div class="col-1fa-rotate-270">
            <div class="card">
                <div class="card-header bg-color-material">
                    <h1 class="text-white">Reporte Resumen de Montos</h1>
                </div>
                <div  class="card-body p-4">
                    <div class="row">
                        <div class="card" style="padding: 0px;">
                            <div class="card-header bg-color-material pb-0">
                                <h3 class="text-white mb-2">Filtro de Busqueda</h3>
                            </div>
                            <div  class="card-body p-4">
                                <form class="k-form" [formGroup]="formGroupFiltro" >
                                    <fieldset class="k-form-fieldset">
                                        <div class="row">
                                            <div class="col-md-1"></div>
                                            <div class="col-md-5">
                                                <label [for]="idPeriodoActual" style="width: 150px">
                                                    <span>Periodo Actual (<strong class="text-danger">*</strong>) :</span>
                                                  </label>
                                                  <kendo-combobox
                                                      #idPeriodoActual
                                                      [style.width.%]="90"
                                                      size="medium"
                                                      formControlName="periodoActual"
                                                      [clearButton]="true"
                                                      class="d-flex center"
                                                      [data]="itemPeriodo"
                                                      [filterable]="true"
                                                      textField="nombre"
                                                      valueField="id"
                                                      [valuePrimitive]="true"
                                                      fillMode="outline"
                                                      (filterChange)="filtroPeriodo($event)"
                                                    >
                                                    </kendo-combobox>
                                                <br>
                                            </div>
                                            
                                            <div class="col-md-5">
                                                <div class="row" >
                                                    <kendo-daterange
                                                    [incompleteDateValidation]="true"
                                                    >
                                                        <div class="col-md-5">
                                                                <label  style="width: 150px">
                                                                <span>Fecha de Inicio :</span>
                                                              </label>
                                                              <kendo-dateinput
                                                              kendoDateRangeStartInput
                                                              [size]="'medium'"
                                                              formControlName="fechaInicio"
                                                              [placeholder]="'dia-mes-año'"
                                                              [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                              [incompleteDateValidation]="true"
                                                              fillMode="outline"
                                                              >
                                                          </kendo-dateinput>
                                                        </div>
                                                        <div class="col-md-2" style="padding: 0%;width: 5%;text-align: center;"><p style="
                                                            margin-bottom: 5px;"><strong>—</strong></p></div>
                                                        <div class="col-md-5">
                                                            <label  style="width: 150px">
                                                                <span>Fecha Fin :</span>
                                                              </label>
                                                              <kendo-dateinput
                                                              kendoDateRangeEndInput
                                                              [size]="'medium'"
                                                              [placeholder]="'dia-mes-año'"
                                                              formControlName="fechaFin"
                                                              [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                              [incompleteDateValidation]="true"
                                                              fillMode="outline"
                                                              ></kendo-dateinput>
                                                        </div>
                                                    </kendo-daterange>
                                                </div>
                                                <br>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-1"></div>
                                            <div class="col-md-5">
                                                <label [for]="idPeriodoCierre" style="width: 150px">
                                                    <span>Periodo de Cierre (<strong class="text-danger">*</strong>) :</span>
                                                  </label>
                                                  <kendo-combobox
                                                      #idPeriodoCierre
                                                      [style.width.%]="90"
                                                      size="medium"
                                                      formControlName="periodoCierre"
                                                      [clearButton]="true"
                                                      class="d-flex center"
                                                      [data]="itemPeriodo"
                                                      [filterable]="true"
                                                      textField="nombre"
                                                      valueField="id"
                                                      [valuePrimitive]="true"
                                                      fillMode="outline"
                                                      (filterChange)="filtroPeriodo($event)"

                                                    >
                                                </kendo-combobox>
                                            </div>
                                            <div class="col-md-5">
                                                <div class="row" >
                                                    <div class="col-md-8" style="padding-top: 20px;">
                                                        <div class="row">
                                                            <div class="col-md-10" style="padding-right:0%">
                                                                <label>
                                                                    <span>Mostrar Totalizado y Desagregado Paises :</span>
                                                                </label>
                                                            </div>
                                                            <div class="col-md-2" style="padding-left:0%">
                                                                <kendo-switch
                                                                [formControl]="isMostrar"
                                                                size="small"
                                                                trackRounded="full"
                                                                thumbRounded="full"
                                                                offLabel="No"
                                                                onLabel="Si"
                                                                style=" width: 65px;bottom: 3px;right: 16px;"
                                                              >
                                                              </kendo-switch>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                            </div>
                                        </div>
                                    </fieldset>
                                </form>
                            </div>
                        </div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="card" style="padding: 0px;">
                            <div class="card-header bg-color-material pb-0">
                                <h3 class="text-white mb-2">Resultados Reporte Resumen de Montos</h3>
                            </div>
                            <div  class="card-body p-4">
                                <div class="row mb-4">
                                    <div class="col-md-12" id="pConfiguracionFur">
                                      <kendo-tabstrip [animate]="false" [keepTabContent]="true" (tabSelect)="onSelect($event)">
                                        <kendo-tabstrip-tab title="TODO" [selected]="true">
                                            <ng-template kendoTabContent *loadOnDemand>
                                              <div class="content-tab">
                                                  <app-detalle-reporte-monto [formGroupFiltro]="formGroupFiltro" > </app-detalle-reporte-monto>
                                              </div>
                                            </ng-template>
                                          </kendo-tabstrip-tab>
                                        <kendo-tabstrip-tab title="PERÚ">
                                          <ng-template kendoTabContent *loadOnDemand>
                                            <div class="content-tab">
                                                <app-detalle-reporte-monto [formGroupFiltro]="formGroupFiltro" > </app-detalle-reporte-monto>
                                            </div>
                                          </ng-template>
                                        </kendo-tabstrip-tab>
                                        <kendo-tabstrip-tab title="BOLIVIA">
                                            <ng-template kendoTabContent *loadOnDemand>
                                              <div class="content-tab">
                                                <app-detalle-reporte-monto [formGroupFiltro]="formGroupFiltro"></app-detalle-reporte-monto>
                                              </div>
                                            </ng-template>
                                        </kendo-tabstrip-tab>
                                        <kendo-tabstrip-tab title="CHILE">
                                            <ng-template kendoTabContent *loadOnDemand>
                                              <div class="content-tab">
                                                <app-detalle-reporte-monto [formGroupFiltro]="formGroupFiltro"></app-detalle-reporte-monto>
                                              </div>
                                            </ng-template>
                                        </kendo-tabstrip-tab>
                                        <kendo-tabstrip-tab title="COLOMBIA">
                                            <ng-template kendoTabContent *loadOnDemand>
                                              <div class="content-tab">
                                                  <app-detalle-reporte-monto [formGroupFiltro]="formGroupFiltro"></app-detalle-reporte-monto>
                                              </div>
                                            </ng-template>
                                          </kendo-tabstrip-tab>
                                        <kendo-tabstrip-tab title="OTROS PAÍSES">
                                            <ng-template kendoTabContent *loadOnDemand>
                                              <div class="content-tab">
                                                <app-detalle-reporte-monto [formGroupFiltro]="formGroupFiltro"></app-detalle-reporte-monto>
                                              </div>
                                            </ng-template>
                                        </kendo-tabstrip-tab>
                                      </kendo-tabstrip>
                                    </div>
                                  </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
