<kendo-grid
  #grid
  id="grid-tab3"
  [kendoGridBinding]="listaReporte"
  [pageSize]="undefined"
  [sortable]="true"
  [reorderable]="false"
  [resizable]="true"
  filterable="menu"
  [pageable]="false"
  style="max-height: 700px; border-top-width: 0px"
  [rowClass]="rowCallback"
>
  <ng-template kendoGridToolbarTemplate>
    <div class="col-md-7" style="display: flex; justify-content: start">
        <button
        kendoGridExcelCommand 
        mat-raised-button
        class="btn-export-excel"
      >
      <span class="k-icon k-i-file-excel k-icon-20"></span>
        Exportar a Excel
      </button>
    </div>
  </ng-template>

  <kendo-grid-column
    
    title="Indicadores"
    headerClass="justify-content-center k-grid-header "
    [headerStyle]="{
      'background-color': '#ED912A',
      color: 'white'
    }"
    [width]="250"
    field="tipoMonto"
    [locked]="false"
    [sticky]="false"
    [filterable]="true"
    [hidden]="false"
  >
  </kendo-grid-column>
  <ng-container *ngFor="let item of reporteOriginal">
    <kendo-grid-column-group
      [title]="item.g"
      [columnMenu]="false"
      headerClass="justify-content-center k-grid-header "
      [headerStyle]="{
        'background-color': '#27ae60',
        color: 'white'
      }"
    >
      <kendo-grid-column
        title="Monto"
        headerClass="justify-content-center k-grid-header "
        [width]="150"
        [field]="item.g"
        [locked]="false"
        [sticky]="false"
        [filterable]="false"
        [hidden]="false"
        [headerStyle]="{
          'background-color': '#27ae60',
          color: 'white'
        }"
      >
      </kendo-grid-column>
    </kendo-grid-column-group>
  </ng-container>
  <ng-template kendoGridNoRecordsTemplate>
    <div>
      <kendo-badge-container>
        <kendo-icon name="cloud" size="large"></kendo-icon>
        <kendo-badge position="inside">
          <kendo-icon name="close" style="color: red"></kendo-icon>
        </kendo-badge>
      </kendo-badge-container>
    </div>
    <p>No hay registros cargados!</p>
  </ng-template>
  <kendo-grid-excel fileName="Reporte de indicadores productividad de ventas.xlsx"></kendo-grid-excel>

</kendo-grid>
