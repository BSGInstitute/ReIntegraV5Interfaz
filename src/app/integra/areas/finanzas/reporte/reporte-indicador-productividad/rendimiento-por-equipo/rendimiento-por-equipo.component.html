<div class="contenedor-especial">
    <kendo-grid
    #grid
    [kendoGridBinding]="listaReporte"
    [pageSize]="undefined"
    [sortable]="true"
    [reorderable]="false"
    [resizable]="true"
    filterable="menu"
    [pageable]="false"
    style="max-height: 700px; border-top-width: 0px"
    [groupable]="false"
    [group]="group"
  >
    <ng-template kendoGridToolbarTemplate>
      <div class="col-md-7" style="display: flex; justify-content: start">
          <button
          kendoGridExcelCommand 
          mat-raised-button
          class="btn-export-excel"
        >
        <span class="k-icon k-i-file-excel k-icon-20"></span>
          Exportar a Excel
        </button>
      </div>
    </ng-template>
  
    <kendo-grid-column
      title="Nombre Personal"
      headerClass="justify-content-center k-grid-header "
      [headerStyle]="{
        'background-color': '#ED912A',
        color: 'white'
      }"
      [width]="150"
      field="nombrePersonal"
      [locked]="false"
      [sticky]="false"
      [filterable]="true"
      [hidden]="false"
    >
    </kendo-grid-column>
    <kendo-grid-column
      title="Coordinador / Asesor"
      headerClass="justify-content-center k-grid-header "
      [width]="150"
      field="coordinadorAsesor"
      [locked]="false"
      [sticky]="false"
      [filterable]="true"
      [hidden]="false"
      [headerStyle]="{
        'background-color': '#ED912A',
        color: 'white'
      }"
    >
    </kendo-grid-column>
    <kendo-grid-column
      title="Sede"
      headerClass="justify-content-center k-grid-header "
      [width]="150"
      field="sede"
      [locked]="false"
      [sticky]="false"
      [filterable]="true"
      [hidden]="false"
      [headerStyle]="{
        'background-color': '#ED912A',
        color: 'white'
      }"
    >
    </kendo-grid-column>
    <ng-container *ngFor="let item of reporteOriginal">
      <kendo-grid-column-group
        [title]="item.periodo"
        [columnMenu]="false"
        headerClass="justify-content-center k-grid-header "
        [headerStyle]="{
          'background-color': '#27ae60',
          color: 'white'
        }"
      >
        <kendo-grid-column
          title="Horas Trabajadas (dias)"
          headerClass="justify-content-center k-grid-header "
          [width]="150"
          [field]="item.periodo+'HT'"
          [locked]="false"
          [sticky]="false"
          [filterable]="false"
          [hidden]="false"
          [headerStyle]="{
            'background-color': '#27ae60',
            color: 'white'
          }"
        >
          <ng-template kendoGridGroupFooterTemplate let-group="group"  >
             {{obtenerSumaFooter(group,item.periodo+'HT')}}
          </ng-template>
        </kendo-grid-column>
        <kendo-grid-column
          title="Total Vendido ($)"
          headerClass="justify-content-center k-grid-header "
          [width]="150"
          [field]="item.periodo+'TV'"
          [locked]="false"
          [sticky]="false"
          [filterable]="false"
          [hidden]="false"
          [headerStyle]="{
            'background-color': '#27ae60',
            color: 'white'
          }"
        >
          <ng-template kendoGridGroupFooterTemplate let-group="group" >
              {{ obtenerSumaFooter(group,item.periodo+'TV')}}
          </ng-template>
        </kendo-grid-column>
        <kendo-grid-column
          title="Productividad ($)"
          headerClass="justify-content-center k-grid-header "
          [width]="150"
          [field]="item.periodo+'P'"
          [locked]="false"
          [sticky]="false"
          [filterable]="false"
          [hidden]="false"
          [headerStyle]="{
            'background-color': '#27ae60',
            color: 'white'
          }"
        >
          <ng-template  kendoGridGroupFooterTemplate let-group="group" >
            <span style="display:block; padding: 8px 12px;background-color: lightsalmon;"
                >
                {{obtenerSumaFooter(group, item.periodo+'P')}}
            </span>
             
          </ng-template>
        </kendo-grid-column>
      </kendo-grid-column-group>
    </ng-container>
    <ng-template kendoGridNoRecordsTemplate>
      <div>
        <kendo-badge-container>
          <kendo-icon name="cloud" size="large"></kendo-icon>
          <kendo-badge position="inside">
            <kendo-icon name="close" style="color: red"></kendo-icon>
          </kendo-badge>
        </kendo-badge-container>
      </div>
      <p>No hay registros cargados!</p>
    </ng-template>
    <kendo-grid-excel fileName="Reporte rendimiento por equipo.xlsx"></kendo-grid-excel>
  
  </kendo-grid>
  
</div>
