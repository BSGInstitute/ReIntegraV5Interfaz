<div class="row" style="display: flex; justify-content: center">
  <div
    class="col-md-5 k-form-horizontal"
    style="padding-left: 5px; padding-top: 5px"
  >
    <kendo-formfield orientation="horizontal" style="margin: 0px !important">
      <label
        [for]="fechaConD"
        class="k-label"
        style="margin-bottom: 5px; width: 200px"
      >
        <span>Fecha de Congelamiento : </span>
      </label>
      <kendo-datepicker
        #fechaConD
        [formControl]="fechaCon"
        [incompleteDateValidation]="true"
        calendarType="classic"
        [format]="{ displayFormat: 'dd-MM-yyyy', inputFormat: 'dd-MM-yyyy' }"
        placeholder="dia-mes-año"
      ></kendo-datepicker>
    </kendo-formfield>
  </div>
  <div class="col-md-2">
    <button mat-raised-button color="primary" (click)="congelarReproteDevoluciones()">
      <mat-icon>save</mat-icon>
      Congelar
    </button>
  </div>
</div>
