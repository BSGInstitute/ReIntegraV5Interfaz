<div class="row" style="padding-left: 10px;">
    <form class="k-form" [formGroup]="formGroupFiltro" >
        <fieldset class="k-form-fieldset">
            <div class="row" style="display:flex;justify-content: center;">
                <div class="col-md-5">
                    <div class="row" >
                        <kendo-daterange
                        [incompleteDateValidation]="true"
                        >
                            <div class="col-md-5">
                                    <label  style="width: 150px">
                                    <span>Fechas de Retiro :</span>
                                  </label>
                                  <kendo-dateinput
                                  kendoDateRangeStartInput
                                  [size]="'medium'"
                                  formControlName="fechaInicioRetiro"
                                  [placeholder]="'Inicio'"
                                  [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                  [incompleteDateValidation]="true"
                                  fillMode="outline"
                                  >
                              </kendo-dateinput>
                            </div>
                            <div class="col-md-2" style="padding: 0%;width: 5%;text-align: center;"><p style="
                                margin-bottom: 5px;"><strong>—</strong></p></div>
                            <div class="col-md-5">
                                  <kendo-dateinput
                                  kendoDateRangeEndInput
                                  [size]="'medium'"
                                  [placeholder]="'fin'"
                                  formControlName="fechaFinRetiro"
                                  [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                  [incompleteDateValidation]="true"
                                  fillMode="outline"
                                  ></kendo-dateinput>
                            </div>
                        </kendo-daterange>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="row" >
                        <kendo-daterange
                        [incompleteDateValidation]="true"
                        >
                            <div class="col-md-5">
                                    <label  style="width: 250px">
                                    <span>Fechas vencimiento de Cronograma :</span>
                                  </label>
                                  <kendo-dateinput
                                  kendoDateRangeStartInput
                                  [size]="'medium'"
                                  formControlName="fechaInicioCrono"
                                  [placeholder]="'Inicio'"
                                  [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                  [incompleteDateValidation]="true"
                                  fillMode="outline"
                                  >
                              </kendo-dateinput>
                            </div>
                            <div class="col-md-2" style="padding: 0%;width: 5%;text-align: center;"><p style="
                                margin-bottom: 5px;"><strong>—</strong></p></div>
                            <div class="col-md-5">
                                  <kendo-dateinput
                                  kendoDateRangeEndInput
                                  [size]="'medium'"
                                  [placeholder]="'fin'"
                                  formControlName="fechaFinCrono"
                                  [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                  [incompleteDateValidation]="true"
                                  fillMode="outline"
                                  ></kendo-dateinput>
                            </div>
                        </kendo-daterange>
                    </div>
                </div>
            </div>
            <br>
            <div class="row" style="display:flex;justify-content: center;">
                <div class="col-md-5 k-form-horizontal" style="
                padding-left: 5px;
            ">
                    <kendo-formfield
                    orientation="horizontal"
                    style="margin: 0px !important"
                  >
                    <label
                      [for]="idCentroCosto"
                      class="k-label"
                      style="margin-bottom: 5px;width: 170px;"
                    >
                      <span>Programa(CentroCostos) : </span>
                    </label>
                    <kendo-combobox
                      #idCentroCosto
                      class="d-flex"
                      [data]="listaPrograma"
                      size="medium"
                      formControlName="idCentroCosto"
                      [filterable]="true"
                      placeholder="< Ingrese el Centro de Costo >"
                      textField="nombre"
                      valueField="idPEspecifico"
                      [valuePrimitive]="true"
                      [style.width.%]="100"
                      (filterChange)="filterPrograma($event)"
                    >
                    </kendo-combobox>
                  </kendo-formfield>
                </div>
                <div class="col-md-5 k-form-horizontal" style="
                padding-left: 5px;
            ">
                    <kendo-formfield
                    orientation="horizontal"
                    style="margin: 0px !important"
                  >
                    <label
                      [for]="idAlumno"
                      class="k-label"
                      style="margin-bottom: 5px;width: 64px;"
                    >
                      <span>Alumno : </span>
                    </label>
                    <kendo-combobox
                      #idAlumno
                      class="d-flex"
                      [data]="listaAlumno"
                      size="medium"
                      formControlName="idAlumno"
                      [filterable]="true"
                      placeholder="< Ingrese el Nombre del Alumno >"
                      textField="nombreCompleto"
                      valueField="id"
                      [valuePrimitive]="true"
                      [style.width.%]="110"
                      (filterChange)="filterAlumno($event)"
                      >
                    </kendo-combobox>
                  </kendo-formfield>
                </div>
            </div>
            <br>
            <div class="row" style="display:flex;justify-content: center;">
                <div class="col-md-5 k-form-horizontal" style="
                padding-left: 5px;padding-top:5px;
            ">
                    <kendo-formfield
                    orientation="horizontal"
                    style="margin: 0px !important"
                  >
                    <label
                      [for]="codigoMat"
                      class="k-label"
                      style="margin-bottom: 5px;width: 140px;"
                    >
                      <span>Código de Matrícula : </span>
                    </label>
                    <kendo-combobox
                      #codigoMat
                      class="d-flex"
                      [data]="listaMatricula"
                      size="medium"
                      formControlName="codigoMat"
                      [filterable]="true"
                      placeholder="< Ingrese el Código de Matrícula >"
                      textField="codigoMatricula"
                      valueField="id"
                      [valuePrimitive]="true"
                      [style.width.%]="100"
                      (filterChange)="filterCodigoMat($event)"

                    >
                    </kendo-combobox>
                  </kendo-formfield>
                </div>
                <div class="col-md-5">
                  <div class="row">
                    <div class="col-md-8 k-form-horizontal" style="padding-left: 0px;padding-top:5px;">
                    <kendo-formfield orientation="horizontal" style="
                    margin-top: 0px !important
                ">
                        <label
                          [for]="idTipoDevolucion"
                          class="k-label"
                          [style.width.px]="135"
                        >
                        Tipo de Devolución:
                        </label>
                        <kendo-dropdownlist
                          #idTipoDevolucion
                          formControlName="idTipoDevolucion"
                          [data]="listaEstado"
                          [valuePrimitive]="true"
                          valueField="nombre"
                          textField="nombre"
                          [defaultItem]="{
                            nombre: 'Todos',
                            id: null
                          }"
                          [style.width.%]="90"
                        >
                        </kendo-dropdownlist>
                      </kendo-formfield>
                    </div>
                    <div class="col-md-3">
                      <button
                      mat-raised-button
                      color="primary"
                      (click)="generarReporte()"
                    >
                      <mat-icon>search</mat-icon>
                       Buscar
                    </button>
                    </div>
                  </div>
                    
                </div>
            </div>
           
        </fieldset>
    </form>
</div>
