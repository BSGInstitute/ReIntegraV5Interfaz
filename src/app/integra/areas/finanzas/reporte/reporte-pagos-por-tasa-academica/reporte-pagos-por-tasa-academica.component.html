<div class="row">
    <div class="col-1fa-rotate-270">
      <div class="card">
        <div class="card-header bg-color-material">
          <h1 class="text-white">Reporte pagos por tasas academicas</h1>
        </div>
        <div class="card-body p-4">
          <div class="k-loading-panel" *ngIf="loader">
            <div class="k-loading-panel-mask"></div>
            <div class="k-loading-panel-wrapper">
              <kendo-loader
                type="converging-spinner"
                themeColor="primary"
                size="large"
              >
              </kendo-loader>
              <div class="k-loading-panel-text fs-5 text-primary">
                Cargando...
              </div>
            </div>
          </div>
          <div class="row conteiner-toolbar-retiros-matricula">
            <div class="card" style="padding: 0px;">
                <div class="card-header bg-color-material pb-0">
                    <h3 class="text-white mb-2">Filtro </h3>
                </div>
                <div  class="card-body p-4">
                    <div class="row" style="display: flex; justify-content: center">
                        <div class="col-md-8">
                            <form class="k-form" [formGroup]="formGroupFiltro">
                                <fieldset class="k-form-fieldset">
                                    <div class="row" style="
                                                margin-top: 0px !important
                                            ">
                                                    <div class="col-md-1"></div>
                                                    <div class="col-md-3" style="
                                                    padding-right: 0px;
                                                    display: flex;
                                                    width: 182px;
                                                ">
                                                        <label
                                                        [for]="fecha"
                                                        class="k-label"
                                                        style="width: fit-content;padding-top:5px;"
                                                      
                                                      >
                                                      Rango de fechas de pago :
                                                      </label>
                                                    </div>
                                                    <div class="col-md-7">
                                                        <div class="row" >
                                                            <kendo-daterange
                                                            [incompleteDateValidation]="true"
                                                            >
                                                                <div class="col-md-5"  >
                                                                      <kendo-dateinput
                                                                      kendoDateRangeStartInput
                                                                      [size]="'medium'"
                                                                      formControlName="fechaInicio"
                                                                      [placeholder]="'Inicio'"
                                                                      [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                      [incompleteDateValidation]="true"
                                                                      fillMode="outline"
                                                                      #fecha
                                                                      >
                                                                  </kendo-dateinput>
                                                                </div>
                                                                <div class="col-md-2" style="padding: 0%;width: 5%;text-align: center;"><p style="
                                                                    margin-bottom: 5px;"><strong>—</strong></p></div>
                                                                <div class="col-md-5">
                                                                      <kendo-dateinput
                                                                      kendoDateRangeEndInput
                                                                      [size]="'medium'"
                                                                      [placeholder]="'fin'"
                                                                      formControlName="fechaFin"
                                                                      [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                      [incompleteDateValidation]="true"
                                                                      fillMode="outline"
                                                                      ></kendo-dateinput>
                                                                </div>
                                                            </kendo-daterange>
                                                        </div>
                                                    </div>
                                                    
                                    </div>
                                    <div style="height:15px;"></div>

                                    <div class="row  k-form-horizontal">
                                        <kendo-formfield
                                            orientation="horizontal"
                                            style="margin: 0px !important"
                                        >
                                            <label
                                            [for]="idCentroCosto"
                                            class="k-label"
                                            style="margin-bottom: 5px;width: 236px;"
                                            >
                                            <span>Programa(CentroCostos) : </span>
                                            </label>
                                            <kendo-combobox
                                            #idCentroCosto
                                            class="d-flex"
                                            [data]="listaPrograma"
                                            size="medium"
                                            formControlName="idCentroCosto"
                                            [filterable]="true"
                                            placeholder="< Ingresa el centro de costo >"
                                            textField="nombre"
                                            valueField="idPEspecifico"
                                            [valuePrimitive]="true"
                                            [style.width.%]="80"
                                            (filterChange)="filterPrograma($event)"
                                            >
                                            </kendo-combobox>
                                        </kendo-formfield>
                                    </div>
                                    <div style="height:15px;"></div>
                                    <div class="row  k-form-horizontal">
                                        <kendo-formfield
                                        orientation="horizontal"
                                        style="margin: 0px !important"
                                      >
                                        <label
                                          [for]="idAlumno"
                                          class="k-label"
                                          style="margin-bottom: 5px;width: 236px;"
                                        >
                                          <span>Alumno : </span>
                                        </label>
                                        <kendo-combobox
                                          #idAlumno
                                          class="d-flex"
                                          [data]="listaAlumno"
                                          size="medium"
                                          formControlName="idAlumno"
                                          [filterable]="true"
                                          placeholder="< Ingresa el código, nombre ó apellido del alumno >"
                                          textField="nombreCompleto"
                                          valueField="id"
                                          [valuePrimitive]="true"
                                          [style.width.%]="80"
                                          (filterChange)="filterAlumno($event)"
                                          >
                                        </kendo-combobox>
                                      </kendo-formfield>
                                    </div>
                                    <div style="height:15px;"></div>
                                    <div class="row  k-form-horizontal">
                                        <kendo-formfield
                                        orientation="horizontal"
                                        style="margin: 0px !important"
                                      >
                                        <label
                                          [for]="codigoMat"
                                          class="k-label"
                                          style="margin-bottom: 5px;width: 236px;"
                                        >
                                          <span>Código de Matrícula : </span>
                                        </label>
                                        <kendo-combobox
                                          #codigoMat
                                          class="d-flex"
                                          [data]="listaMatricula"
                                          size="medium"
                                          formControlName="idMatricula"
                                          [filterable]="true"
                                          placeholder="< Ingresa el código de matrícula >"
                                          textField="codigoMatricula"
                                          valueField="id"
                                          [valuePrimitive]="true"
                                          [style.width.%]="80"
                                          (filterChange)="filterCodigoMat($event)"
                                        >
                                        </kendo-combobox>
                                      </kendo-formfield>
                                    </div>
                                    <div style="height:15px;"></div>
                                    <div class="row  k-form-horizontal">
                                        <kendo-formfield
                                        orientation="horizontal"
                                        style="margin: 0px !important"
                                      >
                                        <label
                                          [for]="idConcepto"
                                          class="k-label"
                                          style="margin-bottom: 5px;width: 236px;"
                                        >
                                          <span>Concepto de constancia : </span>
                                        </label>
                                        <kendo-combobox
                                          #idConcepto
                                          class="d-flex"
                                          [data]="listaConceptoTasa"
                                          size="medium"
                                          formControlName="concepto"
                                          [filterable]="true"
                                          placeholder="< Ingresa el concepto de constancia >"
                                          textField="nombre"
                                          valueField="nombre"
                                          [valuePrimitive]="true"
                                          [style.width.%]="80"
                                          (filterChange)=" filterConceptoTasa($event)"
                    
                                        >
                                        </kendo-combobox>
                                      </kendo-formfield>
                                    </div>
                                    <div style="height:15px;"></div>
                                    <div class="row" style="display: flex; justify-content: center;">
                                      <div class="col-md-9" style="display: flex; justify-content: end;">
                                          <div style="width: fit-content;height: fit-content;">
                                              <button
                                              mat-raised-button
                                              color="primary"
                                              style="width: fit-content;height: fit-content;"
                                              (click)="generarReporte()"
                                            >
                                              <mat-icon>search</mat-icon>
                                               Buscar
                                            </button>
                                          </div>
                                     
                                      </div>
                                      <div class="col-md-1"> </div>
                                  </div>
                                </fieldset>
                              </form>    
                        </div>
                    </div>
                </div>
            </div>
            <br>
            <div class="card" style="padding: 0px;">
              <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Lista reporte pagos por tasas academicas </h3>
              </div>
              <div  class="card-body p-4">
                <kendo-grid
                #grid
                [kendoGridBinding]="listaReporte"
                [pageSize]="10"
                [sortable]="true"
                [reorderable]="false"
                [resizable]="true"
                filterable="menu"
                [pageable]="true"
                style="max-height: 700px; border-top-width: 0px; padding: 0px"
              >
                <ng-template kendoGridToolbarTemplate>
                  <div
                    class="col-md-7"
                    style="display: flex; justify-content: start"
                  >
                     <button
                     (click)="excelexport.save()"
                     mat-raised-button
                     class="btn-export-excel"
                   >
                   <span class="k-icon k-i-file-excel k-icon-20"></span>
                     Exportar a Excel
                   </button>
                   <kendo-excelexport 
                   [data]="listaReporte" 
                   fileName="Reporte Pagos Por Tasa Academicas.xlsx" #excelexport>
                     <kendo-excelexport-column field="codPrograma" title="Código Programa">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="codMat" title="Código de Matrícula">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="alumno" title="Alumno" [width]="300">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="concepto" title="Concepto">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="monto" title="Monto">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="moneda" title="Moneda">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="fechaPago" title="Fecha de Pago">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="montoDolares" title="Monto US$">
                     </kendo-excelexport-column>
                   </kendo-excelexport>
                  </div>
                </ng-template>
                <kendo-grid-column
                  title="Código Programa"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="codPrograma"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Código de Matrícula"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="codMat"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Alumno"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="alumno"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Concepto"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="concepto"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Monto"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="monto"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Moneda"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="moneda"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Fecha de Pago"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="fechaPago"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                <ng-template kendoGridFilterMenuTemplate let-filter let-column="column" let-filterService="filterService">
                  <kendo-grid-date-filter-menu
                      [column]="column"
                      [format]="'dd-MM-yyyy'"
                      [filter]="filter"
                      [placeholder]="'dia-mes-año'"
                      [filterService]="filterService"
                      >
                  </kendo-grid-date-filter-menu>
                </ng-template>
              <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  {{finanzasService.fechaTemplate(dataItem.fechaPago)}}
              </ng-template>
                </kendo-grid-column>
                <kendo-grid-column
                  title="Monto US$"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="montoDolares"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                
                </kendo-grid-column>
                <ng-template kendoGridNoRecordsTemplate>
                  <div>
                    <kendo-badge-container>
                      <kendo-icon name="cloud" size="large"></kendo-icon>
                      <kendo-badge position="inside">
                        <kendo-icon name="close" style="color: red"></kendo-icon>
                      </kendo-badge>
                    </kendo-badge-container>
                  </div>
                  <p>No hay registros cargados!</p>
                </ng-template>
                <ng-template
                  kendoPagerTemplate
                  let-totalPages="totalPages"
                  let-currentPage="currentPage"
                >
                  <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                  <kendo-pager-numeric-buttons
                    [buttonCount]="5"
                  ></kendo-pager-numeric-buttons>
                  <kendo-pager-next-buttons></kendo-pager-next-buttons>
                  
                  <kendo-pager-info></kendo-pager-info>
                  <kendo-pager-page-sizes
                    [pageSizes]="pageSizes"
                  ></kendo-pager-page-sizes>
                </ng-template>
                </kendo-grid>
              </div>
          </div>
        </div> 
        </div>
      </div>
    </div>
  </div>
