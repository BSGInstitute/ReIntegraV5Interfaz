<div class="">
  <div class="row">
    <div class="col-1fa-rotate-270">
      <div class="card">
        <div class="card-header bg-color-material">
          <h1 class="text-white">Reporte Flujo</h1>
        </div>
        <div class="card-body p-4">
          <div class="k-loading-panel" *ngIf="loader">
            <div class="k-loading-panel-mask"></div>
            <div class="k-loading-panel-wrapper">
              <kendo-loader
                type="converging-spinner"
                themeColor="primary"
                size="large"
              >
              </kendo-loader>
              <div class="k-loading-panel-text fs-5 text-primary">
                Cargando...
              </div>
            </div>
          </div>
          <kendo-tabstrip
            style="background-color: #d3d4dc"
            [keepTabContent]="true"
          >
            <kendo-tabstrip-tab title="FILTRO REPORTE FLUJO" [selected]="true">
              <ng-template kendoTabContent>
                <div class="row">
                  <div class="col-md-2"></div>
                  <div class="col-md-8">
                    <form class="k-form" [formGroup]="formGroupFiltro">
                      <fieldset class="k-form-fieldset">
                        <div
                          class="row"
                          style="display: flex; justify-content: center"
                        >
                          <div class="col-md-8">
                            <kendo-daterange [incompleteDateValidation]="true">
                              <div class="col-md-5">
                                <label style="width: 250px">
                                  <span
                                    >Fechas vencimiento de Cronograma :</span
                                  >
                                </label>
                                <kendo-dateinput
                                  kendoDateRangeStartInput
                                  [size]="'medium'"
                                  formControlName="fechaInicio"
                                  [placeholder]="'Inicio'"
                                  [format]="{
                                    displayFormat: 'dd-MM-yyyy',
                                    inputFormat: 'dd-MM-yyyy'
                                  }"
                                  [incompleteDateValidation]="true"
                                  fillMode="outline"
                                >
                                </kendo-dateinput>
                              </div>
                              <div
                                class="col-md-2"
                                style="
                                  padding: 0%;
                                  width: 5%;
                                  text-align: center;
                                "
                              >
                                <p style="margin-bottom: 5px">
                                  <strong>—</strong>
                                </p>
                              </div>
                              <div class="col-md-5">
                                <kendo-dateinput
                                  kendoDateRangeEndInput
                                  [size]="'medium'"
                                  [placeholder]="'fin'"
                                  formControlName="fechaFin"
                                  [format]="{
                                    displayFormat: 'dd-MM-yyyy',
                                    inputFormat: 'dd-MM-yyyy'
                                  }"
                                  [incompleteDateValidation]="true"
                                  fillMode="outline"
                                ></kendo-dateinput>
                              </div>
                            </kendo-daterange>
                          </div>
                          <div class="col-md-2" style="padding-top: 15px">
                            <button mat-raised-button color="primary" (click)="generarReporte()">
                              <mat-icon>search</mat-icon>
                              Buscar
                            </button>
                          </div>
                        </div>
                      </fieldset>
                    </form>
                  </div>
                  <div class="col-md-2"></div>
                </div>
              </ng-template>
            </kendo-tabstrip-tab>
            <kendo-tabstrip-tab title="CONGELAMIENTO DE DATOS">
              <ng-template kendoTabContent>
                <app-congelamiento-datos-flujo
                (loading)="ActividadLoading($event)"
                ></app-congelamiento-datos-flujo>
              </ng-template>
            </kendo-tabstrip-tab>
          </kendo-tabstrip>
          <br />
