<div class="">
    <div class="row">
        <div class="col-1fa-rotate-270">
            <div class="card">
                <div class="card-header bg-color-material">
                    <h1 class="text-white">Reporte pendiente mes coordinador/a</h1>
                </div>
                <div  class="card-body p-4">
                    <div class="k-loading-panel" *ngIf="loader">
                        <div class="k-loading-panel-mask"></div>
                        <div class="k-loading-panel-wrapper">
                          <kendo-loader
                            type="converging-spinner"
                            themeColor="primary"
                            size="large"
                          >
                          </kendo-loader>
                          <div class="k-loading-panel-text fs-5 text-primary">
                            Cargando...
                          </div>
                        </div>
                      </div>
                    <div class="row">
                        <div class="card" style="padding: 0px;">
                            <div class="card-header bg-color-material pb-0">
                                <h3 class="text-white mb-2">Filtro</h3>
                            </div>
                            <div  class="card-body p-4">
                                <form class="k-form" [formGroup]="formGroupFiltro" >
                                    <fieldset class="k-form-fieldset">
                                        <div class="row">
                                            <div class="col-md-1"></div>
                                            <div class="col-md-5">
                                                <label [for]="mesInicial" style="width: 150px">
                                                    <span>Mes inicial  :</span>
                                                  </label>
                                                  <kendo-combobox
                                                      #mesInicial
                                                      [style.width.%]="90"
                                                      size="medium"
                                                      formControlName="periodoInicial"
                                                      [clearButton]="true"
                                                      class="d-flex center"
                                                      [data]="itemPeriodo"
                                                      [filterable]="true"
                                                      textField="nombre"
                                                      valueField="id"
                                                      [valuePrimitive]="true"
                                                      fillMode="outline"
                                                      [placeholder]="'< Seleccionar Periodo >'"
                                                      (filterChange)="filtroPeriodo($event)"
                                                    >
                                                    </kendo-combobox>
                                                <br>
                                            </div>
                                            
                                            <div class="col-md-5">
                                                <div class="row" >
                                                    <div class="col-md-5">
                                                        <label [for]="fechaCorte1" class="k-label">
                                                            <span
                                                            >Fecha corte 1 (<strong class="text-danger">*</strong>) :
                                                            </span>
                                                        </label>
                                                        <kendo-datepicker
                                                          #fechaCorte1
                                                          formControlName="fechaCorte1"
                                                          culture="es-ES"
                                                          calendarType="classic"
                                                          [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                          placeholder="dia-mes-año"
                                                          (valueChange)="validarFecha('c1')"
                                                          [fillMode]="'outline'"
                                                        ></kendo-datepicker>
                                                    </div>
                                                    <div class="col-md-2" style="padding: 0%;width: 5%;text-align: center;">
                                                    <p style="padding-top: 25px;"><strong>—</strong></p></div>
                                                    <div class="col-md-5">
                                                        <label [for]="fechaCorte2" class="k-label">
                                                            <span
                                                            >Fecha corte 2 (<strong class="text-danger">*</strong>) :
                                                            </span>
                                                        </label>
                                                        <kendo-datepicker
                                                          #fechaCorte2
                                                          formControlName="fechaCorte2"
                                                          culture="es-ES"
                                                          calendarType="classic"
                                                          [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                          placeholder="dia-mes-año"
                                                          (valueChange)="validarFecha('c2')"
                                                          [fillMode]="'outline'"
                                                          ></kendo-datepicker>
                                                    </div>

                                                    
                                                </div>
                                                <br>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-1"></div>
                                            <div class="col-md-5">
                                                <label [for]="mesFinal" style="width: 150px">
                                                    <span>Mes final :</span>
                                                  </label>
                                                  <kendo-combobox
                                                      #mesFinal
                                                      [style.width.%]="90"
                                                      size="medium"
                                                      formControlName="periodoFin"
                                                      [clearButton]="true"
                                                      class="d-flex center"
                                                      [data]="itemPeriodo"
                                                      [filterable]="true"
                                                      textField="nombre"
                                                      valueField="id"
                                                      [valuePrimitive]="true"
                                                      fillMode="outline"
                                                      [placeholder]="'< Seleccionar Periodo >'"
                                                      (filterChange)="filtroPeriodo($event)"
                                                    >
                                                </kendo-combobox>
                                            </div>
                                            <div class="col-md-5">
                                                <div class="row" >
                                                    <kendo-daterange
                                                    [incompleteDateValidation]="true"
                                                    >
                                                        <div class="col-md-5">
                                                                <label  style="width: 150px">
                                                                <span>Fecha pago inicial :</span>
                                                              </label>
                                                              <kendo-dateinput
                                                              kendoDateRangeStartInput
                                                              [size]="'medium'"
                                                              formControlName="fechaPagoInicial"
                                                              [placeholder]="'dia-mes-año'"
                                                              [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                              [incompleteDateValidation]="true"
                                                              fillMode="outline"
                                                              >
                                                          </kendo-dateinput>
                                                        </div>
                                                        <div class="col-md-2" style="padding: 0%;width: 5%;text-align: center;"><p style="
                                                            margin-bottom: 5px;"><strong>—</strong></p></div>
                                                        <div class="col-md-5">
                                                            <label  style="width: 150px">
                                                                <span>Fecha pago final :</span>
                                                              </label>
                                                              <kendo-dateinput
                                                              kendoDateRangeEndInput
                                                              [size]="'medium'"
                                                              [placeholder]="'dia-mes-año'"
                                                              formControlName="fechaPagoFinal"
                                                              [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                              [incompleteDateValidation]="true"
                                                              fillMode="outline"
                                                              ></kendo-dateinput>
                                                        </div>
                                                    </kendo-daterange>
                                                </div>
                                            </div>
                                        </div>
                                    </fieldset>
                                </form>
                                <br>
                                <div class="row" style="display: flex; justify-content: center;">
                                    <div class="col-md-9" style="display: flex; justify-content: end;">
                                        <div style="width: fit-content;height: fit-content;">
                                            <button
                                            mat-raised-button
                                            color="primary"
                                            style="width: fit-content;height: fit-content;"
                                            (click)="generarReporte()"
                                          >
                                            <mat-icon>search</mat-icon>
                                             Buscar
                                          </button>
                                        </div>
                                   
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="card" style="padding: 0px;">
                            <div class="card-header bg-color-material pb-0">
                                <h3 class="text-white mb-2">Reporte pendientes</h3>
                            </div>
                            <div  class="card-body p-4">
                                <kendo-tabstrip
                                style="background-color: #d3d4dc"
                                [keepTabContent]="true"
                              >
                                <kendo-tabstrip-tab title="REPORTE DEL MES" [selected]="true">
                                    <ng-template kendoTabContent>
                                        <ng-container *ngIf="listaReporteMes.length>0"> 
                                            <div class="row estilo-header-grid">
                                                <kendo-grid
                                                  #grid
                                                  id="grid-tab3"
                                                  [kendoGridBinding]="listaReporteMes"
                                                  [pageSize]="undefined"
                                                  [sortable]="false"
                                                  [reorderable]="false"
                                                  [resizable]="true"
                                                  filterable="menu"
                                                  [pageable]="false"
                                                  style="max-height: 700px; border-top-width: 0px"
                                                  [groupable]="false"
                                                  [rowClass]="rowCallback"
                                                >
                                                  <ng-template kendoGridToolbarTemplate>
                                                    <div
                                                      class="col-md-7"
                                                      style="display: flex; justify-content: start"
                                                    >
                                                      <button
                                                        kendoGridExcelCommand
                                                        mat-raised-button
                                                        class="btn-export-excel"
                                                      >
                                                        <span
                                                          class="k-icon k-i-file-excel k-icon-20"
                                                        ></span>
                                                        Exportar a Excel
                                                      </button>
                                                    </div>
                                                  </ng-template>
                            
                                                  <kendo-grid-column
                                                    title="Tipo de Monto"
                                                    headerClass="justify-content-center k-grid-header "
                                                    [headerStyle]="{
                                                      'background-color': '#BEC3A3',
                                                      color: 'white'
                                                    }"
                                                    [width]="150"
                                                    field="tipoMonto"
                                                    [locked]="false"
                                                    [sticky]="false"
                                                    [filterable]="true"
                                                    [hidden]="false"
                                                  >
                                                  </kendo-grid-column>
                                                  <ng-container *ngIf="reporteFinal && reporteFinal.reportePendientePorPeriodo.length>0">
                                                    <ng-container
                                                          *ngFor="let periodo of reporteFinal.reportePendientePorPeriodo"
                                                        >
                                                        <kendo-grid-column
                                                        [title]="periodo.g"
                                                        headerClass="justify-content-center k-grid-header "
                                                        [width]="100"
                                                        [field]="periodo.g"
                                                        [locked]="false"
                                                        [sticky]="false"
                                                        [filterable]="false"
                                                        [hidden]="false"
                                                        [headerStyle]="{
                                                          'background-color': '#27ae60',
                                                          color: 'white'
                                                        }"
                                                      >
                                                      </kendo-grid-column>
                                                    </ng-container>
                                                    
                                                  </ng-container> 
                            
                                                  <ng-template kendoGridNoRecordsTemplate>
                                                    <div>
                                                      <kendo-badge-container>
                                                        <kendo-icon name="cloud" size="large"></kendo-icon>
                                                        <kendo-badge position="inside">
                                                          <kendo-icon
                                                            name="close"
                                                            style="color: red"
                                                          ></kendo-icon>
                                                        </kendo-badge>
                                                      </kendo-badge-container>
                                                    </div>
                                                    <p>No hay registros cargados!</p>
                                                  </ng-template>
                                                  <kendo-grid-excel
                                                    fileName="Reporte pendiente mes coordinadora - MES.xlsx"
                                                  ></kendo-grid-excel>
                                                </kendo-grid>
                                              </div>
                                        </ng-container>
                                        
                                    </ng-template>
                                </kendo-tabstrip-tab>
                                <kendo-tabstrip-tab title="REPORTE POR COORDINADORAS">
                                  <ng-template kendoTabContent>
                                   <ng-container *ngIf="listaReporteCoordinadora.length>0"> 
                                            <div class="row estilo-header-grid">
                                                <kendo-grid
                                                  #grid
                                                  id="grid-tab3"
                                                  [kendoGridBinding]="listaReporteCoordinadora"
                                                  [pageSize]="undefined"
                                                  [sortable]="false"
                                                  [reorderable]="false"
                                                  [resizable]="true"
                                                  filterable="menu"
                                                  [pageable]="false"
                                                  style="max-height: 700px; border-top-width: 0px"
                                                  [groupable]="false"
                                                  [rowClass]="rowCallbackCoor"
                                                  [group]="group"
                                                >
                                                  <ng-template kendoGridToolbarTemplate>
                                                    <div
                                                      class="col-md-7"
                                                      style="display: flex; justify-content: start"
                                                    >
                                                      <button
                                                        kendoGridExcelCommand
                                                        mat-raised-button
                                                        class="btn-export-excel"
                                                      >
                                                        <span
                                                          class="k-icon k-i-file-excel k-icon-20"
                                                        ></span>
                                                        Exportar a Excel
                                                      </button>
                                                    </div>
                                                  </ng-template>
                            
                                                  <kendo-grid-column
                                                    title="Tipo de Monto Por Coordinador"
                                                    headerClass="justify-content-center k-grid-header "
                                                    [headerStyle]="{
                                                      'background-color': '#BEC3A3',
                                                      color: 'white'
                                                    }"
                                                    [width]="150"
                                                    field="tipoMonto"
                                                    [locked]="false"
                                                    [sticky]="false"
                                                    [filterable]="true"
                                                    [hidden]="false"
                                                  >
                                                  </kendo-grid-column>
                                                  <ng-container *ngIf="reporteFinal && reporteFinal.reportePendientePeriodoYCoordinador.length>0">
                                                    <ng-container
                                                          *ngFor="let periodo of reporteFinal.reportePendientePeriodoYCoordinador"
                                                        >
                                                        <kendo-grid-column
                                                        [title]="periodo.g"
                                                        headerClass="justify-content-center k-grid-header "
                                                        [width]="100"
                                                        [field]="periodo.g"
                                                        [locked]="false"
                                                        [sticky]="false"
                                                        [filterable]="false"
                                                        [hidden]="false"
                                                        [headerStyle]="{
                                                          'background-color': '#27ae60',
                                                          color: 'white'
                                                        }"
                                                      >
                                                      
                                                      </kendo-grid-column>
                                                    </ng-container>
                                                    
                                                  </ng-container> 
                            
                                                  <ng-template kendoGridNoRecordsTemplate>
                                                    <div>
                                                      <kendo-badge-container>
                                                        <kendo-icon name="cloud" size="large"></kendo-icon>
                                                        <kendo-badge position="inside">
                                                          <kendo-icon
                                                            name="close"
                                                            style="color: red"
                                                          ></kendo-icon>
                                                        </kendo-badge>
                                                      </kendo-badge-container>
                                                    </div>
                                                    <p>No hay registros cargados!</p>
                                                  </ng-template>
                                                  <kendo-grid-excel
                                                    fileName="Reporte pendiente mes coordinadora - COORDINADOR/A.xlsx"
                                                  ></kendo-grid-excel>
                                                </kendo-grid>
                                              </div>
                                        </ng-container>
                                  </ng-template>
                                </kendo-tabstrip-tab>
                              </kendo-tabstrip>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
