<div class="row">
    <div class="col-1fa-rotate-270">
      <div class="card">
          <div class="card-header bg-color-material">
              <h1 class="text-white">Reporte Control de Documentos</h1>
          </div>
          <div  class="card-body p-4">
            <div class="k-loading-panel" *ngIf="loader">
              <div class="k-loading-panel-mask"></div>
              <div class="k-loading-panel-wrapper">
                <kendo-loader
                  type="converging-spinner"
                  themeColor="primary"
                  size="large"
                >
                </kendo-loader>
                <div class="k-loading-panel-text fs-5 text-primary">Cargando...</div>
              </div>
            </div>
              <div class="row conteiner-toolbar-retiros-matricula">
                  <div class="card" style="padding: 0px;">
                      <div class="card-header bg-color-material pb-0">
                          <h3 class="text-white mb-2">Filtro </h3>
                      </div>
                      <div  class="card-body p-4">
                        <form class="k-form" [formGroup]="formGroupFiltro" >
                            <fieldset class="k-form-fieldset">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="row">
                                            <div class="col-md-1 RPD-filtro-input" >
                                                <input
                                                type="radio"
                                                value="Male"
                                                name="isCheck"
                                                style="background-color: #e3e3e3;"
                                                (click)="disblebForm('idCoordinador')"
                                                kendoRadioButton
                                                
                                              />
                                            </div>
                                            <div class="col-md-11 k-form-horizontal" style="padding:0px">
                                                <kendo-formfield orientation="horizontal" style="
                                                margin-top: 0px !important
                                            ">
                                                    <label
                                                      [for]="idCoordinador"
                                                      class="k-label"
                                                      [style.width.px]="110"
                                                    >
                                                    Coordinador :
                                                    </label>
                                                    <kendo-combobox
                                                        #idCoordinador
                                                        class="d-flex"
                                                        [data]="itemsCordinador"
                                                        size="medium"
                                                        formControlName="idCoordinador"
                                                        [filterable]="true"
                                                        placeholder="< Ingrese el Nombre del Coordinador >"
                                                        textField="nombreCompleto"
                                                        valueField="id"
                                                        [valuePrimitive]="true"
                                                        [style.width.%]="90"
                                                        (filterChange)="filterCordinador($event)"
                                
                                                    >
                                                    </kendo-combobox>
                                                  </kendo-formfield>
                                            </div>
                                        </div>
                                        <br>
                                        <div class="row">
                                            <div class="col-md-1 RPD-filtro-input" >
                                                <input
                                                type="radio"
                                                value="Male"
                                                name="isCheck"
                                                style="background-color: #e3e3e3;"
                                                (click)="disblebForm('idAsesor')"
                                                kendoRadioButton
                                              />
                                            </div>
                                            <div class="col-md-11 k-form-horizontal" style="padding:0px">
                                                <kendo-formfield orientation="horizontal" style="
                                                margin-top: 0px !important
                                            ">
                                                    <label
                                                      [for]="idAsesor"
                                                      class="k-label"
                                                      [style.width.px]="110"
                                                    >
                                                    Asesor :
                                                    </label>
                                                    <kendo-combobox
                                                        #idAsesor
                                                        class="d-flex"
                                                        [data]="itemsAsesor"
                                                        size="medium"
                                                        formControlName="idAsesor"
                                                        [filterable]="true"
                                                        placeholder="< Ingrese el Nombre del Asesor >"
                                                        textField="nombreCompleto"
                                                        valueField="id"
                                                        [valuePrimitive]="true"
                                                        [style.width.%]="90"
                                                        (filterChange)="filterAsesor($event)"
                                
                                                    >
                                                    </kendo-combobox>
                                                    
                                                  </kendo-formfield>
                                            </div>
                                        </div>
                                        <br>
                                        <div class="row">
                                            <div class="col-md-1 RPD-filtro-input" >
                                                <input
                                                type="radio"
                                                value="Male"
                                                name="isCheck"
                                                style="background-color: #e3e3e3;"
                                                (click)="disblebForm('idCentroCosto')" 
                                                kendoRadioButton
                                              />
                                            </div>
                                            <div class="col-md-11 k-form-horizontal" style="padding:0px">
                                                <kendo-formfield orientation="horizontal" style="
                                                margin-top: 0px !important
                                            ">
                                                    <label
                                                      [for]="idCentroCosto"
                                                      class="k-label"
                                                      [style.width.px]="110"
                                                    >
                                                    Centro Costos :
                                                    </label>
                                                    <kendo-combobox
                                                    #idCentroCosto
                                                    class="d-flex"
                                                    [data]="listaPrograma"
                                                    size="medium"
                                                    formControlName="idCentroCosto"
                                                    [filterable]="true"
                                                    placeholder="< Ingrese el Centro de Costo >"
                                                    textField="nombre"
                                                    valueField="id"
                                                    [valuePrimitive]="true"
                                                    [style.width.%]="90"
                                                    (filterChange)="filterPrograma($event)"
                                                  >
                                                  </kendo-combobox>
                                                  </kendo-formfield>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="row">
                                            <div class="col-md-1 RPD-filtro-input" >
                                                <input
                                                type="radio"
                                                value="Male"
                                                name="isCheck"
                                                style="background-color: #e3e3e3;"
                                                (click)="disblebForm('idAlumno')" 
                                                kendoRadioButton
                                              />
                                            </div>
                                            <div class="col-md-11 k-form-horizontal" style="padding:0px">
                                                <kendo-formfield orientation="horizontal" style="
                                                margin-top: 0px !important
                                            ">
                                                    <label
                                                      [for]="idAlumno"
                                                      class="k-label"
                                                      [style.width.px]="110"
                                                    >
                                                    Alumno :
                                                    </label>
                                                    <kendo-combobox
                                                    #idAlumno
                                                    class="d-flex"
                                                    [data]="listaAlumno"
                                                    size="medium"
                                                    formControlName="idAlumno"
                                                    [filterable]="true"
                                                    placeholder="< Ingrese el Nombre del Alumno >"
                                                    textField="nombreCompleto"
                                                    valueField="id"
                                                    [valuePrimitive]="true"
                                                    [style.width.%]="90"
                                                    (filterChange)="filterAlumno($event)"
                                                    >
                                                  </kendo-combobox>
                                                  </kendo-formfield>
                                            </div>
                                        </div>
                                        <br>
                                        <div class="row">
                                            <div class="col-md-1 RPD-filtro-input" >
                                                <input
                                                type="radio"
                                                value="Male"
                                                name="isCheck"
                                                style="background-color: #e3e3e3;"
                                                (click)="disblebForm('idMatricula')" 
                                                kendoRadioButton
                                              />
                                            </div>
                                            <div class="col-md-11 k-form-horizontal" style="padding:0px">
                                                <kendo-formfield orientation="horizontal" style="
                                                margin-top: 0px !important
                                            ">
                                                    <label
                                                      [for]="idMatricula"
                                                      class="k-label"
                                                      [style.width.px]="110"
                                                    >
                                                    Matricula :
                                                    </label>
                                                    <kendo-combobox
                                                    #idMatricula
                                                    class="d-flex"
                                                    [data]="listaMatricula"
                                                    size="medium"
                                                    formControlName="idMatricula"
                                                    [filterable]="true"
                                                    placeholder="< Ingrese el Código de Matrícula >"
                                                    textField="codigoMatricula"
                                                    valueField="id"
                                                    [valuePrimitive]="true"
                                                    [style.width.%]="90"
                                                    (filterChange)="filterCodigoMat($event)"
                              
                                                  >
                                                  </kendo-combobox>
                                                  </kendo-formfield>
                                            </div>
                                        </div>
                                        <br>
                                        <div class="row">
                                            <div class="col-md-1 RPD-filtro-input" >
                                                <input
                                                type="radio"
                                                value="Male"
                                                name="isCheck"
                                                style="background-color: #e3e3e3;"
                                                (click)="disblebForm('fecha')" 
                                                kendoRadioButton
                                              />
                                            </div>
                                            <div class="col-md-11 " style="padding:0px">
                                                <div class="row" style="
                                                margin-top: 0px !important
                                            ">
                                                    <div class="col-md-3" style="
                                                    padding-right: 0px;
                                                    display: flex;
                                                    justify-content: right;
                                                    width: 128px;
                                                ">
                                                        <label
                                                        [for]="fecha"
                                                        class="k-label"
                                                        style="width: 50px;padding-top:5px;"
                                                        [ngStyle]="{'color': checkedTemp=='fecha'?'black':'#8e8e8e'}"
                                                      >
                                                      Fecha :
                                                      </label>
                                                    </div>
                                                    <div class="col-md-9">
                                                        <div class="row" >
                                                            <kendo-daterange
                                                            [incompleteDateValidation]="true"
                                                            >
                                                                <div class="col-md-5" style="
                                                                width: 140px;
                                                            ">
                                                                      <kendo-dateinput
                                                                      kendoDateRangeStartInput
                                                                      [size]="'medium'"
                                                                      formControlName="fechaInicio"
                                                                      [placeholder]="'Inicio'"
                                                                      [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                      [incompleteDateValidation]="true"
                                                                      fillMode="outline"
                                                                      #fecha
                                                                      >
                                                                  </kendo-dateinput>
                                                                </div>
                                                                <div class="col-md-2" style="padding: 0%;width: 5%;text-align: center;"><p style="
                                                                    margin-bottom: 5px;"><strong>—</strong></p></div>
                                                                <div class="col-md-5" style="
                                                                width: 140px;
                                                            ">
                                                                      <kendo-dateinput
                                                                      kendoDateRangeEndInput
                                                                      [size]="'medium'"
                                                                      [placeholder]="'fin'"
                                                                      formControlName="fechaFin"
                                                                      [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                      [incompleteDateValidation]="true"
                                                                      fillMode="outline"
                                                                      ></kendo-dateinput>
                                                                </div>
                                                            </kendo-daterange>
                                                        </div>
                                                    </div>
                                                    
                                                </div>
                                            </div>
                                        </div>
                                        
                                    </div>
                                </div>
                                <br>
                                        <div class="row">
                                            <div class="col-md-2"></div>
                                            <div class="col-md-8">
                                                <div class="row" style="display:flex;justify-content:center;">
                                                    <div class="col-md-6 k-form-horizontal" style="padding:0px">
                                                        <kendo-formfield orientation="horizontal" style="
                                                        margin-top: 0px !important
                                                    ">
                                                            <label
                                                              [for]="estado"
                                                              class="k-label"
                                                              [style.width.px]="110"
                                                            >
                                                            Estado :
                                                            </label>
                                                            <kendo-dropdownlist
                                                              #estado
                                                              [formControl]="estadoControl"
                                                              [data]="listaEstado"
                                                              [valuePrimitive]="true"
                                                              valueField="id"
                                                              textField="nombre"
                                                              [defaultItem]="{
                                                                nombre: 'Todos',
                                                                id: null
                                                              }"
                                                              [style.width.%]="90"
                                                            >
                                                            </kendo-dropdownlist>
                                                          </kendo-formfield>
                                                    </div>
                                                    <div class="col-md-2">
                                                        <button
                                                        mat-raised-button
                                                        color="primary"
                                                        (click)="validarFitro()"
                                                      >
                                                        <mat-icon>search</mat-icon>
                                                         Buscar
                                                      </button>
                                                    </div>

                                                </div>
                                            </div>
                                            <div class="col-md-2"></div>
                                        </div>
                            </fieldset>

                        </form>
                            
                      </div>
                  </div>
                  <br>
                  <div class="row" style="padding-top:20px;padding-left:20px;padding-right:0%">
                    <kendo-grid
                    #grid
                    [kendoGridBinding]="dataReporte"
                    [pageSize]="5"
                    [sortable]="true"
                    [reorderable]="false"
                    [resizable]="true"
                    filterable="menu"
                    [pageable]="true"
                    style="max-height: 700px;border-top-width: 0px;padding:0%"
                    >
                    <ng-template kendoGridToolbarTemplate>
                      <div class="col-md-7" style="display:flex;justify-content: start;">
                        <button
                        mat-raised-button
                        class="btn-export-excel"
                        (click)="excelexport.save()"
                      >
                      <span class="k-icon k-i-file-excel k-icon-20"></span>
                        Exportar a Excel
                      </button>
                      <kendo-excelexport 
                      [data]="dataReporte" 
                      fileName="Reporte Control de documentos.xlsx" #excelexport>
                        <kendo-excelexport-column field="programaEspecifico" title="Prg. Especifico">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="estadoMatricula" title="Estado Matricula">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="codigoMatricula" title="Cod. Alumno">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="alumno" title="Alumno">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="periodoMatricula" title="Periodo Matrícula">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="pagoAcumulado" title="Pago Acumulado">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="criterioCalificacion" title="Criterio Calificación">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="quienEntregoDoc" title="Quien Entrego">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="fechaEntregaDocumento" title="Fecha Entrega Docs." [width]="150">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="observaciones" title="Observaciones">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="asesor" title="Asesor">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="coordinador" title="Coordinador">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="fechaPrimerPago" title="Fecha 1er Pago" [width]="150">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="cronograma" title="Cronograma">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="convenio" title="Convenio">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="pagare" title="Pagare">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="carta_Autorizacion" title="Carta de Autorización">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="hoja_Requisitos" title="Hoja de Requisitos">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="orden_compra" title="Orden de compra">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="carta_compromiso" title="Carta de compromiso">
                        </kendo-excelexport-column>
                        <kendo-excelexport-column field="dni" title="DNIs" >
                        </kendo-excelexport-column>
                      </kendo-excelexport>
                        
                      </div>
                      
                    </ng-template>
                      <kendo-grid-column
                          title="Prg. Especifico"
                          headerClass="justify-content-center k-grid-header "
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                          [width]="150"
                          field="programaEspecifico"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Estado Matricula"
                          headerClass="justify-content-center k-grid-header "
                          [width]="200"
                          field="estadoMatricula"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Cod. Alumno"
                          headerClass="justify-content-center k-grid-header "
                          [width]="120"
                          field="codigoMatricula"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Alumno"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="alumno"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Periodo Matrícula"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"

                          [locked]="false"

                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Pago Acumulado"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="pagoAcumulado"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Criterio Calificación"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="criterioCalificacion"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Quien Entrego"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="quienEntregoDoc"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Fecha Entrega Docs."
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="fechaEntregaDocumento"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        <ng-template kendoGridFilterMenuTemplate let-filter let-column="column" let-filterService="filterService">
                            <kendo-grid-date-filter-menu
                                [column]="column"
                                [format]="'dd-MM-yyyy'"
                                [filter]="filter"
                                [placeholder]="'dia-mes-año'"
                                [filterService]="filterService"
                                >
                            </kendo-grid-date-filter-menu>
                          </ng-template>
                          <ng-template  kendoGridCellTemplate let-dataItem>
                            {{finanzasService.fechaTemplate(dataItem.fechaEntregaDocumento,false)}}
                          </ng-template>
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Observaciones"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="observaciones"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Asesor"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="asesor"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Coordinador"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="coordinador"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Fecha 1er Pago"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="fechaPrimerPago"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        <ng-template kendoGridFilterMenuTemplate let-filter let-column="column" let-filterService="filterService">
                            <kendo-grid-date-filter-menu

                                [placeholder]="'dia-mes-año'"

                                >
                            </kendo-grid-date-filter-menu>
                          </ng-template>
                          <ng-template  kendoGridCellTemplate let-dataItem>

                          </ng-template>
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Cronograma"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="cronograma"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
                        </kendo-grid-column>
                        <kendo-grid-column
                          title="Convenio"
                          headerClass="justify-content-center k-grid-header "
                          [width]="150"
                          field="convenio"
                          [locked]="false"
                          [sticky]="false"
                          [filterable]="true"
                          [hidden]="false"
                          [headerStyle]="{
                            'background-color': '#27ae60',
                            color: 'white'
                          }"
                        >
