<div class="">
  <div class="row">
    <div class="col-1fa-rotate-270">
      <div class="card">
        <div class="card-body p-4">
          <div class="k-loading-panel" *ngIf="loader">
            <div class="k-loading-panel-mask"></div>
            <div class="k-loading-panel-wrapper">
              <kendo-loader
                type="converging-spinner"
                themeColor="primary"
                size="large"
              >
              </kendo-loader>
              <div class="k-loading-panel-text fs-5 text-primary">
                Cargando...
              </div>
            </div>
          </div>
          <div class="row">
            <div class="card" style="padding: 0px">
              <div class="card-header bg-color-material pb-0">
                <h3 class="text-white mb-2">Filtro</h3>
              </div>
              <div class="card-body p-4">
                <form class="k-form" [formGroup]="formGroupFiltro">
                  <fieldset class="k-form-fieldset">
                    <div class="row">
                      <div class="col-md-1"></div>
                      <div class="col-md-5">
                        <label [for]="fechaInicio" class="k-label">
                          <span
                            >Fecha de Inicio :
                            <strong class="text-danger">*</strong></span
                          >
                        </label>
                        <kendo-datepicker
                          #fechaInicio
                          formControlName="fechaInicio"
                          [incompleteDateValidation]="true"
                          calendarType="classic"
                          [format]="{
                            displayFormat: 'dd-MM-yyyy',
                            inputFormat: 'dd-MM-yyyy'
                          }"
                          placeholder="dia-mes-año"
                          [style.width.px]="170"
                          [required]="true"
                        ></kendo-datepicker>
                      </div>

                      <div class="col-md-5">
                        <div class="row">
                          <kendo-formfield orientation="horizontal">
                            <label [for]="fechaFin" class="k-label">
                              <span
                                >Fecha de Fin :
                                <strong class="text-danger">*</strong></span
                              >
                            </label>
                            <kendo-datepicker
                              #fechaFin
                              formControlName="fechaFin"
                              [incompleteDateValidation]="true"
                              calendarType="classic"
                              [format]="{
                                displayFormat: 'dd-MM-yyyy',
                                inputFormat: 'dd-MM-yyyy'
                              }"
                              placeholder="dia-mes-año"
                              [style.width.px]="170"
                              [required]="true"
                            ></kendo-datepicker>
                          </kendo-formfield>
                        </div>
                        <br />
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-md-1"></div>
                      <div class="col-md-5">
                        <kendo-formfield orientation="horizontal">
                          <label [for]="fechaCorte" class="k-label">
                            <span
                              >Fecha de Corte :
                              <strong class="text-danger">*</strong></span
                            >
                          </label>
                          <kendo-datepicker
                            #fechaCorte
                            formControlName="fechaCorte"
                            [incompleteDateValidation]="true"
                            calendarType="classic"
                            [format]="{
                              displayFormat: 'dd-MM-yyyy',
                              inputFormat: 'dd-MM-yyyy'
                            }"
                            placeholder="dia-mes-año"
                            [style.width.px]="170"
                            [required]="true"
                          ></kendo-datepicker>
                        </kendo-formfield>
                      </div>
                      <div class="col-md-5">
                        <div class="col-md-1"></div>
                        <div class="row">
                          <kendo-formfield orientation="horizontal">
                            <label [for]="fechaCortePrevio" class="k-label">
                              <span
                                >Fecha de Corte Previo :
                                <strong class="text-danger">*</strong></span
                              >
                            </label>
                            <kendo-datepicker
                              #fechaCortePrevio
                              formControlName="fechaCortePrevio"
                              [incompleteDateValidation]="true"
                              calendarType="classic"
                              [format]="{
                                displayFormat: 'dd-MM-yyyy',
                                inputFormat: 'dd-MM-yyyy'
                              }"
                              placeholder="dia-mes-año"
                              [style.width.px]="170"
                              [required]="true"
                            ></kendo-datepicker>
                          </kendo-formfield>
                        </div>
                      </div>
                    </div>

                    <div class="col-md-3">
                      <button
                        mat-raised-button
                        color="primary"
                        (click)="ObtenerData()"
                      >
                        <mat-icon>search</mat-icon>
                        Buscar
                      </button>
                    </div>
                  </fieldset>
                </form>
              </div>
            </div>

            <kendo-grid
            [kendoGridBinding]="listaIngresoVentas"
            [pageSize]="5"
            [sortable]="true"
            [reorderable]="false"
            [resizable]="true"
            filterable="menu"
            [pageable]="true"
            style="max-height: 1200px; border-top-width: 0px; padding: 0%"
          >
            <ng-template kendoGridToolbarTemplate class="bg-danger">
              <div style="display: flex; justify-content: start">
                <button
                  kendoGridExcelCommand
                  mat-raised-button
                  class="btn-export-excel"
                >
                  <span class="k-icon k-i-file-excel k-icon-20"></span>
                  Exportar a Excel
                </button>
              </div>
            </ng-template>
            <kendo-grid-column
              title=""
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="tipoMonto"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [headerStyle]="{
                'background-color': '#27ae60',
                color: 'white'
              }"
            >
            </kendo-grid-column>

            <ng-container
              *ngFor="
                let periodo of listaReporte.reportePendienteIngresoVentasPorPeriodo
              "
            >
              <kendo-grid-column-group
                [title]="periodo.g"
                [headerStyle]="{
                  'background-color': '#ED912A',
                  color: 'white'
                }"
              >
                <kendo-grid-column
                  title="Monto"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  [field]="periodo.g + '_monto'"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
              </kendo-grid-column-group>
            </ng-container>

            <ng-template kendoGridNoRecordsTemplate>
              <div>
                <kendo-badge-container>
                  <kendo-icon name="cloud" size="large"></kendo-icon>
                  <kendo-badge position="inside">
                    <kendo-icon name="close" style="color: red"></kendo-icon>
                  </kendo-badge>
                </kendo-badge-container>
              </div>
              <p>No hay registros cargados!</p>
            </ng-template>
            <ng-template
              kendoPagerTemplate
              let-totalPages="totalPages"
              let-currentPage="currentPage"
            >
              <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
              <kendo-pager-numeric-buttons
                [buttonCount]="5"
              ></kendo-pager-numeric-buttons>
              <kendo-pager-next-buttons></kendo-pager-next-buttons>
              <!-- <kendo-pager-input></kendo-pager-input> -->
              <kendo-pager-info></kendo-pager-info>
              <kendo-pager-page-sizes
                [pageSizes]="pageSizes"
              ></kendo-pager-page-sizes>
            </ng-template>
            <kendo-grid-excel
              [fileName]="'Reporte Congelados.xlsx'"
            ></kendo-grid-excel>
          </kendo-grid>

            <kendo-grid
              [kendoGridBinding]="listaPrueba"
              [pageSize]="5"
              [sortable]="true"
              [reorderable]="false"
              [resizable]="true"
              filterable="menu"
              [pageable]="true"
              style="max-height: 1200px; border-top-width: 0px; padding: 0%"
            >
              <ng-template kendoGridToolbarTemplate class="bg-danger">
                <div style="display: flex; justify-content: start">
                  <button
                    kendoGridExcelCommand
                    mat-raised-button
                    class="btn-export-excel"
                  >
                    <span class="k-icon k-i-file-excel k-icon-20"></span>
                    Exportar a Excel
                  </button>
                </div>
              </ng-template>
              <kendo-grid-column
                title=""
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="tipoMonto"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
                [headerStyle]="{
                  'background-color': '#27ae60',
                  color: 'white'
                }"
              >
              </kendo-grid-column>

              <ng-container
                *ngFor="
                  let periodo of listaReporte.reportePendientePorCoordinador
                "
              >
                <kendo-grid-column-group
                  [title]="periodo.g"
                  [headerStyle]="{
                    'background-color': '#ED912A',
                    color: 'white'
                  }"
                >
                  <kendo-grid-column
                    title="Monto"
                    headerClass="justify-content-center k-grid-header "
                    [width]="150"
                    [field]="periodo.g + '_monto'"
                    [locked]="false"
                    [sticky]="false"
                    [filterable]="true"
                    [hidden]="false"
                    [headerStyle]="{
                      'background-color': '#27ae60',
                      color: 'white'
                    }"
                  >
                  </kendo-grid-column>
                </kendo-grid-column-group>
              </ng-container>

              <ng-template kendoGridNoRecordsTemplate>
                <div>
                  <kendo-badge-container>
                    <kendo-icon name="cloud" size="large"></kendo-icon>
                    <kendo-badge position="inside">
                      <kendo-icon name="close" style="color: red"></kendo-icon>
                    </kendo-badge>
                  </kendo-badge-container>
                </div>
                <p>No hay registros cargados!</p>
              </ng-template>
              <ng-template
                kendoPagerTemplate
                let-totalPages="totalPages"
                let-currentPage="currentPage"
              >
                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                <kendo-pager-numeric-buttons
                  [buttonCount]="5"
                ></kendo-pager-numeric-buttons>
                <kendo-pager-next-buttons></kendo-pager-next-buttons>
                <!-- <kendo-pager-input></kendo-pager-input> -->
                <kendo-pager-info></kendo-pager-info>
                <kendo-pager-page-sizes
                  [pageSizes]="pageSizes"
                ></kendo-pager-page-sizes>
              </ng-template>
              <kendo-grid-excel
                [fileName]="'Reporte Congelados.xlsx'"
              ></kendo-grid-excel>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
