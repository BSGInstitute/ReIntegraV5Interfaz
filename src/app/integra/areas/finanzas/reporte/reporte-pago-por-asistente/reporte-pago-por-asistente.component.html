
<div class="row">
    <div class="col-1fa-rotate-270">
      <div class="card">
        <div class="card-header bg-color-material">
          <h1 class="text-white">Reporte pagos por asistentes</h1>
        </div>
        <div class="card-body p-4">
          <div class="k-loading-panel" *ngIf="loader">
            <div class="k-loading-panel-mask"></div>
            <div class="k-loading-panel-wrapper">
              <kendo-loader
                type="converging-spinner"
                themeColor="primary"
                size="large"
              >
              </kendo-loader>
              <div class="k-loading-panel-text fs-5 text-primary">
                Cargando...
              </div>
            </div>
          </div>
          <div class="row conteiner-toolbar-retiros-matricula">
            <div class="card" style="padding: 0px;"> 
                <div class="card-header bg-color-material pb-0">
                    <h3 class="text-white mb-2">Configuración de agrupación matrícula </h3>
                </div>
                <div  class="card-body p-4">
                    <app-configuracion-agrupacion-matricula>

                    </app-configuracion-agrupacion-matricula>
                </div>
            </div>
            <div style="height:15px;"></div>
            <div class="card" style="padding: 0px;"> 
                <div class="card-header bg-color-material pb-0">
                    <h3 class="text-white mb-2">Filtro </h3>
                </div>
                <div  class="card-body p-4">
                    <div class="row" style="display: flex; justify-content: center">
                        <div class="col-md-8">
                            <form class="k-form" [formGroup]="formGroupFiltro">
                                <fieldset class="k-form-fieldset">
                                    <div class="row" style="
                                                margin-top: 0px !important
                                            ">
                                                    <div class="col-md-1"></div>
                                                    <div class="col-md-3" style="
                                                    padding-right: 0px;
                                                    display: flex;
                                                    width: 182px;
                                                    padding-top: 5px
                                                ">
                                                        <label
                                                        [for]="fecha"
                                                        class="k-label"
                                                        style="width: fit-content;padding-top:5px;"
                                                      
                                                      >
                                                      Rango de fechas de pago :
                                                      </label>
                                                    </div>
                                                    <div class="col-md-7" style="padding-top: 5px;">
                                                        <div class="row" >
                                                            <kendo-daterange
                                                            [incompleteDateValidation]="true"
                                                            >
                                                                <div class="col-md-5"  >
                                                                      <kendo-dateinput
                                                                      kendoDateRangeStartInput
                                                                      [size]="'medium'"
                                                                      formControlName="fechaInicio"
                                                                      [placeholder]="'Inicio'"
                                                                      [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                      [incompleteDateValidation]="true"
                                                                      fillMode="outline"
                                                                      #fecha
                                                                      >
                                                                  </kendo-dateinput>
                                                                </div>
                                                                <div class="col-md-2" style="padding: 0%;width: 5%;text-align: center;"><p style="
                                                                    margin-bottom: 5px;"><strong>—</strong></p></div>
                                                                <div class="col-md-5">
                                                                      <kendo-dateinput
                                                                      kendoDateRangeEndInput
                                                                      [size]="'medium'"
                                                                      [placeholder]="'fin'"
                                                                      formControlName="fechaFin"
                                                                      [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                      [incompleteDateValidation]="true"
                                                                      fillMode="outline"
                                                                      ></kendo-dateinput>
                                                                </div>
                                                            </kendo-daterange>
                                                        </div>
                                                    </div>
                                                    <div class="col-md-1" style="display: flex; justify-content: end;">
                                                        <div style="width: fit-content;height: fit-content;">
                                                            <button
                                                            mat-raised-button
                                                            color="primary"
                                                            style="width: fit-content;height: fit-content;"
                                                            (click)="generarReporte()"
                                                          >
                                                            <mat-icon>search</mat-icon>
                                                             Buscar
                                                          </button>
                                                        </div>
                                                   
                                                    </div>
                                    </div>
                                </fieldset>
                              </form>    
                        </div>
                    </div>
                </div>
            </div>
            <div style="height:15px;"></div>
            <div class="card" style="padding: 0px;">
              <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Lista reporte pagos por asistente</h3>
              </div>
              <div  class="card-body p-4">
                <div  class="card-body p-4">
                <kendo-grid
                #grid
                [kendoGridBinding]="listaReporte"
                [pageSize]="10"
                [sortable]="true"
                [reorderable]="false"
                [resizable]="true"
                filterable="menu"
                [pageable]="true"
                style="max-height: 700px; border-top-width: 0px; padding: 0px"
              >
                <ng-template kendoGridToolbarTemplate>
                  <div
                    class="col-md-7"
                    style="display: flex; justify-content: start"
                  >
                     <button
                     (click)="excelexport.save()"
                     mat-raised-button
                     class="btn-export-excel"
                   >
                   <span class="k-icon k-i-file-excel k-icon-20"></span>
                     Exportar a Excel
                   </button>
                   <kendo-excelexport 
                   [data]="listaReporte" 
                   fileName="Reporte Pagos Por Asistentes.xlsx" #excelexport>
                     <kendo-excelexport-column field="codigo" title="Código Programa">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="estadoMatricula" title="Estado Matrícula">
                    </kendo-excelexport-column>
                     <kendo-excelexport-column field="codigoMatricula" title="Código de Matrícula">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="alumno" title="Alumno" [width]="300">
                     </kendo-excelexport-column>
                     
                     <kendo-excelexport-column field="agrupacionMat" title="Agrupación de matrícula">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="fechaVencimiento" title="Fecha Vencimiento Actual">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="cuota" title="Monto Cuota Actual">
                     </kendo-excelexport-column>
                     <kendo-excelexport-column field="fechaPago" title="Fecha Pago">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="montoPagado" title="Monto Pagado">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="saldoPendiente" title="Saldo Pendiente">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="mora" title="Mora">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="nroCuota" title="Nro Cuota">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="moneda" title="Moneda">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="totalCuotaD" title="Total Cuota Dolar">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="realPagoD" title="Real Pago Dolar">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="saldoPendienteD" title="Saldo Pendiente Dolar">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="paisAlumno" title="Pais">
                    </kendo-excelexport-column>
                    <kendo-excelexport-column field="coordinadoracobranza" title="Asistente de Cobranza">
                    </kendo-excelexport-column>
                   </kendo-excelexport>
                  </div>
                </ng-template>
                <kendo-grid-column
                  title="Código Programa"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="codigo"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Estado Matrícula"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="estadoMatricula"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Código Matrícula"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="codigoMatricula"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Alumno"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="alumno"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Agrupación de matrícula"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="agrupacionMat"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  title="Fecha Vencimiento Actual"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="fechaVencimiento"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                <ng-template kendoGridFilterMenuTemplate let-filter let-column="column" let-filterService="filterService">
                  <kendo-grid-date-filter-menu
                      [column]="column"
                      [format]="'dd-MM-yyyy'"
                      [filter]="filter"
                      [placeholder]="'dia-mes-año'"
                      [filterService]="filterService"
                      >
                  </kendo-grid-date-filter-menu>
                </ng-template>
              <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  {{finanzasService.fechaTemplate(dataItem.fechaVencimiento)}}
              </ng-template>
                </kendo-grid-column>
                <kendo-grid-column
                  title="Monto Cuota Actual"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="cuota"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                
                </kendo-grid-column>
                <kendo-grid-column
                  title="Fecha Pago"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="fechaPago"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                <ng-template kendoGridFilterMenuTemplate let-filter let-column="column" let-filterService="filterService">
                  <kendo-grid-date-filter-menu
                      [column]="column"
                      [format]="'dd-MM-yyyy'"
                      [filter]="filter"
                      [placeholder]="'dia-mes-año'"
                      [filterService]="filterService"
                      >
                  </kendo-grid-date-filter-menu>
                </ng-template>
              <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                  {{finanzasService.fechaTemplate(dataItem.fechaPago)}}
              </ng-template>
                </kendo-grid-column>
                <kendo-grid-column
                  title="Monto Pagado"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="montoPagado"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                
                </kendo-grid-column>
                <kendo-grid-column
                  title="Saldo Pendiente"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="saldoPendiente"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                
                </kendo-grid-column>
                <kendo-grid-column
                  title="Mora"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="mora"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                
                </kendo-grid-column>
                <kendo-grid-column
                  title="Nro Cuota"
                  headerClass="justify-content-center k-grid-header "
                  [width]="150"
                  field="nroCuota"
                  [locked]="false"
                  [sticky]="false"
                  [filterable]="true"
                  [hidden]="false"
                  [headerStyle]="{
                    'background-color': '#27ae60',
                    color: 'white'
                  }"
                >
                
                </kendo-grid-column>
                <kendo-grid-column
                title="Moneda"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="moneda"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
                [headerStyle]="{
                  'background-color': '#27ae60',
                  color: 'white'
                }"
              >
              
              </kendo-grid-column>
              <kendo-grid-column
                title="Total Cuota Dolar"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="totalCuotaD"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
                [headerStyle]="{
                  'background-color': '#27ae60',
                  color: 'white'
                }"
              >
              
              </kendo-grid-column>
              <kendo-grid-column
                title="Real Pago Dolar"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="realPagoD"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
                [headerStyle]="{
                  'background-color': '#27ae60',
                  color: 'white'
                }"
              >
              
              </kendo-grid-column>
              <kendo-grid-column
                title="Saldo Pendiente Dolar"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="saldoPendienteD"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
                [headerStyle]="{
                  'background-color': '#27ae60',
                  color: 'white'
                }"
              >
              
              </kendo-grid-column>
              <kendo-grid-column
                title="Pais"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="paisAlumno"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
                [headerStyle]="{
                  'background-color': '#27ae60',
                  color: 'white'
                }"
              >
              
              </kendo-grid-column>
              <kendo-grid-column
                title="Asistente de Cobranza"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="coordinadoracobranza"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
                [headerStyle]="{
                  'background-color': '#27ae60',
                  color: 'white'
                }"
              >
              
              </kendo-grid-column>
                <ng-template kendoGridNoRecordsTemplate>
                  <div>
                    <kendo-badge-container>
                      <kendo-icon name="cloud" size="large"></kendo-icon>
                      <kendo-badge position="inside">
                        <kendo-icon name="close" style="color: red"></kendo-icon>
                      </kendo-badge>
                    </kendo-badge-container>
                  </div>
                  <p>No hay registros cargados!</p>
                </ng-template>
                <ng-template
                  kendoPagerTemplate
                  let-totalPages="totalPages"
                  let-currentPage="currentPage"
                >
                  <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                  <kendo-pager-numeric-buttons
                    [buttonCount]="5"
                  ></kendo-pager-numeric-buttons>
                  <kendo-pager-next-buttons></kendo-pager-next-buttons>
                  
                  <kendo-pager-info></kendo-pager-info>
                  <kendo-pager-page-sizes
                    [pageSizes]="pageSizes"
                  ></kendo-pager-page-sizes>
                </ng-template>
                </kendo-grid>
              </div>
              </div>
          </div>
        </div> 
        </div>
      </div>
    </div>
  </div>
