
<div class="">
    <div class="row">
      <div class="col-1fa-rotate-270">
        <div class="card">
            <div class="card-header bg-color-material">
                <h1 class="text-white">Beneficios laborales del área comercial</h1>
            </div>
            <div  class="card-body p-4">
                <div class="row">
                    <div class="col-md-3"></div>
                    <div class="col-md-4 k-form-horizontal" >
                        <kendo-formfield orientation="horizontal" style="padding-bottom: 5%;">
                          <label [for]="dropdownlist" class="k-label">
                              <span
                              >Periodo :
                              </span>
                          </label>
                          <kendo-dropdownlist
                              [formControl]="periodo"
                              class="d-flex center"
                              size="medium"
                              #dropdownlist
                              [data]="listaPeriodo"
                              textField="nombre"
                              valueField="id"
                              [defaultItem]="{id:null,nombre:'< Selecciona un Periodo>'}"
                              [valuePrimitive]="true"
                              (selectionChange)="BuscarDatosByPeriodo($event)"
                          >
                          </kendo-dropdownlist>
                        </kendo-formfield> 
                    </div>  
                    <div class="col-md-1">
                        <button
                        kendoButton 
                        icon="k-icon k-i-save k-icon-20"
                        type="button"
                        themeColor="primary"
                        (click)="insertarBeneficioPorPeriodo()"
                        >
                        Guardar
                    </button> 
                    </div>
                    <div class="col-md-3"></div>                      
                </div>
                <br>
                <div class="row">
                    <div class="col-md-12">
                      <div class="card-header bg-color-material col-md-12">
                          <div class="row col-md-12">
                              <div div class="col-md-12" style="text-align: left;">
                                <div class="row">
                                  <div class="col-md-7">
                                    <button
                                      kendoButton 
                                      style="margin-right: 1rem;"
                                      icon="k-icon k-i-file-excel k-icon-20"
                                      type="button"
                                      themeColor="tertiary"
                                      (click)="excelexport.save()"
                                      >
                                      Exportar a Excel
                                    </button>
                                    
                                    <kendo-excelexport 
                                    [data]="listaGrid" 
                                    fileName="BeneficioLaboralComercial.xlsx" #excelexport>
                                      <kendo-excelexport-column field="tipoPersona" title="Tipo Personal">
                                      </kendo-excelexport-column>
                                      <kendo-excelexport-column field="sueldo" title="Sueldo">
                                      </kendo-excelexport-column>
                                      <kendo-excelexport-column field="comisiones" title="Comisiones">
                                      </kendo-excelexport-column>
                                      <kendo-excelexport-column field="sistemaPensionario" title="Sistema pensionario">
                                      </kendo-excelexport-column>
                                      <kendo-excelexport-column field="rentaQuintaCategoria" title="Renta Quinta Categoria">
                                      </kendo-excelexport-column>
                                      <kendo-excelexport-column field="esSalud" title="EsSalud">
                                      </kendo-excelexport-column>
                                      <kendo-excelexport-column field="cts" title="CTS">
                                      </kendo-excelexport-column>
                                      <kendo-excelexport-column field="gratificacion" title="Gratificación">
                                      </kendo-excelexport-column>
                                      <kendo-excelexport-column field="participacionesUtilidades" title="Participación Utilidades">
                                      </kendo-excelexport-column>
                                      <kendo-excelexport-column field="publicidad" title="Publicidad">
                                      </kendo-excelexport-column>
                                    </kendo-excelexport>
                                  </div>
                                </div>
                              </div>
                          </div>
                      </div>
                      <kendo-grid
                      [data]="listaGrid"
                      [loading]="loader"
                      [pageSize]="5"
                      [sortable]="true"
                      [reorderable]="true"
                      [resizable]="true"
                      [columnMenu]="{ filter: true }"
                      [selectable]="{ enabled: true, checkboxOnly: true }"
                      [pageable]="{
                        buttonCount: 5,
                        info: true,
                        type: 'numeric',
                        pageSizes: true,
                        previousNext: true,
                        position: 'bottom'
                      }"
                      (cellClick)="cellClickHandler($event)"
                      (cellClose)="cellCloseHandler($event)"
                      [navigable]="true"
                      >
                        <kendo-grid-column
                            title="Tipo Personal"
                            headerClass="justify-content-center k-grid-header "
                            [width]="135"
                            field="tipoPersona"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                            [resizable]="false"
                            [editable]="false"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Sueldo"
                            headerClass="justify-content-center k-grid-header "
                            [width]="100"
                            field="sueldo"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                            [resizable]="false"
                            editor="numeric"
                          >

                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Comisiones"
                            headerClass="justify-content-center k-grid-header "
                            [width]="130"
                            field="comisiones"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                            [resizable]="false"
                            editor="numeric"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Sistema pensionario"
                            headerClass="justify-content-center k-grid-header "
                            [width]="175"
                            field="sistemaPensionario"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                            [resizable]="false"
                            editor="numeric"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Renta Quinta Categoria"
                            headerClass="justify-content-center k-grid-header "
                            [width]="200"
                            field="rentaQuintaCategoria"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                            [resizable]="false"
                            editor="numeric"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="EsSalud"
                            headerClass="justify-content-center k-grid-header "
                            [width]="100"
                            field="esSalud"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                            [resizable]="false"
                            editor="numeric"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="CTS"
                            headerClass="justify-content-center k-grid-header "
                            [width]="90"
                            field="cts"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                            [resizable]="false"
                            editor="numeric"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Gratificación"
                            headerClass="justify-content-center k-grid-header "
                            [width]="130"
                            field="gratificacion"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                            [resizable]="false"
                            [resizable]="false"
                            editor="numeric"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Participación Utilidades"
                            headerClass="justify-content-center k-grid-header "
                            [width]="205"
                            field="participacionesUtilidades"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                            [resizable]="false"
                            editor="numeric"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Publicidad"
                            headerClass="justify-content-center k-grid-header "
                            [width]="115"
                            field="publicidad"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                            [resizable]="false"
                            editor="numeric"
                            
                          >
                          </kendo-grid-column>
                      </kendo-grid>
                      
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
