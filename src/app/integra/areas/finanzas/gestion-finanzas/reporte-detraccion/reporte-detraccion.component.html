<div class="">
    <div class="row">
        <div class="col-1fa-rotate-270">
            <div class="card">
                <div class="card-header bg-color-material">
                    <h1 class="text-white">Reporte Detracción</h1>
                </div>
                <div  class="card-body p-4">
                    <div class="col-md-12">
                        <div class="row">
                            <div class="card" style="padding: 0px;">
                                <div class="card-header bg-color-material pb-0">
                                    <h3 class="text-white mb-2">Filtro de Busqueda</h3>
                                </div>
                                <div  class="card-body p-4">
                                    <div class="row">
                                        <form class="k-form" [formGroup]="formGroupFiltro" style="
                                        padding-left: 5%;"   >
                                            <fieldset class="k-form-fieldset">
                                                <div class="row">
                                                    <div class="col-md-4">
                                                        <div class="row">
                                                            <kendo-formfield >
                                                                <div class="row">
                                                                    <label [for]="idSede" >
                                                                        <span
                                                                          >Sede :</span
                                                                        >
                                                                      </label>
                                                                </div>
                                                                <div class="row">
                                                                    <kendo-multiselect
                                                                    #idSede
                                                                    [style.width.%]="80"
                                                                    size="small"
                                                                    formControlName="idSede"
                                                                    class="d-flex center"
                                                                    [data]="listaSede"
                                                                    textField="nombre"
                                                                    valueField="id"
                                                                    [valuePrimitive]="true"
                                                                    placeholder="< Seleccionar sedes >"
                                                                  >
                                                                  </kendo-multiselect>
                                                                </div>
                                                            </kendo-formfield>
                                                        </div>
                                                    </div>
                                                    <div class="col-md-4">
                                                        <div class="row">
                                                            <kendo-formfield >
                                                                <div class="row">
                                                                    <label [for]="idProveedor"  class="k-label">
                                                                        <span
                                                                          >RUC :</span
                                                                        >
                                                                      </label>
                                                                </div>
                                                                <div class="row">
                                                                    <kendo-dropdownlist
                                                                    #idProveedor
                                                                    [style.width.%]="80"
                                                                    size="small"
                                                                    formControlName="idProveedor"
                                                                    class="d-flex center"
                                                                    [data]="listaComboRuc"
                                                                    textField="nroDocIdentidad"
                                                                    valueField="id"
                                                                    [defaultItem]="{id:null,nroDocIdentidad:'< Seleccionar RUC >'}"
                                                                    [valuePrimitive]="true"
                                                                    [filterable]="true"
                                                                    (filterChange)="filterChangeRUC($event)"
                                                                  >
                                                                  </kendo-dropdownlist>
                                                                </div>
                                                            </kendo-formfield>
                                                        </div>
                                                    </div>
                                                    <div class="col-md-4">
                                                        <div class="row">
                                                            <label  class="k-label" style="padding-top: 4%;" >
                                                                <span
                                                                  >Fecha de Emisión :</span
                                                                >
                                                            </label>
                                                            <div class="row" style="padding: 0%;">
                                                                <kendo-daterange
                                                                [incompleteDateValidation]="true"
                                                                >
                                                                    <div class="col-md-5">
                                                                        <kendo-dateinput
                                                                        kendoDateRangeStartInput
                                                                        size="small"
                                                                        formControlName="fechaInicio"
                                                                        [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                        placeholder="Inicio"
                                                                        [incompleteDateValidation]="true"
                                                                        ></kendo-dateinput>
                                                                    </div>
                                                                    <div class="col-md-2" style="padding: 0%;width: 5%;text-align: center;"><p style="
                                                                        margin-bottom: 5px;"><strong>—</strong></p></div>
                                                                    <div class="col-md-5">
                                                                        <kendo-dateinput
                                                                        kendoDateRangeEndInput
                                                                        size="small"
                                                                        placeholder="Fin"
                                                                        formControlName="fechaFinal"
                                                                        [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                        [incompleteDateValidation]="true"
                                                                        ></kendo-dateinput>
                                                                    </div>
                                                                    
                                                                </kendo-daterange>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <br>
                                                <div class="row" style="justify-content: right;">
                                                    
                                                    <div class="col-md-1" style="padding: 0%;">
                                                        <button mat-raised-button color="primary" 
                                                        (click)="generarReporte()"
                                                        >
                                                            <mat-icon>search</mat-icon>
                                                            Buscar
                                                        </button>
                                                    </div>    
                                                    <div class="col-md-1" style="padding: 0%;width: 52px;"></div>
                                                    
                                                </div>
                                            </fieldset>  
                                        </form>
                                            
                                    </div>
                                    <div class="row"></div>
                                </div>
                            </div>
                        </div>
                        <br>
                        <div class="row">
                            <div class="card" style="padding: 0px;">
                                <div class="card-header bg-color-material pb-0">
                                    <h3 class="text-white mb-2">Lista de Datos Reporte Detracción</h3>
                                </div>
                                <div  class="card-body p-4" >
                                    <div class="row">
                                        <kendo-grid
                                        [kendoGridBinding]="listareporteDetraccion"
                                        [loading]="loaderReporteDetraccion"
                                        [pageSize]="5"
                                        [sortable]="true"
                                        [reorderable]="true"
                                        [resizable]="true"
                                        [columnMenu]="{ filter: true }"
                                        [pageable]="{
                                          buttonCount: 5,
                                          info: true,
                                          type: 'numeric',
                                          pageSizes: true,
                                          previousNext: true,
                                          position: 'bottom'
                                        }"                          
                                        >
                                        <ng-template kendoGridToolbarTemplate class="bg-danger">
                                            <button
                                            kendoButton 
                                            icon="k-icon k-i-file-excel k-icon-20"
                                            type="button"
                                            themeColor="tertiary"
                                            (click)="excelexport.save()"
                                            >
                                            Exportar a Excel
                                            </button>
                                            
                                            <kendo-excelexport 
                                            [data]="listareporteDetraccion" 
                                            fileName="LstaReporteDetraccion" #excelexport>
                                              <kendo-excelexport-column field="sede" title="Sede">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="nroDocIdentidad" title="Ruc">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="nombreProveedor" title="Razón Social">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="numeroComprobante" title="Comprobante(Serie-Número)">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="nombreMoneda" title="Moneda">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="montoBruto" title="Monto Bruto">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="montoIgv" title="Monto de IGV">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="montoNeto" title="Monto a Pagar">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="porcentajeDetraccion" title="(%) Detracción">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="montoDetraccion" title="Monto Detracción">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="fechaEmision" title="Fecha Emisión">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="fechaVencimiento" title="Fecha Vencimiento">
                                              </kendo-excelexport-column>
                                              <kendo-excelexport-column field="periodoTributario" title="Periodo Tirbutario">
                                              </kendo-excelexport-column>
                                            </kendo-excelexport>
                                            <kendo-grid-spacer></kendo-grid-spacer>
                                          </ng-template>
                                          <kendo-grid-column
                                              title="Sede"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="200"
                                              field="sede"
                                              [locked]="false"
                                              [sticky]="true"
                                              [filterable]="true"
                                              [hidden]="false"
                                              
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Ruc"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="150"
                                              field="nroDocIdentidad"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Razón Social"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="150"
                                              field="nombreProveedor"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Comprobante(Serie-Número)"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="250"
                                              field="numeroComprobante"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Moneda"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="150"
                                              field="nombreMoneda"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Monto Bruto"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="150"
                                              field="montoBruto"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Monto de IGV"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="150"
                                              field="montoIgv"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Monto a Pagar"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="150"
                                              field="montoNeto"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >

                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="(%) Detracción"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="150"
                                              field="porcentajeDetraccion"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Monto Detracción"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="200"
                                              field="montoDetraccion"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Fecha Emisión"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="200"
                                              field="fechaEmision"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Fecha Vencimiento"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="200"
                                              field="fechaVencimiento"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <kendo-grid-column
                                              title="Periodo Tirbutario"
                                              headerClass="justify-content-center k-grid-header "
                                              [width]="200"
                                              field="periodoTributario"
                                              [locked]="false"
                                              [sticky]="false"
                                              [filterable]="true"
                                              [hidden]="false"
                                              [resizable]="true"
                                            >
                                            </kendo-grid-column>
                                            <ng-template kendoGridNoRecordsTemplate>
                                                <div>
                                                  <kendo-badge-container>
                                                    <kendo-icon name="cloud" size="large"></kendo-icon>
                                                    <kendo-badge position="inside">
                                                      <kendo-icon name="close" style="color: red;" ></kendo-icon>
                                                    </kendo-badge>
                                                  </kendo-badge-container>
                                                </div>
                                                <p>No hay registros cargados!</p>
                                            </ng-template>
                                        </kendo-grid>
                                    </div>
                                </div>
                            </div>
                        </div>    
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
