
<div class="">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Panel Deposito Disponible</h3>
        </div>
        <div class="card-body p-4">
          <div class="row">
            <div class="col">
              <kendo-grid
                [kendoGridBinding]="gridDisponibilidadFlujoEfectivo.data"
                filterable="menu"
                [sortable]="true"
                [resizable]="true"
                [pageable]="gridDisponibilidadFlujoEfectivo.pageable"
                [skip]="gridDisponibilidadFlujoEfectivo.gridState.skip"
                [pageSize]="gridDisponibilidadFlujoEfectivo.gridState.take"
                [sort]="gridDisponibilidadFlujoEfectivo.gridState.sort"
              >
                <ng-template kendoGridToolbarTemplate>
                  <button
                    kendoButton
                    icon="reload"
                    fillMode="flat"
                    themeColor="secondary"
                    (click)="ObtenerDsiponibilidadFlujoEfectivo()"
                  ></button>
                  <kendo-grid-spacer></kendo-grid-spacer>
                  <button
                    kendoButton
                    themeColor="primary"
                    icon="plus"
                    (click)="abrirModal2(true)"

                  >
                    Agregar
                  </button>
                </ng-template>

                <kendo-grid-column
                  field="formaPago"
                  title="Forma de Pago"
                  [filterable]="true"
                  [headerClass]="'header-grid-integra'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="diasDeposito"
                  title="Dias Deposito"
                  [filterable]="true"
                  [headerClass]="'header-grid-integra'"
                >
                </kendo-grid-column>

                <kendo-grid-column
                  field="diasDisponible"
                  title="Dias Disponible"
                  [filterable]="true"
                  [headerClass]="'header-grid-integra'"
                >
                </kendo-grid-column>

                <kendo-grid-column
                  field="cuentaFeriados"
                  title="Cuenta Feriados"
                  [filterable]="true"
                  [headerClass]="'header-grid-integra'"


                >
                <ng-template kendoGridCellTemplate let-dataItem >
                  <ng-container *ngIf="dataItem.cuentaFeriados==true">
                      <span class="k-icon  k-i-check-outline k-icon-30" style="color:rgb(105, 185, 105);font-size: 30px;"></span>
                  </ng-container>
                  <ng-container *ngIf="dataItem.cuentaFeriados==false">
                      <span class="k-icon k-i-x-outline k-icon-30" style="color:rgb(179, 97, 90);font-size: 30px;"></span>
                  </ng-container>

              </ng-template>

                </kendo-grid-column>

                <kendo-grid-column
                  field="cuentaFeriadosEstatales"
                  title="Cuenta Feriados Estatales"
                  [filterable]="true"
                  [headerClass]="'header-grid-integra'"
                >
                <ng-template kendoGridCellTemplate let-dataItem >
                  <ng-container *ngIf="dataItem.cuentaFeriadosEstatales==true">
                      <span class="k-icon  k-i-check-outline k-icon-30" style="color:rgb(105, 185, 105);font-size: 30px;"></span>
                  </ng-container>
                  <ng-container *ngIf="dataItem.cuentaFeriadosEstatales==false">
                      <span class="k-icon k-i-x-outline k-icon-30" style="color:rgb(179, 97, 90);font-size: 30px;"></span>
                  </ng-container>

              </ng-template>
                </kendo-grid-column>

                <kendo-grid-column
                  field="consideraVSD"
                  title="Logica Vie-Sab-Dom Feriados"
                  [filterable]="true"
                  [headerClass]="'header-grid-integra'"
                >
                <ng-template kendoGridCellTemplate let-dataItem >
                  <ng-container *ngIf="dataItem.consideraVSD==true">
                      <span class="k-icon  k-i-check-outline k-icon-30" style="color:rgb(105, 185, 105);font-size: 30px;"></span>
                  </ng-container>
                  <ng-container *ngIf="dataItem.consideraVSD==false">
                      <span class="k-icon k-i-x-outline k-icon-30" style="color:rgb(179, 97, 90);font-size: 30px;"></span>
                  </ng-container>

              </ng-template>
                </kendo-grid-column>

                <kendo-grid-column
                  field="consideraDiasHabilesLunesViernes"
                  title="Considera solo Dias Habiles L-V"
                  [filterable]="true"
                  [headerClass]="'header-grid-integra'"
                >
                <ng-template kendoGridCellTemplate let-dataItem >
                  <ng-container *ngIf="dataItem.consideraDiasHabilesLunesViernes==true">
                      <span class="k-icon  k-i-check-outline k-icon-30" style="color:rgb(105, 185, 105);font-size: 30px;"></span>
                  </ng-container>
                  <ng-container *ngIf="dataItem.consideraDiasHabilesLunesViernes==false">
                      <span class="k-icon k-i-x-outline k-icon-30" style="color:rgb(179, 97, 90);font-size: 30px;"></span>
                  </ng-container>

              </ng-template>
                </kendo-grid-column>

                <kendo-grid-column
                  field="consideraDiasHabilesLunesSabado"
                  title="Considera solo Dias Habiles L-S"
                  [filterable]="true"
                  [headerClass]="'header-grid-integra'"
                >
                <ng-template kendoGridCellTemplate let-dataItem >
                  <ng-container *ngIf="dataItem.consideraDiasHabilesLunesSabado==true">
                      <span class="k-icon  k-i-check-outline k-icon-30" style="color:rgb(105, 185, 105);font-size: 30px;"></span>
                  </ng-container>
                  <ng-container *ngIf="dataItem.consideraDiasHabilesLunesSabado==false">
                      <span class="k-icon k-i-x-outline k-icon-30" style="color:rgb(179, 97, 90);font-size: 30px;"></span>
                  </ng-container>

              </ng-template>
                </kendo-grid-column>

                <kendo-grid-column
                  field="consideraDiasFijoSemana"
                  title="Considera un dia Fijo Semana"
                  [filterable]="true"
                  [headerClass]="'header-grid-integra'"
                >
                <ng-template kendoGridCellTemplate let-dataItem >
                  <ng-container *ngIf="dataItem.consideraDiasFijoSemana==true">
                      <span class="k-icon  k-i-check-outline k-icon-30" style="color:rgb(105, 185, 105);font-size: 30px;"></span>
                  </ng-container>
                  <ng-container *ngIf="dataItem.consideraDiasFijoSemana==false">
                      <span class="k-icon k-i-x-outline k-icon-30" style="color:rgb(179, 97, 90);font-size: 30px;"></span>
                  </ng-container>

              </ng-template>
                </kendo-grid-column>
                <kendo-grid-column
                field="porcentajeCobro"
                title="% Cobro"
                [filterable]="true"
                [headerClass]="'header-grid-integra'"
              >
              </kendo-grid-column>



                <kendo-grid-command-column
                  title="Editar"
                  [width]="150"
                  [headerClass]="'header-grid-integra'"
                >
                  <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                    <div class="w-100 d-flex justify-content-center">
                      <button
                        kendoButton
                        themeColor="warning"
                        fillMode="solid"
                        rounded="large"
                        size="large"
                        class="p-2 me-1 ms-1"
                        container="body"
                        (click)="abrirModal2(false, dataItem)"

                        placement="top"
                        ngbTooltip="Editar"
                      >
                        <span class="k-icon k-i-edit k-icon-20"></span>
                      </button>


                    </div>
                  </ng-template>
                </kendo-grid-command-column>
              </kendo-grid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>


<ng-template #modalDisponibilidadFlujo let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title">
      {{ isNew ? "Datos de Panel Deposito Disponible" : "Datos de Panel Deposito Disponible" }}
    </h3>
    <button
      type="button"
      class="btn-close btn-close-white"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <form class="k-form k-form-horizontal" [formGroup]="formDisponibilidadFlujo">
      <fieldset class="k-form-fieldset">
        <div class="col-sm-12 col-md-12">
          <kendo-formfield orientation="horizontal">
            <label [for]="formaPago" class="k-label">
              <span> Forma Pago <span class="text-danger fw-bold">*</span></span>
            </label>
            <kendo-dropdownlist
              #formaPago
              formControlName="formaPago"
              class="d-flex"
              size="medium"
              [data]="comboFormaPago"
              [defaultItem]="{
                descripcion:'<Seleccione un tab>',
                id: null
              }"
              textField="descripcion"
              valueField="id"

              [valuePrimitive]="true"

            >
            </kendo-dropdownlist>
            <kendo-formerror> </kendo-formerror>
          </kendo-formfield>
        </div>

        <div class="row">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="diasDeposito" class="k-label">
                <span>Dias para Deposito <span class="text-danger fw-bold">*</span></span>
              </label>
              <kendo-numerictextbox
                #diasDeposito
                orientation="horizontal"
                [style.width.px]="170"
                formControlName="diasDeposito"
                [min]="0"
                [autoCorrect]="true"
                [decimals]="0"
                [format]="'0'"
              >
              </kendo-numerictextbox>
              <kendo-formhint> Dians de Deposito</kendo-formhint>
              <kendo-formerror> {{ getErrorMessage("diasDeposito") }} </kendo-formerror>
            </kendo-formfield>
          </div>
        </div>

        <div class="row">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="diasDisponible" class="k-label">
                <span>Dias para Disponiblidad <span class="text-danger fw-bold">*</span></span>
              </label>
              <kendo-numerictextbox
                #diasDisponible
                orientation="horizontal"
                [style.width.px]="170"
                formControlName="diasDisponible"
                [min]="0"
                [autoCorrect]="true"
                [decimals]="0"
                [format]="'0'"
              >
              </kendo-numerictextbox>
              <kendo-formhint>Dias Disponibles </kendo-formhint>
              <kendo-formerror> {{ getErrorMessage("diasDisponible") }} </kendo-formerror>
            </kendo-formfield>
          </div>
        </div>

        <div class="row">
          <div class="col-sm-12 col-md-12 checkbox-align-center">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                [for]="cuentaFeriados"
                text="Visualizar Cuenta Feriados"
              ></kendo-label>
              <div class="h-100 d-flex align-items-center">
                <input
                  #cuentaFeriados
                  formControlName="cuentaFeriados"
                  type="checkbox"
                  size="medium"
                  rounded="medium"
                  kendoCheckBox
                />
              </div>

            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-12 col-md-12 checkbox-align-center">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                [for]="cuentaFeriadosEstatales"
                text="Cuenta Feriados Estatales"
              ></kendo-label>
              <div class="h-100 d-flex align-items-center">
                <input
                  #cuentaFeriadosEstatales
                  formControlName="cuentaFeriadosEstatales"
                  type="checkbox"
                  size="medium"
                  rounded="medium"
                  kendoCheckBox
                />
              </div>

            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-12 col-md-12 checkbox-align-center check-integra">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                [for]="LogicaVieSabDom"
                text="Logica Vie-Sab-Dom"
              ></kendo-label>
              <div class="h-100 d-flex align-items-center">
                <input
                  #LogicaVieSabDom
                  formControlName="consideraVSD"
                  type="checkbox"
                  size="medium"
                  rounded="medium"
                  (change)="checkConsideraVSD($event)"
                  kendoCheckBox
                />
              </div>


            </kendo-formfield>
          </div>
        </div>

        <div class="row">
          <div class="col-sm-12 col-md-12 checkbox-align-center check-integra">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                [for]="considerarDiaFijoSemana"
                text="Considera Dia Fijo Semana"
              ></kendo-label>
              <div class="h-100 d-flex align-items-center">
                <input
                  #considerarDiaFijoSemana
                  formControlName="consideraDiasFijoSemana"
                  size="medium"
                  rounded="medium"
                  type="checkbox"
                  kendoCheckBox
                  (change)="checkConsiderarDiaFijo($event)"
                />

              </div>

            </kendo-formfield>
          </div>
        </div>

        <div class="row" *ngIf="showDiaFijoSemana">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="diaFijoSemanaa" class="k-label">
                <span> Dia Fijo Semana
               <span class="text-danger fw-bold">*</span></span>
              </label>
              <kendo-dropdownlist
              #diaFijoSemanaa
              formControlName="idDiaSemanaFijo"
              class="d-flex"
              size="medium"
              [data]="comboDiaFijoSemana"
              [defaultItem]="{
                nombre: '<Seleccione >',
                id: null
              }"
              textField="nombre"
              valueField="id"
              [required]="showDiaFijoSemana"
              [valuePrimitive]="true"
            >
            </kendo-dropdownlist>
              <kendo-formhint></kendo-formhint>
              <kendo-formerror>
                {{ "" }}
              </kendo-formerror>
            </kendo-formfield>
          </div>
        </div>

        <div class="row">
          <div class="col-sm-12 col-md-12 checkbox-align-center">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                [for]="considerarDiashabilesLV"
                text="Considera Solo Dias Habiles L-V"
              ></kendo-label>
              <div class="h-100 d-flex align-items-center">
                <input
                  #considerarDiashabilesLV
                  formControlName="consideraDiasHabilesLunesViernes"
                  type="checkbox"
                  size="medium"
                  rounded="medium"
                  kendoCheckBox
                />
              </div>

            </kendo-formfield>
          </div>
        </div>


        <div class="row">
          <div class="col-sm-12 col-md-12 checkbox-align-center">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                [for]="considerarDiasHabilesLS"
                text="Considera Solo Dias Habiles L-S"
              ></kendo-label>
              <div class="h-100 d-flex align-items-center">
                <input
                  #considerarDiasHabilesLS
                  formControlName="consideraDiasHabilesLunesSabado"
                  type="checkbox"
                  size="medium"
                  rounded="medium"
                  kendoCheckBox
                />
              </div>

            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="horacorte" class="k-label"> hora corte: </label>

              <kendo-timepicker
              #horacorte
              format="hh:mm a"
              formControlName="horaNuevaCorte"
            ></kendo-timepicker>
            </kendo-formfield>
          </div>
        </div>

        <div class="row">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="porcentajeCobro" class="k-label">
                <span>% Cobro
                  <span class="text-danger fw-bold">*</span></span>
              </label>
              <kendo-numerictextbox
                #porcentajeCobro
                orientation="horizontal"
                [style.width.px]="170"
                formControlName="porcentajeCobro"
                [min]="0"
                [autoCorrect]="true"
                [decimals]="2"
                [format]="'0'"

              >
              </kendo-numerictextbox>
              <kendo-formhint> Dians de Deposito</kendo-formhint>
              <kendo-formerror> {{ getErrorMessage("porcentajeCobro") }} </kendo-formerror>
            </kendo-formfield>
          </div>
        </div>





      </fieldset>
    </form>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button kendoButton
      *ngIf="isNew"
       themeColor="primary"
       (click)="crearDisponibilidadFlujo()"
       >Guardar</button>

      <button kendoButton
      *ngIf="!isNew"
      themeColor="tertiary"
      (click)="Actualizar()"
      >
        Actualizar
      </button>

      <button
        themeColor="error"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
</ng-template>
