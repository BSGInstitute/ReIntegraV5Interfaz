

<div class="">
    <div class="row">
        <div class="col-1fa-rotate-270">
            <div class="card">
                <div class="card-header bg-color-material">
                    <h1 class="text-white">Comisiones por Matrículas</h1>
                </div>
                <div  class="card-body p-4">
                    <div class="row">
                        <div class="col-md-2"></div>
                        <div class="col-md-8 element" >
                            <div class="row">
                                <div class="card-header bg-color-material pb-0">
                                    <h3 class="text-white mb-2">Filtro de Busqueda</h3>
                                </div>
                            </div>
                            <div class="row" style="margin: 2%;">
                                <div class="col-md-8">
                                    
                                    <div class="row">
                                        <kendo-daterange>
                                            <div class="row">
                                                <div class="col-md-1"></div>
                                                <div class="col-md-4">
                                                    <div class="row">
                                                        <div class="col-md-7" 
                                                        style="
                                                        padding-top: 5px;
                                                        padding-right: 0px !important;
                                                        padding-left: 0px !important;">
                                                            Fecha Inicio :
                                                        </div>
                                                        <div class="col-md-3" style=" padding:0px;">
                                                            <kendo-dateinput
                                                                kendoDateRangeStartInput
                                                                [formControl]="fechaInicio"
                                                                [incompleteDateValidation]="true"
                                                                [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                placeholder="dia-mes-año"
                                                                [rangeValidation]="true"
                                                            ></kendo-dateinput>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-md-2"></div>
                                                <div class="col-md-4">
                                                    <div class="row">
                                                        <div class="col-md-7" style="padding-top: 5px;padding-right: 0px !important;">
                                                            Fecha Fin :
                                                        </div>
                                                        <div class="col-md-3" style=" padding:0px;">
                                                            <kendo-dateinput
                                                                kendoDateRangeEndInput
                                                                [formControl]="fechaFin"
                                                                [incompleteDateValidation]="true"
                                                                [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                placeholder="dia-mes-año"
                                                                [rangeValidation]="true"
                                                            ></kendo-dateinput>
                                                        </div>
                                                        <div class="col-md-2"></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </kendo-daterange>
                                    </div>
                                    <br>
                                    <div class="row"> 
                                        <div class="col-md-5 " style="margin-left: 5%;">
                                            <kendo-formfield orientation="horizontal">
                                                <label [for]="paisesBD" class="k-label" style="margin-bottom: 5px;">
                                                    <span
                                                    >Asesor(es) :</span>
                                                </label>

                                                <kendo-multiselect
                                                    #paisesBD
                                                    [formControl]="asesor"
                                                    [data]="itemslistaAsesores"
                                                    class="d-flex"
                                                    size="medium"
                                                    textField="nombreCompleto"
                                                    [valuePrimitive]="true"
                                                    valueField="id"
                                                    placeholder="< Todos >"
                                                    [filterable]="true"
                                                    (filterChange)="FiltrarAsesores($event)"
                                                >
                                                </kendo-multiselect>
                                            </kendo-formfield>
                                        </div>
                                        <div class="col-md-5 " style="margin-left: 3.5%;"> 
                                            <div class="row">
                                                <kendo-formfield orientation="horizontal" style="padding-bottom: 5%;">
                                                    <label [for]="dropdownlist" class="k-label" style="margin-bottom: 5px;">
                                                        <span
                                                        >Estado :
                                                        </span>
                                                    </label>
                                                    <kendo-dropdownlist
                                                        [formControl]="estado"
                                                        class="d-flex center"
                                                        size="medium"
                                                        #dropdownlist
                                                        [data]="listaEstado"
                                                        textField="nombre"
                                                        valueField="id"
                                                        [defaultItem]="{id:null,nombre:'< Seleccionar >'}"
                                                        [valuePrimitive]="true"
                                                        (selectionChange)="SeleccionEstado($event)"
                                                    >
                                                    </kendo-dropdownlist>
                                                </kendo-formfield> 
                                            </div>
                                            <div class="row" *ngIf="activarSubEstado">
                                                <kendo-formfield orientation="horizontal" style="padding-bottom: 5%;">
                                                    <label [for]="dropdownlist" class="k-label" style="margin-bottom: 5px;">
                                                        <span
                                                        >Subestado :
                                                        </span>
                                                    </label>
                                                    <kendo-dropdownlist
                                                        [formControl]="subestado"
                                                        class="d-flex center"
                                                        size="medium"
                                                        #dropdownlist
                                                        [data]="listaSubestado"
                                                        textField="nombre"
                                                        valueField="id"
                                                        [defaultItem]="{id:null,nombre:'< Seleccionar >'}"
                                                        [valuePrimitive]="true"
                                                    >
                                                    </kendo-dropdownlist>
                                                </kendo-formfield> 
                                            </div>
                                        </div>
                                    </div>
                                    <br>
                                </div>
                                <div class="col-md-4"> 
                                    <div class="row">
                                        <div class="col-md-2"></div>
                                        <div class="col-md-6">
                                            <button
                                                style="margin-top: 1.5rem;"
                                                kendoButton 
                                                icon="k-icon k-i-search k-icon-20"
                                                type="button"
                                                themeColor="primary"
                                                (click)="GenerarReporte()"
                                                >
                                                Generar Reporte
                                            </button>
                                        </div>
                                        <div class="col-md-4"></div>

                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-2"></div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="col-md-12">
                          <div class="card-header bg-color-material col-md-12">
                              <div class="row col-md-12">
                                  <div div class="col-md-12" style="text-align: left;">
                                    <div class="row">
                                      <div class="col-md-7">
                                        <button
                                          kendoButton 
                                          style="margin-right: 1rem;"
                                          icon="k-icon k-i-file-excel k-icon-20"
                                          type="button"
                                          themeColor="tertiary"
                                          (click)="excelexport.save()"
                                          >
                                          Exportar a Excel
                                        </button>
                                        
                                        <kendo-excelexport 
                                        [data]="listaGrilla" 
                                        fileName="ComisionesPorMatricula.xlsx" #excelexport>
                                          <kendo-excelexport-column field="fechaMatricula" title="Fecha Matrícula">
                                          </kendo-excelexport-column>
                                          <kendo-excelexport-column field="nombrePrograma" title="Programa">
                                          </kendo-excelexport-column>
                                          <kendo-excelexport-column field="codigoMatricula" title="Código Matrícula">
                                          </kendo-excelexport-column>
                                          
                                          <kendo-excelexport-column field="alumno" title="Alumno">
                                          </kendo-excelexport-column>
                                          <kendo-excelexport-column field="asesor" title="Asesor">
                                          </kendo-excelexport-column>
                                          <kendo-excelexport-column field="coordinador" title="Coordinador">
                                          </kendo-excelexport-column>
                                          <kendo-excelexport-column field="supervisor" title="Supervisor">
                                          </kendo-excelexport-column>
                                        <kendo-excelexport-column field="asistente" title="Asistente">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="pais" title="País">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="versionMatricula" title="Versión Matrícula">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="precioPrograma" title="Precio del Programa">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="monedaPrecioPrograma" title="Moneda de Precio de Programa">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="totalPagar" title="Precio a Pagar">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="monedaTotalPagar" title="Moneda de Precio a Pagar">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="totalPagarDolares" title="Precio a pagar Dolares">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="precioMatriculaPrograma" title="Precio de Matrícula">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="monedaPrecioMatriculaPrograma" title="Moneda de Precio Matrícula">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="montoPagadoHastaAhora" title="Monto Actual Pagado">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="monedaMontoPagadoHastaAhora" title="Moneda de Monto Actual Pagado">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="nombreTieneDocumento" title="Documento">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="fechaEntregaDocumento" title="Fecha Entrega DOC.">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="observacionDocumento" title="Observación DOC.">
                                        </kendo-excelexport-column>
                                        <kendo-excelexport-column field="observacion" title="Observación General">
                                        </kendo-excelexport-column>
                                        </kendo-excelexport>
                                      </div>
                                    </div>
                                  </div>
                              </div>
                          </div>
                          <kendo-grid
                          [kendoGridBinding]="listaGrilla"
                          [loading]="loader"
                          [pageSize]="5"
                          [sortable]="true"
                          [reorderable]="true"
                          [resizable]="true"
                          [columnMenu]="{ filter: true }"
                          [pageable]="true"
                          style="max-height: 700px"                         
                          [pageable]="true"
                          style="max-height: 700px"                         
                          >
                            <kendo-grid-column
                                title="Fecha Matrícula"
                                headerClass="justify-content-center k-grid-header "
                                [width]="150"
                                field="fechaMatricula"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                                
                              >
                              <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                                {{finanzasService.fechaTemplate(dataItem.fechaMatricula)}}
                              </ng-template>
                              <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                                {{finanzasService.fechaTemplate(dataItem.fechaMatricula)}}
                              </ng-template>
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Programa"
                                headerClass="justify-content-center k-grid-header "
                                [width]="150"
                                field="nombrePrograma"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Código Matrícula"
                                headerClass="justify-content-center k-grid-header "
                                [width]="150"
                                field="codigoMatricula"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              
                              <kendo-grid-column
                                title="Alumno"
                                headerClass="justify-content-center k-grid-header "
                                [width]="150"
                                field="alumno"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Asesor"
                                headerClass="justify-content-center k-grid-header "
                                [width]="150"
                                field="asesor"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Coordinador"
                                headerClass="justify-content-center k-grid-header "
                                [width]="250"
                                field="coordinador"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Supervisor"
                                headerClass="justify-content-center k-grid-header "
                                [width]="250"
                                field="supervisor"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Asistente"
                                headerClass="justify-content-center k-grid-header "
                                [width]="250"
                                field="asistente"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="País"
                                headerClass="justify-content-center k-grid-header "
                                [width]="250"
                                field="pais"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Versión Matrícula"
                                headerClass="justify-content-center k-grid-header "
                                [width]="150"
                                field="versionMatricula"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Precio del Programa"
                                headerClass="justify-content-center k-grid-header "
                                [width]="250"
                                field="precioPrograma"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Moneda de Precio de Programa"
                                headerClass="justify-content-center k-grid-header "
                                [width]="250"
                                field="monedaPrecioPrograma"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Precio a Pagar"
                                headerClass="justify-content-center k-grid-header "
                                [width]="250"
                                field="totalPagar"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                    
                              <kendo-grid-column
                                title="Moneda de Precio a Pagar"
                                headerClass="justify-content-center k-grid-header "
                                [width]="250"
                                field="monedaTotalPagar"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Precio a pagar Dolares"
                                headerClass="justify-content-center k-grid-header "
                                [width]="250"
                                field="totalPagarDolares"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                                title="Precio de Matrícula"
                                headerClass="justify-content-center k-grid-header "
                                [width]="250"
                                field="precioMatriculaPrograma"
                                [locked]="false"
                                [sticky]="false"
                                [filterable]="true"
                                [hidden]="false"
                              >
                              </kendo-grid-column>
                              <kendo-grid-column
                              title="Moneda de Precio Matrícula"
                              headerClass="justify-content-center k-grid-header "
                              [width]="250"
                              field="monedaPrecioMatriculaPrograma"
                              [locked]="false"
                              [sticky]="false"
                              [filterable]="true"
                              [hidden]="false"
                            >
                            </kendo-grid-column>
                            <kendo-grid-column
                              title="Monto Actual Pagado"
                              headerClass="justify-content-center k-grid-header "
                              [width]="250"
                              field="montoPagadoHastaAhora"
                              [locked]="false"
                              [sticky]="false"
                              [filterable]="true"
                              [hidden]="false"
                            >
                            </kendo-grid-column>
                            <kendo-grid-column
                            title="Moneda de Monto Actual Pagado"
                            headerClass="justify-content-center k-grid-header "
                            [width]="250"
                            field="monedaMontoPagadoHastaAhora"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Documento"
                            headerClass="justify-content-center k-grid-header "
                            [width]="250"
                            field="nombreTieneDocumento"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Fecha Entrega DOC."
                            headerClass="justify-content-center k-grid-header "
                            [width]="250"
                            field="fechaEntregaDocumento"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Observación DOC."
                            headerClass="justify-content-center k-grid-header "
                            [width]="250"
                            field="observacionDocumento"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                          >
                          </kendo-grid-column>
                          <kendo-grid-column
                            title="Observación General"
                            headerClass="justify-content-center k-grid-header "
                            [width]="250"
                            field="observacion"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                          >
                          </kendo-grid-column>
                          <ng-template
                            kendoPagerTemplate
                            let-totalPages="totalPages"
                            let-currentPage="currentPage"
                            >
                              <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                              <kendo-pager-numeric-buttons
                                [buttonCount]="5"
                              ></kendo-pager-numeric-buttons>
                              <kendo-pager-next-buttons></kendo-pager-next-buttons>
                              <!-- <kendo-pager-input></kendo-pager-input> -->
                              <kendo-pager-info></kendo-pager-info>
                              <kendo-pager-page-sizes [pageSizes]="pageSizes"></kendo-pager-page-sizes>

                          </ng-template>
                          <ng-template
                            kendoPagerTemplate
                            let-totalPages="totalPages"
                            let-currentPage="currentPage"
                            >
                              <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                              <kendo-pager-numeric-buttons
                                [buttonCount]="5"
                              ></kendo-pager-numeric-buttons>
                              <kendo-pager-next-buttons></kendo-pager-next-buttons>
                              <!-- <kendo-pager-input></kendo-pager-input> -->
                              <kendo-pager-info></kendo-pager-info>
                              <kendo-pager-page-sizes [pageSizes]="pageSizes"></kendo-pager-page-sizes>

                          </ng-template>
                          </kendo-grid>
                          
                        </div>
                    </div>      
                </div>
            </div>
        </div>
    </div>
</div>
