
<ng-template #modalDocumentoLegal let-modal>
    <app-loader *ngIf="loaderModal"></app-loader>
    <div class="modal-header">
      <h2 class="modal-title m-0 p-0" id="modal-basic-title">
        {{ nombreModal }}
      </h2>
      <button
        type="button"
        class="btn-close"
        aria-label="Close"
        (click)="modal.dismiss('Cross click')"
      ></button>
    </div>
    <div class="modal-body">
      <form class="k-form" [formGroup]="formGroupDocumentoLegal">
        <fieldset class="k-form-fieldset">
          <div class="row">
            <div class="col k-form-horizontal">
                <kendo-formfield orientation="horizontal" >
                    <label [for]="nombre" class="k-label">
                      <span
                        > Documento :
                        <strong class="text-danger">*</strong></span
                      >
                    </label>
                    <kendo-textbox
                      #nombre
                      class="d-flex"
                      size="small"
                      [clearButton]="true"
                      formControlName="nombre"
                      [required]="true"
                      [showSuccessIcon]="getShowSuccessIcon('nombre')"
                      [successIcon]="successIcon"
                    >
                    </kendo-textbox>
                    <kendo-formhint>Ingrese el nombre del documento</kendo-formhint>
                    <kendo-formerror>{{ getErrorMessage("nombre") }} </kendo-formerror>
                </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col k-form-horizontal">
                <kendo-formfield orientation="horizontal" >
                    <label [for]="descripcion" class="k-label">
                      <span
                        > Descripción :
                        <strong class="text-danger">*</strong></span
                      >
                    </label>
                    <kendo-textbox
                      #descripcion
                      class="d-flex"
                      size="small"
                      [clearButton]="true"
                      formControlName="descripcion"
                      [required]="true"
                      [showSuccessIcon]="getShowSuccessIcon('descripcion')"
                      [successIcon]="successIcon"
                    >
                    </kendo-textbox>
                    <kendo-formhint>Ingrese la descripción del documento</kendo-formhint>
                    <kendo-formerror>{{ getErrorMessage("descripcion") }} </kendo-formerror>
                </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col k-form-horizontal">
              <kendo-formfield orientation="horizontal">
                <label [for]="paisesBD" class="k-label">
                    <span
                    >País :
                    <strong class="text-danger">*</strong></span>
                </label>
                <kendo-multiselect
                    #paisesBD
                    formControlName="paises"
                    [data]="listaPaises"
                    class="d-flex"
                    size="medium"
                    textField="nombrePais"
                    [valuePrimitive]="true"
                    valueField="id"
                    placeholder="< Seleccionar país >"
                >
                </kendo-multiselect>
                </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col k-form-horizontal">
              <kendo-formfield orientation="horizontal" >
                <label [for]="url" class="k-label">
                  <span
                    > URL :
                    <strong class="text-danger">*</strong></span
                  >
                </label>
                <kendo-textarea
                    #url
                    [style.width.%]="100"
                    resizable="auto"
                    [maxlength]="maxlength"
                    formControlName="url"
                    (valueChange)="onValueChange($event)"
                    
                >
                    <kendo-textarea-suffix class="custom-styling">
                    <span class="counter">{{ counter }}</span>
                    </kendo-textarea-suffix>
                </kendo-textarea>
                <kendo-formhint>Ingrese la URL del documento</kendo-formhint>
                <kendo-formerror>{{ getErrorMessage("url") }} </kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col k-form-horizontal">
              <kendo-formfield orientation="horizontal">
                <label [for]="areas" class="k-label">
                    <span
                    >Área :
                    <strong class="text-danger">*</strong></span>
                </label>
                <kendo-multiselect
                    #areas
                    formControlName="areas"
                    [data]="listaAreaAgenda"
                    class="d-flex"
                    size="medium"
                    textField="nombre"
                    [valuePrimitive]="true"
                    valueField="id"
                    placeholder="< Seleccionar área >"
                >
                </kendo-multiselect>
                </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col k-form-horizontal">
              <kendo-formfield orientation="horizontal">
                <label [for]="roles" class="k-label">
                    <span
                    >Nivel de Acceso :
                    <strong class="text-danger">*</strong></span>
                </label>
                <kendo-multiselect
                    #roles
                    formControlName="roles"
                    [data]="listaRoles"
                    class="d-flex"
                    size="medium"
                    textField="Text"
                    [valuePrimitive]="true"
                    valueField="Value"
                    placeholder="< Seleccionar nivel de acceso >"
                >
                </kendo-multiselect>
                </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-12 k-form-horizontal">
              <kendo-formfield orientation="horizontal">
                <kendo-label
                  [for]="visualizarAgenda"
                  text="Visualizar"
                ></kendo-label>
                <kendo-switch
                  #visualizarAgenda
                  formControlName="visualizarAgenda"
                  size="medium"
                  trackRounded="full"
                  thumbRounded="full"
                  onLabel="Si"
                  offLabel="No"
                  style="width: 85px;"
                >
                </kendo-switch>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-12 k-form-horizontal">
              <kendo-formfield orientation="horizontal">
                <kendo-label
                  [for]="descargarAgenda"
                  text="Descargar"
                ></kendo-label>
                <kendo-switch
                  #descargarAgenda
                  formControlName="descargarAgenda"
                  size="medium"
                  trackRounded="full"
                  thumbRounded="full"
                  onLabel="Si"
                  offLabel="No"
                  style="width: 85px;"
                >
                </kendo-switch>
              </kendo-formfield>
            </div>
          </div>
        </fieldset>
      </form>
    </div>
    <div class="modal-footer">
      <button
        type="button"
        class="btn btn-primary"
        (click)="accionModal();"
      >
        {{ btnModalNombre }}
      </button>
      <button
        type="button"
        class="btn btn-danger"
        (click)="modal.close('Close click')"
      >
        Cancelar
      </button>
    </div>
  </ng-template>

<div class="">
    <div class="row">
      <div class="col-1fa-rotate-270">
        <div class="card">
          <div class="card-header bg-color-material">
            <h1 class="text-white">Documentos Legales</h1>
          </div>
          <div class="card-body p-4">
            <div class="row">
              <div class="col">
                <ng-template
                #cellTemplateGridDocumento
                let-dataItem="dataItem"
                let-field="field"
                let-itemValue="itemValue"
              >
                <ng-container
                  *ngIf="field =='paisesBD'; else gridTempDefault"
                >
                    {{ filtroPais(itemValue)}}
                </ng-container>
                <ng-template #gridTempDefault>
                  {{ itemValue }}
                </ng-template>
              </ng-template>

                <k-grid-edit
                  [gridData]="listaDocumentoLegal"
                  [loader]="loader"
                  [columns]="gridDocumentoLegal.columns"
                  [commands]="gridDocumentoLegal.comands"
                  [gridConfig]="gridDocumentoLegal.gridConfig"
                  [gridState]="gridDocumentoLegal.gridState"
                  [cellTemplateRef]="cellTemplateGridDocumento"
                  [commandAdd]="'external'"
                  [commandEdit]="'external'"
                  (OnGridEvents)="gridEventsResponse($event)"
                >
                </k-grid-edit>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
