<ng-template #modalSubEstadoMatricula let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header">
    <h2 class="modal-title m-0 p-0" id="modal-basic-title">
      {{ nombreModal }}
    </h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <form class="k-form" [formGroup]="formGroupData">
      <fieldset class="k-form-fieldset">
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal" >
              <label [for]="nombre" class="k-label">
                <span
                  > Subestado Matricula :
                  <strong class="text-danger">*</strong></span
                >
              </label>
              <kendo-textbox
                #nombre
                class="d-flex"
                size="small"
                [clearButton]="true"
                formControlName="nombre"
                [required]="true"

              >
              </kendo-textbox>
              <kendo-formhint>Ingrese el numero de cuenta</kendo-formhint>
              <kendo-formerror>El nombre del Subestado Matricula es necesario!</kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="dropdownlist" class="k-label">
                <span
                  >Avance academico :
                </span>
              </label>
              <kendo-dropdownlist
                [disabled]="true"
                formControlName="idParametrocomparativoAvanceAcademico"
                class="d-flex"
                size="small"
                #dropdownlist
                [data]="itemsListCombo1"
                textField="nombre"
                valueField="id"
                [defaultItem]="{id:0,nombre:'Seleccionar'}"
                [valuePrimitive]="true"
                (selectionChange)="selectionChangeAvance($event)"
              >
              </kendo-dropdownlist>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="valor" class="k-label"  >
                <span
                  >Valor Avance :
                </span
                >
              </label>
              <kendo-numerictextbox
                #valor
                [disabled]="valor1Avance"
                orientation="horizontal"
                [style.width.px]="80"
                formControlName="avanceAcademicoValor1"
                [min]="0"
                [decimals]="0"
                [format]="'0'"
                [autoCorrect]="true"
                placeholder="valor"
                >
              </kendo-numerictextbox>
                —
              <kendo-numerictextbox
                  #valor
                  [disabled]="valor2Avance"
                  orientation="horizontal"
                  [style.width.px]="80"
                  [min]="0"
                  [decimals]="0"
                  [format]="'0'"
                  [autoCorrect]="true"
                  placeholder="valor"
              >
              </kendo-numerictextbox>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="multiselect" class="k-label">
                <span
                  >Estado de pago :
                </span>
              </label>
              <kendo-multiselect
              #multiselect
              formControlName="idEstadoPago"
              [data]="itemsListEstadoPago"
              class="d-flex"
              size="small"
              textField="nombre"
              valueField="id"
              (ngModel)="{id:'0',nombre:' '}"
              >
              </kendo-multiselect>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal" >
              <label [for]="dropdownlist" class="k-label">
                <span
                  >Nota Promedio :
                </span>
              </label>
              <kendo-dropdownlist
                [disabled]="true"
                formControlName="idParametrocomparativoNotaPromedio"
                class="d-flex"
                size="small"
                #dropdownlist
                [data]="itemsListCombo1"
                textField="nombre"
                valueField="id"
                [defaultItem]="{id:'0',nombre:'Seleccionar'}"
                [valuePrimitive]="true"
                (selectionChange)="selectionChangeNota($event)"
              >
              </kendo-dropdownlist>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="valor" class="k-label" >
                <span
                  >Valor Nota :
                </span
                >
              </label>
              <kendo-numerictextbox
                #valor
                [disabled]="valor1Nota"
                orientation="horizontal"
                [style.width.px]="80"
                formControlName="notaPromedioValor1"
                [min]="0"
                [decimals]="0"
                [format]="'0'"
                [autoCorrect]="true"
                placeholder="valor"
                >
              </kendo-numerictextbox>
                —
              <kendo-numerictextbox
                  #valor
                  [disabled]="valor2Nota"
                  orientation="horizontal"
                  [style.width.px]="80"
                  [min]="0"
                  [decimals]="0"
                  [format]="'0'"
                  [autoCorrect]="true"
                  placeholder="valor"
              >
              </kendo-numerictextbox>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="dropdownlist" class="k-label">
                <span
                  >Tiene Deuda :
                  <strong class="text-danger">*</strong>
                </span>
              </label>
              <kendo-dropdownlist
                formControlName="tieneDeuda"
                class="d-flex"
                size="small"
                #dropdownlist
                [data]="itemListSiNo"
                textField="nombre"
                valueField="id"
                [defaultItem]="{id:'0',nombre:'Seleccionar'}"
                [valuePrimitive]="true"
              >
              </kendo-dropdownlist>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="dropdownlist" class="k-label">
                <span
                  >Proyecto Final :
                  <strong class="text-danger">*</strong>
                </span>
              </label>
              <kendo-dropdownlist
                formControlName="proyectoFinal"
                class="d-flex"
                size="small"
                #dropdownlist
                [data]="itemListSiNo"
                textField="nombre"
                valueField="id"
                [defaultItem]="{id:'0',nombre:'Seleccionar'}"
                [valuePrimitive]="true"
              >
              </kendo-dropdownlist>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label class="k-label">&nbsp;</label>
              <div class="k-checkbox-wrap">
                <input
                  class="d-flex"
                  size="medium"
                  #acceptNews
                  type="checkbox"
                  kendoCheckBox
                  formControlName="requiereVerificacionInformacion"
                />
                <kendo-label
                  [for]="acceptNews"
                  class="k-checkbox-label mb-0 pt-2"
                  text="Requiere Verificacion de Informacion Personal"
                ></kendo-label>
              </div>
            </kendo-formfield>
          </div>
        </div>
      </fieldset>
    </form>
  </div>
  <div class="modal-footer">
    <button
      type="button"
      class="btn btn-primary"
      (click)="accionModal()"
    >
      {{ btnModalNombre }}
    </button>
    <button
      type="button"
      class="btn btn-danger"
      (click)="modal.close('Close click')"
    >
      Cancelar
    </button>
  </div>
</ng-template>

<div class="">
    <div class="row">
      <div class="col-1fa-rotate-270">
        <div class="card">
          <div class="card-header bg-color-material">
            <h1 class="text-white">Subestado Matriculas</h1>
          </div>
          <div class="card-body p-4">
            <div class="row">
              <div class="col">
                <ng-template
                  #cellTemplateGridRetencion
                  let-dataItem="dataItem"
                  let-field="field"
                  let-itemValue="itemValue"
                >
                  <ng-container
                    *ngIf="field == 'fechaModificacion'; else gridEntFinDefault"
                  >
                    {{ itemValue | date: "dd-MM-yyyy" }}
                  </ng-container>
                  <ng-template #gridEntFinDefault>
                    {{ itemValue }}
                  </ng-template>
                </ng-template>
                <k-grid-edit
                  [gridData]="listaSubEstadoMatricula"
                  [columns]="gridRetencion.columns"
                  [commands]="gridRetencion.comands"
                  [readOnlyColumns]="gridRetencion.readOnlyColumns"
                  [gridConfig]="gridRetencion.gridConfig"
                  [gridState]="gridRetencion.gridState"
                  [commandAdd]="'external'"
                  [commandEdit]="'external'"
                  [cellTemplateRef]="cellTemplateGridRetencion"
                  (OnGridEvents)="gridEventsResponse($event)"
                >
                </k-grid-edit>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
