<ng-template #modalCaja let-modal>
    <app-loader *ngIf="loaderModal"></app-loader>
      <div class="modal-header">
        <h2 class="modal-title m-0 p-0" id="modal-basic-title">
          {{ nombreModal }}
        </h2>
        <button
          type="button"
          class="btn-close"
          aria-label="Close"
          (click)="modal.dismiss('Cross click')"
        ></button>
      </div>
      <div class="modal-body">
        <form class="k-form" [formGroup]="formGroupDataCaja">
          <fieldset class="k-form-fieldset">
            <div class="row">
                <div class="col k-form-horizontal">
                    <kendo-formfield orientation="horizontal">
                    <label [for]="dropdownlist" class="k-label">
                        <span
                        >Empresa :
                        <strong class="text-danger">*</strong></span>
                    </label>
                    <kendo-dropdownlist
                        formControlName="idEmpresa"
                        class="d-flex"
                        size="small"
                        #dropdownlist
                        [data]="listaEmpresa"
                        textField="razonSocial"
                        valueField="id"
                        [defaultItem]="{id:null,razonSocial:'Seleccionar'}"
                        [valuePrimitive]="true"
                        (selectionChange)="selectionChangeEmpresa($event)"
                    >
                    </kendo-dropdownlist>
                    </kendo-formfield>
                </div>
            </div>
            <div class="row">
              <div class="col k-form-horizontal">
                  <kendo-formfield orientation="horizontal" >
                      <label [for]="text" class="k-label">
                        <span
                          > Dirección :
                          </span
                        >
                      </label>
                      <kendo-textbox
                      orientation="horizontal"
                        formControlName="direccion"
                        #text
                        [readonly]="true"
                        class="d-flex"
                        size="small"
                        [clearButton]="true"
                      >
                      </kendo-textbox>
                    </kendo-formfield>
              </div>
            </div>
            <div class="row">
                <div class="col k-form-horizontal">
                    <kendo-formfield orientation="horizontal" >
                        <label [for]="text" class="k-label">
                          <span
                            > Central :
                            </span
                          >
                        </label>
                        <kendo-textbox
                        formControlName="central"
                          #text
                          [readonly]="true"
                          class="d-flex"
                          size="small"
                          [clearButton]="true"
                        >
                        </kendo-textbox>
                      </kendo-formfield>
                </div>
            </div>
            <div class="row">
                <div class="col k-form-horizontal">
                    <kendo-formfield orientation="horizontal" >
                        <label [for]="text" class="k-label">
                          <span
                            > RUC :
                            </span
                          >
                        </label>
                        <kendo-textbox
                        formControlName="ruc"
                          #text
                          [readonly]="true"
                          class="d-flex"
                          size="small"
                          [clearButton]="true"
                        >
                        </kendo-textbox>
                      </kendo-formfield>
                </div>
            </div>
            <div class="row">
              <div class="col k-form-horizontal">
                  <kendo-formfield orientation="horizontal">
                  <label [for]="dropdownlist" class="k-label">
                      <span
                      >Entidad Financiera :
                      <strong class="text-danger">*</strong></span>
                  </label>
                  <kendo-dropdownlist
                      formControlName="idBanco"
                      class="d-flex"
                      size="small"
                      #dropdownlist
                      [data]="listaBanco"
                      textField="nombre"
                      valueField="id"
                      [defaultItem]="{id:null,nombre:'Seleccionar'}"
                      [valuePrimitive]="true"
                      (selectionChange)="selectionChangeEntidadFinanciera($event)"
                  >
                  </kendo-dropdownlist>
                  </kendo-formfield>
              </div>
            </div>
            <div class="row">
                <div class="col k-form-horizontal">
                    <kendo-formfield orientation="horizontal">
                    <label [for]="dropdownlist" class="k-label">
                        <span
                        >Cuenta Bancaria :
                        <strong class="text-danger">*</strong></span>
                    </label>
                    <kendo-dropdownlist
                        formControlName="idCuenta"
                        class="d-flex"
                        size="small"
                        #dropdownlist
                        [data]="itemsCuenta"
                        textField="numeroCuenta"
                        valueField="id"
                        [defaultItem]="{id:null,numeroCuenta:'Seleccionar'}"
                        [valuePrimitive]="true"
                        (selectionChange)="selectionChangeCuenta($event)"
                    >
                    </kendo-dropdownlist>
                    </kendo-formfield>
                </div>
              </div>
              <div class="row">
                <div class="col k-form-horizontal">
                  <kendo-formfield orientation="horizontal">
                  <label [for]="dropdownlist" class="k-label">
                      <span
                      >Tipo Moneda :
                      <strong class="text-danger">*</strong></span>
                  </label>
                  <kendo-dropdownlist
                      [readonly]="true"
                      formControlName="idMoneda"
                      class="d-flex"
                      size="small"
                      #dropdownlist
                      [data]="itemsMoneda"
                      textField="nombrePlural"
                      valueField="id"
                      [defaultItem]="{id:null,nombrePlural:' '}"
                      [valuePrimitive]="true"

                  >
                  </kendo-dropdownlist>
                  </kendo-formfield>
              </div>
            </div>
            <div class="row">
              <div class="col k-form-horizontal">
                  <kendo-formfield orientation="horizontal">
                  <label [for]="dropdownlist" class="k-label">
                      <span
                      >Pais :
                      <strong class="text-danger">*</strong></span>
                  </label>
                  <kendo-dropdownlist
                      formControlName="idPais"
                      class="d-flex"
                      size="small"
                      #dropdownlist
                      [data]="listaPais"
                      textField="nombrePais"
                      valueField="id"
                      [defaultItem]="{id:null,nombrePais:'Seleccionar'}"
                      [valuePrimitive]="true"
                      (selectionChange)="selectionChangePais($event)"

                  >
                  </kendo-dropdownlist>
                  </kendo-formfield>
              </div>
            </div>
            <div class="row">
              <div class="col k-form-horizontal">
                  <kendo-formfield orientation="horizontal">
                  <label [for]="dropdownlist" class="k-label">
                      <span
                      >Ciudad :
                      <strong class="text-danger">*</strong></span>
                  </label>
                  <kendo-dropdownlist
                      formControlName="idCiudad"
                      class="d-flex"
                      size="small"
                      #dropdownlist
                      [data]="itemsRegion"
                      textField="nombre"
                      valueField="id"
                      [defaultItem]="{id:null,nombre:'Seleccionar'}"
                      [valuePrimitive]="true"

                  >
                  </kendo-dropdownlist>
                  </kendo-formfield>
              </div>
            </div>
            <div class="row">
                <div class="col k-form-horizontal">
                    <kendo-formfield orientation="horizontal">
                    <label [for]="dropdownlist" class="k-label">
                        <span
                        >Responsable :
                        <strong class="text-danger">*</strong></span>
                    </label>
                    <kendo-dropdownlist
                        formControlName="idPersonal"
                        class="d-flex"
                        size="small"
                        #dropdownlist
                        [data]="itemsFiltroResponsable"
                        textField="nombre"
                        valueField="id"
                        [defaultItem]="{id:null,nombre:'Seleccionar'}"
                        [valuePrimitive]="true"
                        [filterable]="true"
                        (filterChange)="filtroResponsable($event)"
                    >
                    </kendo-dropdownlist>
                    </kendo-formfield>
                </div>
              </div>
              <div class="row">
                <div class="col-sm-12 col-md-12 k-form-horizontal">
                  <kendo-formfield orientation="horizontal">
                    <kendo-label
                      [for]="estado"
                      text="Estado"
                    ></kendo-label>
                    <kendo-switch
                      #estado
                      formControlName="activo"
                      size="medium"
                      trackRounded="full"
                      thumbRounded="full"
                      onLabel="Activo"
                      offLabel="Inactivo"
                      style="width: 85px;"
                    >
                    </kendo-switch>
                  </kendo-formfield>
                </div>
              </div>

          </fieldset>
        </form>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-primary"
          (click)="accionModal();"
        >
          {{ btnModalNombre }}
        </button>
        <button
          type="button"
          class="btn btn-danger"
          (click)="modal.close('Close click')"
        >
          Cancelar
        </button>
      </div>
    </ng-template>





<div class="">
    <div class="row">
      <div class="col-1fa-rotate-270">
        <div class="card">
          <div class="card-header bg-color-material">
            <h1 class="text-white">Cajas</h1>
          </div>
          <div class="card-body p-4">
            <div class="row">
              <div class="col">
                <ng-template
                #cellTemplateGridCaja
                let-dataItem="dataItem"
                let-field="field"
                let-itemValue="itemValue"
              >
                <ng-container
                  *ngIf="field == 'fechaModificacion'; else gridTempDefault"
                >
                  {{ itemValue | date: "dd-MM-yyyy" }}
                </ng-container>
                <ng-template #gridTempDefault>
                  {{ itemValue }}
                </ng-template>
              </ng-template>
                <k-grid-edit
                  [gridData]="listaCaja"
                  [loader]="loader"
                  [columns]="gridCaja.columns"
                  [commands]="gridCaja.comands"
                  [readOnlyColumns]="gridCaja.readOnlyColumns"
                  [gridConfig]="gridCaja.gridConfig"
                  [gridState]="gridCaja.gridState"
                  [commandAdd]="'external'"
                  [commandEdit]="'external'"
                  (OnGridEvents)="gridEventsResponse($event)"
                  [cellTemplateRef]="cellTemplateGridCaja"
                >
                </k-grid-edit>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
