<ng-template #modalTipoDeCambio let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header">
    <h2 class="modal-title m-0 p-0" id="modal-basic-title">
      {{ nombreModal }}
    </h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <form class="k-form" [formGroup]="formGroupTipoDeCambio">
      <fieldset class="k-form-fieldset">
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="idMoneda" class="k-label">
                <span> Moneda : <strong class="text-danger">*</strong></span>
              </label>
              <kendo-dropdownlist
                [disabled]="nuevo"
                formControlName="idMoneda"
                class="d-flex"
                size="small"
                #idMoneda
                [data]="listaMoneda"
                textField="nombrePlural"
                valueField="id"
                [defaultItem]="{ id: null, nombrePlural: 'Seleccionar' }"
                [valuePrimitive]="true"
                [kendoDropDownFilter]="filterSettings"
              >
              </kendo-dropdownlist>
              <kendo-formhint>Seleccione un tipo de moneda</kendo-formhint>
              <kendo-formerror
                >{{ getErrorMessage("idMoneda") }}
              </kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="dolarAMoneda" class="k-label">
                <span>
                  Dolar a Moneda : <strong class="text-danger">*</strong></span
                >
              </label>
              <kendo-numerictextbox
                #dolarAMoneda
                orientation="horizontal"
                [style.width.px]="170"
                formControlName="dolarAmoneda"
                [min]="0"
                [autoCorrect]="true"
              >
              </kendo-numerictextbox>
              <kendo-formhint
                >Ingrese el cambio de dolar a moneda</kendo-formhint
              >
              <kendo-formerror
                >{{ getErrorMessage("dolarAmoneda") }}
              </kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="monedaADolar" class="k-label">
                <span>
                  Moneda a Dolar : <strong class="text-danger">*</strong></span
                >
              </label>
              <kendo-numerictextbox
                #monedaADolar
                orientation="horizontal"
                [style.width.px]="170"
                formControlName="monedaAdolar"
                [min]="0"
                [autoCorrect]="true"
              >
              </kendo-numerictextbox>
              <kendo-formhint
                >Ingrese el cambio de menda a dolar</kendo-formhint
              >
              <kendo-formerror
                >{{ getErrorMessage("monedaAdolar") }}
              </kendo-formerror>
            </kendo-formfield>
          </div>
        </div>

        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield
              orientation="horizontal"
              style="padding-bottom: 5%"
            >
              <label [for]="meses" class="k-label" style="margin-bottom: 5px">
                <span>Mes : </span>
              </label>
              <kendo-dropdownlist
                formControlName="mes"
                class="d-flex center"
                size="medium"
                #meses
                [data]="listaMes"
                textField="nombre"
                valueField="id"
                [defaultItem]="{
                  id: null,
                  nombre: '< Seleccionar >'
                }"
                [valuePrimitive]="true"
                (selectionChange)="SeleccionMes($event)"
              >
              </kendo-dropdownlist>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="anio" class="k-label"> Año: </label>
              <kendo-numerictextbox
                #anio
                orientation="horizontal"
                [style.width.px]="170"
                formControlName="anio"
                [min]="0"
                [autoCorrect]="true"
                [decimals]="2"
                [format]="'0'"
              >
              </kendo-numerictextbox>
            </kendo-formfield>
          </div>
        </div>
      </fieldset>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-primary" (click)="accionModal()">
      {{ btnModalNombre }}
    </button>
    <button
      type="button"
      class="btn btn-danger"
      (click)="modal.close('Close click')"
    >
      Cancelar
    </button>
  </div>
</ng-template>

<div class="conteiner-toolbar-retiros-matricula">
  <div class="row">
    <div class="col-1fa-rotate-270">
      <div class="card">
        <div class="card-header bg-color-material">
          <h1 class="text-white">Tipo de Cambio por Meses</h1>
        </div>
        <div class="card-body p-4">
          <div class="card" style="padding: 0px">
            <div class="card-header bg-color-material pb-0">
              <h3 class="text-white mb-2">Filtro de Búsqueda</h3>
            </div>
            <div class="card-body p-4">
              <div class="row col-md-12">
                <div class="col-md-5 k-form-horizontal">
                  <kendo-formfield
                    orientation="horizontal"
                    style="padding-bottom: 5%"
                  >
                    <label
                      [for]="mesp"
                      class="k-label"
                      style="margin-bottom: 5px"
                    >
                      <span>Mes : </span>
                    </label>
                    <kendo-dropdownlist
                      [(ngModel)]="Meses"
                      class="d-flex center"
                      size="medium"
                      #mesp
                      [data]="listaMes"
                      textField="nombre"
                      valueField="id"
                      [defaultItem]="{
                        id: 0,
                        nombre: '< Seleccionar >'
                      }"
                      (selectionChange)="SeleccionMes($event)"
                    >
                    </kendo-dropdownlist>
                  </kendo-formfield>
                </div>
                <div class="col-md-5 k-form-horizontal">
                  <kendo-formfield orientation="horizontal">
                    <label [for]="monedas" class="k-label">
                      <span>Moneda : </span>
                    </label>
                    <kendo-dropdownlist
                      [(ngModel)]="idMoneda"
                      class="d-flex"
                      size="medium"
                      #monedas
                      [data]="listaMoneda"
                      textField="nombrePlural"
                      valueField="id"
                      [defaultItem]="{ id: 0, nombrePlural: 'Seleccionar' }"
                      [kendoDropDownFilter]="filterSettings"
                    >
                    </kendo-dropdownlist>
                  </kendo-formfield>
                </div>

                <div class="col-md-5 k-form-horizontal">
                  <div class="row">
                    <kendo-formfield orientation="horizontal">
                      <label [for]="aniop" class="k-label"> Año: </label>
                      <kendo-numerictextbox
                        #aniop
                        orientation="horizontal"
                        [style.width.px]="170"
                        [(ngModel)]="Anios"
                        [min]="0"
                        [autoCorrect]="true"
                        [decimals]="2"
                        [format]="'0'"
                      >
                      </kendo-numerictextbox>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="col-md-2">
                  <button
                    kendoButton
                    icon="k-icon k-i-search k-icon-20"
                    type="button"
                    themeColor="primary"
                    (click)="obtenerListaTipoDeCambio()"
                  >
                    Buscar
                  </button>
                </div>
              </div>
            </div>
          </div>
          <br />
          <kendo-grid
            [kendoGridBinding]="listaGrilla"
            [loading]="loader"
            [pageSize]="5"
            [sortable]="true"
            [reorderable]="true"
            [resizable]="true"
            filterable="menu"
            [sort]="[{ field: 'id', dir: 'desc' }]"
            [pageable]="true"
            style="max-height: 700px"
          >
            <ng-template kendoGridToolbarTemplate class="bg-danger">
              <button
                mat-stroked-button
                sytle="backgroun-color:grey;"
                (click)="gridControl('reload')"
              >
                <mat-icon>refresh</mat-icon>
              </button>
              <kendo-grid-spacer></kendo-grid-spacer>
              <button
                kendoGridAddCommand
                [themeColor]="'primary'"
                (click)="gridControl('add')"
              >
                + Nuevo
              </button>
            </ng-template>
            <kendo-grid-column
              title="Moneda a Dolar"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="monedaAdolar"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
              [class]="'cellCustomClass'"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Dolar a Moneda"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="dolarAmoneda"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Mes"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="nombreMes"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Anio"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="anio"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Moneda"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="nombreMoneda"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
            <kendo-grid-command-column
              [sticky]="true"
              title="Acciones"
              [width]="80"
              headerClass="justify-content-center text-center k-grid-header-command"
            >
              <ng-template
                kendoGridCellTemplate
                let-dataItem="dataItem"
                let-rowIndex="rowIndex"
              >
                <div
                  class="w-100 d-flex justify-content-center"
                  style="padding: 20px"
                  kendoTooltip
                >
                  <button
                    title="Editar"
                    kendoButton
                    themeColor="warning"
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    (click)="gridControl('update', dataItem, rowIndex)"
                  >
                    <span class="k-icon k-i-pencil k-icon-20"></span>
                  </button>

                  <button
                    title="Eliminar"
                    kendoButton
                    themeColor="error"
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    (click)="gridControl('delete', dataItem)"
                  >
                    <span class="k-icon k-i-trash k-icon-20"></span>
                  </button>
                </div>
              </ng-template>
            </kendo-grid-command-column>
            <ng-template
              kendoPagerTemplate
              let-totalPages="totalPages"
              let-currentPage="currentPage"
            >
              <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
              <kendo-pager-numeric-buttons
                [buttonCount]="5"
              ></kendo-pager-numeric-buttons>
              <kendo-pager-next-buttons></kendo-pager-next-buttons>
              <!-- <kendo-pager-input></kendo-pager-input> -->
              <kendo-pager-info></kendo-pager-info>
              <kendo-pager-page-sizes
                [pageSizes]="pageSizes"
              ></kendo-pager-page-sizes>
            </ng-template>
          </kendo-grid>
        </div>
      </div>
    </div>
  </div>
</div>
