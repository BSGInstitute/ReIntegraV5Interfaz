<ng-template #modalRubro let-modal>
    <app-loader *ngIf="loaderModal"></app-loader>
      <div class="modal-header">
        <h2 class="modal-title m-0 p-0" id="modal-basic-title">
          {{ nombreModal }}
        </h2>
        <button
          type="button"
          class="btn-close"
          aria-label="Close"
          (click)="modal.dismiss('Cross click')"
        ></button>
      </div>
      <div class="modal-body">
    
        <form class="k-form" [formGroup]="formRubro">
          <fieldset class="k-form-fieldset">
            <div class="row">
                <div class="col-sm-12 col-md-12 k-form-horizontal">
                  <kendo-formfield orientation="horizontal">
                    <label [for]="nombre" class="k-label">
                      <span
                        >Nombre Rubro:
                        <span class="text-danger fw-bold">*</span></span
                      >
                    </label>
                    <kendo-textbox
                    #nombre
                    class="d-flex"
                    size="small"
                    [clearButton]="true"
                    formControlName="nombre"
                    [style.width.%]="80" 
                    [maxlength]="200"
                    >
                    </kendo-textbox>
                    <kendo-formhint> Ingrese el nombre del rubro</kendo-formhint>
                    <kendo-formerror class="font-small">
                        {{getErrorMessage('nombre')}}
                    </kendo-formerror>
                  </kendo-formfield>
                </div>
              </div>
              <div class="row">
                <div class="col-sm-12 col-md-12 k-form-horizontal">
                  <kendo-formfield orientation="horizontal">
                    <label [for]="descripcion" class="k-label">
                      <span
                        >Descripcion Rubro:
                        <span class="text-danger fw-bold">*</span></span
                      >
                    </label>
                    <kendo-textbox
                    #descripcion
                    class="d-flex"
                    size="small"
                    [clearButton]="true"
                    formControlName="descripcion"
                    [style.width.%]="80" 
                    [maxlength]="200"
                    >
                    </kendo-textbox>
                    <kendo-formhint> Ingrese la descripcion del rubro</kendo-formhint>
                    <kendo-formerror class="font-small">
                        {{getErrorMessage('descripcion')}}
                    </kendo-formerror>
                  </kendo-formfield>
                </div>
              </div>
          </fieldset>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" 
        class="btn btn-primary"
        (click)="accionModal()"
        >
          {{ btnModal }}
        </button>
        <button
          type="button"
          class="btn btn-danger"
          (click)="modal.close('Close click')"
        >
          Cancelar
        </button>
      </div>
  </ng-template>



<div class="">
    <div class="row">
        <div class="col-1fa-rotate-270">
            <div class="card">
                <div class="card-header bg-color-material">
                    <h1 class="text-white">Rubros</h1>
                </div>
                <div  class="card-body p-4">
                    <div class="row">
                        <kendo-grid
                        [kendoGridBinding]="listaRubro"
                        [loading]="loaderRubro"
                        [pageSize]="5"
                        [sortable]="true"
                        [reorderable]="true"
                        [resizable]="true"
                        [columnMenu]="{ filter: true }"
                        [pageable]="true"
                        style="max-height: 700px"  
                        [sort]="gridState.sort"                            
                        >
                        <ng-template kendoGridToolbarTemplate class="bg-danger">
                            
                            <button mat-stroked-button
                            (click)="gridControl('reload')">
                                <mat-icon>refresh</mat-icon>
                            </button>
                            <kendo-grid-spacer></kendo-grid-spacer>
                            <button 
                            kendoGridAddCommand 
                            [themeColor]="'primary'" 
                            (click)="gridControl('add')"
                            >
                              + Nuevo
                            </button>
                          </ng-template>
                          <kendo-grid-column
                              [width]="10"field="id"[hidden]="true">
                            </kendo-grid-column>
                            <kendo-grid-column
                              title="Nombre Rubro"
                              headerClass="justify-content-center k-grid-header "
                              [width]="150"
                              field="nombre"
                              [locked]="false"
                              [sticky]="false"
                              [filterable]="true"
                              [hidden]="false"
                            >
                            </kendo-grid-column>
                            <kendo-grid-column
                            title="Descripcion Rubro"
                            headerClass="justify-content-center k-grid-header "
                            [width]="150"
                            field="descripcion"
                            [locked]="false"
                            [sticky]="false"
                            [filterable]="true"
                            [hidden]="false"
                          >
                          </kendo-grid-column>
                            <kendo-grid-command-column
                            [sticky]="true"
                            title="Acciones"
                            [width]="80"
                            headerClass="justify-content-center text-center k-grid-header-command"
                            >
                            <ng-template 
                            kendoGridCellTemplate 
                            let-dataItem="dataItem" 
                            let-rowIndex="rowIndex"
                            >
                                <div class="w-100 d-flex justify-content-center" style="padding:20px" kendoTooltip>
                                    <button
                                    title="Editar"
                                    kendoButton
                                    themeColor="warning"
                                    fillMode="solid"
                                    rounded="large"
                                    size="large"
                                    class="p-2 me-1 ms-1"
                                    container="body"
                                    placement="top"
                                    (click)="gridControl('update',dataItem,rowIndex)"
                                    >
                                    <span class="k-icon k-i-pencil k-icon-20"></span>
                                    </button>

                                    <button
                                    title="Eliminar"
                                    kendoButton
                                    themeColor="error"
                                    fillMode="solid"
                                    rounded="large"
                                    size="large"
                                    class="p-2 me-1 ms-1"
                                    container="body"
                                    placement="top"
                                    (click)="gridControl('delete',dataItem)"
                                    >
                                    <span class="k-icon k-i-trash k-icon-20"></span>
                                    </button>
                                </div>
                            </ng-template>
                            </kendo-grid-command-column>
                            <ng-template kendoGridNoRecordsTemplate>
                                <div>
                                  <kendo-badge-container>
                                    <kendo-icon name="cloud" size="large"></kendo-icon>
                                    <kendo-badge position="inside">
                                      <kendo-icon name="close" style="color: red;" ></kendo-icon>
                                    </kendo-badge>
                                  </kendo-badge-container>
                                </div>
                                <p>No hay registros cargados!</p>
                            </ng-template>
                            <ng-template
                            kendoPagerTemplate
                            let-totalPages="totalPages"
                            let-currentPage="currentPage"
                            >
                              <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                              <kendo-pager-numeric-buttons
                                [buttonCount]="5"
                              ></kendo-pager-numeric-buttons>
                              <kendo-pager-next-buttons></kendo-pager-next-buttons>
                              <!-- <kendo-pager-input></kendo-pager-input> -->
                              <kendo-pager-info></kendo-pager-info>
                              <kendo-pager-page-sizes [pageSizes]="pageSizes"></kendo-pager-page-sizes>
        
                          </ng-template>
                        </kendo-grid>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
