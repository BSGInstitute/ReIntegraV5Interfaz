<div class="">
  <div class="row">
    <div class="col-1fa-rotate-270">
      <div class="card">
        <div class="card-header bg-color-material">
          <h1 class="text-white">Configuracion Proyeccion Fur</h1>
        </div>
        <div class="card-body p-4">
          <div class="row">
            <div class="col-md-2"></div>
            <div class="col-md-8">
              <div class="row">
                <kendo-grid
                  style="max-height:600px;"
                  [kendoGridBinding]="gridConfiguracionFur.data"
                  [loading]="loaderProyeccion"
                  [pageSize]="5"
                  [sortable]="true"
                  [reorderable]="true"
                  [resizable]="true"
                  filterable="menu"
                  [pageable]="true"
                  [sort]="[{field:'id',dir:'desc'}]"
                  (add)="gridConfiguracionFur.addHandler($event)"
                  (cancel)="gridConfiguracionFur.cancelHandler($event)"
                  (save)="gridConfiguracionFur.saveHandler($event)"
                  (remove)="gridConfiguracionFur.removeHandler($event)"
                  (edit)="gridConfiguracionFur.editHandler($event)"
                >
                  <ng-template kendoGridToolbarTemplate class="bg-danger">
                    <button mat-stroked-button (click)="ObtenerListaConfiguracion()">
                      <mat-icon>refresh</mat-icon>
                    </button>
                    <kendo-grid-spacer></kendo-grid-spacer>
                    <button
                      mat-raised-button
                      style="color:rgb(255, 255, 255);background-color: rgb(48, 104, 48);"
                      (click)="abrirModalPerido()"
                    >
                      Añadir Periodo Proyección
                    </button>
                    <button kendoGridAddCommand mat-raised-button color="primary" class="hover_butom_primary">
                      Nueva Configuración
                    </button>
                  </ng-template>
                  <kendo-grid-column
                    title="Proyeccion"
                    headerClass="justify-content-center k-grid-header "
                    [headerStyle]="{
                      'background-color': '#3382a9',
                      color: 'white'
                    }"
                    [width]="120"
                    field="idPeriodoProyeccion"
                    [locked]="false"
                    [sticky]="false"
                    [filterable]="true"
                    [hidden]="false"
                  >

                  <ng-template kendoGridCellTemplate let-dataItem>
                    {{ PeriodoTemplate(dataItem.idPeriodoProyeccion) }}
                  </ng-template>

                  <ng-template
                    kendoGridEditTemplate
                    let-formGroup="formGroup"
                  >
                    <kendo-dropdownlist
                      [formControl]="formGroup.get('idPeriodoProyeccion')"
                      class="d-flex"
                      size="medium"
                      [data]="comboPerido"
                      textField="periodo"
                      valueField="id"
                      [valuePrimitive]="true"
                      [defaultItem]="{id:null,periodo:'< Seleccionar Periodo >'}"
                      [required]="true"
                    >
                    </kendo-dropdownlist>
                  </ng-template>
                  </kendo-grid-column>

                  <kendo-grid-column
                    title="Fecha Semilla"
                    headerClass="justify-content-center k-grid-header "
                    [headerStyle]="{
                      'background-color': '#3382a9',
                      color: 'white'
                    }"
                    [width]="150"
                    field="fechaSemilla"
                    [locked]="false"
                    [sticky]="false"
                    [filterable]="true"
                    [hidden]="false"
                  >
                  <ng-template kendoGridCellTemplate let-dataItem>
                    {{ finanzasService.fechaTemplate(dataItem.fechaSemilla) }}
                  </ng-template>

                  <ng-template kendoGridEditTemplate  let-formGroup="formGroup">
                    <kendo-datepicker
                      calendarType="classic"
                      [required]="true"
                      [placeholder]="'dia-mes-año'"
                      format="dd-MM-yyyy"
                      [formControl]="formGroup.get('fechaSemilla')">
                    </kendo-datepicker>
                  </ng-template>
                  <ng-template kendoGridFilterMenuTemplate let-filter let-column="column" let-filterService="filterService">
                    <kendo-grid-date-filter-menu
                        [column]="column"
                        [format]="'dd-MM-yyyy'"
                        [filter]="filter"
                        [placeholder]="'dia-mes-año'"
                        [filterService]="filterService"
                        >
                    </kendo-grid-date-filter-menu>
                  </ng-template>
                  </kendo-grid-column>

                  <kendo-grid-column
                    title="Fecha Límite Envio"
                    headerClass="justify-content-center k-grid-header "
                    [headerStyle]="{
                      'background-color': '#3382a9',
                      color: 'white'
                    }"
                    [width]="150"
                    field="fechaLimiteEnvio"
                    [locked]="false"
                    [sticky]="false"
                    [filterable]="true"
                    [hidden]="false"
                  >
                  <ng-template kendoGridCellTemplate let-dataItem>
                    {{ finanzasService.fechaTemplate(dataItem.fechaLimiteEnvio,true) }}
                  </ng-template>

                  <ng-template kendoGridEditTemplate  let-formGroup="formGroup">
                    <kendo-datetimepicker
                      calendarType="classic"
                      [required]="true"
                      [placeholder]="'dia-mes-año HH:mm'"
                      format="dd-MM-yyyy HH:mm"
                      [formControl]="formGroup.get('fechaLimiteEnvio')">
                    </kendo-datetimepicker>
                  </ng-template>
                  <ng-template kendoGridFilterMenuTemplate let-filter let-column="column" let-filterService="filterService">
                    <kendo-grid-date-filter-menu
                        [column]="column"
                        [format]="'dd-MM-yyyy'"
                        [filter]="filter"
                        [placeholder]="'dia-mes-año'"
                        [filterService]="filterService"
                        >
                    </kendo-grid-date-filter-menu>
                  </ng-template>
                  </kendo-grid-column>

                  <kendo-grid-column
                    title="Activo"
                    headerClass="justify-content-center k-grid-header "
                    [headerStyle]="{
                      'background-color': '#3382a9',
                      color: 'white'
                    }"
                    [width]="150"
                    field="activo"
                    [locked]="false"
                    [sticky]="false"
                    [filterable]="true"
                    [hidden]="false"
                    >
                    
                      <ng-template kendoGridCellTemplate let-dataItem>
                        <kendo-switch
                        [(ngModel)]="dataItem.activo"
                        (valueChange)="validarActivoConf($event,dataItem.id)"
                        ></kendo-switch>
                      </ng-template>
                      <ng-template kendoGridEditTemplate  let-formGroup="formGroup">
                        <kendo-switch
                          [formControl]="formGroup.get('activo')">
                        </kendo-switch>
                      </ng-template>
                  </kendo-grid-column>
                  <kendo-grid-command-column
                  [sticky]="true"
                  title="Acciones"
                  [width]="80"
                  headerClass="justify-content-center text-center k-grid-header-command"
                  >
                    <ng-template
                      kendoGridCellTemplate
                      let-dataItem="dataItem"
                      let-isNew="isNew"
                      let-rowIndex="rowIndex"
                    >
                      <div class="w-100 d-flex justify-content-center">
                        <button
                          kendoGridEditCommand
                          themeColor="warning"
                          fillMode="solid"
                          rounded="large"
                          size="large"
                          class="p-2 me-1 ms-1"
                          container="body"
                          placement="top"
                          ngbTooltip="Editar"
                        >
                          <span class="k-icon k-i-edit k-icon-20"></span>
                        </button>
                        <button
                          kendoGridSaveCommand
                          [disabled]="gridConfiguracionFur.formGroup?.invalid"
                          themeColor="primary"
                          fillMode="solid"
                          rounded="large"
                          size="large"
                          class="p-2 me-1 ms-1"
                          container="body"
                          placement="top"
                          ngbTooltip="Guardar"
                        >
                          <span class="k-icon k-i-save k-icon-20"></span>
                        </button>
                        <button
                          kendoGridCancelCommand
                          themeColor="secondary"
                          fillMode="solid"
                          rounded="large"
                          size="large"
                          class="p-2 me-1 ms-1"
                          container="body"
                          placement="top"
                          ngbTooltip="Cancelar"
                        >
                          <span class="k-icon k-i-cancel k-icon-20"></span>
                        </button>
                        <button
                          kendoGridRemoveCommand
                          themeColor="error"
                          fillMode="solid"
                          rounded="large"
                          size="large"
                          class="p-2 me-1 ms-1"
                          container="body"
                          placement="top"
                          ngbTooltip="Eliminar"
                        >
                          <span class="k-icon k-i-delete k-icon-20"></span>
                        </button>
                      </div>
                    </ng-template>
                    </kendo-grid-command-column>
                    <ng-template kendoGridNoRecordsTemplate>
                      <div>
                        <kendo-badge-container>
                          <kendo-icon name="cloud" size="large"></kendo-icon>
                          <kendo-badge position="inside">
                            <kendo-icon name="close" style="color: red"></kendo-icon>
                          </kendo-badge>
                        </kendo-badge-container>
                      </div>
                      <p>No hay registros cargados!</p>
                    </ng-template>
                    <ng-template
                      kendoPagerTemplate
                      let-totalPages="totalPages"
                      let-currentPage="currentPage"
                      >
                        <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                        <kendo-pager-numeric-buttons
                          [buttonCount]="5"
                        ></kendo-pager-numeric-buttons>
                        <kendo-pager-next-buttons></kendo-pager-next-buttons>
                        <!-- <kendo-pager-input></kendo-pager-input> -->
                        <!-- <kendo-pager-info></kendo-pager-info> -->
                        <kendo-pager-page-sizes [pageSizes]="pageSizes"></kendo-pager-page-sizes>
                      </ng-template>
                </kendo-grid>
              </div>
            </div>
            <div class="col-md-2"></div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #modalPeriodo let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header">
    <h2 class="modal-title m-0 p-0" id="modal-basic-title">
      Periodos de Proyección
    </h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="modal-body p-4">
      <div class="row">
        <div class="col-md-12">
          <div class="card-body p-4" style="
          padding-top: 0px !important;padding-bottom: 0px !important;">
            <kendo-grid
              [loading]="loaderPeriodo"
              [kendoGridBinding]="gridPeriodo.data"
              [pageSize]="20"
              [resizable]="false"
              [pageable]="{
                buttonCount: 5,
                info: true,
                type: 'numeric',
                pageSizes: true,
                previousNext: true,
                position: 'bottom'
              }"
              (add)="gridPeriodo.addHandler($event)"
              (cancel)="gridPeriodo.cancelHandler($event)"
              (save)="gridPeriodo.saveHandler($event)"
              (remove)="gridPeriodo.removeHandler($event)"
              (edit)="gridPeriodo.editHandler($event)"
              [sort]="[{field:'id',dir:'desc'}]"
            >
              <ng-template kendoGridToolbarTemplate>
                <kendo-grid-spacer></kendo-grid-spacer>
                <button kendoGridAddCommand mat-raised-button color="primary" class="hover_butom_primary">
                  Agregar
                </button>
              </ng-template>
              <kendo-grid-column
                title="Periodo"
                headerClass="justify-content-center k-grid-header "
                [headerStyle]="{
                  'background-color': '#3382a9',
                  color: 'white'
                }"
                [width]="100"
                field="periodo"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
                <ng-template kendoGridEditTemplate let-dataItem="dataItem" let-formGroup="formGroup">
                  <kendo-textbox
                    [readonly]="true"
                    [formControl]="formGroup.get('periodo')"
                  >
                  </kendo-textbox>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                title="Cantidad"
                headerClass="justify-content-center k-grid-header "
                [headerStyle]="{
                  'background-color': '#3382a9',
                  color: 'white'
                }"
                [width]="100"
                field="cantidad"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
                <ng-template kendoGridEditTemplate let-dataItem="dataItem"  let-formGroup="formGroup">
                  <kendo-numerictextbox
                    [formControl]="formGroup.get('cantidad')"
                    [format]="'0'"
                    [decimals]="0"
                    [min]="1"
                    [max]="20"
                    [autoCorrect]="true"
                    required
                  >
                  </kendo-numerictextbox>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-command-column
                [sticky]="true"
                title="Acciones"
                [width]="80"
                headerClass="justify-content-center text-center k-grid-header-command"
              >
                <ng-template
                  kendoGridCellTemplate
                  let-dataItem="dataItem"
                  let-isNew="isNew"
                  let-rowIndex="rowIndex"
                >
                  <div class="w-100 d-flex justify-content-center" kendoTooltip>
                    <button
                      kendoGridEditCommand
                      themeColor="warning"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      title="Editar"
                    >
                      <span class="k-icon k-i-edit k-icon-20"></span>
                    </button>
                    <button
                      kendoGridSaveCommand
                      [disabled]="gridPeriodo.formGroup?.invalid"
                      themeColor="primary"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      title="Guardar"
                    >
                      <span class="k-icon k-i-save k-icon-20"></span>
                    </button>
                    <button
                      kendoGridCancelCommand
                      themeColor="secondary"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      title="Cancelar"
                    >
                      <span class="k-icon k-i-cancel k-icon-20"></span>
                    </button>
                    <button
                      kendoGridRemoveCommand
                      themeColor="error"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      title="Eliminar"
                    >
                      <span class="k-icon k-i-delete k-icon-20"></span>
                    </button>
                  </div>
                </ng-template>
              </kendo-grid-command-column>

              <ng-template kendoGridNoRecordsTemplate>
                <div>
                  <kendo-badge-container>
                    <kendo-icon name="cloud" size="medium"></kendo-icon>
                    <kendo-badge position="inside">
                      <kendo-icon
                        name="close"
                        size="small"
                        style="color: red"
                      ></kendo-icon>
                    </kendo-badge>
                  </kendo-badge-container>
                </div>
                <p style="font-size: x-small">No hay registros cargados!</p>
              </ng-template>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button
    mat-raised-button
    color="primary"
    (click)="guardarCambiosPeriodo()"
    style="margin-right: 15px;"
    >
    <mat-icon>save</mat-icon>
      Guardar
    </button>
    <button
      mat-raised-button
      color="warn"
      (click)="modal.close('Close click')"
      style="margin-right: 50px;"
    >
    <mat-icon>cancel</mat-icon>
      Cancelar
    </button>
  </div>
</ng-template>
