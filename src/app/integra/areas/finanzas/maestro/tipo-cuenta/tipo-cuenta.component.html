<ng-template #modalTipoCuenta let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title">
      {{ isNew ? 'Nuevo Tipo de Cuenta' : 'Editar Tipo de Cuenta'}}
    </h3>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <form class="k-form k-form-horizontal" [formGroup]="formTipoCuenta">
      <fieldset class="k-form-fieldset">
        <div class="row">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="nombre" class="k-label">
                <span>Nombre <span class="text-danger fw-bold">*</span></span>
              </label>
              <kendo-textbox
                #nombre
                size="medium"
                placeholder="Nombre"
                formControlName="nombre"
                [showSuccessIcon]="getShowSuccessIcon('nombre')"
                [successIcon]="successIcon"
                showErrorIcon="initial"
                inputValidSpaceDir
              >
              </kendo-textbox>
              <kendo-formhint>Nombre del Tipo de Cuenta</kendo-formhint>
              <kendo-formerror> {{ getErrorMessage("nombre") }} </kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
      </fieldset>
    </form>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button
        kendoButton
        *ngIf="isNew"
        themeColor="primary"
        (click)="crearTipoCuenta()"
      >
        Guardar
      </button>
      <button
        kendoButton
        *ngIf="!isNew"
        themeColor="tertiary"
        (click)="editarTipoCuenta()"
      >
        Actualizar
      </button>

      <button
        themeColor="error"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
</ng-template>

<div class="">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Tipo Cuenta</h3>
        </div>
        <div class="card-body p-4">
          <div class="row">
            <div class="col">
              <ng-template
                #cellTemplateGridEmpresaAuto
                let-dataItem="dataItem"
                let-field="field"
                let-itemValue="itemValue"
              >
                <ng-container [ngSwitch]="field">
                  <ng-container *ngSwitchCase="'fechaModificacion'">
                    {{ itemValue | date: "dd-MM-yyyy" }}
                  </ng-container>
                  <ng-container *ngSwitchDefault>
                    {{ itemValue }}
                  </ng-container>
                </ng-container>
              </ng-template>
              <k-grid-edit
                [gridData]="listaTipoCuenta"
                [loader]="loaderGrid"
                [columns]="gridTipoCuenta.columns"
                [commands]="gridTipoCuenta.comands"
                [gridConfig]="gridTipoCuenta.gridConfig"
                [gridState]="gridTipoCuenta.gridState"
                [commandAdd]="'external'"
                [commandEdit]="'external'"
                [cellTemplateRef]="cellTemplateGridEmpresaAuto"
                (OnGridEvents)="gridEventsTipoCuenta($event)"
              >
              </k-grid-edit>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
