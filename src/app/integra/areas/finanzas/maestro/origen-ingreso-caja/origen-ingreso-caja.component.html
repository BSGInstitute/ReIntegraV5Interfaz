
<ng-template #modalOrigenIngresoCaja let-modal>
    <app-loader *ngIf="loaderModal"></app-loader>
    <div class="modal-header">
      <h2 class="modal-title m-0 p-0" id="modal-basic-title">
        {{ nombreModal }}
      </h2>
      <button
        type="button"
        class="btn-close"
        aria-label="Close"
        (click)="modal.dismiss('Cross click')"
      ></button>
    </div>
    <div class="modal-body">
      <form class="k-form" [formGroup]="formGroupOrigenIngresoCaja">
        <fieldset class="k-form-fieldset">
          <div class="row">
            <div class="col k-form-horizontal">
              <kendo-formfield orientation="horizontal" >
                <label [for]="nombre" class="k-label">
                  <span
                    > Nombre :
                    <strong class="text-danger">*</strong></span
                  >
                </label>
                <kendo-textbox
                  #nombre
                  class="d-flex"
                  size="small"
                  [clearButton]="true"
                  formControlName="nombre"
                  [required]="true"
                  [showSuccessIcon]="getShowSuccessIcon('nombre')"
                  [successIcon]="successIcon"
                >
                </kendo-textbox>
                <kendo-formhint>Ingrese el nombre del origen de ingreso caja</kendo-formhint>
                <kendo-formerror>{{ getErrorMessage("nombre") }} </kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
        </fieldset>
      </form>
    </div>
    <div class="modal-footer">
      <button
        type="button"
        class="btn btn-primary"
        (click)="accionModal();"
      >
        {{ btnModalNombre }}
      </button>
      <button
        type="button"
        class="btn btn-danger"
        (click)="modal.close('Close click')"
      >
        Cancelar
      </button>
    </div>
  </ng-template>

<div class="">
    <div class="row">
      <div class="col-1fa-rotate-270">
        <div class="card">
          <div class="card-header bg-color-material">
            <h1 class="text-white">Origen de Ingreso Caja</h1>
          </div>
          <div class="card-body p-4">
            <div class="row">
              <div class="col">
                <k-grid-edit
                  [gridData]="listaOrigenIngresoCajas"
                  [loader]="loader"
                  [columns]="gridOrigenIngresoCaja.columns"
                  [commands]="gridOrigenIngresoCaja.comands"
                  [gridConfig]="gridOrigenIngresoCaja.gridConfig"
                  [gridState]="gridOrigenIngresoCaja.gridState"
                  [commandAdd]="'external'"
                  [commandEdit]="'external'"
                  (OnGridEvents)="gridEventsResponse($event)"
                >
                </k-grid-edit>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
