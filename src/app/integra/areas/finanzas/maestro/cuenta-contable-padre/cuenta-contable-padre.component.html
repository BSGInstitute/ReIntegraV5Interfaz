<ng-template #modalCuentaContablePadre let-modal>
  <div class="modal-header">
    <h2 class="modal-title m-0 p-0" id="modal-basic-title">
      {{ nombreModal }}
    </h2>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <form class="k-form" [formGroup]="formGroupData">
      <fieldset class="k-form-fieldset">
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal" >
              <label [for]="Numeric" class="k-label" >
                <span
                  >Cuenta Padre
                  <strong class="text-danger">*</strong></span
                >
              </label>
              <kendo-numerictextbox
              #Numeric
              orientation="horizontal"
              [style.width.px]="250"
              formControlName="cuentaPadre"
              [min]="0"
              [decimals]="0"
              [format]="'0'"
              >
              </kendo-numerictextbox>
              <kendo-formhint>Ingrese el numero de la Cuenta Padre</kendo-formhint>
              <kendo-formerror>El numero de la Cuenta Padre es necesario!</kendo-formerror>
            </kendo-formfield>
          </div>
        </div>
        <div class="row">
          <div class="col k-form-horizontal">
            <kendo-formfield orientation="horizontal">
              <label [for]="txt" class="k-label">
                  <span
                  >Descripción :
                  <strong class="text-danger">*</strong></span>
              </label>
              <kendo-textbox
                #txt
                class="d-flex"
                size="medium"
                [clearButton]="true"
                formControlName="descripcion"
                [required]="true"
              >
              </kendo-textbox>
              <kendo-formhint>Ingrese el nombre del Producto</kendo-formhint>
              </kendo-formfield>
            
          </div>
        </div>
      </fieldset>
    </form>
  </div>
  <div class="modal-footer">
    <button
      type="button"
      class="btn btn-primary"
      (click)="accionModal();"
    >
      {{ btnModalNombre }}
    </button>
    <button
      type="button"
      class="btn btn-danger"
      (click)="modal.close('Close click')"
    >
      Cancelar
    </button>
  </div>
</ng-template>


<div class="">
    <div class="row">
      <div class="col-1fa-rotate-270">
        <div class="card">
          <div class="card-header bg-color-material">
            <h1 class="text-white">Cuenta Contable Padre</h1>
          </div>
          <div class="card-body p-4">
            <div class="row">
              <div class="col">
                <ng-template
                  #cellTemplateGridEmpresaAuto
                  let-dataItem="dataItem"
                  let-field="field"
                  let-itemValue="itemValue"
                >
                <ng-container [ngSwitch]="field">
                  <ng-container *ngSwitchCase="'fechaModificacion'">
                    <!-- {{ dataItem.fechaModificacion | date: "dd-MM-yyyy" }} -->
                    {{ itemValue | date: "dd-MM-yyyy" }}
                  </ng-container>
                  <ng-container *ngSwitchDefault>
                    {{ itemValue }}
                  </ng-container>
                </ng-container>

                </ng-template>
                <k-grid-edit
                  [gridData]="listaCuentaContablePadre"
                  [loader]="loader"
                  [columns]="gridCuentaContablePadre.columns"
                  [commands]="gridCuentaContablePadre.comands"
                  [readOnlyColumns]="gridCuentaContablePadre.readOnlyColumns"
                  [gridConfig]="gridCuentaContablePadre.gridConfig"
                  [gridState]="gridCuentaContablePadre.gridState"
                  [commandAdd]="'external'"
                  [commandEdit]="'external'"
                  [cellTemplateRef]="cellTemplateGridEmpresaAuto"
                  (OnGridEvents)="gridEventsResponse($event)"
                >
                </k-grid-edit>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
