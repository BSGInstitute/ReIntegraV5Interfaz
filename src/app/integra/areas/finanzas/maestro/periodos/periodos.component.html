
<ng-template #modalPeriodos let-modal>
    <app-loader *ngIf="loaderModal"></app-loader>
    <div class="modal-header">
      <h2 class="modal-title m-0 p-0" id="modal-basic-title">
        {{ nombreModal }}
      </h2>
      <button
        type="button"
        class="btn-close"
        aria-label="Close"
        (click)="modal.dismiss('Cross click')"
      ></button>
    </div>
    <div class="modal-body">
      <form class="k-form" [formGroup]="formGroupPeriodos">
        <fieldset class="k-form-fieldset">
          <div class="row col-md-11" style="margin-bottom: 1rem">
            <div class="col k-form-horizontal">
              <kendo-formfield orientation="horizontal">
                <label [for]="nombre" class="k-label">
                    <span
                    >Periodo :
                    <strong class="text-danger">*</strong></span>
                </label>
                <kendo-textbox
                  #nombre
                  class="d-flex"
                  size="small"
                  [clearButton]="true"
                  formControlName="nombre"
                  [required]="true"
                  [showSuccessIcon]="getShowSuccessIcon('nombre')"
                  [successIcon]="successIcon"
                >
                </kendo-textbox>
                <kendo-formhint>Ingrese el nombre del periodo</kendo-formhint>
                <kendo-formerror>{{ getErrorMessage("nombre") }} </kendo-formerror>
                </kendo-formfield>
            </div>
          </div>
          <div class="row" style="margin-left: 2.5rem;margin-bottom: 1rem;">
            <div class="row">
                <label  class="k-label">
                    <span
                    >Fechas Periodo :
                    <strong class="text-danger">*</strong></span
                  >     
                </label>
            </div>
            <div class="row" >
                <kendo-daterange>
                <kendo-floatinglabel text="Inicio">
                    <kendo-dateinput
                    kendoDateRangeStartInput
                    formControlName="fechaInicial"
                    [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                    placeholder="dia-mes-año"
                    ></kendo-dateinput>
                </kendo-floatinglabel>
                <kendo-floatinglabel text="Fin">
                    <kendo-dateinput
                    kendoDateRangeEndInput
                    placeholder="dia-mes-año"
                    formControlName="fechaFin"
                    [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                    ></kendo-dateinput>
                </kendo-floatinglabel>
                </kendo-daterange>
            </div>
          </div>

          <div class="row" style="margin-left: 2.5rem;margin-bottom: 1rem;">
            <div class="row">
                <label  class="k-label">
                    <span
                    >Fechas Finanzas :
                    <strong class="text-danger">*</strong></span
                  >     
                </label>
            </div>
            <div class="row" >
                <kendo-daterange>
                <kendo-floatinglabel text="Inicio">
                    <kendo-dateinput
                    kendoDateRangeStartInput
                    formControlName="fechaInicialFinanzas"
                    [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                    placeholder="dia-mes-año"
                    ></kendo-dateinput>
                </kendo-floatinglabel>
                <kendo-floatinglabel text="Fin">
                    <kendo-dateinput
                    kendoDateRangeEndInput
                    placeholder="dia-mes-año"
                    formControlName="fechaFinFinanzas"
                    [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                    ></kendo-dateinput>
                </kendo-floatinglabel>
                </kendo-daterange>
            </div>
          </div>
          <div class="row" style="margin-left: 2.5rem;margin-bottom: 1rem;">
            <div class="row">
                <label  class="k-label">
                    <span
                    >Fechas Rep. Ingresos :
                    <strong class="text-danger">*</strong></span
                  >     
                </label>
            </div>
            <div class="row" >
                <kendo-daterange>
                <kendo-floatinglabel text="Inicio">
                    <kendo-dateinput
                    kendoDateRangeStartInput
                    formControlName="fechaInicialRepIngresos"
                    [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                    placeholder="dia-mes-año"
                    ></kendo-dateinput>
                </kendo-floatinglabel>
                <kendo-floatinglabel text="Fin">
                    <kendo-dateinput
                    kendoDateRangeEndInput
                    placeholder="dia-mes-año"
                    formControlName="fechaFinRepIngresos"
                    [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                    ></kendo-dateinput>
                </kendo-floatinglabel>
                </kendo-daterange>
            </div>
          </div>
        </fieldset>
      </form>
    </div>
    <div class="modal-footer">
      <button
        type="button"
        class="btn btn-primary"
        (click)="accionModal();"
      >
        {{ btnModalNombre }}
      </button>
      <button
        type="button"
        class="btn btn-danger"
        (click)="modal.close('Close click')"
      >
        Cancelar
      </button>
    </div>
  </ng-template>

<div class="">
    <div class="row">
      <div class="col-1fa-rotate-270">
        <div class="card">
          <div class="card-header bg-color-material">
            <h1 class="text-white">Periodos Finanzas</h1>
          </div>
          <div class="card-body p-4">
            <div class="row">
              <div class="col">
                <ng-template
                #cellTemplateGridPeriodo
                let-dataItem="dataItem"
                let-field="field"
                let-itemValue="itemValue"
                >
                    <ng-container
                    *ngIf="
                    field == 'fechaInicial'||
                    field == 'fechaFin'||
                    field == 'fechaInicialFinanzas'||
                    field == 'fechaFinFinanzas'||
                    field == 'fechaInicialRepIngresos'||
                    field == 'fechaFinRepIngresos'; 
                    else gridTempDefault"
                    >
                    {{ itemValue | date: "dd-MM-yyyy" }}
                    </ng-container>
                    
                    <ng-template #gridTempDefault>
                    {{ itemValue }}
                    </ng-template>
              </ng-template>
                <k-grid-edit
                  [gridData]="listaPeriodos"
                  [loader]="loader"
                  [columns]="gridPeriodos.columns"
                  [commands]="gridPeriodos.comands"
                  [gridConfig]="gridPeriodos.gridConfig"
                  [gridState]="gridPeriodos.gridState"
                  [cellTemplateRef]="cellTemplateGridPeriodo"
                  [commandAdd]="'external'"
                  [commandEdit]="'external'"
                  (OnGridEvents)="gridEventsResponse($event)"
                >
                </k-grid-edit>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
