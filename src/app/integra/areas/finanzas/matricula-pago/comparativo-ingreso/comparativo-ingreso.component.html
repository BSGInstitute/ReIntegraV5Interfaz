<div class="">
    <div class="row">
        <div class="col-1fa-rotate-270">
            <div class="card">
                <div class="card-header bg-color-material">
                    <h1 class="text-white">Comparativo de Ingresos</h1>
                </div>
                <div  class="card-body p-4">
                    <div class="col-md-12">
                        <div class="row">
                            <div class="card" style="padding: 0px;">
                                <div class="card-header bg-color-material pb-0">
                                    <h3 class="text-white mb-2">Filtro de Busqueda</h3>
                                </div>
                                <div  class="card-body p-4">
                                    <div class="row">
                                        <form class="k-form" [formGroup]="formGroupFiltro" >
                                            <fieldset class="k-form-fieldset">
                                                <div class="row">
                                                    <div class="col-md-1"></div>
                                                    <div class="col-md-4">
                                                        <div class="row" style="padding: 0px;">
                                                            <div class="row" >
                                                                <label   class="k-label" style="margin-bottom: 0.5rem;">
                                                                    <span
                                                                      >Fecha :</span
                                                                    >
                                                                </label>
                                                                <kendo-dropdownlist
                                                                    class="d-flex center"
                                                                    [data]="listaFecha"
                                                                    size="medium"
                                                                    formControlName="fecha"
                                                                    textField="nombre"
                                                                    valueField="id"
                                                                    [valuePrimitive]="true"
                                                                    >
                                                                </kendo-dropdownlist>
                                                            </div>
                                                        </div>
                                                        <br>
                                                        <div class="row" style="padding: 0px;">
                                                            <label [for]="coordinadores"  class="k-label" style="margin-bottom: 0.5rem;">
                                                                <span
                                                                  >Coordinador :</span
                                                                >
                                                            </label>
                                                            <kendo-multiselect
                                                                #coordinadores
                                                                [style.width.%]="90"
                                                                [data]="itemsCordinador"
                                                                placeholder="Coordinador(s)"
                                                                textField="nombreCompleto"
                                                                valueField="id"
                                                                [valuePrimitive]="true"
                                                                formControlName="coordinadores"
                                                                [filterable]="true"
                                                                (filterChange)="filtrarCoodinador($event)"
                                                            >
                                                            </kendo-multiselect>
                                                        </div>
                                                    </div>
                                                    <div class="col-md-4">
                                                        <div class="row" style="padding: 0px;">
                                                            <label   class="k-label" style="margin-bottom: 0.5rem;">
                                                                <span
                                                                  >Fechas Filtro (<strong class="text-danger">*</strong>) :</span
                                                                >
                                                            </label>
                                                            <kendo-daterange
                                                                [incompleteDateValidation]="true"
                                                                >
                                                                    <div class="col-md-5">
                                                                        <kendo-dateinput
                                                                        kendoDateRangeStartInput
                                                                        size="medium"
                                                                        [fillMode]="'outline'"
                                                                        formControlName="fechaInicioFiltro"
                                                                        [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                        placeholder="Inicio"
                                                                        [incompleteDateValidation]="true"
                                                                        ></kendo-dateinput>
                                                                    </div>
                                                                    <div class="col-md-2" style="padding: 0%;width: 5%;text-align: center;"><p style="
                                                                        margin-bottom: 5px;"><strong>—</strong></p></div>
                                                                    <div class="col-md-5">
                                                                        <kendo-dateinput
                                                                        kendoDateRangeEndInput
                                                                        size="medium"
                                                                        [fillMode]="'outline'"
                                                                        placeholder="Fin"
                                                                        formControlName="fechaFinFiltro"
                                                                        [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                                                        [incompleteDateValidation]="true"
                                                                        ></kendo-dateinput>
                                                                    </div>
                                                            </kendo-daterange>
                                                        </div>
                                                        <br>
                                                        <div class="row" style="padding: 0px;">
                                                            <label [for]="asesor"  class="k-label" style="margin-bottom: 0.5rem;">
                                                                <span
                                                                  >Asesor :</span
                                                                >
                                                            </label>
                                                            <kendo-multiselect
                                                                #asesor
                                                                [style.width.%]="90"
                                                                [data]="itemsAsesor"
                                                                placeholder="Asesor(es)"
                                                                textField="nombreCompleto"
                                                                valueField="id"
                                                                [valuePrimitive]="true"
                                                                formControlName="asesores"
                                                                [filterable]="true"
                                                                (filterChange)="filtrarAsesor($event)"
                                                            >
                                                            </kendo-multiselect>
                                                        </div>
                                                    </div>
                                                    <div class="col-md-1" style="padding-top: 6rem;">
                                                        <button mat-raised-button color="primary"
                                                        (click)="ObtenerReporte()"
                                                        >
                                                            <mat-icon>search</mat-icon>
                                                            Buscar
                                                        </button>
                                                    </div>
                                                    <div class="col-md-1"></div>

                                                </div>
                                            </fieldset>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <br>
                        <div class="row">
                            <div class="card" style="padding: 0px;">
                                <div class="card-header bg-color-material pb-0">
                                    <h3 class="text-white mb-2">Reporte de tasa conversión consolidada</h3>
                                </div>
                                <div  class="card-body p-4">
                                    <div class="row">
                                        <kendo-grid
                                        style="padding-left: 0px; max-height: 700px"
                                        [kendoGridBinding]="listaReporte"
                                        [loading]="loaderGrid"
                                        [pageSize]="10"
                                        [sortable]="true"
                                        [reorderable]="true"
                                        [resizable]="true"
                                        filterable="menu"
                                        [pageable]="true"
                                        style="max-height: 700px" 
                                      >
                                        
                                        <ng-template
                                          kendoGridToolbarTemplate
                                          class="bg-danger"
                                        >
                                            <button
                                            mat-raised-button
                                            style="
                                              background-color: rgb(59, 109, 105);
                                              color: white;
                                            "
                                            (click)="excelexport.save()"
                                            >
                                            <span class="k-icon k-i-file-excel" style="font-size:20px"></span>
                                            Exportar a Excel
                                            </button>
                                            <kendo-excelexport 
                                                [data]="listaReporte" 
                                                fileName="ReporteTasaConsolidada.xlsx" #excelexport>
                                                <kendo-excelexport-column field="id" title="Id Oportunidad" [sticky]="true">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="alumno" title="Alumno" [sticky]="true">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="asesor" title="Asesor">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="nombreCC" title="Centro Costo">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="pais" title="Pais">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="precioRealDolar" title="Precio Real US$">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="precioReal" title="Precio Real">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="precioSinDescDolar" title="Precio sin Desc. US$">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="precioSinDesc" title="Precio sin Desc.">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="descuentoDolar" title="Descuento US$">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="descuento" title="Descuento">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="mesDolar" title="Pago Total Cronograma US$">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="mes" title="Pago Total Cronograma">
                                                </kendo-excelexport-column>
                                                <kendo-excelexport-column field="codigoMatricula" title="Código Matrícula">
                                                </kendo-excelexport-column>
                                            </kendo-excelexport>
                                        </ng-template>
                                        <kendo-grid-column
                                          title="Id Oportunidad"
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="150"
                                          field="id"
                                          [locked]="false"
                                          [sticky]="true"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
            
                                        <kendo-grid-column
                                          title="Alumno"
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="200"
                                          field="alumno"
                                          [locked]="false"
                                          [sticky]="true"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
                                        <kendo-grid-column
                                          title="Asesor"
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="120"
                                          field="asesor"
                                          [locked]="false"
                                          [sticky]="false"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
                                        <kendo-grid-column
                                          title="Centro Costo"
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="150"
                                          field="nombreCC"
                                          [locked]="false"
                                          [sticky]="false"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
                                        <kendo-grid-column
                                          title="Pais"
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="140"
                                          field="pais"
                                          [locked]="false"
                                          [sticky]="false"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
                                        <kendo-grid-column
                                        title="Precio Real US$"
                                        headerClass="justify-content-center k-grid-header "
                                        [headerStyle]="{
                                          'background-color': '#3382a9',
                                          color: 'white'
                                        }"
                                        [width]="150"
                                        field="precioRealDolar"
                                        [locked]="false"
                                        [sticky]="false"
                                        [filterable]="true"
                                        [hidden]="false"
                                      >
                                      </kendo-grid-column>
                                        <kendo-grid-column
                                          title="Precio Real"
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="150"
                                          field="precioReal"
                                          [locked]="false"
                                          [sticky]="false"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
                                        <kendo-grid-column
                                        title="Precio sin Desc. US$"
                                        headerClass="justify-content-center k-grid-header "
                                        [headerStyle]="{
                                          'background-color': '#3382a9',
                                          color: 'white'
                                        }"
                                        [width]="150"
                                        field="precioSinDescDolar"
                                        [locked]="false"
                                        [sticky]="false"
                                        [filterable]="true"
                                        [hidden]="false"
                                      >
                                      </kendo-grid-column>
                                        <kendo-grid-column
                                          title="Precio sin Desc."
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="150"
                                          field="precioSinDesc"
                                          [locked]="false"
                                          [sticky]="false"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
                                        <kendo-grid-column
                                          title="Descuento US$"
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="150"
                                          field="descuentoDolar"
                                          [locked]="false"
                                          [sticky]="false"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
                                        <kendo-grid-column
                                          title="Descuento "
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="150"
                                          field="descuento"
                                          [locked]="false"
                                          [sticky]="false"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
                                        <kendo-grid-column
                                          title="Pago Total Cronograma US$"
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="150"
                                          field="mesDolar"
                                          [locked]="false"
                                          [sticky]="false"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
                                        <kendo-grid-column
                                          title="Pago Total Cronograma"
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="150"
                                          field="mes"
                                          [locked]="false"
                                          [sticky]="false"
                                          [filterable]="true"
                                          [hidden]="false"
                                        >
                                        </kendo-grid-column>
                                        <kendo-grid-column
                                          title="Código Matrícula"
                                          headerClass="justify-content-center k-grid-header "
                                          [headerStyle]="{
                                            'background-color': '#3382a9',
                                            color: 'white'
                                          }"
                                          [width]="150"
                                          field="codigoMatricula"
                                          [locked]="false"
                                          [sticky]="false"
                                          [filterable]="true"
                                          [hidden]="false"
                                        > 
                                        </kendo-grid-column>
                                        <ng-template kendoGridNoRecordsTemplate>
                                          <div>
                                            <kendo-badge-container>
                                              <kendo-icon
                                                name="cloud"
                                                size="large"
                                              ></kendo-icon>
                                              <kendo-badge position="inside">
                                                <kendo-icon
                                                  name="close"
                                                  style="color: red"
                                                ></kendo-icon>
                                              </kendo-badge>
                                            </kendo-badge-container>
                                          </div>
                                          <p>No hay registros cargados!</p>
                                        </ng-template>
                                        <ng-template
                                          kendoPagerTemplate
                                          let-totalPages="totalPages"
                                          let-currentPage="currentPage"
                                          >
                                            <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                                            <kendo-pager-numeric-buttons
                                              [buttonCount]="5"
                                            ></kendo-pager-numeric-buttons>
                                            <kendo-pager-next-buttons></kendo-pager-next-buttons>
                                            <!-- <kendo-pager-input></kendo-pager-input> -->
                                            <kendo-pager-info></kendo-pager-info>
                                            <kendo-pager-page-sizes [pageSizes]="pageSizes"></kendo-pager-page-sizes>
                      
                                        </ng-template>
                                      </kendo-grid>
                                    </div>
                                </div>
                            </div>
                        </div>    
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
