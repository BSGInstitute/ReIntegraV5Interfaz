<div class="">
  <div class="row">
    <div class="col-1fa-rotate-270">
      <div class="k-loading-panel" *ngIf="loaderGeneral">
        <div class="k-loading-panel-mask"></div>
        <div class="k-loading-panel-wrapper">
          <mat-spinner></mat-spinner>
          <div class="k-loading-panel-text fs-5 text-primary">Buscando...</div>
        </div>
      </div>
      <div class="card">
        <div class="card-header bg-color-material">
          <h1 class="text-white">Exportar Crep</h1>
        </div>
        <div class="card-body p-4">
          <div class="col-md-12">
            <div class="row">
              <div class="card" style="padding: 0px">
                <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Matrícula Alumno</h3>
                </div>
                <div class="card-body p-4">
                  <div class="k-loading-panel" *ngIf="loaderMatriculaFiltro">
                    <div class="k-loading-panel-mask"></div>
                    <div class="k-loading-panel-wrapper">
                      <kendo-loader
                        type="converging-spinner"
                        themeColor="primary"
                        size="large"
                      >
                      </kendo-loader>
                      <div class="k-loading-panel-text fs-5 text-primary">
                        Buscando...
                      </div>
                    </div>
                  </div>

                  <div class="row my-2">
                    <div class="col-md-10">
                      <form
                        class="k-form"
                        [formGroup]="formMatriculaAlumno"
                        style="padding-left: 5%"
                      >
                        <fieldset class="k-form-fieldset">
                          <div class="row">
                            <div class="col-md-12 k-form-horizontal">
                              <kendo-formfield
                                orientation="horizontal"
                                style="margin: 0px !important"
                              >
                                <label
                                  [for]="dropdownlist"
                                  class="k-label"
                                  style="margin-bottom: 5px"
                                >
                                  <span>Código de Alumno : </span>
                                </label>
                                <kendo-combobox
                                  #dropdownlist
                                  class="d-flex center"
                                  [data]="listaCodigoAlumno"
                                  size="medium"
                                  formControlName="codigoMat"
                                  [filterable]="true"
                                  (filterChange)="filterCodigoMat($event)"
                                  placeholder="< Ingrese el Código de Matrícula >"
                                  textField="id"
                                  valueField="id"
                                  [valuePrimitive]="true"
                                  (selectionChange)="
                                    CargarDataMatricula($event)
                                  "
                                >
                                </kendo-combobox>
                              </kendo-formfield>
                            </div>
                          </div>
                          <div class="row my-2">
                            <div class="col-md-12 k-form-horizontal">
                              <kendo-formfield
                                orientation="horizontal"
                                style="margin: 0px !important"
                              >
                                <label
                                  class="k-label"
                                  style="margin-bottom: 5px"
                                >
                                  <span>Alumno : </span>
                                </label>
                                <kendo-combobox
                                  [data]="listaAlumno"
                                  size="medium"
                                  formControlName="alumno"
                                  [filterable]="true"
                                  (filterChange)="filterAlumno($event)"
                                  placeholder="< Ingrese el Nombre del Alumno >"
                                  textField="nombreCompleto"
                                  valueField="id"
                                  [virtual]="true"
                                  [valuePrimitive]="true"
                                >
                                </kendo-combobox>
                              </kendo-formfield>
                            </div>
                          </div>
                          <div class="row my-2">
                            <div class="col-md-12 k-form-horizontal">
                              <kendo-formfield
                                orientation="horizontal"
                                style="margin: 0px !important"
                              >
                                <label
                                  class="k-label"
                                  style="margin-bottom: 5px"
                                >
                                  <span>Programa : </span>
                                </label>
                                <kendo-combobox
                                  formControlName="idPrograma"
                                  class="d-flex center"
                                  size="medium"
                                  [data]="listaPrograma"
                                  textField="nombre"
                                  valueField="id"
                                  [filterable]="true"
                                  [filter]="true"
                                  [valuePrimitive]="true"
                                  (filterChange)="filterPrograma($event)"
                                >
                                </kendo-combobox>
                              </kendo-formfield>
                            </div>
                          </div>

                          <div
                            class="row my-2 me-0 pe-0 d-flex justify-content-end"
                          >
                            <div class="col-md-auto">
                              <button
                                class="btn btn-sm btn-primary"
                                (click)="ObtenerListaMatriculaAlumno()"
                              >
                                <fa-icon
                                  [icon]="['fas', 'arrows-rotate']"
                                  class="me-1"
                                ></fa-icon>
                                Agregar
                              </button>
                            </div>

                            <div class="col-md-4">
                              <kendo-dropdownlist
                                [data]="dataAsigancion"
                                textField="clave"
                                valueField="valor"
                                formControlName="asignacion"
                                [valuePrimitive]="true"
                              ></kendo-dropdownlist>
                            </div>
                            <div class="col-md-4 pe-0">
                              <kendo-dropdownlist
                                [data]="dataEstado"
                                textField="clave"
                                valueField="valor"
                                formControlName="estado"
                                [valuePrimitive]="true"
                              ></kendo-dropdownlist>
                            </div>
                          </div>
                        </fieldset>
                      </form>
                    </div>
                    <div class="col-md-1"></div>
                  </div>
                </div>
              </div>
            </div>
            <br />

            <div class="row">
              <div class="card" style="padding: 0px">
                <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Listado de Alumnos</h3>
                </div>
                <div class="card-body p-4">
                  <div class="row">
                    <kendo-grid
                      style="padding-left: 0px"
                      [data]="gridExportarCrep.view"
                      [kendoGridBinding]="gridExportarCrep.data"
                      [loading]="loaderGridfinal"
                      [resizable]="false"
                      [pageable]="{
                        buttonCount: 5,
                        info: true,
                        type: 'numeric',
                        pageSizes: true,
                        previousNext: true,
                        position: 'bottom'
                      }"
                      [pageSize]="5"
                    >
                      <kendo-grid-column
                        title="CodPE"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="100"
                        field="codigoProgramaEspecifico"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Programa"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="200"
                        field="nombreProgramaEspecifico"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Matricula"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="100"
                        field="codigoMatricula"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>

                      <kendo-grid-column
                        title="Nombres"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="150"
                        field="nombreCompletoAlumno"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Fecha Matricula"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="100"
                        field="fechaMatricula"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                        <ng-template kendoGridCellTemplate let-dataItem>
                          {{ fechaTemplate(dataItem.fechaMatricula) }}
                        </ng-template>
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Acciones"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="100"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                        <ng-template
                          kendoGridCellTemplate
                          let-dataItem="dataItem"
                        >
                          <div class="w-100 d-flex justify-content-center" kendoTooltip>
                            <button
                              kendoButton
                              themeColor="success"
                              fillMode="solid"
                              rounded="large"
                              size="large"
                              class="p-2 me-1 ms-1"
                              container="body"
                              placement="top"
                              title="Editar"
                              (click)="
                                ObtenerCoutasCrep(dataItem.codigoMatricula)
                              "
                            >
                              <span class="k-icon k-i-reorder k-icon-20"></span>
                            </button>
                            <button
                              kendoGridRemoveCommand
                              themeColor="error"
                              fillMode="solid"
                              rounded="large"
                              size="large"
                              class="p-2 me-1 ms-1"
                              container="body"
                              placement="top"
                              title="Eliminar"
                              (click)="EliminarIngresoEgreso(dataItem.index)"
                            >
                              <span class="k-icon k-i-delete k-icon-20"></span>
                            </button>
                          </div>
                        </ng-template>
                      </kendo-grid-column>

                      <ng-template kendoGridNoRecordsTemplate>
                        <div>
                          <kendo-badge-container>
                            <kendo-icon name="cloud" size="large"></kendo-icon>
                            <kendo-badge position="inside">
                              <kendo-icon
                                name="close"
                                style="color: red"
                              ></kendo-icon>
                            </kendo-badge>
                          </kendo-badge-container>
                        </div>
                        <p>No hay registros cargados!</p>
                      </ng-template>
                    </kendo-grid>
                  </div>
                </div>
              </div>
            </div>

            <br />

            <div class="row">
              <div class="card" style="padding: 0px">
                <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Listado Cuotas</h3>
                </div>
                <div class="card-body p-4">
                  <div class="row">
                    <kendo-grid
                      style="padding-left: 0px"
                      [data]="gridCoutas.view"
                      [kendoGridBinding]="gridCoutas.data"
                      [loading]="false"
                      [resizable]="false"
                      [selectable]="{
                        checkboxOnly: true,
                        mode: 'multiple'
                      }"
                      kendoGridSelectBy="id"
                      [(selectedKeys)]="listaSeleccion"
                    >
                      <ng-template kendoGridToolbarTemplate class="bg-danger">
                        <button
                          mat-raised-button
                          style="background-color: rgb(2, 118, 2); color: white"
                          (click)="abrirModal()"
                        >
                          <mat-icon>unarchive</mat-icon>
                          Generara Archivo
                        </button>
                        <kendo-label
                          class="k-form"
                          text="Codigo Alumno:"
                          [for]="input"
                        ></kendo-label>
                        <input
                          #input
                          [readOnly]="true"
                          style="background-color: rgb(236, 236, 236)"
                          [formControl]="inputCodigo"
                          [style.width.px]="200"
                          [disabled]="true"
                          placeholder="Codigo Alumno"
                          kendoTextBox
                        />

                        <kendo-grid-spacer></kendo-grid-spacer>
                      </ng-template>
                      <kendo-grid-column
                        title="Cancelado"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="100"
                        field="cancelado"
                        [locked]="false"
                        [sticky]="true"
                        [filterable]="true"
                        [hidden]="false"
                      >
                        <ng-template kendoGridCellTemplate let-dataItem>
                          <div style="text-align: center">
                            <ng-container *ngIf="dataItem.cancelado == true">
                              <span
                                class="k-icon k-i-check-outline k-icon-30"
                                style="
                                  color: rgb(105, 185, 105);
                                  font-size: medium;
                                "
                              ></span>
                            </ng-container>
                            <ng-container *ngIf="dataItem.cancelado == false">
                              <span
                                class="k-icon k-i-x-outline k-icon-30"
                                style="
                                  color: rgb(179, 97, 90);
                                  font-size: medium;
                                "
                              ></span>
                            </ng-container>
                          </div>
                        </ng-template>
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Nro. Cuota"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="80"
                        field="nroCuota"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Nro. Sub-Cuota"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="80"
                        field="nroSubCuota"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Fecha Venc."
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="130"
                        field="fechaVencimiento"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Moneda"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="100"
                        field="moneda"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Cuota"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="80"
                        field="cuota"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Mora"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="80"
                        field="mora"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Total"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="80"
                        field="total"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>

                      <kendo-grid-column
                        title="Fecha Ant."
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="130"
                        field="fechaAnterior"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Enviado"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="80"
                        field="enviado"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      <ng-template kendoGridCellTemplate let-dataItem>
                        <ng-container *ngIf="dataItem.enviado else No">
                          Si
                        </ng-container>
                        <ng-template #No>
                          NO
                        </ng-template>
                      </ng-template>
                      </kendo-grid-column>
                      <kendo-grid-column
                        title="Adic"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="140"
                        field="adicional"
                        [locked]="false"
                        [sticky]="false"
                        [filterable]="true"
                        [hidden]="false"
                      >
                      </kendo-grid-column>

                      <kendo-grid-checkbox-column
                        title="Check"
                        headerClass="justify-content-center k-grid-header "
                        [headerStyle]="{
                          'background-color': '#3382a9',
                          color: 'white'
                        }"
                        [width]="80"
                        [headerClass]="{ 'text-center': true }"
                        [class]="{ 'text-center': true }"
                        headerClass="header-grid-single"
                      ></kendo-grid-checkbox-column>

                      <ng-template kendoGridNoRecordsTemplate>
                        <div>
                          <kendo-badge-container>
                            <kendo-icon name="cloud" size="large"></kendo-icon>
                            <kendo-badge position="inside">
                              <kendo-icon
                                name="close"
                                style="color: red"
                              ></kendo-icon>
                            </kendo-badge>
                          </kendo-badge-container>
                        </div>
                        <p>No hay registros cargados!</p>
                      </ng-template>
                    </kendo-grid>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<ng-template #modalExportarCrep let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title">
      Exportar
    </h3>
    <button
      type="button"
      class="btn-close btn-close-white"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <form class="k-form k-form-horizontal" [formGroup]="formExportarCrep">
      <fieldset class="k-form-fieldset">
        <div class="row my-2">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="cuenta" class="k-label"> Cuenta: </label>
              <kendo-dropdownlist
                #cuenta
                formControlName="cuenta"
                class="d-flex"
                size="medium"
                [data]="comboCuenta"
                textField="cuenta"
                valueField="id"
                [valuePrimitive]="true"
                (selectionChange)="SelectCuenta($event)"
                [defaultItem]="{id:null,cuenta:'< Seleciona una cuenta>' }"
              >
              </kendo-dropdownlist>
            </kendo-formfield>
          </div>
        </div>

        <div class="row my-2">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="moneda" class="k-label"> Moneda: </label>
              <input
                #moneda
                [readOnly]="true"
                class="d-flex"
                size="medium"
                style="background-color: rgb(236, 236, 236)"
                formControlName="moneda"
                [disabled]="true"
                placeholder="Moneda"
                kendoTextBox
              />
            </kendo-formfield>
          </div>
        </div>

        <div class="row my-2">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="archivo" class="k-label"> Archivo: </label>
              <input
                #archivo
                class="d-flex"
                size="medium"
                style="background-color: rgb(236, 236, 236)"
                formControlName="archivo"
                placeholder="CREP_X"
                kendoTextBox
              />
            </kendo-formfield>
          </div>
        </div>
      </fieldset>
    </form>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button
       kendoButton
       themeColor="primary"
       (click)="generarCrep()"
      >
        Generar
      </button>

      <button
        themeColor="error"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
</ng-template>
