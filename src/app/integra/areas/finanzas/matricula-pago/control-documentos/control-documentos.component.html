<div class="">
  <div class="row">
    <div class="col-1fa-rotate-270">
      <div class="card">
        <div class="card-header bg-color-material">
          <h1 class="text-white">Control de Documentos por Alumno</h1>
        </div>
        <div class="card-body p-4">
          <div class="row">
            <div class="col-md-1" style="margin-left: 5%">
              <div orientation="horizontal" style="padding-bottom: 5%">
                <label style="margin-bottom: 5px;width: 100px;">
                  <input
                    type="checkbox"
                    style="margin-right: 5px"
                    [checked]="currentlyChecked === check_box_type.coordinadorC"
                    (click)="selectCheckBox(check_box_type.coordinadorC)"
                  />
                  <span>Coordinador </span>
                </label>
              </div>
            </div>
            <div class="col-md-4" style="margin-left: 5%">
              <kendo-formfield
                orientation="horizontal"
                style="padding-bottom: 5%"
              >
                <kendo-combobox
                  [disabled]="disCord"
                  [formControl]="coordinador"
                  [data]="itemCoordinador"
                  class="d-flex"
                  size="medium"
                  textField="nombreCompleto"
                  [valuePrimitive]="false"
                  valueField="id"
                  placeholder="< Seleccionar Coordinador >"
                  [filterable]="true"
                  (filterChange)="Coordinador($event)"
                >
                </kendo-combobox>
              </kendo-formfield>

              <br />
            </div>
            <div class="col-md-1" style="margin-left: 5%;width: 74px;">
              <div orientation="horizontal" style="padding-bottom: 5%">
                <label class="k-label" style="margin-bottom: 5px;">
                  <span>Estado </span>
                </label>
              </div>
            </div>
            <div class="col-md-3">
              <kendo-formfield>
                <kendo-dropdownlist
                  [formControl]="estado"
                  class="d-flex center"
                  size="medium"
                  [data]="listaEstado"
                  textField="nombre"
                  valueField="id"
                  [defaultItem]="{
                    id: null,
                    nombre: '< Seleccionar >'
                  }"
                  [valuePrimitive]="true"
                  (selectionChange)="SeleccionEstado($event)"
                >
                </kendo-dropdownlist>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-md-1" style="margin-left: 5%">
              <div orientation="horizontal" style="padding-bottom: 5%">
                <label class="k-label" style="margin-bottom: 5px">
                  <input
                    type="checkbox"
                    style="margin-right: 5px"
                    [checked]="currentlyChecked === check_box_type.asesorC"
                    (click)="selectCheckBox(check_box_type.asesorC)"
                  />
                  <span>Asesor </span>
                </label>
              </div>
            </div>
            <div class="col-md-4" style="margin-left: 5%">
              <kendo-formfield
                orientation="horizontal"
                style="padding-bottom: 5%"
              >
                <kendo-combobox
                  [disabled]="disAse"
                  [formControl]="asesor"
                  [data]="itemAsesor"
                  class="d-flex"
                  size="medium"
                  textField="nombreCompleto"
                  [valuePrimitive]="false"
                  valueField="id"
                  placeholder="< Seleccionar Asesor >"
                  [filterable]="true"
                  (filterChange)="Asesor($event)"
                >
                </kendo-combobox>
              </kendo-formfield>

              <br />
            </div>
          </div>
          <div class="row">
            <div class="col-md-1" style="margin-left: 5%">
              <div orientation="horizontal" style="padding-bottom: 5%">
                <label  style="margin-bottom: 5px; width: 150px;">
                  <input
                    type="checkbox"
                    style="margin-right: 5px"
                    [checked]="currentlyChecked === check_box_type.centroCostoC"
                    (click)="selectCheckBox(check_box_type.centroCostoC)"
                  />
                  <span>Centro Costos </span>
                </label>
              </div>
            </div>
            <div class="col-md-4" style="margin-left: 5%">
              <kendo-formfield
                orientation="horizontal"
                style="padding-bottom: 5%"
              >
                <kendo-combobox
                  [disabled]="disCen"
                  [formControl]="centroCostos"
                  [data]="itemCentroCostos"
                  class="d-flex"
                  size="medium"
                  textField="nombre"
                  [valuePrimitive]="false"
                  valueField="idPEspecifico"
                  placeholder="< Seleccionar Centro de Costo >"
                  [filterable]="true"
                  (filterChange)="CentroCostos($event)"
                >
                </kendo-combobox>
              </kendo-formfield>

              <br />
            </div>
          </div>
          <div class="row">
            <div class="col-md-1" style="margin-left: 5%">
              <div orientation="horizontal" style="padding-bottom: 5%">
                <label class="k-label" style="margin-bottom: 5px">
                  <input
                    type="checkbox"
                    style="margin-right: 5px"
                    [checked]="currentlyChecked === check_box_type.alumnoC"
                    (click)="selectCheckBox(check_box_type.alumnoC)"
                  />
                  <span>Alumno </span>
                </label>
              </div>
            </div>
            <div class="col-md-4" style="margin-left: 5%">
              <kendo-formfield
                orientation="horizontal"
                style="padding-bottom: 5%"
              >
                <kendo-combobox
                  [disabled]="disAlu"
                  [formControl]="alumno"
                  [data]="itemAlumno"
                  class="d-flex"
                  size="medium"
                  textField="nombreCompleto"
                  [valuePrimitive]="false"
                  valueField="id"
                  placeholder="< Seleccionar Alumno >"
                  [filterable]="true"
                  (filterChange)="Alumno($event)"
                >
                </kendo-combobox>
              </kendo-formfield>

              <br />
            </div>
          </div>
          <div class="row">
            <div class="col-md-1" style="margin-left: 5%">
              <div orientation="horizontal" style="padding-bottom: 5%">
                <label class="k-label" style="margin-bottom: 5px">
                  <input
                    type="checkbox"
                    style="margin-right: 5px"
                    [checked]="currentlyChecked === check_box_type.matriculaC"
                    (click)="selectCheckBox(check_box_type.matriculaC)"
                  />
                  <span>Matricula </span>
                </label>
              </div>
            </div>
            <div class="col-md-4" style="margin-left: 5%">
              <kendo-formfield
                orientation="horizontal"
                style="padding-bottom: 5%"
              >
                <kendo-combobox
                  [disabled]="disMat"
                  [formControl]="matricula"
                  [data]="itemMatricula"
                  class="d-flex"
                  size="medium"
                  textField="nombre"
                  [valuePrimitive]="false"
                  valueField="id"
                  placeholder="< Seleccionar Matricula >"
                  [filterable]="true"
                  (filterChange)="Matricula($event)"
                >
                </kendo-combobox>
              </kendo-formfield>
            </div>
            <div class="col-md-4" >
              <div class="row">
                <div class="col-md-2"></div>
                <div class="col-md-2" style="padding-left:0%">
                  <button
                    kendoButton
                    icon="k-icon k-i-search k-icon-20"
                    type="button"
                    themeColor="primary"
                    (click)="Buscar()"
                  >
                    Buscar
                  </button>
                </div>
                
               
              </div>
              
            </div>
          </div>
          
        </div>

        <ng-container *ngIf="loading">
          <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        </ng-container>
        <div class="row">
          <div class="col-md-12">
            <kendo-grid
              [kendoGridBinding]="TablaDocs"
              [loading]="loaderDocs"
              [pageSize]="20"
              [sortable]="true"
              [reorderable]="true"
              [resizable]="true"
              [columnMenu]="{ filter: true }"
              [selectable]="true"
              (cellClick)="cellClickHandler($event)"
              (cellClose)="cellCloseHandler($event)"
              (detailExpand)="gridEventsResponse($event)"
              (detailCollapse)="prueba($event)"
              [pageable]="{
                buttonCount: 5,
                info: true,
                type: 'numeric',
                pageSizes: true,
                previousNext: true,
                position: 'bottom'
              }"
            >
              <kendo-grid-column
                title="Estado Matricula"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="estadoMatricula"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
              </kendo-grid-column>
              <kendo-grid-column
                title="Cod. Alumno"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="codigoMatricula"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
              </kendo-grid-column>
              <kendo-grid-column
                title="Alumno"
                headerClass="justify-content-center k-grid-header "
                [width]="200"
                field="nombreAlumno"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
              </kendo-grid-column>
              <kendo-grid-column
                title="Mes"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="mes"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
              </kendo-grid-column>
              <kendo-grid-column
                title="Pago Acumulado"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="pagoAcumuladoCronogramaFinal"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
              </kendo-grid-column>
              <kendo-grid-column
                title="Criterio Calificacion"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="idCriterioCalificacion"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
                <ng-template
                  kendoGridEditTemplate
                  let-dataItem="dataItem"
                  let-formGroup="formGroup"
                >
                  <kendo-dropdownlist
                    size="small"
                    [data]="listaCriterioCalificacion"
                    textField="nombre"
                    valueField="id"
                    [valuePrimitive]="true"
                    [formControl]="formGroup.get('idCriterioCalificacion')"
                  >
                  </kendo-dropdownlist>
                </ng-template>
                <ng-template kendoGridCellTemplate let-dataItem>
                
                    {{
                      criterioCalificacionTemplate(
                        dataItem.idCriterioCalificacion
                      )
                    }}

                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                title="Quien Entrego"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="quienEntrego"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
                <ng-template
                  kendoGridEditTemplate
                  let-dataItem="dataItem"
                  let-formGroup="formGroup"
                >
                  <kendo-textbox
                    size="small"
                    [formControl]="formGroup.get('quienEntrego')"
                  >
                  </kendo-textbox>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                title="Fecha Entrega Docs"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="fechaEntregaDocumento"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
                <ng-template
                  kendoGridEditTemplate
                  let-dataItem="dataItem"
                  let-formGroup="formGroup"
                >
                  <kendo-datetimepicker
                    [size]="'small'"
                    [format]="'dd-MM-yyyy HH:mm'"
                    [formControl]="formGroup.get('fechaEntregaDocumento')"
                    placeholder="dia-mes-año  Hora:minuto"
                    [incompleteDateValidation]="true"
                  >
                  </kendo-datetimepicker>
                </ng-template>
                <ng-template kendoGridCellTemplate let-dataItem>
                  
                    {{ fechaTemplate(dataItem.fechaEntregaDocumento, false) }}
                  
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                title="Observaciones"
                headerClass="justify-content-center k-grid-header "
                [width]="300"
                field="observaciones"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
                <ng-template
                  kendoGridEditTemplate
                  let-dataItem="dataItem"
                  let-formGroup="formGroup"
                >
                  <kendo-textbox
                    [formControl]="formGroup.get('observaciones')"
                  >
                  </kendo-textbox>
                </ng-template>
              </kendo-grid-column>
              <kendo-grid-column
                title="Coordinador"
                headerClass="justify-content-center k-grid-header "
                [width]="200"
                field="nombreCoordinador"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
              </kendo-grid-column>
              <kendo-grid-column
                title="Asesor"
                headerClass="justify-content-center k-grid-header "
                [width]="200"
                field="nombreAsesor"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
              </kendo-grid-column>
              <kendo-grid-column
                title="Fecha 1er Pago"
                headerClass="justify-content-center k-grid-header "
                [width]="150"
                field="fechaPrimerPagoCronogramaFinal"
                [locked]="false"
                [sticky]="false"
                [filterable]="true"
                [hidden]="false"
              >
              <ng-template kendoGridCellTemplate let-dataItem>
                  
                {{ fechaTemplate(dataItem.fechaPrimerPagoCronogramaFinal,false) }}
              
            </ng-template>
              </kendo-grid-column>
              <kendo-grid-command-column
                [sticky]="false"
                title="Acciones"
                [width]="120"
                headerClass="justify-content-center text-center k-grid-header-command"
              >
                <ng-template
                  kendoGridCellTemplate
                  let-dataItem="dataItem"
                  let-rowIndex="rowIndex"
                >
                  <div
                    class="w-100 d-flex justify-content-center"
                    style="padding: 20px"
                    kendoTooltip
                  >
                    <button
                      title="Guardar"
                      kendoButton
                      themeColor="info"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      (click)="Guardar(dataItem)"
                    >
                      <span class="k-icon k-i-save k-icon-20"></span>
                    </button>
                  </div>
                </ng-template>
              </kendo-grid-command-column>
              <ng-template kendoGridNoRecordsTemplate>
                  <div>
                    <kendo-badge-container>
                      <kendo-icon name="cloud" size="large"></kendo-icon>
                      <kendo-badge position="inside">
                        <kendo-icon name="close" style="color: red;" ></kendo-icon>
                      </kendo-badge>
                    </kendo-badge-container>
                  </div>
                  <p>No hay registros cargados!</p>
              </ng-template>
              <ng-template kendoGridDetailTemplate let-dataItem>
             <app-desglose-control-documentos *ngIf="dataItem.listaDocumentosPorMatricula!=undefined" (Updates)="pruebita(dataItem)" [row]="dataItem.listaDocumentosPorMatricula"></app-desglose-control-documentos>
              </ng-template>
            </kendo-grid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
