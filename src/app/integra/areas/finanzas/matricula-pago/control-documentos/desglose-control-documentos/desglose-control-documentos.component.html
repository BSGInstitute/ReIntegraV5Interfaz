<ng-container *ngIf="loading">
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  </ng-container>
  <table style="width: 500px;">
    <tbody>
      <ng-container
        *ngFor="let item of listaDocumentosPorMatricula"
      >
      <ng-container 
      *ngIf="item.estadoDocumento == true">
      <tr>
          <td>
            <input type="checkbox"  (change)="checkCheckBoxvalue(item)" [(ngModel)]="item.cheks">
          </td>
          <td>
            {{ item.nombreDocumento }}
          </td>
      <ng-container *ngIf="item.recepcionado == null || item.recepcionado == false">
          <td>
            No recepcionado
          </td>
        </ng-container>
        <ng-container *ngIf="item.recepcionado == true ">
          <td>
            Recepcionado
          </td>
        </ng-container>
      </tr>
    </ng-container>
    </ng-container>
    </tbody>
  </table>
