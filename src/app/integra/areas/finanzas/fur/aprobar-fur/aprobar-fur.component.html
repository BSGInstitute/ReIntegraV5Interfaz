
<div class="">
    <div class="row">
      <div class="col-1fa-rotate-270">
        <div class="card">
          <div class="card-header bg-color-material">
            <h1 class="text-white">Aprobación de FUR's</h1>
          </div>
          <div class="card-body p-4">
            <div class="row">
                <div class="row" style="margin-bottom: 1rem;">
                  <div class="col-md-6">
                    <div class="row" >
                      <div class="col-md-2"></div>
                      <div class="col-md-8">
                        <kendo-tabstrip >
                          <kendo-tabstrip-tab title="APROBAR" [selected]="true">
                            <ng-template kendoTabContent>
                              <div class="row">
                                <div class="col-md-7">
                                  <h3>APROBAR FURS SELECCIONADOS :</h3>
                                </div>
                                <div class="col-md-5">
                                  <button
                                    style="margin-top: 0.5rem;"
                                    kendoButton 
                                    icon="k-icon k-i-check-outline k-icon-20"
                                    type="button"
                                    themeColor="primary"
                                    (click)="aprobarObservarFUR(true)"
                                    >
                                    Aprobar FURS
                                  </button>
                                </div>
                              </div>
                            </ng-template>
                          </kendo-tabstrip-tab>
                          <kendo-tabstrip-tab title="OBSERVAR">
                            <ng-template kendoTabContent>
                              <div class="row">
                                <h3>OBSERVAR FURS SELECCIONADOS :</h3>
                              </div>
                              <div class="row">
                                <div class="col-md-7">
                                  <kendo-textarea
                                      [style.width.%]="100"
                                      [formControl]="inputObservar"
                                      resizable="auto"
                                      [maxlength]="450"
                                      placeholder="¡ Ingrese el detalle de la observación !"
                                  >
                                  </kendo-textarea>
                                </div>
                                <div class="col-md-5">
                                  <button
                                    style="margin-top: 0.5rem;"
                                    kendoButton 
                                    icon="k-icon k-i-track-changes-enable k-icon-20"
                                    type="button"
                                    themeColor="warning"
                                    (click)="aprobarObservarFUR(false)"
                                    >
                                    Observar FURS
                                  </button>
                                </div>
                              </div>
                            </ng-template>
                          </kendo-tabstrip-tab>
                          <kendo-tabstrip-tab title="ELIMINAR">
                              <ng-template kendoTabContent>
                                <div class="row">
                                  <div class="col-md-7">
                                    <h3>ELIMINAR FURS SELECCIONADOS :</h3>
                                  </div>
                                  <div class="col-md-5">
                                    <button
                                      style="margin-top: 0.5rem;"
                                      kendoButton 
                                      icon="k-icon k-i-delete k-icon-20"
                                      type="button"
                                      themeColor="error"
                                      (click)="eliminarListaFur()"
                                      >
                                      Eliminar FURS
                                    </button>
                                  </div>
                                </div>
                              </ng-template>
                            </kendo-tabstrip-tab>
                      </kendo-tabstrip> 
                      </div>
                      <div class="col-md-2"></div>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="row">
                      <div class="col-md-2"></div>
                      <div class="col-md-8">
                        <div class="row">
                          <h1 style="padding: 0px;">RESUMEN DE CANTIDADES :</h1>
                        </div>
                        <div class="row">
                          <div class="row" style="padding: 0.5rem;">
                            <div class="col-md-5">
                              Total de FUR's :
                            </div>
                            <div class="col-md-7" style="margin-left: -2.7rem;">
                              <kendo-numerictextbox
                                [style.width.px]="150"
                                [spinners]="false"
                                [readonly]="true"
                                [value]="totalFur"
                                format="0"
                                fillMode="outline"
                                class="d-flex"
                                size="small"
                              >
                              </kendo-numerictextbox>
                            </div>
                            
                          </div>
                          <div class="row" style="padding: 0.5rem;">
                            <div class="col-md-5">
                              Total de Dolares :
                            </div>
                            <div class="col-md-7" style="margin-left: -2.7rem;">
                              <kendo-numerictextbox
                                [style.width.px]="150"
                                [spinners]="false"
                                [readonly]="true"
                                [value]="totalDolares"
                                fillMode="outline"
                                class="d-flex"
                                size="small"
                              >
                              </kendo-numerictextbox>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="col-md-2"></div>
                    </div>
                  </div>
                </div>
                
                <div class="row" *ngIf="EsJefeFinanzas">
                  <div class="col-md-4"></div>
                  <div class="col-md-4">
                      <div class="row">
                          <div class="col-md-1"></div>
                          <div class="col-md-10 element">
                            <div class="row" style="margin-top: 0.5rem;"> 
                              <label class="k-label">Listar como :</label>
                            </div>
                            <div class="row" style="margin-bottom: 0.5rem;">
                              <div class="col-md-7">
                                <ul class="k-radio-list">
                                  <li class="k-radio-item">
                                  <input
                                      type="radio"
                                      #jfAr
                                      [value]="0"
                                      kendoRadioButton
                                      [formControl]="ControlRadioButtom"
                                      (click)="LimpiarGrilla()"
                                  />
                                  <kendo-label [for]="jfAr" text="Jefe de Área"></kendo-label>
                                  </li>
          
                                  <li class="k-radio-item">
                                  <input
                                      type="radio"
                                      #jfFin
                                      kendoRadioButton
                                      [value]="1"
                                      [formControl]="ControlRadioButtom"
                                      (click)="LimpiarGrilla()"
                                  />
                                  <kendo-label
                                      class="k-radio-label"
                                      [for]="jfFin"
                                      text="Jefe de Finanzas"
                                  ></kendo-label>
                                  </li>
                              </ul>
                              </div>
                              <div class="col-md-5">
                                <button
                                    style="margin-top: 0.5rem;"
                                    kendoButton 
                                    icon="k-icon k-i-search k-icon-20"
                                    type="button"
                                    themeColor="primary"
                                    (click)="buscar()"
                                    >
                                    Buscar
                                </button>
                              </div>
                            </div>
                          </div>
                          <div class="col-md-1"></div>
                      </div>
                  </div>
                  <div class="col-md-4"></div>
                </div>
            </div>

            <div class="row" style="margin-top: 1rem;">
              <div class="col-md-12">
                <div class="card-header bg-color-material col-md-12">
                    <div class="row col-md-12">
                        <div div class="col-md-12" style="text-align: left;">
                          <div class="row">
                            <div class="col-md-7">
                              <button 
                                kendoButton 
                                icon="reload" 
                                type="button"
                                themeColor="secondary" 
                                style="margin-right: 1rem;"
                                (click)="ControlAccionesGrilla('refrescar')"
                                >  
                              </button>
                              <button
                                kendoButton 
                                style="margin-right: 1rem;"
                                icon="k-icon k-i-file-excel k-icon-20"
                                type="button"
                                themeColor="tertiary"
                                (click)="excelexport.save()"
                                >
                                Exportar a Excel
                              </button>
                              
                              <kendo-excelexport 
                              [data]="listaFurPorAprobar" 
                              fileName="FURS-POR-APROBAR.xlsx" #excelexport>
                                <kendo-excelexport-column field="codigo" title="CÓDIGO FUR">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="furTipoPedido" title="TIPO PEDIDO">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="razonSocial" title="PROVEEDOR">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="producto" title="PRODUCTO">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="centroCosto" title="CENTRO DE COSTO">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="centroCostoPadre" title="CENTRO DE COSTO PADRE" [hidden]="true">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="fechaLimite" title="FECHA EJECUCIÓN GASTO">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="cantidad" title="CANTIDAD">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="monedaPagoReal" title="MONEDA">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="precioUnitarioMonedaOrigen" title="PRECIO UNITARIO">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="descripcion" title="DESCRIPCIÓN">
                                </kendo-excelexport-column>
                                <kendo-excelexport-column field="usuarioSolicitud" title="SOLICITANTE">
                                </kendo-excelexport-column>
                              </kendo-excelexport>
                            </div>
                          </div>
                        </div>
                    </div>
                </div>
                <kendo-grid
                [kendoGridBinding]="listaFurPorAprobar"
                [loading]="loader"
                [pageSize]="5"
                [sortable]="true"
                [reorderable]="true"
                [resizable]="true"
                [columnMenu]="{ filter: true }"
                kendoGridSelectBy="id"
                [(selectedKeys)]="listaSeleccion"
                (selectedKeysChange)="CalcularTotal()"
                [selectable]="{ enabled: true, checkboxOnly: true }"
                [pageable]="true"
                style="max-height: 700px"     
                [sort]="gridState.sort" 
                (filterChange)="limpiarSeleccion()"
                
                >
                  <kendo-grid-checkbox-column
                  [width]="45"
                  [headerClass]="{ 'text-center': true }"
                  [class]="{ 'text-center': true }"
                  [resizable]="false"
                  [columnMenu]="false"
                  [showSelectAll]="true"
                  [sticky]="true"
                  >
                  </kendo-grid-checkbox-column>
                  <kendo-grid-column
                      title="Código de FUR"
                      headerClass="justify-content-center k-grid-header "
                      [width]="150"
                      field="codigo"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Area de Solicitante"
                      headerClass="justify-content-center k-grid-header "
                      [width]="150"
                      field="nombreArea"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Tipo Pedido"
                      headerClass="justify-content-center k-grid-header "
                      [width]="150"
                      field="furTipoPedido"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Proveedor"
                      headerClass="justify-content-center k-grid-header "
                      [width]="200"
                      field="razonSocial"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Producto"
                      headerClass="justify-content-center k-grid-header "
                      [width]="150"
                      field="producto"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Centro de Costo"
                      headerClass="justify-content-center k-grid-header "
                      [width]="150"
                      field="centroCosto"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Centro de Costo Padre"
                      headerClass="justify-content-center k-grid-header "
                      [width]="150"
                      field="centroCostoPadre"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="true"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Fecha de Ejecución Gasto"
                      headerClass="justify-content-center k-grid-header "
                      [width]="170"
                      field="fechaLimite"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Cantidad"
                      headerClass="justify-content-center k-grid-header "
                      [width]="150"
                      field="cantidad"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Moneda"
                      headerClass="justify-content-center k-grid-header "
                      [width]="200"
                      field="monedaPagoReal"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Precio Unitario"
                      headerClass="justify-content-center k-grid-header "
                      [width]="150"
                      field="precioUnitarioMonedaOrigen"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Precio Total"
                      headerClass="justify-content-center k-grid-header "
                      [width]="150"
                      field="precioTotalMonedaOrigen"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Descripción"
                      headerClass="justify-content-center k-grid-header "
                      [width]="250"
                      field="descripcion"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Usuario Solicitante"
                      headerClass="justify-content-center k-grid-header "
                      [width]="200"
                      field="usuarioSolicitud"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    </kendo-grid-column>
                    <kendo-grid-column
                      title="Fecha Ultima Modificación"
                      headerClass="justify-content-center k-grid-header "
                      [width]="200"
                      field="fechaModificacion"
                      [locked]="false"
                      [sticky]="false"
                      [filterable]="true"
                      [hidden]="false"
                    >
                    <ng-template
                      kendoGridCellTemplate
                      let-dataItem
                    >
                       {{ finanzasService.fechaTemplate(dataItem.fechaModificacion,false) }}
                    </ng-template>
                    </kendo-grid-column>
                    <kendo-grid-command-column
                    [sticky]="true"
                    title="Acciones"
                    [width]="150"
                    headerClass="justify-content-center text-center k-grid-header-command"
                      >
                      <ng-template 
                      kendoGridCellTemplate 
                      let-isNew="isNew" 
                      let-dataItem="dataItem" 
                      let-rowIndex="rowIndex"
                      >
                        <div class="w-100 d-flex justify-content-center" kendoTooltip>
                          <div 
                          >
                            <button
                            title="Aprobar"
                            kendoButton
                            themeColor="primary"
                            fillMode="solid"
                            rounded="large"
                            size="large"
                            class="p-2 me-1 ms-1"
                            container="body"
                            placement="top"
                            (click)="ControlAccionesGrilla('aprobar',dataItem)"
                          >
                            <span class="k-icon k-i-check-outline k-icon-20"></span>
                          </button>
                          <button
                            title="Eliminar"
                            kendoButton
                            themeColor="error"
                            fillMode="solid"
                            rounded="large"
                            size="large"
                            class="p-2 me-1 ms-1"
                            container="body"
                            placement="top"
                            (click)="ControlAccionesGrilla('eliminar',dataItem)"
                            
                          >
                            <span class="k-icon k-i-delete k-icon-20"></span>
                          </button>
                           
                          </div>
                          
                        </div>
                      </ng-template>
                      </kendo-grid-command-column>  
                      <ng-template
                              kendoPagerTemplate
                              let-totalPages="totalPages"
                              let-currentPage="currentPage"
                              >
                                <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
                                <kendo-pager-numeric-buttons
                                  [buttonCount]="5"
                                ></kendo-pager-numeric-buttons>
                                <kendo-pager-next-buttons></kendo-pager-next-buttons>
                                <!-- <kendo-pager-input></kendo-pager-input> -->
                                <kendo-pager-info></kendo-pager-info>
                                <kendo-pager-page-sizes [pageSizes]="pageSizes"></kendo-pager-page-sizes>

                            </ng-template>                  
          
                </kendo-grid>
                
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
