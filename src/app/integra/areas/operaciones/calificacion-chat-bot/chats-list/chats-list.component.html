<div class="chats-container">
  <div class="header">
    <button mat-icon-button (click)="onBack()" class="back-button">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div class="header-content">
      <h2>Chats de {{ student.name }}</h2>
      <p class="subtitle">Total de hilos: {{ chats.length }}</p>
    </div>
  </div>

  <div class="table-section">
    <table mat-table [dataSource]="chats" class="chats-table">
      <!-- Content Column -->
      <ng-container matColumnDef="content">
        <th mat-header-cell *matHeaderCellDef>Contenido del Chat</th>
        <td mat-cell *matCellDef="let element">
          <div class="chat-preview">{{ element.content | slice: 0: 100 }}...</div>
        </td>
      </ng-container>

      <!-- Created At Column -->
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Fecha</th>
        <td mat-cell *matCellDef="let element">{{ formatDate(element.createdAt) }}</td>
      </ng-container>

      <!-- Is Rated Column -->
      <ng-container matColumnDef="isRated">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let element">
          <span class="status-badge" [ngClass]="getRatingStatusColor(element.isRated)">
            {{ getRatingStatus(element.isRated) }}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let element">
          <button mat-raised-button color="primary" (click)="onSelectChat(element)">
            Calificar
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
