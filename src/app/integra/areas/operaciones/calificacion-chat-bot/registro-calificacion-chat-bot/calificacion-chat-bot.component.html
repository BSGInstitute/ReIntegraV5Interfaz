<div class="calificacion-chat-bot-container">
  <app-lista-alumno
    *ngIf="currentView === viewStates.STUDENTS"
    (selectStudent)="onStudentSelected($any($event))"
  ></app-lista-alumno>

  <app-chats-list
    *ngIf="currentView === viewStates.CHATS && selectedStudent"
    [student]="selectedStudent"
    (selectChat)="onChatSelected($any($event))"
    (backToStudents)="onBackToStudents()"
  ></app-chats-list>

  <app-evaluation-form
    *ngIf="currentView === viewStates.EVALUATION && selectedChat"
    [chat]="selectedChat"
    (backToChats)="onBackToChats()"
    (evaluationSubmitted)="onEvaluationSubmitted()"
  ></app-evaluation-form>
</div>
