<div class="calificacion-chat-bot-container">
  <!-- 1. Lista de Alumnos/No Alumnos — [hidden] en lugar de *ngIf para preservar estado -->
  <app-lista-alumno
    [hidden]="currentView !== viewStates.STUDENTS"
    (selectStudent)="onStudentSelected($any($event))"
    (fechaCorteChange)="onFechaCorteChange($event)"
    (fechaFinChange)="onFechaFinChange($event)"
  ></app-lista-alumno>

  <!-- 2. Lista de Hilos (agrupados por ID Hilo) -->
  <app-chats-list
    #chatsList
    *ngIf="currentView === viewStates.CHATS && tipoOrigen"
    [alumno]="selectedAlumno!"
    [noAlumno]="selectedNoAlumno!"
    [tipoOrigen]="tipoOrigen"
    [fechaCorte]="fechaCorteGlobal"
    [fechaFinInput]="fechaFinGlobal"
    (selectChat)="onChatSelected($event)"
    (backToList)="onBackToStudents()"
  ></app-chats-list>

  <!-- 3. Vista de Mensajes con Formulario (Layout 2 Columnas) -->
  <app-chat-messages
    *ngIf="currentView === viewStates.CHAT_MESSAGES && idHiloSeleccionado"
    [idHilo]="idHiloSeleccionado"
    [idAlumno]="selectedAlumno?.idAlumno"
    [idContactoPortalSegmento]="selectedNoAlumno?.idContactoPortalSegmento"
    [idOrigen]="selectedHilo?.idOrigen ?? 5"
    [origen]="selectedHilo?.origen ?? 'Portal Web'"
    [nombreAlumno]="selectedAlumno?.nombreAlumno"
    [codigoMatricula]="selectedAlumno?.codigoMatricula"
    (backToHilos)="onBackToChats()"
    (evaluacionGuardada)="onEvaluacionGuardada()"
  ></app-chat-messages>
</div>
