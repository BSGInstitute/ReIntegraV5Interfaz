

<div class="card border-primary mb-3">
  <div class="card-header pb-0" style="background-color: #2b89b3;">
      <h2 class="mb-2 text-white">
        (R) Seguimiento de Inscritos Carrera
      </h2>
  </div>
  <div class="card-body p-4">
      <form [formGroup]="formFiltro" orientation="horizontal">
          <div class="row">
              <div class="col-sm col-md m-3">
                  <div class="row mb-4">
                    <div class="col-md-4">
                      <label [for]="asesores" class="k-labeal">
                        <span>Coordinador Academico
                      </span>
                      </label>
                    </div>
                    <div class="col-md-8">
                      <kendo-multiselect
                        #asesores
                        formControlName="asesores"
                        [data]="asesoresCombo"
                        placeholder="<Todos>"
                        [filterable]="true"
                        textField="nombres"
                        [virtual]="virtual"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings"
                        valueField="id"
                      >
                      </kendo-multiselect>
                    </div>
                  </div>
                  <div class="row mb-4">
                      <div class="col-md-4">
                          <label [for]="codigoMatricula" class="k-label">
                              <span>Codigo Matricula
                              </span>
                           </label>
                      </div>
                    <div class="col-md-8">
                      <input
                          kendoTextBox
                          #codigoMatricula
                          formControlName="codigoMatricula"
                          size="medium"
                          name="codigoMatricula"
                          placeholder="<Todos>"
                          class="bgInputIA"
                        />
                    </div>
                  </div>
              </div>

              <div class="col-sm col-md m-3">
                  <div class="row mb-4">
                    <div class="col-md-4">
                      <label [for]="centroCostos" class="k-label">
                        <span>Centros de Costos
                      </span>
                      </label>
                    </div>
                    <div class="col-md-8">
                      <kendo-multiselect
                        #centroCostos
                        formControlName="centroCostos"
                        [data]="centroCostosCombo"
                        placeholder="<Todos>"
                        [filterable]="true"
                        textField="nombre"
                        [virtual]="virtual"
                        [valuePrimitive]="true"
                        [kendoDropDownFilter]="filterSettings2"
                        valueField="id"
                      >
                      </kendo-multiselect>
                    </div>
                  </div>
                  <div class="row mb-4">
                      <div class="col-md-4">
                          <label [for]="documetnoIdentidad" class="k-label">
                              <span>Documento de Identidad
                              </span>
                           </label>
                      </div>
                    <div class="col-md-8">
                      <input
                          kendoTextBox
                          #documetnoIdentidad
                          formControlName="documetnoIdentidad"
                          size="medium"
                          name="documetnoIdentidad"
                          placeholder="<Todos>"
                          class="bgInputIA"
                        />
                    </div>
                  </div>
              </div>

              <div class="col-sm col-md m-3">
                  <div class="row mb-4">
                    <div class="col-md-4">
                      <label [for]="faseOportunidad" class="k-label">
                        <span>Fases de Oportunidad
                      </span>
                      </label>
                    </div>
                    <div class="col-md-8">
                      <kendo-multiselect
                        #faseOportunidad
                        formControlName="faseOportunidad"
                        [data]="faseOportunidadCombo"
                        placeholder="<Todos>"
                        [filterable]="true"
                        textField="codigo"
                        [virtual]="virtual"
                        [valuePrimitive]="true"
                        [disabled]="true"
                        valueField="id"
                      >
                      </kendo-multiselect>
                    </div>
                  </div>
                  <div class="row mb-4">
                      <div class="col-md-4">
                          <label [for]="estadoMatricula" class="k-label">
                              <span>Estado Matricula
                              </span>
                           </label>
                      </div>
                    <div class="col-md-8">
                      <kendo-multiselect
                        #estadoMatricula
                        formControlName="estadoMatricula"
                        [data]="estadoMatriculaCombo"
                        [kendoDropDownFilter]="filterSettings3"
                        placeholder="<Todos>"
                        [filterable]="true"
                        textField="nombre"
                        [virtual]="virtual"
                        [valuePrimitive]="true"
                        valueField="id"
                      >
                      </kendo-multiselect>
                      </div>
                  </div>
              </div>

          </div>
      </form>
  </div>
  <div class="card-footer">
      <div class="row">
        <div class="col-md-1 float-right">
          <button
            type="button"
            class="btn btn-success sm"
            [disabled]="gridData.loading"
            (click)="buscar()"
          >
            Buscar
          </button>
        </div>
      </div>
  </div>
</div>
