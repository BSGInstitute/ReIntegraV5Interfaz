<div class="contendor">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <div class="row">
            <div class="col">
              <h2 class="text-white mb-2" id="titulo">
                (R) Reporte de Control de Cobranza
              </h2>
            </div>
            <div class="col-auto">
              <button
                kendoButton
                icon="search"
                themeColor="success"
                (click)="generarReporte()"
              >
                Generar Reporte
              </button>
            </div>
          </div>
        </div>
        <div class="card-body p-4" id="grillaAgendaTab">
          <form [formGroup]="formFiltro" class="k-form k-form-horizontal">
            <div class="row">
              <div class="col-sm-12 col-md-6">
                <div class="row my-2">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        [for]="multiselectPerAsignado"
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        <span>Asistentes:</span>
                      </label>
                      <kendo-multiselect
                        #multiselectPerAsignado
                        [data]="personalAsignadoFiltro"
                        [kendoDropDownFilter]="filterSettings2"
                        [filterable]="true"
                        placeholder="<Todos>"
                        textField="nombres"
                        valueField="usuario"
                        [disabled]="!esCoordinadora"
                        formControlName="idAsesor"
                        [valuePrimitive]="true"
                      ></kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="row my-2">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        [for]="estadoPersonal"
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        <span>Estado del Personal:</span>
                      </label>
                      <kendo-dropdownlist
                        #estadoPersonal
                        formControlName="estadoPersonal"
                        [data]="dataEstadoAsistentes"
                        [defaultItem]="{ id: 1, nombre: 'Todo el personal' }"
                        [valuePrimitive]="true"
                        (valueChange)="cambiarEstadoPersonal($event)"
                        textField="nombre"
                        valueField="id"
                      >
                      </kendo-dropdownlist>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="row my-2">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        [for]="modalidades"
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        <span>Modalidad:</span>
                      </label>
                      <kendo-multiselect
                        #modalidades
                        formControlName="modalidades"
                        [data]="datamodalidades"
                        [valuePrimitive]="true"
                        [filterable]="true"
                        placeholder="Todas"
                        textField="nombre"
                        valueField="id"
                      >
                      </kendo-multiselect>
                    </kendo-formfield>
                  </div>
                </div>
              </div>

              <div class="col-sm-12 col-md-6">
                <div class="row my-2">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        [for]="fechaInicio"
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        <span>Fecha Inicio:</span>
                      </label>
                      <kendo-datepicker
                        #fechaInicio
                        formControlName="fechaInicio"
                        format="dd-MM-yyyy"
                        [formatPlaceholder]="{
                          year: 'año', month: 'mes', day: 'día',hour: 'h',minute: 'm',second: 's'
                        }"
                      ></kendo-datepicker>
                    </kendo-formfield>
                  </div>
                </div>
                <div class="row my-2">
                  <div class="col-12">
                    <kendo-formfield orientation="horizontal">
                      <label
                        [for]="fechaFin"
                        class="k-label pt-0 d-flex align-items-start text-start"
                      >
                        <span>Fecha Fin:</span>
                      </label>
                      <kendo-datepicker
                        #fechaFin
                        formControlName="fechaFin"
                        format="dd-MM-yyyy"
                        [formatPlaceholder]="{
                          year: 'año', month: 'mes', day: 'día',hour: 'h',minute: 'm',second: 's'
                        }"
                      ></kendo-datepicker>
                    </kendo-formfield>
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
