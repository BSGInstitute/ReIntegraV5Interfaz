<div class="card border-primary" #reporte>
  <div class="card-header pb-0 bg-color-material">
    <div class="col text-aling-center">
      <h2 class="mb-2 text-white" style="text-align: center">
        (M) SubCategoria
      </h2>
    </div>
  </div>

  <div class="card-body p-4">
    <ng-template #modalTipoReporte let-modal>
      <app-loader *ngIf="loaderModal"></app-loader>
      <div class="modal-header bg-primary-header-modal">
        <h3 class="modal-title m-0 p-0" id="modal-basic-title">
          {{ isNew ? "Nueva SubCategoria" : "Modificar SubCategoria" }}
        </h3>
        <button
          type="button"
          class="btn-close btn-close-white"
          aria-label="Close"
          (click)="modal.dismiss('Cross click')"
        ></button>
      </div>
      <div class="modal-body">
        <form class="k-form k-form-horizontal" [formGroup]="formCategoria">
            <div class="row">
              <div class="col-2">
                <label style="margin-top: 1em;" [for]="nombreTipoReporte" class="k-label">
                  <span>Tipo de Solicitud</span>
                </label>
              </div>
              <div class="col-4">
                <kendo-formfield class="custom-sc1-remove-max-width-formfield" orientation="horizontal">
                  <kendo-dropdownlist
                    #nombreTipoReporte
                    formControlName="nombreTipoReporte"
                    [kendoDropDownFilter]="filterSettings2"
                    class="d-flex"
                    size="medium"
                    [data]="dataTipoReporte"
                    [value]="selectedTipoReporte"
                    (valueChange)="categoriaByTipoReporte($event)"
                    [defaultItem]="{
                      id: null,
                      nombre: 'Seleccione'
                    }"
                    [textField]="'nombre'"
                    [valueField]="'id'"
                    [valuePrimitive]="true"
                  >
                  </kendo-dropdownlist>
                </kendo-formfield>
              </div>
              <div class="col-2">
                <label style="margin-top: 1em;" [for]="nombreCategoria" class="k-label">
                  <span>Categoría</span>
                  </label>
              </div>
              <div class="col-4">
                  <kendo-formfield class="custom-sc1-remove-max-width-formfield" orientation="horizontal">
                    <kendo-dropdownlist
                    #nombreCategoria
                    [disabled]="isDisabledCategoria"
                    [value]="selectedCategoria"
                    formControlName="nombreCategoria"
                    class="d-flex"
                    [kendoDropDownFilter]="filterSettings2"
                    size="medium"
                    [data]="dataCategoriaFiltro"
                    [defaultItem]="{
                      id: null,
                      nombre: 'Seleccione'
                      }"
                  [textField]="'nombre'"
                  [valueField]="'id'"
                  [valuePrimitive]="true"
                  >
                  <ng-template kendoDropDownListNoDataTemplate>
                    No existen registros configurados
                  </ng-template>
                  </kendo-dropdownlist>
                  </kendo-formfield>
              </div>
              <div class="w-100"></div>
              <div class="col-2">
                <label style="margin-top: 1em;" [for]="titulo" class="k-label">
                  <span>Subcategoria</span>
                </label>
              </div>
              <div class="col-10">
                <kendo-formfield class="custom-sc1-remove-max-width-formfield" orientation="horizontal">
                  <kendo-textbox
                    #titulo
                    size="medium"
                    placeholder="subcategoria"
                    formControlName="titulo"
                    [clearButton]="true"
                    [maxlength]="325"
                  >
                  </kendo-textbox>
                </kendo-formfield>
              </div>
              <div class="w-100"></div>
              <div class="col-2">
                <label style="margin-top: 1em;" [for]="nombreProblema" class="k-label">
                  <span>Descripcion de Subcategoria</span>
                </label>
              </div>
              <div class="col-10">
                <kendo-formfield class="custom-sc1-remove-max-width-formfield" orientation="horizontal">
                    <kendo-textarea
                    #nombreProblema
                    class="textArea"
                    size="medium"
                    placeholder="Descripción de la subcategoria"
                    formControlName="nombreProblema"
                    [clearButton]="true"
                    resizable="auto"
                    inputValidSpaceDir
                    [maxlength]="1000"
                  >
                  </kendo-textarea>
                </kendo-formfield>
              </div>
              <div class="w-100"></div>
              <div class="col-2">
                <label style="margin-top: 1em;" [for]="descripcionSolucion" class="k-label">
                  <span>Descripción de Solución asas</span>
                </label>
              </div>
              <div class="col-10">
                <kendo-formfield class="custom-sc1-remove-max-width-formfield" orientation="horizontal">
                  <kendo-textarea
                    class="textArea"
                    #descripcionSolucion
                    size="medium"
                    resizable="auto"
                    placeholder="Descripción de solución"
                    formControlName="descripcionSolucion"
                    [clearButton]="true"
                    inputValidSpaceDir
                    [maxlength]="2000"
                  >
                  </kendo-textarea>
                </kendo-formfield>
              </div>
              <div class="w-100"></div>
              <div class="col-2">
                <label style="margin-top: 1em;" [for]="prioridad" class="k-label">
                  <span>Prioridad</span>
                </label>
              </div>
              <div class="col-6">
                <kendo-formfield class="custom-sc1-remove-max-width-formfield" orientation="horizontal">
                  <kendo-dropdownlist
                      #prioridad
                      formControlName="prioridad"
                      class="d-flex"
                      size="medium"
                      [data]="dataPrioridad"
                      [kendoDropDownFilter]="filterSettings2"
                      [defaultItem]="{
                        id: null,
                        nombre: 'Seleccione'
                      }"
                      [textField]="'nombre'"
                      [valueField]="'id'"
                      [valuePrimitive]="true"
                    >
                    </kendo-dropdownlist>
                </kendo-formfield>
              </div>
              <div class="w-100"></div>
              <div class="col-2">
                <label style="margin-top: 1em;" [for]="nombreAreaRevision" class="k-label">
                  <span>Area Revisión</span>
                </label>
              </div>
              <div class="col-6">
                <kendo-formfield class="custom-sc1-remove-max-width-formfield" orientation="horizontal">
                  <kendo-dropdownlist
                      #nombreAreaRevision
                      formControlName="nombreAreaRevision"
                      class="d-flex"
                      size="medium"
                      [value]="selectedAreaRevision"
                      [kendoDropDownFilter]="filterSettings2"
                      [data]="dataPersonalArea"
                      (valueChange)="personalByArea($event)"
                      [defaultItem]="{
                        id: null,
                        nombre: 'Seleccione'
                      }"
                      [textField]="'nombre'"
                      [valueField]="'id'"
                      [valuePrimitive]="true"
                    >
                    </kendo-dropdownlist>
                </kendo-formfield>
              </div>
              <div class="w-100"></div>
              <div class="col-2">
                <label style="margin-top: 1em;" [for]="nombrePersonalRevision" class="k-label">
                  <span>Personal Revisión</span>
                </label>
              </div>
              <div class="col-6">
                <kendo-formfield class="custom-sc1-remove-max-width-formfield" orientation="horizontal">
                  <kendo-dropdownlist
                      #nombrePersonalRevision
                      formControlName="nombrePersonalRevision"
                      [disabled]="isDisabledPersonalRevision"
                       [value]="selectedPersonalRevision"
                      class="d-flex"
                      size="medium"
                      [kendoDropDownFilter]="filterSettings2"
                      [data]="dataPersonalRevisionFiltro"
                      [defaultItem]="{
                        id: null,
                        nombres: 'Seleccione'
                      }"
                      textField="nombres"
                      valueField="id"
                      [valuePrimitive]="true"
                    >
                   
                    </kendo-dropdownlist>
                </kendo-formfield>
              </div>
              <div class="w-100"></div>
              <div class="col-2">
                <label style="margin-top: 1em;" [for]="nombreAreaSolucion" class="k-label">
                  <span>Area Solución</span>
                </label>
              </div>
              <div class="col-6">
                <kendo-formfield class="custom-sc1-remove-max-width-formfield" orientation="horizontal">
                  <kendo-dropdownlist
                      #nombreAreaSolucion
                      formControlName="nombreAreaSolucion"
                      class="d-flex"
                      size="medium"
                      [data]="dataPersonalArea"
                      [value]="selectedAreaSolucion"
                      [kendoDropDownFilter]="filterSettings2"
                      (valueChange)="personalByAreaSolucion($event)"
                      [defaultItem]="{
                        id: null,
                        nombre: 'Seleccione'
                      }"
                      [textField]="'nombre'"
                      [valueField]="'id'"
                      [valuePrimitive]="true"
                    >
                    </kendo-dropdownlist>
                </kendo-formfield>
              </div>
              <div class="w-100"></div>
              <div class="col-2">
                <label style="margin-top: 1em;" [for]="nombrePersonalSolucion" class="k-label">
                  <span>Personal Solución</span>
                </label>
              </div>
              <div class="col-6">
                <kendo-formfield class="custom-sc1-remove-max-width-formfield" orientation="horizontal">
                  <kendo-dropdownlist
                      #nombrePersonalSolucion
                      formControlName="nombrePersonalSolucion"
                      class="d-flex"
                      [kendoDropDownFilter]="filterSettings2"
                      [disabled]="isDisabledPersonalSolucion"
                      [value]="selectedPersonalSolucion"
                      size="medium"
                      [data]="dataPersonalSolucionFiltro"
                      [defaultItem]="{
                        id: null,
                        nombres: 'Seleccione'
                      }"
                      [textField]="'nombres'"
                      [valueField]="'id'"
                      [valuePrimitive]="true"
                    >
                    </kendo-dropdownlist>
                </kendo-formfield>
              </div>
              <div class="w-100"></div>
            </div>
          
        </form>
      </div>
      <div class="modal-footer">
        <div class="k-form-buttons m-0">
          <button
            kendoButton
            *ngIf="isNew"
            class="hoverButton"
            themeColor="primary"
            (click)="crearSubCategoria()"
          >
            Guardar
          </button>
          <button
            kendoButton
            *ngIf="!isNew"
            class="hoverButton"
            themeColor="tertiary"
            (click)="actualizarSubCategoria()"
          >
            Actualizar
          </button>

          <button
            themeColor="error"
            class="hoverButton"
            kendoButton
            (click)="modal.dismiss('Cross click')"
          >
            Cancelar
          </button>
        </div>
      </div>
    </ng-template>

    <ng-template #modalVerTipoReporte let-modal>
      <div class="modal-body">
        <div class="modal-header bg-primary-header-modal">
          <h3 class="modal-title m-0 p-0" id="modal-basic-title">
            URL para campañas
          </h3>
          <button
            type="button"
            class="btn-close btn-close-white"
            aria-label="Close"
            (click)="modal.dismiss('Cross click')"
          ></button>
        </div>
        <form class="k-form k-form-horizontal">
          <fieldset class="k-form-fieldset">
            <div class="row">
              <div class="col-sm-12 col-md-12">
                <kendo-formfield style="padding: 16px" orientation="horizontal">
                  <label class="k-label">
                    <span
                      >Programa <span class="text-danger fw-bold">*</span></span
                    >
                  </label>
                  <kendo-grid-spacer></kendo-grid-spacer>
                  <kendo-dropdownlist
                    class="d-flex"
                    size="medium"
                    [data]=""
                    [defaultItem]="{
                      id: null,
                      nombre: 'Seleccione un Programa'
                    }"
                    textField="nombre"
                    valueField="id"
                    [valuePrimitive]="true"
                  >
                  </kendo-dropdownlist>

                  <div class="col-sm-12">
                    <label id="inputModal1" class="control-label">
                      {{ "lb" }}
                    </label>
                  </div>
                </kendo-formfield>
              </div>
            </div>
          </fieldset>
        </form>
      </div>
    </ng-template>
