<div class="ep-root">
  <div class="ep-page-header">
    <div>
      <span class="ep-section-label">BSG Tento / Tienda</span>
      <h1 class="ep-page-title">Planes de Suscripción</h1>
    </div>
    <button class="ep-btn ep-btn--success" (click)="abrirModal(null)">
      <fa-icon [icon]="['fas', 'plus']"></fa-icon> Nuevo Plan
    </button>
  </div>

  <div class="ep-card">
    <div *ngIf="loaderPlanes" class="ep-loading">
      <kendo-loader type="infinite-spinner" themeColor="primary" size="medium"></kendo-loader>
      <span>Cargando planes...</span>
    </div>
    <kendo-grid *ngIf="!loaderPlanes" [data]="planes" class="ep-grid">
      <kendo-grid-column field="orden" title="#" [width]="55"></kendo-grid-column>
      <kendo-grid-column field="nombre" title="Plan" [width]="120">
        <ng-template kendoGridCellTemplate let-dataItem>
          <span [class]="'ep-plan-badge ep-plan-badge--' + (dataItem.esPremium ? 'premium' : 'free')">
            <fa-icon [icon]="['fas', dataItem.esPremium ? 'crown' : 'user']"></fa-icon>
            {{ dataItem.nombre }}
          </span>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column field="descripcion" title="Descripción"></kendo-grid-column>
      <kendo-grid-column title="Power-ups ilimitados" [width]="170" headerClass="text-center">
        <ng-template kendoGridCellTemplate let-dataItem>
          <div class="text-center">
            <fa-icon [icon]="['fas', dataItem.powerUpsIlimitados ? 'check-circle' : 'times-circle']"
              [class]="'ep-benefit-icon ep-benefit-icon--' + (dataItem.powerUpsIlimitados ? 'on' : 'off')"></fa-icon>
          </div>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column title="Incluye anuncio" [width]="140" headerClass="text-center">
        <ng-template kendoGridCellTemplate let-dataItem>
          <div class="text-center">
            <fa-icon [icon]="['fas', dataItem.incluyeAnuncio ? 'check-circle' : 'times-circle']"
              [class]="'ep-benefit-icon ep-benefit-icon--' + (dataItem.incluyeAnuncio ? 'on' : 'off')"></fa-icon>
          </div>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-column title="Contenido exclusivo" [width]="170" headerClass="text-center">
        <ng-template kendoGridCellTemplate let-dataItem>
          <div class="text-center">
            <fa-icon [icon]="['fas', dataItem.contenidoExclusivo ? 'check-circle' : 'times-circle']"
              [class]="'ep-benefit-icon ep-benefit-icon--' + (dataItem.contenidoExclusivo ? 'on' : 'off')"></fa-icon>
          </div>
        </ng-template>
      </kendo-grid-column>
      <kendo-grid-command-column title="Acciones" [width]="100" headerClass="justify-content-center">
        <ng-template kendoGridCellTemplate let-dataItem>
          <div class="d-flex gap-1 justify-content-center">
            <button class="ep-icon-btn ep-icon-btn--warn" (click)="abrirModal(dataItem)" title="Editar">
              <fa-icon [icon]="['fas', 'pencil-alt']"></fa-icon>
            </button>
            <button class="ep-icon-btn ep-icon-btn--danger" (click)="eliminar(dataItem)" title="Eliminar">
              <fa-icon [icon]="['fas', 'trash']"></fa-icon>
            </button>
          </div>
        </ng-template>
      </kendo-grid-command-column>
    </kendo-grid>
  </div>
</div>

<!-- MODAL CREATE/EDIT -->
<ng-template #modalPlan let-modal>
  <div class="ep-modal-header">
    <div class="ep-modal-header__content">
      <span class="ep-modal-context">BSG Tento / Suscripciones</span>
      <h5 class="ep-modal-title">{{ modoForm === 'nuevo' ? 'Nuevo Plan' : 'Editar Plan' }}</h5>
    </div>
    <button type="button" class="btn-close" (click)="cerrarModal()"></button>
  </div>
  <div class="ep-modal-body">
    <div class="row g-3">
      <div class="col-md-8">
        <label class="form-label">Nombre <span class="text-danger">*</span></label>
        <input class="ep-input" [(ngModel)]="form.nombre" maxlength="100">
      </div>
      <div class="col-md-4">
        <label class="form-label">Orden <span class="text-danger">*</span></label>
        <kendo-numerictextbox [(ngModel)]="form.orden" [min]="1" [decimals]="0" [format]="'n0'" style="width:100%"></kendo-numerictextbox>
      </div>
      <div class="col-12">
        <label class="form-label">Descripción <span class="text-danger">*</span></label>
        <textarea class="ep-input" [(ngModel)]="form.descripcion" rows="2" maxlength="500"></textarea>
      </div>
      <div class="col-12">
        <label class="form-label d-block mb-2">Tipo de plan</label>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="swPremium" [(ngModel)]="form.esPremium">
          <label class="form-check-label" for="swPremium">
            <span [class]="'ep-plan-badge ep-plan-badge--' + (form.esPremium ? 'premium' : 'free')">
              <fa-icon [icon]="['fas', form.esPremium ? 'crown' : 'user']"></fa-icon>
              {{ form.esPremium ? 'Premium' : 'Free' }}
            </span>
          </label>
        </div>
      </div>
      <div class="col-12">
        <label class="form-label d-block mb-2">Beneficios</label>
        <div class="d-flex flex-column gap-2">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="swPowerUps" [(ngModel)]="form.powerUpsIlimitados">
            <label class="form-check-label" for="swPowerUps">Power-ups ilimitados</label>
          </div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="swAnuncios" [(ngModel)]="form.incluyeAnuncio">
            <label class="form-check-label" for="swAnuncios">Incluye anuncio</label>
          </div>
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" role="switch" id="swContenido" [(ngModel)]="form.contenidoExclusivo">
            <label class="form-check-label" for="swContenido">Contenido exclusivo</label>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="ep-modal-footer">
    <button class="ep-btn ep-btn--primary" [disabled]="loaderGuardar" (click)="guardar()">
      <span *ngIf="!loaderGuardar">Guardar</span>
      <kendo-loader *ngIf="loaderGuardar" type="infinite-spinner" themeColor="light" size="small"></kendo-loader>
    </button>
    <button class="ep-btn ep-btn--ghost" (click)="cerrarModal()">Cancelar</button>
  </div>
</ng-template>
