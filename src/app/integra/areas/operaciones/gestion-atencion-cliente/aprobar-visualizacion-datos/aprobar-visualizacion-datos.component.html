<div class="card">
  <div class="card-header pb-0" style="background-color: #337ab7;">
    <div class="col text-aling-center">
      <h2 class="mb-2 text-white" style="text-align: left;">
        Reporte Solicitudes de Visualizacion de Datos Operaciones
      </h2>
    </div>
  </div>
  <div class="card-body border px-4">
    <form [formGroup]="formFiltro">
      <div class="row">
        <div class="row col-md-4 py-3 text-right">
          <kendo-formfield orientation="horizontal">
            <kendo-label [for]="asesores" text="Asesores"></kendo-label>
            <kendo-multiselect
              #asesores
              [data]="listaAsesores"
              valueField="id"
              textField="nombres"
              formControlName="asesores"
              [valuePrimitive]="true"
              (valueChange)="seleccionAsesor($event)"
              [filterable]="true"
              (filterChange)="filtrarAsesores($event)"
            ></kendo-multiselect>
          </kendo-formfield>
        </div>
        <div class="row col-md-4 py-3">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="centroCosto"
              text="Centros de Costos"
            ></kendo-label>
            <kendo-combobox
              #centroCosto
              [data]="listaCentroCostos"
              valueField="id"
              textField="nombre"
              formControlName="centroCosto"
              [valuePrimitive]="true"
              [virtual]="{ itemHeight: 30 }"
              [filterable]="true"
              (filterChange)="filtrarCentroCosto($event)"
            ></kendo-combobox>
          </kendo-formfield>
        </div>
        <div class="row col-md-3 py-3 text-right">
          <kendo-formfield orientation="horizontal">
            <kendo-label
              [for]="faseOportunidad"
              text="Fase Oportunidad Actual"
            ></kendo-label>
            <kendo-multiselect
              #faseOportunidad
              [data]="listaFaseOportunidad"
              valueField="id"
              textField="codigo"
              formControlName="faseOportunidad"
              [valuePrimitive]="true"
              [disabled]="true"
            ></kendo-multiselect>
          </kendo-formfield>
        </div>
        
      </div>
    </form>
  </div>
  <div class="card-footer">
    <button class="btn btn-success boton" (click)="generarReporteCobertura()">
      <span class="col">
          Buscar 
      </span>
      <mat-icon class="col">
          search
      </mat-icon>
  </button>
  </div>
</div>
