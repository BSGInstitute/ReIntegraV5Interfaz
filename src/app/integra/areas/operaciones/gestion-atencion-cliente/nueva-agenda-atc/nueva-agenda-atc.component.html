<div class="nueva-agenda-atc-container">
  <div *ngIf="cargando" class="nueva-agenda-atc-loader">
    <span>Cargando agenda...</span>
  </div>

  <iframe
    #iframeAgendaAtc
    [src]="urlSegura"
    (load)="alCargar()"
    frameborder="0"
    allow="camera; microphone; fullscreen; clipboard-read; clipboard-write"
    title="Nueva Agenda Atención al Cliente">
  </iframe>
</div>
