<div class="card mt-3">
  <div class="card-header bg-atencion text-white py-2">
      <h2 class="m-1">Historial de Oportunidad</h2>
  </div>
  <div class="card-body">
      <kendo-grid
          [kendoGridBinding]="gridProgramas.data"
          [pageable]="gridProgramas?.pageable"
          [pageSize]="gridProgramas?.pageSize"
          [selectable]="gridProgramas?.selectable"
          [sortable]="gridProgramas?.sortable"
          [resizable]="gridProgramas?.resizable"
          [loading]="gridProgramas?.loading"
      >
        <ng-template
          kendoPagerTemplate
          let-totalPages="totalPages"
          let-currentPage="currentPage"
        >
          <kendo-pager-prev-buttons></kendo-pager-prev-buttons>
          <kendo-pager-numeric-buttons
            [buttonCount]="5"
          ></kendo-pager-numeric-buttons>
          <kendo-pager-next-buttons></kendo-pager-next-buttons>
          <kendo-pager-input></kendo-pager-input>
          <kendo-pager-info></kendo-pager-info>
          <kendo-pager-page-sizes
            [pageSizes]="cantidadItems"
          ></kendo-pager-page-sizes>
        </ng-template>
          <kendo-grid-column
            field="programa"
            title="Programa"
            [headerClass]="'justify-content-center'"
            [width]="250"
          >
          </kendo-grid-column>
          <kendo-grid-column
            field="probabilidad"
            title="Probabilidad"
            [headerClass]="'justify-content-center'"
            [width]="110"
          >
            <ng-template kendoGridCellTemplate let-dataItem>
              <div [ngSwitch]="dataItem.probabilidad">
                  <span *ngSwitchCase="'Muy Alta'"  style='color:#429d00; display: block;padding: 7px; text-align: center;'>
                      {{ dataItem.probabilidad }}
                  </span>
                  <span *ngSwitchCase="'Alta'" style='color:#004792; display: block;padding: 7px; text-align: center;'>
                      {{ dataItem.probabilidad }}
                  </span>
                  <span *ngSwitchCase="'Baja'" style='color:#ed1c24; display: block;padding: 7px; text-align: center;'>
                      {{ dataItem.probabilidad }}
                  </span>
                  <span *ngSwitchDefault style='color:#fbb03b; display: block;padding: 7px; text-align: center;'>
                      {{ dataItem.probabilidad }}
                  </span>
              </div>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column
            field="grupo"
            title="Grupo"
            [headerClass]="'justify-content-center'"
            [width]="90"
          >
          </kendo-grid-column>
          <kendo-grid-column
            field="precio"
            title="Precio"
            [headerClass]="'justify-content-center'"
            [width]="170"
          >
            <ng-template kendoGridCellTemplate let-dataItem>
              <div *ngIf="!dataItem.matricula; else SinMatricula">
                  <span class="fw-bold"> Credito:  </span>Total&nbsp;<span>{{ dataItem.montoTotal }}</span>
              </div>
              <ng-template #SinMatricula>
                <span class="fw-bold"> Contado:  </span><span>{{ dataItem.contado }}</span>
              </ng-template>
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column
            field="faseMaxima"
            title="Fase Maxima"
            [headerClass]="'justify-content-center'"
            [width]="100"
          >
          </kendo-grid-column>
          <kendo-grid-column
            field="faseOportunidad"
            title="Fase Actual"
            [headerClass]="'justify-content-center'"
            [width]="100"
          >
          </kendo-grid-column>
          <kendo-grid-column
            field="fechaSolicitud"
            title="Fecha de Solicitud"
            [headerClass]="'justify-content-center'"
            [width]="120"
          >
            <ng-template kendoGridCellTemplate let-dataItem>
              {{ dataItem.fechaSolicitud | date: 'dd/MM/yyyy'}}
            </ng-template>
          </kendo-grid-column>
          <kendo-grid-column
            field="asesor"
            title="Asesor"
            [headerClass]="'justify-content-center'"
            [width]="150"
          >
          </kendo-grid-column>
      </kendo-grid>
  </div>
</div>
