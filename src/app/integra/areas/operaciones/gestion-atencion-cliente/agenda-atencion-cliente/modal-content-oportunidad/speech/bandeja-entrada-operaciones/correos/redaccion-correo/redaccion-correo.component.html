<form [formGroup]="formModalCorreo" class="k-form k-form-horizontal">
  <!-- asunto -->
  <div class="row px-2 mb-2">
    <div class="col-md-2 align-self-center">
      <div class="text-start">Asunto:</div>
    </div>
    <div class="col-md-10">
      <kendo-textbox formControlName="asunto" placeholder="Asunto">
      </kendo-textbox>
    </div>
  </div>
  <!-- correo remitente -->
  <div class="row px-2 mb-2">
    <div class="col-md-2 align-self-center">
      <div class="text-start">De:</div>
    </div>
    <div class="col-md-10">
      <kendo-textbox
        formControlName="asesor"
        placeholder="Asesor"
        [disabled]="true"
        [ngStyle]="{ 'background-color': '#e9ecef' }"
      >
      </kendo-textbox>
    </div>
  </div>
  <!-- correo de destion -->
  <div class="row px-2 mb-2">
    <div class="col-md-2 align-self-center">
      <div class="text-start">Para:</div>
    </div>
    <div class="col-md-10">
      <kendo-textbox
        formControlName="destinatario"
        placeholder="Destinatario"
        [disabled]="edicionCampos ? false : true"
      >
      </kendo-textbox>
    </div>
  </div>
  <!-- email en copia -->
  <div class="row px-2 mb-2">
    <div class="col-md-2 align-self-center">
      <div class="text-start">Cc:</div>
    </div>
    <div class="col-md-10">
      <kendo-textbox formControlName="conCopia2" placeholder="Cc">
      </kendo-textbox>
    </div>
  </div>
  <!-- plantillas -->
  <div class="row px-2 mb-2" *ngIf="esNuevo">
    <div class="col-md-2 align-self-center">
      <div class="text-start">Plantilla:</div>
    </div>
    <div class="col-md-10">
      <kendo-dropdownlist
        [data]="objetoRedaccionCorreo.listaPlantillas"
        formControlName="plantilla"
        textField="nombre"
        valueField="id"
        [valuePrimitive]="true"
        [filterable]="true"
        [defaultItem]="{
          id: null,
          nombre: 'Seleccione'
        }"
        [kendoDropDownFilter]="filterSettings"
        (valueChange)="seleccionarContenidoPlantillaCorreo($event)"
        [virtual]="{ itemHeight: 28 }"
      ></kendo-dropdownlist>
    </div>
  </div>
  <!-- centros de costos -->
  <div class="row px-2 mb-2" *ngIf="esNuevo">
    <div class="col-md-2 align-self-center">
      <div class="text-start">Grupo:</div>
    </div>
    <div class="col-md-8">
      <kendo-dropdownlist
        [data]="objetoRedaccionCorreo.listaCentroCostos"
        formControlName="centroCosto"
        textField="nombre"
        valueField="id"
        [valuePrimitive]="true"
        [filterable]="true"
        [kendoDropDownFilter]="filterSettings"
        (valueChange)="cargarVersionesCentroCosto($event)"
        [virtual]="{ itemHeight: 28 }"
        [defaultItem]="{ nombre: '<Seleccione Centro de Costo>', id: null }"
      ></kendo-dropdownlist>
    </div>
    <div class="col-md-2">
      <div class="row">
        <div class="circle">
          <mat-icon class="m-1"> email </mat-icon>
          {{ totalCorreos }}
        </div>
      </div>
    </div>
  </div>
  <!-- versiones -->
  <div class="row px-2 mb-2" *ngIf="esNuevo">
    <div class="col-md-2 align-self-center">
      <div class="text-start">Versiones:</div>
    </div>
    <div class="col-md-10">
      <kendo-multiselect
        [data]="listaVersion"
        formControlName="versiones"
        [kendoDropDownFilter]="filterSettings"
        textField="paquete"
        valueField="idPaquete"
        (valueChange)="obtenerGrupoCentroCostoConVersion()"
        [valuePrimitive]="true"
      ></kendo-multiselect>
    </div>
  </div>
  <!-- estados -->
  <div class="row px-2 mb-2" *ngIf="esNuevo">
    <div class="col-md-2 align-self-center">
      <div class="text-start">Estado:</div>
    </div>
    <div class="col-md-10">
      <kendo-multiselect
        [data]="objetoRedaccionCorreo.listaEstado"
        formControlName="estado"
        valueField="id"
        textField="estadoMatricula"
        (valueChange)="cargarCentroCostoEstadoSubEstado($event)"
        [valuePrimitive]="true"
        [kendoDropDownFilter]="filterSettings"
      ></kendo-multiselect>
    </div>
  </div>
  <!-- subestados -->
  <div class="row px-2 mb-2" *ngIf="esNuevo">
    <div class="col-md-2 align-self-center">
      <div class="text-start">SubEstado:</div>
    </div>
    <div class="col-md-10">
      <kendo-multiselect
        [data]="listaSubEstado"
        formControlName="subestado"
        valueField="id"
        textField="nombre"
        (valueChange)="cargarCentroCostoEstadoSubEstadoIndependiente($event)"
        [valuePrimitive]="true"
        [kendoDropDownFilter]="filterSettings"
      ></kendo-multiselect>
    </div>
  </div>
  <!-- documentos adjuntos -->
  <div class="row px-2 mb-2">
    <div class="col-md-2 align-self-center">
      <div class="text-start">Adjuntar:</div>
    </div>
    <div class="col-md-10">
      <input
        (change)="cambiarArchivo($event)"
        type="file"
        name="adjuntar"
        id="adjuntar"
        multiple
      />
    </div>
  </div>
  <!-- mensaje -->
  <div class="row px-2 mb-2">
    <!-- <div class="col-md-2 align-self-center">
      <div class="text-start">Mensaje:</div>
    </div> -->
    <div class="col-md-15">
      <kendo-editor
        [pasteCleanupSettings]="pasteCleanupSettings"
        formControlName="mensaje"
        name="content"
        style="height: 500px"
      >
        <kendo-toolbar-buttongroup>
          <kendo-toolbar-button kendoEditorUndoButton></kendo-toolbar-button>
          <kendo-toolbar-button kendoEditorRedoButton></kendo-toolbar-button>
        </kendo-toolbar-buttongroup>
        <kendo-toolbar-buttongroup>
          <kendo-toolbar-button kendoEditorBoldButton></kendo-toolbar-button>
          <kendo-toolbar-button kendoEditorItalicButton></kendo-toolbar-button>
          <kendo-toolbar-button
            kendoEditorUnderlineButton
          ></kendo-toolbar-button>
          <kendo-toolbar-button
            kendoEditorStrikethroughButton
          ></kendo-toolbar-button>
        </kendo-toolbar-buttongroup>

        <kendo-toolbar-dropdownlist

        <kendo-toolbar-colorpicker
          kendoEditorForeColor
        ></kendo-toolbar-colorpicker>
        <kendo-toolbar-colorpicker
          kendoEditorBackColor
          view="gradient"
        ></kendo-toolbar-colorpicker>
        <kendo-toolbar-buttongroup>
          <kendo-toolbar-button

          <kendo-toolbar-button

        </kendo-toolbar-buttongroup>

      </kendo-editor>
    </div>
  </div>
  <!-- adjuntos -->

  <!-- botones -->
  <div class="row px-2">
    <div class="text-center">
      <button
        class="btn botonEnvio mx-1 btn-rc-hover-effect"
        [disabled]="isButtonDisabled"
        (click)="sendMessageAcrossMandrill()"
      >
        Enviar
      </button>
      <button class="btn botonCancelar mx-1 btn-rc-hover-effect" (click)="cerrarModal()">
        Cancelar
      </button>
    </div>
  </div>
