<div class="px-5 py-3" style="background-color: #f7f8fa; min-height: 300px">
  <div class="alert alert-warning py-2" role="alert" *ngIf="showMensajeAlerta">
    <fa-icon [icon]="['fas', 'circle-info']"></fa-icon>
    No existen documentos legales
  </div>
  <div style="max-height: 500px; overflow-y:auto">
  <table
    *ngIf="
      dataSourceDocumentosLegales != null &&
      dataSourceDocumentosLegales.data.length > 0
    "
    mat-table
    [dataSource]="dataSourceDocumentosLegales"
  >
    <ng-container matColumnDef="nombre-documento">
      <th mat-header-cell *matHeaderCellDef>Documento</th>
      <td mat-cell *matCellDef="let element">{{ element.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef>Descripcion</th>
      <td mat-cell *matCellDef="let element">{{ element.descripcion }}</td>
    </ng-container>

    <ng-container matColumnDef="pais">
      <th mat-header-cell *matHeaderCellDef>Pais</th>
      <td mat-cell *matCellDef="let element">{{ element.pais }}</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let element">
        <div class="d-flex justify-content-center">
          <button
            mat-icon-button
            matTooltip="Ver Documento"
            matTooltipPosition="above"
            matTooltipHideDelay="0"
            class="custom-icon-box"
            (click)="verDocumentoLegal(modalVerDocumento, element)"
            style="background-color: #ffd9c7"
          >
            <img
              style="width: 80%"
              src="assets/img/iconsagendaatc/eye-icon-orange.svg"
            />
          </button>
          <button
            matTooltip="Descargar Documento"
            matTooltipPosition="above"
            matTooltipHideDelay="0"
            mat-icon-button
            class="custom-icon-box"
            (click)="descargarDocumentoLegal(element)"
            style="background-color: #cbe4ff"
          >
            <img
              style="width: 80%"
              src="assets/img/iconsagendaatc/download-icon-blue.svg"
            />
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
    <tr mat-row *matRowDef="let myRowData; columns: columnsToDisplay"></tr>
  </table>
  </div>
  <mat-paginator
    [ngStyle]="{display: dataSourceDocumentosLegales?.data?.length > 0 ? 'flex' : 'none', 'justify-content': 'center'}"
    [pageSizeOptions]="[5, 10, 20, 50, 100]"
    [pageSize]="5"
  ></mat-paginator>
</div>
<loading [loading]="isLoading"></loading>

<ng-template #modalVerDocumento let-modal>
  <div class="modal-header">
    <h3 class="modal-title mb-0" style="color: #2e6ea6">
      {{ documentoLegalTemp.nombre }}
    </h3>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <div class="row">
      <div class="col-sm-12 col-md-12">
        <div id="documentosLegalService.mostrarImg"></div>

        <object
          *ngIf="showPdf"
          type="application/pdf"
          id="verDocumentoLegalPDF"
          [data]="documentoLegalTemp.urlSanitize"
          width="100%"
          height="500"
        ></object>
        <img
          *ngIf="!showPdf"
          [src]="documentoLegalTemp.urlSanitize"
          alt=""
          id="verDocumentoLegalIMG"
          class="img-fluid"
        />
      </div>
    </div>
  </div>
  <div class="modal-footer justify-content-center">
    <button
      style="background-color: #0079ff"
      mat-button
      (click)="modal.dismiss('Cross click')"
    >
      Aceptar
    </button>
  </div>
</ng-template>
