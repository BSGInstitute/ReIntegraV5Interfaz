  <div class="modal-header" style="background-color: #0079FF;">
    <h3 class="modal-title m-0 px-3" style="color:white;">Programación de Siguiente Actividad</h3>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
  </div>
  <div class="modal-body px-5">
    <form [formGroup]="formProgramarActividad">
      <ng-container *ngIf="formGrupoFecha.show">
        <div class="row">
          <div class="col-md-12 text-center"><strong>{{ocurrenciaPadre}}</strong></div>
        </div>
        <div class="row">
          <div class="col-md-12 text-center">{{ocurrenciaHija}}</div>
        </div>
        <div class="row my-2 justify-content-center">
          <div class="col-md-3">
            <h3 class="m-0 k-label text-color-integra" style="text-align:end">
              Fecha
            </h3>
          </div>
          <div class="col-md-5">
            <kendo-formfield>
              <kendo-datepicker calendarType="classic" class="text-danger" placeholder="Fecha Programada"
                formControlName="fechaProgramada" [disabledDates]="fechaProgramadaConfig.disabledDates"
                [min]="fechaProgramadaConfig.min" [max]="fechaProgramadaConfig.max"
                [format]="fechaProgramadaConfig.format" (valueChange)="changeFechaProgramada($event)">
              </kendo-datepicker>
            </kendo-formfield>
          </div>
        </div>
        <div class="row my-2 justify-content-center">
          <div class="col-md-3">
            <h3 class="m-0 k-label text-color-integra" style="text-align:end">
              Hora
            </h3>
          </div>
          <div class="col-md-5">
            <kendo-formfield>
              <kendo-timepicker class="text-danger" [steps]="steps" format="HH:mm" placeholder="Hora Programada"
                formControlName="horaProgramada"></kendo-timepicker>
            </kendo-formfield>
          </div>
        </div>
      </ng-container>
    </form>
  </div>
  <div class="modal-footer justify-content-center">
    <!-- <div class="k-form-buttons m-0">
      <button class="btn btn-success text-white w-100">
      Programar Actividad
    </button>
    </div>  -->

    <button mat-button class="text-center btn-ril-hover-effect" style="border: 1px solid #0079FF; background-color: #0079FF; color: white"
      (click)="guardarProgramacion()" *ngIf="formBtnProgramarActividad.show" [disabled]="btnModalProgramar">
      Guardar
    </button>
    <button mat-button class="text-center btn-ril-hover-effect" (click)="modal.dismiss('Cross click')"
      *ngIf="!formBtnCerrarActividad.show" style="border: 1px solid #0079FF; background-color: white; color: #0079FF">
      Cerrar
    </button>
    <button (click)="cerrarActividad()" *ngIf="formBtnCerrarActividad.show" [disabled]="btnModalCerrarActividad"
      themeColor="error" size="large" class="w-100 btn-ril-hover-effect" kendoButton>
      Cerrar Actividad
    </button>
    <loading [loading]="loadingModal"></loading>
  </div>
</ng-template>
<ng-template #modalCerrarOportunidad let-modal>
  <div class="modal-header" style="background-color: #158fc6;">
    <h3 class="modal-title" style="color:white; margin-block-end: -5px;">Programación de Actividades</h3>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss('Cross click')"></button>
  </div>
  <div class="modal-footer">
    <button (click)="guardarProgramacion()" [disabled]="btnModalProgramar" themeColor="error" size="large" class="w-100 btn-ril-hover-effect"
      kendoButton>
      Cerrar Seguimiento
    </button>
    <loading [loading]="loadingModal"></loading>
  </div>
</ng-template>

<!-- END Modal Form Programa  -->





<div class="card mt-3" id="scrolto2">


  <mat-expansion-panel class="mt-2" [expanded]="true">
    <mat-expansion-panel-header class="enuciadoHeader">
      <mat-panel-title> Reporte de incidencia en la llamada </mat-panel-title>
    </mat-expansion-panel-header>
    <mat-card>
      <div class="row ">
        <div class="col-6">
          <div class="row mx-2">
            <mat-accordion >
              <ng-container *ngFor="let item of arbolOcurrencia1; let i = index">
                <mat-expansion-panel class="mt-2" [expanded]="false" style="width: 100%; padding: 0;" (opened)="verPlantillas(item)" (closed)="hideBtnProgramarActividad()">
                  <mat-expansion-panel-header class="enuciadoHeader" [ngStyle]="{ 'background-color': colorPanel[i % colorPanel.length]}" style="width: 100%;">
                    <mat-panel-title style="color: white;">
                      {{ item.nombreOcurrencia.trim() }}
                    </mat-panel-title>
                  </mat-expansion-panel-header>
                  <mat-expansion-panel-body style="padding: 0px;">
                    <div [tabindex]="e" class="ocurrencia-link mt-2 mx-2" 
                          (click)="ver(hijo)" 
                          style="height: 50px;display: flex;
                          align-items: center;
                          padding: 10px;" 
                          *ngFor="let hijo of arbolOcurrenciaHijos10[i]; let e = index ">
                      {{ hijo.nombreOcurrencia }}
                    </div>
                  </mat-expansion-panel-body>
                </mat-expansion-panel>
              </ng-container>
            </mat-accordion>
          </div>
        </div>
        <div class="col-6">
          <div class="row mx-2">

            <mat-card class="example-card">
              <mat-card-header>
             <span [innerHTML]="tituloPlantilla" style="font-weight: bold;"></span>
              </mat-card-header>
              <mat-card-content>
                <span [innerHtml]="cuerpoPlantilla"></span>
              </mat-card-content>
            </mat-card>
          </div>
        </div>

        <div class="row my-4" *ngIf="btnProgramarActividad1.show" style="display: flex;justify-content: center;">
          <div class="block" style="width: 450px;">
            <button class="btn btn-primary text-white w-100 btn-ril-hover-effect" (click)="programarActividad()">
              <img src="assets/img/iconsagendaatc/Grupo 4095.svg" alt="Icono" style="vertical-align: middle" class="tamano-icono" />
              Programar Actividad
            </button>
          </div>
        </div>
      </div>
    </mat-card>
  </mat-expansion-panel>
</div>
