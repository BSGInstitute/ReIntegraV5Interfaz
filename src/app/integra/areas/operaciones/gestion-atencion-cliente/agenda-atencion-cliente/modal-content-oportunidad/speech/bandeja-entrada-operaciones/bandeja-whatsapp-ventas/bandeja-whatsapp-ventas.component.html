
<div *ngIf="loaderHistorialMensajes" style="height: 100px">
  <loading [loading]="true"></loading>
</div>
<h3 *ngIf="!loaderHistorialMensajes && historialMensajeRecibidosChat.length == 0" style="text-align:center;font-weight: bold; margin: 25px 0px;"> - No hay mensajes - </h3>
<div *ngIf="!loaderHistorialMensajes && historialMensajeRecibidosChat.length > 0"
  class="transition"
  style="
    margin-left: 10%;
    margin-right: 10%;
    margin-top: 4px;
    margin-bottom: 3px;
    border: 1px solid #dfd1d1;
    border-radius: 10px;
  "
>
  <div class="block-header fw-bold" style="background-color: #11c744;border-radius: 10px 10px 0 0;padding: 5px;">
    <div class="p-2 px-3 text-white text-center">
      <div class="row">
        <div class="">
          <div class="flex-row py-1">
            <!-- <fa-icon [icon]="['fas', 'circle-user']" [size]="'xl'"></fa-icon> -->
            <span class="px-1 fw-bold" style="color: #ffffff;font-size: 17px;font-weight: 500 !important;">{{ nombreYapellido }}</span>
          </div>
          <div class="flex-row py-1">
            <!-- <fa-icon [icon]="['fas', 'circle-user']" [size]="'xl'"></fa-icon> -->
            <span
              class="px-1 fw-bold"
              style="color: #ffffff;font-size: 14px;font-weight: 150 !important;"
              >Fecha de último mensaje: {{ fechaUltimoMensaje | date : "dd/MM/yyyy hh:mm" }}</span>
          </div>
        </div>
        <!-- <div class="col-md-2">
      <div class="text-end">
        <button class="btn" (click)="recargarChatHistorial()">
          <fa-icon [icon]="['fas','arrows-rotate']"></fa-icon>
        </button>
      </div>
    </div> -->
  </div>
</div>
  </div>
  <div
    #content
    class="p-2 px-3 block-message"
        style="
          background-image: url('../../../../../../../../../assets/img/fonWhats4darker.jpg');
          background-size: cover;
          background-repeat: no-repeat;
          overflow-y: scroll;
          height: 550px;
        "
      >
    <div #messages *ngFor="let mensajes of historialMensajeRecibidosChat">
      <ng-container *ngIf="mensajes.tipo == 2">
        <div class="row message">
          <div class="text-start">
            <div class="d-flex flex-row">
              <div class="text-end pt-1">
                <div
                  class="rounded-circle px-2 pt-1 m-1"
                  style="width: 30px; height: 30px; background-color: #d3d6db"
                >
                  <fa-icon
                    [icon]="['fas', 'user']"
                    class="fa-lg text-white"
                  ></fa-icon>
                </div>
              </div>
              <label
                class="w-auto p-2 my-1 rounded images"
                style="
                  max-width: 75%;
                  background-color: #f5f5f5;
                  border-radius: 0px 6px 6px 9px;
                  opacity: 1;
                "
              >
                <span
                  class="px-1"
                  style="color: #373737"
                  [innerHTML]="mensajes.mensaje"
                ></span>
                <span class="d-flex pt-1 hora-chat">{{
                  mensajes.fechaCreacion | date : "dd/MM/yyyy hh:mm"
                }}</span>
              </label>
            </div>
          </div>
        </div>
      </ng-container>
      <ng-container *ngIf="mensajes.tipo == 1">
        <div class="row message">
          <div class="text-end">
            <label
              class="w-auto p-2 m-1 rounded images"
              style="
                max-width: 75%;
                background-color: #ecfef1;
                text-align: left !important;
                border-radius: 13px 0px 13px 13px;
                opacity: 1;
              "
            >
              <span class="px-1 fw-bold" style="font-size: small">{{
                mensajes.nombrePersonal
              }}</span>
              <span [ngClass]="{ 
                'esfera-celeste': mensajes.areaPersonal === 'Atención al cliente', 
                'esfera-verde-fosforecente': mensajes.areaPersonal !== 'Atención al cliente' 
                }">
                {{ mensajes.areaPersonal }}
              </span>
              <span
                class="d-flex mt-1 px-1"
                [innerHTML]="mensajes.mensaje"
              ></span>
              <span
                class="d-flex flex-row-reverse px-2 hora-chat"
                style="height: 10px"
              >
                <p
                  class="ps-3 estado-mensaje"
                  *ngIf="mensajes.estadoMensaje == 1"
                >
                  <fa-icon [icon]="['fas', 'check']" class="visto"></fa-icon>
                  <fa-icon [icon]="['fas', 'check']" class="visto"></fa-icon>
                </p>
                <p
                  class="ps-3 estado-mensaje"
                  *ngIf="mensajes.estadoMensaje == 2"
                >
                  <fa-icon
                    [icon]="['fas', 'check']"
                    class="text-primary visto"
                  ></fa-icon>
                  <fa-icon [icon]="['fas', 'check']" class="visto"></fa-icon>
                </p>
                <p
                  class="ps-3 estado-mensaje"
                  *ngIf="mensajes.estadoMensaje == 3"
                >
                  <fa-icon
                    [icon]="['fas', 'check']"
                    class="text-primary visto"
                  ></fa-icon>
                  <fa-icon
                    [icon]="['fas', 'check']"
                    class="text-primary visto"
                  ></fa-icon>
                </p>
                {{ mensajes.fechaCreacion | date : "dd/MM/yyyy hh:mm" }}
              </span>
            </label>
          </div>
        </div>
      </ng-container>
    </div>
    </div>
</div>
