<div class="p-5 cursoMatriculadoContainer">
  <div style="max-height: 500px; overflow-y:auto">
  <table mat-table [dataSource]="gridCursoMatriculado">
    <ng-container matColumnDef="nombreCurso">
      <th mat-header-cell *matHeaderCellDef>Nombre Curso</th>
      <td mat-cell *matCellDef="let row">{{ row.nombre }}</td>
    </ng-container>
    <ng-container matColumnDef="duracion">
      <th mat-header-cell *matHeaderCellDef>Duración</th>
      <td mat-cell style="text-align: center;" *matCellDef="let row">{{ row.duracion }}</td>
    </ng-container>
    <ng-container matColumnDef="tipo">
      <th mat-header-cell *matHeaderCellDef>Tipo</th>
      <td mat-cell style="text-align: center;" *matCellDef="let row">{{ row.tipo }}</td>
    </ng-container>
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let row">
        <div class="w-100 d-flex justify-content-center">
          <button
            [disabled]="!esCoordinadora"
            class="btn"
            container="body"
            placement="top"
            ngbTooltip="Anular Matricula"
            (click)="desmatricularCurso(row)"
          >
            <span class="material-icons"></span>
            <img src="assets/img/iconsagendaatc/Grupo 4114.svg" />
          </button>
        </div>
      </td>
    </ng-container>
    <tr
      mat-header-row
      *matHeaderRowDef="columnsToDisplayCursosMatriculados"
    ></tr>
    <tr
      mat-row
      *matRowDef="let myRowData; columns: columnsToDisplayCursosMatriculados"
    ></tr>
  </table>
  </div>
  <mat-paginator style="display:flex; justify-content:center"
    [pageSizeOptions]="[5,10,20,50,100]"
    [pageSize]="5"
  >
  </mat-paginator>
  <loading [loading]="isLoading"></loading>
</div>
