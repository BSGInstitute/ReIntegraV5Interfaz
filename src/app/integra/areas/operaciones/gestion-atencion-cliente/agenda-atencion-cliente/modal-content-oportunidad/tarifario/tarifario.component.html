<div class="px-5 py-3" style="background-color: #F7F8FA; min-height: 300px">
  <table mat-table *ngIf="listaTarifarios != null && listaTarifarios.length > 0" [dataSource]="listaTarifarios">
    <ng-container matColumnDef="nro-orden">
        <th mat-header-cell *matHeaderCellDef> N° </th>
        <td mat-cell *matCellDef="let i = index"> {{i+1}} </td>
      </ng-container>
  
      <ng-container matColumnDef="concepto">
        <th mat-header-cell *matHeaderCellDef> Concepto </th>
        <td mat-cell *matCellDef="let element"> {{element.concepto}}</td>
      </ng-container>
  
      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef> Descripción </th>
        <td mat-cell *matCellDef="let element"> {{element.descripcion}} </td>
      </ng-container>
      
      <ng-container matColumnDef="monto-peru">
        <th mat-header-cell *matHeaderCellDef>
          <div class="d-flex align-items-center">
            <ng-container *ngTemplateOutlet="prevMonto"></ng-container> 
            <span class="flex-grow-1 text-center">Monto (PEN)</span>
            <ng-container *ngTemplateOutlet="nextMonto"></ng-container>
          </div>
        </th>
        <td mat-cell *matCellDef="let element"> {{element.montoPeru}} </td>
      </ng-container>

      <ng-container matColumnDef="monto-mexico">
        <th mat-header-cell *matHeaderCellDef>
          <div class="d-flex align-items-center">
            <ng-container *ngTemplateOutlet="prevMonto"></ng-container> 
            <span class="flex-grow-1 text-center">Monto (MXN)</span>
            <ng-container *ngTemplateOutlet="nextMonto"></ng-container>
          </div>
          </th>
        <td mat-cell *matCellDef="let element"> {{element.montoMexico}} </td>
      </ng-container>


      <ng-container matColumnDef="monto-colombia">
        <th mat-header-cell *matHeaderCellDef>
          <div class="d-flex align-items-center">
            <ng-container *ngTemplateOutlet="prevMonto"></ng-container> 
            <span class="flex-grow-1 text-center">Monto (COP)</span>
            <ng-container *ngTemplateOutlet="nextMonto"></ng-container>
          </div>
        </th>
        <td mat-cell *matCellDef="let element"> {{element.montoColombia}} </td>
      </ng-container>

      <ng-container matColumnDef="monto-bolivia">
        <th mat-header-cell *matHeaderCellDef>
          <div class="d-flex align-items-center">
            <ng-container *ngTemplateOutlet="prevMonto"></ng-container> 
            <span class="flex-grow-1 text-center">Monto (Bs)</span>
            <ng-container *ngTemplateOutlet="nextMonto"></ng-container>
          </div>
        </th>
        <td mat-cell *matCellDef="let element"> {{element.montoBolivia}} </td>
      </ng-container>
      
      <ng-container matColumnDef="monto-extranjero">
        <th mat-header-cell *matHeaderCellDef>
          <div class="d-flex align-items-center">
            <ng-container *ngTemplateOutlet="prevMonto"></ng-container> 
            <span class="flex-grow-1 text-center">Monto (USD)</span>
            <ng-container *ngTemplateOutlet="nextMonto"></ng-container>
          </div>
        </th>
        <td mat-cell *matCellDef="let element"> {{element.montoExtranjero}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr mat-row *matRowDef="let myRowData; columns: columnsToDisplay"></tr>
</table>
</div>
<loading [loading]="isLoading"></loading>

<ng-template #prevMonto>
  <button (click)="PrevMonto()" mat-icon-button style="color: white">
    <mat-icon>keyboard_arrow_left</mat-icon>
  </button> 
</ng-template>
<ng-template #nextMonto>
  <button (click)="NextMonto()" mat-icon-button style="color: white">
    <mat-icon>keyboard_arrow_right</mat-icon>
  </button> 
</ng-template>
