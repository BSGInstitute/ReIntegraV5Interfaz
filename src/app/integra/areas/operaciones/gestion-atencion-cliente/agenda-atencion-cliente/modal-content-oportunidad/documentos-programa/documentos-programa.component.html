<div class="px-5 py-3" style="background-color: #F7F8FA; min-height: 300px">
  
  <span *ngIf="nombrePrograma != null" class="programa-matricula">
    <b>Programa matricula: </b>{{nombrePrograma}}
  </span>
  <div style="max-height:500px; overflow-y: auto">
  <table mat-table *ngIf="dataSourceDocumentoPrograma != null && dataSourceDocumentoPrograma.data.length > 0" [dataSource]="dataSourceDocumentoPrograma">
      <ng-container matColumnDef="nombre-documento">
        <th mat-header-cell *matHeaderCellDef> Nombre del Documento </th>
        <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
      </ng-container>
  
      <ng-container matColumnDef="descargar">
        <th mat-header-cell *matHeaderCellDef> Descargar </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button class="custom-icon-box" (click)="descargar(element)" style="background-color: #CBE4FF">
            <img style="width: 80%" src="assets/img/iconsagendaatc/download-icon-blue.svg">
          </button>
        </td>
      </ng-container>
  
      <ng-container matColumnDef="si-no">
        <th mat-header-cell *matHeaderCellDef> Sí/No </th>
        <td mat-cell *matCellDef="let element"> 
          <ng-container [ngSwitch]="element.mensaje">
            <ng-container *ngSwitchCase="'Correcto'">
              <div class="custom-icon-box" style="background-color: #D5FFE1">
                <img style="width: 50%" src="assets/img/iconsagendaatc/check-icon-green.svg">
              </div>
            </ng-container>
            <ng-container *ngSwitchDefault>
              <div class="custom-icon-box" style="background-color: #FFD9C7">
                <img style="width: 70%" src="assets/img/iconsagendaatc/cross-icon-orange.svg">
              </div>
            </ng-container>
          </ng-container>
        </td>
      </ng-container>
      
      <ng-container matColumnDef="detalles">
        <th mat-header-cell *matHeaderCellDef> Detalles </th>
        <td mat-cell *matCellDef="let element"><span [innerHTML]="element.mensajeDetalle"></span></td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr mat-row *matRowDef="let myRowData; columns: columnsToDisplay"></tr>
</table>
</div>
<mat-paginator [ngStyle]="{display: dataSourceDocumentoPrograma?.data?.length > 0 ? 'flex' : 'none', 'justify-content': 'center'}"   [pageSizeOptions]="[5,10,20,50,100]" [pageSize]="5"></mat-paginator>
</div>
<loading [loading]="isLoading"></loading>
