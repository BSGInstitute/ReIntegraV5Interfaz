        </div>

      <!-- <loading [loading]="chatSoporteInformacion.loader"></loading> -->
      <div
        #myScrollableDiv
        class="p-2 px-3 block-message"
        style="background-color: #ffffff;height: 50vh;overflow-y: auto;border: 1px solid #dfd1d1;border-radius: 0 0 10px 10px;"
      >
        <ng-container #messages *ngFor="let mensaje of mensajes">
          <ng-container *ngIf="mensaje.idRemitente == 'visitante'">
            <div class="row">
              <div class="text-start">
                <div class="d-flex flex-row">
                  <div class="text-end pt-1">
                    <img
                      [src]="avatarUrl"
                      alt=""
                      class="pt-1 m-1 rounded-circle"
                      style="width: 40px"
                    />
                  </div>
                  <label
                    class="w-auto p-2 my-1 rounded images"
                    style="max-width: 75%; background-color: #d4d4d4"
                  >
                    <span class="d-flex fw-bold row-info"
                      ><p>{{ mensaje.nombreRemitente }}</p>
                      <p class="hora-chat p-1">
                        {{ mensaje.fecha | date : "yyyy/MM/dd hh:mm" }}
                      </p></span
                    >
                    <span class="d-flex" [innerHTML]="mensaje.mensaje"></span>
                  </label>
                </div>
              </div>
            </div>
          </ng-container>
          <ng-container *ngIf="mensaje.idRemitente != 'visitante'">
            <div class="row">
              <div class="text-end">
                <label
                  class="w-auto p-2 m-1 rounded images"
                  style="
                    max-width: 75%;
                    background-color: #d9fdd3;
                    text-align: left !important;
                  "
                >
                  <span class="d-flex fw-bold row-info"
                    ><p>{{ mensaje.nombreRemitente }}</p>
                    <p class="hora-chat p-1">
                      {{ mensaje.fecha | date : "yyyy/MM/dd hh:mm" }}
                    </p></span
                  >
                  <div class="d-flex">
                    <p [innerHTML]="mensaje.mensaje"></p>
                  </div>
                  <div class="row text-end">
                    <fa-icon
                      [icon]="['fas', 'check-double']"
                      class="text-primary"
                    ></fa-icon>
                  </div>
                </label>
              </div>
            </div>
          </ng-container>
        </ng-container>
      </div>
    </div>
  </div>
  <div class="offset-md-2"></div>
</div>
