<div class="card mb-3">
    <div class="card-header bg-atencion text-white py-3">
        Oportunidades de Venta Cruzada
    </div>
    <div class="card-body">
        <kendo-grid
            [kendoGridBinding]="gridVentaCruzada.data"
            [loading]="gridVentaCruzada?.loading"
            [sortable]="gridVentaCruzada?.sortable"
        >
            <kendo-grid-column
              field="programa"
              title="Programa"
              [headerClass]="'justify-content-center'"
              [width]="500"
            >
            </kendo-grid-column>
            <kendo-grid-column
              field="probabilidad"
              title="Probabilidad"
              [headerClass]="'justify-content-center'"
              [width]="200"
            >
              <ng-template kendoGridCellTemplate let-dataItem>
                <div [ngSwitch]="dataItem.probabilidad">
                    <span *ngSwitchCase="'Muy Alta'"  style='color:#429d00; display: block;padding: 7px; text-align: center;'>
                        {{ dataItem.probabilidad }}
                    </span>
                    <span *ngSwitchCase="'Alta'" style='color:#004792; display: block;padding: 7px; text-align: center;'>
                        {{ dataItem.probabilidad }}
                    </span>
                    <span *ngSwitchCase="'Baja'" style='color:#ed1c24; display: block;padding: 7px; text-align: center;'>
                        {{ dataItem.probabilidad }}
                    </span>
                    <span *ngSwitchDefault style='color:#fbb03b; display: block;padding: 7px; text-align: center;'>
                        {{ dataItem.probabilidad }}
                    </span>
                </div>
              </ng-template>
            </kendo-grid-column>
            <kendo-grid-column
              field="precio"
              title="Precio"
              [headerClass]="'justify-content-center'"
              [width]="200"
            >
              <ng-template kendoGridCellTemplate let-dataItem>
                <div *ngIf="dataItem.matricula; else SinMatricula">
                    <span><strong> Credito:  </strong></span>
                    <span style='padding-left: 5px;'> Total <span>{{ dataItem.precio }}</span> </span>
                </div>
                <ng-template #SinMatricula>
                    <span><strong> Contado:  </strong></span>
                    <span style='padding-left: 5px;'><span>{{ dataItem.contado }}</span> </span>
                </ng-template>
              </ng-template>
            </kendo-grid-column>
        </kendo-grid>
    </div>
</div>
