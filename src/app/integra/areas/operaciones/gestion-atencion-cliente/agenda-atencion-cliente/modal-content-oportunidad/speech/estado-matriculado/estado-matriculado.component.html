<br />
<div class="container mb-2">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <mat-card class="card-hover-effect" (click)="enviarDatosPortalWhatsApp()">
        <div class="row">
          <div class="imgCont col-3 d-flex justify-content-center align-items-center">
            <button type="button" class="btn btn-hover-effect" [disabled]="plantillaEnvidaWhatsappDatosPortal"
              style="color: white; background-color: #FF6113; border-radius: 15px"
              >
              <fa-icon [icon]="['fab', 'whatsapp']" [size]="'xl'">
                <loading [loading]="loadingWhatsapp"></loading>
              </fa-icon>
            </button>
          </div>
          <div class="col-9" style="
            display: flex;
            align-items: center;
            border-left-style: solid;
            border-left-width: 1px;
            border-left-color: #c0b6b6;
          ">
            <span>Enviar Accesos Portal Web por Whatsapp</span>
          </div>
        </div>
      </mat-card>
    </div>
    <div class="col-md-4">
      <mat-card class="card-hover-effect"  (click)="enviarDatosMoodle()">
        <div class="row">
          <div class="imgCont col-3">
             <button type="button" class="btn btn-hover-effect" id="enviarDatosMoodle"
              [disabled]="plantillaEnvidaCorreoAcessoMoodle"
              style="color: white; background-color: #0079FF; border-radius: 15px">
              <img src="assets/img/iconsagendaatc/Grupo 4081.svg" alt="Icono" style="vertical-align: middle;">
              <loading [loading]="loadingCorreo"></loading>
            </button></div>
          <div class="col-9" style="
            display: flex;
            align-items: center ;border-left-style: solid;
    border-left-width: 1px;
    border-left-color: #c0b6b6;
        ">
            <span>Enviar Accesos Portal Web por correo</span>

          </div>
        </div>
      </mat-card>
    </div>
    <div class="col-md-4">
      <mat-card class="card-hover-effect" (click)="enviarDatosCondicionesCaracteristicas()">
        <div class="row">
          <div class="imgCont col-3">
            <button type="button" class="btn btn-hover-effect" id="enviarDatosCondicionesCaracteristicas"
              [disabled]="plantillaEnvidaCorreoCondiciones"
              style="color: white; background-color: #11C744; border-radius: 15px"
              >
              <img src="assets/img/iconsagendaatc/Grupo 4081.svg" alt="Icono" style="vertical-align: middle;">
              <loading [loading]="loadingCaracteristicas"></loading>
            </button>
          </div>
          <div class="col-9" style="
            display: flex;
            align-items: center ;border-left-style: solid;
    border-left-width: 1px;
    border-left-color: #c0b6b6;
        ">
            <span>Enviar Condiciones y características por correo</span>
          </div>
        </div>
      </mat-card>
    </div>
  </div>
</div>
