<kendo-grid
  [kendoGridBinding]="grilla"
  kendoGridSelectBy="id"
  [sortable]="true"
  [reorderable]="true"
  [resizable]="true"
  [filterable]="true"
  [columnMenu]="{ filter: true }"
  [class]="'cellCustomClass'"
  id="my-grid"
  class="cellCustomClass"
  [rowClass]="rowCallback"
  [headerClass]="'headerCustomClass'"
  [loading]="loading"
>
  <ng-template kendoGridToolbarTemplate>
    <button
      kendoButton
      icon="reload"
      fillMode="flat"
      themeColor="secondary"
      (click)="obtenerGrillass()"
    ></button>
    <kendo-grid-spacer></kendo-grid-spacer>
    <div class="fecha" style="bottom: -12px">
      <div class="example-wrapper">
        <kendo-dropdownlist
          [data]="dias"
          textField="View"
          valueField="Value"
          style="
            background-color: #008069;
            color: white;
            font-size: 15px;
            margin-top: 10px;
            border: none;
          "
          [(ngModel)]="diaDrop"
          (selectionChange)="selectionChange($event)"
        >
        </kendo-dropdownlist>
      </div>
    </div>
  </ng-template>
  <kendo-grid-column
    title="N°"
    [width]="50"
    [headerClass]="'headerCustomClass'"
  >
    <ng-template kendoGridCellTemplate let-rowIndex="rowIndex">
      {{ rowIndex + 1 }}
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    field="idAlumno"
    title="idAlumno"
    [width]="100"
    [headerClass]="'headerCustomClass'"
  >
  </kendo-grid-column>
  <kendo-grid-column
    field="alumno"
    title="Cliente"
    [width]="200"
    [headerClass]="'headerCustomClass'"
  >
  </kendo-grid-column>

  <kendo-grid-column
    field="numeroWhatsApp"
    title="Identificador"
    [width]="200"
    [headerClass]="'headerCustomClass'"
  >
  </kendo-grid-column>

  <kendo-grid-column
    field="mensaje"
    title="Ultimo Mensaje"
    [width]="350"
    [headerClass]="'headerCustomClass'"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      <div class="prueba">
        {{ dataItem.mensaje }}
      </div>
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    field="asesor"
    title="Asesor"
    [width]="200"
    [headerClass]="'headerCustomClass'"
  >
  </kendo-grid-column>
  <kendo-grid-column
    field="fecha"
    title="FechaUltimoMensaje"
    [width]="100"
    [headerClass]="'headerCustomClass'"
  >
  </kendo-grid-column>
  <kendo-grid-column
    field="proceso"
    title="Centro Costo"
    [width]="200"
    [headerClass]="'headerCustomClass'"
  >
  </kendo-grid-column>
  <kendo-grid-command-column
    title=""
    [width]="150"
    [headerClass]="'headerCustomClass'"
  >
    <ng-template
      kendoGridCellTemplate
      let-isNew="isNew"
      let-dataItem="dataItem"
      let-rowindex="rowindex"
    >
      <div class="w-100 d-flex justify-content-center">
        <button kendoButton class="botonWhats" (click)="verWhats(dataItem)">
          <img src="../../../../../../assets/img/whats.png" />
        </button>
      </div>
    </ng-template> </kendo-grid-command-column
></kendo-grid>
