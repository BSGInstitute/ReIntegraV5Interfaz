<ng-container *ngIf="loader == true">
  <div class="loading-indicator">
    <mat-progress-spinner
      mode="indeterminate"
      color="accent"
    ></mat-progress-spinner>
  </div>
</ng-container>
<div class="modal-whatsapp">
  <div class="contenedor-superior">
    <div class="text-titulo-modal">Plantilla</div>
  </div>
</div>

<div class="contenedorCampania" style="padding: 50px">
  <div class="row justify-content-center" style="margin-bottom: 20px">
    <div style="display: flex; align-items: center">
      <div style="text-align: right; margin-right: 4px; width: 50%">
        <label
          class="col-md-4 col-form-label text-right"
          style="text-align: right"
        >
          Plantilla del masivo:
        </label>
      </div>
      <div
        style="flex: 1; display: flex; align-items: center; margin-left: 4px"
      >
        <kendo-dropdownlist
          [data]="listaPlantilla"
          [kendoDropDownFilter]="filterSettings"
          textField="nombre"
          valueField="id"
          (selectionChange)="selectionChangePlantilla($event)"
          [(ngModel)]="idPlantilla"
          [valuePrimitive]="true"
          class="max-width-390"
        >
        </kendo-dropdownlist>
      </div>
    </div>
  </div>

  <div class="row justify-content-center" style="margin-bottom: 20px">
    <div style="display: flex; align-items: center">
      <div style="text-align: right; margin-right: 4px; width: 50%">
        <label
          class="col-md-4 col-form-label text-right"
          style="text-align: right"
        >
          Centro de Costo
        </label>
      </div>
      <div
        style="flex: 1; display: flex; align-items: center; margin-left: 4px"
      >
        <kendo-dropdownlist
          [data]="listaCentroCosto"
          [kendoDropDownFilter]="filterSettings"
          textField="nombre"
          valueField="idCentroCosto"
          (selectionChange)="selectionChangeCentroCosto($event)"
          [(ngModel)]="idCentroCosto"
          [valuePrimitive]="true"
          class="max-width-390"
        >
        </kendo-dropdownlist>
      </div>
    </div>
  </div>

  <div class="row justify-content-center">
    <div style="display: flex; align-items: center">
      <div style="text-align: right; margin-right: 4px; width: 50%">
        <label
          class="col-md-4 col-form-label text-right"
          style="text-align: right"
        >
          Celular
        </label>
      </div>
      <div
        style="flex: 1; display: flex; align-items: center; margin-left: 4px"
      >
        <mat-form-field appearance="outline" style="width: 390px; padding: 4px">
          <input
            matInput
            placeholder="Nombre de campaña general"
            [(ngModel)]="celular"
          />
        </mat-form-field>
      </div>
    </div>
  </div>

  <div class="row justify-content-center" style="margin-bottom: 20px">
    <div style="display: flex; align-items: center">
      <div style="text-align: right; margin-right: 4px; width: 50%">
        <label
          class="col-md-4 col-form-label text-right"
          style="text-align: right"
        >
          Celular Empresa:
        </label>
      </div>
      <div
        style="flex: 1; display: flex; align-items: center; margin-left: 4px"
      >
      <kendo-dropdownlist
      [data]="listaPais"
      [kendoDropDownFilter]="filterSettings"
      textField="nombrePais"
      valueField="idPais"
      (selectionChange)="selectionChangePais($event)"
      [(ngModel)]="idPais"
      [valuePrimitive]="true"
      class="max-width-390"
    >
    </kendo-dropdownlist>
      </div>
    </div>
  </div>

  <div class="row justify-content-center" style="margin-bottom: 20px">
    <div style="display: flex; align-items: center">
      <div style="text-align: right; margin-right: 4px; width: 50%">
        <label
          class="col-md-4 col-form-label text-right"
          style="text-align: right"
        >
          IdAlumno
        </label>
      </div>
      <div
        style="flex: 1; display: flex; align-items: center; margin-left: 4px"
      >
        <kendo-dropdownlist
          [data]="listaIdAlumnos"
          [kendoDropDownFilter]="filterSettings"
          textField="nombre"
          valueField="id"
          (selectionChange)="selectionChangeIdAlumno($event)"
          [(ngModel)]="idAlumno"
          [valuePrimitive]="true"
          class="max-width-390"
        >
        </kendo-dropdownlist>
      </div>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <button class="btn butEnviar" (click)="Enviar()">Enviar</button>
    </div>
  </div>
</div>
