<ng-container *ngIf="loader == true">
    <div class="loading-indicator">
      <mat-progress-spinner
        mode="indeterminate"
        color="accent"
      ></mat-progress-spinner>
    </div>
  </ng-container>
  <div class="contenedor">
    <div class="row">
      <div class="col-12">
        <div class="card mgb">
          <div class="pb-0">
            <kendo-expansionpanel class="expancionoportunidadhome">
              <ng-template kendoExpansionPanelTitleDirective>
                <div>
                  <span>Filtros Chat Sms Masivos</span>
                </div>
              </ng-template>
              <div class="content">
                <div class="row my-3">
                  <div class="col-md-7">
                    <div class="form-group">
                      <label for="cel">Celular:</label>
                      <input type="text" class="form-control" id="cel" [(ngModel)]="celular"/>
                    </div>
  
                  </div>
  
                  <div class="col-md-3 butons">
                    <button
                      kendoButton
                      style="background-color:#0093e8; color:white"
                      icon="k-icon k-i-search k-icon-20"
                      type="button"
                      (click)="obtenerGrilla()"
                    >
                      Buscar Chat
                    </button>
                  </div>
                </div>
              </div>
            </kendo-expansionpanel>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  
  <div class="contenedor">
    <div class="row">
      <div class="col-12">
        <div class="card mgb">
          <div class="pb-0 mgb">
            <kendo-tabstrip>
              <kendo-tabstrip-tab title="Recibidos" [selected]="true">
                <ng-template kendoTabContent>
                  <app-grilla-contestacion  [tab]="1"></app-grilla-contestacion>
  
                </ng-template>
              </kendo-tabstrip-tab>
              <kendo-tabstrip-tab title="Respondidos">
                <ng-template kendoTabContent>
                  <app-grilla-contestacion  [tab]="2"></app-grilla-contestacion>
                </ng-template>
              </kendo-tabstrip-tab>
              <kendo-tabstrip-tab title="Desuscritos">
                <ng-template kendoTabContent>
                  <app-grilla-contestacion  [tab]="3"></app-grilla-contestacion>
                </ng-template>
              </kendo-tabstrip-tab>
            </kendo-tabstrip>
          </div>
        </div>
      </div>
    </div>
  </div>
