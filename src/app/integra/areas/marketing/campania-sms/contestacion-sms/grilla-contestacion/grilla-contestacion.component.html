<kendo-grid
  [kendoGridBinding]="grilla"
  kendoGridSelectBy="id"
  [sortable]="true"
  [reorderable]="true"
  [resizable]="true"
  [filterable]="true"
  [columnMenu]="{ filter: true }"
>
  <ng-template kendoGridToolbarTemplate>
    <button
      kendoButton
      icon="reload"
      fillMode="flat"
      themeColor="secondary"
      (click)="obtenerGrilla()"
    ></button>
    <kendo-grid-spacer></kendo-grid-spacer>
    <div class="fecha" style="bottom: -12px">
      <div class="example-wrapper">
        <kendo-dropdownlist
          [data]="dias"
          textField="View"
          valueField="Value"
          style="
            background-color: #0093e8;
            color: white;
            font-size: 15px;
            margin-top: 10px;
            border: none;
          "
          [(ngModel)]="diaDrop"
          (selectionChange)="selectionChange($event)"
        >
        </kendo-dropdownlist>
      </div>
    </div>
  </ng-template>
  <kendo-grid-column title="N°" [width]="50">
    <ng-template kendoGridCellTemplate let-rowIndex="rowIndex">
      {{ rowIndex + 1 }}
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column field="idAlumno" title="idAlumno" [width]="100">
  </kendo-grid-column>
  <kendo-grid-column field="nombreCompleto" title="Cliente" [width]="200">
  </kendo-grid-column>

  <kendo-grid-column field="celular" title="Celular" [width]="200">
  </kendo-grid-column>

  <ng-container *ngIf="tab == 1">
    <kendo-grid-column field="mensaje" title="Ultimo Mensaje" [width]="350">
    </kendo-grid-column>
  </ng-container>
  <ng-container *ngIf="tab == 2">
    <kendo-grid-column
      field="mensajePlantillaHtml"
      title="Ultimo Mensaje"
      [width]="350"
    >
    </kendo-grid-column>
  </ng-container>
  <kendo-grid-column field="asesor" title="Asesor" [width]="200">
  </kendo-grid-column>
  <kendo-grid-column
    field="fechaRecibido"
    title="FechaUltimoMensaje"
    [width]="100"
  >
  </kendo-grid-column>
  <kendo-grid-column field="centroCosto" title="Centro Costo" [width]="200">
  </kendo-grid-column>

  <kendo-grid-command-column title="" [width]="150">
    <ng-template
      kendoGridCellTemplate
      let-isNew="isNew"
      let-dataItem="dataItem"
      let-rowindex="rowindex"
    >
      <div class="w-100 d-flex justify-content-center">
        <button kendoButton class="botonWhats" (click)="verSms(dataItem)">
          <img src="../../../../../../assets/img/sms-icon.png" />
        </button>
      </div>
    </ng-template> </kendo-grid-command-column
></kendo-grid>
