<meta charset="utf-8">

<ng-template #modalEnvioPrueba>
  <div
    class="modal-header custom-modal-header"
    style="
      height: 60px;
      color: white;
      background-color: #374441;
      width: 1200px;
    "
  >
    Ingrese Numero para la prueba
  </div>

  <div class="custom-container" style="padding: 50px">
    <div class="custom-row justify-content-center">
      <div class="col-md-6">
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label
            class="col-md-4 col-form-label text-right custom-label"
            style="margin-top: 15px"
          >
            Numero
          </label>
          <div class="col-md-8">
            <mat-form-field appearance="outline" class="w-100">
              <input
                matInput
                placeholder="Nombre de campaña general"
                [(ngModel)]="numeroPrueba"
              />
            </mat-form-field>
          </div>
        </div>
        <div class="form-group custom-row justify-content-center">
          <button
            mat-button
            class="btn custom-buttonCa"
            (click)="Prueba()"          >
            Mandar Prueba
          </button>
        </div>
      </div>
    </div>
  </div>
</ng-template>

<mat-tab-group>
  <mat-tab label="Plantilla">
    <ng-container *ngIf="loader == true">
      <div class="loading-indicator">
        <mat-progress-spinner
          mode="indeterminate"
          color="accent"
        ></mat-progress-spinner>
      </div>
    </ng-container>
    
    <div class="contenedor scroll-container">
      <div class="titulo">
        <h3>Plantilla</h3>
       
      </div>

      <div class="titulo">
        <h3>Configuracion Principal</h3>
      </div>

      <div class="contenedor">
        <div class="plantilla">
          <div class="row justify-content-center">
            <div class="col-md-10">
              <div class="form-group row">
                <label class="col-md-4 col-form-label text-right"
                  >Nombre Plantilla</label
                >
                <div class="col-md-8">
                  <mat-form-field appearance="outline" class="w-100">
                    <input matInput [(ngModel)]="nombrePlantilla" />
                  </mat-form-field>
                </div>
              </div>
            </div>
            <ng-containter *ngIf="valor == false">
              <button
                mat-flat-button
                class="registrar"
                (click)="InsertarPlantilla()"
              >
                Guardar
              </button>
            </ng-containter>
            <ng-containter *ngIf="valor == true">
              <button
                mat-flat-button
                class="registrar"
                (click)="PruebaEnvio()"
              >
                Enviar Prueba
              </button>
            </ng-containter>
          </div>
        </div>
        <ng-containter *ngIf="valor == true">
          <div class="titulo">
            <h3>Configuracion Plantilla</h3>
          </div>
          <div class="contenedorTotal">
            <div class="plantillaC">
              <div class="row justify-content-center">
                <div class="col-md-10">
                  <div class="col-md-8">
                    <div class="form-group row">
                      <label class="col-md-4 col-form-label text-right">Texto</label>
                      <div class="col-md-8">
                        <mat-form-field appearance="outline" class="w-100">
                          <textarea matInput [(ngModel)]="text" style="white-space: pre-wrap;" rows="4" (input)="contarPalabras()"></textarea>
                        </mat-form-field>
                        <div class="text-right mt-2" style="text-align:right; margin-bottom:5px">
                          <div>{{ wordCount }} palabras</div>
                        </div>
                      </div>                     
                    </div>
                  </div>
                  
                  <div class="col-md-10">
                    <div class="form-group row">
                      <label class="col-md-10 col-form-label text-right"
                        >Etiqueta para el nombre del alumno: [alumno]</label
                      >
                    </div>
                  </div>
                  <div class="col-md-10" style="margin-top: 15px">
                    <div class="form-group row">
                      <label class="col-md-6 col-form-label text-right"
                        >Premium</label
                      >
                      <div class="col-md-4">
                        <mat-slide-toggle
                          [(ngModel)]="isPremium"
                        ></mat-slide-toggle>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-10" style="margin-top: 15px">
                    <div class="form-group row">
                      <label class="col-md-6 col-form-label text-right"
                        >Mensaje Flash</label
                      >
                      <div class="col-md-4">
                        <mat-slide-toggle
                          [(ngModel)]="isFlash"
                        ></mat-slide-toggle>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-10" style="margin-top: 15px">
                    <div class="form-group row">
                      <label class="col-md-6 col-form-label text-right"
                        >Mas de 160 caracteres?</label
                      >
                      <div class="col-md-4">
                        <mat-slide-toggle
                          [(ngModel)]="isLongmessage"
                        ></mat-slide-toggle>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-10" style="margin-top: 15px">
                    <div class="form-group row">
                      <label class="col-md-6 col-form-label text-right"
                        >Incluira url??</label
                      >
                      <div class="col-md-4">
                        <mat-slide-toggle
                          [(ngModel)]="shortUrlConfig"
                        ></mat-slide-toggle>
                      </div>
                    </div>
                  </div>
                  <ng-container *ngIf="shortUrlConfig == true">
                    <div class="col-md-8" style="margin-top: 15px">
                      <div class="form-group row">
                        <label class="col-md-4 col-form-label text-right"
                          >Url</label
                        >
                        <div class="col-md-8">
                          <mat-form-field appearance="outline" class="w-100">
                            <input matInput [(ngModel)]="url" />
                          </mat-form-field>
                        </div>
                      </div>
                    </div>
                    <div class="col-md-10">
                      <div class="form-group row">
                        <label class="col-md-10 col-form-label text-right"
                          >Etiqueta para la url: [SHORTURL]</label
                        >
                      </div>
                    </div>
                  </ng-container>
                </div>
              </div>
            </div>
            <div class="plantillaB">
              <div class="phone">
                <div class="screen">
                  <div class="message">
                    <div class="sender">Ejemplo</div>
                    <div style="white-space: pre-line;">{{ text }}</div>
                  </div>
                </div>
              </div>
            </div>
            
          </div>

          <ng-containter *ngIf="actualizar == false">
            <button
              mat-flat-button
              class="registrar"
              (click)="InsertarDetallePlantilla()"
            >
              Guardar
            </button>
          </ng-containter>
          <ng-containter *ngIf="actualizar == true">
            <button
              mat-flat-button
              class="registrar"
              (click)="ActualizarPlantilla()"
            >
              Actualizar
            </button>
          </ng-containter>
        </ng-containter>
      </div>
    </div>
  </mat-tab>
  <mat-tab label="Generar Url">
    <!-- <app-configuracion-plantilla [filteredItems]="filteredItems" [filteredItemsLeng]="filteredItems.length"></app-configuracion-plantilla> -->

    <div class="titulo">
      <h3>Generar Url</h3>
    </div>

    <div class="container" style="padding: 50px">
      <div class="row justify-content-center">
        <div class="col-md-10">
          <div class="form-group row">
            <label class="col-md-3 col-form-label text-right"
              >Nombre Formulario</label
            >
            <div class="col-md-9">
              <mat-form-field appearance="outline" class="w-100">
                <input matInput [(ngModel)]="nombreFormulario" />
              </mat-form-field>
            </div>
          </div>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-10">
          <div class="form-group row">
            <label class="col-md-3 col-form-label text-right">
              Centro de Costo
            </label>

            <div class="col-md-8">
              <kendo-dropdownlist
                [data]="listaCentroCosto"
                [kendoDropDownFilter]="filterSettings"
                textField="nombre"
                valueField="id"
                (selectionChange)="selectionChangeCentro($event)"
                [(ngModel)]="idCentroCosto"
                [valuePrimitive]="true"
              >
              </kendo-dropdownlist>
            </div>
          </div>
        </div>
      </div>

      <ng-container *ngIf="generado == true">
        <div class="row justify-content-center">
          <div class="col-md-10">
            <div class="form-group row">
              <label class="col-md-3 col-form-label text-right"
                >Url Generada</label
              >
              <div class="col-md-8">
                <mat-form-field appearance="outline" class="w-100">
                  <input matInput [(ngModel)]="urlGenerada" readonly />
                </mat-form-field>
              </div>
            </div>
          </div>
        </div>
      </ng-container>
      <button mat-flat-button class="registrar" (click)="generarUrl()">
        Generar
      </button>
    </div>
  </mat-tab>
</mat-tab-group>
