<ng-container *ngIf="loader == true">
    <div class="loading-indicator">
      <mat-progress-spinner
        mode="indeterminate"
        color="accent"
      ></mat-progress-spinner>
    </div>
  </ng-container>
  <div class="titulo">Campañas Masivas de Sms</div>
  <div class="ContenedorTotal">
    <div class="contenedorCampania" style="padding: 50px">
      <div class="row justify-content-center">
        <div style="display: flex; align-items: center">
          <div style="text-align: right; margin-right: 4px; width: 50%">
            <label
              class="col-md-4 col-form-label text-right"
              style="text-align: right"
            >
              Nombre de campaña general:
            </label>
          </div>
          <div
            style="flex: 1; display: flex; align-items: center; margin-left: 4px"
          >
            <mat-form-field
              appearance="outline"
              style="width: 390px; padding: 4px"
            >
              <input
                matInput
                placeholder="Nombre de campaña general"
                [(ngModel)]="nombreCampania"
              />
            </mat-form-field>
          </div>
        </div>
      </div>
  
      <div class="row justify-content-center">
        <div style="display: flex; align-items: center">
          <div style="text-align: right; margin-right: 4px; width: 50%">
            <label
              class="col-md-4 col-form-label text-right"
              style="text-align: right"
            >
              Fecha Inicio envío :
            </label>
          </div>
          <div
            style="flex: 1; display: flex; align-items: center; margin-left: 4px"
          >
            <mat-form-field appearance="outline" style="width: 390px">
              <input
                matInput
                [matDatepicker]="picker2"
                placeholder="Fecha inicio envío"
                [(ngModel)]="fechaInicioEnvio"
              />
              <mat-datepicker-toggle
                matSuffix
                [for]="picker2"
              ></mat-datepicker-toggle>
              <mat-datepicker #picker2></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
      </div>
  
      <div class="row justify-content-center">
        <div style="display: flex; align-items: center">
          <div style="text-align: right; margin-right: 4px; width: 50%">
            <label
              class="col-md-4 col-form-label text-right"
              style="text-align: right"
            >
              Hora envío :
            </label>
          </div>
          <div
            style="flex: 1; display: flex; align-items: center; margin-left: 4px"
          >
            <mat-form-field appearance="outline" style="width: 390px">
              <input
                matInput
                maxlength="8"
                placeholder="Hora de envío"
                [(ngModel)]="horaEnvio"
              />
            </mat-form-field>
          </div>
        </div>
      </div>
  
      <div class="row justify-content-center">
        <div class="col-md-6 text-center">
          <button class="btn but" (click)="Modificar()">Modificar</button>
        </div>
      </div>
    </div>
  
    <div style="padding: 50px" class="contenedorGrilla">
      <mat-tab-group>
        <mat-tab label="Campañas Masivas">
          <div class="card-body p-4">
            <div class="row d-flex justify-content-center mb-4">
              <kendo-grid
                [kendoGridBinding]="this.listaPrioridades"
                kendoGridSelectBy="id"
                [sortable]="true"
                [reorderable]="true"
                [resizable]="true"
                [filterable]="true"
                [columnMenu]="{ filter: true }"
                [class]="'cellCustomClass'"
                id="my-grid"
                [headerClass]="'headerPrioridades'"
                [pageable]="true"
                [pageSize]="20"
              >
                <ng-template kendoGridToolbarTemplate>
                  <div class="opciones" style="bottom: -12px; right: 20px">
                    <div class="example-wrapper sen" (click)="abrirPrioridades()">
                      Base Modulo
                      <span
                        style="margin-left: 10px"
                        class="k-icon k-i-plus-circle"
                      ></span>
                    </div>
                    <div class="example-wrapper exc" (click)="crearExcel()">
                      Importar Excel
                      <span
                        style="margin-left: 10px"
                        class="k-icon k-i-plus-circle"
                      ></span>
                    </div>
                  </div>
                </ng-template>
                <kendo-grid-column
                  field="nombreCampaniaOrigen"
                  title="Nombre Campaña"
                  [width]="200"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="prioridad"
                  title="Prioridad"
                  [width]="50"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
  
                <kendo-grid-column
                  field="nombre"
                  title="Nombre Prioridad"
                  [width]="200"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
  
                <kendo-grid-column
                  [headerClass]="'headerPrioridades'"
                  title="Activar Masivo"
                  [width]="50"
                >
                  <ng-template kendoGridCellTemplate let-dataItem>
                    <label class="switch">
                      <input
                        type="checkbox"
                        [checked]="dataItem.activarMasivo"
                        [ngModel]="dataItem.activarMasivo"
                        (ngModelChange)="toggleActivarMasivo($event, dataItem)"
                      />
                      <span class="slider round"></span>
                    </label>
                  </ng-template>
                </kendo-grid-column>
                <kendo-grid-column
                  field="cantidadBase"
                  title="Cantidad por Filtro"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="programados"
                  title="Programados"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="enviados"
                  title="Enviados"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
  
                <kendo-grid-command-column
                  title=""
                  [width]="150"
                  [headerClass]="'headerPrioridades'"
                >
                  <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                    <button
                      kendoButton
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1 editW"
                      container="body"
                      placement="top"
                      ngbTooltip="Faccionar"
                      (click)="editar(dataItem)"
                    >
                      <span class="k-icon k-i-edit"></span>
                    </button>
                    <button
                      kendoButton
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1 detalW"
                      container="body"
                      placement="top"
                      ngbTooltip="Faccionar"
                      (click)="Detalle(dataItem)"
                    >
                      <span class="k-icon k-i-rows k-icon-20"></span>
                    </button>
                    <button
                      kendoButton
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1 deleteW"
                      container="body"
                      placement="top"
                      ngbTooltip="Eliminar"
                      (click)="Eliminar(dataItem)"
                      [disabled]="dataItem.enviados > 0"
                      [ngClass]="{ 'disabled-button': dataItem.enviados > 0 }"
                    >
                      <span class="k-icon k-i-delete k-icon-20"></span>
                    </button>
                  </ng-template> </kendo-grid-command-column
              ></kendo-grid>
            </div>
          </div>
        </mat-tab>
