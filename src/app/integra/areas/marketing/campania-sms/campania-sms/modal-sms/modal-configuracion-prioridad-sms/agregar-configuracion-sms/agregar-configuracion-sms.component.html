<ng-container *ngIf="loading == true">
    <div class="loading-indicator">
      <mat-progress-spinner
        mode="indeterminate"
        color="accent"
      ></mat-progress-spinner>
    </div>
  </ng-container>
  <div
  class="modal-header custom-modal-header"
  style="height: 60px; color: white; background-color: #374441"
  >
  Agregar Configuracion por Prioridad
  </div>
  
  <div class="custom-container contenedorAzul" style="padding: 50px">
    <div class="custom-row justify-content-center">
      <div class="col-md-6">
  
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label
            class="col-md-4 col-form-label text-right custom-label"
            style="margin-top: 15px"
          >
            Asesor:
          </label>
          <div class="col-md-8">
            <kendo-dropdownlist
              [data]="listaAsesor"
              [kendoDropDownFilter]="filterSettings"
              textField="nombre"
              valueField="id"
              (selectionChange)="selectionChangeAsesor($event)"
              [(ngModel)]="idAsesor"
              [valuePrimitive]="true"
            >
            </kendo-dropdownlist>
         
          </div>
        </div>
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label
            class="col-md-4 col-form-label text-right custom-label"
            style="margin-top: 15px"
          >
            Plantilla
          </label>
          <div class="col-md-8">
            <kendo-dropdownlist
              [data]="listaPlantilla"
              [kendoDropDownFilter]="filterSettings"
              textField="nombre"
              valueField="id"
              (selectionChange)="selectionChangePlantilla($event)"
              [(ngModel)]="idPlantilla"
              [valuePrimitive]="true"
  
            >
            </kendo-dropdownlist>
         
          </div>
        </div>

  
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label
            class="col-md-4 col-form-label text-right custom-label"
            style="margin-top: 15px"
          >
            Centro de Costo
          </label>
          <div class="col-md-8">
            <kendo-dropdownlist
              [data]="listaCentroCosto"
              [kendoDropDownFilter]="filterSettings"
              textField="nombre"
              valueField="idCentroCosto"
              (selectionChange)="selectionChangeCentro($event)"
              [(ngModel)]="idCentroCosto"
              [valuePrimitive]="true"
  
            >
            </kendo-dropdownlist>
         
          </div>
        </div>
       
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label class="col-md-4 col-form-label text-right custom-label" style="margin-top: 15px">
            Cantidad:
          </label>
          <div class="col-md-8">
            <mat-form-field appearance="outline" class="w-100">
              <input matInput placeholder="Cantidad" [(ngModel)]="cantidad" />
            </mat-form-field>
          </div>
        </div>
        <div class="form-group custom-row justify-content-center">
          <button mat-button class="btn custom-buttonC" (click)="Agregar()">Agregar</button>
          <button mat-button class="btn custom-buttonCa" (click)="Cancelar()">Cancelar</button>
        </div>
      </div>
    </div>
    
  </div>
