<div
  class="modal-header custom-modal-header"
  style="height: 60px; color: white; background-color: #374441"
>
  Agregar Prioridad por Excel
</div>

<div style="padding: 50px">
  <div class="custom-container" style="padding: 50px">
    <div class="custom-row justify-content-center">
      <div class="col-md-6">
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label
            class="col-md-4 col-form-label text-right custom-label"
            style="margin-top: 15px"
          >
            Nombre de la Prioridad
          </label>
          <div class="col-md-8">
            <mat-form-field appearance="outline" class="w-100">
              <input
                matInput
                placeholder="Nombre de campaña general"
                [(ngModel)]="nombrePrioridadExcel"
              />
            </mat-form-field>
          </div>
        </div>
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label
            class="col-md-4 col-form-label text-right custom-label"
            style="margin-top: 15px"
          >
            Prioridad
          </label>
          <div class="col-md-8">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Seleccione una prioridad</mat-label>
              <mat-select [(ngModel)]="numeroPrioridadExcel">
                <ng-container *ngFor="let item of prioridades">
                  <mat-option [value]="item.Id">{{ item.Nombre }}</mat-option>
                </ng-container>
              </mat-select>
            </mat-form-field>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="form-group custom-row justify-content-center">
    <button mat-button class="btn custom-buttonC" (click)="crearPrioridad()">
      Crear
    </button>
    <button mat-button class="btn custom-buttonCa" (click)="Cancelar()">
      Cancelar
    </button>
  </div>
</div>
