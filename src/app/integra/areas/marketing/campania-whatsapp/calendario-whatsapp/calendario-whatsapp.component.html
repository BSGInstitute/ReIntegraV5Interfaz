<div class="calendar-form-container">
  <form [formGroup]="calendarForm">
    <div class="row">
      <div class="col-auto">
        <div class="date-range-options">
          <mat-radio-group
            aria-label="Select a date range"
            formControlName="dateRangeOption"
          >
            <mat-radio-button value="Hoy">Hoy</mat-radio-button>
            <mat-radio-button value="Ayer">Ayer</mat-radio-button>
            <mat-radio-button value="Últimos 7 días"
              >Últimos 7 días</mat-radio-button
            >
            <mat-radio-button value="Últimos 14 días"
              >Últimos 14 días</mat-radio-button
            >
            <mat-radio-button value="Últimos 28 días"
              >Últimos 28 días</mat-radio-button
            >
            <mat-radio-button value="Últimos 30 días"
              >Últimos 30 días</mat-radio-button
            >
            <mat-radio-button value="Esta semana">Esta semana</mat-radio-button>
            <mat-radio-button value="La semana pasada"
              >La semana pasada</mat-radio-button
            >
            <mat-radio-button value="Este mes">Este mes</mat-radio-button>
            <mat-radio-button value="El mes pasado"
              >El mes pasado</mat-radio-button
            >
            <mat-radio-button value="Personalizado"
              >Personalizado</mat-radio-button
            >
          </mat-radio-group>
        </div>
      </div>
      <div class="col">
        <div class="row">
          <div class="col-12">
            <mat-form-field appearance="fill">
              <mat-label>Inicio</mat-label>
              <input
                matInput
                [matDatepicker]="startDatePicker"
                formControlName="startDate"
                [disabled]="!habilitarFechas"
              />
              <mat-datepicker-toggle
                matSuffix
                [for]="startDatePicker"
              ></mat-datepicker-toggle>
              <mat-datepicker #startDatePicker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <mat-form-field appearance="fill">
              <mat-label>Fin</mat-label>
              <input
                matInput
                [matDatepicker]="endDatePicker"
                formControlName="endDate"
                [disabled]="!habilitarFechas"
              />
              <mat-datepicker-toggle
                matSuffix
                [for]="endDatePicker"
              ></mat-datepicker-toggle>
              <mat-datepicker #endDatePicker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
        <div class="row">
          <p class="timezone-info">Las fechas se muestran en la Hora de Lima</p>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="form-actions">
        <button
          mat-button
          type="button"
          class="wm-btn-cancel"
          (click)="onCancel()"
        >
          Cancelar
        </button>
        <button
          mat-raised-button
          class="wm-btn-success"
          type="submit"
          (click)="onUpdate()"
        >
          Actualizar
        </button>
      </div>
    </div>
  </form>
</div>
