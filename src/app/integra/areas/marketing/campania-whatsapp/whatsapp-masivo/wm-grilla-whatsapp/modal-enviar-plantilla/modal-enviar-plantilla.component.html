<ng-container *ngIf="loader == true">
  <div class="loading-indicator">
    <mat-progress-spinner
      mode="indeterminate"
      color="accent"
    ></mat-progress-spinner>
  </div>
</ng-container>

<div class="modal-title">Plantilla</div>

<div class="contenedorCampania">
  <div class="row justify-content-center mb-4">
    <div class="flex-row">
      <div class="flex-label">
        <label class="col-form-label">Plantilla del masivo:</label>
      </div>
      <div class="flex-input">
        <kendo-dropdownlist
          [data]="listaPlantilla"
          [kendoDropDownFilter]="filterSettings"
          textField="nombre"
          valueField="id"
          (selectionChange)="selectionChangePlantilla($event)"
          [(ngModel)]="idPlantilla"
          [valuePrimitive]="true"
          class="kendo-input"
        >
        </kendo-dropdownlist>
      </div>
    </div>
  </div>

  <div class="row justify-content-center mb-4">
    <div class="flex-row">
      <div class="flex-label">
        <label class="col-form-label">Centro de Costo:</label>
      </div>
      <div class="flex-input">
        <kendo-dropdownlist
          [data]="listaCentroCosto"
          [kendoDropDownFilter]="filterSettings"
          textField="nombre"
          valueField="idCentroCosto"
          (selectionChange)="selectionChangeCentroCosto($event)"
          [(ngModel)]="idCentroCosto"
          [valuePrimitive]="true"
          class="kendo-input"
        >
        </kendo-dropdownlist>
      </div>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <button
        [disabled]="!idPlantilla || !idCentroCosto"
        class="btn sendButton"
        (click)="Enviar()"
      >
        Enviar
      </button>
    </div>
  </div>
</div>
