<div
  *ngIf="count < data.length"
  class="d-flex justify-content-center align-items-center"
  style="height: 300px"
>
  <kendo-loader type="converging-spinner" themeColor="primary"></kendo-loader>
</div>

<div *ngIf="count >= data.length">
  <div
    class="text-white text-center py-2 px-0 fs-6 mb-3"
    style="background-color: #008069"
  >
    Marcar Mensajes
  </div>

  <kendo-grid
    [kendoGridBinding]="historialAlumno"
    [loading]="loadingHistorialAlumno"
    [sortable]="true"
    [resizable]="true"
    scrollable="scrollable"
    style="max-height: 500px"
    [style.width.%]="100"
  >
    <kendo-grid-column
      field="idAlumno"
      title="Id Alumno"
      [width]="80"
      headerClass="wm-header-grid"
    >
    </kendo-grid-column>
    <kendo-grid-column
      field="nombre"
      title="Cliente"
      [width]="100"
      headerClass="wm-header-grid"
    >
    </kendo-grid-column>
    <kendo-grid-column
      field="celular"
      title="Celular"
      [width]="80"
      headerClass="wm-header-grid"
    >
    </kendo-grid-column>
    <kendo-grid-column
      field="mensaje"
      title="Ultimo Mensaje"
      [width]="150"
      headerClass="wm-header-grid"
    >
    </kendo-grid-column>
    <kendo-grid-column
      field="chatOportunidad"
      title="Oportunidad"
      [width]="120"
      headerClass="wm-header-grid"
    >
      <ng-template kendoGridCellTemplate let-dataItem let-rowIndex="rowIndex">
        <div class="row justify-content-center">
          <button
            kendoButton
            themeColor="tertiary"
            fillMode="solid"
            rounded="full"
            class="mx-1 col-auto"
            icon="minus"
            (click)="DescontarO(dataItem, rowIndex)"
          ></button>
          <div class="col-auto text-center cellHistorial mx-2">
            {{ dataItem.chatOportunidad }}
          </div>
          <button
            kendoButton
            themeColor="tertiary"
            fillMode="solid"
            rounded="full"
            class="mx-1 col-auto"
            icon="plus"
            (click)="ContadorO(dataItem, rowIndex)"
          ></button>
        </div>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="chatValido"
      title="Chat Valido"
      [width]="120"
      headerClass="wm-header-grid"
    >
      <ng-template kendoGridCellTemplate let-dataItem let-rowIndex="rowIndex">
        <div class="row justify-content-center">
          <button
            kendoButton
            themeColor="tertiary"
            fillMode="solid"
            rounded="full"
            class="mx-1 col-auto"
            icon="minus"
            (click)="DescontarV(dataItem, rowIndex)"
          ></button>
          <div class="col-auto text-center cellHistorial mx-2">
            {{ dataItem.chatValido }}
          </div>
          <button
            kendoButton
            themeColor="tertiary"
            fillMode="solid"
            rounded="full"
            class="mx-1 col-auto"
            icon="plus"
            (click)="ContadorV(dataItem, rowIndex)"
          ></button>
        </div>
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column
      field="chatInValido"
      title="Chat Invalido"
      [width]="120"
      headerClass="wm-header-grid"
    >
      <ng-template kendoGridCellTemplate let-dataItem let-rowIndex="rowIndex">
        <div class="row justify-content-center">
          <button
            kendoButton
            themeColor="tertiary"
            fillMode="solid"
            rounded="full"
            class="mx-1 col-auto"
            icon="minus"
            (click)="DescontarI(dataItem, rowIndex)"
          ></button>
          <div class="col-auto text-center cellHistorial mx-2">
            {{ dataItem.chatInValido }}
          </div>
          <button
            kendoButton
            themeColor="tertiary"
            fillMode="solid"
            rounded="full"
            class="mx-1 col-auto"
            icon="plus"
            (click)="ContadorI(dataItem, rowIndex)"
          ></button>
        </div>
      </ng-template>
    </kendo-grid-column>
  </kendo-grid>
</div>
