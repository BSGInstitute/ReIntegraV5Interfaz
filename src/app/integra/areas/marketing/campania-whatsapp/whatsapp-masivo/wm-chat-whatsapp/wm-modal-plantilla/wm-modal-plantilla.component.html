<ng-container *ngIf="loader == true">
  <div class="loading-indicator">
    <mat-progress-spinner mode="indeterminate" color="accent"></mat-progress-spinner>
  </div>
</ng-container>


<div class="modal-whatsapp">
  <div class="contenedor-superior">
    <div class="text-titulo-modal">Plantilla</div>
  </div>
</div>

<div class="contenedorCampania">
  <div class="row justify-content-center mb-20">
    <div class="flex-row">
      <div class="flex-label">
        <label class="col-form-label">Plantilla del masivo:</label>
      </div>
      <div class="flex-input">
        <kendo-dropdownlist
          [data]="listaPlantilla"
          [kendoDropDownFilter]="filterSettings"
          textField="nombre"
          valueField="id"
          (selectionChange)="selectionChangePlantilla($event)"
          [(ngModel)]="idPlantilla"
          [valuePrimitive]="true"
          class="max-width-390">
        </kendo-dropdownlist>
      </div>
    </div>
  </div>

  <div class="row justify-content-center mb-20">
    <div class="flex-row">
      <div class="flex-label">
        <label class="col-form-label">Centro de Costo:</label>
      </div>
      <div class="flex-input">
        <kendo-dropdownlist
          [data]="listaCentroCosto"
          [kendoDropDownFilter]="filterSettings"
          textField="nombre"
          valueField="idCentroCosto"
          (selectionChange)="selectionChangeCentroCosto($event)"
          [(ngModel)]="idCentroCosto"
          [valuePrimitive]="true"
          class="max-width-390">
        </kendo-dropdownlist>
      </div>
    </div>
  </div>

  <div class="row justify-content-center mb-20">
    <div class="flex-row">
      <div class="flex-label">
        <label class="col-form-label">Celular:</label>
      </div>
      <div class="flex-input">
        <mat-form-field appearance="outline" class="max-width-390">
          <input matInput placeholder="Número celular" [(ngModel)]="celular"/>
        </mat-form-field>
      </div>
    </div>
  </div>

  <div class="row justify-content-center mb-20">
    <div class="flex-row">
      <div class="flex-label">
        <label class="col-form-label">Celular Empresa:</label>
      </div>
      <div class="flex-input">
        <kendo-dropdownlist class="max-width-390"
          [data]="listaPais"
          [kendoDropDownFilter]="filterSettings"
          textField="nombrePais"
          valueField="idPais"
          (selectionChange)="selectionChangePais($event)"
          [(ngModel)]="idPais"
          [valuePrimitive]="true">
        </kendo-dropdownlist>
      </div>
    </div>
  </div>

  <div class="row justify-content-center mb-20">
    <div class="flex-row">
      <div class="flex-label">
        <label class="col-form-label">IdAlumno:</label>
      </div>
      <div class="flex-input">
        <kendo-dropdownlist
          [data]="listaIdAlumnos"
          [kendoDropDownFilter]="filterSettings"
          textField="nombre"
          valueField="id"
          (selectionChange)="selectionChangeIdAlumno($event)"
          [(ngModel)]="idAlumno"
          [valuePrimitive]="true"
          class="max-width-390">
        </kendo-dropdownlist>
      </div>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <button class="btn butEnviar" (click)="Enviar()">Enviar</button>
    </div>
  </div>
</div>
