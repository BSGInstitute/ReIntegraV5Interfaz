<div class="titulo">Campaña Remarketing General</div>

<div class="agregar">
  <button mat-flat-button class="botonAgregar" (click)="VerRendimiento()">
    Ver Rendimiento
  </button>
  <button mat-flat-button class="botonWhats" (click)="CrearNuevaCampania()">
    Nueva Campaña
  </button>
</div>

<div class="mat-elevation-z8">
  <ng-container *ngIf="isLoading">
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  </ng-container>
  <!-- <mat-progress-bar
    *ngIf="listaFiltroSegmento != undefined"
    mode="determinate"
  ></mat-progress-bar> -->
  <table mat-table [dataSource]="listadoRemarketingGeneral">
    <ng-container matColumnDef="nombre">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 800px; text-align: center"
      >
        Nombre Campaña
      </th>
      <td mat-cell *matCellDef="let element" style="text-align: center">
        {{ element.nombreCampania }}
      </td>
    </ng-container>

    <ng-container matColumnDef="usuarioCreacion">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 200px; text-align: center"
      >
        Tipo Campaña
      </th>
      <td mat-cell *matCellDef="let element" style="text-align: center">
        {{ element.tipoCampania }}
      </td>
    </ng-container>

    <ng-container matColumnDef="usuarioCreacion">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 200px; text-align: center"
      >
        Usuario Creacion
      </th>
      <td mat-cell *matCellDef="let element" style="text-align: center">
        {{ element.usuarioCreacion }}
      </td>
    </ng-container>

    <ng-container matColumnDef="usuarioModificacion">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 200px; text-align: center"
      >
        Fecha envio
      </th>
      <td mat-cell *matCellDef="let element" style="text-align: center">
        {{ element.fechaEnvio | date : "yyyy-MM-dd HH:mm:ss" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="fechaModificacion">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 400px; text-align: center"
      >
        Cantidad
      </th>
      <td mat-cell *matCellDef="let element" style="text-align: center">
        {{ element.cantidad }}
      </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 100px; text-align: center"
      >
        Acciones
      </th>
      <mat-cell *matCellDef="let row; let i = index">
        <button mat-button class="edit" (click)="VerDetalleCampania(row)">
          <!-- <i class="material-icons">edit</i> -->
        </button>
        <button mat-button class="edit" (click)="ActualizarCampania(row)">
          <i class="material-icons">edit</i>
        </button>
        <button mat-button class="delete" (click)="EliminarCampania(row)">
          <i class="material-icons">delete</i>
        </button>
      </mat-cell>
    </ng-container>

    <!-- <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr> -->
  </table>

  <!-- <mat-paginator [pageSizeOptions]="[20]" pageSize="20" showFirstLastButtons>
  </mat-paginator> -->
</div>
