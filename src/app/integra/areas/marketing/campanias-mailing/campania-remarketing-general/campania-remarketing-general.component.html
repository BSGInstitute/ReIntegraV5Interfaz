<div class="titulo">Campaña Remarketing General</div>

<div class="d-flex justify-content-end my-4">
  <button
    mat-flat-button
    class="boton"
    (click)="VerRendimiento()"
    [disabled]="selectedCampanias.length === 0"
  >
    Ver Rendimiento
  </button>
  <button mat-flat-button class="boton" (click)="CrearNuevaCampania()">
    Nueva Campaña
  </button>
</div>

<div class="mat-elevation-z8">
  <!-- Modal de Rendimiento de campañas -->
  <app-grafica-rendimiento
    *ngIf="showRendimientoModal"
    [selectedCampanias]="selectedCampanias"
    (close)="cerrarRendimientoModal()"
  ></app-grafica-rendimiento>

  <!-- Modal Detalle Campaña -->
  <app-detalle-campania
    *ngIf="showDetalleModal"
    [id]="detalleCampaniaId"
    (close)="cerrarDetalleModal()"
  ></app-detalle-campania>

  <!-- Tabla de campañas remarketing general -->
  <ng-container *ngIf="isLoading">
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  </ng-container>
  <table mat-table [dataSource]="listadoRemarketingGeneral">
    <ng-container matColumnDef="select">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 40px; text-align: center"
      >
        <mat-checkbox
          (change)="$event ? masterToggle() : null"
          [checked]="isAllSelected()"
          [indeterminate]="selectedCampanias.length > 0 && !isAllSelected()"
        ></mat-checkbox>
      </th>
      <td
        mat-cell
        *matCellDef="let element"
        style="width: 40px; text-align: center"
      >
        <mat-checkbox
          (change)="toggleCampania(element.id, $event.checked)"
          [checked]="selectedCampanias.includes(element.id)"
        ></mat-checkbox>
      </td>
    </ng-container>
    <ng-container matColumnDef="id">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 40px; text-align: center"
      >
        ID
      </th>
      <td
        mat-cell
        *matCellDef="let element"
        style="width: 40px; text-align: center"
      >
        {{ element.id }}
      </td>
    </ng-container>

    <ng-container matColumnDef="nombreCampania">
      <th mat-header-cell *matHeaderCellDef style="text-align: center">
        Nombre Campaña
      </th>
      <td mat-cell *matCellDef="let element" style="text-align: center">
        {{ element.nombreCampania }}
      </td>
    </ng-container>

    <ng-container matColumnDef="tipoCampania">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 150px; text-align: center"
      >
        Tipo Campaña
      </th>
      <td
        mat-cell
        *matCellDef="let element"
        style="width: 150px; text-align: center"
      >
        {{ element.tipoCampania }}
      </td>
    </ng-container>

    <ng-container matColumnDef="usuarioCreacion">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 150px; text-align: center"
      >
        Usuario Creación
      </th>
      <td
        mat-cell
        *matCellDef="let element"
        style="width: 150px; text-align: center"
      >
        {{ element.usuarioCreacion }}
      </td>
    </ng-container>

    <ng-container matColumnDef="fechaEnvio">
      <th mat-header-cell *matHeaderCellDef style="text-align: center">
        Fecha Envío
      </th>
      <td mat-cell *matCellDef="let element" style="text-align: center">
        {{ element.fechaEnvio | date : "yyyy-MM-dd HH:mm:ss" }}
      </td>
    </ng-container>

    <ng-container matColumnDef="cantidad">
      <th
        mat-header-cell
        *matHeaderCellDef
        style="width: 150px; text-align: center"
      >
        Cantidad
      </th>
      <td
        mat-cell
        *matCellDef="let element"
        style="width: 150px; text-align: center"
      >
        {{ element.cantidad }}
      </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let element">
        <button
          mat-raised-button
          class="actionButton bg-warning"
          (click)="VerDetalleCampania(element.id)"
        >
          <i class="material-icons">visibility</i>
        </button>
        <button
          mat-raised-button
          class="actionButton bg-primary"
          (click)="ActualizarCampania(element.id)"
        >
          <i class="material-icons">edit</i>
        </button>
        <button
          mat-raised-button
          class="actionButton bg-danger"
          (click)="EliminarCampania(element.id)"
        >
          <i class="material-icons">delete</i>
        </button>
      </td>
    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="[
        'select',
        'id',
        'nombreCampania',
        'tipoCampania',
        'usuarioCreacion',
        'fechaEnvio',
        'cantidad',
        'acciones'
      ]"
    ></tr>
    <tr
      mat-row
      *matRowDef="
        let row;
        columns: [
          'select',
          'id',
          'nombreCampania',
          'tipoCampania',
          'usuarioCreacion',
          'fechaEnvio',
          'cantidad',
          'acciones'
        ]
      "
    ></tr>
  </table>
</div>
