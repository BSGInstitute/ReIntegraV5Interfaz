<ng-container *ngIf="loading == true">
  <div class="loading-indicator">
    <mat-progress-spinner
      mode="indeterminate"
      color="accent"
    ></mat-progress-spinner>
  </div>
</ng-container>
<div
  class="modal-header titulo"
  style="height: 60px; background-color: #374441"
>
  Prioridades de Sendinblue
</div>

<div class="container" style="padding: 50px; width: 1400px">
  <div class="custom-container" style="padding: 50px">
    <div class="custom-row justify-content-center">
      <div class="col-md-6">
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label
            class="col-md-4 col-form-label text-right custom-label"
            style="margin-top: 15px"
            >Nombre de Prioridad :</label
          >
          <div class="col-md-8">
            <mat-form-field appearance="outline" class="w-100">
              <input
                matInput
                placeholder="Nombre de campaña general"
                [(ngModel)]="nombrePrioridadExcel"
              />
            </mat-form-field>
          </div>
        </div>
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label
            class="col-md-4 col-form-label text-right custom-label"
            style="margin-top: 15px"
          >
            Prioridad:</label
          >
          <div class="col-md-8">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Seleccione una prioridad</mat-label>
              <mat-select [(ngModel)]="numeroPrioridadExcel">
                <ng-container *ngFor="let item of prioridades">
                  <mat-option [value]="item.Id">{{ item.Nombre }}</mat-option>
                </ng-container>
              </mat-select>
            </mat-form-field>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="form-group row justify-content-center">
    <button mat-button class="btn but" (click)="Modificar()">Modificar</button>
  </div>
</div>

<div class="container contenedorTabla">
  <div class="form-group custom-row" style="margin-bottom: 30px">
    <label
      class="col-md-4 col-form-label text-right custom-label"
      style="margin-top: 15px"
      >Dias de Filtro :</label
    >
    <div class="col-md-8">
      <mat-form-field appearance="outline">
        <input matInput placeholder="Dias" [(ngModel)]="dias" />
      </mat-form-field>
    </div>
  </div>
  <div class="card-body p-4">
    <div class="excc">
      <button
        mat-button
        class="btn butEx"
        type="button"
        (click)="onFileInputClick()"
      >
        Selecciona archivo Excel
        <span class="k-icon k-i-file-excel"></span>
      </button>
      <input
        #fileInput
        class="ng-hide"
        id="input-file-id"
        multiple
        type="file"
        (change)="onFileChange($event)"
        style="display: none"
      />
      <p>Recuerda Ingresar el Excel Solo con la columna IdAlumno</p>
    </div>
  </div>
</div>
