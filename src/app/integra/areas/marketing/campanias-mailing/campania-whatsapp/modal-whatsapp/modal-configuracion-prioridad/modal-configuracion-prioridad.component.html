<ng-container *ngIf="loading == true">
  <div class="loading-indicator">
    <mat-progress-spinner
      mode="indeterminate"
      color="accent"
    ></mat-progress-spinner>
  </div>
</ng-container>

<div
  class="modal-header custom-modal-header"
  style="height: 60px; color: white; background-color: #374441"
>
  Agregar Configuracion por Prioridad
</div>
<div class="contenedorAzul">
  <div class="custom-container" style="padding: 50px">
    <div class="custom-row justify-content-center">
      <div class="col-md-6">
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label
            class="col-md-4 col-form-label text-right custom-label"
            style="margin-top: 15px"
          >
            Cantidad de contactos
          </label>
          <div class="col-md-8">
            <mat-form-field appearance="outline" class="w-100">
              <input
                matInput
                placeholder="Cantidad de Contactos"
                [(ngModel)]="cantidadContactos"
                readonly
              />
            </mat-form-field>
          </div>
        </div>
        <div class="form-group custom-row" style="margin-bottom: 30px">
          <label
            class="col-md-4 col-form-label text-right custom-label"
            style="margin-top: 15px"
          >
          Cantidad de contactos disponibles :
          </label>
          <div class="col-md-8">
            <mat-form-field appearance="outline" class="w-100">
              <input
                matInput
                placeholder="Cantidad de Contactos"
                [(ngModel)]="cantidadadContactos30"
              />
            </mat-form-field>
          </div>
        </div>
        <div class="form-group custom-row justify-content-center">
          <button mat-button class="btn custom-buttonC" (click)="Agregar()">
            Agregar
          </button>
        </div>
      </div>
    </div>
  </div>

  <div style="padding: 50px">
    <div class="card-body p-4">
      <div class="row d-flex justify-content-center mb-4">
        <kendo-grid
          [kendoGridBinding]="listaGrilla"
          kendoGridSelectBy="id"
          [sortable]="true"
          [reorderable]="true"
          [resizable]="true"
          [filterable]="true"
          [columnMenu]="{ filter: true }"
          [class]="'cellCustomClass'"
          id="my-grid"
          [headerClass]="'headerPrioridades'"
          [pageable]="true"
          [pageSize]="20"
        >
          <kendo-grid-column
            field="asesor"
            title="Asesor"
            [width]="200"
            [headerClass]="'headerPrioridades'"
          >
          </kendo-grid-column>
          <kendo-grid-column
            field="plantilla"
            title="Plantilla"
            [width]="200"
            [headerClass]="'headerPrioridades'"
          >
          </kendo-grid-column>

          <kendo-grid-column
            field="centroCosto"
            title="Centro de Costo"
            [width]="200"
            [headerClass]="'headerPrioridades'"
          >
          </kendo-grid-column>

          <kendo-grid-column
            field="cantidad"
            title="Cantidad"
            [width]="80"
            [headerClass]="'headerPrioridades'"
          >
          </kendo-grid-column>
          <kendo-grid-column
            field="enviados"
            title="Enviados"
            [width]="80"
            [headerClass]="'headerPrioridades'"
          >
          </kendo-grid-column>
          <kendo-grid-column
          field="alumnoConfigurado"
          title="Programados"
          [width]="80"
          [headerClass]="'headerPrioridades'"
        >
        </kendo-grid-column>
          <kendo-grid-command-column
            title=""
            [width]="150"
            [headerClass]="'headerPrioridades'"
          >
            <ng-template kendoGridCellTemplate let-dataItem="dataItem">
              <button
                kendoButton
                fillMode="solid"
                rounded="large" 
                size="large"
                class="p-2 me-1 ms-1 deleteW"
                container="body"
                placement="top"
                ngbTooltip="Eliminar"
                (click)="Eliminar(dataItem)"
              >
                <span class="k-icon k-i-delete k-icon-20"></span>
              </button>
            </ng-template> </kendo-grid-command-column
        ></kendo-grid>
      </div>
    </div>
  </div>
</div>
