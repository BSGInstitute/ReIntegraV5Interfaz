<div class="contenedor">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Filtro para consultas en Reporte LandingPage - Facebook</h3>
        </div>
        <div class="card-body p-4" id="grillaAgendaTab">
          <div class="row d-flex justify-content-center mb-4">
            <div class="col-8">
                <div class="card-body k-form k-form-horizontal">
                    <div class="row">
                      <div class="col-lg-6">
                        <kendo-formfield orientation="horizontal">
                          <label [for]="fechaInicioi" class="k-label">
                            Fecha Inicio:
                          </label>
                          <kendo-datepicker
                            #fechaInicioi
                            [formControl]="fechaInicio"
                            format="yyyy-MM-dd"
                          >
                          </kendo-datepicker>
                        </kendo-formfield>
                      </div>

                      <div class="col-lg-6">
                        <kendo-formfield orientation="horizontal">
                          <label [for]="fechaFini" class="k-label">
                            Fecha Fin:
                          </label>

                          <kendo-datepicker
                            #fechaFini
                            [formControl]="fechaFin"
                            format="yyyy-MM-dd"
                          >
                          </kendo-datepicker>
                        </kendo-formfield>
                      </div>
                    </div>


                </div>
                <div class="card-footer">
                  <div class="row">
                    <div class="col-12 d-flex justify-content-end">
                      <button
                      kendoButton

                      themeColor="primary"
                      icon="k-icon k-i-search k-icon-20"
                      type="button"
                      (click)="BuscarPorFiltro()"
                      >
                        Buscar

                      </button>
                    </div>
                  </div>
                </div>
            </div>
          </div>
        </div>
      </div>
    <br/>
</div>
<div class="">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Registros LandingPage - Facebook</h3>
        </div>
        <div class="card-body p-4">
          <div class="row">
            <div class="col">
              <kendo-grid

              [loading]="gridLandingPage.loading"
              [pageSize]="gridLandingPage.data.length"
              [sortable]="true"
              [filterable]="true"
              [pageable]="{
                buttonCount: 5,
                info: true,
                type: 'numeric',
                pageSizes: true,
                previousNext: true,
                position: 'bottom'
              }"
              [kendoGridBinding]="gridLandingPage.data"
              style="max-height: 700px"
              [loading]="gridLandingPage.loading"
              [resizable]="gridLandingPage.resizable"


              >
                <ng-template kendoGridToolbarTemplate>
                  <button
                    kendoButton
                    icon="reload"
                    fillMode="flat"
                    themeColor="secondary"
                    (click)="obtenerGrilalRegistroLandingPage()"
                  >
                </button>
                  <kendo-grid-spacer></kendo-grid-spacer>
                </ng-template>
                
                 <kendo-grid-column
                    title="Ver"
                    [width]="50"
                    headerClass="headerGridChat"
                    [filterable]="false"
                    [sortable]="false"
                  >
                    <ng-template kendoGridCellTemplate let-dataItem>
                      <button
                        *ngIf="dataItem.estadoOportunidad === 'Sin Definir'"
                        kendoButton
                        icon="k-icon k-i-eye"
                        fillMode="flat"
                        themeColor="primary"
                        size="small"
                        [title]="'Ver detalles del registro ' + dataItem.id"
                        class="btn-ver-registro"
                        (click)="abrirModalDetallesLead(dataItem.id)">
                      </button>
                    </ng-template>
                  </kendo-grid-column>
                
                
                <kendo-grid-column
                    field="id"
                    title="Id"
                    [width]="270"
                    headerClass="headerGridChat"

                  >
                  </kendo-grid-column>
                 
                  <kendo-grid-column
                    field="idAlumno"
                    title="Alumno"
                    [width]="270"
                    headerClass="headerGridChat"

                  >
                  </kendo-grid-column>

                  <kendo-grid-column
                  field="nombres"
                  title="Nombre"
                  [width]="270"
                  headerClass="headerGridChat"

                >
                </kendo-grid-column>

                    <kendo-grid-column
                    field="correo"
                    title="Correo"
                    [width]="270"
                    headerClass="headerGridChat"

                  >
                  </kendo-grid-column>


                  <kendo-grid-column

                  field="movil"
                  title="Movil"
                  [width]="270"
                  headerClass="headerGridChat"

                >
            </kendo-grid-column>
            <kendo-grid-column
            field="areaFormacion"
            title="Area Formacion"
            [width]="270"
            headerClass="headerGridChat"

          >
          </kendo-grid-column>

          <kendo-grid-column
          field="cargo"
          title="Cargo"
          [width]="270"
          headerClass="headerGridChat"

        >
        </kendo-grid-column>
        <kendo-grid-column
        field="areaTrabajo"
        title="Area Trabajo"
        [width]="270"
        headerClass="headerGridChat"

      >
          </kendo-grid-column>

          <kendo-grid-column
          field="industria"
          title="Industria"
          [width]="270"
          headerClass="headerGridChat"

        >
        </kendo-grid-column>

        <kendo-grid-column
        field="region"
        title="Region"
        [width]="270"
        headerClass="headerGridChat"

      >
          </kendo-grid-column>
          <kendo-grid-column
          field="fechaRegistro"
          title="Fecha Registro"
          [width]="270"
          headerClass="headerGridChat"

        >
        </kendo-grid-column>


        <kendo-grid-column
        field="horaRegistro"
        title="Hora Registro"
        [width]="270"
        headerClass="headerGridChat"

      >
      </kendo-grid-column>

          <kendo-grid-column
          field="nombrePrograma"
          title="Nombre Programa"
          [width]="270"
          headerClass="headerGridChat"

        >
        </kendo-grid-column>
          <kendo-grid-column
          field="centroCosto"
          title="Centro Costo"
          [width]="270"
          headerClass="headerGridChat"

        >
        </kendo-grid-column>

          <kendo-grid-column
          field="categoria"
          title="Categoria"
          [width]="270"
          headerClass="headerGridChat"

        >
        </kendo-grid-column>

            <kendo-grid-column
            field="campania"
            title="Campania"
            [width]="270"
            headerClass="headerGridChat"

          >
          </kendo-grid-column>



          <kendo-grid-column
          field="campaniaActualizada"
          title="Campaña Actualizada"
          [width]="270"
          headerClass="headerGridChat"

        >
        </kendo-grid-column>


            <kendo-grid-column
            field="procesado"
            title="Procesado"
            [width]="270"
            headerClass="headerGridChat"

          >
          </kendo-grid-column>

            <kendo-grid-column
            field="formulario"
            title="Formulario"
            [width]="270"
            headerClass="headerGridChat"

          >
          </kendo-grid-column>

            <kendo-grid-column
            field="estadoOportunidad"
            title="Estado OPortunidad"
            [width]="270"
            headerClass="headerGridChat"
          >
          </kendo-grid-column>


              </kendo-grid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
