<mat-sidenav-container class="example-container">
  <mat-sidenav
    mode="side"
    opened
    style="position: fixed; margin-top: 100px; height: 100%"
  >
    <div
      style="
        padding: 20px;
        margin-bottom: 70px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      "
    >
      <img src="../../../../../../assets/img/bsg.png" style="width: 80px" />
    </div>
    <button mat-flat-button (click)="seleccionado = 1" class="mes">
      <img
        src="../../../../../../assets/img/messenger.png"
        style="width: 50px"
      />
      <p>Messenger</p>
    </button>
    <button mat-flat-button (click)="seleccionado = 2" class="conf">
      <img
        src="../../../../../../assets/img/configuracion.png"
        style="width: 50px"
      />
      <p>Chatboot</p>
    </button>
  </mat-sidenav>
  <mat-sidenav-content style="min-height: 500px">
    <ng-containger *ngIf="seleccionado == 1">
      <mat-tab-group mat-stretch-tabs="false" mat-align-tabs="start">
        <mat-tab label="Respondidos">
          <div style="padding: 80px; background-color: rgb(228, 228, 228)">
            <div class="example-full-width w-100">
              <kendo-grid
                [kendoGridBinding]="listaChatMessenger"
                kendoGridSelectBy="id"
                [sortable]="true"
                [reorderable]="true"
                [resizable]="true"
                [filterable]="true"
                [columnMenu]="{ filter: true }"
                [class]="'cellCustomClass'"
                id="my-grid"
                [headerClass]="'headerPrioridades'"
                [pageable]="true"
                [pageSize]="20"
              >
                <kendo-grid-column
                  field="idAlumno"
                  title="IdAlumno"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>

                <kendo-grid-column
                  field="cliente"
                  title="Cliente"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>

                <kendo-grid-column
                  field="celular"
                  title="Celular"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="ultimoMensaje"
                  title="Ultimo Mensaje"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="asesor"
                  title="Asesor"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="fechaUltimoMensaje"
                  title="Fecha Ultimo Mensaje"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="centroCosto"
                  title="Centro Costo"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="estado"
                  title="Estado"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-command-column
                  title="Opciones"
                  [width]="150"
                  [headerClass]="'headerPrioridades'"
                >
                  <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                    <ng-container *ngIf="dataItem.idAlumno != 0">
                      <button
                        kendoButton
                        fillMode="solid"
                        rounded="large"
                        size="large"
                        class="p-2 me-1 ms-1 editW"
                        container="body"
                        placement="top"
                        ngbTooltip="Faccionar"
                        (click)="abrirModalCrearMessenger(false, dataItem)"
                      >
                        <img
                          src="../../../../../../assets/img/messenger.png"
                          style="width: 20px"
                        />
                      </button>
                    </ng-container>
                    <ng-container *ngIf="dataItem.idAlumno == 0">
                      <button
                        kendoButton
                        fillMode="solid"
                        rounded="large"
                        size="large"
                        class="p-2 me-1 ms-1 editW"
                        container="body"
                        placement="top"
                        ngbTooltip="Faccionar"
                        (click)="
                          abrirModalCrearMessengerAsociacion(false, dataItem)
                        "
                      >
                        <img
                          src="../../../../../../assets/img/messenger.png"
                          style="width: 20px"
                        />
                      </button>
                    </ng-container>
                  </ng-template>
                </kendo-grid-command-column>
              </kendo-grid>
            </div>
          </div>
        </mat-tab>
        <mat-tab label="Enviados">
          <div style="padding: 80px; background-color: rgb(228, 228, 228)">
            <div class="example-full-width w-100">
              <kendo-grid
                [kendoGridBinding]="listaChatMessenger"
                kendoGridSelectBy="id"
                [sortable]="true"
                [reorderable]="true"
                [resizable]="true"
                [filterable]="true"
                [columnMenu]="{ filter: true }"
                [class]="'cellCustomClass'"
                id="my-grid"
                [headerClass]="'headerPrioridades'"
                [pageable]="true"
                [pageSize]="20"
              >
                <kendo-grid-column
                  field="idAlumno"
                  title="IdAlumno"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>

                <kendo-grid-column
                  field="cliente"
                  title="Cliente"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>

                <kendo-grid-column
                  field="celular"
                  title="Celular"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="ultimoMensaje"
                  title="Ultimo Mensaje"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="asesor"
                  title="Asesor"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="fechaUltimoMensaje"
                  title="Fecha Ultimo Mensaje"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="centroCosto"
                  title="Centro Costo"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="estado"
                  title="Estado"
                  [width]="100"
                  [headerClass]="'headerPrioridades'"
                >
                </kendo-grid-column>
                <kendo-grid-command-column
                  title="Opciones"
                  [width]="150"
                  [headerClass]="'headerPrioridades'"
                >
                  <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                    <ng-container *ngIf="dataItem.alumno != 0">
                      <button
                        kendoButton
                        fillMode="solid"
                        rounded="large"
                        size="large"
                        class="p-2 me-1 ms-1 editW"
                        container="body"
                        placement="top"
                        ngbTooltip="Faccionar"
                        (click)="abrirModalCrearMessenger(false, dataItem)"
                      >
                        <img
                          src="../../../../../../assets/img/messenger.png"
                          style="width: 20px"
                        />
                      </button>
                    </ng-container>
                    <ng-container *ngIf="dataItem.alumno == 0">
                      <button
                        kendoButton
                        fillMode="solid"
                        rounded="large"
                        size="large"
                        class="p-2 me-1 ms-1 editW"
                        container="body"
                        placement="top"
                        ngbTooltip="Faccionar"
                        (click)="
                          abrirModalCrearMessengerAsociacion(false, dataItem)
                        "
                      >
                        <img
                          src="../../../../../../assets/img/messenger.png"
                          style="width: 20px"
                        />
                      </button>
                    </ng-container>
                  </ng-template>
                </kendo-grid-command-column>
              </kendo-grid>
            </div>
          </div>
        </mat-tab>
      </mat-tab-group>
    </ng-containger>
    <ng-container *ngIf="seleccionado == 2">
      <div style="padding: 80px; background-color: rgb(228, 228, 228)">
        <p>Este metodo todavia no esta implementado</p>
      </div>
    </ng-container>
    <ng-container *ngIf="seleccionado == 3">
      <app-modal-chat-messenger [envio]="chatPrueba"></app-modal-chat-messenger>
    </ng-container>
    <ng-container *ngIf="seleccionado == 4">
      <app-modal-chat-messenger-asociacion
        [envio]="chatPrueba"
      ></app-modal-chat-messenger-asociacion>
    </ng-container>
  </mat-sidenav-content>
</mat-sidenav-container>
