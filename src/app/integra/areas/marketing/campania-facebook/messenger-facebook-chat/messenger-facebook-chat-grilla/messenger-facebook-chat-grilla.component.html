<kendo-grid
  [data]="gridData"
  [sortable]="true"
  [sort]="sort"
  (sortChange)="onSortChange($event)"
  filterable="menu"
  [filter]="filter"
  (filterChange)="onFilterChange($event)"
  [loading]="loading"
>
  <!-- Contador de filas -->
  <kendo-grid-column title="#" [width]="50">
    <ng-template kendoGridCellTemplate let-rowIndex="rowIndex">
      {{ rowIndex + 1 }}
    </ng-template>
  </kendo-grid-column>

  <kendo-grid-column field="identificadorAmbitoPagina" title="Ámbito Página" [sortable]="true"></kendo-grid-column>
  <kendo-grid-column field="idAlumno" title="ID Alumno" [sortable]="true"></kendo-grid-column>
  <kendo-grid-column field="nombreAlumno" title="Nombre Alumno" [sortable]="true"></kendo-grid-column>
  <kendo-grid-column field="nombrePagina" title="Nombre Página" [sortable]="true"></kendo-grid-column>
  <kendo-grid-column field="contenido" title="Contenido" [sortable]="true">
    <ng-template kendoGridCellTemplate let-dataItem>
      <ng-container *ngIf="dataItem.tipoMensaje === 'text'; else adjunto">
        {{ dataItem.contenido }}
      </ng-container>
      <ng-template #adjunto>
        <span class="contenido-adjunto" *ngIf="dataItem.tipoMensaje === 'attachment'">Contenido Adjunto</span>
      </ng-template>
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column field="fechaMensaje" title="Fecha Mensaje" [sortable]="true">
    <ng-template kendoGridCellTemplate let-dataItem>
      {{ dataItem.fechaMensaje | date:'short' }}
    </ng-template>
  </kendo-grid-column>

  <!-- Botón de acción Chat -->
  <kendo-grid-column title="Acción" [width]="100">
    <ng-template kendoGridCellTemplate let-dataItem>
      <button kendoButton (click)="abrirChat(dataItem)">Chat</button>
    </ng-template>
  </kendo-grid-column>
</kendo-grid>
