<kendo-grid
  [data]="gridData"
  [sortable]="true"
  [sort]="sort"
  (sortChange)="onSortChange($event)"
  filterable="menu"
  [filter]="filter"
  (filterChange)="onFilterChange($event)"
  [loading]="loading"
>
  <!-- Contador de filas -->
  <kendo-grid-column title="#" [width]="50">
    <ng-template kendoGridCellTemplate let-rowIndex="rowIndex">
      {{ rowIndex + 1 }}
    </ng-template>
  </kendo-grid-column>

  <kendo-grid-column
    field="identificadorAmbitoPagina"
    title="Identificador Contacto"
    [sortable]="true"
    [width]="170"
  ></kendo-grid-column>
  <kendo-grid-column
    field="idAlumno"
    title="ID Alumno"
    [sortable]="true"
    [width]="160"
  ></kendo-grid-column>
  <kendo-grid-column
    field="nombreAlumno"
    title="Nombre Alumno"
    [sortable]="true"
    [width]="200"
  ></kendo-grid-column>
  <kendo-grid-column
    field="nombrePagina"
    title="Página Origen"
    [sortable]="true"
    [width]="180"
  ></kendo-grid-column>
  <kendo-grid-column field="contenido" title="Ultimo Mensaje" [sortable]="true">
    <ng-template kendoGridCellTemplate let-dataItem>
      <ng-container *ngIf="dataItem.tipoMensaje === 'text'; else adjunto">
        {{ dataItem.contenido }}
      </ng-container>
      <ng-template #adjunto>
        <span
          class="contenido-adjunto"
          *ngIf="dataItem.tipoMensaje === 'attachment'"
          >Contenido Adjunto</span
        >
      </ng-template>
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    field="fechaMensaje"
    title="Fecha Ultimo Mensaje"
    [sortable]="true"
    [width]="180"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      {{ dataItem.fechaMensaje | date : "short" }}
    </ng-template>
  </kendo-grid-column>

  <!-- Botón de acción Chat -->
  <kendo-grid-column title="Ver Chat" [width]="90" class="text-center">
    <ng-template kendoGridCellTemplate let-dataItem class="text-center">
      <button
        kendoButton
        (click)="abrirChat(dataItem)"
        style="background: transparent; border: none; padding: 0"
      >
        <img
          src="../../../../../../assets/img/messenger.png"
          alt="Chat"
          style="width: 32px; height: 32px"
          [ngClass]="{
            'btn-messenger-activo': dataItem.requiereDerivacion === true || dataItem.requiereDerivacion === null,
            'btn-messenger-inactivo': dataItem.requiereDerivacion === false
          }"
          class="btn-chat-img"
        />
      </button>
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    field="tipoMensajeDetectado"
    title="Tipo Mensaje"
    [sortable]="true"
    [width]="100"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      <span [ngClass]="getColorClaseTipoMensaje(dataItem.tipoMensajeDetectado)">
        {{ dataItem.tipoMensajeDetectado }}
      </span>
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    field="estadoInteraccion"
    title="Estado Interaccion"
    [sortable]="true"
    [width]="100"
  ></kendo-grid-column>
</kendo-grid>
