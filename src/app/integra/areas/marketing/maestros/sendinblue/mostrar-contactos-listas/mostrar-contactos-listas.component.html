<div class="titulo">
    Contactos de la lista
</div>

<div class="tabla">
    <div class="example-container mat-elevation-z8">
      <table mat-table [dataSource]="dataSource">
        <!-- Position Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef style="width:100px">Id</th>
          <td mat-cell *matCellDef="let element;let i=index">{{element.id}}</td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef style="width:400px">Nombre</th>
          <td mat-cell *matCellDef="let element">{{ element.attributes.FIRSTNAME }} {{ element.attributes.LASTNAME  }}</td>
        </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef style="width:400px">Correo</th>
            <td mat-cell *matCellDef="let element">{{ element.email }}</td>
          </ng-container>

          <ng-container matColumnDef="telefono">
            <th mat-header-cell *matHeaderCellDef style="width:400px">Telefono</th>
            <td mat-cell *matCellDef="let element">{{ element.attributes.SMS  }}</td>
          </ng-container>


        <!-- Weight Column -->

        <tr mat-header-row *matHeaderRowDef="displayedColumns;sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <mat-paginator
      [pageSizeOptions]="[20]"
      pageSize="20"
      [length]="Lengt"
      showFirstLastButtons
      (page)="Paginador($event)"
      >
      </mat-paginator>
    </div>
  </div>

  <div class="cerrar">
    <button class="cancelar" mat-dialog-close>Cerrar</button>
  </div>
