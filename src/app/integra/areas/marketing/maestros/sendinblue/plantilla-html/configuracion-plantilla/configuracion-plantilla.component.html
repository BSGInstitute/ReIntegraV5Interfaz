
      <div class="titulo">
        <h3>Generar Url</h3>
      </div>

      <div class="container" style="padding: 50px">

        <div class="row justify-content-center">
          <div class="col-md-10">
            <div class="form-group row">
              <label class="col-md-4 col-form-label text-right custom-label" style="margin-top: 15px">
                Url Plantilla
              </label>
        
              <div class="col-md-8">
                <kendo-multiselect
                  [data]="filteredItems"
                  [kendoDropDownFilter]="filterSettings"
                  textField="nombre"
                  valueField="etiqueta"
                  (valueChange)="selectionChangeUrl($event)"
                  [(ngModel)]="etiqueta"
                  [valuePrimitive]="true"
                >
                </kendo-multiselect>
              </div>
            </div>
          </div>
        </div>
        
        <div class="row justify-content-center">
          <div class="col-md-10">
            <div class="form-group row">
              <label class="col-md-4 col-form-label text-right"
                >Nombre Formulario</label
              >
              <div class="col-md-8">
                <mat-form-field appearance="outline" class="w-100">
                  <input matInput [(ngModel)]="nombreFormulario" />
                </mat-form-field>
              </div>
            </div>
          </div>
        </div>

        <div class="row justify-content-center">
          <div class="col-md-10">
            <div class="form-group row">
              <label
                class="col-md-4 col-form-label text-right custom-label"
                style="margin-top: 15px"
              >
                Programa General
              </label>

              <div class="col-md-8">
                <kendo-dropdownlist
                  [data]="listaPrograma"
                  [kendoDropDownFilter]="filterSettings"
                  textField="nombre"
                  valueField="id"
                  (selectionChange)="selectionChangePrograma($event)"
                  [(ngModel)]="idProgramaGeneral"
                  [valuePrimitive]="true"
                >
                </kendo-dropdownlist>
              </div>
            </div>
          </div>
        </div>
        <div class="row justify-content-center">
          <div class="col-md-10">
            <div class="form-group row">
              <label
                class="col-md-4 col-form-label text-right custom-label"
                style="margin-top: 15px"
              >
                Centro de Costo
              </label>

              <div class="col-md-8">
                <kendo-dropdownlist
                  [data]="filterListaCentroCosto"
                  [kendoDropDownFilter]="filterSettings"
                  textField="nombre"
                  valueField="idCentroCosto"
                  (selectionChange)="selectionChangeCentro($event)"
                  [(ngModel)]="idCentroCosto"
                  [valuePrimitive]="true"
                >
                </kendo-dropdownlist>
              </div>
            </div>
          </div>
        </div>

        <ng-container *ngIf="generado == true">
        <div class="row justify-content-center">
          <div class="col-md-10">
            <div class="form-group row">
              <label class="col-md-4 col-form-label text-right"
                >Url Generada</label
              >
              <div class="col-md-8">
                <mat-form-field appearance="outline" class="w-100">
                  <input matInput [(ngModel)]="urlGenerada" readonly/>
                </mat-form-field>
              </div>
            </div>
          </div>
        </div>
      </ng-container>
        <button mat-flat-button class="registrar" (click)="generarUrl()">
        Generar
        </button>
      </div>
