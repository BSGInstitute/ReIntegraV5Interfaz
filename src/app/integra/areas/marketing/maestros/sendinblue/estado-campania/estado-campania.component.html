<div class="contenedor">
  <div class="titulo">
    <h3>Cambiar Estado de la Campaña</h3>
    <div class="botonCerrar">
      <button mat-flat-button color="warn" class="circulo" mat-dialog-close>
        <i class="material-icons">clear</i>
      </button>
    </div>
  </div>

  <div class="descripcion">
    <p>
      <i
        >El estado suspendido pondrá la campaña en espera y al momento de volver
        a activarlo la campaña se mandará de forma inmediata</i
      >
    </p>
  </div>

  <hr />

  <div class="botones">
    <button
    *ngIf="estado=='queued'"
      mat-flat-button
      class="btnsusp"
      [ngClass]="{ colorin: seleccionado == 1 }"
      (click)="cambiarEstadoCampania('suspended')"
    >
      Suspender
    </button>

    <button
    *ngIf="estado=='suspended'"
      mat-flat-button
      class="btnact"
      [ngClass]="{ colorin: seleccionado == 2 }"
      (click)="seleccionado = 2"
      (click)="cambiarEstadoCampania('queued')"
    >
      Activar
    </button>
  </div>
</div>
