<ng-container>
<div class="mat-elevation-z8">
           
    <ng-container
      *ngIf="loading">
      <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    </ng-container>
    <table mat-table [dataSource]="dataSource" class="w-100">
  
      <ng-container matColumnDef="numero" >
        <th mat-header-cell *matHeaderCellDef style="text-align:center">No.</th>
        <td mat-cell *matCellDef="let element" style="text-align:center">{{ element.id }}</td>
      </ng-container>
  
   
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef style="text-align:center">Nombre</th>
        <td mat-cell *matCellDef="let element" style="text-align:center">{{ element.name }}</td>
      </ng-container>
  
  
      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef style="text-align:center">Fecha Creacion</th>
        <td mat-cell *matCellDef="let element" style="text-align:center">{{ element.createdAt | date: 'yyyy-MM-dd HH:mm:ss' }}</td>
      </ng-container>
  
      <ng-container matColumnDef="fechaEnvio">
        <th mat-header-cell *matHeaderCellDef style="text-align:center">Fecha de Envio</th>
        <td mat-cell *matCellDef="let element" style="text-align:center">{{ element.scheduledAt | date: 'yyyy-MM-dd HH:mm:ss' }}</td>
      </ng-container>
      
      <ng-container matColumnDef="tipo">
        <th mat-header-cell *matHeaderCellDef style="text-align:center">Tipo</th>
        <td mat-cell *matCellDef="let element" style="text-align:center">
          <ng-container *ngIf="element.abTesting==false">
                Regular
          </ng-container>
          <ng-container *ngIf="element.abTesting==true">
            Prueba A/B
          </ng-container>
        </td>
      </ng-container>
  
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef style="text-align:center">Acciones</th>
        <mat-cell *matCellDef="let row">
          <button mat-button class="edit" (click)="funcionEditar.emit(row)"><i class="material-icons">edit</i></button>
          <button mat-button class="delete" (click)="funcionCambiarE.emit(row) "><i class="material-icons">build</i></button>
        </mat-cell>
       
      </ng-container>
  
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  
    <mat-paginator
      [pageSizeOptions]="[20]"
      pageSize="20"
      [length]="Lengt"
      showFirstLastButtons
      (page)="Paginador($event)"
    >
    </mat-paginator>
  </div>

</ng-container>
