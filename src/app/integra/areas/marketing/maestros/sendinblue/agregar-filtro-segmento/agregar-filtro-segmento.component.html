<ng-container *ngIf="loader==true">
<div class="loading-indicator">
  <mat-progress-spinner mode="indeterminate" color="accent"></mat-progress-spinner>
</div>
</ng-container>
<div class="titulo">Subir Lista a Sendinblue</div>

<mat-tab-group>
  <mat-tab label="Filtro Mailing">
    <div class="titulo">Filtro Mailing</div>
    <div class="agfi w-100" >
    <mat-form-field class="example-full-width w-100" appearance="outline">
      <mat-label>Seleccione una Campania General</mat-label>
      <input
        type="text"
        placeholder="Pick one"
        aria-label="Number"
        matInput
        [(ngModel)]="autoC"
        (input)="OnChangesAuto()"
        [matAutocomplete]="auto"
        [disabled]="listaFiltroSegmento==undefined"
      />
      <mat-autocomplete
        #auto="matAutocomplete"
        (optionSelected)="pruebas($event)"
      >
        <mat-option *ngFor="let option of filteredOptions" [value]="option.id">
          {{ option.nombre }}
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>
    <ng-container *ngIf="listaFiltroSegmento==undefined">
    </ng-container>
  
  </div>
  
  <div class="agfi w-100" >
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Seleccione una Prioridad</mat-label>
      <mat-select (selectionChange)="selectPrio($event)">
        <ng-container *ngFor="let item of listaPrioridades" >
          <mat-option  [value]="item">{{
            item.nombre
          }}</mat-option>
        </ng-container>
      </mat-select>
    </mat-form-field>
    <ng-container *ngIf="listaPrioridades==undefined">
    </ng-container>
    
    <button mat-flat-button class="btn3" (click)="datosFiltroSegmento()">
      Ver datos 
    </button>
  </div>
  
  
  <div class="mat-elevation-z8">
   
      <ng-container
        *ngIf="loading">
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      </ng-container>
      <mat-progress-bar  *ngIf="ListaFiltroSegmentoPanel!=undefined" mode="determinate" [value]="progres*100/ListaFiltroSegmentoPanel.length"></mat-progress-bar>
      <table mat-table [dataSource]="dataSource">
    
        <ng-container matColumnDef="nombreAlumno" >
          <th mat-header-cell *matHeaderCellDef style="width:300px; text-align:center">Nombre</th>
          <td mat-cell *matCellDef="let element">{{ element.nombre }}</td>
        </ng-container>
    
     
        <ng-container matColumnDef="email1">
          <th mat-header-cell *matHeaderCellDef style="width:500px; text-align:center">Email</th>
          <td mat-cell *matCellDef="let element">{{ element.email }}</td>
        </ng-container>
    
    
        <ng-container matColumnDef="celular">
          <th mat-header-cell *matHeaderCellDef style="width:200px; text-align:center">Telefono</th>
          <td mat-cell *matCellDef="let element">{{ element.Telefono }}</td>
        </ng-container>
    
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    
      <mat-paginator
        [pageSizeOptions]="[20]"
        pageSize="20"
        showFirstLastButtons
      >
      </mat-paginator>
    </div>
  
    <div class="botones">
      <button
      mat-flat-button
      class="registrar"
      (click)="crearLista()"
    >
      Crear Lista Contactos
    </button> 
    <button mat-flat-button class="cancelar" mat-dialog-close>
      Cancelar
    </button>
    </div>
    </mat-tab>
  <mat-tab label="Listas Excel">
    <!-- <h1>Este metodo esta en validacion</h1> -->
    <app-subir-listas-sendinblu [idFolder]="idFolder" ></app-subir-listas-sendinblu>
  </mat-tab>
</mat-tab-group>
