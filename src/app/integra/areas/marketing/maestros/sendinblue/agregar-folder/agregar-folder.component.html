<div class="titulo"> 
    <h3>Crear nuevo folder</h3>
</div>

<div class="formulario">

    <h3>Nombre Carpeta:</h3>
    <mat-form-field class="example-full-width input" appearance="outline">
        <mat-label>Nombre de la Carpeta</mat-label>
        <input matInput [(ngModel)]="ListaEnvio.myFolderName" />
      </mat-form-field>
</div>

<div class="botones">
    <button mat-flat-button class="registrar" (click)="crearLista()">Registrar</button>
      <button mat-flat-button class="cancelar" mat-dialog-close>Cancelar</button>
</div>
