
<ng-template #modalPlantillaV2 let-modal>
    <app-loader *ngIf="loaderModal"></app-loader>
    <div class="modal-header bg-primary-header-modal">
      <h3 class="modal-title m-0 p-0" id="modal-basic-title">
        {{ isNew ? "Nueva PlantillaV2" : "Modificar PlantillaV2" }}
      </h3>
      <button
        type="button"
        class="btn-close btn-close-white"
        aria-label="Close"
        (click)="modal.dismiss('Cross click')"
      ></button>
    </div>
  
    <div class="modal-body mb">
      <form class="k-form k-form-horizontal" [formGroup]="formPlantillaV2">
        <fieldset class="k-form-fieldset">
          
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="nombre" class="k-label">
                  <span>Nombre de Plantilla<span class="text-danger fw-bold">*</span></span>
                </label>
                <kendo-textbox
                  #nombre 
                  size="medium"
                  placeholder="Nombre Plantilla"
                  formControlName="nombre"
                  [clearButton]="true"
                  [maxlength]="150"
                  [showSuccessIcon]="getShowSuccessIcon('nombre')"
                  [successIcon]="successIcon"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textbox>
               
                <kendo-formerror>
                  {{ getErrorMessage("nombre") }}
                </kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
  
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="codigo" class="k-label">
                  <span>Codigo<span class="text-danger fw-bold">*</span></span>
                </label>
                <kendo-textbox
                  #codigo
                  size="medium"
                  placeholder="codigo"
                  formControlName="codigo"
                  [clearButton]="true"
                  [maxlength]="100"
                  [showSuccessIcon]="getShowSuccessIcon('codigo')"
                  [successIcon]="successIcon"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textbox>
               
                <kendo-formerror>
                  {{ getErrorMessage("codigo") }}
                </kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
  

  
        </fieldset>
      </form>
    </div>
    <div class="modal-footer">
      <div class="k-form-buttons m-0">
        <button
          kendoButton
          *ngIf="isNew"
          themeColor="primary"
          (click)="crearPlantillaV2()"
        >
          Guardar
        </button>
        <button
          kendoButton
          *ngIf="!isNew"
          themeColor="tertiary"
          (click)="actualizarPlantillaV2()"
        >
          Actualizar
        </button>
  
        <button
          themeColor="error"
          kendoButton
          (click)="modal.dismiss('Cross click')"
        >
          Cancelar
        </button>
      </div>
    </div>
  </ng-template>
  
  <ng-template #modalSecciones let-modal class="formulario">
    <div class="modal-header bg-primary-header-modal">
      <h3 class="modal-title m-0 p-0" id="modal-basic-title">
        <label class="k-label">Configuracion de Plantilla</label>
      </h3>
      <button
        type="button"
        class="btn-close btn-close-black"
        aria-label="Close"
        (click)="modal.dismiss('Cross click')"
      ></button>
    </div>
    <app-landing-page2 [fuente]="listaFuente" [IdPlantillaV2]="id" (cerrarModal)="cerrarModal()" [listaSeccion]="listaSeccion"></app-landing-page2>
  </ng-template>
  
  <div class="modal-body">
      <form class="k-form k-form-horizontal">
        <fieldset class="k-form-fieldset">
          <div class="titulo">Landing Page Plantilla V2</div>
          <!-- modal ver -->
          <div class="">
            <div class="row">
              <div class="col-12">
                <div class="card">
                  <div class="card-body p-4">
                    <div class="row">
                      <div></div>
                      <div class="col"  style="overflow: auto;">
                        <ng-template
                          #cellTemplateGrid
                          let-dataItem="dataItem"
                          let-field="field"
                          let-itemValue="itemValue"
                        >
                          <ng-template #gridTempDefault>
                            {{ itemValue }}
                          </ng-template>
                        </ng-template>
    
                        <kendo-grid
                        style="min-width: 960px;"
                          [loading]="gridPlantillaV2.loading"
                          (dataStateChange)="gridPlantillaV2.onStateChange($event)"
                          [resizable]="gridPlantillaV2.resizable"
                         
                          [filterable]="gridPlantillaV2.filterable"
                          [pageSize]="gridPlantillaV2.gridState.take"
                          [skip]="gridPlantillaV2.gridState.skip"
                          [sort]="gridPlantillaV2.gridState.sort"
                          [kendoGridBinding]="gridPlantillaV2.data"
                          [pageable]="gridPlantillaV2.pageable"
    
                        >
                          <ng-template kendoGridToolbarTemplate>
                            <button
                              kendoButton
                              icon="reload"
                              fillMode="flat"
                              themeColor="secondary"
                              (click)="reloadPlantillaV2()"
                            ></button>
                            <kendo-grid-spacer></kendo-grid-spacer>
                            <button
                              kendoButton
                              [themeColor]="'primary'"
                              icon="plus"
                              (click)="abrirmodalPlantillaV2(true, null)"
                            >
                              Agregar
                            </button>
                          </ng-template>
             
                          <kendo-grid-column
                            field="nombre"
                            title="Nombre"
                            [filterable]="true"
                          >
                          </kendo-grid-column>
  
                          <kendo-grid-column
                            field="codigo"
                            title="Codigo"
                            [filterable]="false"
                          >
                          </kendo-grid-column>
                         
    
                          <kendo-grid-command-column title="" [width]="150">
                            <ng-template
                              kendoGridCellTemplate
                              let-isNew="isNew"
                              let-dataItem="dataItem"
                              let-rowindex="rowindex"
                            >
                              <div class="w-100 d-flex justify-content-center">
                                <button
                                kendoButton
                                themeColor="primary"
                                fillMode="solid"
                                rounded="large"
                                size="large"
                                class="p-2 me-1 ms-1"
                                container="body"
                                placement="top"
                                ngbTooltip="Editar"
                                (click)="AbrirSecciones(false, dataItem)"
                              >
                                <span class="k-icon k-i-edit-tools"></span>
                              </button>
                                <button
                                  kendoButton
                                  themeColor="warning"
                                  fillMode="solid"
                                  rounded="large"
                                  size="large"
                                  class="p-2 me-1 ms-1"
                                  container="body"
                                  placement="top"
                                  ngbTooltip="Editar"
                                  (click)="abrirmodalPlantillaV2(false, dataItem)"
                                >
                                  <span class="k-icon k-i-edit k-icon-20"></span>
                                </button>
                                <button
                                  kendoButton
                                  themeColor="error"
                                  fillMode="solid"
                                  rounded="large"
                                  size="large"
                                  s
                                  class="p-2 me-1 ms-1"
                                  container="body"
                                  placement="top"
                                  ngbTooltip="Eliminar"
                                  (click)="eliminarPlantillaV2(dataItem, rowindex)"
                                >
                                  <span class="k-icon k-i-close k-icon-20"></span>
                                </button>
                              </div>
                            </ng-template>
                          </kendo-grid-command-column>
                        </kendo-grid>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </fieldset>
      </form>
    </div>
