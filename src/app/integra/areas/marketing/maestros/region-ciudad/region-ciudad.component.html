<form class="k-form k-form-horizontal" [formGroup]="formRegionCiudad">
  <fieldset class="k-form-fieldset">
    <div class="row">
      <div class="col-sm-12 col-md-12">
        <label class="k-label">
          <span>Pais <span class="text-danger fw-bold">*</span></span>
        </label>
        <kendo-grid-spacer></kendo-grid-spacer>
        <kendo-dropdownlist
          class="d-flex"
          size="medium"
          [data]="listaPais"
          [defaultItem]="{
            id: null,
            nombrePais: 'Seleccione un Pais'
          }"
          textField="nombrePais"
          valueField="id"
          [valuePrimitive]="true"
          (selectionChange)="imprimirPais($event)"
        >
        </kendo-dropdownlist>
      </div>
    </div>
  </fieldset>
</form>

<form class="k-form k-form-horizontal" [formGroup]="formRegionCiudad">
  <fieldset class="k-form-fieldset">
    <div class="row">
      <div class="col-sm-12 col-md-12">
        <label class="k-label">
          <span>Ciudad <span class="text-danger fw-bold">*</span></span>
        </label>
        <kendo-grid-spacer></kendo-grid-spacer>
        <kendo-dropdownlist
          class="d-flex"
          size="medium"
          [data]="listaCiudad"
          [defaultItem]="{
            id: null,
            nombre: 'Seleccione una Ciudad'
          }"
          textField="nombre"
          valueField="id"
          [valuePrimitive]="true"
          (selectionChange)="imprimirCiudad($event)"
        >
        </kendo-dropdownlist>
      </div>
    </div>
  </fieldset>

  <button
  kendoButton
  themeColor="primary"
  fillMode="solid"
  rounded="large"
  size="large"
  class="p-2 me-1 ms-1"
  container="body"
  placement="top"
  (click)="imprimirDatos()"
>
Buscar
</button>
</form>

<div class="titulo">Region</div>
<!-- modal ver -->
<div class="">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body p-4">
          <div class="row">
            <div></div>
            <div class="col">
              <ng-template
                #cellTemplateGrid
                let-dataItem="dataItem"
                let-field="field"
                let-itemValue="itemValue"
              >
                <ng-template #gridTempDefault>
                  {{ itemValue }}
                </ng-template>
              </ng-template>

              <kendo-grid
                [data]="gridRegionCiudad.view"
                [loading]="gridRegionCiudad.loading"
                (dataStateChange)="gridRegionCiudad.onStateChange($event)"
                [resizable]="gridRegionCiudad.resizable"
                [pageable]="gridRegionCiudad.pageable"
                [filterable]="gridRegionCiudad.filterable"
                [pageSize]="gridRegionCiudad.gridState.take"
                [skip]="gridRegionCiudad.gridState.skip"
                [sort]="gridRegionCiudad.gridState.sort"
              >
                <ng-template kendoGridToolbarTemplate>
                  <button
                    kendoButton
                    icon="reload"
                    fillMode="flat"
                    themeColor="secondary"
                  ></button>
                  <kendo-grid-spacer></kendo-grid-spacer>
                  <button kendoButton [themeColor]="'primary'" icon="plus">
                    Agregar
                  </button>
                </ng-template>
                <kendo-grid-column
                  field="idRegion"
                  title="idRegion"
                  [filterable]="true"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="nombreRegion"
                  title="Nombre"
                  [filterable]="true"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="codigoBS"
                  title="CodigoBS"
                  [filterable]="true"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="denominacionBS"
                  title="DenominacionBS"
                  [filterable]="false"
                >
                </kendo-grid-column>
                <kendo-grid-column
                  field="nombreCorto"
                  title="NombreCorto"
                  [filterable]="false"
                >
                </kendo-grid-column>
                <kendo-grid-column
                field="nombreCiudad"
                title="Nombre Ciudad"
                [filterable]="false"
              >
              </kendo-grid-column>
                <kendo-grid-column
                  field="nombrePais"
                  title="nombrePais"
                  [filterable]="false"
                >
                </kendo-grid-column>
          
                <kendo-grid-command-column title="" [width]="150">
                  <ng-template
                    kendoGridCellTemplate
                    let-isNew="isNew"
                    let-dataItem="dataItem"
                    let-rowindex="rowindex"
                  >
                    <div class="w-100 d-flex justify-content-center">
                      <button
                        kendoButton
                        themeColor="warning"
                        fillMode="solid"
                        rounded="large"
                        size="large"
                        class="p-2 me-1 ms-1"
                        container="body"
                        placement="top"
                        ngbTooltip="Editar"
                      >
                        <span class="k-icon k-i-edit k-icon-20"></span>
                      </button>
                      <button
                        kendoButton
                        themeColor="error"
                        fillMode="solid"
                        rounded="large"
                        size="large"
                        class="p-2 me-1 ms-1"
                        container="body"
                        placement="top"
                        ngbTooltip="Eliminar"
                      >
                        <span class="k-icon k-i-close k-icon-20"></span>
                      </button>
                    </div>
                  </ng-template>
                </kendo-grid-command-column>
              </kendo-grid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
