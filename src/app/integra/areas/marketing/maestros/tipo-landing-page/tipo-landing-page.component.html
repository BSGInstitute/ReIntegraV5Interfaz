<ng-template #modalLandingPage let-modal>
    <app-loader *ngIf="loaderModal"></app-loader>
    <div class="modal-header bg-primary-header-modal">
      <h3 class="modal-title m-0 p-0" id="modal-basic-title">
        {{ isNew ? "Nuevo Tipo LandingPage" : "Modificar Tipo LandingPage" }}
      </h3>
      <button
        type="button"
        class="btn-close btn-close-white"
        aria-label="Close"
        (click)="modal.dismiss('Cross click')"
      ></button>
    </div>
  
    <div class="modal-body">
      <form class="k-form k-form-horizontal" [formGroup]="formTipoLandingPage">
        <fieldset class="k-form-fieldset">
          
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="nombre" class="k-label">
                  <span>Nombre Tipo LandingPage <span class="text-danger fw-bold">*</span></span>
                </label>
                <kendo-textbox
                  #nombre
                  size="medium"
                  placeholder="Nombre Tipo LandingPage"
                  formControlName="nombre"
                  [clearButton]="true"
                  [maxlength]="255"
                  [showSuccessIcon]="getShowSuccessIcon('nombre')"
                  [successIcon]="successIcon"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textbox>
               
                <kendo-formerror>
                  {{ getErrorMessage("nombre") }}
                </kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
  
  
        </fieldset>
      </form>
    </div>
    <div class="modal-footer">
      <div class="k-form-buttons m-0">
        <button
          kendoButton
          *ngIf="isNew"
          themeColor="primary"
          (click)="crearLandingPage()"
        >
          Guardar
        </button>
        <button
          kendoButton
          *ngIf="!isNew"
          themeColor="tertiary"
          (click)="actualizarLandingPage()"
        >
          Actualizar
        </button>
  
        <button
          themeColor="error"
          kendoButton
          (click)="modal.dismiss('Cross click')"
        >
          Cancelar
        </button>
      </div>
    </div>
  </ng-template>
  
  
  <div class="modal-body">
      <form class="k-form k-form-horizontal">
        <fieldset class="k-form-fieldset">
          <div class="titulo">LandingPages</div>
          <!-- modal ver -->
          <div class="">
            <div class="row">
              <div class="col-12">
                <div class="card">
                  <div class="card-body p-4">
                    <div class="row">
                      <div></div>
                      <div class="col">
                        <ng-template
                          #cellTemplateGrid
                          let-dataItem="dataItem"
                          let-field="field"
                          let-itemValue="itemValue"
                        >
                          <ng-template #gridTempDefault>
                            {{ itemValue }}
                          </ng-template>
                        </ng-template>
    
                        <kendo-grid
                          [loading]="gridLandingPage.loading"
                          (dataStateChange)="gridLandingPage.onStateChange($event)"
                          [resizable]="gridLandingPage.resizable"
                         
                          [filterable]="gridLandingPage.filterable"
                          [pageSize]="gridLandingPage.gridState.take"
                          [skip]="gridLandingPage.gridState.skip"
                          [sort]="gridLandingPage.gridState.sort"
                          [kendoGridBinding]="gridLandingPage.data"
                          [pageable]="gridLandingPage.pageable"
    
                        >
                          <ng-template kendoGridToolbarTemplate>
                            <button
                              kendoButton
                              icon="reload"
                              fillMode="flat"
                              themeColor="secondary"
                              (click)="reloadLandingPage()"
                            ></button>
                            <kendo-grid-spacer></kendo-grid-spacer>
                            <button
                              kendoButton
                              [themeColor]="'primary'"
                              icon="plus"
                              (click)="abrirmodalLandingPage(true, null)"
                            >
                              Agregar
                            </button>
                          </ng-template>
             
                          <kendo-grid-column
                            field="nombre"
                            title="nombre"
                            [filterable]="true"
                          >
                          </kendo-grid-column>
                         
    
                          <kendo-grid-command-column title="" [width]="150">
                            <ng-template
                              kendoGridCellTemplate
                              let-isNew="isNew"
                              let-dataItem="dataItem"
                              let-rowindex="rowindex"
                            >
                              <div class="w-100 d-flex justify-content-center">
                                <button
                                  kendoButton
                                  themeColor="warning"
                                  fillMode="solid"
                                  rounded="large"
                                  size="large"
                                  class="p-2 me-1 ms-1"
                                  container="body"
                                  placement="top"
                                  ngbTooltip="Editar"
                                  (click)="abrirmodalLandingPage(false, dataItem)"
                                >
                                  <span class="k-icon k-i-edit k-icon-20"></span>
                                </button>
                                <button
                                  kendoButton
                                  themeColor="error"
                                  fillMode="solid"
                                  rounded="large"
                                  size="large"
                                  s
                                  class="p-2 me-1 ms-1"
                                  container="body"
                                  placement="top"
                                  ngbTooltip="Eliminar"
                                  (click)="eliminarLandingPage(dataItem, rowindex)"
                                >
                                  <span class="k-icon k-i-close k-icon-20"></span>
                                </button>
                              </div>
                            </ng-template>
                          </kendo-grid-command-column>
                        </kendo-grid>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </fieldset>
      </form>
    </div>
