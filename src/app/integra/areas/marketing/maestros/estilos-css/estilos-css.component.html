
<ng-template #modalEstilosCss let-modal>
    <app-loader *ngIf="loaderModal"></app-loader>
    <div class="modal-header bg-primary-header-modal">
      <h3 class="modal-title m-0 p-0" id="modal-basic-title">
        {{ isNew ? "Nueva EstilosCss" : "Modificar EstilosCss" }}
      </h3>
      <button
        type="button"
        class="btn-close btn-close-white"
        aria-label="Close"
        (click)="modal.dismiss('Cross click')"
      ></button>
    </div>
  
    <div class="modal-body">
      <form class="k-form k-form-horizontal" [formGroup]="formEstilosCss">
        <fieldset class="k-form-fieldset">
          
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="nombre" class="k-label">
                  <span>Nombre Archivo <span class="text-danger fw-bold">*</span></span>
                </label>
                <kendo-textbox
                  #nombre
                  size="medium"
                  placeholder="Nombre Archivo"
                  formControlName="nombre"
                  [clearButton]="true"
                  [maxlength]="100"
                  [showSuccessIcon]="getShowSuccessIcon('nombre')"
                  [successIcon]="successIcon"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textbox>
               
                <kendo-formerror>
                  {{ getErrorMessage("nombre") }}
                </kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
  
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="codigoCss" class="k-label">
                  <span>Codigo Css <span class="text-danger fw-bold">*</span></span>
                </label>
                <kendo-textbox
                  #codigoCss
                  size="medium"
                  placeholder="codigoCss"
                  formControlName="codigoCss"
                  [clearButton]="true"
                  [maxlength]="100"
                  [showSuccessIcon]="getShowSuccessIcon('codigoCss')"
                  [successIcon]="successIcon"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textbox>
               
                <kendo-formerror>
                  {{ getErrorMessage("codigoCss") }}
                </kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
  
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="nombreTipo" class="k-label">
                  <span>Tipo <span class="text-danger fw-bold">*</span></span>
                </label>
                <kendo-textbox
                  #nombreTipo
                  size="medium"
                  placeholder="nombreTipo"
                  formControlName="nombreTipo"
                  [clearButton]="true"
                  [maxlength]="100"
                  [showSuccessIcon]="getShowSuccessIcon('nombreTipo')"
                  [successIcon]="successIcon"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textbox>
               
                <kendo-formerror>
                  {{ getErrorMessage("nombreTipo") }}
                </kendo-formerror>
              </kendo-formfield>
            </div>
          </div>
  
        </fieldset>
      </form>
    </div>
    <div class="modal-footer">
      <div class="k-form-buttons m-0">
        <button
          kendoButton
          *ngIf="isNew"
          themeColor="primary"
          (click)="crearEstilosCss()"
        >
          Guardar
        </button>
        <button
          kendoButton
          *ngIf="!isNew"
          themeColor="tertiary"
          (click)="actualizarEstilosCss()"
        >
          Actualizar
        </button>
  
        <button
          themeColor="error"
          kendoButton
          (click)="modal.dismiss('Cross click')"
        >
          Cancelar
        </button>
      </div>
    </div>
  </ng-template>
  
  
  <div class="modal-body">
      <form class="k-form k-form-horizontal">
        <fieldset class="k-form-fieldset">
          <div class="titulo">EstilosCss</div>
          <!-- modal ver -->
          <div class="">
            <div class="row">
              <div class="col-12">
                <div class="card">
                  <div class="card-body p-4">
                    <div class="row">
                      <div></div>
                      <div class="col">
                        <ng-template
                          #cellTemplateGrid
                          let-dataItem="dataItem"
                          let-field="field"
                          let-itemValue="itemValue"
                        >
                          <ng-template #gridTempDefault>
                            {{ itemValue }}
                          </ng-template>
                        </ng-template>
    
                        <kendo-grid
                          [loading]="gridEstilosCss.loading"
                          (dataStateChange)="gridEstilosCss.onStateChange($event)"
                          [resizable]="gridEstilosCss.resizable"
                         
                          [filterable]="gridEstilosCss.filterable"
                          [pageSize]="gridEstilosCss.gridState.take"
                          [skip]="gridEstilosCss.gridState.skip"
                          [sort]="gridEstilosCss.gridState.sort"
                          [kendoGridBinding]="gridEstilosCss.data"
                          [pageable]="gridEstilosCss.pageable"
    
                        >
                          <ng-template kendoGridToolbarTemplate>
                            <button
                              kendoButton
                              icon="reload"
                              fillMode="flat"
                              themeColor="secondary"
                              (click)="reloadEstilosCss()"
                            ></button>
                            <kendo-grid-spacer></kendo-grid-spacer>
                            <button
                              kendoButton
                              [themeColor]="'primary'"
                              icon="plus"
                              (click)="abrirmodalEstilosCss(true, null)"
                            >
                              Agregar
                            </button>
                          </ng-template>
             
                          <kendo-grid-column
                            field="nombre"
                            title="Nombre"
                            [filterable]="true"
                          >
                          </kendo-grid-column>
  
                          <kendo-grid-column
                            field="codigoCss"
                            title="CodigoCss"
                            [filterable]="false"
                          >
                          </kendo-grid-column>

                          <kendo-grid-column
                          field="nombreTipo"
                          title="Tipo"
                          [filterable]="false"
                        >
                        </kendo-grid-column>
                         
    
                          <kendo-grid-command-column title="" [width]="150">
                            <ng-template
                              kendoGridCellTemplate
                              let-isNew="isNew"
                              let-dataItem="dataItem"
                              let-rowindex="rowindex"
                            >
                              <div class="w-100 d-flex justify-content-center">
                                <button
                                  kendoButton
                                  themeColor="warning"
                                  fillMode="solid"
                                  rounded="large"
                                  size="large"
                                  class="p-2 me-1 ms-1"
                                  container="body"
                                  placement="top"
                                  ngbTooltip="Editar"
                                  (click)="abrirmodalEstilosCss(false, dataItem)"
                                >
                                  <span class="k-icon k-i-edit k-icon-20"></span>
                                </button>
                                <button
                                  kendoButton
                                  themeColor="error"
                                  fillMode="solid"
                                  rounded="large"
                                  size="large"
                                  s
                                  class="p-2 me-1 ms-1"
                                  container="body"
                                  placement="top"
                                  ngbTooltip="Eliminar"
                                  (click)="eliminarEstilosCss(dataItem, rowindex)"
                                >
                                  <span class="k-icon k-i-close k-icon-20"></span>
                                </button>
                              </div>
                            </ng-template>
                          </kendo-grid-command-column>
                        </kendo-grid>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </fieldset>
      </form>
    </div>
