<ng-template #modalFormularioLanding let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header bg-primary-header-modal form">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title">
      {{
        isNew
          ? "Configuracion de Formulario Landing"
          : "Modificar Configuracion de Formulario Landing"
      }}
    </h3>
    <button
      type="button"
      class="btn-close btn-close-white"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body pad">
    <form class="k-form k-form-horizontal" [formGroup]="formFormularioLanding">
      <fieldset class="k-form-fieldset mod">
        <div class="fl">
          <div class="row" *ngIf="!isNew">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="Url" class="k-label">
                  <span>Url <span class="text-danger fw-bold">*</span></span>
                </label>
                <kendo-textbox
                  [disabled]="true"
                  formControlName="Url"
                  #Url
                  size="medium"
                  placeholder="Url"
                  [clearButton]="true"
                  [maxlength]="100"
                  [successIcon]="successIcon"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textbox>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="Nombre" class="k-label">
                  <span>Nombre <span class="text-danger fw-bold">*</span></span>
                </label>
                <kendo-textbox
                  formControlName="Nombre"
                  #Nombre
                  size="medium"
                  placeholder="Nombre"
                  [clearButton]="true"
                  [maxlength]="100"
                  [successIcon]="successIcon"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textbox>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label">
                  <span
                    >Programa General
                    <span class="text-danger fw-bold"
                      ><span class="text-danger fw-bold">*</span></span
                    ></span
                  >
                </label>

                <kendo-dropdownlist
                  #nombreProgramaGeneral
                  formControlName="IdProgramaGeneral"
                  [filterable]="true"
                  (filterChange)="filterChangeFormularioProG($event)"
                  class="d-flex"
                  size="medium"
                  [data]="data"
                  [defaultItem]="{
                    id: null,
                    nombre: 'Seleccione un Programa'
                  }"
                  textField="nombre"
                  valueField="id"
                  [valuePrimitive]="true"
                  (valueChange)="
                    obtenerPEspecifico($event, ''); mandarNombre($event)
                  "
                >
                </kendo-dropdownlist>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label">
                  <span
                    >Programa Especifico
                    <span class="text-danger fw-bold"
                      ><span class="text-danger fw-bold">*</span></span
                    ></span
                  >
                </label>
                <kendo-dropdownlist
                  formControlName="IdPEspecifico"
                  #nombreProgramaEspecifico
                  class="d-flex"
                  size="medium"
                  [data]="listaEspecifico"
                  [defaultItem]="{
                    id: null,
                    nombre: 'Seleccione un Programa Especifico'
                  }"
                  textField="nombre"
                  valueField="id"
                  [valuePrimitive]="true"
                  [filterable]="true"
                  (filterChange)="filterChangeFormularioProE($event)"
                >
                </kendo-dropdownlist>
              </kendo-formfield>
            </div>
          </div>
        </div>

        <div class="fl" style="position: relative">
          <div class="configuraciones">Configuracion Principal</div>
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label">
                  <span
                    >Formulario Solicitud<span class="text-danger fw-bold"
                      ><span class="text-danger fw-bold">*</span></span
                    ></span
                  >
                </label>
                <kendo-dropdownlist
                  formControlName="IdFormularioSolicitud"
                  class="d-flex"
                  size="small"
                  #IdFormularioSolicitud
                  [data]="listaFormularioSolicitud"
                  textField="nombre"
                  valueField="id"
                  [defaultItem]="{
                    id: null,
                    nombre: 'Seleccionar un Formulario'
                  }"
                  [valuePrimitive]="true"
                  [filterable]="true"
                  (filterChange)="filterChangeFormularioSoli($event)"
                  (selectionChange)="imprimir($event)"
                >
                </kendo-dropdownlist>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label">
                  <span
                    >Categoria Origen<span class="text-danger fw-bold"
                      ><span class="text-danger fw-bold">*</span></span
                    ></span
                  >
                </label>
                <kendo-dropdownlist
                  formControlName="IdCategoriaOrigen"
                  class="d-flex"
                  size="small"
                  #IdCategoriaOrigen
                  [data]="listaCategoriaOrigen"
                  textField="nombre"
                  valueField="id"
                  [defaultItem]="{
                    id: null,
                    nombre: 'Seleccionar una Categoria'
                  }"
                  [valuePrimitive]="true"
                  [filterable]="true"
                  (filterChange)="filterChangeFormularioCat($event)"
                >
                </kendo-dropdownlist>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label">
                  <span
                    >Tipo de Landing Page<span class="text-danger fw-bold"
                      ><span class="text-danger fw-bold">*</span></span
                    ></span
                  >
                </label>
                <kendo-dropdownlist
                  formControlName="IdTipo"
                  #idTipo
                  class="d-flex"
                  size="medium"
                  [data]="tipos"
                  [defaultItem]="{
                    id: null,
                    nombre: 'Seleccione un tipo'
                  }"
                  textField="nombre"
                  valueField="id"
                  [valuePrimitive]="true"
                >
                </kendo-dropdownlist>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label class="k-label">
                  <span
                    >Plantilla<span class="text-danger fw-bold"
                      ><span class="text-danger fw-bold">*</span></span
                    ></span
                  >
                </label>

                <kendo-dropdownlist
                  #IdPlantilla
                  formControlName="IdPlantilla"
                  class="d-flex"
                  size="medium"
                  [data]="listaPlantilla"
                  [defaultItem]="{
                    id: null,
                    nombre: 'Seleccione una Plantilla'
                  }"
                  textField="nombre"
                  valueField="id"
                  [valuePrimitive]="true"
                  [filterable]="true"
                  (filterChange)="filterChangeFormularioPlan($event)"
                >
                </kendo-dropdownlist>
              </kendo-formfield>
            </div>
          </div>
        </div>

        <div class="fl">
          <div class="configuraciones">Configuracion de Textos</div>
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="Cabecera" class="k-label">
                  <span>Cabecera </span>
                </label>
                <kendo-textbox
                  formControlName="Cabecera"
                  #Cabecera
                  size="medium"
                  placeholder="Cabecera"
                  [clearButton]="true"
                  [maxlength]="100"
                  [successIcon]="successIcon"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textbox>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="Titulo" class="k-label">
                  <span>Titulo <span class="text-danger fw-bold">*</span></span>
                </label>
                <kendo-textbox
                  formControlName="Titulo"
                  #Titulo
                  size="medium"
                  placeholder="Titulo"
                  [clearButton]="true"
                  [maxlength]="100"
                  [successIcon]="successIcon"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textbox>
              </kendo-formfield>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-md-12">
              <kendo-formfield orientation="horizontal">
                <label [for]="Subtitulo" class="k-label">
                  <span>Subtitulo </span>
                </label>
                <kendo-textarea
                  formControlName="Subtitulo"
                  #Subtitulo
                  size="medium"
                  placeholder="Subtitulo"
                  [maxlength]="100"
                  showErrorIcon="initial"
                  inputValidSpaceDir
                >
                </kendo-textarea>
              </kendo-formfield>
            </div>
          </div>
        </div>
        <div class="row">
          <p>
            <i
              ><b
                >Nota: los textos que se configuren son los que se visualizaran
                en el formulario.</b
              ></i
            >
          </p>
        </div>
      </fieldset>
    </form>
  </div>

  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button
        kendoButton
        *ngIf="isNew"
        themeColor="primary"
        (click)="crearFormularioLanding()"
      >
        Guardar
      </button>
      <button
        kendoButton
        *ngIf="!isNew"
        themeColor="tertiary"
        (click)="actualizarLandingPage()"
      >
        Actualizar
      </button>

      <button
        class="botoncito"
        themeColor="error"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
</ng-template>

<div class="modal-body">
  <form class="k-form k-form-horizontal">
    <fieldset class="k-form-fieldset">
      <div class="titulo">Landing Page Configuracion V2</div>
      <!-- modal ver -->
      <div class="">
        <div class="row">
          <div class="col-12">
            <div class="card">
              <div class="card-body p-4">
                <div class="row">
                  <div class="col" style="overflow: auto">
                    <ng-template
                      #cellTemplateGrid
                      let-dataItem="dataItem"
                      let-field="field"
                      let-itemValue="itemValue"
                    >
                      <ng-template #gridTempDefault>
                        {{ itemValue }}
                      </ng-template>
                    </ng-template>

                    <kendo-grid
                      style="min-width: 960px"
                      [loading]="gridFormularioLanding.loading"
                      (dataStateChange)="
                        gridFormularioLanding.onStateChange($event)
                      "
                      [resizable]="gridFormularioLanding.resizable"
                      [filterable]="gridFormularioLanding.filterable"
                      [pageSize]="gridFormularioLanding.gridState.take"
                      [skip]="gridFormularioLanding.gridState.skip"
                      [sort]="gridFormularioLanding.gridState.sort"
                      [kendoGridBinding]="gridFormularioLanding.data"
                      [pageable]="gridFormularioLanding.pageable"
                    >
                      <ng-template kendoGridToolbarTemplate>
                        <button
                          kendoButton
                          icon="reload"
                          fillMode="flat"
                          themeColor="secondary"
                          (click)="reloadLandingPage()"
                        ></button>
                        <kendo-grid-spacer></kendo-grid-spacer>
                        <button
                          kendoButton
                          [themeColor]="'primary'"
                          icon="plus"
                          (click)="abrirModalFormularioLandingPage(true, null)"
                        >
                          Agregar
                        </button>
                      </ng-template>
                      <kendo-grid-column
                        field="nombreLandingPage"
                        title="Nombre"
                        [filterable]="true"
                      >
                      </kendo-grid-column>

                      <kendo-grid-column
                        field="nombreFormulario"
                        title="Formulario Solicitud"
                        [filterable]="true"
                      >
                      </kendo-grid-column>
                      <kendo-grid-column
                        field="nombrePrograma"
                        title="Programa General"
                        [filterable]="true"
                      >
                      </kendo-grid-column>

                      <kendo-grid-column
                        field="url"
                        title="Url"
                        [filterable]="true"
                      >
                      </kendo-grid-column>

                      <kendo-grid-command-column title="" [width]="150">
                        <ng-template
                          kendoGridCellTemplate
                          let-isNew="isNew"
                          let-dataItem="dataItem"
                          let-rowindex="rowindex"
                        >
                          <div class="w-100 d-flex justify-content-center">
                            <button
                              kendoButton
                              themeColor="warning"
                              fillMode="solid"
                              rounded="large"
                              size="large"
                              class="p-2 me-1 ms-1"
                              container="body"
                              placement="top"
                              ngbTooltip="Editar"
                              (click)="
                                abrirModalFormularioLandingPage(false, dataItem)
                              "
                            >
                              <span class="k-icon k-i-edit k-icon-20"></span>
                            </button>
                            <button
                              kendoButton
                              themeColor="error"
                              fillMode="solid"
                              rounded="large"
                              size="large"
                              s
                              class="p-2 me-1 ms-1"
                              container="body"
                              placement="top"
                              ngbTooltip="Eliminar"
                              (click)="eliminarLandingPage(dataItem, rowindex)"
                            >
                              <span class="k-icon k-i-close k-icon-20"></span>
                            </button>
                          </div>
                        </ng-template>
                      </kendo-grid-command-column>
                    </kendo-grid>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </fieldset>
  </form>
</div>
