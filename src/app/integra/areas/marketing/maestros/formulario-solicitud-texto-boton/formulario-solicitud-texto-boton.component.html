<ng-template #modalFormularioSolicitudTextoBoton let-modal>
  <app-loader *ngIf="loaderModal"></app-loader>
  <div class="modal-header bg-primary-header-modal">
    <h3 class="modal-title m-0 p-0" id="modal-basic-title">
      {{ isNew ? 'Nuevo Formulario Texto Boton'  : 'Modificar Formulario Texto Boton' }}
    </h3>
    <button
      type="button"
      class="btn-close btn-close-white"
      aria-label="Close"
      (click)="modal.dismiss('Cross click')"
    ></button>
  </div>
  <div class="modal-body">
    <form class="k-form k-form-horizontal" [formGroup]="formFormularioTextoBoton">
      <fieldset class="k-form-fieldset">
        <div class="row">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="textoBoton" class="k-label">
                <span>textoBoton<span class="text-danger fw-bold">*</span></span>
              </label>
              <kendo-textbox
                #textoBoton
                size="medium"
                placeholder="Texto Boton"
                formControlName="textoBoton"
                [clearButton]="true"
                [showSuccessIcon]="getShowSuccessIcon('textoBoton')"
                [successIcon]="successIcon"
                showErrorIcon="initial"
                inputValidSpaceDir
              >
              </kendo-textbox>
              <kendo-formhint
                >Nombre de Formulario  texto Boton</kendo-formhint
              >
              <kendo-formerror> {{ getErrorMessage("textoBoton") }} </kendo-formerror>
            </kendo-formfield>
          </div>
        </div>

        <div class="row">
          <div class="col-sm-12 col-md-12">
            <kendo-formfield orientation="horizontal">
              <label [for]="descripcion" class="k-label">
                <span>Descripcion <span class="text-danger fw-bold">*</span></span>
              </label>
              <kendo-textbox
                #descripcion
                size="medium"
                placeholder="Descripcion"
                formControlName="descripcion"
                [clearButton]="true"
                [showSuccessIcon]="getShowSuccessIcon('descripcion')"
                [successIcon]="successIcon"
                showErrorIcon="initial"
                inputValidSpaceDir
              >
              </kendo-textbox>
              <kendo-formhint
                >Descripcion de  Formulario Texto Boton</kendo-formhint
              >
              <kendo-formerror> {{ getErrorMessage("descripcion") }} </kendo-formerror>
            </kendo-formfield>
          </div>
        </div>

        <div class="row">
          <div class="col-sm-12 col-md-12 checkbox-align-center">
            <kendo-formfield orientation="horizontal">
              <kendo-label
                [for]="porDefecto"
                text="Por Defecto "
              ></kendo-label>
              <div class="h-100 d-flex align-items-center">
                <input
                  #porDefecto
                  formControlName="porDefecto"
                  type="checkbox"
                  size="medium"
                  rounded="medium"
                  kendoCheckBox
                />
              </div>
            </kendo-formfield>
          </div>
        </div>

      </fieldset>
    </form>
  </div>
  <div class="modal-footer">
    <div class="k-form-buttons m-0">
      <button
        kendoButton
        *ngIf="isNew"
        themeColor="primary"
        (click)="crearFormularioSolicitudTextoBoton()"
      >
        Guardar
      </button>
      <button
        kendoButton
        *ngIf="!isNew"
        themeColor="tertiary"
        (click)="actualizarFormularioSolicitudTextoBoton()"
      >
        Actualizar
      </button>

      <button
        themeColor="error"
        kendoButton
        (click)="modal.dismiss('Cross click')"
      >
        Cancelar
      </button>
    </div>
  </div>
</ng-template>



<div class="">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Formulario Texto Boton</h3>
        </div>
        <div class="card-body p-4">
          <div class="row">
            <div class="col">
              <k-grid-edit
                [gridData]="listaFormularioSolicitudTextoBoton"
                [loader]="loaderGrid"
                [columns]="gridFormularioSolicitudTextoBoton .columns"
                [commands]="gridFormularioSolicitudTextoBoton .comands"
                [readOnlyColumns]="gridFormularioSolicitudTextoBoton .readOnlyColumns"
                [gridConfig]="gridFormularioSolicitudTextoBoton .gridConfig"
                [gridState]="gridFormularioSolicitudTextoBoton .gridState"
                [commandAdd]="'external'"
                [commandEdit]="'external'"
                (OnGridEvents)="gridEventsFormularioTextoBoton($event)"
              >
              </k-grid-edit>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
