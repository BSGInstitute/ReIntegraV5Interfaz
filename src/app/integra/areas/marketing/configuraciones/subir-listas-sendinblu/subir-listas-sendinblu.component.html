<div class="contenedor">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Subir Listas a Sendinblue</h3>
        </div>

        <div class="card-body k-form k-form-horizontal">
          <div class="row">

                <h3>Nombre *</h3>

                <mat-form-field
                  class="example-full-width"
                  appearance="outline"
                  ng-container
                >
                  <mat-label>Nombre de la Lista</mat-label>
                  <input matInput [(ngModel)]="nombreLista" required />
                </mat-form-field>

            <form [formGroup]="form" (ngSubmit)="onSubmit()">
              <input
                class="ng-hide"
                id="input-file-id"
                multiple
                type="file"
                (change)="onFileChange($event)"
                style="margin-right: 10px"
              />
              <button mat-flat-button class="btn3" type="submit">Enviar</button>
            </form>
          </div>
        </div>

        <div class="card-body p-4" id="grillaAgendaTab">
          <div class="row d-flex justify-content-center mb-4">
            <div class="mat-elevation-z8">
              <ng-container *ngIf="loading">
                <mat-progress-bar mode="indeterminate"></mat-progress-bar>
              </ng-container>

              <table mat-table [dataSource]="dataSource">
                <ng-container matColumnDef="id">
                  <th
                    mat-header-cell
                    *matHeaderCellDef
                    style="width: 300px; text-align: center"
                  >
                    Id
                  </th>
                  <td mat-cell *matCellDef="let element">{{ element.id }}</td>
                </ng-container>

                <ng-container matColumnDef="nombre1">
                  <th
                    mat-header-cell
                    *matHeaderCellDef
                    style="width: 500px; text-align: center"
                  >
                    Nombre1
                  </th>
                  <td mat-cell *matCellDef="let element">
                    {{ element.nombre1 }}
                  </td>
                </ng-container>

                <ng-container matColumnDef="nombre2">
                  <th
                    mat-header-cell
                    *matHeaderCellDef
                    style="width: 200px; text-align: center"
                  >
                    Nombre2
                  </th>
                  <td mat-cell *matCellDef="let element">
                    {{ element.nombre2 }}
                  </td>
                </ng-container>

                <ng-container matColumnDef="apellidoMaterno">
                  <th
                    mat-header-cell
                    *matHeaderCellDef
                    style="width: 200px; text-align: center"
                  >
                    Apellido Materno
                  </th>
                  <td mat-cell *matCellDef="let element">
                    {{ element.apellidoMaterno }}
                  </td>
                </ng-container>

                <ng-container matColumnDef="apellidoPaterno">
                  <th
                    mat-header-cell
                    *matHeaderCellDef
                    style="width: 200px; text-align: center"
                  >
                    Spellido Paterno
                  </th>
                  <td mat-cell *matCellDef="let element">
                    {{ element.apellidoPaterno }}
                  </td>
                </ng-container>

                <ng-container matColumnDef="celular">
                  <th
                    mat-header-cell
                    *matHeaderCellDef
                    style="width: 200px; text-align: center"
                  >
                    Celular
                  </th>
                  <td mat-cell *matCellDef="let element">
                    {{ element.celular }}
                  </td>
                </ng-container>

                <ng-container matColumnDef="email1">
                  <th
                    mat-header-cell
                    *matHeaderCellDef
                    style="width: 200px; text-align: center"
                  >
                    Correo
                  </th>
                  <td mat-cell *matCellDef="let element">
                    {{ element.email1 }}
                  </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr
                  mat-row
                  *matRowDef="let row; columns: displayedColumns"
                ></tr>
              </table>

              <mat-paginator
                [pageSize]="10"
                [pageSizeOptions]="[5, 10, 25, 100]"
                aria-label="Select page"
              >
              </mat-paginator>
            </div>

            <div class="botones">
              <button mat-flat-button class="registrar" (click)="crearLista()">
                Crear Lista Contactos
              </button>
              <button mat-flat-button class="cancelar" mat-dialog-close>
                Cancelar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
