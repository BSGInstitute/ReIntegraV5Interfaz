<div class="card">
  <div class="formulario">
    <div class="alert alert-danger" role="alert">
      <b>Nota:</b> **Se basara en la fecha de matricula
    </div>

    <div class="column">
      <h3>Alumnos matriculados en los ultimos(as):</h3>
      <mat-form-field appearance="fill" style="margin-right: 10px">
        <input
          type="number"
          class="form-control"
          matInput
          name="value"
          [(ngModel)]="cantidad"
        />
      </mat-form-field>
      <mat-form-field appearance="fill" style="margin-right: 10px">
        <mat-label>Seleccione un tiempo</mat-label>
        <mat-select [(ngModel)]="tiempo">
          <mat-option
            *ngFor="let tiempo of listaFrecuencia"
            [value]="tiempo.id"
          >
            {{ tiempo.nombre }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="column">
      <h3>Fecha matricula alumno desde:</h3>

      <kendo-datepicker
      calendarType="classic"
      style="margin-right: 10px"
      [(ngModel)]="FechaInicioMatriculaAlumno"
    ></kendo-datepicker>
     
    </div>

    <div class="column">
      <h3>Fecha matricula alumno hasta:</h3>

      <kendo-datepicker
      calendarType="classic"
      style="margin-right: 10px"
      [(ngModel)]="FechaFinMatriculaAlumno"
    ></kendo-datepicker>
   
    </div>
  </div>
</div>
