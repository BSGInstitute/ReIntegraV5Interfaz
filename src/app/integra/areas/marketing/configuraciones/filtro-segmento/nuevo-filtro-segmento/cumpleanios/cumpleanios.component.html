<div class="card">
  <div class="formulario">
    <div class="column">
      <h3>Cumpleaños dentro de:</h3>
      <mat-form-field appearance="fill" style="margin-right: 10px">
        <input type="number" class="form-control" matInput name="value" [(ngModel)]="cantidad"/>
      </mat-form-field>
      <mat-form-field appearance="fill" style="margin-right: 10px">
        <mat-label>Seleccione un tiempo</mat-label>
        <mat-select [(ngModel)]="tiempo">
          <mat-option
            *ngFor="let tiempo of listaFrecuencia"
            [value]="tiempo.id"
          >
            {{ tiempo.nombre }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </div>
</div>
