<div class="card">
  <div class="formulario">
    <div class="card">
      <div class="column">
        <h3>Porcentaje de Avance en el Curso:</h3>

        <mat-form-field appearance="fill" style="margin-right: 10px">
          <mat-label>Seleccione un Operador</mat-label>
          <mat-select [(ngModel)]="operadores">
            <mat-option
              *ngFor="let operador of listaOperadores"
              [value]="operador"
            >
              {{ operador.nombre }}
            </mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="fill" style="margin-right: 10px">
          <input
            type="number"
            class="form-control"
            matInput
            name="value"
            [(ngModel)]="porcentaje"
          />
        </mat-form-field>
        <p appearance="fill" style="margin-right: 10px">%</p>
        <button mat-flat-button class="botonAgregar" (click)="Agregar()">
          Agregar
        </button>
      </div>
      <div class="contenedor">
        <div class="mat-elevation-z8" *ngIf="times==true">
          <ng-container *ngIf="loading">
            <mat-progress-bar mode="indeterminate"></mat-progress-bar>
          </ng-container>
          <kendo-grid
            [kendoGridBinding]="dataSourceEP"
            [pageSize]="5"
            [sortable]="true"
            [reorderable]="true"
            [resizable]="true"
            [columnMenu]="{ filter: true }"
            [contentEditable]="true"
            [pageable]="{
              buttonCount: 5,
              info: true,
              type: 'numeric',
              pageSizes: true,
              previousNext: true,
              position: 'bottom'
            }"
          >
            <kendo-grid-column
              title="Operador"
              headerClass="justify-content-center k-grid-header "
              [width]="200"
              field="operadorNombre"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Porcentaje (#)"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="valor"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>

            <kendo-grid-command-column
              [sticky]="true"
              title="Acciones"
              [width]="250"
              headerClass="justify-content-center text-center k-grid-header-command"
            >
              <ng-template
                kendoGridCellTemplate
                let-isNew="isNew"
                let-dataItem="dataItem"
                let-rowIndex="rowIndex"
              >
                <div
                  class="w-100 d-flex justify-content-center"
                  style="padding: 20px"
                  kendoTooltip
                >
                  <div>
                    <button
                      title="Eliminar"
                      kendoButton
                      themeColor="error"
                      fillMode="solid"
                      rounded="large"
                      size="large"
                      class="p-2 me-1 ms-1"
                      container="body"
                      placement="top"
                      (click)="gridEventsResponse('eliminar', rowIndex)"
                    >
                      <span class="k-icon k-i-close k-i-x k-icon-20"></span>
                    </button>
                  </div>
                </div>
              </ng-template>
            </kendo-grid-command-column>
          </kendo-grid>
        </div>
      </div>
    </div>
  </div>
</div>
