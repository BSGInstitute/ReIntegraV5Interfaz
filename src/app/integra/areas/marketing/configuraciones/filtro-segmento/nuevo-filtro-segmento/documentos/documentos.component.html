<div class="card">
  <div class="formulario">
    <div class="alert alert-danger" role="alert">
      <b>Nota:</b> **Los filtros de pais y ciudad aplican únicamente sobre el
      pais y ciudad de origen del contacto
    </div>

    <div class="column">
      <h3>Documentos:</h3>
      <div class="example-chip-list w-100">
        <kendo-multiselect
          class="w-100"
          [data]="listaDocumentoFiltro"
          placeholder="-Todos-"
          #documentoFiltro
          [filterable]="true"
          [(ngModel)]="documentos"
          [textField]="'nombre'"
          [valueField]="'id'"
          (valueChange)="valueChangeDoc($event)"
          (filterChange)="filterChangeDoc($event)"
          (removeTag)="removeDoc($event)"
        ></kendo-multiselect>
      </div>
    </div>
  </div>
</div>
