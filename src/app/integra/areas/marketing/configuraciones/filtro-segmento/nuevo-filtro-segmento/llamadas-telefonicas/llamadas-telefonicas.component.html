<div class="card">
  <div class="formulario">
    <div class="card">
      <div class="column">
        <h3>Con llamada efectiva en los ultimos:</h3>
        <mat-form-field appearance="fill" style="margin-right: 10px">
          <input
            type="number"
            class="form-control"
            matInput
            name="value"
            [(ngModel)]="cantidad"
          />
        </mat-form-field>
        <mat-form-field appearance="fill" style="margin-right: 10px">
          <mat-label>Seleccione un tiempo</mat-label>
          <mat-select [(ngModel)]="tiempo">
            <mat-option *ngFor="let tiempo of listaFrecuencia" [value]="tiempo">
              {{ tiempo.nombre }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-flat-button class="botonAgregar" (click)="Agregar()">
          Agregar
        </button>
      </div>

      <div class="column">
        <h3>Sin llamada efectiva en los ultimos:</h3>
        <mat-form-field appearance="fill" style="margin-right: 10px">
          <input
            type="number"
            class="form-control"
            matInput
            name="value"
            [(ngModel)]="cantidadFinal"
          />
        </mat-form-field>
        <mat-form-field appearance="fill" style="margin-right: 10px">
          <mat-label>Seleccione un tiempo</mat-label>
          <mat-select [(ngModel)]="tiempoFinal">
            <mat-option *ngFor="let tiempo of listaFrecuencia" [value]="tiempo">
              {{ tiempo.nombre }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-flat-button class="botonAgregar" (click)="AgregarFinal()">
          Agregar
        </button>
      </div>

      <div class="mat-elevation-z8" *ngIf="times==true">
        <ng-container *ngIf="loading">
          <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        </ng-container>
        <kendo-grid
          [kendoGridBinding]="dataSourceEP"
          [pageSize]="5"
          [sortable]="true"
          [reorderable]="true"
          [resizable]="true"
          [columnMenu]="{ filter: true }"
          [contentEditable]="true"
          [pageable]="{
            buttonCount: 5,
            info: true,
            type: 'numeric',
            pageSizes: true,
            previousNext: true,
            position: 'bottom'
          }"
        >
          <kendo-grid-column
            title="Estado Llamada"
            headerClass="justify-content-center k-grid-header "
            [width]="200"
            field="estado"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Cantidad"
            headerClass="justify-content-center k-grid-header "
            [width]="150"
            field="cantidadTiempoFrecuencia"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>
          <kendo-grid-column
            title="Unidad de Tiempo"
            headerClass="justify-content-center k-grid-header "
            [width]="150"
            field="frecuenciaNombre"
            [locked]="false"
            [sticky]="false"
            [filterable]="true"
            [hidden]="false"
          >
          </kendo-grid-column>

          <kendo-grid-command-column
            [sticky]="true"
            title="Acciones"
            [width]="250"
            headerClass="justify-content-center text-center k-grid-header-command"
          >
            <ng-template
              kendoGridCellTemplate
              let-isNew="isNew"
              let-dataItem="dataItem"
              let-rowIndex="rowIndex"
            >
              <div
                class="w-100 d-flex justify-content-center"
                style="padding: 20px"
                kendoTooltip
              >
                <div>
                  <button
                    title="Eliminar"
                    kendoButton
                    themeColor="error"
                    fillMode="solid"
                    rounded="large"
                    size="large"
                    class="p-2 me-1 ms-1"
                    container="body"
                    placement="top"
                    (click)="gridEventsResponse('eliminar', rowIndex)"
                  >
                    <span class="k-icon k-i-close k-i-x k-icon-20"></span>
                  </button>
                </div>
              </div>
            </ng-template>
          </kendo-grid-command-column>
        </kendo-grid>
      </div>
    </div>   
    <div class="formulario">
      <div class="card">
        <div class="column">
          <h3>Actividad Cabecera:</h3>

          <div class="example-chip-list w-100">
            <kendo-multiselect class="w-100"
              [data]="listaActividadFiltro"
              [filterable]="true"
              placeholder="-Todos-"
              #actividadFiltro
              [(ngModel)]="actividades"
              [textField]="'nombre'"
              [valueField]="'id'"
              (valueChange)="valueChangeActividad($event)"
              (filterChange)="filterChangeActividad($event)"
              (removeTag)="removeTagActividad($event)"
            ></kendo-multiselect>
        </div>
        </div>
      </div>
      <div class="card">
        <div class="column">
          <h3>Ocurrencia:</h3>
          <div class="example-chip-list w-100">
            <kendo-multiselect class="w-100"
              [data]="listaOcurrenciaFiltro"
              placeholder="-Todos-"
              #ocurrenciaFiltro
              [filterable]="true"
              [(ngModel)]="ocurrencias"
              [textField]="'nombre'"
              [valueField]="'id'"
              (valueChange)="valueChangeOcurrencia($event)"
              (filterChange)="filterChangeOcurrencia($event)"
              (removeTag)="removeTagOcurrencia($event)"
            ></kendo-multiselect>
        </div>
        </div>
      </div>
    </div>
  </div>
</div>
