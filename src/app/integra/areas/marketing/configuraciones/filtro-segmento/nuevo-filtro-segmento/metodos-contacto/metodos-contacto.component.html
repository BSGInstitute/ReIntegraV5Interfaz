
<div class="card">
  <div class="formulario">
  <div class="alert alert-danger" role="alert">
    <b>Nota:</b> **Los filtros de metodo de contacto aplican únicamente sobre el contacto
  </div>


  <div class="column">
    <mat-checkbox class="example-margin" [(ngModel)]="messenger"
      >¿Considerar Contactos con messenger valido?</mat-checkbox
    >
  </div>
  <div class="column">
    <mat-checkbox class="example-margin" [(ngModel)]="whats"
      >¿Considerar Contactos con numero de Whatsapp valido?</mat-checkbox
    >
  </div>
  <div class="column">
    <mat-checkbox class="example-margin" [(ngModel)]="emailvalido" [disabled]="true"
      >¿Considerar contactos con email valido?</mat-checkbox
    >
  </div>
</div>
</div>
