<div class="titulo">
    <h2>Resultados de Filtro Segmento</h2>
  </div>

  <mat-tab-group>
    <mat-tab label="Contactos">
      <app-contactos [id]="id" [idFiltroSegmentoTipoContacto]="idFiltroSegmentoTipoContacto" (newItemEvent)="addNewItem($event)"></app-contactos>
    </mat-tab>
    <mat-tab label="Crear Oportunidades">
      <app-crear-oportunidad [listaContactoEnvio]="listaContactoEnvio" [data]="id"></app-crear-oportunidad>
    </mat-tab>
    <mat-tab label="Historial Ejecutado">
      <app-historial-ejecutado [id]="id"></app-historial-ejecutado>
    </mat-tab>
    <mat-tab label="Facebook Remarketing">
  <app-facebook-remarketing [id]="id" [idFiltroSegmentoTipoContacto]="idFiltroSegmentoTipoContacto"></app-facebook-remarketing>
    </mat-tab>
    <mat-tab label="Historial Remarketing">
  <app-historial-remarketing [id]="id"></app-historial-remarketing>
    </mat-tab>
    <!-- <mat-tab label=" Remarketing">
      <app-historial-crediticio></app-historial-crediticio>
        </mat-tab> -->


  </mat-tab-group>
  <div class="agregar">
  <button mat-flat-button class="botonCerrar" (click)="Cerrar()">
    Cancelar
  </button>
</div>
