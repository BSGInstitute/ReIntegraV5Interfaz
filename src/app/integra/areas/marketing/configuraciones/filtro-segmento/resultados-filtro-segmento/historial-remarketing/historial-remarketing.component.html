<div class="contenedor">
    <div class="titulo">
        <h2>Publicos Personalizados (Custom Audiences)</h2>
      </div>
      <div class="contenedor">
        <div class="mat-elevation-z8">
           
            <ng-container
              *ngIf="loading">
              <mat-progress-bar mode="indeterminate"></mat-progress-bar>
            </ng-container>
            <kendo-grid
            [kendoGridBinding]="listaHistorial"
            [pageSize]="5"
            [sortable]="true"
            [reorderable]="true"
            [resizable]="true"
            [pageable]="{
              buttonCount: 5,
              info: true,
              type: 'numeric',
              pageSizes: true,
              previousNext: true,
              position: 'bottom'
            }"
          >
            <kendo-grid-column
              title="Cuenta"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="nombreCuentaPublicitaria"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Facebook ID"
              headerClass="justify-content-center k-grid-header "
              [width]="200"
              field="facebookIdAudiencia"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Nombre"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="nombre"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Fecha"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="fechaModificacion"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
            <kendo-grid-column
              title="Subtype"
              headerClass="justify-content-center k-grid-header "
              [width]="150"
              field="subtipo"
              [locked]="false"
              [sticky]="false"
              [filterable]="true"
              [hidden]="false"
            >
            </kendo-grid-column>
