<div class="titulo">
  <h2>Seleccione tipo de contacto</h2>
</div>
<div class="busqueda">
  <h2>Tipo de contacto:</h2>

  <mat-form-field appearance="outline" class="w-100">
    <mat-label>Tipo de contacto:</mat-label>
    <mat-select [(ngModel)]="contacto">
      <ng-container *ngFor="let item of listaContacto">
        <mat-option [value]="item.id">{{ item.nombre }}</mat-option>
      </ng-container>
    </mat-select>
  </mat-form-field>

  <div class="agregar">
    <button mat-flat-button class="botonAgregar" (click)="abrirModal(true)">
      Crear Nuevo
    </button>
  </div>
</div>

<div class="contenedor">
  <div class="titulo">
    <h2>Listado de Filtros por Segmento</h2>
    <!-- <div class="estado">
      <div class="circulo"></div>
      <button mat-flat-button class="botonEstado">Verificar estado</button>
    </div> -->
  </div>

  <div class="mat-elevation-z8">
    <ng-container *ngIf="loading">
      <mat-progress-bar mode="indeterminate"></mat-progress-bar>
    </ng-container>
    <div class="mat-elevation-z8">
      <ng-container *ngIf="loading">
        <mat-progress-bar mode="indeterminate"></mat-progress-bar>
      </ng-container>
      <kendo-grid
        [kendoGridBinding]="dataSourceEP"
        [pageSize]="5"
        [sortable]="true"
        [reorderable]="true"
        [resizable]="true"
        [columnMenu]="{ filter: true }"
        [pageable]="{
          buttonCount: 5,
          info: true,
          type: 'numeric',
          pageSizes: true,
          previousNext: true,
          position: 'bottom'
        }"
      >
        <kendo-grid-column
          title="Nombre"
          headerClass="justify-content-center k-grid-header "
          [width]="200"
          field="nombre"
          [locked]="false"
          [sticky]="false"
          [filterable]="true"
          [hidden]="false"
        >
        </kendo-grid-column>
        <kendo-grid-column
          title="Tipo Contacto"
          headerClass="justify-content-center k-grid-header "
          [width]="150"
          field="nombreFiltroSegmentoTipoContacto"
          [locked]="false"
          [sticky]="false"
          [filterable]="true"
          [hidden]="false"
        >
        </kendo-grid-column>
        <kendo-grid-column
          title="Filtro Ejecutado"
          headerClass="justify-content-center k-grid-header "
          [width]="150"
          field="filtroEjecutado"
          [locked]="false"
          [sticky]="false"
          [filterable]="true"
          [hidden]="false"
        >
        </kendo-grid-column>
        <kendo-grid-column
          title="Fecha Creacion"
          headerClass="justify-content-center k-grid-header "
          [width]="150"
          field="fechaCreacion"
          [locked]="false"
          [sticky]="false"
          [filterable]="true"
          [hidden]="false"
        >

        </kendo-grid-column>
        <kendo-grid-column
          title="Fecha Modificacion"
          headerClass="justify-content-center k-grid-header "
          [width]="150"
          field="fechaModificacion"
          [locked]="false"
          [sticky]="false"
          [filterable]="true"
          [hidden]="false"
        >
        </kendo-grid-column>
        <kendo-grid-column
          title="Usuario Creacion"
          headerClass="justify-content-center k-grid-header "
          [width]="150"
          field="usuarioCreacion"
          [locked]="false"
          [sticky]="false"
          [filterable]="true"
          [hidden]="false"
        >
        </kendo-grid-column>
        <kendo-grid-column
          title="Usuario Modificacion"
          headerClass="justify-content-center k-grid-header "
          [width]="150"
          field="usuarioModificacion"
          [locked]="false"
          [sticky]="false"
          [filterable]="true"
          [hidden]="false"
        >
        </kendo-grid-column>
        <kendo-grid-command-column
          [sticky]="true"
          title="Acciones"
          [width]="250"
          headerClass="justify-content-center text-center k-grid-header-command"
        >
          <ng-template
            kendoGridCellTemplate
            let-isNew="isNew"
            let-dataItem="dataItem"
            let-rowIndex="rowIndex"
          >
            <div
              class="w-100 d-flex justify-content-center"
              style="padding: 20px"
              kendoTooltip
            >
              <div>
                <button
                  title="Observar"
                  kendoButton
                  themeColor="success"
                  fillMode="solid"
                  rounded="large"
                  size="large"
                  class="p-2 me-1 ms-1"
                  container="body"
                  placement="top"
                  (click)="gridEventsResponse('observar', dataItem, rowIndex)"
                >
                  <span class="k-icon k-i-preview k-i-eye k-icon-20"></span>
                </button>
                <button
                  title="Ejecutar"
                  kendoButton
                  themeColor="warning"
                  fillMode="solid"
                  rounded="large"
                  size="large"
                  class="p-2 me-1 ms-1"
                  container="body"
                  placement="top"
                  (click)="gridEventsResponse('ejecutar', dataItem)"
                >
                  <span class="k-icon k-i-play k-icon-20"></span>
                </button>

                <button
                  title="Editar"
                  kendoButton
                  themeColor="info"
                  fillMode="solid"
                  rounded="large"
                  size="large"
                  class="p-2 me-1 ms-1"
                  container="body"
                  placement="top"
                  (click)="gridEventsResponse('editar', dataItem)"
                >
                  <span class="k-icon k-i-edit k-icon-20"></span>
                </button>
                <button
                  title="Eliminar"
                  kendoButton
                  themeColor="error"
                  fillMode="solid"
                  rounded="large"
                  size="large"
                  class="p-2 me-1 ms-1"
                  container="body"
                  placement="top"
                  (click)="gridEventsResponse('eliminar', dataItem)"
                >
                  <span class="k-icon k-i-close k-i-x k-icon-20"></span>
                </button>
                <button
                  title="Duplicar"
                  kendoButton
                  themeColor="info"
                  fillMode="solid"
                  rounded="large"
                  size="large"
                  class="p-2 me-1 ms-1"
                  container="body"
                  placement="top"
                  (click)="gridEventsResponse('duplicar', dataItem)"
                >
                  <i class="material-icons copy">content_copy</i>
                </button>
              </div>
            </div>
          </ng-template>
        </kendo-grid-command-column>
      </kendo-grid>
    </div>
  </div>
</div>

<div class="contenedor">
  <div class="titulo">
    <h2>Log de Accesos</h2>
  </div>
</div>
