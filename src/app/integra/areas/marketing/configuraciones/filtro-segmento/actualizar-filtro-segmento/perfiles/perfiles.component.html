<div class="card">
  <div class="all">
    <div class="formulario">
      <div class="alert alert-danger" role="alert">
        <b>Nota:</b> **Los filtros de cargo, industria, área de formación y área
        de trabajo aplican únicamente sobre el contacto
      </div>
    </div>

    <div class="formulario">
      <div class="column">
        <h3>Cargo:</h3>

        <div class="example-chip-list w-100">
          <kendo-multiselect
            class="w-100"
            [data]="listaCargo"
            #cargoFiltro
            placeholder="-Todos-"
            [data]="cargoListaFiltro"
            [filterable]="true"
            [(ngModel)]="cargos"
            [textField]="'nombre'"
            [valueField]="'id'"
            (valueChange)="valueChangeCargo($event)"
            (filterChange)="filterChangeCargo($event)"
            (removeTag)="removeTagCargo($event)"
          ></kendo-multiselect>
        </div>
      </div>

      <div class="column">
        <h3>Industria:</h3>
        <div class="example-chip-list w-100">
          <kendo-multiselect
            class="w-100"
            #industriaFiltro
            placeholder="-Todos-"
            [data]="industrisListaFiltro"
            [filterable]="true"
            [(ngModel)]="industrias"
            [textField]="'nombre'"
            [valueField]="'id'"
            (valueChange)="valueChangeIndustria($event)"
            (filterChange)="filterChangeIndustria($event)"
            (removeTag)="removeTagIndustria($event)"
          ></kendo-multiselect>
        </div>
      </div>

      <div class="column">
        <h3>Area Trabajo:</h3>
        <div class="example-chip-list w-100">
          <kendo-multiselect
            class="w-100"
            #areaTFiltro
            placeholder="-Todos-"
            [data]="areatrabajoListaFiltro"
            [filterable]="true"
            [(ngModel)]="areatrabajos"
            [textField]="'nombre'"
            [valueField]="'id'"
            (valueChange)="valueChangeAreaTrabajo($event)"
            (filterChange)="filterChangeAreaTrabajo($event)"
            (removeTag)="removeTagAreaTrabajo($event)"
          ></kendo-multiselect>
        </div>
      </div>

      <div class="column">
        <h3>A. Formacion:</h3>
        <div class="example-chip-list w-100">
          <kendo-multiselect
            class="w-100"
            #areaFFIltro
            placeholder="-Todos-"
            [data]="areaFormacionListaFiltro"
            [filterable]="true"
            [(ngModel)]="areaformaciones"
            [textField]="'nombre'"
            [valueField]="'id'"
            (valueChange)="valueChangeAreaFormacion($event)"
            (filterChange)="filterChangeAreaFormacion($event)"
            (removeTag)="removeTagAreaFormacion($event)"
          ></kendo-multiselect>
        </div>
      </div>
    </div>
  </div>
</div>
