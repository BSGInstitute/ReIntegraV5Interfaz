<div class="">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Agregar Plantilla a Conjunto Lista</h3>
        </div>

        <div class="card-body p-4">
            <div class="row">
                <h3>{{nombreConjuntoLista}}</h3>
            </div>
          <div class="row">
            <kendo-dropdownlist
              [data]="listaPlantilla"
              [kendoDropDownFilter]="filterSettings"
              [(ngModel)]="idPlantilla"
              textField="nombre"
              valueField="id"
              [valuePrimitive]="true"
            >
            </kendo-dropdownlist>
          </div>
        </div>
        <button mat-raised-button color="primary" (click)="InsertarConfiguracionEnvioMailing()">
            Guardar
          </button>
      </div>
    </div>
  </div>
</div>
