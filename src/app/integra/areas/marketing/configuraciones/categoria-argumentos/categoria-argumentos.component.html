<div class="titulo">Categoria Argumentos</div>

<mat-tab-group [(selectedIndex)]="selectedTabIndex">
  <mat-tab label="Argumentos por Programa">
    <ng-container *ngIf="selectedTabIndex === 0">
      <app-programas></app-programas>
    </ng-container>
  </mat-tab>
  <mat-tab label="Categorias de Argumentos">
    <ng-container *ngIf="selectedTabIndex === 1">
      <app-categorias></app-categorias>
    </ng-container>
  </mat-tab>
</mat-tab-group>
