<!-- Botones de accion -->
<div class="d-flex justify-content-between my-4">
  <button
    class="btn btn-icon me-2"
    (click)="recargarProgramasConfigurados()"
    aria-label="Recargar"
    title="Recargar programas"
  >
    <i class="material-icons">refresh</i>
  </button>
  <button
    class="btn btn-success m-2"
    style="margin-left: auto"
    (click)="abrirModalCrearPrograma()"
  >
    <mat-icon style="vertical-align: middle; margin-right: 4px">add</mat-icon>
    Agregar Programa
  </button>
</div>

<!-- Tabla de Programas Configurados-->
<kendo-grid
  [data]="listadoProgramasConfigurados || []"
  [style.width]="'100%'"
  [style.minWidth.px]="600"
  class="table-striped-rows"
  [loading]="isLoading"
>
  <kendo-grid-column
    field="id"
    title="ID"
    [width]="100"
    [headerStyle]="{
      justifyContent: 'center',

      verticalAlign: 'middle',
      fontWeight: '500'
    }"
    [style]="{ textAlign: 'center' }"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      {{ dataItem.id }}
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    field="nombre"
    title="Nombre"
    [headerStyle]="{
      justifyContent: 'center',

      verticalAlign: 'middle',
      fontWeight: '500'
    }"
    [style]="{ textAlign: 'center' }"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      {{ dataItem.nombre }}
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    field="usuarioModificacion"
    title="Usuario Modificación"
    [width]="250"
    [headerStyle]="{
      justifyContent: 'center',

      verticalAlign: 'middle',
      fontWeight: '500'
    }"
    [style]="{ textAlign: 'center' }"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      {{ dataItem.usuarioModificacion }}
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    field="fechaModificacion"
    title="Fecha Modificación"
    [width]="250"
    [headerStyle]="{
      justifyContent: 'center',

      verticalAlign: 'middle',
      fontWeight: '500'
    }"
    [style]="{ textAlign: 'center' }"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      {{ dataItem.fechaModificacion | date : "yyyy-MM-dd HH:mm:ss" }}
    </ng-template>
  </kendo-grid-column>
  <kendo-grid-column
    title="Acciones"
    [width]="300"
    [headerStyle]="{
      justifyContent: 'center',

      verticalAlign: 'middle',
      fontWeight: '500'
    }"
    [style]="{ textAlign: 'center' }"
  >
    <ng-template kendoGridCellTemplate let-dataItem>
      <button
        class="bg-warning text-white mx-2 btn btn-sm"
        (click)="abrirModalEditarPrograma(dataItem.id)"
      >
        <i class="material-icons">edit</i>
      </button>
      <button
        class="bg-danger text-white mx-2 btn btn-sm"
        (click)="eliminarProgramaConfigurado(dataItem.id)"
      >
        <i class="material-icons">delete</i>
      </button>
    </ng-template>
  </kendo-grid-column>
</kendo-grid>
<p *ngIf="(listadoProgramasConfigurados?.length || 0) > 0" class="text-end p-3">
  Cantidad total: {{ listadoProgramasConfigurados?.length || 0 }}
</p>
