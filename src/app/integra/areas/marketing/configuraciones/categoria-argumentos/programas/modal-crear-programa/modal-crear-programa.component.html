<div
  class="modal-header text-white"
  style="
    background-color: #3f51b5;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
  "
>
  <h3 class="m-0" style="font-weight: 500">Agregar Programa</h3>
  <button
    type="button"
    aria-label="Cerrar"
    class="btn-close btn-close-white"
    (click)="cerrarModalCrearPrograma()"
    style="margin-left: auto"
  ></button>
</div>

<ng-container *ngIf="isLoading">
  <div
    class="d-flex justify-content-center align-items-center"
    style="min-height: 180px"
  >
    <mat-spinner></mat-spinner>
  </div>
</ng-container>

<ng-container *ngIf="!isLoading">
  <div class="modal-body p-4">
    <h4 class="fw-semibold mb-2">Seleccioná el programa a configurar</h4>

    <mat-form-field appearance="outline" class="w-100 mb-3">
      <mat-label>Programa</mat-label>
      <input
        type="text"
        matInput
        placeholder="Buscar programa..."
        [formControl]="busquedaPrograma"
        [matAutocomplete]="autoPrograma"
        autocomplete="off"
      />
      <mat-autocomplete
        #autoPrograma="matAutocomplete"
        [displayWith]="displayNombrePrograma"
        (optionSelected)="onProgramaSeleccionado($event)"
      >
        <mat-option
          *ngFor="let programa of programasFiltrados"
          [value]="programa"
        >
          {{ programa.nombre }}
        </mat-option>
        <mat-option *ngIf="programasFiltrados.length === 0" disabled>
          Sin resultados
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>

    <p class="text-muted small mb-0">
      Solo se muestran programas sin argumentos activos configurados.
      Al confirmar, se abrirá el editor de argumentos directamente.
    </p>
  </div>

  <div
    class="modal-footer p-3 d-flex gap-2 justify-content-end"
    style="border-top: 1px solid #eee"
  >
    <button
      type="button"
      class="btn btn-secondary"
      (click)="cerrarModalCrearPrograma()"
    >
      Cancelar
    </button>
    <button
      type="button"
      class="btn btn-success"
      [disabled]="!programaSeleccionado"
      (click)="confirmarSeleccion()"
    >
      Confirmar
    </button>
  </div>
</ng-container>
