<div
  class="modal-header text-white"
  style="
    background-color: #3f51b5;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
  "
>
  <h3 class="m-0" style="font-weight: 500">Nuevo Programa</h3>
  <button
    type="button"
    aria-label="Close"
    class="btn-close btn-close-white"
    (click)="cerrarModalCrearPrograma()"
    style="margin-left: auto"
  >
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<ng-container *ngIf="isLoadingProgramaGeneral">
  <div
    class="d-flex justify-content-center align-items-center"
    style="min-height: 180px"
  >
    <mat-spinner></mat-spinner>
  </div>
</ng-container>
<form (ngSubmit)="crearProgramaConfigurado()" *ngIf="!isLoadingProgramaGeneral">
  <div class="modal-body p-4">
    <h4 class="fw-semibold mb-2">Nombre del programa</h4>
    <mat-form-field appearance="outline" class="w-100 mb-3">
      <input
        type="text"
        matInput
        name="programaGeneral"
        [matAutocomplete]="autoPrograma"
        [(ngModel)]="nombrePrograma"
        (ngModelChange)="filtrarProgramas($event)"
        (blur)="validarProgramaSeleccionado()"
        placeholder="Seleccione el programa"
        required
        autocomplete="off"
      />
      <mat-autocomplete #autoPrograma="matAutocomplete">
        <mat-option
          *ngFor="let programa of programasFiltrados"
          [value]="programa.nombre"
        >
          {{ programa.nombre }}
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>
  </div>
  <div
    class="modal-footer p-3 d-flex gap-2 justify-content-end"
    style="border-top: 1px solid #eee"
  >
    <button
      type="button"
      class="btn btn-secondary"
      (click)="cerrarModalCrearPrograma()"
    >
      Cancelar
    </button>
    <button
      type="submit"
      class="btn btn-success"
      [disabled]="isLoadingModalCrearPrograma"
    >
      Crear
      <span
        *ngIf="isLoadingModalCrearPrograma"
        class="spinner-border spinner-border-sm ms-2"
      ></span>
    </button>
  </div>
</form>
