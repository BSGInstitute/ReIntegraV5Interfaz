<div class="">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">
            Reporte de Seguimiento de Oportunidades
          </h3>
        </div>

        <div style="border: 1px solid #8c8c8c; padding: 15px">
          <form [formGroup]="formulario">
            <div
              class="cont"
              style="display: flex; justify-content: space-between"
            >
            <kendo-formfield orientation="horizontal" style="flex-basis: 30%">
                <kendo-label class="d-flex align-items-start" [for]="asesores" text="Asesores"></kendo-label>
                <kendo-multiselect
                  #asesores
                  formControlName="asesores"
                  [data]="listaAsesores"
                  textField="nombres"
                  valueField="id"
                  [valuePrimitive]="true"
                ></kendo-multiselect>
              </kendo-formfield>
              <kendo-formfield orientation="horizontal" style="flex-basis: 30%">
                <kendo-label class="d-flex align-items-start" [for]="centroC" text="Centro de Costos"></kendo-label>
                <kendo-multiselect
                  #centroC
                  formControlName="centroC"
                  [data]="listaCentroCostos"
                  textField="nombre"
                  valueField="id"
                  [valuePrimitive]="true"
                ></kendo-multiselect>
              </kendo-formfield>
              <kendo-formfield orientation="horizontal" style="flex-basis: 30%">
                <kendo-label class="d-flex align-items-start" [for]="faseO" text="Fase Oportunidad Actual:"></kendo-label>
                <kendo-multiselect
                  #faseO
                  formControlName="faseO"
                  [data]="listaFaseOportunidad"
                  textField="codigo"
                  valueField="id"
                  [valuePrimitive]="true"
                ></kendo-multiselect>
              </kendo-formfield>
              
              
            </div>

            <div
              class="cont"
              style="
                display: flex;
                justify-content: space-between;
                margin-top: 15px;
                margin-bottom: 15px;
              "
            >
              <kendo-formfield orientation="horizontal"  style="flex-basis: 30%">
                <kendo-label
                  class="d-flex align-items-start"
                  [for]="fec"
                  text="Tipo Fecha"
                >
                </kendo-label>
                <kendo-dropdownlist
                  #fec
                  formControlName="fec"
                  [data]="listaTipoFecha"
                  [kendoDropDownFilter]="filterSettings"
                  textField="nombre"
                  valueField="id"
                  [valuePrimitive]="true"
                ></kendo-dropdownlist>
              </kendo-formfield>
              <kendo-formfield orientation="horizontal" style="flex-basis: 30%">
                <kendo-label
                  class="d-flex align-items-start"
                  [for]="fecI"
                  text="Fecha Inicio"
                >
                </kendo-label>
                <kendo-datepicker
                  formControlName="fechaInicio"
                  #fecI
                ></kendo-datepicker>
              </kendo-formfield>
              <kendo-formfield orientation="horizontal" style="flex-basis: 30%">
                <kendo-label
                  class="d-flex align-items-start"
                  [for]="fecf"
                  text="Fecha Fin"
                >
                </kendo-label>
                <kendo-datepicker
                  formControlName="fechaFin"
                  #fecf
                ></kendo-datepicker>
              </kendo-formfield>
            </div>

            <div
              style="display: flex; justify-content: flex-end; margin-top: 5px"
            >
              <button
                mat-raised-button
                color="primary"
                type="button"
                (click)="buscar()"
              >
                Buscar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
