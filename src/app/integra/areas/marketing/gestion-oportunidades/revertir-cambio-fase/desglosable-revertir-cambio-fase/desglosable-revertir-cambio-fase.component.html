<kendo-grid
[kendoGridBinding]="listaDetalle"
[loading]="loader"
[pageSize]="20"
[sortable]="true"
[reorderable]="true"
[resizable]="true"
[columnMenu]="{ filter: true }"
[selectable]="true"       

>

<kendo-grid-column
  title="Fase Inicio"
  headerClass="justify-content-center k-grid-header "
  [width]="50"
  field="faseInicio"
  [locked]="false"
  [sticky]="false"
  [filterable]="true"
  [hidden]="false"
  [class]="'cellCustomClass'"
>
</kendo-grid-column>
<kendo-grid-column
title="Fase Destino"
headerClass="justify-content-center k-grid-header "
[width]="50"
field="faseDestino"
[locked]="false"
[sticky]="false"
[filterable]="true"
[hidden]="false"
>
</kendo-grid-column>
<kendo-grid-column
  title="Fecha Modificacion"
  headerClass="justify-content-center k-grid-header "
  [width]="90"
  field="fechaModificacion"
  [locked]="false"
  [sticky]="false"
  [filterable]="true"
  [hidden]="false"
>
</kendo-grid-column>

<kendo-grid-column
title="Estado"
headerClass="justify-content-center k-grid-header "
[width]="50"
field="estado"
[locked]="false"
[sticky]="false"
[filterable]="true"
[hidden]="false"
>
</kendo-grid-column>

</kendo-grid>
