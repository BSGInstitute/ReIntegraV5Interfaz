
<div class="contenedor">
  <!-- <aploadingp-loader *ngIf="loading"></aploadingp-loader> -->

  <div class="k-loading-panel" *ngIf="loading">
    <div class="k-loading-panel-mask"></div>
    <div class="k-loading-panel-wrapper">
      <kendo-loader
        type="converging-spinner"
        themeColor="primary"
        size="large"
      >
      </kendo-loader>
      <div class="k-loading-panel-text fs-5 text-primary">Cargando...</div>
    </div>
  </div>

  <div class="row">

    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Procesamiento de oportunidades</h3>
        </div>
        <div class="card-body p-4" id="grillaAgendaTab">
          <div class="row d-flex justify-content-center mb-4">
            <div class="col-8">
              <div class="card">
                <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Procesar Oportunidades Facebook</h3>
                </div>
                <div class="card-body k-form k-form-horizontal">

                    <div class="row">
                      <div class="col-lg-6">
                        <kendo-formfield orientation="horizontal">
                          <label [for]="fechaInicial" class="k-label">
                            Fecha Inicio:
                          </label>
                          <kendo-datepicker
                            #fechaInicial
                            [formControl]="fechaInicio"
                            format="yyyy-MM-dd"
                          >
                          </kendo-datepicker>
                        </kendo-formfield>

                      </div>
                      <div class="col-lg-6">
                        <kendo-formfield orientation="horizontal">
                          <label [for]="fechaFinal" class="k-label">
                            Fecha Fin:
                          </label>

                          <kendo-datepicker
                            #fechaFinal
                            [formControl]="fechaFin"
                            format="yyyy-MM-dd"
                          >
                          </kendo-datepicker>
                        </kendo-formfield>
                      </div>
                    </div>
                    <br>

                    <div class="d-grid gap-2 col-6 mx-auto">
                      <button
                      class="btn btn-outline-secondary"
                      (click)="ProcesarFacebookLeadsErroneos()"
                      type="button">
                      Procesar Oportunidades</button>
                    </div>
                </div>
                <div class="card-footer">
                  <div class="row">
                    <div class="col-12 d-flex">
                      <small class="text-muted"
                      > (*)Procesamiento de Leads con campos vacíos</small
                    >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="row d-flex justify-content-center mb-4">
            <div class="col-8">
              <div class="card">
                <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Procesar Oportunidades</h3>
                </div>
                <div class="card-body k-form k-form-horizontal">
                  <div class="d-grid gap-2 col-6 mx-auto">
                    <button
                    class="btn btn-outline-success"
                    (click)="crearOportunidadPortalWeb()"

                    type="button">
                    Procesar Oportunidades</button>

                  </div>


                </div>
                <div class="card-footer">
                  <div class="row">
                    <div class="col-12 d-flex ">

                      <small class="text-muted"
                      > (*)Procesamiento por defecto de oportunidades</small
                    >
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
