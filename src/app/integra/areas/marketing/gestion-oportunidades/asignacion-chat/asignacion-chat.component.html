<div class="contenedor">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Asignación de Chats</h3>
        </div>
        <div class="card-body p-4">
          <div class="row d-flex justify-content-center mb-4">
            <div class="col-12">
              <div class="content" id="tabsAsignacionChat">
                <kendo-tabstrip
            [scrollable]="{ scrollButtons: buttons }"
            [style.width.%]="''"
            [keepTabContent]="true"
            (tabSelect)="onSelectTabAsignacionChat($event)"
            [animate]="false"
          >
          <!-- REGISTROS IMPORTADOS -->
          <kendo-tabstrip-tab
              [selected]="tabsAsignacionChat[0].selected"
              [title]="tabsAsignacionChat[0].titleTab"
              [disabled]="tabsAsignacionChat[0].disabled"
            >
              <ng-template kendoTabTitle>
                <span>{{ tabsAsignacionChat[0].titleTab }}</span>
              </ng-template>
              <ng-template kendoTabContent >
                <app-content-tab-asignacion-chat
                  [tab]="tabSeleccionado"
                  [activo]="indexActual==0"
                  [filtrosGenerales]="filtrosGenerales">
                </app-content-tab-asignacion-chat>
              </ng-template>
            </kendo-tabstrip-tab>
            <!-- END REGISTROS IMPORTADOS -->
            <!-- REGISTROS ERRONEOS -->
            <kendo-tabstrip-tab
              [selected]="tabsAsignacionChat[1].selected"
              [title]="tabsAsignacionChat[1].titleTab"
              [disabled]="tabsAsignacionChat[1].disabled"
            >
              <ng-template kendoTabTitle>
                <span>{{ tabsAsignacionChat[1].titleTab }}</span>
              </ng-template>
              <ng-template kendoTabContent >
                <app-content-tab-asignacion-chat
                [tab]="tabSeleccionado"
                [activo]="indexActual==1"
                [filtrosGenerales]="filtrosGenerales">
                </app-content-tab-asignacion-chat>
              </ng-template>
            </kendo-tabstrip-tab>
            <!-- END REGISTROS ERRONEOS -->
          </kendo-tabstrip>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
