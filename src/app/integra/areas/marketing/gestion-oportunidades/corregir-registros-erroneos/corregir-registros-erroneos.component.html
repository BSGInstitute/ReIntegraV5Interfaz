<div class="contenedor">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">Asignación Automática</h3>
        </div>
        <div class="card-body p-4">
          <div class="row d-flex justify-content-center mb-4">
            <div class="col-12">
              <div class="card">
                <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Filtro de búsqueda</h3>
                </div>
                <div class="card-body k-form k-form-horizontal">
                  <form [formGroup]="formFiltroBusqueda">
                    <div class="row">
                      <div class="col-12 col-md-6">
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdCentroCosto" class="k-label">
                                <span>Centro Costo: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdCentroCosto
                                formControlName="IdCentroCosto"
                                [data]="filtrosGenerales.listaCentroCosto"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdCategoriaDato" class="k-label">
                                <span>Categoria Dato: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdCategoriaDato
                                formControlName="IdCategoriaDato"
                                [data]="filtrosGenerales.listaCategoriaDato"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdPais" class="k-label">
                                <span>País: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdPais
                                formControlName="IdPais"
                                [data]="filtrosGenerales.listaPais"
                                textField="nombrePais"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdProbabilidad" class="k-label">
                                <span>Probabilidad: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdProbabilidad
                                formControlName="IdProbabilidad"
                                [data]="filtrosGenerales.listaProbabilidad"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="FechaInicio" class="k-label">
                                  <span
                                  >Fecha Inicio :
                                  </span>
                              </label>
                              <kendo-datepicker
                                #FechaInicio
                                formControlName="FechaInicio"
                                culture="es-ES"
                                calendarType="classic"
                                [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                placeholder="dia-mes-año"
                                ></kendo-datepicker>

                            </kendo-formfield>
                          </div>
                        </div>
                      </div>
                      <div class="col-12 col-md-6">
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdIndustria" class="k-label">
                                <span>Industria: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdIndustria
                                formControlName="IdIndustria"
                                [data]="filtrosGenerales.listaIndustria"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdCargo" class="k-label">
                                <span>Cargo: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdCargo
                                formControlName="IdCargo"
                                [data]="filtrosGenerales.listaCargo"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdAreaTrabajo" class="k-label">
                                <span>Area de trabajo: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdAreaTrabajo
                                formControlName="IdAreaTrabajo"
                                [data]="filtrosGenerales.listaAreaTrabajo"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdAreaFormacion" class="k-label">
                                <span>Area de formación: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdAreaFormacion
                                formControlName="IdAreaFormacion"
                                [data]="filtrosGenerales.listaAreaFormacion"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="FechaFin" class="k-label">
                                  <span
                                  >Fecha Fin :
                                  </span>
                              </label>
                              <kendo-datepicker
                                #FechaFin
                                formControlName="FechaFin"
                                culture="es-ES"
                                calendarType="classic"
                                [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                placeholder="dia-mes-año"
                                ></kendo-datepicker>

                            </kendo-formfield>
                          </div>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
                <div class="card-footer">
                  <div class="row">
                    <div class="col-12 d-flex justify-content-end">
                      <button
                        class="btn btn-sm btn-primary"
                        (click)="BuscarFiltros()"
                      >
                        Buscar
                        <fa-icon
                          [icon]="['fas', 'search']"
                          class="fa-lg"
                        ></fa-icon>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="card-body p-4">
          <div class="row d-flex justify-content-center mb-4">
            <div class="col-12">
              <div class="content" id="tabsAsignacionAutomatica">
                <kendo-tabstrip
            [scrollable]="{ scrollButtons: buttons }"
            [style.width.%]="''"
            [keepTabContent]="true"
            (tabSelect)="onSelectTabAsignacionAutomatica($event)"
            [animate]="false"
          >
          <!-- REGISTROS IMPORTADOS -->
          <kendo-tabstrip-tab
              [selected]="tabsAsignacionAutomatica[0].selected"
              [title]="tabsAsignacionAutomatica[0].titleTab"
              [disabled]="tabsAsignacionAutomatica[0].disabled"
            >
              <ng-template kendoTabTitle>
                <span>{{ tabsAsignacionAutomatica[0].titleTab }}</span>
              </ng-template>
              <ng-template kendoTabContent >
                <app-content-tab-asignacion-automatica
                  [tab]="tabSeleccionado"
                  [activo]="indexActual==0"
                  [ListaFiltro]="ListaFiltro">
                </app-content-tab-asignacion-automatica>
              </ng-template>
            </kendo-tabstrip-tab>
            <!-- END REGISTROS IMPORTADOS -->
            <!-- REGISTROS ERRONEOS -->
            <kendo-tabstrip-tab
              [selected]="tabsAsignacionAutomatica[1].selected"
              [title]="tabsAsignacionAutomatica[1].titleTab"
              [disabled]="tabsAsignacionAutomatica[1].disabled"
            >
              <ng-template kendoTabTitle>
                <span>{{ tabsAsignacionAutomatica[1].titleTab }}</span>
              </ng-template>
              <ng-template kendoTabContent >
                <app-content-tab-asignacion-automatica
                [tab]="tabSeleccionado"
                [activo]="indexActual==1"
                [ListaFiltro]="ListaFiltro"
                [filtrosGenerales]="filtrosGenerales">
                </app-content-tab-asignacion-automatica>
              </ng-template>
            </kendo-tabstrip-tab>
            <!-- END REGISTROS ERRONEOS -->
          </kendo-tabstrip>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
