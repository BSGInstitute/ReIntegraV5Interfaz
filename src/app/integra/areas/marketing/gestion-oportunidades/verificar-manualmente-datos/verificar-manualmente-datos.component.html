<div class="contenedor">

        <div class="card-header bg-color-material pb-0">
          <h3 class="text-white mb-2">(O) Verificar manualmente datos</h3>
        </div>
        <div class="card-body p-4" style="margin-bottom: -50px;">
          <div class="row d-flex justify-content-center mb-4">
            <div class="col-12">
              <div class="card">
                <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Filtro de búsqueda</h3>
                </div>
                <div class="card-body k-form k-form-horizontal">
                  <form [formGroup]="formFiltroBusqueda">

                      <div class="col-12 col-md-6">
                        <div class="row">
                          <div class="col-12">

                              <label [for]="IdCentroCosto" class="k-label">
                                <span>Centro Costo: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdCentroCosto
                                formControlName="IdCentroCosto"
                                [data]="filtrosGenerales.listaCentroCosto"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdCategoriaDato" class="k-label">
                                <span>Categoria Dato: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdCategoriaDato
                                formControlName="IdCategoriaDato"
                                [data]="filtrosGenerales.listaCategoriaDato"
                                textField="nombre"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdPais" class="k-label">
                                <span>País: <span class="text-danger fw-bold"></span></span>
                              </label>
                              <kendo-multiselect
                                #IdPais
                                formControlName="IdPais"
                                [data]="filtrosGenerales.listaPais"
                                textField="nombrePais"
                                [valuePrimitive]="true"
                                valueField="id"
                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">
                              <label [for]="IdProbabilidad" class="k-label">

                              </label>

                                textField="nombre"

                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>

                          </div>

                              </label>
                              <kendo-datepicker
                                #FechaInicio
                                formControlName="FechaInicio"
                                culture="es-ES"
                                calendarType="classic"
                                [format]="{displayFormat: 'dd-MM-yyyy',inputFormat: 'dd-MM-yyyy'}"
                                placeholder="dia-mes-año"
                                ></kendo-datepicker>

                            </kendo-formfield>
                          </div>
                        </div>
                      </div>

                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">

                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">

                              ></kendo-multiselect>
                              <kendo-formhint></kendo-formhint>
                              <kendo-formerror>
                                {{ "" }}
                              </kendo-formerror>
                            </kendo-formfield>
                          </div>
                        </div>
                        <div class="row">
                          <div class="col-12">
                            <kendo-formfield orientation="horizontal">

                          </div>

                      </div>
                    </div>
                  </form>
                </div>
                <div class="card-footer">
                  <div class="row">
                    <div class="col-12 d-flex justify-content-end">
                      <button

                        (click)="BuscarFiltros()"
                      >
                        Filtrar
                        <fa-icon

                          class="fa-lg"
                        ></fa-icon>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="card-body p-4">
          <div class="row d-flex justify-content-center mb-4">
            <div class="col-12">
              <div class="card">
                <div class="card-header bg-color-material pb-0">
                  <h3 class="text-white mb-2">Datos</h3>
                </div>
                <div class="card-body p-4">
                  <div class="row">
                    <div class="col">
                      <kendo-grid
                        [data]="gridVerificacionManualDatos.view"
                        [loading]="gridVerificacionManualDatos.loading"
                        (remove)="gridVerificacionManualDatos.removeHandler($event)"
                        (dataStateChange)="
                        gridVerificacionManualDatos.onStateChange($event)
                        "
                        [filterable]="gridVerificacionManualDatos.filterable"
                        [sortable]="gridVerificacionManualDatos.sortable"
                        [resizable]="gridVerificacionManualDatos.resizable"
                        [pageable]="gridVerificacionManualDatos.pageable"
                        [skip]="gridVerificacionManualDatos.gridState.skip"
                        [pageSize]="gridVerificacionManualDatos.gridState.take"
                        [sort]="gridVerificacionManualDatos.gridState.sort"
                      >
                      <kendo-grid-command-column
                        title="Editar"
                        [width]="100"
                        [headerClass]="'header-grid-integra'"
                        >
                        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                          <div class="w-100 d-flex justify-content-center">
                            <!-- <button
                            kendoGridRemoveCommand
                            themeColor="error"
                            fillMode="solid"
                            rounded="large"
                            size="large"
                            class="p-2 me-1 ms-1"
                            container="body"
                            placement="top"
                            ngbTooltip="Eliminar"
                            >
                            <span class="k-icon k-i-delete k-icon-20"></span>
                            </button> -->
                            <button
                            kendoButton
                            themeColor="warning"
                            fillMode="solid"
                            rounded="large"
                            size="large"
                            class="p-2 me-1 ms-1"
                            container="body"
                            (click)="abrirModalVericarDato(dataItem)"
                            placement="top"
                            ngbTooltip="Editar"
                            >
                            <span class="k-icon k-i-edit k-icon-20"></span>
                            </button>
                          </div>
                        </ng-template>
                      </kendo-grid-command-column>
                        <kendo-grid-column
                          *ngFor="let item of gridVerificacionManualDatos.columns"
                          [field]="item.field"
                          [title]="item.title"
                          [filterable]="item.filterable"
                          [headerClass]="item.headerClass"
                          [width]="item.width"
                        >
                          <ng-template
                            kendoGridFilterMenuTemplate
                            let-filter
                            let-column="column"
                            let-filterService="filterService"
                          >
                            <kendo-grid-string-filter-menu
                              [column]="column"
                              [filter]="filter"
                              [filterService]="filterService"
                              [extra]="false"
                              operator="eq"
                            >
                              <kendo-filter-eq-operator
                                text="Igual a"
                              ></kendo-filter-eq-operator>
                            </kendo-grid-string-filter-menu>
                          </ng-template>
                        </kendo-grid-column>

                      </kendo-grid>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
