<div
  class="container"
  style="height: 100vh; display: flex; align-items: center"
>
  <div id="loader-wrapper">
    <div id="loader"></div>
    <div class="loader-section section-left"></div>
    <div class="loader-section section-right"></div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card-group">
        <div class="card p-4">
          <form [formGroup]="formLogin" (ngSubmit)="onSubmit()">
            <div class="card-body">
              <h2 class="text-center">Iniciar Sesión</h2>
              <div class="row mb-3">
                <div class="form-group">
                  <div class="input-group">
                    <div class="input-group-prepend">
                      <span class="input-group-text">
                        <fa-icon [icon]="['fas', 'user']"></fa-icon>
                      </span>
                    </div>
                    <input
                      type="text"
                      class="form-control form-control-sm"
                      [ngClass]="{ 'is-invalid': getValidControl('userName') }"
                      formControlName="userName"
                    />
                  </div>
                </div>
              </div>
              <div class="row mb-3">
                <div class="form-group">
                  <div class="input-group">
                    <div class="input-group-prepend">
                      <span class="input-group-text">
                        <fa-icon [icon]="['fas', 'key']"></fa-icon>
                      </span>
                    </div>
                    <input
                      type="password"
                      class="form-control form-control-sm"
                      [ngClass]="{ 'is-invalid': getValidControl('password') }"
                      formControlName="password"
                    />
                  </div>
                </div>
              </div>
              <div class="row mb-3">
                <div class="col-md-12 text-right">
                  <mat-checkbox color="primary" formControlName="rememberMe"
                    >¿Recordar cuenta?</mat-checkbox
                  >
                </div>
              </div>
              <div class="row mt-2">
                <div class="col-md-12 d-flex justify-content-center">
                  <input
                    type="submit"
                    value="Iniciar sesión"
                    class="btn btn-primary px-4"
                    [disabled]="btnIniciarSesion"
                  />
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="card text-white bg-primary py-5 d-md-down-none">
          <div class="card-body text-center">
            <img
              class="logo-inicioSesion"
              src="https://repositorioweb.blob.core.windows.net/documentos/integra/LogoPrincipal.png"
              style="width: 100%"
            />
            <br />
            <div class="Aviso font-italic font-weight-bold">Integra V5</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
