<kendo-floatingactionbutton
  *ngIf="showComentarioFicha && !abrirComentario"
  title="Comentario"
  class="kfab-comentarioAgenda"
  rounded="full"
  icon="comment"
  [align]="{ vertical: 'middle', horizontal: 'end' }"
  (click)="openComentario()"
  themeColor="success"
  size="large"
>
</kendo-floatingactionbutton>

<kendo-window
  *ngIf="abrirComentario"
  [(top)]="windowTop"
  [(left)]="windowLeft"
  autoFocusedElement="#kwcomentario"
  title="Comentario Actividad"
  class="kw-comentarioAgenda"
  (close)="closeComentario()"
  [resizable]="true"
  [width]="450"
>
  <kendo-window-titlebar>
    <div class="k-window-title">Comentario Actividad</div>
    <button kendoWindowCloseAction></button>
  </kendo-window-titlebar>
  <div class="w-100 k-form k-form-horizontal">
    <div class="col-12">
      <kendo-textarea
        id="kwcomentario"
        [ngModel]="comentarioActividad$ | async"
        (ngModelChange)="comentarioActividad$.next($event)"
        class="kw-textarea-comentario"
        placeholder="Ingrese un comentario"
        (valueChange)="onValueChangeComentario($event)"
        [maxlength]="500"
        resizable="auto"
        [rows]="5"
      >
        <kendo-textarea-suffix class="comentario-actividad">
          <span class="counter">{{ counter }}</span>
        </kendo-textarea-suffix>
      </kendo-textarea>
    </div>
  </div>
</kendo-window>
