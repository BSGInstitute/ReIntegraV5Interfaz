<div class="modal-header colorCabecera" [ngClass]="estilosCabezera">
  <h2 class="modal-title my-2" style="margin: 0px 0px 0px 32%;">{{nombreCabezera}}</h2>
  <button
    type="button"
    class="btn-close exit"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body">
  <div [ngClass]="estilosCuerpo">
    <ng-container *ngIf="autoPlay">
      <audio controls [src]="urlGrabacion" id="player" type="audio/mp3" autoplay>
        Tu navegador no soporta el elemento de <code>audio</code>
      </audio>
    </ng-container>
    <ng-container *ngIf="!autoPlay">
      <audio controls [src]="urlGrabacion" type="audio/mp3">
        Tu navegador no soporta el elemento de <code>audio</code>
      </audio>>
    </ng-container>
  </div>
</div>
<div class="d-flex justify-content-center">
  <div class="align-content-center">
    <button
      class="botonCerrar"
      (click)="activeModal.dismiss('Cross click')"
    >
      Cerrar
    </button>
  </div>
</div>
<ng-content select="[send]">
</ng-content>
