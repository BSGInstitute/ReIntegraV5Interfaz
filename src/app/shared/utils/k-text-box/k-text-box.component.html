<kendo-formfield [orientation]="orientation" *ngIf="tipo == 'text'" class="col">
  <label [for]="text" class="k-label" *ngIf="textLabel">
    <span
      >{{ textLabel }}
      <strong class="text-danger" *ngIf="required">*</strong></span
    >
  </label>
  <kendo-textbox
    #text
    class="d-flex"
    [size]="size"
    [clearButton]="clearButton"
    [formControl]="control"
    [required]="required"
    (valueChange)="onChange($event)"
    (focus)="onFocus()"
    (blur)="onBlur()"
    (inputFocus)="inputFocus()"
    (inputBlur)="inputBlur()"
  >
  </kendo-textbox>
  <kendo-formhint>Hint: Card Holder full name</kendo-formhint>
  <kendo-formerror>Error: Full Name is required</kendo-formerror>
</kendo-formfield>

<kendo-formfield [orientation]="orientation" *ngIf="tipo == 'password'">
  <label [for]="password" class="k-label">
    <span
      >{{ textLabel }}
      <strong class="text-danger" *ngIf="required">*</strong></span
    >
  </label>
  <kendo-textbox
    #password
    class="d-flex"
    [size]="size"
    [clearButton]="clearButton"
    [formControl]="control"
    [required]="required"
    (valueChange)="onChange($event)"
    (focus)="onFocus()"
    (blur)="onBlur()"
    (inputFocus)="inputFocus()"
    (inputBlur)="inputBlur()"
  >
    <ng-template *ngIf="eye" kendoTextBoxSuffixTemplate>
      <button
        kendoButton
        look="clear"
        icon="eye"
        (click)="toggleVisibility()"
      ></button>
    </ng-template>
  </kendo-textbox>
  <kendo-formhint>Hint: Card Holder full name</kendo-formhint>
  <kendo-formerror>Error: Full Name is required</kendo-formerror>
</kendo-formfield>
